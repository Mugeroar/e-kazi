<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>E-KAZI · Dashboard</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="E-KAZI">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    <link rel="manifest" href="/e-kazi/assistants/manifest.json">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0f1e;
            --bg-secondary: #111827;
            --bg-card: #1a2235;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #263148;
            --border-light: #334155;
            --gold: #f59e0b;
            --gold-dark: #b45309;
            --purple: #8b5cf6;
            --purple-light: #a78bfa;
            --green: #22c55e;
            --red: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --orange: #f97316;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
        }

        .bg-gradient {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 60%, rgba(245, 158, 11, 0.05) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .app-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 15, 30, 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(245, 158, 11, 0.15);
            padding: 0 1rem;
            padding-top: var(--safe-top);
        }

        .header-inner {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            object-fit: contain;
            background: white;
            box-shadow: 0 4px 14px rgba(139, 92, 246, 0.25);
        }

        .brand-name {
            font-size: 0.95rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-stat {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.6rem;
            color: var(--text-muted);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 0.3rem 0.6rem;
            border-radius: 15px;
        }

        .header-stat i { font-size: 0.55rem; }
        .header-stat span { font-weight: 700; color: var(--gold); }

        .user-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 0.25rem 0.7rem 0.25rem 0.35rem;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            font-size: 0.7rem;
            position: relative;
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--gold));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.65rem;
            color: white;
            flex-shrink: 0;
        }

        .user-dropdown {
            position: absolute;
            top: 110%;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.35rem;
            min-width: 140px;
            display: none;
            z-index: 10;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        .user-btn:hover .user-dropdown { display: block; }

        .dropdown-item {
            padding: 0.5rem 0.7rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            transition: 0.2s;
            border: none;
            background: none;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .dropdown-item:hover { background: rgba(245,158,11,0.1); color: var(--gold); }
        .dropdown-item.danger:hover { background: rgba(239,68,68,0.1); color: var(--red); }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 0;
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 0.5rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .tab-nav::-webkit-scrollbar { display: none; }

        .tab-btn {
            padding: 0.7rem 1rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tab-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        .tab-btn .tab-badge {
            font-size: 0.55rem;
            padding: 1px 6px;
            border-radius: 8px;
            font-weight: 700;
        }

        .tab-btn.active .tab-badge {
            background: rgba(245,158,11,0.15);
            color: var(--gold);
        }

        .tab-btn:not(.active) .tab-badge {
            background: rgba(148,163,184,0.1);
            color: var(--text-muted);
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* State Cards */
        .state-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            margin: 1rem;
        }

        .state-card i {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .state-card h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .state-card p {
            font-size: 0.78rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .state-pending i { color: var(--warning); }
        .state-pending h2 { color: var(--warning); }
        .state-rejected i { color: var(--red); }
        .state-rejected h2 { color: var(--red); }

        /* ========== PICK-UP CONTENT ========== */
        .stats-row {
            display: flex;
            gap: 0.5rem;
            padding: 0.8rem 1rem;
        }

        .stat-card {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.7rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.52rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0.15rem;
        }

        .filters-row {
            display: flex;
            gap: 6px;
            padding: 0 1rem 0.8rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-chip {
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.62rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
        }

        .filter-chip.active {
            background: var(--gold);
            color: #0f172a;
            border-color: var(--gold);
        }

        .search-input {
            flex: 1;
            min-width: 120px;
            padding: 0.35rem 0.7rem;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.65rem;
            font-family: 'Inter', sans-serif;
        }

        .search-input:focus { outline: none; border-color: var(--gold); }

        .refresh-chip {
            padding: 0.3rem 0.6rem;
            border-radius: 15px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            cursor: pointer;
            font-size: 0.62rem;
            font-family: 'Inter', sans-serif;
        }

        /* Delivery List */
        .delivery-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 1rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .delivery-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.9rem 1rem;
        }

        .delivery-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .delivery-id {
            font-size: 0.6rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .delivery-status {
            font-size: 0.55rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
            text-transform: capitalize;
        }

        .status-assigned { background: rgba(59,130,246,0.15); color: var(--info); }
        .status-out-for-delivery { background: rgba(249,115,22,0.15); color: var(--orange); }
        .status-delivered { background: rgba(34,197,94,0.15); color: var(--green); }
        .status-pending { background: rgba(245,158,11,0.15); color: var(--warning); }

        .delivery-client {
            font-weight: 700;
            font-size: 0.78rem;
            margin-bottom: 0.2rem;
        }

        .delivery-route {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .delivery-route i {
            color: var(--gold);
            margin: 0 4px;
            font-size: 0.5rem;
        }

        .delivery-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 0.3rem 0.7rem;
            border-radius: 12px;
            border: none;
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 3px;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-pickup { background: rgba(249,115,22,0.1); color: var(--orange); }
        .btn-pickup:hover { background: var(--orange); color: white; }
        .btn-complete { background: rgba(34,197,94,0.1); color: var(--green); }
        .btn-complete:hover { background: var(--green); color: white; }
        .btn-nav { background: rgba(59,130,246,0.1); color: var(--info); }
        .btn-nav:hover { background: var(--info); color: white; }
        .btn-view { background: rgba(148,163,184,0.1); color: var(--text-muted); }
        .btn-view:hover { background: var(--text-muted); color: white; }

        .empty-list {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.72rem;
        }

        .empty-list i {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            opacity: 0.4;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: calc(65px + var(--safe-top));
            right: 10px;
            left: 10px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.65rem 0.85rem;
            margin-bottom: 0.35rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.35);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            animation: slideIn 0.3s ease;
            pointer-events: auto;
            max-width: 100%;
        }

        .toast.success { border-left: 3px solid var(--green); }
        .toast.error { border-left: 3px solid var(--red); }
        .toast.warning { border-left: 3px solid var(--warning); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,15,30,0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
        }

        .loading-overlay.hidden { display: none; }

        .spinner {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 3px solid var(--border);
            border-top-color: var(--gold);
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }

        .footer {
            text-align: center;
            padding: 0.6rem 1rem calc(0.6rem + var(--safe-bottom));
            color: var(--text-muted);
            font-size: 0.5rem;
            border-top: 1px solid var(--border);
        }

        .footer span { color: var(--gold); font-weight: 600; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 4000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.2rem;
            width: 100%;
            max-width: 380px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h3 {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--gold);
        }

        .modal .form-group { margin-bottom: 0.8rem; }
        .modal label {
            display: block;
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .modal input, .modal textarea {
            width: 100%;
            padding: 0.5rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.75rem;
            font-family: 'Inter', sans-serif;
        }

        .modal textarea { resize: vertical; min-height: 50px; }
        .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <!-- Pickup Modal -->
    <div class="modal-overlay" id="pickupModalOverlay">
        <div class="modal">
            <h3><i class="fas fa-box"></i> Confirm Pickup</h3>
            <div class="form-group"><label>Notes</label><textarea id="pickupNotes" placeholder="Optional..."></textarea></div>
            <div class="btn-row">
                <button class="action-btn btn-view" onclick="closePickupModal()">Cancel</button>
                <button class="action-btn btn-pickup" onclick="confirmPickup()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Complete Modal -->
    <div class="modal-overlay" id="completeModalOverlay">
        <div class="modal">
            <h3><i class="fas fa-check-circle"></i> Complete Delivery</h3>
            <div class="form-group"><label>Receiver Name</label><input type="text" id="proofName" placeholder="Who received it?"></div>
            <div class="form-group"><label>Notes</label><textarea id="proofNotes" placeholder="Optional..."></textarea></div>
            <div class="btn-row">
                <button class="action-btn btn-view" onclick="closeCompleteModal()">Cancel</button>
                <button class="action-btn btn-complete" onclick="completeDelivery()">Delivered</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <header class="header">
            <div class="header-inner">
                <div class="brand">
                    <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="E-KAZI" class="brand-logo">
                    <span class="brand-name">E-KAZI</span>
                </div>
                <div class="header-right">
                    <div class="header-stat" id="headerStat">
                        <i class="fas fa-circle" style="color:var(--green);font-size:0.4rem;"></i>
                        <span id="headerActiveCount">0</span> active
                    </div>
                    <div class="user-btn" id="userBtn">
                        <div class="user-avatar" id="userAvatar">KA</div>
                        <span id="userName">Asst</span>
                        <div class="user-dropdown">
                            <button class="dropdown-item" onclick="refreshAll()">
                                <i class="fas fa-sync-alt"></i> Refresh
                            </button>
                            <button class="dropdown-item danger" onclick="handleLogout()">
                                <i class="fas fa-sign-out-alt"></i> Sign Out
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Tab Navigation -->
        <nav class="tab-nav" id="tabNav">
            <!-- Dynamically populated -->
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Pending State -->
            <div id="pendingState" class="hidden" style="padding:1rem;">
                <div class="state-card state-pending">
                    <i class="fas fa-clock"></i>
                    <h2>Verification Pending</h2>
                    <p>Your application is under review. Operations will appear once verified.</p>
                </div>
            </div>

            <!-- Rejected State -->
            <div id="rejectedState" class="hidden" style="padding:1rem;">
                <div class="state-card state-rejected">
                    <i class="fas fa-times-circle"></i>
                    <h2>Not Approved</h2>
                    <p id="rejectionMsg">Contact support for details.</p>
                </div>
            </div>

            <!-- Tab Content Container -->
            <div id="tabContents">
                <!-- Dynamically populated tabs -->
            </div>
        </div>

        <footer class="footer">
            &copy; 2026 <span>E-KAZI</span>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc",
            storageBucket: "mugera-e51cc.firebasestorage.app",
            messagingSenderId: "1024868637509",
            appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        const $ = id => document.getElementById(id);
        let currentUser = null;
        let userRegistrations = {};
        let activeTab = null;
        let currentActionId = null;
        let allPickups = [];
        let allRides = [];
        let pickupFilter = 'all';
        let rideFilter = 'all';

        function showLoading(s) { $('loadingOverlay').classList.toggle('hidden', !s); }
        function toast(msg, type = 'info') {
            const icons = { success: 'check-circle', error: 'exclamation-circle', warning: 'exclamation-triangle', info: 'info-circle' };
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas fa-${icons[type]}"></i> ${msg}`;
            $('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        function getInitials(n) { return n ? String(n).split(' ').map(w => w[0]).join('').toUpperCase().substring(0,2) : 'KA'; }
        function escapeHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        auth.onAuthStateChanged(async user => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUser = user;
            $('userAvatar').textContent = getInitials(user.displayName || user.email);
            $('userName').textContent = (user.displayName || user.email?.split('@')[0] || 'Asst').substring(0,12);
            showLoading(true);
            await checkRegistrations(user);
            await initTabs();
            showLoading(false);
        });

        async function checkRegistrations(user) {
            userRegistrations = {};
            const checks = [
                { node: 'delivery_assistants', key: 'pickup', label: 'Pick-Up', icon: 'fa-box' },
                { node: 'pickme_drivers', key: 'ride', label: 'Rides', icon: 'fa-taxi' },
                { node: 'taskers', key: 'tasker', label: 'Tasks', icon: 'fa-clipboard-list' }
            ];
            for (const check of checks) {
                try {
                    const snap = await db.ref(`${check.node}/${user.uid}`).once('value');
                    if (snap.exists()) {
                        const data = snap.val();
                        userRegistrations[check.key] = { ...check, verified: data.verified === true, status: data.status || 'pending', rejectionReason: data.rejectionReason || '', data };
                    }
                } catch (e) {}
            }
        }

        async function initTabs() {
            const verifiedOps = Object.entries(userRegistrations).filter(([_, r]) => r.verified);
            const hasVerified = verifiedOps.length > 0;
            const allRejected = Object.keys(userRegistrations).length > 0 && Object.values(userRegistrations).every(r => r.status === 'rejected');
            const hasAny = Object.keys(userRegistrations).length > 0;

            $('pendingState').classList.add('hidden');
            $('rejectedState').classList.add('hidden');

            if (hasVerified) {
                renderTabs(verifiedOps);
                // Activate first tab
                const firstTab = verifiedOps[0][0];
                switchToTab(firstTab);
                await loadTabData(firstTab);
            } else if (allRejected) {
                $('rejectedState').classList.remove('hidden');
                const firstRej = Object.values(userRegistrations).find(r => r.status === 'rejected');
                if (firstRej?.rejectionReason) $('rejectionMsg').textContent = firstRej.rejectionReason;
                $('tabNav').innerHTML = '';
                $('tabContents').innerHTML = '';
            } else {
                $('pendingState').classList.remove('hidden');
                $('tabNav').innerHTML = '';
                $('tabContents').innerHTML = '';
            }
        }

        function renderTabs(verifiedOps) {
            const tabNav = $('tabNav');
            tabNav.innerHTML = verifiedOps.map(([key, op]) => `
                <button class="tab-btn" data-tab="${key}" onclick="switchToTab('${key}')">
                    <i class="fas ${op.icon}"></i> ${op.label}
                    <span class="tab-badge" id="badge-${key}">0</span>
                </button>
            `).join('');

            // Create tab content containers
            $('tabContents').innerHTML = verifiedOps.map(([key, op]) => `
                <div class="tab-content" id="tab-${key}">
                    <div class="stats-row" id="stats-${key}"></div>
                    <div class="filters-row" id="filters-${key}"></div>
                    <div class="delivery-list" id="list-${key}">
                        <div class="empty-list"><i class="fas fa-sync-alt fa-spin"></i><p>Loading...</p></div>
                    </div>
                </div>
            `).join('');
        }

        window.switchToTab = function(key) {
            activeTab = key;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === key));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${key}`));
            loadTabData(key);
        };

        async function loadTabData(key) {
            if (key === 'pickup') await loadPickupData();
            if (key === 'ride') await loadRideData();
            updateHeaderStats();
        }

        // ========== PICK-UP ==========
        async function loadPickupData() {
            if (!currentUser) return;
            try {
                const snap = await db.ref('pickup_deliveries').orderByChild('assignedTo').equalTo(currentUser.uid).once('value');
                allPickups = Object.entries(snap.val() || {}).map(([id, d]) => ({ id, ...d })).sort((a, b) => (b.createdAt||0) - (a.createdAt||0));
                renderPickupStats();
                renderPickupFilters();
                renderPickupList();
                updateBadge('pickup', allPickups.filter(d => ['assigned','out-for-delivery'].includes(d.status)).length);
            } catch (e) { console.error(e); }
        }

        function renderPickupStats() {
            const active = allPickups.filter(d => ['assigned','out-for-delivery','in_progress'].includes(d.status)).length;
            const done = allPickups.filter(d => d.status === 'delivered').length;
            const today = new Date().toDateString();
            const todayDone = allPickups.filter(d => d.status === 'delivered' && d.deliveryDate && new Date(d.deliveryDate).toDateString() === today).length;
            $(`stats-pickup`).innerHTML = `
                <div class="stat-card"><div class="stat-value">${active}</div><div class="stat-label">Active</div></div>
                <div class="stat-card"><div class="stat-value">${todayDone}</div><div class="stat-label">Today</div></div>
                <div class="stat-card"><div class="stat-value">${done}</div><div class="stat-label">Total</div></div>
            `;
        }

        function renderPickupFilters() {
            $(`filters-pickup`).innerHTML = `
                <button class="filter-chip ${pickupFilter==='all'?'active':''}" onclick="pickupFilter='all';renderPickupList()">All</button>
                <button class="filter-chip ${pickupFilter==='assigned'?'active':''}" onclick="pickupFilter='assigned';renderPickupList()">Assigned</button>
                <button class="filter-chip ${pickupFilter==='out-for-delivery'?'active':''}" onclick="pickupFilter='out-for-delivery';renderPickupList()">Out</button>
                <button class="filter-chip ${pickupFilter==='delivered'?'active':''}" onclick="pickupFilter='delivered';renderPickupList()">Done</button>
                <input type="text" class="search-input" placeholder="Search..." oninput="renderPickupList()" id="pickupSearch">
                <button class="refresh-chip" onclick="loadPickupData()"><i class="fas fa-sync-alt"></i></button>
            `;
        }

        function renderPickupList() {
            let items = [...allPickups];
            if (pickupFilter !== 'all') items = items.filter(d => d.status === pickupFilter);
            const q = ($('pickupSearch')?.value || '').toLowerCase();
            if (q) items = items.filter(d => {
                const id = String(d.id).toLowerCase();
                const client = (d.userName || d.customer?.name || '').toLowerCase();
                const pickup = (d.pickup?.address || '').toLowerCase();
                const delivery = (d.delivery?.address || '').toLowerCase();
                return id.includes(q) || client.includes(q) || pickup.includes(q) || delivery.includes(q);
            });

            const list = $('list-pickup');
            if (!items.length) {
                list.innerHTML = '<div class="empty-list"><i class="fas fa-box-open"></i><p>No deliveries</p></div>';
                return;
            }

            list.innerHTML = items.map(d => {
                const s = d.status || 'pending';
                const statusClass = `status-${s}`;
                const client = d.userName || d.customer?.name || 'Client';
                const pickup = d.pickup?.address || '—';
                const delivery = d.delivery?.address || '—';
                const fare = d.fare?.total ? `KSh ${d.fare.total}` : '—';

                let actions = `<button class="action-btn btn-view" onclick="viewPickupDetails('${d.id}')"><i class="fas fa-eye"></i></button>`;
                if (s === 'assigned') actions += `<button class="action-btn btn-pickup" onclick="openPickupConfirm('${d.id}')"><i class="fas fa-box"></i> Pickup</button>`;
                if (s === 'out-for-delivery') {
                    actions += `<button class="action-btn btn-nav" onclick="navigateTo('${encodeURIComponent(delivery)}')"><i class="fas fa-map-marked-alt"></i></button>`;
                    actions += `<button class="action-btn btn-complete" onclick="openCompleteModal('${d.id}')"><i class="fas fa-check"></i> Done</button>`;
                }

                return `
                <div class="delivery-card">
                    <div class="delivery-top">
                        <span class="delivery-id">#${String(d.id).substring(Math.max(0,d.id.length-6))}</span>
                        <span class="delivery-status ${statusClass}">${s.replace(/-/g,' ')}</span>
                    </div>
                    <div class="delivery-client">${escapeHtml(client)}</div>
                    <div class="delivery-route">📍 ${escapeHtml(String(pickup).substring(0,25))} <i class="fas fa-arrow-right"></i> ${escapeHtml(String(delivery).substring(0,25))}</div>
                    <div style="font-size:0.7rem;font-weight:700;margin-bottom:0.5rem;">${fare}</div>
                    <div class="delivery-actions">${actions}</div>
                </div>`;
            }).join('');
        }

        window.openPickupConfirm = (id) => { currentActionId = id; $('pickupModalOverlay').classList.add('show'); };
        window.closePickupModal = () => { $('pickupModalOverlay').classList.remove('show'); currentActionId = null; };
        window.confirmPickup = async () => {
            if (!currentActionId) return;
            const notes = $('pickupNotes').value.trim();
            showLoading(true);
            try {
                const snap = await db.ref(`pickup_deliveries/${currentActionId}`).once('value');
                const ex = snap.val() || {};
                await db.ref(`pickup_deliveries/${currentActionId}`).update({
                    status: 'out-for-delivery',
                    pickupConfirmedAt: new Date().toISOString(),
                    pickupNotes: notes,
                    statusHistory: [...(ex.statusHistory||[]), { status: 'out-for-delivery', timestamp: new Date().toISOString(), note: 'Picked up' }]
                });
                toast('Pickup confirmed!', 'success');
                closePickupModal();
                loadPickupData();
            } catch (e) { toast('Error', 'error'); }
            showLoading(false);
        };

        window.openCompleteModal = (id) => { currentActionId = id; $('completeModalOverlay').classList.add('show'); };
        window.closeCompleteModal = () => { $('completeModalOverlay').classList.remove('show'); currentActionId = null; };
        window.completeDelivery = async () => {
            const name = $('proofName').value.trim();
            if (!name) { toast('Enter receiver name', 'warning'); return; }
            if (!currentActionId) return;
            showLoading(true);
            try {
                const snap = await db.ref(`pickup_deliveries/${currentActionId}`).once('value');
                const ex = snap.val() || {};
                await db.ref(`pickup_deliveries/${currentActionId}`).update({
                    status: 'delivered',
                    deliveryDate: new Date().toISOString(),
                    deliveryProof: { customerName: name, notes: $('proofNotes').value.trim(), timestamp: new Date().toISOString() },
                    statusHistory: [...(ex.statusHistory||[]), { status: 'delivered', timestamp: new Date().toISOString(), note: `Delivered to ${name}` }]
                });
                toast('Delivery completed!', 'success');
                closeCompleteModal();
                loadPickupData();
            } catch (e) { toast('Error', 'error'); }
            showLoading(false);
        };

        window.viewPickupDetails = (id) => {
            const d = allPickups.find(x => x.id === id);
            if (!d) return;
            alert(`Delivery #${String(d.id).substring(Math.max(0,d.id.length-6))}\nClient: ${d.userName||'N/A'}\nPickup: ${d.pickup?.address||'—'}\nDelivery: ${d.delivery?.address||'—'}\nStatus: ${d.status}`);
        };

        // ========== RIDES ==========
        async function loadRideData() {
            if (!currentUser) return;
            try {
                const snap = await db.ref('pickme_rides').orderByChild('driverId').equalTo(currentUser.uid).once('value');
                allRides = Object.entries(snap.val() || {}).map(([id, r]) => ({ id, ...r })).sort((a, b) => (b.requestedAt||0) - (a.requestedAt||0));
                renderRideStats();
                renderRideFilters();
                renderRideList();
                updateBadge('ride', allRides.filter(r => ['accepted','arrived','ongoing'].includes(r.status)).length);
            } catch (e) { console.error(e); }
        }

        function renderRideStats() {
            const active = allRides.filter(r => ['accepted','arrived','ongoing'].includes(r.status)).length;
            const done = allRides.filter(r => r.status === 'completed').length;
            const today = new Date().toDateString();
            const todayDone = allRides.filter(r => r.status === 'completed' && r.completedAt && new Date(r.completedAt).toDateString() === today).length;
            $(`stats-ride`).innerHTML = `
                <div class="stat-card"><div class="stat-value">${active}</div><div class="stat-label">Active</div></div>
                <div class="stat-card"><div class="stat-value">${todayDone}</div><div class="stat-label">Today</div></div>
                <div class="stat-card"><div class="stat-value">${done}</div><div class="stat-label">Total</div></div>
            `;
        }

        function renderRideFilters() {
            $(`filters-ride`).innerHTML = `
                <button class="filter-chip ${rideFilter==='all'?'active':''}" onclick="rideFilter='all';renderRideList()">All</button>
                <button class="filter-chip ${rideFilter==='accepted'?'active':''}" onclick="rideFilter='accepted';renderRideList()">Accepted</button>
                <button class="filter-chip ${rideFilter==='arrived'?'active':''}" onclick="rideFilter='arrived';renderRideList()">Arrived</button>
                <button class="filter-chip ${rideFilter==='ongoing'?'active':''}" onclick="rideFilter='ongoing';renderRideList()">Ongoing</button>
                <button class="filter-chip ${rideFilter==='completed'?'active':''}" onclick="rideFilter='completed';renderRideList()">Done</button>
                <input type="text" class="search-input" placeholder="Search..." oninput="renderRideList()" id="rideSearch">
                <button class="refresh-chip" onclick="loadRideData()"><i class="fas fa-sync-alt"></i></button>
            `;
        }

        function renderRideList() {
            let items = [...allRides];
            if (rideFilter !== 'all') items = items.filter(r => r.status === rideFilter);
            const q = ($('rideSearch')?.value || '').toLowerCase();
            if (q) items = items.filter(r => {
                const id = String(r.id).toLowerCase();
                const passenger = (r.passengerName || '').toLowerCase();
                const pickup = (r.pickup?.address || '').toLowerCase();
                const dropoff = (r.dropoff?.address || '').toLowerCase();
                return id.includes(q) || passenger.includes(q) || pickup.includes(q) || dropoff.includes(q);
            });

            const list = $('list-ride');
            if (!items.length) {
                list.innerHTML = '<div class="empty-list"><i class="fas fa-car-side"></i><p>No rides</p></div>';
                return;
            }

            list.innerHTML = items.map(r => {
                const s = r.status || 'requested';
                const passenger = r.passengerName || 'Passenger';
                const pickup = r.pickup?.address || '—';
                const dropoff = r.dropoff?.address || '—';
                const fare = r.fare?.total ? `KSh ${r.fare.total}` : (r.estimatedFare ? `KSh ${r.estimatedFare}` : '—');
                const statusMap = { accepted: 'status-assigned', arrived: 'status-out-for-delivery', ongoing: 'status-out-for-delivery', completed: 'status-delivered', requested: 'status-pending' };
                const statusClass = statusMap[s] || 'status-pending';

                let actions = `<button class="action-btn btn-view" onclick="alert('Ride #${String(r.id).substring(Math.max(0,r.id.length-6))}')"><i class="fas fa-eye"></i></button>`;
                if (s === 'accepted') actions += `<button class="action-btn btn-pickup" onclick="updateRideStatus('${r.id}','arrived')"><i class="fas fa-location-dot"></i> Arrived</button>`;
                if (s === 'arrived') actions += `<button class="action-btn btn-pickup" onclick="updateRideStatus('${r.id}','ongoing')"><i class="fas fa-play"></i> Start</button>`;
                if (s === 'ongoing') actions += `<button class="action-btn btn-complete" onclick="updateRideStatus('${r.id}','completed')"><i class="fas fa-check"></i> Done</button>`;

                return `
                <div class="delivery-card">
                    <div class="delivery-top">
                        <span class="delivery-id">#${String(r.id).substring(Math.max(0,r.id.length-6))}</span>
                        <span class="delivery-status ${statusClass}">${s.replace(/-/g,' ')}</span>
                    </div>
                    <div class="delivery-client">${escapeHtml(passenger)}</div>
                    <div class="delivery-route">📍 ${escapeHtml(String(pickup).substring(0,25))} <i class="fas fa-arrow-right"></i> ${escapeHtml(String(dropoff).substring(0,25))}</div>
                    <div style="font-size:0.7rem;font-weight:700;margin-bottom:0.5rem;">${fare}</div>
                    <div class="delivery-actions">${actions}</div>
                </div>`;
            }).join('');
        }

        window.updateRideStatus = async (id, status) => {
            showLoading(true);
            try {
                const snap = await db.ref(`pickme_rides/${id}`).once('value');
                const ex = snap.val() || {};
                const updates = { status, statusHistory: [...(ex.statusHistory||[]), { status, timestamp: new Date().toISOString() }] };
                if (status === 'arrived') updates.arrivedAt = new Date().toISOString();
                if (status === 'ongoing') updates.startedAt = new Date().toISOString();
                if (status === 'completed') updates.completedAt = new Date().toISOString();
                await db.ref(`pickme_rides/${id}`).update(updates);
                toast(`Ride ${status}!`, 'success');
                loadRideData();
            } catch (e) { toast('Error', 'error'); }
            showLoading(false);
        };

        // ========== HELPERS ==========
        function updateBadge(key, count) {
            const badge = $(`badge-${key}`);
            if (badge) badge.textContent = count;
        }

        function updateHeaderStats() {
            let total = 0;
            if (activeTab === 'pickup') total = allPickups.filter(d => ['assigned','out-for-delivery'].includes(d.status)).length;
            if (activeTab === 'ride') total = allRides.filter(r => ['accepted','arrived','ongoing'].includes(r.status)).length;
            $('headerActiveCount').textContent = total;
        }

        window.navigateTo = (addr) => window.open(`https://www.google.com/maps/search/?api=1&query=${addr}`, '_blank');
        window.handleLogout = async () => { if (confirm('Sign out?')) { await auth.signOut(); window.location.href = 'index.html'; } };
        window.refreshAll = () => { if (activeTab) loadTabData(activeTab); toast('Refreshed', 'success'); };

        $('pickupModalOverlay').addEventListener('click', e => { if (e.target === $('pickupModalOverlay')) closePickupModal(); });
        $('completeModalOverlay').addEventListener('click', e => { if (e.target === $('completeModalOverlay')) closeCompleteModal(); });
    </script>
</body>
</html>
