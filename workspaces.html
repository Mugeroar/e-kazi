<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ca8a04">
    <meta name="color-scheme" content="light">
    <title>KazInni · Workspaces</title>
    <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview-1.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;600;700;800&family=Satoshi:wght@400;500;600;700;800;900&family=Clash+Display:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=General+Sans:wght@400;500;600;700&family=Chillax:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,600,700,800&f[]=satoshi@400,500,600,700,800,900&f[]=clash-display@400,500,600,700&f[]=general-sans@400,500,600,700&f[]=chillax@400,500,600,700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #ca8a04;
            --gold-dark: #a16207;
            --gold-light: #fbbf24;
            --gold-soft: #fef3c7;
            --gold-glow: rgba(202, 138, 4, 0.12);
            --gold-gradient: linear-gradient(135deg, #ca8a04 0%, #eab308 50%, #fbbf24 100%);
            
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --purple: #8b5cf6;
            --pink: #ec4899;
            --emerald: #059669;
            
            --bg-primary: #ffffff;
            --bg-secondary: #faf9f7;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --border-light: #e9ecef;
            --border-medium: #d1d5db;
            
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            --shadow-gold: 0 8px 32px rgba(202,138,4,0.15);
            
            --nav-bg: rgba(255,255,255,0.98);
            --card-bg: #ffffff;
            --input-bg: #ffffff;
            
            --header-height: 80px;
            
            --font-display: 'Clash Display', 'Cabinet Grotesk', sans-serif;
            --font-heading: 'Satoshi', 'General Sans', sans-serif;
            --font-body: 'General Sans', 'Outfit', sans-serif;
            --font-accent: 'Chillax', 'Cabinet Grotesk', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, #fffbeb 0%, #ffffff 15%, #faf9f7 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .skeleton {
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            border-radius: 8px;
        }
        
        .skeleton-card {
            background: var(--card-bg); border: 1px solid var(--border-light);
            border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-sm);
        }
        .skeleton-image { height: 150px; border-radius: 0; }
        .skeleton-badge { height: 22px; width: 80px; border-radius: 20px; margin-bottom: 0.75rem; }
        .skeleton-title { height: 1.2rem; width: 70%; margin-bottom: 0.5rem; }
        .skeleton-desc { height: 0.85rem; width: 100%; margin-bottom: 0.3rem; }
        .skeleton-desc-sm { height: 0.85rem; width: 60%; margin-bottom: 1rem; }
        .skeleton-link { height: 1rem; width: 50%; margin-top: auto; padding-top: 0.6rem; border-top: 1px solid var(--border-light); }

        .site-header {
            position: fixed; top: 0; width: 100%; height: var(--header-height);
            background: var(--nav-bg); backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(202,138,4,0.08); z-index: 1000; padding: 0 2.5rem;
        }
        .header-container {
            max-width: 1400px; height: 100%; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 0.85rem; }
        .logo img { height: 44px; width: auto; filter: drop-shadow(0 4px 8px rgba(202,138,4,0.15)); }
        .logo span {
            font-size: 1.6rem; font-weight: 800;
            background: var(--gold-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; font-family: var(--font-display); letter-spacing: -0.5px;
        }
        .nav-links { display: flex; gap: 2.5rem; }
        .nav-link {
            color: var(--text-secondary); text-decoration: none;
            font-size: 0.95rem; font-weight: 500; font-family: var(--font-heading);
            transition: all 0.3s ease; position: relative;
        }
        .nav-link::after {
            content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2.5px;
            background: var(--gold-gradient); border-radius: 2px;
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .nav-link:hover, .nav-link.active { color: var(--gold); }

        .user-menu {
            display: flex; align-items: center; gap: 0.5rem;
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: 60px; padding: 0.3rem 0.5rem 0.3rem 1rem;
            cursor: pointer; position: relative; transition: all 0.25s;
        }
        .user-menu:hover { border-color: var(--gold); box-shadow: var(--shadow-md); }
        .user-name {
            color: var(--text-primary); font-weight: 600; font-size: 0.9rem;
            font-family: var(--font-heading);
        }
        .user-avatar {
            width: 38px; height: 38px;
            background: var(--gold-gradient); color: white;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: 700; font-family: var(--font-heading);
        }
        .user-dropdown {
            position: absolute; top: calc(100% + 10px); right: 0;
            background: var(--card-bg); border: 1px solid var(--border-light);
            border-radius: 16px; padding: 0.5rem; min-width: 180px;
            opacity: 0; visibility: hidden;
            transform: translateY(-10px); transition: all 0.2s ease;
            z-index: 1001; box-shadow: var(--shadow-lg);
        }
        .user-menu:hover .user-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-item {
            padding: 0.7rem 1rem; color: var(--text-secondary);
            border-radius: 12px; display: flex; align-items: center; gap: 0.5rem;
            cursor: pointer; font-size: 0.9rem; font-family: var(--font-body);
            transition: all 0.2s; border: none; background: none; width: 100%;
        }
        .dropdown-item:hover { background: var(--bg-secondary); }
        .dropdown-item.danger:hover { color: var(--danger); }

        .main-content {
            max-width: 1400px; margin: calc(var(--header-height) + 2rem) auto 2rem;
            padding: 0 2.5rem;
        }

        .page-header {
            text-align: center; margin-bottom: 2rem;
        }
        .page-header h1 {
            font-size: 2.2rem; font-weight: 800; color: var(--text-primary);
            margin-bottom: 0.3rem; font-family: var(--font-display);
            letter-spacing: -0.02em;
        }
        .page-header h1 i { color: var(--gold); margin-right: 0.5rem; }
        .page-header p {
            color: var(--text-muted); font-size: 1rem; max-width: 600px;
            margin: 0 auto;
        }

        .search-bar {
            display: flex; align-items: center; gap: 1rem;
            max-width: 500px; margin: 0 auto 2rem;
            background: var(--card-bg); border: 1px solid var(--border-light);
            border-radius: 60px; padding: 0.5rem 0.5rem 0.5rem 1.2rem;
            box-shadow: var(--shadow-sm); transition: all 0.3s;
        }
        .search-bar:focus-within { border-color: var(--gold); box-shadow: 0 0 0 4px var(--gold-glow); }
        .search-bar input {
            flex: 1; border: none; outline: none; font-size: 0.9rem;
            color: var(--text-primary); background: transparent;
            font-family: var(--font-body);
        }
        .search-bar input::placeholder { color: var(--text-muted); }
        .search-bar button {
            background: var(--gold-gradient); color: white; border: none;
            border-radius: 50px; padding: 0.55rem 1.2rem; font-weight: 600;
            font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
            font-family: var(--font-heading); display: flex; align-items: center; gap: 0.4rem;
        }
        .search-bar button:hover { box-shadow: var(--shadow-gold); }
        .search-clear {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; padding: 0.3rem 0.5rem; font-size: 0.8rem;
            transition: color 0.2s; display: none;
        }
        .search-clear.visible { display: block; }
        .search-clear:hover { color: var(--danger); }
        .search-results-count {
            text-align: center; font-size: 0.8rem; color: var(--text-muted);
            margin-bottom: 1.5rem; display: none;
        }
        .search-results-count.visible { display: block; }

        .section-header {
            display: flex; align-items: center; gap: 1rem;
            margin-bottom: 1.8rem; padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--border-light);
        }
        .section-icon {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem;
        }
        .section-icon.workspaces { background: var(--gold-soft); color: var(--gold); }
        .section-header h2 {
            font-size: 1.6rem; font-weight: 700; color: var(--text-primary);
            font-family: var(--font-heading);
        }

        .cards-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;
        }

        .workspace-card {
            background: var(--card-bg); border: 1px solid var(--border-light);
            border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            cursor: pointer; display: flex; flex-direction: column;
        }
        .workspace-card:hover {
            transform: translateY(-4px); border-color: var(--gold);
            box-shadow: var(--shadow-lg);
        }
        .card-image {
            width: 100%; height: 150px; background: var(--bg-secondary);
            position: relative; overflow: hidden;
        }
        .card-image img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.3s;
        }
        .workspace-card:hover .card-image img { transform: scale(1.05); }
        .image-placeholder {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--gold-soft), #fef9e7);
            display: flex; align-items: center; justify-content: center;
            color: var(--gold); font-size: 3rem;
        }
        .card-content { padding: 1.3rem 1.5rem; flex: 1; display: flex; flex-direction: column; }
        .workspace-badge {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.25rem 0.8rem; background: var(--gold-soft);
            color: var(--gold-dark); border-radius: 20px;
            font-size: 0.7rem; font-weight: 700; margin-bottom: 0.75rem;
            width: fit-content; font-family: var(--font-heading);
            letter-spacing: 0.3px;
        }
        .card-title {
            font-size: 1.1rem; font-weight: 700; color: var(--text-primary);
            margin-bottom: 0.4rem; font-family: var(--font-heading);
        }
        .card-description {
            color: var(--text-muted); font-size: 0.85rem;
            margin-bottom: 1rem; line-height: 1.5; flex: 1;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-link {
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--gold); text-decoration: none; font-size: 0.9rem;
            font-weight: 600; margin-top: auto; padding: 0.6rem 0;
            border-top: 1px solid var(--border-light);
            transition: all 0.2s; font-family: var(--font-heading);
        }
        .card-link:hover { gap: 0.75rem; color: var(--gold-dark); }

        .empty-section {
            text-align: center; padding: 4rem 2rem;
            background: var(--bg-secondary); border-radius: 20px;
            border: 1px dashed var(--border-medium); grid-column: 1 / -1;
        }
        .empty-section i { font-size: 3.5rem; color: var(--gold); margin-bottom: 1rem; opacity: 0.4; }
        .empty-section h3 {
            font-size: 1.2rem; font-weight: 700; color: var(--text-primary);
            margin-bottom: 0.5rem; font-family: var(--font-heading);
        }

        .badge {
            padding: 0.25rem 0.7rem; border-radius: 40px; font-size: 0.65rem;
            font-weight: 700; text-transform: uppercase; white-space: nowrap;
            display: inline-block; font-family: var(--font-heading);
        }
        .badge-gold { background: var(--gold-soft); color: var(--gold-dark); }

        .toast-container { position: fixed; top:20px; right:20px; z-index:4000; }
        .toast {
            background: var(--card-bg); border: 1px solid var(--border-light);
            border-radius: 14px; padding: 0.8rem 1.2rem; margin-bottom: 0.5rem;
            box-shadow: var(--shadow-lg); display: flex; align-items: center;
            gap: 0.75rem; min-width: 280px; animation: slideIn 0.2s ease;
            font-family: var(--font-body);
        }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        .toast.info { border-left: 3px solid var(--gold); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 1024px) {
            .cards-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .cards-grid { grid-template-columns: 1fr; }
            .page-header h1 { font-size: 1.8rem; }
            .nav-links { display: none; }
            .main-content { padding: 0 1rem; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <header class="site-header">
        <div class="header-container">
            <div class="logo">
                <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview-1.png" alt="KazInni">
                <span>KazInni</span>
            </div>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="profile.html" class="nav-link">Profile</a>
                <a href="workspaces.html" class="nav-link active">Workspaces</a>
                <a href="resources.html" class="nav-link">Resources</a>
            </nav>
            <div class="user-menu" id="userMenu">
                <span class="user-name" id="userDisplayName">Loading...</span>
                <div class="user-avatar" id="userAvatar">K</div>
                <div class="user-dropdown">
                    <a href="profile.html" class="dropdown-item"><i class="fas fa-user"></i> View Profile</a>
                    <button class="dropdown-item" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Refresh</button>
                    <button class="dropdown-item danger" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div id="workspacesContent">
            <div class="page-header">
                <h1><i class="fas fa-cubes"></i> Workspaces</h1>
                <p>Access your business tools and management portals</p>
            </div>

            <!-- Search Bar -->
            <div class="search-bar">
                <i class="fas fa-search" style="color:var(--text-muted);"></i>
                <input type="text" id="searchInput" placeholder="Search workspaces..." oninput="filterWorkspaces()">
                <button class="search-clear" id="searchClear" onclick="clearSearch()">
                    <i class="fas fa-times"></i>
                </button>
                <button onclick="filterWorkspaces()"><i class="fas fa-search"></i> Search</button>
            </div>
            <div class="search-results-count" id="searchCount"></div>

            <section>
                <div class="section-header">
                    <div class="section-icon workspaces"><i class="fas fa-building"></i></div>
                    <h2>Available Workspaces <span class="badge badge-gold" id="wsCount" style="margin-left:0.5rem;">0</span></h2>
                </div>

                <!-- Skeleton Loading Grid -->
                <div class="cards-grid" id="workspacesContainer">
                    <div class="skeleton-card"><div class="skeleton skeleton-image"></div><div style="padding:1.3rem 1.5rem;"><div class="skeleton skeleton-badge"></div><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-desc"></div><div class="skeleton skeleton-desc-sm"></div><div class="skeleton skeleton-link"></div></div></div>
                    <div class="skeleton-card"><div class="skeleton skeleton-image"></div><div style="padding:1.3rem 1.5rem;"><div class="skeleton skeleton-badge"></div><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-desc"></div><div class="skeleton skeleton-desc-sm"></div><div class="skeleton skeleton-link"></div></div></div>
                    <div class="skeleton-card"><div class="skeleton skeleton-image"></div><div style="padding:1.3rem 1.5rem;"><div class="skeleton skeleton-badge"></div><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-desc"></div><div class="skeleton skeleton-desc-sm"></div><div class="skeleton skeleton-link"></div></div></div>
                    <div class="skeleton-card"><div class="skeleton skeleton-image"></div><div style="padding:1.3rem 1.5rem;"><div class="skeleton skeleton-badge"></div><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-desc"></div><div class="skeleton skeleton-desc-sm"></div><div class="skeleton skeleton-link"></div></div></div>
                    <div class="skeleton-card"><div class="skeleton skeleton-image"></div><div style="padding:1.3rem 1.5rem;"><div class="skeleton skeleton-badge"></div><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-desc"></div><div class="skeleton skeleton-desc-sm"></div><div class="skeleton skeleton-link"></div></div></div>
                    <div class="skeleton-card"><div class="skeleton skeleton-image"></div><div style="padding:1.3rem 1.5rem;"><div class="skeleton skeleton-badge"></div><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-desc"></div><div class="skeleton skeleton-desc-sm"></div><div class="skeleton skeleton-link"></div></div></div>
                </div>
            </section>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        let currentUser = null;
        let allWorkspaces = [];
        let filteredWorkspaces = [];

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                await loadUserData(user);
                await loadWorkspaces();
            } else {
                window.location.href = 'index.html';
            }
        });

        async function loadUserData(user) {
            try {
                const snap = await database.ref(`brandinn_users/${user.uid}`).once('value');
                const userData = snap.exists() ? snap.val() : {};
                const name = userData.name || user.displayName || user.email?.split('@')[0] || 'User';
                document.getElementById('userDisplayName').textContent = name;
                document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
            } catch(e) { console.error('Error loading user:', e); }
        }

        async function loadWorkspaces() {
            try {
                // Load from resources/workspaces
                const snap = await database.ref('resources/workspaces').once('value');
                const data = snap.val() || {};
                const resourceWorkspaces = Object.entries(data).map(([id, item]) => ({ id, ...item }));

                // Also include hardcoded workspace links for known workspaces
                const knownWorkspaces = [
                    {
                        id: 'fusion-foods',
                        title: 'Fusion Foods',
                        description: 'Food & Grocery Supply Management. Manage orders, inventory, suppliers, and weekly pricing for your food supply business.',
                        link: '/workspaces/fusion-foods/index.html',
                        category: 'food',
                        icon: 'fa-utensils',
                        color: '#10b981'
                    },
                    {
                        id: 'dsog-fashion',
                        title: 'DSOG Fashion',
                        description: 'Fashion & Apparel Management. Handle orders, franchisees, and fashion inventory with dispatch capabilities.',
                        link: '/workspaces/dsog-fashion/index.html',
                        category: 'fashion',
                        icon: 'fa-tshirt',
                        color: '#ec4899'
                    },
                    {
                        id: 'heritage',
                        title: 'Heritage',
                        description: 'Outdoor Advertising Platform. Manage billboard listings, campaigns, and partner relationships.',
                        link: '/workspaces/heritage/index.html',
                        category: 'advertising',
                        icon: 'fa-landmark',
                        color: '#d946ef'
                    },
                    {
                        id: 'brandinn',
                        title: 'BrandInn Print',
                        description: 'Print & Merchandise Business. Manage print orders, franchises, stock, and customer printing jobs.',
                        link: '/workspaces/brandinn/index.html',
                        category: 'print',
                        icon: 'fa-print',
                        color: '#8b5cf6'
                    }
                ];

                // Merge both sources, preferring resource data if available
                allWorkspaces = knownWorkspaces.map(kw => {
                    const resourceMatch = resourceWorkspaces.find(rw => 
                        rw.title?.toLowerCase() === kw.title.toLowerCase() ||
                        rw.link?.includes(kw.id)
                    );
                    return resourceMatch ? { ...kw, ...resourceMatch } : kw;
                });

                // Add any additional workspaces from resources that aren't in known list
                resourceWorkspaces.forEach(rw => {
                    const exists = allWorkspaces.find(w => w.id === rw.id || w.title === rw.title);
                    if (!exists) allWorkspaces.push(rw);
                });

                filteredWorkspaces = [...allWorkspaces];
                renderWorkspaces();
                
            } catch(e) {
                console.error('Error loading workspaces:', e);
                showToast('Error loading workspaces', 'error');
            }
        }

        function renderWorkspaces() {
            const container = document.getElementById('workspacesContainer');
            document.getElementById('wsCount').textContent = filteredWorkspaces.length;

            if (!filteredWorkspaces.length) {
                container.innerHTML = `<div class="empty-section"><i class="fas fa-cubes"></i><h3>No Workspaces Found</h3><p>Try adjusting your search or check back later</p></div>`;
                document.getElementById('searchCount').classList.remove('visible');
                return;
            }

            container.innerHTML = filteredWorkspaces.map(w => {
                const iconClass = w.icon || 'fa-building';
                const color = w.color || '#ca8a04';
                const bgColor = w.bgColor || `${color}15`;
                const imageHtml = w.image ? 
                    `<img src="${escapeHtml(w.image)}" alt="${escapeHtml(w.title)}" loading="lazy">` : 
                    `<div class="image-placeholder" style="background:linear-gradient(135deg, ${bgColor}, ${bgColor}50); color:${color};"><i class="fas ${iconClass}"></i></div>`;

                return `
                <div class="workspace-card" onclick="openWorkspace('${escapeHtml(w.link)}')">
                    <div class="card-image">${imageHtml}</div>
                    <div class="card-content">
                        <span class="workspace-badge"><i class="fas ${iconClass}"></i> Workspace</span>
                        <h3 class="card-title">${escapeHtml(w.title)}</h3>
                        <p class="card-description">${escapeHtml(w.description || 'Access this workspace to manage your operations.')}</p>
                        <span class="card-link">Launch Workspace <i class="fas fa-arrow-right"></i></span>
                    </div>
                </div>`;
            }).join('');
        }

        window.filterWorkspaces = function() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const clearBtn = document.getElementById('searchClear');
            const countEl = document.getElementById('searchCount');
            
            if (query) {
                clearBtn.classList.add('visible');
                filteredWorkspaces = allWorkspaces.filter(w => 
                    (w.title || '').toLowerCase().includes(query) ||
                    (w.description || '').toLowerCase().includes(query) ||
                    (w.category || '').toLowerCase().includes(query)
                );
                
                if (filteredWorkspaces.length !== allWorkspaces.length) {
                    countEl.innerHTML = `Showing <strong>${filteredWorkspaces.length}</strong> of <strong>${allWorkspaces.length}</strong> workspaces`;
                    countEl.classList.add('visible');
                } else {
                    countEl.classList.remove('visible');
                }
            } else {
                clearBtn.classList.remove('visible');
                countEl.classList.remove('visible');
                filteredWorkspaces = [...allWorkspaces];
            }
            
            renderWorkspaces();
        };

        window.clearSearch = function() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchClear').classList.remove('visible');
            document.getElementById('searchCount').classList.remove('visible');
            filteredWorkspaces = [...allWorkspaces];
            renderWorkspaces();
        };

        window.openWorkspace = function(link) {
            if (link) {
                if (link.startsWith('/') || link.includes('.html')) {
                    window.location.href = link;
                } else {
                    window.open(link, '_blank');
                }
            }
        };

        window.refreshData = async function() {
            await loadWorkspaces();
            document.getElementById('searchInput').value = '';
            document.getElementById('searchClear').classList.remove('visible');
            document.getElementById('searchCount').classList.remove('visible');
            showToast('Workspaces refreshed!', 'success');
        };

        window.handleLogout = async function() {
            if(confirm('Sign out?')) {
                await auth.signOut();
                window.location.href = 'index.html';
            }
        };

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t||''; return d.innerHTML; }
        
        function showToast(m, type='info') {
            const t = document.createElement('div'); t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas fa-${type==='error'?'exclamation-circle':'check-circle'}"></i><span>${escapeHtml(m)}</span>`;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(()=>{t.style.opacity='0';t.style.transition='0.3s';setTimeout(()=>t.remove(),300);},3000);
        }
    </script>
</body>
</html>
