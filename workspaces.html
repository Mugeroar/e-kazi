<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ca8a04">
    <meta name="color-scheme" content="light">
    <title>E-KAZI · Workspaces</title>
    <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview-1.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;600;700;800&family=Satoshi:wght@400;500;600;700;800;900&family=Clash+Display:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=General+Sans:wght@400;500;600;700&family=Chillax:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,600,700,800&f[]=satoshi@400,500,600,700,800,900&f[]=clash-display@400,500,600,700&f[]=general-sans@400,500,600,700&f[]=chillax@400,500,600,700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #ca8a04;
            --gold-dark: #a16207;
            --gold-light: #fbbf24;
            --gold-soft: #fef3c7;
            --gold-glow: rgba(202, 138, 4, 0.12);
            --gold-gradient: linear-gradient(135deg, #ca8a04 0%, #eab308 50%, #fbbf24 100%);
            
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --purple: #8b5cf6;
            --pink: #ec4899;
            
            --bg-primary: #ffffff;
            --bg-secondary: #faf9f7;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --border-light: #e9ecef;
            --border-medium: #d1d5db;
            
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            --shadow-gold: 0 8px 32px rgba(202,138,4,0.15);
            
            --nav-bg: rgba(255,255,255,0.98);
            --card-bg: #ffffff;
            --input-bg: #ffffff;
            --toast-bg: #ffffff;
            
            --header-height: 80px;
            
            --font-display: 'Clash Display', 'Cabinet Grotesk', sans-serif;
            --font-heading: 'Satoshi', 'General Sans', sans-serif;
            --font-body: 'General Sans', 'Outfit', sans-serif;
            --font-accent: 'Chillax', 'Cabinet Grotesk', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .site-header {
            position: fixed; top: 0; width: 100%; height: var(--header-height);
            background: var(--nav-bg); backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(202,138,4,0.08); z-index: 1000; padding: 0 2.5rem;
        }
        .header-container {
            max-width: 1280px; height: 100%; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 0.85rem; }
        .logo img { height: 44px; width: auto; filter: drop-shadow(0 4px 8px rgba(202,138,4,0.15)); }
        .logo span {
            font-size: 1.6rem; font-weight: 800;
            background: var(--gold-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; font-family: var(--font-display); letter-spacing: -0.5px;
        }
        .nav-links { display: flex; gap: 2.5rem; }
        .nav-link {
            color: var(--text-secondary); text-decoration: none;
            font-size: 0.95rem; font-weight: 500; font-family: var(--font-heading);
            transition: all 0.3s ease; position: relative;
        }
        .nav-link::after {
            content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2.5px;
            background: var(--gold-gradient); border-radius: 2px;
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .nav-link:hover, .nav-link.active { color: var(--gold); }

        .user-menu {
            display: flex; align-items: center; gap: 0.5rem;
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: 60px; padding: 0.3rem 0.5rem 0.3rem 1rem;
            cursor: default; transition: all 0.25s;
        }
        .user-menu:hover { border-color: var(--gold); box-shadow: var(--shadow-md); }
        .user-name {
            color: var(--text-primary); font-weight: 600; font-size: 0.9rem;
            font-family: var(--font-heading);
        }
        .user-avatar {
            width: 38px; height: 38px;
            background: var(--gold-gradient); color: white;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: 700; font-family: var(--font-heading);
        }
        .logout-btn-header {
            width: 36px; height: 36px; border-radius: 50%;
            border: 1px solid var(--border-light); background: var(--bg-card);
            color: var(--text-muted); cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: all 0.2s; font-size: 0.85rem;
        }
        .logout-btn-header:hover {
            background: var(--danger); color: white; border-color: var(--danger);
        }

        .main-content {
            max-width: 1280px; margin: calc(var(--header-height) + 2rem) auto 2rem;
            padding: 0 2.5rem;
        }

        .login-required {
            text-align: center; padding: 4rem;
            background: var(--card-bg); border: 1px solid var(--border-light);
            border-radius: 32px; box-shadow: var(--shadow-sm);
        }
        .login-required i { font-size: 4rem; color: var(--gold); margin-bottom: 1.5rem; }
        .login-required h2 {
            font-size: 2rem; margin-bottom: 0.5rem; color: var(--text-primary);
            font-family: var(--font-display);
        }

        .btn {
            padding: 0.75rem 1.8rem; border: none; border-radius: 50px;
            font-weight: 600; font-size: 0.9rem; cursor: pointer;
            display: inline-flex; align-items: center; gap: 0.5rem;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            font-family: var(--font-heading); letter-spacing: -0.2px;
        }
        .btn-primary {
            background: var(--gold-gradient); color: white;
            box-shadow: var(--shadow-gold); position: relative; overflow: hidden;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(202,138,4,0.3); }

        .page-header {
            text-align: center; margin-bottom: 2.5rem;
        }
        .page-header h1 {
            font-size: 2.5rem; font-weight: 800; color: var(--text-primary);
            margin-bottom: 0.5rem; font-family: var(--font-display);
            letter-spacing: -0.02em;
        }
        .page-header h1 i { color: var(--gold); margin-right: 0.5rem; }
        .page-header p {
            color: var(--text-muted); font-size: 1.1rem; max-width: 600px;
            margin: 0 auto;
        }

        .section-header {
            display: flex; align-items: center; gap: 1rem;
            margin-bottom: 1.8rem; padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--border-light);
        }
        .section-icon {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem;
        }
        .section-icon.workspaces {
            background: var(--gold-soft); color: var(--gold);
        }
        .section-header h2 {
            font-size: 1.6rem; font-weight: 700; color: var(--text-primary);
            font-family: var(--font-heading);
        }
        .section-description {
            color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem;
        }

        .cards-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;
        }

        .workspace-card {
            background: var(--card-bg); border: 1px solid var(--border-light);
            border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            cursor: pointer; display: flex; flex-direction: column;
            max-width: 380px; margin: 0 auto; width: 100%;
        }
        .workspace-card:hover {
            transform: translateY(-4px); border-color: var(--gold);
            box-shadow: var(--shadow-lg);
        }
        .card-image {
            width: 100%; height: 150px; background: var(--bg-secondary);
            position: relative; overflow: hidden;
        }
        .card-image img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.3s;
        }
        .workspace-card:hover .card-image img { transform: scale(1.05); }
        .image-placeholder {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--gold-soft), #fef9e7);
            display: flex; align-items: center; justify-content: center;
            color: var(--gold); font-size: 3rem;
        }
        .card-content {
            padding: 1.3rem 1.5rem; flex: 1;
            display: flex; flex-direction: column;
        }
        .workspace-badge {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.25rem 0.8rem; background: var(--gold-soft);
            color: var(--gold-dark); border-radius: 20px;
            font-size: 0.7rem; font-weight: 700; margin-bottom: 0.75rem;
            width: fit-content; font-family: var(--font-heading);
            letter-spacing: 0.3px;
        }
        .card-title {
            font-size: 1.1rem; font-weight: 700; color: var(--text-primary);
            margin-bottom: 0.4rem; font-family: var(--font-heading);
        }
        .card-description {
            color: var(--text-muted); font-size: 0.85rem;
            margin-bottom: 1rem; line-height: 1.5; flex: 1;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-link {
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--gold); text-decoration: none; font-size: 0.9rem;
            font-weight: 600; margin-top: auto; padding: 0.6rem 0;
            border-top: 1px solid var(--border-light);
            transition: all 0.2s; font-family: var(--font-heading);
        }
        .card-link:hover { gap: 0.75rem; color: var(--gold-dark); }

        .empty-section {
            text-align: center; padding: 4rem 2rem;
            background: var(--bg-secondary); border-radius: 20px;
            border: 1px dashed var(--border-medium); grid-column: 1 / -1;
        }
        .empty-section i { font-size: 3.5rem; color: var(--gold); margin-bottom: 1rem; opacity: 0.4; }
        .empty-section h3 {
            font-size: 1.2rem; font-weight: 700; color: var(--text-primary);
            margin-bottom: 0.5rem; font-family: var(--font-heading);
        }

        .loading-overlay {
            position: fixed; top:0;left:0;width:100%;height:100%;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 3000; opacity: 0; visibility: hidden; transition: 0.2s;
        }
        .loading-overlay.active { opacity: 1; visibility: visible; }
        .loading-spinner {
            width: 40px; height: 40px; border: 3px solid var(--border-light);
            border-top-color: var(--gold); border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast-container { position: fixed; top:20px; right:20px; z-index:4000; }
        .toast {
            background: var(--card-bg); border: 1px solid var(--border-light);
            border-radius: 14px; padding: 0.8rem 1.2rem; margin-bottom: 0.5rem;
            box-shadow: var(--shadow-lg); display: flex; align-items: center;
            gap: 0.75rem; min-width: 280px; animation: slideIn 0.2s ease;
            font-family: var(--font-body);
        }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        .toast.info { border-left: 3px solid var(--gold); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 1024px) {
            .cards-grid { grid-template-columns: repeat(2, 1fr); }
            .workspace-card { max-width: 100%; }
        }
        @media (max-width: 768px) {
            .cards-grid { grid-template-columns: 1fr; }
            .page-header h1 { font-size: 2rem; }
            .nav-links { display: none; }
            .workspace-card { max-width: 380px; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
    <div class="toast-container" id="toastContainer"></div>

    <header class="site-header">
        <div class="header-container">
            <div class="logo">
                <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview-1.png" alt="E-KAZI">
                <span>E-KAZI</span>
            </div>
            <nav class="nav-links">
                <a href="tasker-dashboard.html" class="nav-link">Dashboard</a>
                <a href="tasker-profile.html" class="nav-link">Profile</a>
                <a href="workspaces.html" class="nav-link active">Workspaces</a>
                <a href="tasker-resource.html" class="nav-link">Resources</a>
            </nav>
            <div class="user-menu">
                <span class="user-name" id="userDisplayName">Loading...</span>
                <div class="user-avatar" id="userAvatar">T</div>
                <button class="logout-btn-header" onclick="handleLogout()" title="Sign Out">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div id="loginRequired" style="display:none;">
            <div class="login-required">
                <i class="fas fa-user-lock"></i>
                <h2>Login Required</h2>
                <p>Please sign in to access workspaces</p>
                <button class="btn btn-primary" onclick="window.location.href='index.html'">Go to Login</button>
            </div>
        </div>

        <div id="workspacesContent" style="display:none;">
            <div class="page-header">
                <h1><i class="fas fa-building"></i> Workspaces</h1>
                <p>Choose a workspace to start tasking and manage your projects</p>
            </div>

            <section>
                <div class="section-header">
                    <div class="section-icon workspaces"><i class="fas fa-building"></i></div>
                    <h2>Available Workspaces</h2>
                </div>
                <p class="section-description">Select a workspace below to access your tasks, tools, and team collaboration space</p>
                <div class="cards-grid" id="workspacesContainer"></div>
            </section>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc",
            storageBucket: "mugera-e51cc.firebasestorage.app",
            messagingSenderId: "1024868637509",
            appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        let currentUser = null;
        let currentTasker = null;
        let workspaces = [];

        auth.onAuthStateChanged(async (user) => {
            if (user) { currentUser = user; await loadUserData(user); await loadWorkspaces(); showWorkspacesContent(); }
            else { showLoginRequired(); }
        });

        async function loadUserData(user) {
            try {
                const snap = await database.ref(`taskers/${user.uid}`).once('value');
                currentTasker = snap.exists() ? snap.val() : { name: user.displayName || user.email?.split('@')[0] || 'Tasker', email: user.email };
                updateUserUI();
            } catch(e) { console.error('Error loading user:', e); }
        }

        async function loadWorkspaces() {
            showLoading(true);
            try {
                const snap = await database.ref('resources/workspaces').once('value');
                const data = snap.val() || {};
                workspaces = Object.entries(data).map(([id, item]) => ({ id, ...item })).sort((a,b) => (b.timestamp||0)-(a.timestamp||0));
                renderWorkspaces();
            } catch(e) { showToast('Error loading workspaces', 'error'); }
            finally { showLoading(false); }
        }

        function updateUserUI() {
            const name = currentTasker?.name || currentUser?.email?.split('@')[0] || 'Tasker';
            document.getElementById('userDisplayName').textContent = name;
            document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
        }

        function renderWorkspaces() {
            const container = document.getElementById('workspacesContainer');
            if (!workspaces.length) {
                container.innerHTML = `<div class="empty-section"><i class="fas fa-building"></i><h3>No Workspaces Available</h3><p>Workspaces will appear here once set up by your administrator</p></div>`;
                return;
            }
            container.innerHTML = workspaces.map(w => `
                <div class="workspace-card" onclick="openWorkspace('${escapeHtml(w.link)}')">
                    <div class="card-image">
                        ${w.image ? `<img src="${escapeHtml(w.image)}" alt="${escapeHtml(w.title)}" loading="lazy">` : `<div class="image-placeholder"><i class="fas fa-building"></i></div>`}
                    </div>
                    <div class="card-content">
                        <span class="workspace-badge"><i class="fas fa-briefcase"></i> Workspace</span>
                        <h3 class="card-title">${escapeHtml(w.title)}</h3>
                        <p class="card-description">${escapeHtml(w.description)}</p>
                        <span class="card-link">Launch Workspace <i class="fas fa-arrow-right"></i></span>
                    </div>
                </div>
            `).join('');
        }

        window.openWorkspace = function(link) {
            if (link) {
                if (link.endsWith('.html') || link.includes('.html')) window.location.href = link;
                else window.open(link, '_blank');
            }
        };

        window.handleLogout = async function() {
            showLoading(true);
            try { await auth.signOut(); window.location.href = 'index.html'; }
            catch(e) { showToast('Logout failed', 'error'); showLoading(false); }
        };

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t||''; return d.innerHTML; }
        function showLoading(s) { document.getElementById('loadingOverlay').classList.toggle('active', s); }
        function showToast(m, type='info') {
            const t = document.createElement('div'); t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas fa-${type==='error'?'exclamation-circle':'check-circle'}"></i><span>${escapeHtml(m)}</span>`;
            document.getElementById('toastContainer').appendChild(t); setTimeout(()=>t.remove(), 3000);
        }
        function showLoginRequired() { document.getElementById('loginRequired').style.display='block'; document.getElementById('workspacesContent').style.display='none'; }
        function showWorkspacesContent() { document.getElementById('loginRequired').style.display='none'; document.getElementById('workspacesContent').style.display='block'; }
    </script>
</body>
</html>
