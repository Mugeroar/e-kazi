<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ca8a04">
    <title>KazInni · Operations Blog</title>
    <link rel="icon" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview-1.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;600;700;800&family=Satoshi:wght@400;500;600;700;800;900&family=Clash+Display:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=General+Sans:wght@400;500;600;700&family=Merriweather:wght@300;400;700;900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #ca8a04; --gold-dark: #a16207; --gold-light: #fbbf24;
            --gold-soft: #fef3c7; --gold-gradient: linear-gradient(135deg, #ca8a04 0%, #eab308 50%, #fbbf24 100%);
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6;
            --purple: #8b5cf6; --emerald: #059669; --rose: #e11d48; --pink: #ec4899; --indigo: #4f46e5;
            --bg-primary: #ffffff; --bg-secondary: #faf9f7; --bg-card: #ffffff;
            --text-primary: #1a1a2e; --text-secondary: #4a5568; --text-muted: #718096;
            --border-light: #e9ecef;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.03); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08);
            --nav-bg: rgba(255,255,255,0.98); --header-height: 70px;
            --font-display: 'Clash Display', 'Cabinet Grotesk', sans-serif;
            --font-heading: 'Satoshi', 'General Sans', sans-serif;
            --font-body: 'General Sans', 'Outfit', sans-serif;
            --font-blog: 'Source Serif 4', 'Merriweather', 'General Sans', serif;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, #fffbeb 0%, #ffffff 10%, #faf9f7 100%);
            color: var(--text-primary); line-height: 1.6; min-height: 100vh;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; } 100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 6px;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInUp 0.6s ease-out; }

        .site-header {
            position:fixed; top:0; width:100%; height:var(--header-height);
            background:var(--nav-bg); backdrop-filter:blur(25px);
            border-bottom:1px solid rgba(202,138,4,0.08); z-index:1000; padding:0 2rem;
        }
        .header-container { max-width:1400px; height:100%; margin:0 auto; display:flex; align-items:center; justify-content:space-between; }
        .logo{display:flex;align-items:center;gap:0.7rem;text-decoration:none;}
        .logo img{height:36px;width:auto;}
        .logo span{font-size:1.4rem;font-weight:800;background:var(--gold-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:var(--font-display);}
        .nav-links{display:flex;gap:2rem;}
        .nav-link{color:var(--text-secondary);text-decoration:none;font-size:0.85rem;font-weight:500;font-family:var(--font-heading);transition:all 0.2s;}
        .nav-link:hover,.nav-link.active{color:var(--gold);}
        .user-menu{display:flex;align-items:center;gap:0.5rem;background:var(--bg-card);border:1px solid var(--border-light);border-radius:50px;padding:0.25rem 0.5rem 0.25rem 0.8rem;cursor:pointer;position:relative;}
        .user-menu:hover{border-color:var(--gold);}
        .user-avatar{width:32px;height:32px;background:var(--gold-gradient);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.7rem;}
        .user-name{font-size:0.8rem;font-weight:600;}
        .user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg-card);border:1px solid var(--border-light);border-radius:12px;padding:0.4rem;min-width:160px;opacity:0;visibility:hidden;transform:translateY(-8px);transition:all 0.2s;z-index:1001;box-shadow:var(--shadow-lg);}
        .user-menu:hover .user-dropdown{opacity:1;visibility:visible;transform:translateY(0);}
        .dropdown-item{padding:0.6rem 0.8rem;color:var(--text-secondary);border-radius:8px;display:flex;align-items:center;gap:0.4rem;cursor:pointer;font-size:0.8rem;border:none;background:none;width:100%;font-family:var(--font-body);}
        .dropdown-item:hover{background:var(--bg-secondary);}
        .dropdown-item.danger:hover{color:var(--danger);}

        .main-content{max-width:850px;margin:calc(var(--header-height) + 2rem) auto 3rem;padding:0 2rem;}

        .blog-header{text-align:center;margin-bottom:2rem;}
        .blog-header h1{font-size:2.2rem;font-weight:800;font-family:var(--font-display);display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:0.3rem;}
        .blog-header h1 i{color:var(--gold);}
        .blog-header p{color:var(--text-muted);font-size:0.9rem;}

        .btn{
            padding:0.5rem 1.2rem; border:none; border-radius:40px; font-weight:600;
            font-size:0.78rem; cursor:pointer; display:inline-flex; align-items:center;
            gap:0.4rem; transition:all 0.3s; font-family:var(--font-heading);
        }
        .btn-primary{background:var(--gold-gradient);color:white;}
        .btn-outline{background:transparent;border:1px solid var(--border-light);color:var(--text-secondary);}
        .btn-outline:hover{border-color:var(--gold);color:var(--gold);}
        .btn-sm{padding:0.3rem 0.7rem;font-size:0.7rem;}

        /* Skeleton */
        .blog-skeleton-card {
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: 20px; padding: 2.5rem; box-shadow: var(--shadow-sm);
        }
        .blog-skeleton-card::before {
            content: ''; display: block; height: 4px; background: #e5e7eb;
            margin: -2.5rem -2.5rem 2rem -2.5rem; border-radius: 20px 20px 0 0;
        }

        /* Blog Post */
        .blog-post {
            background:var(--bg-card); border:1px solid var(--border-light);
            border-radius:20px; padding:2.5rem 3rem; margin-bottom:1.5rem;
            box-shadow:var(--shadow-sm); position:relative; overflow:hidden;
        }
        .blog-post::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--gold-gradient);}
        .blog-post-header{border-bottom:1px solid var(--border-light);padding-bottom:1.2rem;margin-bottom:1.8rem;}
        .blog-post-date{font-size:0.7rem;color:var(--gold-dark);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:0.5rem;}
        .blog-post-title{font-size:2rem;font-weight:800;font-family:var(--font-display);line-height:1.25;margin-bottom:0.5rem;color:var(--text-primary);}
        .blog-post-subtitle{font-size:0.95rem;color:var(--text-secondary);font-style:italic;line-height:1.5;}
        .blog-post-meta{display:flex;align-items:center;gap:1.5rem;margin-top:0.8rem;font-size:0.7rem;color:var(--text-muted);flex-wrap:wrap;}
        .blog-post-meta span{display:flex;align-items:center;gap:0.3rem;}
        .blog-post-meta i{color:var(--gold);}

        .blog-content{font-family:var(--font-blog);font-size:1rem;line-height:1.85;color:var(--text-secondary);}
        .blog-content h2{font-family:var(--font-heading);font-size:1.4rem;font-weight:700;color:var(--text-primary);margin:2rem 0 0.8rem;padding-top:1rem;border-top:1px solid var(--border-light);}
        .blog-content h2:first-of-type{border-top:none;padding-top:0;}
        .blog-content h3{font-family:var(--font-heading);font-size:1.1rem;font-weight:700;color:var(--text-primary);margin:1.5rem 0 0.5rem;}
        .blog-content p{margin-bottom:1rem;text-align:justify;}
        .blog-content .highlight-box{
            background:var(--gold-soft);border-left:4px solid var(--gold);
            padding:1rem 1.3rem;border-radius:0 12px 12px 0;margin:1.2rem 0;
            font-family:var(--font-heading);font-size:0.9rem;line-height:1.6;
        }
        .blog-content .highlight-box.warning{background:rgba(245,158,11,0.06);border-left-color:var(--warning);}
        .blog-content .highlight-box.info{background:rgba(59,130,246,0.04);border-left-color:var(--info);}
        .blog-content .highlight-box.success{background:rgba(16,185,129,0.04);border-left-color:var(--success);}
        .blog-content .highlight-box.danger{background:rgba(239,68,68,0.04);border-left-color:var(--danger);}
        .blog-content .stat-inline{display:inline-block;padding:0.12rem 0.5rem;border-radius:5px;font-weight:700;font-family:var(--font-heading);font-size:0.9rem;}
        .blog-content .stat-inline.gold{background:rgba(202,138,4,0.1);color:var(--gold-dark);}
        .blog-content .stat-inline.green{background:rgba(16,185,129,0.1);color:var(--emerald);}
        .blog-content .stat-inline.purple{background:rgba(139,92,246,0.1);color:var(--purple);}
        .blog-content .stat-inline.blue{background:rgba(59,130,246,0.1);color:var(--info);}
        .blog-content .stat-inline.rose{background:rgba(225,29,72,0.1);color:var(--rose);}
        .blog-content .team-mention{display:inline-flex;align-items:center;gap:0.2rem;background:rgba(59,130,246,0.06);padding:0.08rem 0.45rem;border-radius:5px;font-weight:600;color:var(--info);margin:0 0.1rem;font-family:var(--font-heading);font-size:0.85rem;}

        .blog-chart-embed {
            background:var(--bg-secondary); border-radius:16px;
            padding:1.2rem; margin:1.5rem 0; border:1px solid var(--border-light);
        }
        .blog-chart-embed canvas{max-height:200px;}
        .chart-label{font-size:0.65rem;color:var(--text-muted);text-align:center;margin-top:0.5rem;font-style:italic;}

        .blog-map-embed {
            border-radius:16px; overflow:hidden; height:220px; margin:1.5rem 0;
            border:1px solid var(--border-light);
        }
        .blog-map-embed .leaflet-control-zoom{display:none;}
        .blog-map-embed .leaflet-control-attribution{font-size:7px;}

        .blog-sidebar{position:sticky;top:calc(var(--header-height) + 1.5rem);}
        .sidebar-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:18px;padding:1.2rem;margin-bottom:0.8rem;box-shadow:var(--shadow-sm);}
        .sidebar-card h4{font-family:var(--font-heading);font-size:0.85rem;font-weight:700;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.4rem;}
        .sidebar-card h4 i{color:var(--gold);}
        .archive-list{display:flex;flex-direction:column;gap:0.3rem;max-height:350px;overflow-y:auto;}
        .archive-item{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.6rem;border-radius:10px;cursor:pointer;transition:all 0.2s;font-size:0.78rem;border:1px solid transparent;}
        .archive-item:hover{background:var(--gold-soft);border-color:var(--gold);}
        .archive-item.active{background:var(--gold-soft);border-color:var(--gold);font-weight:600;}
        .archive-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;}

        .footer{text-align:center;padding:2rem;color:var(--text-muted);font-size:0.7rem;border-top:1px solid var(--border-light);margin-top:3rem;}

        @media(max-width:900px){.main-content{padding:0 1rem}.blog-post{padding:1.5rem}.blog-post-title{font-size:1.5rem}.nav-links{display:none}}
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-container">
            <a href="dashboard.html" class="logo"><img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview-1.png" alt="KazInni"><span>KazInni</span></a>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="analytics.html" class="nav-link">Analytics</a>
                <a href="reports.html" class="nav-link">Reports</a>
                <a href="blog.html" class="nav-link active">Blog</a>
            </nav>
            <div class="user-menu">
                <span class="user-name" id="userDisplayName">Staff</span>
                <div class="user-avatar" id="userAvatar">K</div>
                <div class="user-dropdown">
                    <button class="dropdown-item" onclick="regenerateToday()"><i class="fas fa-sync-alt"></i> Regenerate</button>
                    <button class="dropdown-item danger" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="blog-header">
            <h1><i class="fas fa-newspaper"></i> Operations Blog</h1>
            <p>Daily analytics · System performance · Workspace insights · Predictions</p>
        </div>

        <!-- SKELETON LOADING -->
        <div id="skeletonState">
            <div class="blog-skeleton-card">
                <div class="skeleton" style="height:2rem;width:50%;margin-bottom:0.6rem;"></div>
                <div class="skeleton" style="height:1rem;width:70%;margin-bottom:0.4rem;"></div>
                <div class="skeleton" style="height:1rem;width:40%;margin-bottom:2rem;"></div>
                <div class="skeleton" style="height:1.2rem;width:95%;margin-bottom:0.6rem;"></div>
                <div class="skeleton" style="height:1.2rem;width:90%;margin-bottom:0.6rem;"></div>
                <div class="skeleton" style="height:1.2rem;width:85%;margin-bottom:0.6rem;"></div>
                <div class="skeleton" style="height:1.2rem;width:88%;margin-bottom:1.5rem;"></div>
                <div class="skeleton" style="height:12rem;margin-bottom:1.5rem;"></div>
                <div class="skeleton" style="height:1.2rem;width:90%;margin-bottom:0.6rem;"></div>
                <div class="skeleton" style="height:1.2rem;width:80%;margin-bottom:1.5rem;"></div>
                <div class="skeleton" style="height:10rem;"></div>
            </div>
        </div>

        <!-- LIVE CONTENT -->
        <div id="liveState" style="display:none;">
            <div id="blogContent"></div>
        </div>
    </main>

    <footer class="footer">&copy; 2026 Teleio Savour · Operations Blog · Auto-generated daily</footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let blogPosts = {};
        let isGenerating = false;
        let embeddedCharts = [];
        let embeddedMap = null;

        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            const snap = await db.ref(`brandinn_users/${user.uid}`).once('value');
            const name = snap.exists() ? (snap.val().name || user.email?.split('@')[0]) : user.email?.split('@')[0];
            document.getElementById('userDisplayName').textContent = name || 'Staff';
            document.getElementById('userAvatar').textContent = (name || 'K').charAt(0).toUpperCase();
            await loadBlogPosts();
            await checkAndGenerateToday();
        });

        async function loadBlogPosts() {
            try { const snap = await db.ref('operation_blogs').once('value'); blogPosts = snap.val() || {}; }
            catch(e) { blogPosts = {}; }
        }

        async function checkAndGenerateToday() {
            const today = new Date().toISOString().split('T')[0];
            if (blogPosts[today]) {
                renderBlogDisplay(today, blogPosts[today]);
                revealContent();
            } else {
                await generateTodayPost(today);
                revealContent();
            }
        }

        function revealContent() {
            document.getElementById('skeletonState').style.display = 'none';
            document.getElementById('liveState').style.display = 'block';
        }

        async function generateTodayPost(dateStr) {
            if (isGenerating) return;
            isGenerating = true;
            cleanupCharts();

            const todayStart = new Date(dateStr + 'T00:00:00+03:00').getTime();
            const todayEnd = new Date(dateStr + 'T23:59:59.999+03:00').getTime();

            try {
                const paths = [
                    { key: 'fusionOrders', path: 'fusion_foods_orders' },
                    { key: 'dsogOrders', path: 'dsog_fashion_orders' },
                    { key: 'brandinnOrders', path: 'brandinn_print_orders' },
                    { key: 'heritageListings', path: 'heritage_listings' },
                    { key: 'fieldRegs', path: 'iam_mugera_registrations' }
                ];

                const rawData = {};
                for (const p of paths) {
                    const snap = await db.ref(p.path).once('value');
                    rawData[p.key] = snap.val() || {};
                }

                const filterByDate = (obj) => Object.entries(obj).filter(([_, item]) => {
                    const ts = item.createdAt || item.timestamp || 0;
                    return ts >= todayStart && ts <= todayEnd;
                });

                const fusionOrders = filterByDate(rawData.fusionOrders);
                const dsogOrders = filterByDate(rawData.dsogOrders);
                const brandinnOrders = filterByDate(rawData.brandinnOrders);
                const heritageListings = filterByDate(rawData.heritageListings);
                const fieldRegs = filterByDate(rawData.fieldRegs);

                // Hourly analysis
                const allTimestamps = [...fusionOrders, ...dsogOrders, ...brandinnOrders, ...heritageListings, ...fieldRegs]
                    .map(([_, item]) => item.createdAt || item.timestamp || 0).filter(t => t > 0);
                const hourlyBins = new Array(24).fill(0);
                allTimestamps.forEach(ts => { hourlyBins[new Date(ts).getHours()]++; });

                const peakHour = hourlyBins.indexOf(Math.max(...hourlyBins));
                const peakCount = hourlyBins[peakHour];
                const totalOps = fusionOrders.length + dsogOrders.length + brandinnOrders.length + heritageListings.length;
                const systemLoad = totalOps > 50 ? 'high' : totalOps > 15 ? 'moderate' : 'low';

                // Contributors
                const contributors = new Set();
                [...fusionOrders, ...dsogOrders, ...brandinnOrders].forEach(([_, o]) => {
                    const by = o.recordedBy || o.clerkId || '';
                    if (by) contributors.add(by.includes('@') ? by.split('@')[0] : by);
                });
                fieldRegs.forEach(([_, r]) => {
                    const by = r.recordedBy || '';
                    if (by) contributors.add(by.includes('@') ? by.split('@')[0] : by);
                });

                const contributorList = [...contributors];
                const fieldRegsArray = fieldRegs.map(([_, r]) => r);

                // Fusion details
                const fusionRestaurants = new Set(fusionOrders.map(([_, o]) => o.restaurantName).filter(Boolean));
                const fusionValue = fusionOrders.reduce((sum, [_, o]) => sum + (o.total || 0), 0);
                const fusionDelivered = fusionOrders.filter(([_, o]) => o.status === 'delivered').length;
                const fusionShipped = fusionOrders.filter(([_, o]) => o.status === 'shipped').length;

                // DSOG details
                const dsogCustomers = new Set(dsogOrders.map(([_, o]) => o.customerName).filter(Boolean));
                const dsogDelivered = dsogOrders.filter(([_, o]) => o.status === 'delivered').length;

                // BrandInn details
                const brandinnCompleted = brandinnOrders.filter(([_, o]) => o.status === 'delivered' || o.status === 'completed').length;

                // Field details
                const fieldOps = {};
                fieldRegs.forEach(([_, r]) => { const op = r.operation || 'other'; fieldOps[op] = (fieldOps[op] || 0) + 1; });

                // Predictions
                const yesterdayDate = new Date(Date.now() - 86400000).toISOString().split('T')[0];
                const yesterdayPost = blogPosts[yesterdayDate];
                const yesterdayTotal = yesterdayPost?.stats?.totalOperations || 0;
                const trend = totalOps > yesterdayTotal ? 'increasing' : totalOps < yesterdayTotal ? 'decreasing' : 'stable';
                const predictedTomorrow = Math.round(totalOps * (trend === 'increasing' ? 1.15 : trend === 'decreasing' ? 0.85 : 1.0));

                const chartData = { fusion: fusionOrders.length, dsog: dsogOrders.length, brandinn: brandinnOrders.length, heritage: heritageListings.length, field: fieldRegs.length };

                const blogData = {
                    date: dateStr,
                    title: generateTitle(totalOps, fieldRegs.length, fusionOrders.length, dsogOrders.length, brandinnOrders.length),
                    subtitle: generateSubtitle(totalOps, contributorList.length),
                    stats: {
                        totalOperations: totalOps, fieldRegistrations: fieldRegs.length,
                        fusionOrders: fusionOrders.length, dsogOrders: dsogOrders.length,
                        brandinnOrders: brandinnOrders.length, heritageListings: heritageListings.length,
                        contributors: contributorList.length, contributorNames: contributorList,
                        chartData, fieldRegsData: fieldRegsArray, hourlyBins,
                        peakHour, peakCount, systemLoad, trend, predictedTomorrow, yesterdayTotal,
                        fusionRestaurants: [...fusionRestaurants], fusionValue, fusionDelivered, fusionShipped,
                        dsogCustomers: [...dsogCustomers], dsogDelivered, brandinnCompleted, fieldOps
                    },
                    content: generateBlogContent(fusionOrders, dsogOrders, brandinnOrders, heritageListings, fieldRegs, contributorList, hourlyBins, peakHour, peakCount, systemLoad, trend, predictedTomorrow, totalOps, fusionRestaurants, fusionValue, fusionDelivered, fusionShipped, dsogCustomers, dsogDelivered, brandinnCompleted, fieldOps),
                    generatedAt: new Date().toISOString(),
                    generatedBy: auth.currentUser?.email || 'System'
                };

                await db.ref(`operation_blogs/${dateStr}`).set(blogData);
                blogPosts[dateStr] = blogData;
                renderBlogDisplay(dateStr, blogData);

            } catch(e) { console.error('Generation error:', e); }
            finally { isGenerating = false; }
        }

        function renderBlogDisplay(date, data) {
            document.getElementById('blogContent').innerHTML = `
                <div class="blog-post animate-in">
                    <div class="blog-post-header">
                        <div class="blog-post-date">${new Date(data.date).toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'})}</div>
                        <h1 class="blog-post-title">${data.title}</h1>
                        <p class="blog-post-subtitle">${data.subtitle}</p>
                        <div class="blog-post-meta">
                            <span><i class="fas fa-calendar-check"></i> ${new Date(data.generatedAt).toLocaleTimeString()}</span>
                            <span><i class="fas fa-robot"></i> Auto-generated</span>
                        </div>
                    </div>
                    <div class="blog-content">${data.content}</div>
                </div>`;
            setTimeout(() => {
                embedChart(data.stats?.chartData || {});
                embedHourlyChart(data.stats?.hourlyBins || new Array(24).fill(0), data.stats?.peakHour || 0);
                embedMap(data.stats?.fieldRegsData || []);
            }, 500);
        }

        function embedChart(chartData) {
            const container = document.getElementById('blogChartEmbed');
            if (!container) return;
            const canvas = container.querySelector('canvas');
            if (!canvas) return;
            const chart = new Chart(canvas.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: ['Fusion Foods', 'DSOG', 'BrandInn', 'Heritage', 'Field'],
                    datasets: [{ data: [chartData.fusion, chartData.dsog, chartData.brandinn, chartData.heritage, chartData.field], backgroundColor: ['#10b981','#ec4899','#7c3aed','#d946ef','#3b82f6'], borderWidth: 2, borderColor: '#fff' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { padding: 10, usePointStyle: true, font: { size: 9 } } } } }
            });
            embeddedCharts.push(chart);
        }

        function embedHourlyChart(hourlyBins, peakHour) {
            const container = document.getElementById('blogHourlyChartEmbed');
            if (!container) return;
            const canvas = container.querySelector('canvas');
            if (!canvas) return;
            const labels = hourlyBins.map((_, i) => `${i}:00`);
            const bgColors = hourlyBins.map((_, i) => i === peakHour ? 'rgba(239,68,68,0.7)' : 'rgba(202,138,4,0.35)');
            const chart = new Chart(canvas.getContext('2d'), {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Operations', data: hourlyBins, backgroundColor: bgColors, borderColor: bgColors, borderWidth: 1, borderRadius: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 8 } }, grid: { color: '#f3f4f6' } }, x: { ticks: { font: { size: 7 }, maxTicksLimit: 12 }, grid: { display: false } } } }
            });
            embeddedCharts.push(chart);
        }

        function embedMap(fieldRegsArray) {
            const container = document.getElementById('blogMapEmbed');
            if (!container || !fieldRegsArray || fieldRegsArray.length === 0) return;
            embeddedMap = L.map('blogMapEmbed', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(embeddedMap);
            const bounds = [];
            const colors = { brandinn: '#7c3aed', deliveries: '#f59e0b', rides: '#22c55e', dsog: '#ec4899', fusion: '#10b981', heritage: '#d946ef' };
            fieldRegsArray.forEach(r => {
                if (r.lat && r.lng) {
                    L.circleMarker([r.lat, r.lng], { radius: 3, fillColor: colors[r.operation] || '#ca8a04', color: '#fff', weight: 0.5, fillOpacity: 0.8 }).addTo(embeddedMap);
                    bounds.push([r.lat, r.lng]);
                }
            });
            if (bounds.length > 0) embeddedMap.fitBounds(bounds, { padding: [15, 15], maxZoom: 15 });
            else embeddedMap.setView([-1.2864, 36.8172], 7);
        }

        function cleanupCharts() {
            embeddedCharts.forEach(c => { try { c.destroy(); } catch(e) {} });
            embeddedCharts = [];
            if (embeddedMap) { try { embeddedMap.remove(); } catch(e) {} embeddedMap = null; }
        }

        function generateTitle(total, field, fusion, dsog, brandinn) {
            const parts = [];
            if (fusion > 0) parts.push(`${fusion} Food Orders`);
            if (dsog > 0) parts.push(`${dsog} Fashion Orders`);
            if (brandinn > 0) parts.push(`${brandinn} Print Jobs`);
            if (field > 0) parts.push(`${field} Field Registrations`);
            if (parts.length === 0) return 'A Quiet Day at the Operations Hub';
            if (parts.length === 1) return parts[0] + ' Processed Today';
            return parts.slice(0, 2).join(' & ') + ` — ${total} Total Operations`;
        }

        function generateSubtitle(total, contributors) {
            const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
            return `Daily operations summary for ${today} · ${contributors} team member${contributors !== 1 ? 's' : ''} contributed`;
        }

        function generateBlogContent(fusion, dsog, brandinn, heritage, field, contributors, hourlyBins, peakHour, peakCount, systemLoad, trend, predictedTomorrow, totalOps, fusionRestaurants, fusionValue, fusionDelivered, fusionShipped, dsogCustomers, dsogDelivered, brandinnCompleted, fieldOps) {
            let html = '';
            const fieldCount = field.length;

            // ===== INTRODUCTION =====
            html += `<p>Welcome to today's edition of the <strong>KazInni Operations Blog</strong>, your daily digest of everything that happened across our business ecosystem. This report covers operations from <strong>midnight to 11:59 PM East Africa Time</strong>, providing a comprehensive look at how each workspace performed, where the system experienced pressure, and what we can expect tomorrow.</p>`;

            if (totalOps === 0 && fieldCount === 0) {
                html += `<p>Today was an unusually <span class="stat-inline gold">quiet day</span> across all workspaces. No orders were placed, no listings were created, and no field registrations were recorded. This is typically indicative of a weekend, public holiday, or scheduled maintenance window. All systems remain fully operational, and we expect activity to resume during the next business cycle.</p>`;
                html += `<div class="highlight-box">📊 <strong>System Note:</strong> Zero operations does not indicate a system failure. All monitoring endpoints are responding normally. The database, authentication services, and real-time listeners are functioning as expected.</div>`;
                return html;
            }

            // ===== EXECUTIVE SUMMARY =====
            html += `<h2>📋 Executive Summary</h2>`;
            html += `<p>Today, the KazInni platform processed a total of <span class="stat-inline gold">${totalOps} operations</span> across four active workspaces. The system operated under <span class="stat-inline ${systemLoad === 'high' ? 'rose' : systemLoad === 'moderate' ? 'gold' : 'green'}">${systemLoad.toUpperCase()} LOAD</span> conditions, with peak activity concentrated around <span class="stat-inline rose">${peakHour}:00 hours</span> where <span class="stat-inline rose">${peakCount} operations</span> were recorded in a single hour. Field agents contributed an additional <span class="stat-inline green">${fieldCount} location registrations</span> across various operation types throughout Kenya.</p>`;

            html += `<p>Compared to yesterday's figure of <span class="stat-inline blue">${yesterdayTotal || 'N/A'} operations</span>, today's performance represents a <span class="stat-inline ${trend === 'increasing' ? 'green' : trend === 'decreasing' ? 'rose' : 'gold'}">${trend === 'increasing' ? 'notable increase' : trend === 'decreasing' ? 'slight decrease' : 'stable continuation'}</span> in activity levels. Based on current trajectory analysis, our predictive model estimates approximately <span class="stat-inline blue">${predictedTomorrow} operations</span> for tomorrow.</p>`;

            // ===== SYSTEM PERFORMANCE =====
            html += `<h2>⚡ System Performance & Load Analysis</h2>`;
            html += `<p>Understanding how our systems handle operational load is crucial for maintaining service quality. Today's data reveals interesting patterns in how activity was distributed throughout the day.</p>`;

            html += `<p>The system processed an average of <span class="stat-inline blue">${(totalOps / 24).toFixed(1)} operations per hour</span> over the 24-hour cycle. However, this average masks significant variation — the busiest hour (${peakHour}:00) saw <span class="stat-inline rose">${peakCount} operations</span>, while several overnight hours recorded zero activity. This distribution is typical for a business platform serving the East African market, where activity naturally clusters during business hours.</p>`;

            html += `<div class="blog-chart-embed" id="blogHourlyChartEmbed"><canvas></canvas><div class="chart-label">Figure 1: Hourly System Load Distribution — Red bar indicates peak activity hour (${peakHour}:00 with ${peakCount} operations)</div></div>`;

            if (peakCount > 10) {
                html += `<div class="highlight-box warning"><strong>⚠️ Activity Overflow Analysis:</strong> The ${peakHour}:00 hour registered ${peakCount} operations — a significant concentration that warrants attention. During this window, the system was processing approximately one operation every ${Math.round(60 / peakCount)} minutes. While all operations completed successfully, this level of concurrent activity is approaching the threshold where queuing delays could begin to manifest. We recommend monitoring this time window closely and considering load distribution strategies if this pattern persists.</div>`;
            } else if (peakCount > 5) {
                html += `<div class="highlight-box info"><strong>📈 Elevated Activity Note:</strong> The peak of ${peakCount} operations at ${peakHour}:00 represents healthy system utilization without approaching concerning thresholds. Response times remained within acceptable parameters, and no bottlenecks were observed in the processing pipeline.</div>`;
            } else {
                html += `<div class="highlight-box success"><strong>✅ Light Load Assessment:</strong> With peak activity of only ${peakCount} operations, the system operated well within its capacity limits. This provides an excellent opportunity for maintenance, optimization, and preparation for busier periods.</div>`;
            }

            // ===== FUSION FOODS =====
            html += `<h2>🍽️ Fusion Foods — Food & Grocery Supply</h2>`;
            if (fusion.length === 0) {
                html += `<p>The Fusion Foods workspace recorded <span class="stat-inline gold">no orders</span> today. This could indicate a scheduled closure of partner restaurants, a supply chain pause, or simply a naturally slow day in the food distribution sector. The workspace remains fully configured and ready to process orders when activity resumes.</p>`;
            } else {
                html += `<p>Fusion Foods emerged as ${fusion.length >= (totalOps * 0.4) ? 'the <strong>dominant workspace</strong> today,' : 'a <strong>steady contributor</strong> to operations,'} processing <span class="stat-inline green">${fusion.length} food supply orders</span> that served <span class="stat-inline gold">${fusionRestaurants.size} distinct restaurants</span> across the distribution network. The total value of orders processed through Fusion Foods today amounted to <span class="stat-inline gold">KES ${fusionValue.toLocaleString()}</span>, reflecting the essential role this workspace plays in the food supply chain.</p>`;

                html += `<p>Of the ${fusion.length} orders processed, <span class="stat-inline green">${fusionDelivered} were successfully delivered</span> to their destinations, while <span class="stat-inline blue">${fusionShipped} are currently in transit</span>. The remaining ${fusion.length - fusionDelivered - fusionShipped} orders are in various stages of preparation and confirmation. This fulfillment pipeline demonstrates the end-to-end capability of the Fusion Foods platform — from order placement through dispatch and final delivery.</p>`;

                if (fusionRestaurants.size <= 6 && fusionRestaurants.size > 0) {
                    html += `<p>Today's restaurant partners included: <strong>${[...fusionRestaurants].map(r => escapeHtml(r)).join(', ')}</strong>. Each of these establishments relies on Fusion Foods for timely, reliable food supply deliveries that keep their kitchens operational.</p>`;
                } else if (fusionRestaurants.size > 6) {
                    html += `<p>Among the ${fusionRestaurants.size} restaurants served today were <strong>${[...fusionRestaurants].slice(0, 5).map(r => escapeHtml(r)).join(', ')}</strong> and ${fusionRestaurants.size - 5} other establishments. This diverse client base reflects the broad reach of the Fusion Foods distribution network.</p>`;
                }
            }

            // ===== DSOG FASHION =====
            html += `<h2>👗 DSOG Fashion — Apparel & Merchandise</h2>`;
            if (dsog.length === 0) {
                html += `<p>The DSOG Fashion workspace experienced <span class="stat-inline gold">no order activity</span> today. The fashion and apparel sector often exhibits cyclical patterns tied to seasons, promotions, and market trends. The workspace infrastructure remains fully operational for when customer demand picks up.</p>`;
            } else {
                html += `<p>The DSOG Fashion division handled <span class="stat-inline purple">${dsog.length} orders</span> today, serving <span class="stat-inline green">${dsogCustomers.size} unique customers</span>. Of these, <span class="stat-inline green">${dsogDelivered} orders reached successful delivery</span>, maintaining the workspace's commitment to timely fulfillment in the competitive fashion retail space.</p>`;

                html += `<p>DSOG Fashion continues to serve as a vital link between fashion suppliers and end consumers. The ${dsog.length} orders processed today represent individual touchpoints in the customer journey — from browsing and selection through payment processing and final delivery. Each completed order strengthens the marketplace's reputation and contributes to customer retention metrics.</p>`;
            }

            // ===== BRANDINN =====
            html += `<h2>🖨️ BrandInn Print — Printing & Merchandise</h2>`;
            if (brandinn.length === 0) {
                html += `<p>BrandInn Print recorded <span class="stat-inline gold">no print orders</span> today. The printing business often follows project-based cycles, with orders clustering around corporate events, marketing campaigns, and seasonal demands. The workspace is prepared for the next influx of print requests.</p>`;
            } else {
                html += `<p>BrandInn Print completed <span class="stat-inline purple">${brandinn.length} print orders</span> today, with <span class="stat-inline green">${brandinnCompleted} orders reaching full completion</span>. The printing and merchandise unit continues to serve businesses and individuals requiring high-quality printed materials, branded merchandise, and custom fabrication work.</p>`;
                html += `<p>Each print order represents a unique project with specific requirements — design specifications, material selections, color profiles, and finishing options. The successful completion of ${brandinnCompleted} orders demonstrates the workspace's capability to manage diverse printing projects simultaneously while maintaining quality standards.</p>`;
            }

            // ===== HERITAGE =====
            html += `<h2>🏛️ Heritage Marketplace — Outdoor Advertising</h2>`;
            if (heritage.length === 0) {
                html += `<p>The Heritage Marketplace workspace saw <span class="stat-inline gold">no new listings</span> today. Outdoor advertising inventory tends to move in cycles aligned with campaign planning, budget allocations, and seasonal advertising demand. Existing listings continue to generate value for advertising partners.</p>`;
            } else {
                html += `<p>The Heritage advertising platform added <span class="stat-inline green">${heritage.length} new listings</span> to its outdoor advertising inventory today. Each listing represents a billboard, signage location, or advertising space now available for campaign booking. This expansion of inventory strengthens the platform's position in the competitive outdoor advertising market.</p>`;
            }

            // ===== FIELD OPERATIONS =====
            html += `<h2>📍 Field Operations & Location Mapping</h2>`;
            if (fieldCount === 0) {
                html += `<p>No field registrations were recorded today. Field agents may have been reassigned to other duties, or conditions may not have been conducive for location mapping activities. The mobile registration system remains ready for deployment when field operations resume.</p>`;
            } else {
                html += `<p>Our field agents were active across the country today, successfully mapping <span class="stat-inline gold">${fieldCount} new business locations</span> through the KazInni mobile registration system. These registrations span multiple operation types, reflecting the diverse nature of businesses being onboarded to our platform.</p>`;

                html += `<p>The breakdown of today's field registrations by operation type reveals the following distribution:</p>`;
                html += `<ul style="margin:1rem 0 1rem 2rem;line-height:2;">`;
                const icons = { brandinn: '🏪', deliveries: '📦', rides: '🚗', dsog: '👗', fusion: '🔥', heritage: '🏛️' };
                Object.entries(fieldOps).forEach(([op, count]) => {
                    html += `<li><strong>${icons[op] || '📍'} ${op.charAt(0).toUpperCase() + op.slice(1)}:</strong> <span class="stat-inline gold">${count} registration${count !== 1 ? 's' : ''}</span></li>`;
                });
                html += `</ul>`;

                html += `<div class="blog-map-embed" id="blogMapEmbed"></div><div class="chart-label">Figure 2: Geographic Distribution of Today's Field Registrations Across Kenya</div>`;

                html += `<p>The geographic spread of today's registrations demonstrates the expanding reach of our field operations. Each dot on the map above represents a physical business location that has been verified and registered by our field team, contributing to the growing KazInni business directory.</p>`;
            }

            // ===== WORKSPACE DISTRIBUTION =====
            html += `<h2>📊 Workspace Performance Comparison</h2>`;
            html += `<p>Understanding how activity distributes across workspaces helps us allocate resources effectively and identify growth opportunities. The chart below visualizes today's operational split.</p>`;
            html += `<div class="blog-chart-embed" id="blogChartEmbed"><canvas></canvas><div class="chart-label">Figure 3: Distribution of Today's Operations Across Workspaces</div></div>`;

            if (fusion.length > 0 || dsog.length > 0 || brandinn.length > 0) {
                const dominant = fusion.length >= dsog.length && fusion.length >= brandinn.length ? 'Fusion Foods' : dsog.length >= brandinn.length ? 'DSOG Fashion' : 'BrandInn Print';
                html += `<p>Today, <strong>${dominant}</strong> led operational activity, accounting for the largest share of processed orders. This dominance reflects both market demand patterns and the relative maturity of each workspace within the KazInni ecosystem.</p>`;
            }

            // ===== TEAM =====
            if (contributors.length > 0) {
                html += `<h2>👥 Team Contributions</h2>`;
                html += `<p>Behind every operation is a team member who made it happen. Today, <span class="stat-inline blue">${contributors.length} contributor${contributors.length !== 1 ? 's' : ''}</span> powered the KazInni platform, each playing a vital role in the operational ecosystem. Whether processing orders, managing inventory, dispatching deliveries, or registering new businesses in the field, every contribution matters.</p>`;
                html += `<p>Today's contributors: ${contributors.map(c => `<span class="team-mention"><i class="fas fa-user-circle"></i> ${escapeHtml(c)}</span>`).join(' ')}</p>`;
                html += `<p>We extend our appreciation to each team member for their dedication and professionalism. It is through collective effort that the platform continues to serve businesses and communities effectively.</p>`;
            }

            // ===== PREDICTIONS =====
            html += `<h2>🔮 Looking Ahead — Tomorrow's Forecast</h2>`;
            html += `<p>Based on today's operational data and historical trends, our predictive engine has generated the following outlook for tomorrow:</p>`;
            html += `<p>We forecast approximately <span class="stat-inline blue">${predictedTomorrow} operations</span> across all workspaces tomorrow. This prediction is derived from today's <span class="stat-inline ${trend === 'increasing' ? 'green' : trend === 'decreasing' ? 'rose' : 'gold'}">${trend}</span> trend ${trend !== 'stable' ? `(compared to yesterday's ${yesterdayTotal || 'N/A'} operations)` : '(consistent with recent patterns)'}.</p>`;

            if (predictedTomorrow > 30) {
                html += `<div class="highlight-box danger"><strong>🔴 High Volume Alert:</strong> Tomorrow's forecast of ${predictedTomorrow} operations suggests a busy day ahead. We recommend ensuring adequate staffing across all workspaces, particularly during the anticipated peak hours. System resources should be monitored proactively to handle the expected load.</div>`;
            } else if (predictedTomorrow > 10) {
                html += `<div class="highlight-box info"><strong>🔵 Moderate Activity Expected:</strong> With approximately ${predictedTomorrow} operations forecast, tomorrow should be a manageable day across workspaces. Standard staffing levels should suffice, with normal monitoring protocols in place.</div>`;
            } else {
                html += `<div class="highlight-box success"><strong>🟢 Light Day Ahead:</strong> The forecast of approximately ${predictedTomorrow} operations suggests a lighter day tomorrow. This presents an ideal opportunity for system maintenance, data cleanup, team training, and process improvement initiatives.</div>`;
            }

            // ===== CLOSING =====
            html += `<h2>📝 Closing Notes</h2>`;
            html += `<p>Today's operations reflect the ongoing vitality of the KazInni platform. From food supply chains to fashion retail, from printing services to outdoor advertising, and from field registrations to delivery logistics — every operation tells a story of business being conducted, value being created, and communities being served.</p>`;
            html += `<p>This blog post was automatically generated from real-time operational data at ${new Date().toLocaleTimeString()}. No human intervention was required in its creation — a testament to the power of data-driven automation. For more detailed analytics, visit the <a href="analytics.html" style="color:var(--gold);font-weight:600;">Analytics Dashboard</a> or review the comprehensive <a href="reports.html" style="color:var(--gold);font-weight:600;">Operations Report</a>.</p>`;
            html += `<div class="highlight-box">📊 <strong>Today's Numbers at a Glance:</strong> ${totalOps} total operations · ${fieldCount} field registrations · ${systemLoad.toUpperCase()} system load · Peak at ${peakHour}:00 (${peakCount} ops) · ${contributors.length} contributors · ~${predictedTomorrow} predicted tomorrow</div>`;

            return html;
        }

        window.regenerateToday = async function() {
            cleanupCharts();
            document.getElementById('skeletonState').style.display = 'block';
            document.getElementById('liveState').style.display = 'none';
            const today = new Date().toISOString().split('T')[0];
            await generateTodayPost(today);
            revealContent();
        };

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
        window.handleLogout = async () => { if (confirm('Sign out?')) { await auth.signOut(); window.location.href = 'index.html'; } };
    </script>
</body>
</html>
