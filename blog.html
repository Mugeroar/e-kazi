    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #ca8a04; --gold-dark: #a16207; --gold-light: #fbbf24;
            --gold-soft: #fef3c7; --gold-gradient: linear-gradient(135deg, #ca8a04 0%, #eab308 50%, #fbbf24 100%);
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6;
            --purple: #8b5cf6; --emerald: #059669; --rose: #e11d48; --pink: #ec4899; --amber: #d97706; --indigo: #4f46e5;
            --bg-primary: #ffffff; --bg-secondary: #faf9f7; --bg-card: #ffffff;
            --text-primary: #1a1a2e; --text-secondary: #4a5568; --text-muted: #718096;
            --border-light: #e9ecef;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.03); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08);
            --nav-bg: rgba(255,255,255,0.98); --header-height: 70px;
            --font-display: 'Clash Display', 'Cabinet Grotesk', sans-serif;
            --font-heading: 'Satoshi', 'General Sans', sans-serif;
            --font-body: 'General Sans', 'Outfit', sans-serif;
            --font-blog: 'Source Serif 4', 'Merriweather', 'General Sans', serif;
        }
        body { font-family: var(--font-body); background: linear-gradient(180deg, #fffbeb 0%, #ffffff 10%, #faf9f7 100%); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton { background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%); background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 6px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeInUp 0.6s ease-out; }
        .site-header { position:fixed; top:0; width:100%; height:var(--header-height); background:var(--nav-bg); backdrop-filter:blur(25px); border-bottom:1px solid rgba(202,138,4,0.08); z-index:1000; padding:0 2rem; }
        .header-container { max-width:1400px; height:100%; margin:0 auto; display:flex; align-items:center; justify-content:space-between; }
        .logo{display:flex;align-items:center;gap:0.7rem;text-decoration:none;} .logo img{height:36px;width:auto;}
        .logo span{font-size:1.4rem;font-weight:800;background:var(--gold-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:var(--font-display);}
        .nav-links{display:flex;gap:2rem;} .nav-link{color:var(--text-secondary);text-decoration:none;font-size:0.85rem;font-weight:500;font-family:var(--font-heading);transition:all 0.2s;} .nav-link:hover,.nav-link.active{color:var(--gold);}
        .user-menu{display:flex;align-items:center;gap:0.5rem;background:var(--bg-card);border:1px solid var(--border-light);border-radius:50px;padding:0.25rem 0.5rem 0.25rem 0.8rem;cursor:pointer;position:relative;} .user-menu:hover{border-color:var(--gold);}
        .user-avatar{width:32px;height:32px;background:var(--gold-gradient);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.7rem;}
        .user-name{font-size:0.8rem;font-weight:600;}
        .user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg-card);border:1px solid var(--border-light);border-radius:12px;padding:0.4rem;min-width:160px;opacity:0;visibility:hidden;transform:translateY(-8px);transition:all 0.2s;z-index:1001;box-shadow:var(--shadow-lg);}
        .user-menu:hover .user-dropdown{opacity:1;visibility:visible;transform:translateY(0);}
        .dropdown-item{padding:0.6rem 0.8rem;color:var(--text-secondary);border-radius:8px;display:flex;align-items:center;gap:0.4rem;cursor:pointer;font-size:0.8rem;border:none;background:none;width:100%;font-family:var(--font-body);} .dropdown-item:hover{background:var(--bg-secondary);} .dropdown-item.danger:hover{color:var(--danger);}
        .main-content{max-width:850px;margin:calc(var(--header-height) + 2rem) auto 3rem;padding:0 2rem;}
        .blog-header{text-align:center;margin-bottom:2rem;} .blog-header h1{font-size:2.2rem;font-weight:800;font-family:var(--font-display);display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:0.3rem;} .blog-header h1 i{color:var(--gold);} .blog-header p{color:var(--text-muted);font-size:0.9rem;}
        .btn{padding:0.5rem 1.2rem; border:none; border-radius:40px; font-weight:600; font-size:0.78rem; cursor:pointer; display:inline-flex; align-items:center; gap:0.4rem; transition:all 0.3s; font-family:var(--font-heading);}
        .btn-primary{background:var(--gold-gradient);color:white;} .btn-outline{background:transparent;border:1px solid var(--border-light);color:var(--text-secondary);} .btn-outline:hover{border-color:var(--gold);color:var(--gold);} .btn-sm{padding:0.3rem 0.7rem;font-size:0.7rem;}
        .blog-skeleton-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 20px; padding: 2.5rem; box-shadow: var(--shadow-sm); }
        .blog-skeleton-card::before { content: ''; display: block; height: 4px; background: #e5e7eb; margin: -2.5rem -2.5rem 2rem -2.5rem; border-radius: 20px 20px 0 0; }

        .blog-post::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--gold-gradient);}
        .blog-post-header{border-bottom:1px solid var(--border-light);padding-bottom:1.2rem;margin-bottom:1.8rem;}

        .blog-content{font-family:var(--font-blog);font-size:1rem;line-height:1.85;color:var(--text-secondary);}

        .blog-content p{margin-bottom:1rem;text-align:justify;}
        .blog-content .highlight-box{background:var(--gold-soft);border-left:4px solid var(--gold);padding:1rem 1.3rem;border-radius:0 12px 12px 0;margin:1.2rem 0;font-family:var(--font-heading);font-size:0.9rem;line-height:1.6;}
        .blog-content .highlight-box.warning{background:rgba(245,158,11,0.06);border-left-color:var(--warning);}
        .blog-content .highlight-box.info{background:rgba(59,130,246,0.04);border-left-color:var(--info);}
        .blog-content .highlight-box.success{background:rgba(16,185,129,0.04);border-left-color:var(--success);}
        .blog-content .stat-inline{display:inline-block;padding:0.12rem 0.5rem;border-radius:5px;font-weight:700;font-family:var(--font-heading);font-size:0.9rem;}
        .blog-content .stat-inline.gold{background:rgba(202,138,4,0.1);color:var(--gold-dark);} .blog-content .stat-inline.green{background:rgba(16,185,129,0.1);color:var(--emerald);}
        .blog-content .stat-inline.purple{background:rgba(139,92,246,0.1);color:var(--purple);} .blog-content .stat-inline.blue{background:rgba(59,130,246,0.1);color:var(--info);}
        .blog-content .stat-inline.rose{background:rgba(225,29,72,0.1);color:var(--rose);} .blog-content .stat-inline.amber{background:rgba(217,119,6,0.1);color:var(--amber);}
        .blog-content .team-mention{display:inline-flex;align-items:center;gap:0.2rem;background:rgba(59,130,246,0.06);padding:0.08rem 0.45rem;border-radius:5px;font-weight:600;color:var(--info);margin:0 0.1rem;font-family:var(--font-heading);font-size:0.85rem;}
        .blog-chart-embed { background:var(--bg-secondary); border-radius:16px; padding:1.2rem; margin:1.5rem 0; border:1px solid var(--border-light); } .blog-chart-embed canvas{max-height:200px;} .chart-label{font-size:0.65rem;color:var(--text-muted);text-align:center;margin-top:0.5rem;font-style:italic;}
        .blog-map-embed { border-radius:16px; overflow:hidden; height:220px; margin:1.5rem 0; border:1px solid var(--border-light); } .blog-map-embed .leaflet-control-zoom{display:none;} .blog-map-embed .leaflet-control-attribution{font-size:7px;}
        .footer{text-align:center;padding:2rem;color:var(--text-muted);font-size:0.7rem;border-top:1px solid var(--border-light);margin-top:3rem;}
        @media(max-width:900px){.main-content{padding:0 1rem}.blog-post{padding:1.5rem}.blog-post-title{font-size:1.5rem}.nav-links{display:none}}
    </style>
</head>

        <div id="skeletonState">

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA", authDomain: "mugera-e51cc.firebaseapp.com", databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mugera-e51cc" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(); const auth = firebase.auth();
        let blogPosts = {}; let isGenerating = false; let embeddedCharts = []; let embeddedMap = null;

        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            const snap = await db.ref(`brandinn_users/${user.uid}`).once('value');
            const name = snap.exists() ? (snap.val().name || user.email?.split('@')[0]) : user.email?.split('@')[0];
            document.getElementById('userDisplayName').textContent = name || 'Staff';
            document.getElementById('userAvatar').textContent = (name || 'K').charAt(0).toUpperCase();
            await loadBlogPosts(); await checkAndGenerateToday();
        });

        async function loadBlogPosts() { try { const snap = await db.ref('operation_blogs').once('value'); blogPosts = snap.val() || {}; } catch(e) { blogPosts = {}; } }

        async function checkAndGenerateToday() {
            const today = new Date().toISOString().split('T')[0];
            const existingPost = blogPosts[today];
            const hasNewFormat = existingPost?.content?.includes('Executive Summary') && existingPost?.content?.includes('System Performance');
            if (existingPost && hasNewFormat) { renderBlogDisplay(today, existingPost); revealContent(); }
            else { await generateTodayPost(today); revealContent(); }
        }
        function revealContent() { document.getElementById('skeletonState').style.display = 'none'; document.getElementById('liveState').style.display = 'block'; }

        async function generateTodayPost(dateStr) {
            if (isGenerating) return; isGenerating = true; cleanupCharts();
            const todayStart = new Date(dateStr + 'T00:00:00+03:00').getTime();
            const todayEnd = new Date(dateStr + 'T23:59:59.999+03:00').getTime();
            try {
                const paths = [
                    { key: 'fusionOrders', path: 'fusion_foods_orders' }, { key: 'dsogOrders', path: 'dsog_fashion_orders' },
                    { key: 'brandinnOrders', path: 'brandinn_print_orders' }, { key: 'heritageListings', path: 'heritage_listings' },
                    { key: 'heritageOrders', path: 'heritage_orders' }, { key: 'fieldRegs', path: 'iam_mugera_registrations' }
                ];
                const rawData = {};
                for (const p of paths) { const snap = await db.ref(p.path).once('value'); rawData[p.key] = snap.val() || {}; }
                const filterByDate = (obj) => Object.entries(obj).filter(([_, item]) => { const ts = item.createdAt || item.timestamp || 0; return ts >= todayStart && ts <= todayEnd; });
                const fusionOrders = filterByDate(rawData.fusionOrders); const dsogOrders = filterByDate(rawData.dsogOrders);
                const brandinnOrders = filterByDate(rawData.brandinnOrders); const heritageListings = filterByDate(rawData.heritageListings);
                const heritageOrders = filterByDate(rawData.heritageOrders); const fieldRegs = filterByDate(rawData.fieldRegs);

                const allTimestamps = [...fusionOrders, ...dsogOrders, ...brandinnOrders, ...heritageListings, ...heritageOrders, ...fieldRegs].map(([_, item]) => item.createdAt || item.timestamp || 0).filter(t => t > 0);
                const hourlyBins = new Array(24).fill(0); allTimestamps.forEach(ts => { hourlyBins[new Date(ts).getHours()]++; });
                const peakHour = hourlyBins.indexOf(Math.max(...hourlyBins)); const peakCount = hourlyBins[peakHour];
                const totalOps = fusionOrders.length + dsogOrders.length + brandinnOrders.length + heritageListings.length + heritageOrders.length;
                const systemLoad = totalOps > 50 ? 'high' : totalOps > 15 ? 'moderate' : 'low';

                const contributors = new Set();
                [...fusionOrders, ...dsogOrders, ...brandinnOrders, ...heritageOrders].forEach(([_, o]) => { const by = o.recordedBy || o.clerkId || ''; if (by) contributors.add(by.includes('@') ? by.split('@')[0] : by); });
                fieldRegs.forEach(([_, r]) => { const by = r.recordedBy || ''; if (by) contributors.add(by.includes('@') ? by.split('@')[0] : by); });
                const contributorList = [...contributors]; const fieldRegsArray = fieldRegs.map(([_, r]) => r);

                const fusionRestaurants = new Set(fusionOrders.map(([_, o]) => o.restaurantName).filter(Boolean));
                const fusionValue = fusionOrders.reduce((sum, [_, o]) => sum + (o.total || 0), 0);
                const fusionDelivered = fusionOrders.filter(([_, o]) => o.status === 'delivered').length;
                const heritageMktCustomers = new Set(heritageOrders.map(([_, o]) => o.customerName).filter(Boolean));
                const heritageMktValue = heritageOrders.reduce((sum, [_, o]) => sum + (o.total || 0), 0);
                const fieldOps = {}; fieldRegs.forEach(([_, r]) => { const op = r.operation || 'other'; fieldOps[op] = (fieldOps[op] || 0) + 1; });

                const yesterdayDate = new Date(Date.now() - 86400000).toISOString().split('T')[0];
                const yesterdayPost = blogPosts[yesterdayDate]; const yesterdayTotal = yesterdayPost?.stats?.totalOperations || 0;
                const trend = totalOps > yesterdayTotal ? 'increasing' : totalOps < yesterdayTotal ? 'decreasing' : 'stable';
                const predictedTomorrow = Math.round(totalOps * (trend === 'increasing' ? 1.15 : trend === 'decreasing' ? 0.85 : 1.0));

                const chartData = { fusion: fusionOrders.length, dsog: dsogOrders.length, brandinn: brandinnOrders.length, heritageAds: heritageListings.length, heritageMkt: heritageOrders.length, field: fieldRegs.length };

                const blogData = {
                    date: dateStr, title: generateTitle(totalOps, fieldRegs.length, fusionOrders.length, dsogOrders.length, brandinnOrders.length, heritageOrders.length),
                    subtitle: generateSubtitle(totalOps, contributorList.length),
                    stats: { totalOperations: totalOps, fieldRegistrations: fieldRegs.length, fusionOrders: fusionOrders.length, dsogOrders: dsogOrders.length, brandinnOrders: brandinnOrders.length, heritageListings: heritageListings.length, heritageOrders: heritageOrders.length, contributors: contributorList.length, contributorNames: contributorList, chartData, fieldRegsData: fieldRegsArray, hourlyBins, peakHour, peakCount, systemLoad, trend, predictedTomorrow, yesterdayTotal, fusionRestaurants: [...fusionRestaurants], fusionValue, fusionDelivered, heritageMktCustomers: [...heritageMktCustomers], heritageMktValue, fieldOps },
                    content: generateBlogContent(fusionOrders, dsogOrders, brandinnOrders, heritageListings, heritageOrders, fieldRegs, contributorList, hourlyBins, peakHour, peakCount, systemLoad, trend, predictedTomorrow, totalOps, fusionRestaurants, fusionValue, fusionDelivered, heritageMktCustomers, heritageMktValue, fieldOps, yesterdayTotal),
                    generatedAt: new Date().toISOString(), generatedBy: auth.currentUser?.email || 'System', formatVersion: '3.0'
                };
                await db.ref(`operation_blogs/${dateStr}`).set(blogData); blogPosts[dateStr] = blogData; renderBlogDisplay(dateStr, blogData);
            } catch(e) { console.error('Generation error:', e); } finally { isGenerating = false; }
        }

        function renderBlogDisplay(date, data) {
            document.getElementById('blogContent').innerHTML = `<div class="blog-post animate-in"><div class="blog-post-header"><div class="blog-post-date">${new Date(data.date).toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'})}</div><h1 class="blog-post-title">${data.title}</h1><p class="blog-post-subtitle">${data.subtitle}</p><div class="blog-post-meta"><span><i class="fas fa-calendar-check"></i> ${new Date(data.generatedAt).toLocaleTimeString()}</span><span><i class="fas fa-robot"></i> Auto-generated</span></div></div><div class="blog-content">${data.content}</div></div>`;
            setTimeout(() => { embedChart(data.stats?.chartData || {}); embedHourlyChart(data.stats?.hourlyBins || new Array(24).fill(0), data.stats?.peakHour || 0); embedMap(data.stats?.fieldRegsData || []); }, 500);
        }

        function embedChart(chartData) {
            const container = document.getElementById('blogChartEmbed'); if (!container) return;
            const canvas = container.querySelector('canvas'); if (!canvas) return;
            const chart = new Chart(canvas.getContext('2d'), {
                type: 'doughnut',
                data: { labels: ['Fusion Foods', 'DSOG', 'BrandInn', 'Heritage Ads', 'Heritage Mkt', 'Field'], datasets: [{ data: [chartData.fusion||0, chartData.dsog||0, chartData.brandinn||0, chartData.heritageAds||0, chartData.heritageMkt||0, chartData.field||0], backgroundColor: ['#10b981','#ec4899','#7c3aed','#d946ef','#d97706','#3b82f6'], borderWidth: 2, borderColor: '#fff' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { padding: 8, usePointStyle: true, font: { size: 8 } } } } }
            }); embeddedCharts.push(chart);
        }

        function embedHourlyChart(hourlyBins, peakHour) {
            const container = document.getElementById('blogHourlyChartEmbed'); if (!container) return;
            const canvas = container.querySelector('canvas'); if (!canvas) return;
            const labels = hourlyBins.map((_, i) => `${i}:00`);
            const bgColors = hourlyBins.map((_, i) => i === peakHour ? 'rgba(239,68,68,0.7)' : 'rgba(202,138,4,0.35)');
            const chart = new Chart(canvas.getContext('2d'), { type: 'bar', data: { labels, datasets: [{ label: 'Operations', data: hourlyBins, backgroundColor: bgColors, borderColor: bgColors, borderWidth: 1, borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 8 } }, grid: { color: '#f3f4f6' } }, x: { ticks: { font: { size: 7 }, maxTicksLimit: 12 }, grid: { display: false } } } } });
            embeddedCharts.push(chart);
        }

        function embedMap(fieldRegsArray) {
            const container = document.getElementById('blogMapEmbed'); if (!container || !fieldRegsArray || fieldRegsArray.length === 0) return;
            embeddedMap = L.map('blogMapEmbed', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(embeddedMap);
            const bounds = []; const colors = { brandinn: '#7c3aed', deliveries: '#f59e0b', rides: '#22c55e', dsog: '#ec4899', fusion: '#10b981', heritage: '#d946ef' };
            fieldRegsArray.forEach(r => { if (r.lat && r.lng) { L.circleMarker([r.lat, r.lng], { radius: 3, fillColor: colors[r.operation] || '#ca8a04', color: '#fff', weight: 0.5, fillOpacity: 0.8 }).addTo(embeddedMap); bounds.push([r.lat, r.lng]); } });
            if (bounds.length > 0) embeddedMap.fitBounds(bounds, { padding: [15, 15], maxZoom: 15 }); else embeddedMap.setView([-1.2864, 36.8172], 7);
        }

        function cleanupCharts() { embeddedCharts.forEach(c => { try { c.destroy(); } catch(e) {} }); embeddedCharts = []; if (embeddedMap) { try { embeddedMap.remove(); } catch(e) {} embeddedMap = null; } }

        function generateTitle(total, field, fusion, dsog, brandinn, heritageMkt) {
            const parts = [];
            if (fusion > 0) parts.push(`${fusion} Food Orders`); if (dsog > 0) parts.push(`${dsog} Fashion Orders`);
            if (brandinn > 0) parts.push(`${brandinn} Print Jobs`); if (heritageMkt > 0) parts.push(`${heritageMkt} Mkt Orders`);
            if (field > 0) parts.push(`${field} Field Registrations`);
            if (parts.length === 0) return 'A Quiet Day at the Operations Hub';
            if (parts.length === 1) return parts[0] + ' Processed Today';
            return parts.slice(0, 2).join(' & ') + ` — ${total} Total Operations`;
        }

        function generateSubtitle(total, contributors) {
            const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
            return `Daily operations summary for ${today} · ${contributors} team member${contributors !== 1 ? 's' : ''} contributed`;
        }

        function generateBlogContent(fusion, dsog, brandinn, heritageAds, heritageMkt, field, contributors, hourlyBins, peakHour, peakCount, systemLoad, trend, predictedTomorrow, totalOps, fusionRestaurants, fusionValue, fusionDelivered, heritageMktCustomers, heritageMktValue, fieldOps, yesterdayTotal) {
            let html = ''; const fieldCount = field.length;
            html += `<p>Welcome to today's edition of the <strong>KazInni Operations Blog</strong>, your daily digest across all business workspaces from <strong>midnight to 11:59 PM EAT</strong>.</p>`;
            if (totalOps === 0 && fieldCount === 0) {
                html += `<p>Today was a <span class="stat-inline gold">quiet day</span> across all workspaces.</p><div class="highlight-box">📊 All systems remain fully operational.</div>`; return html;
            }
            html += `<h2>📋 Executive Summary</h2>`;
            html += `<p>Today, KazInni processed <span class="stat-inline gold">${totalOps} operations</span> under <span class="stat-inline ${systemLoad==='high'?'rose':systemLoad==='moderate'?'gold':'green'}">${systemLoad.toUpperCase()} LOAD</span>. Peak: <span class="stat-inline rose">${peakHour}:00 (${peakCount} ops)</span>. Field: <span class="stat-inline green">${fieldCount} registrations</span>.</p>`;
            html += `<p>vs yesterday (${yesterdayTotal||'N/A'}): <span class="stat-inline ${trend==='increasing'?'green':trend==='decreasing'?'rose':'gold'}">${trend}</span>. Predicted tomorrow: <span class="stat-inline blue">~${predictedTomorrow} ops</span>.</p>`;
            html += `<h2>⚡ System Performance</h2><p>Avg <span class="stat-inline blue">${(totalOps/24).toFixed(1)} ops/hr</span>. Peak at ${peakHour}:00.</p>`;
            html += `<div class="blog-chart-embed" id="blogHourlyChartEmbed"><canvas></canvas><div class="chart-label">Figure 1: Hourly Load — Peak at ${peakHour}:00 (${peakCount} ops)</div></div>`;
            if (peakCount > 10) html += `<div class="highlight-box warning">⚠️ ${peakCount} ops at ${peakHour}:00 — monitor for queuing.</div>`;
            else if (peakCount > 5) html += `<div class="highlight-box info">📈 ${peakCount} ops at ${peakHour}:00 — healthy utilization.</div>`;
            else html += `<div class="highlight-box success">✅ Light load — system well within capacity.</div>`;

            // Fusion Foods
            html += `<h2>🍽️ Fusion Foods</h2>`;
            if (fusion.length === 0) html += `<p>No orders today.</p>`;
            else { html += `<p><span class="stat-inline green">${fusion.length} orders</span> for <span class="stat-inline gold">${fusionRestaurants.size} restaurants</span> (KES ${fusionValue.toLocaleString()}). <span class="stat-inline green">${fusionDelivered} delivered</span>.</p>`; if (fusionRestaurants.size <= 6) html += `<p>Partners: <strong>${[...fusionRestaurants].map(r=>escapeHtml(r)).join(', ')}</strong>.</p>`; }

            // DSOG
            html += `<h2>👗 DSOG Fashion</h2>`;
            html += dsog.length === 0 ? `<p>No orders today.</p>` : `<p><span class="stat-inline purple">${dsog.length} orders</span> processed.</p>`;

            // BrandInn
            html += `<h2>🖨️ BrandInn Print</h2>`;
            html += brandinn.length === 0 ? `<p>No orders today.</p>` : `<p><span class="stat-inline purple">${brandinn.length} print orders</span> completed.</p>`;

            // Heritage Ads
            html += `<h2>🏛️ Heritage Ads</h2>`;
            html += heritageAds.length === 0 ? `<p>No listings today.</p>` : `<p><span class="stat-inline green">${heritageAds.length} new listings</span>.</p>`;

            // Heritage Marketplace
            html += `<h2>🛒 Heritage Marketplace</h2>`;
            if (heritageMkt.length === 0) html += `<p>No orders today.</p>`;
            else { html += `<p><span class="stat-inline amber">${heritageMkt.length} orders</span> for <span class="stat-inline gold">${heritageMktCustomers.size} customers</span> (KES ${heritageMktValue.toLocaleString()}).</p>`; }

            // Field Ops
            html += `<h2>📍 Field Operations</h2>`;
            if (fieldCount === 0) html += `<p>No registrations today.</p>`;
            else { html += `<p><span class="stat-inline gold">${fieldCount} locations</span> mapped.</p>`; html += `<div class="blog-map-embed" id="blogMapEmbed"></div><div class="chart-label">Figure 2: Field Registrations Map</div>`; }

            // Workspace Distribution
            html += `<h2>📊 Workspace Distribution</h2><div class="blog-chart-embed" id="blogChartEmbed"><canvas></canvas><div class="chart-label">Figure 3: Operations by Workspace</div></div>`;

            // Team
            if (contributors.length > 0) { html += `<h2>👥 Team</h2><p><span class="stat-inline blue">${contributors.length} contributors</span>: ${contributors.map(c=>`<span class="team-mention"><i class="fas fa-user-circle"></i> ${escapeHtml(c)}</span>`).join(' ')}</p>`; }

            // Predictions
            html += `<h2>🔮 Tomorrow</h2><p>Forecast: <span class="stat-inline blue">~${predictedTomorrow} ops</span> (${trend} trend).</p>`;
            if (predictedTomorrow > 30) html += `<div class="highlight-box danger">🔴 High volume expected.</div>`;
            else if (predictedTomorrow > 10) html += `<div class="highlight-box info">🔵 Moderate day ahead.</div>`;
            else html += `<div class="highlight-box success">🟢 Light day — good for maintenance.</div>`;

            html += `<h2>📝 Closing</h2><p>Auto-generated at ${new Date().toLocaleTimeString()}. See <a href="analytics.html" style="color:var(--gold);">Analytics</a> or <a href="reports.html" style="color:var(--gold);">Reports</a>.</p>`;
            html += `<div class="highlight-box">📊 Today: ${totalOps} ops · ${fieldCount} field · ${systemLoad.toUpperCase()} load · Peak ${peakHour}:00 · ${contributors.length} contributors · ~${predictedTomorrow} tomorrow</div>`;
            return html;
        }

        window.regenerateToday = async function() { cleanupCharts(); document.getElementById('skeletonState').style.display='block'; document.getElementById('liveState').style.display='none'; const today=new Date().toISOString().split('T')[0]; await generateTodayPost(today); revealContent(); };
        function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }
        window.handleLogout = async () => { if (confirm('Sign out?')) { await auth.signOut(); window.location.href = 'index.html'; } };
    </script>
</body>
</html>
