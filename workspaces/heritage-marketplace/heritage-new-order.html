<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>New Order | Heritage Marketplace</title>
  
  <meta name="theme-color" content="#d97706">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --amber: #d97706;
      --amber-dark: #92400e;
      --amber-light: #fbbf24;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #fde68a;
      --red: #ef4444;
      --green: #10b981;
      --blue: #3b82f6;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #fffbeb 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 6px;
    }
    .skeleton-text { height: 1rem; margin-bottom: 0.5rem; }
    .skeleton-text-sm { height: 0.7rem; width: 60%; }
    .skeleton-input { height: 42px; border-radius: 10px; margin-bottom: 0.7rem; }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(217, 119, 6, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(217, 119, 6, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #fbbf24, #d97706);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #92400e; -webkit-text-fill-color: #92400e; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(217, 119, 6, 0.08); border: 1px solid rgba(217, 119, 6, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--amber-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--amber); color: white; }
    .nav-btn.active { background: var(--amber); color: white; border-color: var(--amber-dark); }

    .container { padding: 1rem 2%; flex: 1; max-width: 700px; margin: 0 auto; width: 100%; }

    .page-header { margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--amber-dark); margin-right: 6px; }

    .form-card {
      background: white; border-radius: 20px; padding: 1.8rem;
      border: 1px solid var(--border-light); box-shadow: 0 4px 16px rgba(217,119,6,0.05);
    }

    .form-section { margin-bottom: 1.5rem; }
    .form-section-title {
      font-size: 0.8rem; font-weight: 700; color: var(--amber-dark);
      margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-light);
    }
    .form-section-title i { color: var(--amber); }

    .form-group { margin-bottom: 0.8rem; }
    .form-group label {
      display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.2rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.55rem 0.8rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.85rem; font-family: 'Inter', sans-serif;
      background: #f8fafc; transition: all 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px rgba(217,119,6,0.1);
    }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

    .btn {
      padding: 0.65rem 1.5rem; border-radius: 12px; border: none; font-weight: 700;
      font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 6px; font-family: inherit; transition: all 0.2s; white-space: nowrap;
    }
    .btn-primary { background: var(--amber); color: white; box-shadow: 0 4px 15px rgba(217,119,6,0.2); }
    .btn-primary:hover { background: var(--amber-dark); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-row { display: flex; gap: 10px; margin-top: 1.2rem; justify-content: flex-end; }

    .product-preview {
      background: #fffbeb; border: 1px dashed var(--amber);
      border-radius: 12px; padding: 0.8rem 1rem; margin-top: 0.5rem;
      display: none; font-size: 0.75rem;
    }
    .product-preview.show { display: block; }
    .product-preview strong { color: var(--amber-dark); }

    .success-card {
      text-align: center; padding: 3rem 2rem;
    }
    .success-card i {
      font-size: 4rem; color: var(--green); display: block; margin-bottom: 1rem;
    }
    .success-card h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    .success-card p { color: var(--text-muted); margin-bottom: 1.5rem; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--amber); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(217,119,6,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) {
      .form-row { grid-template-columns: 1fr; }
      .container { padding: 0.8rem; }
      .form-card { padding: 1.2rem; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/workspaces/heritage-marketplace/index.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Heritage" class="logo-img">
      <span class="logo-text">Heritage <span>Marketplace</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/heritage-marketplace/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="/workspaces/heritage-marketplace/heritage-partners.html" class="nav-btn"><i class="fas fa-handshake"></i> Partners</a>
      <a href="/workspaces/heritage-marketplace/heritage-products.html" class="nav-btn"><i class="fas fa-box"></i> Catalogue</a>
      <a href="/workspaces/heritage-marketplace/heritage-products-manage.html" class="nav-btn"><i class="fas fa-tags"></i> Manage Products</a>
      <a href="/workspaces/heritage-marketplace/heritage-orders.html" class="nav-btn"><i class="fas fa-shopping-cart"></i> Orders</a>
      <a href="/workspaces/heritage-marketplace/heritage-catalogues.html" class="nav-btn"><i class="fas fa-images"></i> Catalogues</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-cart-plus"></i> New Order</h1>
      <a href="/workspaces/heritage-marketplace/heritage-orders.html" class="btn btn-secondary"><i class="fas fa-list"></i> View Orders</a>
    </div>

    <!-- Form with Skeleton -->
    <div class="form-card" id="formCard">
      <div id="skeletonForm">
        <div style="margin-bottom:1.5rem;"><div class="skeleton skeleton-text" style="width:40%;"></div></div>
        <div class="skeleton skeleton-input"></div>
        <div class="skeleton skeleton-input"></div>
        <div class="form-row">
          <div class="skeleton skeleton-input"></div>
          <div class="skeleton skeleton-input"></div>
        </div>
        <div style="margin-bottom:1.5rem;margin-top:1rem;"><div class="skeleton skeleton-text" style="width:40%;"></div></div>
        <div class="skeleton skeleton-input"></div>
        <div class="skeleton skeleton-input"></div>
        <div class="form-row">
          <div class="skeleton skeleton-input"></div>
          <div class="skeleton skeleton-input"></div>
        </div>
      </div>

      <form id="orderForm" style="display:none;" onsubmit="submitOrder(event)">
        <!-- Customer Section -->
        <div class="form-section">
          <div class="form-section-title"><i class="fas fa-user"></i> Customer Information</div>
          <div class="form-row">
            <div class="form-group">
              <label>Customer Name *</label>
              <input type="text" id="customerName" placeholder="Full name" required>
            </div>
            <div class="form-group">
              <label>Phone Number *</label>
              <input type="text" id="customerPhone" placeholder="+254 7XX XXX XXX" required>
            </div>
          </div>
          <div class="form-group">
            <label>Customer Location</label>
            <input type="text" id="customerLocation" placeholder="Delivery area or estate">
          </div>
        </div>

        <!-- Product Section -->
        <div class="form-section">
          <div class="form-section-title"><i class="fas fa-box"></i> Product Details</div>
          <div class="form-group">
            <label>Select Product *</label>
            <select id="productSelect" onchange="updateProductPreview()" required>
              <option value="">— Choose a product —</option>
            </select>
          </div>
          <div class="product-preview" id="productPreview">
            <strong id="previewName"></strong><br>
            <span id="previewPartner"></span><br>
            <span id="previewPrice"></span> · <span id="previewStock"></span>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Quantity *</label>
              <input type="number" id="quantity" value="1" min="1" required>
            </div>
            <div class="form-group">
              <label>Total Price (KES)</label>
              <input type="number" id="totalPrice" value="0" min="0" placeholder="Auto-calculated">
            </div>
          </div>
          <div class="form-group">
            <label>Order Notes</label>
            <textarea id="orderNotes" rows="2" placeholder="Any special instructions..."></textarea>
          </div>
        </div>

        <div class="btn-row">
          <button type="button" class="btn btn-secondary" onclick="resetForm()"><i class="fas fa-undo"></i> Reset</button>
          <button type="submit" class="btn btn-primary" id="submitBtn"><i class="fas fa-save"></i> Place Order</button>
        </div>
      </form>

      <!-- Success State -->
      <div id="successState" style="display:none;">
        <div class="success-card">
          <i class="fas fa-check-circle"></i>
          <h2>Order Placed Successfully!</h2>
          <p id="successMessage">The order has been logged and is ready for linking.</p>
          <div class="btn-row" style="justify-content:center;">
            <button class="btn btn-primary" onclick="placeAnother()"><i class="fas fa-plus"></i> Place Another Order</button>
            <a href="/workspaces/heritage-marketplace/heritage-orders.html" class="btn btn-secondary"><i class="fas fa-list"></i> View All Orders</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allProducts = {};
    let allPartners = {};

    function showToast(msg, isError = false) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
    }

    function getPartnerName(partnerId) {
      if (!partnerId) return 'No Partner';
      const partner = allPartners[partnerId];
      return partner ? (partner.businessName || partner.name || 'Partner') : partnerId;
    }

    function populateProductSelect() {
      const select = document.getElementById('productSelect');
      const products = Object.entries(allProducts)
        .filter(([_, p]) => p && p.isActive !== false)
        .sort((a, b) => (a[1].name || '').localeCompare(b[1].name || ''));

      select.innerHTML = '<option value="">— Choose a product —</option>' +
        products.map(([id, p]) => {
          const partnerName = getPartnerName(p.partnerId);
          return `<option value="${id}" data-price="${p.price || 0}" data-partner="${escapeHtml(partnerName)}" data-stock="${p.stock || p.quantity || 0}">${escapeHtml(p.name)} — KES ${(p.price || 0).toLocaleString()} (${escapeHtml(partnerName)})</option>`;
        }).join('');
    }

    function updateProductPreview() {
      const select = document.getElementById('productSelect');
      const preview = document.getElementById('productPreview');
      const totalInput = document.getElementById('totalPrice');
      const qtyInput = document.getElementById('quantity');

      if (!select.value) {
        preview.classList.remove('show');
        totalInput.value = 0;
        return;
      }

      const option = select.options[select.selectedIndex];
      const price = parseInt(option.dataset.price) || 0;
      const partner = option.dataset.partner || 'N/A';
      const stock = parseInt(option.dataset.stock) || 0;
      const qty = parseInt(qtyInput.value) || 1;

      document.getElementById('previewName').textContent = option.text.split(' — ')[0];
      document.getElementById('previewPartner').textContent = '🏪 ' + partner;
      document.getElementById('previewPrice').textContent = '💰 KES ' + price.toLocaleString() + '/unit';
      document.getElementById('previewStock').textContent = stock <= 0 ? '⚠️ Out of Stock' : stock <= 5 ? '📦 Low Stock: ' + stock : '📦 Stock: ' + stock;
      document.getElementById('previewStock').style.color = stock <= 0 ? '#ef4444' : stock <= 5 ? '#f59e0b' : '#10b981';

      totalInput.value = price * qty;
      preview.classList.add('show');
    }

    async function submitOrder(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      
      const customerName = document.getElementById('customerName').value.trim();
      const customerPhone = document.getElementById('customerPhone').value.trim();
      const productId = document.getElementById('productSelect').value;
      const quantity = parseInt(document.getElementById('quantity').value) || 1;
      const total = parseInt(document.getElementById('totalPrice').value) || 0;
      const notes = document.getElementById('orderNotes').value.trim();
      const customerLocation = document.getElementById('customerLocation').value.trim();

      if (!customerName || !customerPhone || !productId) {
        showToast('Please fill in all required fields', true);
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Placing Order...';

      try {
        const product = allProducts[productId];
        await database.ref('heritage_orders').push().set({
          customerName,
          customerPhone,
          customerLocation,
          productId,
          productName: product?.name || '',
          partnerId: product?.partnerId || '',
          quantity,
          total,
          notes,
          status: 'new',
          createdAt: firebase.database.ServerValue.TIMESTAMP,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });

        document.getElementById('orderForm').style.display = 'none';
        document.getElementById('successState').style.display = 'block';
        document.getElementById('successMessage').textContent = 
          `Order for "${customerName}" — ${quantity}x ${product?.name || 'Product'} (KES ${total.toLocaleString()}) has been logged successfully.`;
        
        showToast('✅ Order placed successfully!');
      } catch (e) {
        showToast('Failed to place order: ' + e.message, true);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Place Order';
      }
    }

    function resetForm() {
      document.getElementById('orderForm').reset();
      document.getElementById('productPreview').classList.remove('show');
      document.getElementById('totalPrice').value = 0;
    }

    function placeAnother() {
      document.getElementById('orderForm').style.display = 'block';
      document.getElementById('successState').style.display = 'none';
      resetForm();
    }

    // Quantity change updates total
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('quantity').addEventListener('input', () => {
        const select = document.getElementById('productSelect');
        if (select.value) {
          const price = parseInt(select.options[select.selectedIndex].dataset.price) || 0;
          const qty = parseInt(document.getElementById('quantity').value) || 1;
          document.getElementById('totalPrice').value = price * qty;
        }
      });
    });

    // Firebase listeners
    database.ref('heritage_products').on('value', (snapshot) => {
      allProducts = snapshot.val() || {};
      populateProductSelect();
      // Show form once data is loaded
      document.getElementById('skeletonForm').style.display = 'none';
      document.getElementById('orderForm').style.display = 'block';
    });

    database.ref('heritage_partners').on('value', (snapshot) => {
      allPartners = snapshot.val() || {};
      populateProductSelect();
    });

    auth.onAuthStateChanged((user) => { if (!user) window.location.href = '/workspaces/index.html'; });

    window.submitOrder = submitOrder;
    window.resetForm = resetForm;
    window.placeAnother = placeAnother;
    window.updateProductPreview = updateProductPreview;
  </script>
</body>
</html>
