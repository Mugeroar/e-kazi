
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Product Management | Heritage Marketplace</title>
  
  <meta name="theme-color" content="#d97706">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --amber: #d97706;
      --amber-dark: #92400e;
      --amber-light: #fbbf24;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #fde68a;
      --red: #ef4444;
      --green: #10b981;
      --blue: #3b82f6;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #fffbeb 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 6px;
    }
    .skeleton-text { height: 1rem; margin-bottom: 0.5rem; }
    .skeleton-text-sm { height: 0.7rem; width: 60%; }
    .skeleton-image { height: 70px; width: 70px; border-radius: 12px; }
    .skeleton-badge { height: 22px; width: 60px; border-radius: 8px; }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(217, 119, 6, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(217, 119, 6, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #fbbf24, #d97706);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #92400e; -webkit-text-fill-color: #92400e; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(217, 119, 6, 0.08); border: 1px solid rgba(217, 119, 6, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--amber-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--amber); color: white; }
    .nav-btn.active { background: var(--amber); color: white; border-color: var(--amber-dark); }

    .container { padding: 1rem 2%; flex: 1; }

    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--amber-dark); margin-right: 6px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-mini {
      background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
      border: 1px solid var(--border-light); box-shadow: 0 2px 8px rgba(217,119,6,0.03);
    }
    .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--amber-dark); line-height: 1.1; }
    .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    .filter-btn {
      padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0;
      background: white; color: #64748b; font-weight: 600; font-size: 0.65rem;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--amber); color: var(--amber-dark); }
    .filter-btn.active { background: var(--amber); color: white; border-color: var(--amber); }
    .search-box { flex: 1; min-width: 150px; max-width: 300px; position: relative; }
    .search-box input {
      width: 100%; padding: 0.35rem 0.8rem 0.35rem 2rem; border-radius: 20px;
      border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif;
    }
    .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.7rem; }

    .btn {
      padding: 0.5rem 1rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; font-family: inherit; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--amber); color: white; }
    .btn-primary:hover { background: var(--amber-dark); }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }

    .product-card {
      background: white; border-radius: 16px; padding: 1.2rem;
      border: 1px solid var(--border-light); box-shadow: 0 3px 12px rgba(217,119,6,0.03);
      transition: all 0.25s; display: flex; gap: 1rem;
    }
    .product-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(217,119,6,0.1); }
    
    .product-image {
      width: 70px; height: 70px; border-radius: 12px; background: #fffbeb;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; flex-shrink: 0; overflow: hidden;
      border: 2px solid #fde68a;
    }
    .product-image img { width: 100%; height: 100%; object-fit: cover; }
    
    .product-info { flex: 1; }
    .product-info h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.3rem; }
    .product-partner {
      font-size: 0.65rem; color: var(--amber-dark); background: #fffbeb;
      padding: 0.15rem 0.5rem; border-radius: 6px; display: inline-block; margin-bottom: 0.4rem;
    }
    .product-details { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 0.65rem; margin-bottom: 0.5rem; }
    .product-details div { color: var(--text-muted); }
    .product-details strong { color: var(--text-primary); display: block; font-size: 0.55rem; text-transform: uppercase; }

    .product-actions { display: flex; gap: 4px; flex-wrap: wrap; }
    .btn-sm {
      padding: 0.3rem 0.6rem; border-radius: 8px; border: none; font-weight: 600;
      font-size: 0.6rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 3px; transition: all 0.15s; font-family: inherit;
    }
    .btn-edit { background: #fffbeb; color: #92400e; }
    .btn-edit:hover { background: #d97706; color: white; }
    .btn-delete { background: #fee2e2; color: #991b1b; }
    .btn-delete:hover { background: #ef4444; color: white; }

    .empty-state { text-align: center; padding: 3rem; color: #94a3b8; grid-column: 1 / -1; }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
      align-items: center; backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 20px; padding: 1.5rem; max-width: 550px;
      width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; color: var(--amber-dark); }
    .form-group { margin-bottom: 0.7rem; }
    .form-group label {
      display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
      background: #f8fafc; transition: all 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px rgba(217,119,6,0.1);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--amber); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(217,119,6,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/workspaces/heritage-marketplace/heritage-dashboard.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Heritage" class="logo-img">
      <span class="logo-text">Heritage <span>Marketplace</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/heritage-marketplace/heritage-dashboard.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="/workspaces/heritage-marketplace/heritage-partners.html" class="nav-btn"><i class="fas fa-handshake"></i> Partners</a>
      <a href="/workspaces/heritage-marketplace/heritage-products.html" class="nav-btn"><i class="fas fa-box"></i> Catalogue</a>
      <a href="/workspaces/heritage-marketplace/heritage-products-manage.html" class="nav-btn active"><i class="fas fa-tags"></i> Manage Products</a>
      <a href="/workspaces/heritage-marketplace/heritage-orders.html" class="nav-btn"><i class="fas fa-shopping-cart"></i> Orders</a>
      <a href="/workspaces/heritage-marketplace/heritage-catalogues.html" class="nav-btn"><i class="fas fa-images"></i> Catalogues</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-tags"></i> Product Management</h1>
      <button class="btn btn-primary" onclick="showAddModal()"><i class="fas fa-plus"></i> Add Product</button>
    </div>

    <!-- Stats Row with Skeleton -->
    <div class="stats-row" id="statsRow">
      <div class="stat-mini"><div class="skeleton" style="height:1.4rem;width:50%;margin:0 auto 0.3rem;"></div><div class="skeleton" style="height:0.6rem;width:60%;margin:0 auto;"></div></div>
      <div class="stat-mini"><div class="skeleton" style="height:1.4rem;width:50%;margin:0 auto 0.3rem;"></div><div class="skeleton" style="height:0.6rem;width:60%;margin:0 auto;"></div></div>
      <div class="stat-mini"><div class="skeleton" style="height:1.4rem;width:50%;margin:0 auto 0.3rem;"></div><div class="skeleton" style="height:0.6rem;width:60%;margin:0 auto;"></div></div>
      <div class="stat-mini"><div class="skeleton" style="height:1.4rem;width:50%;margin:0 auto 0.3rem;"></div><div class="skeleton" style="height:0.6rem;width:60%;margin:0 auto;"></div></div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All Products</button>
      <button class="filter-btn" data-filter="active">✅ Active</button>
      <button class="filter-btn" data-filter="inactive">❌ Inactive</button>
      <button class="filter-btn" data-filter="out-of-stock">📦 Out of Stock</button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search by name, partner, or SKU...">
      </div>
    </div>

    <!-- Products Grid with Skeleton -->
    <div class="cards-grid" id="productsGrid">
      <div style="display:flex;gap:1rem;padding:1.2rem;background:white;border-radius:16px;border:1px solid #f3f4f6;">
        <div class="skeleton skeleton-image"></div>
        <div style="flex:1;"><div class="skeleton skeleton-text" style="width:60%;"></div><div class="skeleton skeleton-badge"></div><div class="skeleton skeleton-text-sm" style="width:80%;margin-top:0.5rem;"></div><div class="skeleton skeleton-text-sm" style="width:50%;"></div></div>
      </div>
      <div style="display:flex;gap:1rem;padding:1.2rem;background:white;border-radius:16px;border:1px solid #f3f4f6;">
        <div class="skeleton skeleton-image"></div>
        <div style="flex:1;"><div class="skeleton skeleton-text" style="width:55%;"></div><div class="skeleton skeleton-badge"></div><div class="skeleton skeleton-text-sm" style="width:75%;margin-top:0.5rem;"></div><div class="skeleton skeleton-text-sm" style="width:45%;"></div></div>
      </div>
      <div style="display:flex;gap:1rem;padding:1.2rem;background:white;border-radius:16px;border:1px solid #f3f4f6;">
        <div class="skeleton skeleton-image"></div>
        <div style="flex:1;"><div class="skeleton skeleton-text" style="width:65%;"></div><div class="skeleton skeleton-badge"></div><div class="skeleton skeleton-text-sm" style="width:70%;margin-top:0.5rem;"></div><div class="skeleton skeleton-text-sm" style="width:55%;"></div></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allProducts = {};
    let allPartners = {};
    let currentFilter = 'all';
    let searchQuery = '';

    function showToast(msg, isError = false) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
    }

    function getPartnerName(partnerId) {
      if (!partnerId) return 'No Partner';
      const partner = allPartners[partnerId];
      return partner ? (partner.businessName || partner.name || 'Partner') : partnerId;
    }

    function updateStats() {
      const products = Object.values(allProducts);
      const total = products.length;
      const active = products.filter(p => p.isActive !== false).length;
      const inactive = products.filter(p => p.isActive === false).length;
      const outOfStock = products.filter(p => (p.stock || p.quantity || 0) <= 0).length;

      document.getElementById('statsRow').innerHTML = 
        `<div class="stat-mini"><div class="stat-num">${total}</div><div class="stat-label">Total Products</div></div>` +
        `<div class="stat-mini"><div class="stat-num">${active}</div><div class="stat-label">Active</div></div>` +
        `<div class="stat-mini"><div class="stat-num">${inactive}</div><div class="stat-label">Inactive</div></div>` +
        `<div class="stat-mini"><div class="stat-num">${outOfStock}</div><div class="stat-label">Out of Stock</div></div>`;
    }

    function renderProducts() {
      const grid = document.getElementById('productsGrid');
      let products = Object.entries(allProducts).map(([id, data]) => ({ id, ...data }));

      if (currentFilter === 'active') {
        products = products.filter(p => p.isActive !== false);
      } else if (currentFilter === 'inactive') {
        products = products.filter(p => p.isActive === false);
      } else if (currentFilter === 'out-of-stock') {
        products = products.filter(p => (p.stock || p.quantity || 0) <= 0);
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        products = products.filter(p => 
          (p.name || '').toLowerCase().includes(q) ||
          getPartnerName(p.partnerId).toLowerCase().includes(q) ||
          (p.sku || '').toLowerCase().includes(q)
        );
      }

      if (!products.length) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-box-open" style="font-size:2rem;display:block;margin-bottom:8px;opacity:0.4;"></i><p>No products found</p></div>';
        return;
      }

      grid.innerHTML = products.map(p => {
        const partnerName = getPartnerName(p.partnerId);
        const imageUrl = p.imageUrl || '';
        const icon = imageUrl ? '' : '📦';
        const qty = p.stock || p.quantity || 0;
        const stockLabel = qty <= 0 ? 'Out of Stock' : qty <= 5 ? 'Low Stock' : 'In Stock';
        const stockColor = qty <= 0 ? '#ef4444' : qty <= 5 ? '#f59e0b' : '#10b981';

        return `
          <div class="product-card">
            <div class="product-image">
              ${imageUrl ? `<img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(p.name)}" onerror="this.style.display='none';this.parentElement.innerHTML='📦';">` : icon}
            </div>
            <div class="product-info">
              <h3>${escapeHtml(p.name || 'Product')}</h3>
              <span class="product-partner"><i class="fas fa-handshake"></i> ${escapeHtml(partnerName)}</span>
              <div class="product-details">
                <div><strong>Price</strong>KES ${(p.price || 0).toLocaleString()}</div>
                <div><strong>Stock</strong><span style="color:${stockColor};font-weight:600;">${qty} ${p.unit || 'units'}</span></div>
                <div><strong>SKU</strong>${p.sku || 'N/A'}</div>
                <div><strong>Status</strong>${p.isActive !== false ? '✅ Active' : '❌ Inactive'}</div>
              </div>
              ${p.description ? `<p style="font-size:0.65rem;color:var(--text-muted);margin-bottom:0.5rem;">${escapeHtml(p.description.substring(0, 60))}${p.description.length > 60 ? '...' : ''}</p>` : ''}
              <div class="product-actions">
                <button class="btn-sm btn-edit" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn-sm btn-delete" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i> Delete</button>
              </div>
            </div>
          </div>`;
      }).join('');

      updateStats();
    }

    function showAddModal() {
      const partners = Object.entries(allPartners).filter(([_, p]) => p && (p.businessName || p.name));
      
      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-plus-circle"></i> Add Product</h3>
        <div class="form-group"><label>Product Name *</label><input type="text" id="pName" placeholder="e.g., Leather Handbag"></div>
        <div class="form-row">
          <div class="form-group"><label>Business Partner *</label><select id="pPartnerId">
            <option value="">— Select Partner —</option>
            ${partners.map(([id, p]) => `<option value="${id}">${escapeHtml(p.businessName || p.name)}</option>`).join('')}
          </select></div>
          <div class="form-group"><label>SKU</label><input type="text" id="pSku" placeholder="Product code"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Price (KES) *</label><input type="number" id="pPrice" value="0" min="0"></div>
          <div class="form-group"><label>Stock Quantity</label><input type="number" id="pStock" value="1" min="0"></div>
        </div>
        <div class="form-group"><label>Unit</label><input type="text" id="pUnit" placeholder="e.g., piece, kg, pair"></div>
        <div class="form-group"><label>Description</label><textarea id="pDescription" rows="2" placeholder="Product description..."></textarea></div>
        <div class="form-group"><label>Image URL</label><input type="text" id="pImageUrl" placeholder="https://... (optional)"></div>
        <div class="form-group">
          <label><input type="checkbox" id="pActive" checked style="width:auto;margin-right:6px;"> Active (visible in catalogues)</label>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveProduct()"><i class="fas fa-save"></i> Save Product</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    async function saveProduct() {
      const name = document.getElementById('pName').value.trim();
      const partnerId = document.getElementById('pPartnerId').value;
      const price = parseInt(document.getElementById('pPrice').value) || 0;

      if (!name) { showToast('Product name is required', true); return; }
      if (!partnerId) { showToast('Select a business partner', true); return; }

      try {
        await database.ref('heritage_products').push().set({
          name,
          partnerId,
          sku: document.getElementById('pSku').value.trim(),
          price,
          stock: parseInt(document.getElementById('pStock').value) || 0,
          unit: document.getElementById('pUnit').value.trim(),
          description: document.getElementById('pDescription').value.trim(),
          imageUrl: document.getElementById('pImageUrl').value.trim(),
          isActive: document.getElementById('pActive').checked,
          createdAt: firebase.database.ServerValue.TIMESTAMP,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('✅ Product added!');
        closeModal();
      } catch (e) { showToast('Failed to save', true); }
    }

    function editProduct(productId) {
      const p = allProducts[productId];
      if (!p) return;
      const partners = Object.entries(allPartners).filter(([_, p]) => p && (p.businessName || p.name));

      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-edit"></i> Edit Product</h3>
        <div class="form-group"><label>Product Name</label><input type="text" id="epName" value="${escapeHtml(p.name || '')}"></div>
        <div class="form-row">
          <div class="form-group"><label>Business Partner</label><select id="epPartnerId">
            ${partners.map(([id, pt]) => `<option value="${id}" ${p.partnerId === id ? 'selected' : ''}>${escapeHtml(pt.businessName || pt.name)}</option>`).join('')}
          </select></div>
          <div class="form-group"><label>SKU</label><input type="text" id="epSku" value="${escapeHtml(p.sku || '')}"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Price (KES)</label><input type="number" id="epPrice" value="${p.price || 0}"></div>
          <div class="form-group"><label>Stock</label><input type="number" id="epStock" value="${p.stock || p.quantity || 0}"></div>
        </div>
        <div class="form-group"><label>Unit</label><input type="text" id="epUnit" value="${escapeHtml(p.unit || '')}"></div>
        <div class="form-group"><label>Description</label><textarea id="epDescription" rows="2">${escapeHtml(p.description || '')}</textarea></div>
        <div class="form-group"><label>Image URL</label><input type="text" id="epImageUrl" value="${escapeHtml(p.imageUrl || '')}"></div>
        <div class="form-group">
          <label><input type="checkbox" id="epActive" ${p.isActive !== false ? 'checked' : ''} style="width:auto;margin-right:6px;"> Active</label>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="updateProduct('${productId}')"><i class="fas fa-save"></i> Update</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    async function updateProduct(productId) {
      try {
        await database.ref(`heritage_products/${productId}`).update({
          name: document.getElementById('epName').value.trim(),
          partnerId: document.getElementById('epPartnerId').value,
          sku: document.getElementById('epSku').value.trim(),
          price: parseInt(document.getElementById('epPrice').value) || 0,
          stock: parseInt(document.getElementById('epStock').value) || 0,
          unit: document.getElementById('epUnit').value.trim(),
          description: document.getElementById('epDescription').value.trim(),
          imageUrl: document.getElementById('epImageUrl').value.trim(),
          isActive: document.getElementById('epActive').checked,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('✅ Updated!');
        closeModal();
      } catch (e) { showToast('Failed to update', true); }
    }

    async function deleteProduct(productId) {
      if (!confirm('Delete this product?')) return;
      try {
        await database.ref(`heritage_products/${productId}`).remove();
        showToast('✅ Deleted');
      } catch (e) { showToast('Failed to delete', true); }
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    // Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderProducts();
      });
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderProducts();
    });

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal')) closeModal();
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    // Firebase listeners
    database.ref('heritage_products').on('value', (snapshot) => {
      allProducts = snapshot.val() || {};
      renderProducts();
    });

    database.ref('heritage_partners').on('value', (snapshot) => {
      allPartners = snapshot.val() || {};
      renderProducts();
    });

    auth.onAuthStateChanged((user) => { if (!user) window.location.href = '/workspaces/index.html'; });

    window.showAddModal = showAddModal;
    window.editProduct = editProduct;
    window.deleteProduct = deleteProduct;
    window.saveProduct = saveProduct;
    window.updateProduct = updateProduct;
    window.closeModal = closeModal;
  </script>
</body>
</html>
