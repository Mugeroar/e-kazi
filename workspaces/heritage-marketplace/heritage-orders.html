<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Orders | Heritage Marketplace</title>
  
  <meta name="theme-color" content="#d97706">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --amber: #d97706;
      --amber-dark: #92400e;
      --amber-light: #fbbf24;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #fde68a;
      --red: #ef4444;
      --green: #10b981;
      --blue: #3b82f6;
      --purple: #8b5cf6;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #fffbeb 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 6px;
    }
    .skeleton-text { height: 1rem; margin-bottom: 0.5rem; }
    .skeleton-text-sm { height: 0.7rem; width: 60%; }
    .skeleton-row { height: 2.5rem; margin-bottom: 0.4rem; }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(217, 119, 6, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(217, 119, 6, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #fbbf24, #d97706);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #92400e; -webkit-text-fill-color: #92400e; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(217, 119, 6, 0.08); border: 1px solid rgba(217, 119, 6, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--amber-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--amber); color: white; }
    .nav-btn.active { background: var(--amber); color: white; border-color: var(--amber-dark); }

    .container { padding: 1rem 2%; flex: 1; }

    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--amber-dark); margin-right: 6px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-mini {
      background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
      border: 1px solid var(--border-light); box-shadow: 0 2px 8px rgba(217,119,6,0.03);
      transition: all 0.3s;
    }
    .stat-mini:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(217,119,6,0.08); }
    .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--amber-dark); line-height: 1.1; }
    .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    .filter-btn {
      padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0;
      background: white; color: #64748b; font-weight: 600; font-size: 0.65rem;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--amber); color: var(--amber-dark); }
    .filter-btn.active { background: var(--amber); color: white; border-color: var(--amber); }
    .filter-btn .count { background: rgba(255,255,255,0.25); padding: 0.1rem 0.4rem; border-radius: 10px; font-size: 0.55rem; margin-left: 4px; }
    .search-box { flex: 1; min-width: 150px; max-width: 300px; position: relative; }
    .search-box input {
      width: 100%; padding: 0.35rem 0.8rem 0.35rem 2rem; border-radius: 20px;
      border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif;
    }
    .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.7rem; }

    .btn {
      padding: 0.5rem 1rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; font-family: inherit; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--amber); color: white; }
    .btn-primary:hover { background: var(--amber-dark); }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }

    .table-wrap {
      background: white; border-radius: 16px; border: 1px solid var(--border-light);
      overflow: hidden; box-shadow: 0 2px 8px rgba(217,119,6,0.03);
    }
    .table-scroll { overflow-x: auto; max-height: 60vh; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
    thead { position: sticky; top: 0; z-index: 2; background: #fffbeb; }
    th {
      padding: 0.6rem 0.7rem; text-align: left; font-weight: 700; color: #92400e;
      font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap;
    }
    td { padding: 0.5rem 0.7rem; border-bottom: 1px solid #fef3c7; vertical-align: middle; }
    tr:hover td { background: #fffbeb; }

    .status-badge {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px;
      font-size: 0.6rem; font-weight: 700; white-space: nowrap;
    }
    .status-new { background: #fef3c7; color: #92400e; }
    .status-pending { background: #fef3c7; color: #b45309; }
    .status-linked { background: #dbeafe; color: #1d4ed8; }
    .status-completed { background: #d1fae5; color: #065f46; }
    .status-cancelled { background: #fee2e2; color: #991b1b; }

    .action-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .action-btn {
      padding: 0.25rem 0.5rem; border-radius: 6px; border: none; font-size: 0.6rem;
      font-weight: 600; cursor: pointer; display: inline-flex; align-items: center;
      gap: 3px; transition: all 0.15s; font-family: inherit;
    }
    .btn-link { background: #dbeafe; color: #1d4ed8; }
    .btn-link:hover { background: #3b82f6; color: white; }
    .btn-complete { background: #d1fae5; color: #065f46; }
    .btn-complete:hover { background: #10b981; color: white; }
    .btn-view { background: #f1f5f9; color: #475569; }
    .btn-view:hover { background: #64748b; color: white; }

    .empty-row td { text-align: center; padding: 2rem; color: #94a3b8; }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
      align-items: center; backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 20px; padding: 1.5rem; max-width: 550px;
      width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; color: var(--amber-dark); }
    .form-group { margin-bottom: 0.7rem; }
    .form-group label {
      display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
      background: #f8fafc; transition: all 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px rgba(217,119,6,0.1);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--amber); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(217,119,6,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
    .detail-item { background: #f8fafc; padding: 0.5rem; border-radius: 8px; }
    .detail-item strong { display: block; font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.1rem; }
    .detail-item span { font-size: 0.75rem; color: var(--text-primary); }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/workspaces/heritage-marketplace/index.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Heritage" class="logo-img">
      <span class="logo-text">Heritage <span>Marketplace</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/heritage-marketplace/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="/workspaces/heritage-marketplace/heritage-partners.html" class="nav-btn"><i class="fas fa-handshake"></i> Partners</a>
      <a href="/workspaces/heritage-marketplace/heritage-products.html" class="nav-btn"><i class="fas fa-box"></i> Catalogue</a>
      <a href="/workspaces/heritage-marketplace/heritage-products-manage.html" class="nav-btn"><i class="fas fa-tags"></i> Manage Products</a>
      <a href="/workspaces/heritage-marketplace/heritage-orders.html" class="nav-btn active"><i class="fas fa-shopping-cart"></i> Orders</a>
      <a href="/workspaces/heritage-marketplace/heritage-catalogues.html" class="nav-btn"><i class="fas fa-images"></i> Catalogues</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-shopping-cart"></i> Orders</h1>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <a href="/workspaces/heritage-marketplace/heritage-new-order.html" class="btn btn-primary"><i class="fas fa-plus"></i> New Order</a>
      </div>
    </div>

    <!-- Stats Row with Skeleton -->
    <div class="stats-row" id="statsRow">
      <div class="stat-mini"><div class="skeleton" style="height:1.4rem;width:50%;margin:0 auto 0.3rem;"></div><div class="skeleton" style="height:0.6rem;width:60%;margin:0 auto;"></div></div>
      <div class="stat-mini"><div class="skeleton" style="height:1.4rem;width:50%;margin:0 auto 0.3rem;"></div><div class="skeleton" style="height:0.6rem;width:60%;margin:0 auto;"></div></div>
      <div class="stat-mini"><div class="skeleton" style="height:1.4rem;width:50%;margin:0 auto 0.3rem;"></div><div class="skeleton" style="height:0.6rem;width:60%;margin:0 auto;"></div></div>
      <div class="stat-mini"><div class="skeleton" style="height:1.4rem;width:50%;margin:0 auto 0.3rem;"></div><div class="skeleton" style="height:0.6rem;width:60%;margin:0 auto;"></div></div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All Orders</button>
      <button class="filter-btn" data-filter="new">🆕 New<span class="count" id="countNew">0</span></button>
      <button class="filter-btn" data-filter="pending">⏳ Pending<span class="count" id="countPending">0</span></button>
      <button class="filter-btn" data-filter="linked">🔗 Linked<span class="count" id="countLinked">0</span></button>
      <button class="filter-btn" data-filter="completed">✅ Completed<span class="count" id="countCompleted">0</span></button>
      <button class="filter-btn" data-filter="cancelled">❌ Cancelled<span class="count" id="countCancelled">0</span></button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search customer, product, partner...">
      </div>
    </div>

    <!-- Orders Table with Skeleton -->
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Product</th>
              <th>Partner</th>
              <th>Qty</th>
              <th>Total</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="9" style="padding:0.8rem;">
              <div class="skeleton skeleton-row"></div>
              <div class="skeleton skeleton-row"></div>
              <div class="skeleton skeleton-row"></div>
              <div class="skeleton skeleton-row"></div>
              <div class="skeleton skeleton-row"></div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allOrders = {};
    let allProducts = {};
    let allPartners = {};
    let currentFilter = 'all';
    let searchQuery = '';

    // Check for filter in URL
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('filter')) {
      currentFilter = urlParams.get('filter');
      setTimeout(() => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        const activeBtn = document.querySelector(`.filter-btn[data-filter="${currentFilter}"]`);
        if (activeBtn) activeBtn.classList.add('active');
      }, 300);
    }

    function showToast(msg, isError = false) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
    }

    function getInitials(name) {
      if (!name) return '??';
      return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
    }

    function getProductName(productId) {
      if (!productId) return 'N/A';
      const product = allProducts[productId];
      return product ? product.name : productId;
    }

    function getPartnerName(partnerId) {
      if (!partnerId) return 'N/A';
      const partner = allPartners[partnerId];
      return partner ? (partner.businessName || partner.name || 'Partner') : partnerId;
    }

    function getStatusClass(status) {
      const map = { new: 'status-new', pending: 'status-pending', linked: 'status-linked', completed: 'status-completed', cancelled: 'status-cancelled' };
      return map[status] || 'status-new';
    }

    function updateStats() {
      const orders = Object.values(allOrders);
      const counts = {
        all: orders.length,
        new: orders.filter(o => o.status === 'new').length,
        pending: orders.filter(o => o.status === 'pending').length,
        linked: orders.filter(o => o.status === 'linked').length,
        completed: orders.filter(o => o.status === 'completed').length,
        cancelled: orders.filter(o => o.status === 'cancelled').length
      };

      document.getElementById('statsRow').innerHTML = 
        `<div class="stat-mini"><div class="stat-num">${counts.all}</div><div class="stat-label">Total Orders</div></div>` +
        `<div class="stat-mini"><div class="stat-num">${counts.new}</div><div class="stat-label">New</div></div>` +
        `<div class="stat-mini"><div class="stat-num">${counts.linked}</div><div class="stat-label">Linked</div></div>` +
        `<div class="stat-mini"><div class="stat-num">${counts.completed}</div><div class="stat-label">Completed</div></div>`;

      document.getElementById('countNew').textContent = counts.new;
      document.getElementById('countPending').textContent = counts.pending;
      document.getElementById('countLinked').textContent = counts.linked;
      document.getElementById('countCompleted').textContent = counts.completed;
      document.getElementById('countCancelled').textContent = counts.cancelled;
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      let orders = Object.entries(allOrders).map(([id, data]) => ({ id, ...data }));

      if (currentFilter !== 'all') {
        orders = orders.filter(o => (o.status || 'new') === currentFilter);
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        orders = orders.filter(o => 
          (o.customerName || '').toLowerCase().includes(q) ||
          getProductName(o.productId).toLowerCase().includes(q) ||
          getPartnerName(o.partnerId).toLowerCase().includes(q) ||
          (o.customerPhone || '').toLowerCase().includes(q)
        );
      }

      orders.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      if (!orders.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="9"><i class="fas fa-shopping-cart" style="font-size:2rem;display:block;margin-bottom:8px;opacity:0.4;"></i>No orders found</td></tr>';
        return;
      }

      tbody.innerHTML = orders.map(order => {
        const status = order.status || 'new';
        const productName = getProductName(order.productId);
        const partnerName = getPartnerName(order.partnerId || (allProducts[order.productId]?.partnerId));
        const shortId = order.id ? order.id.slice(-6) : '—';
        const dateStr = order.createdAt ? new Date(order.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—';

        let actions = `<button class="action-btn btn-view" onclick="viewOrder('${order.id}')"><i class="fas fa-eye"></i></button>`;
        
        if (status === 'new' || status === 'pending') {
          actions += `<button class="action-btn btn-link" onclick="linkOrder('${order.id}')"><i class="fas fa-link"></i> Link</button>`;
        }
        if (status === 'linked') {
          actions += `<button class="action-btn btn-complete" onclick="completeOrder('${order.id}')"><i class="fas fa-check"></i> Complete</button>`;
        }

        return `
          <tr>
            <td><code style="font-size:0.65rem;background:#fffbeb;padding:2px 6px;border-radius:4px;">#${shortId}</code></td>
            <td>
              <div style="display:flex;align-items:center;gap:6px;">
                <div style="width:24px;height:24px;background:#fffbeb;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.55rem;color:#92400e;">${getInitials(order.customerName)}</div>
                <div>
                  <strong>${escapeHtml(order.customerName || 'Customer')}</strong>
                  ${order.customerPhone ? `<div style="font-size:0.6rem;color:var(--text-muted);">📞 ${escapeHtml(order.customerPhone)}</div>` : ''}
                </div>
              </div>
            </td>
            <td>${escapeHtml(productName)}</td>
            <td>${escapeHtml(partnerName)}</td>
            <td>${order.quantity || 1}</td>
            <td><strong>KES ${(order.total || 0).toLocaleString()}</strong></td>
            <td><span class="status-badge ${getStatusClass(status)}">${status}</span></td>
            <td>${dateStr}</td>
            <td><div class="action-btns">${actions}</div></td>
          </tr>`;
      }).join('');

      updateStats();
    }

    function viewOrder(orderId) {
      const order = allOrders[orderId];
      if (!order) return;
      const productName = getProductName(order.productId);
      const partnerName = getPartnerName(order.partnerId || (allProducts[order.productId]?.partnerId));
      const status = order.status || 'new';

      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-info-circle"></i> Order #${(order.id || '').slice(-6)}</h3>
        <div class="detail-grid">
          <div class="detail-item"><strong>Customer</strong><span>${escapeHtml(order.customerName || 'N/A')}</span></div>
          <div class="detail-item"><strong>Phone</strong><span>${escapeHtml(order.customerPhone || 'N/A')}</span></div>
          <div class="detail-item"><strong>Product</strong><span>${escapeHtml(productName)}</span></div>
          <div class="detail-item"><strong>Partner</strong><span>${escapeHtml(partnerName)}</span></div>
          <div class="detail-item"><strong>Quantity</strong><span>${order.quantity || 1}</span></div>
          <div class="detail-item"><strong>Total</strong><span>KES ${(order.total || 0).toLocaleString()}</span></div>
          <div class="detail-item"><strong>Status</strong><span class="status-badge ${getStatusClass(status)}">${status}</span></div>
          <div class="detail-item"><strong>Date</strong><span>${order.createdAt ? new Date(order.createdAt).toLocaleString() : 'N/A'}</span></div>
          ${order.linkedAt ? `<div class="detail-item"><strong>Linked At</strong><span>${new Date(order.linkedAt).toLocaleString()}</span></div>` : ''}
          ${order.completedAt ? `<div class="detail-item"><strong>Completed At</strong><span>${new Date(order.completedAt).toLocaleString()}</span></div>` : ''}
          ${order.notes ? `<div class="detail-item" style="grid-column:1/-1;"><strong>Notes</strong><span>${escapeHtml(order.notes)}</span></div>` : ''}
        </div>
        <div class="btn-row">
          ${status === 'new' || status === 'pending' ? `<button class="btn btn-primary" onclick="closeModal();linkOrder('${orderId}')"><i class="fas fa-link"></i> Link to Partner</button>` : ''}
          ${status === 'linked' ? `<button class="btn btn-primary" onclick="closeModal();completeOrder('${orderId}')"><i class="fas fa-check"></i> Mark Completed</button>` : ''}
          <button class="btn btn-secondary" onclick="closeModal()">Close</button>
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    async function linkOrder(orderId) {
      const order = allOrders[orderId];
      if (!order) return;
      
      // Try to get partner from the product
      const product = allProducts[order.productId];
      const partnerId = product?.partnerId || '';
      
      const partners = Object.entries(allPartners).filter(([_, p]) => p && (p.businessName || p.name));

      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-link"></i> Link Order to Partner</h3>
        <p style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.8rem;">Connect this order to the business partner who will fulfill it.</p>
        <div class="form-group">
          <label>Select Partner</label>
          <select id="linkPartnerId">
            <option value="">— Choose Partner —</option>
            ${partners.map(([id, p]) => `<option value="${id}" ${partnerId === id ? 'selected' : ''}>${escapeHtml(p.businessName || p.name)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Notes</label><textarea id="linkNotes" rows="2" placeholder="Any notes about this link...">${escapeHtml(order.notes || '')}</textarea></div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="confirmLink('${orderId}')"><i class="fas fa-link"></i> Confirm Link</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    async function confirmLink(orderId) {
      const partnerId = document.getElementById('linkPartnerId').value;
      if (!partnerId) { showToast('Select a partner', true); return; }

      try {
        await database.ref(`heritage_orders/${orderId}`).update({
          partnerId: partnerId,
          status: 'linked',
          notes: document.getElementById('linkNotes').value.trim(),
          linkedAt: firebase.database.ServerValue.TIMESTAMP,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('✅ Order linked!');
        closeModal();
      } catch (e) { showToast('Failed to link', true); }
    }

    async function completeOrder(orderId) {
      if (!confirm('Mark this order as completed?')) return;
      try {
        await database.ref(`heritage_orders/${orderId}`).update({
          status: 'completed',
          completedAt: firebase.database.ServerValue.TIMESTAMP,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('✅ Order completed!');
      } catch (e) { showToast('Failed to complete', true); }
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    // Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTable();
      });
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderTable();
    });

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal')) closeModal();
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    // Firebase listeners
    database.ref('heritage_orders').on('value', (snapshot) => {
      allOrders = snapshot.val() || {};
      renderTable();
    });

    database.ref('heritage_products').on('value', (snapshot) => {
      allProducts = snapshot.val() || {};
      renderTable();
    });

    database.ref('heritage_partners').on('value', (snapshot) => {
      allPartners = snapshot.val() || {};
      renderTable();
    });

    auth.onAuthStateChanged((user) => { if (!user) window.location.href = '/workspaces/index.html'; });

    window.viewOrder = viewOrder;
    window.linkOrder = linkOrder;
    window.confirmLink = confirmLink;
    window.completeOrder = completeOrder;
    window.closeModal = closeModal;
  </script>
</body>
</html>
