<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>KazInni Workspace | Schedule Delivery</title>
  
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #f59e0b;
      --gold-dark: #b45309;
      --gold-light: #fbbf24;
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #fde68a;
      --input-bg: #f8fafc;
      --input-border: #e2e8f0;
      --purple: #7c3aed;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #fffbeb 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.7rem 3%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid rgba(245, 158, 11, 0.3);
      position: sticky;
      top: 0;
      z-index: 2000;
      flex-wrap: wrap;
      gap: 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-img {
      height: 40px;
      width: 40px;
      border-radius: 12px;
      object-fit: contain;
      background: white;
      box-shadow: 0 6px 16px rgba(124, 58, 237, 0.3);
    }

    .logo-text {
      font-weight: 800;
      font-size: 1.3rem;
      background: linear-gradient(145deg, #c084fc, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }

    .logo-text span {
      font-weight: 600;
      font-size: 0.8rem;
      background: #f59e0b;
      -webkit-text-fill-color: #f59e0b;
      margin-left: 4px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid var(--gold);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      color: var(--gold-dark);
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .nav-btn:hover {
      background: var(--gold);
      color: white;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      padding: 0.3rem 0.9rem 0.3rem 0.6rem;
      border-radius: 40px;
      font-size: 0.75rem;
      color: var(--text-muted);
      border: 1px solid #fde68a;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      background: linear-gradient(145deg, #f59e0b, #b45309);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      color: white;
    }

    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .map-section {
      flex: 1;
      position: relative;
      min-width: 0;
    }

    #deliveryMap {
      width: 100%;
      height: 100%;
    }

    .side-panel {
      width: 400px;
      background: white;
      border-left: 1px solid #fef3c7;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      z-index: 150;
    }

    .panel-section {
      padding: 16px;
      border-bottom: 1px solid #fef3c7;
    }

    .panel-section h4 {
      font-size: 0.9rem;
      margin-bottom: 12px;
      color: var(--gold-dark);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      color: #475569;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 0.65rem 0.8rem;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      color: #1e293b;
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      margin-bottom: 10px;
      transition: all 0.2s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
      background: white;
    }

    .form-textarea {
      resize: vertical;
      min-height: 60px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .price-card {
      background: linear-gradient(135deg, #b45309, #f59e0b);
      border-radius: 16px;
      padding: 1rem;
      color: white;
      text-align: center;
      margin: 10px 0;
    }

    .price-label {
      font-size: 0.7rem;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .price-amount {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .price-detail {
      font-size: 0.75rem;
      opacity: 0.8;
    }

    .price-breakdown {
      background: white;
      border-radius: 12px;
      padding: 0.8rem;
      margin-top: 0.8rem;
      color: #1e293b;
    }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: 0.3rem 0;
      font-size: 0.75rem;
      border-bottom: 1px solid #f1f5f9;
    }

    .breakdown-row:last-child {
      border-bottom: none;
      font-weight: 700;
      color: #b45309;
    }

    .btn {
      width: 100%;
      padding: 0.75rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      margin-top: 6px;
    }

    .btn-primary {
      background: linear-gradient(145deg, #b45309, #f59e0b);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(245, 158, 11, 0.25);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-outline {
      background: white;
      border: 1.5px solid #fde68a;
      color: #b45309;
      width: auto;
    }

    .btn-outline:hover {
      background: #fffbeb;
    }

    .legend {
      position: absolute;
      bottom: 20px;
      left: 15px;
      z-index: 1000;
      background: white;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border: 1px solid #fde68a;
      max-height: 200px;
      overflow-y: auto;
    }

    .legend h5 {
      font-size: 0.7rem;
      margin-bottom: 8px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      color: #64748b;
      margin-bottom: 4px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .legend-item:hover {
      background: #f8fafc;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 6px currentColor;
      flex-shrink: 0;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #10b981;
      color: white;
      padding: 0.9rem 1.5rem;
      border-radius: 30px;
      font-weight: 600;
      z-index: 3000;
      animation: slideIn 0.3s ease;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    .toast.error {
      background: #ef4444;
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .loading-overlay.hide { display: none; }
    .spinner {
      width: 50px; height: 50px;
      border: 3px solid #fef3c7;
      border-top-color: #b45309;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .main-layout {
        flex-direction: column;
      }
      .side-panel {
        width: 100%;
        max-height: 50vh;
      }
      .map-section {
        height: 50vh;
      }
      .navbar {
        padding: 0.6rem 1rem;
      }
      .logo-text {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <nav class="navbar">
    <div class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="KazInni Logo" class="logo-img">
      <span class="logo-text">KazInni <span>PickUp</span></span>
    </div>
    <div class="nav-right">
      <a href="/workspaces/brandinn/index.html" class="nav-btn">
        <i class="fas fa-arrow-left"></i> Dashboard
      </a>
      <div class="user-badge">
        <div class="user-avatar" id="repAvatar">PU</div>
        <span id="repName">Agent</span>
      </div>
      <button class="nav-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </nav>

  <div class="main-layout">
    <div class="map-section">
      <div id="deliveryMap"></div>
      <div class="legend" id="mapLegend">
        <h5><i class="fas fa-filter"></i> Map Legend</h5>
        <div id="legendItems">Loading...</div>
      </div>
    </div>

    <div class="side-panel" id="sidePanel">
      <div class="panel-section">
        <h4><i class="fas fa-user"></i> Client Information</h4>
        <div class="form-row">
          <div>
            <label class="form-label">Client Name *</label>
            <input type="text" class="form-input" id="clientName" placeholder="Jane Muthoni" required>
          </div>
          <div>
            <label class="form-label">Phone *</label>
            <input type="tel" class="form-input" id="clientPhone" placeholder="0712345678" required>
          </div>
        </div>
        <label class="form-label">Email (Optional)</label>
        <input type="email" class="form-input" id="clientEmail" placeholder="client@email.com">
      </div>

      <div class="panel-section">
        <h4><i class="fas fa-map-marker-alt"></i> Delivery Details</h4>
        <label class="form-label">Pickup Address *</label>
        <input type="text" class="form-input" id="pickupAddress" placeholder="Kawangware, Nairobi" required>
        <label class="form-label">Delivery Address *</label>
        <input type="text" class="form-input" id="deliveryAddress" placeholder="Westlands, Nairobi" required>
        
        <label class="form-label">Package Type</label>
        <select class="form-select" id="packageType">
          <option value="document">📄 Document</option>
          <option value="small">📦 Small Box</option>
          <option value="medium" selected>📦 Medium Box (+100 KES)</option>
          <option value="large">📦 Large Box (+200 KES)</option>
          <option value="fragile">⚠️ Fragile (+150 KES)</option>
        </select>
        
        <label class="form-label">Weight (kg)</label>
        <input type="number" class="form-input" id="packageWeight" value="2" step="0.1" min="0.1">
        
        <label class="form-label">Special Instructions</label>
        <textarea class="form-textarea" id="instructions" placeholder="Call upon arrival..."></textarea>

        <button class="btn btn-outline" type="button" id="calculateRouteBtn">
          <i class="fas fa-route"></i> Calculate Route & Fare
        </button>
      </div>

      <div class="panel-section" id="priceCard" style="display: none;">
        <div class="price-card">
          <div class="price-label">Estimated Total Fare</div>
          <div class="price-amount" id="totalFare">— KES</div>
          <div class="price-detail" id="distanceDisplay"></div>
          <div class="price-breakdown" id="priceBreakdown"></div>
        </div>
        <button class="btn btn-primary" id="submitBookingBtn" disabled>
          <i class="fas fa-save"></i> Create Booking
        </button>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    const OP_COLORS = {
      brandinn: '#7c3aed',
      deliveries: '#f59e0b',
      rides: '#22c55e',
      ekazi: '#06b6d4',
      heritage: '#d946ef',
      workfit: '#f97316',
      hekima: '#10b981'
    };

    const OP_ICONS = {
      brandinn: 'fa-store',
      deliveries: 'fa-box',
      rides: 'fa-car',
      ekazi: 'fa-laptop-code',
      heritage: 'fa-landmark',
      workfit: 'fa-dumbbell',
      hekima: 'fa-book-open'
    };

    const OP_NAMES = {
      brandinn: 'BrandInn',
      deliveries: 'Deliveries',
      rides: 'Rides',
      ekazi: 'E-Kazi',
      heritage: 'Heritage',
      workfit: 'WorkFit',
      hekima: 'Hekima'
    };

    const PRICING = {
      baseFare: 100,
      perKmRate: 50,
      weightSurcharge: { document: 0, small: 0, medium: 100, large: 200, fragile: 150 }
    };

    let deliveryMap = null;
    let businessMarkers = {};
    let pickupMarker = null;
    let deliveryMarker = null;
    let routeLine = null;
    let currentPickupCoords = null;
    let currentDeliveryCoords = null;
    let calculatedDistance = null;
    let calculatedFare = null;
    let allRegistrations = [];
    let visibleOperations = {};

    function showToast(msg, isError = false) {
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      document.getElementById('toastContainer').appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    function getInitials(name) {
      return name ? name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0,2) : 'PU';
    }

    function getBusinessMarkerIcon(operation) {
      const color = OP_COLORS[operation] || '#7c3aed';
      const icon = OP_ICONS[operation] || 'fa-map-pin';
      return L.divIcon({
        html: `<div style="background:${color}; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white; box-shadow:0 0 10px ${color};"><i class="fas ${icon}" style="color:white; font-size:11px;"></i></div>`,
        iconSize: [26, 26],
        popupAnchor: [0, -12]
      });
    }

    function addBusinessMarker(id, data) {
      if (businessMarkers[id] && deliveryMap) deliveryMap.removeLayer(businessMarkers[id]);
      const marker = L.marker([data.lat, data.lng], { 
        icon: getBusinessMarkerIcon(data.operation),
        opacity: visibleOperations[data.operation] !== false ? 1 : 0.2
      }).addTo(deliveryMap);
      
      const opName = OP_NAMES[data.operation] || data.operation;
      marker.bindPopup(`
        <div style="font-family:'Inter',sans-serif; min-width:160px;">
          <strong>${escapeHtml(data.businessName)}</strong><br>
          <span style="font-size:10px;">🏷️ ${opName}</span><br>
          <span style="font-size:9px;">👤 ${escapeHtml(data.ownerName || 'N/A')}</span><br>
          <span style="font-size:9px;">📍 ${data.lat.toFixed(5)}, ${data.lng.toFixed(5)}</span>
        </div>
      `);
      
      marker.on('click', () => {
        document.getElementById('pickupAddress').value = data.businessName + ', ' + (data.ownerName || '');
        document.getElementById('clientName').value = data.ownerName || data.businessName;
      });
      
      businessMarkers[id] = marker;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
    }

    async function loadBusinesses() {
      for (let id in businessMarkers) {
        if (businessMarkers[id] && deliveryMap) deliveryMap.removeLayer(businessMarkers[id]);
      }
      businessMarkers = {};
      allRegistrations = [];
      
      try {
        const snap = await database.ref('iam_mugera_registrations').once('value');
        const data = snap.val();
        if (data) {
          Object.keys(data).forEach(key => {
            const entry = data[key];
            if (entry.lat && entry.lng) {
              allRegistrations.push({ id: key, ...entry });
              if (!visibleOperations[entry.operation]) {
                visibleOperations[entry.operation] = true;
              }
              addBusinessMarker(key, entry);
            }
          });
        }
        updateLegend();
        console.log('📦 Loaded', allRegistrations.length, 'businesses on map');
      } catch (e) {
        console.error('Load businesses error:', e);
      }
    }

    function updateLegend() {
      const container = document.getElementById('legendItems');
      const ops = {};
      allRegistrations.forEach(b => {
        if (!ops[b.operation]) {
          ops[b.operation] = { count: 0, color: OP_COLORS[b.operation], name: OP_NAMES[b.operation] };
        }
        ops[b.operation].count++;
      });

      if (Object.keys(ops).length === 0) {
        container.innerHTML = '<span style="font-size:0.65rem;color:#94a3b8;">No businesses loaded</span>';
        return;
      }

      container.innerHTML = Object.entries(ops).map(([key, val]) => `
        <div class="legend-item" onclick="toggleOperation('${key}')" id="legend-${key}">
          <div class="legend-dot" style="background:${val.color}; color:${val.color};"></div>
          <span>${val.name} (${val.count})</span>
          <i class="fas fa-eye" style="margin-left:auto; font-size:0.6rem; color:#94a3b8;"></i>
        </div>
      `).join('');
    }

    window.toggleOperation = function(operation) {
      visibleOperations[operation] = !visibleOperations[operation];
      for (let id in businessMarkers) {
        const biz = allRegistrations.find(b => b.id === id);
        if (biz && biz.operation === operation) {
          businessMarkers[id].setOpacity(visibleOperations[operation] ? 1 : 0.2);
        }
      }
      const legendItem = document.getElementById(`legend-${operation}`);
      if (legendItem) {
        const icon = legendItem.querySelector('i');
        if (icon) {
          icon.className = visibleOperations[operation] ? 'fas fa-eye' : 'fas fa-eye-slash';
        }
        legendItem.style.opacity = visibleOperations[operation] ? '1' : '0.5';
      }
    };

    function initMap() {
      if (deliveryMap) return;
      deliveryMap = L.map('deliveryMap').setView([-1.2864, 36.8172], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(deliveryMap);
      
      L.control.scale({ metric: true, position: 'bottomright' }).addTo(deliveryMap);
      
      loadBusinesses();
      
      database.ref('iam_mugera_registrations').on('child_added', snap => {
        const entry = snap.val();
        if (entry.lat && entry.lng && !businessMarkers[snap.key]) {
          allRegistrations.push({ id: snap.key, ...entry });
          if (!visibleOperations[entry.operation]) {
            visibleOperations[entry.operation] = true;
          }
          addBusinessMarker(snap.key, entry);
          updateLegend();
        }
      });
    }

    async function geocodeAddress(address) {
      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`);
        const data = await response.json();
        if (data.length > 0) {
          return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
        }
        return null;
      } catch (error) {
        console.error('Geocoding error:', error);
        return null;
      }
    }

    async function getRouteDistance(pickup, delivery) {
      try {
        const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${pickup.lon},${pickup.lat};${delivery.lon},${delivery.lat}?overview=full&geometries=geojson`);
        const data = await response.json();
        if (data.routes && data.routes[0]) {
          return { distance: data.routes[0].distance / 1000, geometry: data.routes[0].geometry };
        }
        return null;
      } catch (error) {
        console.error('Routing error:', error);
        return null;
      }
    }

    function calculateFare(distance, packageType) {
      const surcharge = PRICING.weightSurcharge[packageType] || 0;
      const distanceCharge = Math.round(distance * PRICING.perKmRate);
      return {
        baseFare: PRICING.baseFare,
        distanceCharge,
        surcharge,
        total: PRICING.baseFare + distanceCharge + surcharge
      };
    }

    document.getElementById('calculateRouteBtn').addEventListener('click', async () => {
      const pickup = document.getElementById('pickupAddress').value.trim();
      const delivery = document.getElementById('deliveryAddress').value.trim();

      if (!pickup || !delivery) {
        showToast('Please enter both pickup and delivery addresses', true);
        return;
      }

      initMap();
      const btn = document.getElementById('calculateRouteBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Calculating...';

      try {
        const pickupCoords = await geocodeAddress(pickup);
        const deliveryCoords = await geocodeAddress(delivery);

        if (!pickupCoords || !deliveryCoords) {
          showToast('Could not find one or both addresses', true);
          return;
        }

        currentPickupCoords = pickupCoords;
        currentDeliveryCoords = deliveryCoords;

        if (pickupMarker) deliveryMap.removeLayer(pickupMarker);
        if (deliveryMarker) deliveryMap.removeLayer(deliveryMarker);
        if (routeLine) deliveryMap.removeLayer(routeLine);

        pickupMarker = L.marker([pickupCoords.lat, pickupCoords.lon], {
          icon: L.divIcon({
            html: `<div style="background:#22c55e; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:3px solid white; box-shadow:0 0 12px #22c55e;"><i class="fas fa-location-dot" style="color:white; font-size:14px;"></i></div>`,
            iconSize: [30, 30],
            popupAnchor: [0, -14]
          })
        }).addTo(deliveryMap).bindPopup('📍 Pickup');
        
        deliveryMarker = L.marker([deliveryCoords.lat, deliveryCoords.lon], {
          icon: L.divIcon({
            html: `<div style="background:#ef4444; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:3px solid white; box-shadow:0 0 12px #ef4444;"><i class="fas fa-flag-checkered" style="color:white; font-size:14px;"></i></div>`,
            iconSize: [30, 30],
            popupAnchor: [0, -14]
          })
        }).addTo(deliveryMap).bindPopup('🏁 Delivery');

        const routeData = await getRouteDistance(pickupCoords, deliveryCoords);
        
        if (routeData) {
          calculatedDistance = routeData.distance;
          routeLine = L.geoJSON(routeData.geometry, {
            style: { color: '#f59e0b', weight: 4, opacity: 0.8 }
          }).addTo(deliveryMap);
        } else {
          calculatedDistance = Math.sqrt(
            Math.pow(pickupCoords.lat - deliveryCoords.lat, 2) + 
            Math.pow(pickupCoords.lon - deliveryCoords.lon, 2)
          ) * 111;
        }

        const bounds = L.latLngBounds([
          [pickupCoords.lat, pickupCoords.lon],
          [deliveryCoords.lat, deliveryCoords.lon]
        ]);
        deliveryMap.fitBounds(bounds, { padding: [60, 60] });

        const packageType = document.getElementById('packageType').value;
        calculatedFare = calculateFare(calculatedDistance, packageType);

        document.getElementById('totalFare').textContent = `${calculatedFare.total} KES`;
        document.getElementById('distanceDisplay').textContent = `Distance: ${calculatedDistance.toFixed(1)} km`;
        document.getElementById('priceBreakdown').innerHTML = `
          <div class="breakdown-row"><span>Base Fare</span><span>${calculatedFare.baseFare} KES</span></div>
          <div class="breakdown-row"><span>Distance (${calculatedDistance.toFixed(1)} km × ${PRICING.perKmRate} KES/km)</span><span>${calculatedFare.distanceCharge} KES</span></div>
          <div class="breakdown-row"><span>Package Surcharge</span><span>${calculatedFare.surcharge} KES</span></div>
          <div class="breakdown-row"><span>Total</span><span>${calculatedFare.total} KES</span></div>
        `;
        document.getElementById('priceCard').style.display = 'block';
        document.getElementById('submitBookingBtn').disabled = false;
        showToast('Route calculated!');
      } catch (error) {
        console.error('Error:', error);
        showToast('Error calculating route', true);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-route"></i> Calculate Route & Fare';
      }
    });

    document.getElementById('packageType').addEventListener('change', () => {
      if (calculatedDistance) {
        const packageType = document.getElementById('packageType').value;
        calculatedFare = calculateFare(calculatedDistance, packageType);
        document.getElementById('totalFare').textContent = `${calculatedFare.total} KES`;
        document.getElementById('priceBreakdown').innerHTML = `
          <div class="breakdown-row"><span>Base Fare</span><span>${calculatedFare.baseFare} KES</span></div>
          <div class="breakdown-row"><span>Distance (${calculatedDistance.toFixed(1)} km × ${PRICING.perKmRate} KES/km)</span><span>${calculatedFare.distanceCharge} KES</span></div>
          <div class="breakdown-row"><span>Package Surcharge</span><span>${calculatedFare.surcharge} KES</span></div>
          <div class="breakdown-row"><span>Total</span><span>${calculatedFare.total} KES</span></div>
        `;
      }
    });

    document.getElementById('submitBookingBtn').addEventListener('click', async () => {
      const clientName = document.getElementById('clientName').value.trim();
      const clientPhone = document.getElementById('clientPhone').value.trim();
      const clientEmail = document.getElementById('clientEmail').value.trim();
      const pickupAddress = document.getElementById('pickupAddress').value.trim();
      const deliveryAddress = document.getElementById('deliveryAddress').value.trim();
      const packageType = document.getElementById('packageType').value;
      const packageWeight = parseFloat(document.getElementById('packageWeight').value) || 0;
      const instructions = document.getElementById('instructions').value.trim();

      if (!clientName || !clientPhone || !pickupAddress || !deliveryAddress) {
        showToast('Please fill in all required fields', true);
        return;
      }

      if (!calculatedFare || !calculatedDistance) {
        showToast('Please calculate the route first', true);
        return;
      }

      const user = auth.currentUser;
      if (!user) {
        showToast('You must be logged in', true);
        window.location.href = 'https://kazinni.vercel.app';
        return;
      }

      const bookingData = {
        userId: user.uid,
        userName: clientName,
        userPhone: clientPhone,
        userEmail: clientEmail || '',
        pickup: {
          address: pickupAddress,
          lat: currentPickupCoords?.lat || null,
          lng: currentPickupCoords?.lon || null
        },
        delivery: {
          address: deliveryAddress,
          lat: currentDeliveryCoords?.lat || null,
          lng: currentDeliveryCoords?.lon || null
        },
        package: {
          type: packageType,
          weight: packageWeight,
          instructions: instructions
        },
        fare: {
          total: calculatedFare.total,
          base: calculatedFare.baseFare,
          distance: calculatedFare.distanceCharge,
          surcharge: calculatedFare.surcharge
        },
        distance: parseFloat(calculatedDistance.toFixed(2)),
        status: 'pending',
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        createdBy: user.email || 'staff',
        assignedTo: null
      };

      const btn = document.getElementById('submitBookingBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

      try {
        const newRef = database.ref('pickup_deliveries').push();
        await newRef.set(bookingData);
        
        console.log('✅ Delivery saved with ID:', newRef.key);
        
        showToast('Booking created successfully!');
        
        document.getElementById('clientName').value = '';
        document.getElementById('clientPhone').value = '';
        document.getElementById('clientEmail').value = '';
        document.getElementById('pickupAddress').value = '';
        document.getElementById('deliveryAddress').value = '';
        document.getElementById('packageType').value = 'medium';
        document.getElementById('packageWeight').value = '2';
        document.getElementById('instructions').value = '';
        document.getElementById('priceCard').style.display = 'none';
        document.getElementById('submitBookingBtn').disabled = true;
        
        if (pickupMarker) deliveryMap.removeLayer(pickupMarker);
        if (deliveryMarker) deliveryMap.removeLayer(deliveryMarker);
        if (routeLine) deliveryMap.removeLayer(routeLine);
        
        calculatedDistance = null;
        calculatedFare = null;
        currentPickupCoords = null;
        currentDeliveryCoords = null;
        
      } catch (error) {
        console.error('❌ Error saving delivery:', error);
        showToast('Error: ' + error.message, true);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Create Booking';
      }
    });

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        let userName = 'Logistics Agent';
        try {
          const staffSnap = await database.ref(`logistics_staff/${user.uid}`).once('value');
          if (staffSnap.exists()) {
            userName = staffSnap.val().name || user.email?.split('@')[0] || 'Staff';
          } else {
            const brandSnap = await database.ref(`brandinn_users/${user.uid}`).once('value');
            if (brandSnap.exists()) {
              userName = brandSnap.val().name || user.email?.split('@')[0] || 'Agent';
            } else {
              userName = user.displayName || user.email?.split('@')[0] || 'Agent';
            }
          }
        } catch(e) {
          userName = user.email?.split('@')[0] || 'Agent';
        }
        document.getElementById('repName').textContent = userName;
        document.getElementById('repAvatar').textContent = getInitials(userName);
        document.getElementById('loadingOverlay').classList.add('hide');
        initMap();
      } else {
        window.location.href = 'https://kazinni.vercel.app';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if (confirm('Log out of KazInni Workspaces?')) {
        await auth.signOut();
      }
    });

    setTimeout(() => document.getElementById('loadingOverlay').classList.add('hide'), 5000);
  </script>
</body>
</html>
