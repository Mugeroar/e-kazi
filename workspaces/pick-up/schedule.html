<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>KazInni Workspace | Schedule Delivery</title>
  
  <meta name="theme-color" content="#b45309">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #b45309;
      --gold-light: #f59e0b;
      --gold-bg: #fffbeb;
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #fde68a;
      --shadow: rgba(180, 83, 9, 0.08);
      --input-bg: #f8fafc;
      --input-border: #e2e8f0;
      --purple: #7c3aed;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #fffbeb 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navigation */
    .navbar {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      padding: 0.9rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-light);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-img {
      height: 42px;
      width: 42px;
      border-radius: 14px;
      object-fit: contain;
      background: white;
      box-shadow: 0 8px 18px rgba(124, 58, 237, 0.15);
    }

    .logo-text {
      font-weight: 800;
      font-size: 1.5rem;
      background: linear-gradient(145deg, #7c3aed, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      font-weight: 600;
      font-size: 0.9rem;
      background: #b45309;
      -webkit-text-fill-color: #b45309;
      margin-left: 4px;
      letter-spacing: 0;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .rep-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fef3c7;
      padding: 0.3rem 1rem 0.3rem 0.8rem;
      border-radius: 60px;
    }

    .rep-avatar {
      width: 42px;
      height: 42px;
      background: linear-gradient(145deg, #b45309, #f59e0b);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1rem;
    }

    .rep-info {
      line-height: 1.3;
    }

    .rep-name {
      font-weight: 700;
      color: #0f172a;
    }

    .rep-role {
      font-size: 0.7rem;
      color: #b45309;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .logout-btn {
      background: white;
      border: 1.5px solid #fde68a;
      padding: 0.55rem 1.3rem;
      border-radius: 40px;
      color: #475569;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .logout-btn:hover {
      background: #fee2e2;
      border-color: #ef4444;
      color: #ef4444;
    }

    .back-link {
      color: #7c3aed;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .back-link:hover {
      color: #b45309;
    }

    /* Container */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 5%;
      flex: 1;
      width: 100%;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-header h1 i {
      color: #b45309;
      background: white;
      padding: 10px;
      border-radius: 14px;
      box-shadow: 0 8px 16px rgba(180, 83, 9, 0.08);
    }

    .page-header p {
      color: #64748b;
      margin-top: 0.5rem;
      margin-left: 56px;
    }

    /* Form Card */
    .form-card {
      background: white;
      border-radius: 28px;
      padding: 2rem;
      border: 1px solid #fef3c7;
      box-shadow: 0 15px 35px -10px rgba(180, 83, 9, 0.06);
      margin-bottom: 1.5rem;
    }

    .form-section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #b45309;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-section-title i {
      background: #fffbeb;
      padding: 8px;
      border-radius: 10px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 1.2rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #475569;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 0.8rem 1rem;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      color: #1e293b;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: #b45309;
      box-shadow: 0 0 0 3px rgba(180, 83, 9, 0.1);
      background: white;
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Map */
    .map-container {
      height: 280px;
      border-radius: 18px;
      overflow: hidden;
      margin: 1.2rem 0;
      border: 2px solid #fde68a;
    }

    /* Price display */
    .price-card {
      background: linear-gradient(135deg, #b45309, #d97706);
      border-radius: 20px;
      padding: 1.5rem;
      color: white;
      text-align: center;
      margin: 1.5rem 0;
    }

    .price-label {
      font-size: 0.85rem;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.3rem;
    }

    .price-amount {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .price-detail {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 0.3rem;
    }

    .price-breakdown {
      background: white;
      border-radius: 16px;
      padding: 1rem 1.2rem;
      margin-top: 1rem;
      color: #1e293b;
    }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0;
      font-size: 0.9rem;
      border-bottom: 1px solid #f1f5f9;
    }

    .breakdown-row:last-child {
      border-bottom: none;
      font-weight: 700;
      color: #b45309;
    }

    /* Buttons */
    .btn {
      padding: 0.85rem 1.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(145deg, #b45309, #d97706);
      color: white;
      box-shadow: 0 8px 20px rgba(180, 83, 9, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(180, 83, 9, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-outline {
      background: white;
      border: 1.5px solid #fde68a;
      color: #b45309;
    }

    .btn-outline:hover {
      background: #fffbeb;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #10b981;
      color: white;
      padding: 0.9rem 1.5rem;
      border-radius: 30px;
      font-weight: 600;
      z-index: 3000;
      animation: slideIn 0.3s ease;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.error {
      background: #ef4444;
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .loading-overlay.hide { display: none; }
    .spinner {
      width: 50px; height: 50px;
      border: 3px solid #fef3c7;
      border-top-color: #b45309;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .form-row { grid-template-columns: 1fr; }
      .container { padding: 1.5rem 1rem; }
      .page-header p { margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <nav class="navbar">
    <div class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="KazInni Logo" class="logo-img">
      <span class="logo-text">KazInni <span>PickUp</span></span>
    </div>
    <div class="nav-right">
      <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <div class="rep-profile">
        <div class="rep-avatar" id="repAvatar">PU</div>
        <div class="rep-info">
          <div class="rep-name" id="repName">Agent</div>
          <div class="rep-role"><i class="fas fa-badge-check"></i> Logistics</div>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
        <span>Logout</span>
      </button>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>
        <i class="fas fa-calendar-plus"></i>
        Schedule Delivery
      </h1>
      <p>Create a new pick-up and delivery booking with automatic fare calculation.</p>
    </div>

    <div class="form-card">
      <!-- Client Information -->
      <div class="form-section-title">
        <i class="fas fa-user"></i> Client Information
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Client Name *</label>
          <input type="text" class="form-input" id="clientName" placeholder="e.g., Jane Muthoni" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number *</label>
          <input type="tel" class="form-input" id="clientPhone" placeholder="e.g., 0712345678" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email (Optional)</label>
        <input type="email" class="form-input" id="clientEmail" placeholder="client@email.com">
      </div>

      <!-- Delivery Details -->
      <div class="form-section-title" style="margin-top: 2rem;">
        <i class="fas fa-map-marker-alt"></i> Delivery Details
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Pickup Address *</label>
          <input type="text" class="form-input" id="pickupAddress" placeholder="e.g., Kawangware, Nairobi" required>
        </div>
        <div class="form-group">
          <label class="form-label">Delivery Address *</label>
          <input type="text" class="form-input" id="deliveryAddress" placeholder="e.g., Westlands, Nairobi" required>
        </div>
      </div>

      <!-- Package Details -->
      <div class="form-section-title" style="margin-top: 2rem;">
        <i class="fas fa-box"></i> Package Details
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Package Type</label>
          <select class="form-select" id="packageType">
            <option value="document">📄 Document (No surcharge)</option>
            <option value="small">📦 Small Box (No surcharge)</option>
            <option value="medium" selected>📦 Medium Box (+100 KES)</option>
            <option value="large">📦 Large Box (+200 KES)</option>
            <option value="fragile">⚠️ Fragile (+150 KES)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Weight (kg)</label>
          <input type="number" class="form-input" id="packageWeight" value="2" step="0.1" min="0.1">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Special Instructions</label>
        <textarea class="form-textarea" id="instructions" placeholder="e.g., Call upon arrival, leave with security..."></textarea>
      </div>

      <!-- Map -->
      <div class="map-container" id="deliveryMap"></div>
      <button class="btn btn-outline" type="button" id="calculateRouteBtn" style="width: auto; padding: 0.7rem 1.5rem;">
        <i class="fas fa-route"></i> Calculate Route & Fare
      </button>

      <!-- Price Display -->
      <div class="price-card" id="priceCard" style="display: none;">
        <div class="price-label">Estimated Total Fare</div>
        <div class="price-amount" id="totalFare">— KES</div>
        <div class="price-detail" id="distanceDisplay"></div>
        <div class="price-breakdown" id="priceBreakdown"></div>
      </div>

      <button class="btn btn-primary" id="submitBookingBtn" disabled>
        <i class="fas fa-save"></i> Create Booking
      </button>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // Pricing configuration
    const PRICING = {
      baseFare: 100,
      perKmRate: 50,
      weightSurcharge: {
        document: 0,
        small: 0,
        medium: 100,
        large: 200,
        fragile: 150
      }
    };

    // State
    let deliveryMap = null;
    let pickupMarker = null;
    let deliveryMarker = null;
    let routeLine = null;
    let currentPickupCoords = null;
    let currentDeliveryCoords = null;
    let calculatedDistance = null;
    let calculatedFare = null;

    const loadingOverlay = document.getElementById('loadingOverlay');
    const repNameEl = document.getElementById('repName');
    const repAvatarEl = document.getElementById('repAvatar');

    function getInitials(name) {
      return name ? name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0,2) : 'PU';
    }

    function showToast(msg, isError = false) {
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      document.getElementById('toastContainer').appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // Initialize map
    function initMap() {
      if (deliveryMap) return;
      deliveryMap = L.map('deliveryMap').setView([-1.2864, 36.8172], 13);
      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(deliveryMap);
    }

    // Geocode address
    async function geocodeAddress(address) {
      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`);
        const data = await response.json();
        if (data.length > 0) {
          return {
            lat: parseFloat(data[0].lat),
            lon: parseFloat(data[0].lon)
          };
        }
        return null;
      } catch (error) {
        console.error('Geocoding error:', error);
        return null;
      }
    }

    // Get route distance
    async function getRouteDistance(pickup, delivery) {
      try {
        const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${pickup.lon},${pickup.lat};${delivery.lon},${delivery.lat}?overview=full&geometries=geojson`);
        const data = await response.json();
        if (data.routes && data.routes[0]) {
          return {
            distance: data.routes[0].distance / 1000, // km
            geometry: data.routes[0].geometry
          };
        }
        return null;
      } catch (error) {
        console.error('Routing error:', error);
        return null;
      }
    }

    // Calculate fare
    function calculateFare(distance, packageType) {
      const surcharge = PRICING.weightSurcharge[packageType] || 0;
      const distanceCharge = Math.round(distance * PRICING.perKmRate);
      const total = PRICING.baseFare + distanceCharge + surcharge;
      return {
        baseFare: PRICING.baseFare,
        distanceCharge,
        surcharge,
        total
      };
    }

    // Calculate route and update UI
    document.getElementById('calculateRouteBtn').addEventListener('click', async () => {
      const pickup = document.getElementById('pickupAddress').value.trim();
      const delivery = document.getElementById('deliveryAddress').value.trim();

      if (!pickup || !delivery) {
        showToast('Please enter both pickup and delivery addresses', true);
        return;
      }

      initMap();
      document.getElementById('calculateRouteBtn').disabled = true;
      document.getElementById('calculateRouteBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Calculating...';

      try {
        const pickupCoords = await geocodeAddress(pickup);
        const deliveryCoords = await geocodeAddress(delivery);

        if (!pickupCoords || !deliveryCoords) {
          showToast('Could not find one or both addresses. Please be more specific.', true);
          return;
        }

        currentPickupCoords = pickupCoords;
        currentDeliveryCoords = deliveryCoords;

        // Clear previous markers
        if (pickupMarker) deliveryMap.removeLayer(pickupMarker);
        if (deliveryMarker) deliveryMap.removeLayer(deliveryMarker);
        if (routeLine) deliveryMap.removeLayer(routeLine);

        // Add markers
        pickupMarker = L.marker([pickupCoords.lat, pickupCoords.lon])
          .addTo(deliveryMap)
          .bindPopup('📍 Pickup Location');
        
        deliveryMarker = L.marker([deliveryCoords.lat, deliveryCoords.lon])
          .addTo(deliveryMap)
          .bindPopup('🏁 Delivery Location');

        // Get route
        const routeData = await getRouteDistance(pickupCoords, deliveryCoords);
        
        if (routeData) {
          calculatedDistance = routeData.distance;
          
          // Draw route
          routeLine = L.geoJSON(routeData.geometry, {
            style: { color: '#b45309', weight: 4, opacity: 0.8 }
          }).addTo(deliveryMap);

          // Fit bounds
          const bounds = L.latLngBounds([
            [pickupCoords.lat, pickupCoords.lon],
            [deliveryCoords.lat, deliveryCoords.lon]
          ]);
          deliveryMap.fitBounds(bounds, { padding: [40, 40] });
        } else {
          // Fallback: straight line distance
          calculatedDistance = Math.sqrt(
            Math.pow(pickupCoords.lat - deliveryCoords.lat, 2) + 
            Math.pow(pickupCoords.lon - deliveryCoords.lon, 2)
          ) * 111; // approximate km
          
          const bounds = L.latLngBounds([
            [pickupCoords.lat, pickupCoords.lon],
            [deliveryCoords.lat, deliveryCoords.lon]
          ]);
          deliveryMap.fitBounds(bounds, { padding: [40, 40] });
        }

        // Calculate fare
        const packageType = document.getElementById('packageType').value;
        calculatedFare = calculateFare(calculatedDistance, packageType);

        // Update UI
        document.getElementById('totalFare').textContent = `${calculatedFare.total} KES`;
        document.getElementById('distanceDisplay').textContent = `Distance: ${calculatedDistance.toFixed(1)} km`;
        document.getElementById('priceBreakdown').innerHTML = `
          <div class="breakdown-row"><span>Base Fare</span><span>${calculatedFare.baseFare} KES</span></div>
          <div class="breakdown-row"><span>Distance (${calculatedDistance.toFixed(1)} km × ${PRICING.perKmRate} KES/km)</span><span>${calculatedFare.distanceCharge} KES</span></div>
          <div class="breakdown-row"><span>Package Surcharge</span><span>${calculatedFare.surcharge} KES</span></div>
          <div class="breakdown-row"><span>Total</span><span>${calculatedFare.total} KES</span></div>
        `;
        document.getElementById('priceCard').style.display = 'block';
        document.getElementById('submitBookingBtn').disabled = false;
        
        showToast('Route calculated successfully!');
      } catch (error) {
        console.error('Error:', error);
        showToast('Error calculating route. Please try again.', true);
      } finally {
        document.getElementById('calculateRouteBtn').disabled = false;
        document.getElementById('calculateRouteBtn').innerHTML = '<i class="fas fa-route"></i> Calculate Route & Fare';
      }
    });

    // Update fare when package type changes
    document.getElementById('packageType').addEventListener('change', () => {
      if (calculatedDistance) {
        const packageType = document.getElementById('packageType').value;
        calculatedFare = calculateFare(calculatedDistance, packageType);
        document.getElementById('totalFare').textContent = `${calculatedFare.total} KES`;
        document.getElementById('priceBreakdown').innerHTML = `
          <div class="breakdown-row"><span>Base Fare</span><span>${calculatedFare.baseFare} KES</span></div>
          <div class="breakdown-row"><span>Distance (${calculatedDistance.toFixed(1)} km × ${PRICING.perKmRate} KES/km)</span><span>${calculatedFare.distanceCharge} KES</span></div>
          <div class="breakdown-row"><span>Package Surcharge</span><span>${calculatedFare.surcharge} KES</span></div>
          <div class="breakdown-row"><span>Total</span><span>${calculatedFare.total} KES</span></div>
        `;
      }
    });

    // Submit booking
    document.getElementById('submitBookingBtn').addEventListener('click', async () => {
      const clientName = document.getElementById('clientName').value.trim();
      const clientPhone = document.getElementById('clientPhone').value.trim();
      const clientEmail = document.getElementById('clientEmail').value.trim();
      const pickupAddress = document.getElementById('pickupAddress').value.trim();
      const deliveryAddress = document.getElementById('deliveryAddress').value.trim();
      const packageType = document.getElementById('packageType').value;
      const packageWeight = parseFloat(document.getElementById('packageWeight').value) || 0;
      const instructions = document.getElementById('instructions').value.trim();

      if (!clientName || !clientPhone || !pickupAddress || !deliveryAddress) {
        showToast('Please fill in all required fields', true);
        return;
      }

      if (!calculatedFare || !calculatedDistance) {
        showToast('Please calculate the route first', true);
        return;
      }

      const bookingData = {
        userName: clientName,
        userPhone: clientPhone,
        userEmail: clientEmail || '',
        pickup: {
          address: pickupAddress,
          coordinates: currentPickupCoords
        },
        delivery: {
          address: deliveryAddress,
          coordinates: currentDeliveryCoords
        },
        package: {
          type: packageType,
          weight: packageWeight,
          instructions: instructions
        },
        fare: calculatedFare.total,
        baseFare: calculatedFare.baseFare,
        distanceCharge: calculatedFare.distanceCharge,
        weightSurcharge: calculatedFare.surcharge,
        distance: parseFloat(calculatedDistance.toFixed(2)),
        status: 'pending',
        bookingDate: new Date().toISOString(),
        timestamp: serverTimestamp,
        createdBy: auth.currentUser?.uid || 'staff'
      };

      try {
        document.getElementById('submitBookingBtn').disabled = true;
        document.getElementById('submitBookingBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
        
        await push(ref(db, 'pickup_deliveries'), bookingData);
        
        showToast('Booking created successfully!');
        
        // Reset form
        document.getElementById('clientName').value = '';
        document.getElementById('clientPhone').value = '';
        document.getElementById('clientEmail').value = '';
        document.getElementById('pickupAddress').value = '';
        document.getElementById('deliveryAddress').value = '';
        document.getElementById('packageType').value = 'medium';
        document.getElementById('packageWeight').value = '2';
        document.getElementById('instructions').value = '';
        document.getElementById('priceCard').style.display = 'none';
        document.getElementById('submitBookingBtn').disabled = true;
        
        if (pickupMarker) deliveryMap.removeLayer(pickupMarker);
        if (deliveryMarker) deliveryMap.removeLayer(deliveryMarker);
        if (routeLine) deliveryMap.removeLayer(routeLine);
        
        calculatedDistance = null;
        calculatedFare = null;
        currentPickupCoords = null;
        currentDeliveryCoords = null;
        
      } catch (error) {
        console.error('Error saving booking:', error);
        showToast('Error saving booking. Please try again.', true);
      } finally {
        document.getElementById('submitBookingBtn').disabled = false;
        document.getElementById('submitBookingBtn').innerHTML = '<i class="fas fa-save"></i> Create Booking';
      }
    });

    // Auth
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        let userName = 'Logistics Agent';
        const { get } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js");
        const staffRef = ref(db, `logistics_staff/${user.uid}`);
        const staffSnap = await get(staffRef);
        if (staffSnap.exists()) {
          userName = staffSnap.val().name || user.email?.split('@')[0] || 'Staff';
        } else {
          const brandRef = ref(db, `brandinn_users/${user.uid}`);
          const brandSnap = await get(brandRef);
          if (brandSnap.exists()) {
            userName = brandSnap.val().name || user.email?.split('@')[0] || 'Agent';
          } else {
            userName = user.displayName || user.email?.split('@')[0] || 'Agent';
          }
        }
        repNameEl.textContent = userName;
        repAvatarEl.textContent = getInitials(userName);
        loadingOverlay.classList.add('hide');
        initMap();
      } else {
        window.location.href = 'https://kazinni.vercel.app';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if (confirm('Log out of KazInni Workspaces?')) {
        await signOut(auth);
      }
    });

    setTimeout(() => loadingOverlay.classList.add('hide'), 5000);
  </script>
</body>
</html>
