<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>KazInni Workspaces | All Deliveries</title>
  
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #f59e0b;
      --gold-dark: #b45309;
      --gold-light: #fbbf24;
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #fde68a;
      --purple: #7c3aed;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #fffbeb 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.7rem 3%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid rgba(245, 158, 11, 0.3);
      position: sticky;
      top: 0;
      z-index: 2000;
      flex-wrap: wrap;
      gap: 10px;
    }

    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-img { height: 40px; width: 40px; border-radius: 12px; object-fit: contain; background: white; box-shadow: 0 6px 16px rgba(124, 58, 237, 0.3); }

    .logo-text {
      font-weight: 800; font-size: 1.3rem;
      background: linear-gradient(145deg, #c084fc, #7c3aed);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.3px;
    }
    .logo-text span { font-weight: 600; font-size: 0.8rem; background: #f59e0b; -webkit-text-fill-color: #f59e0b; margin-left: 4px; }

    .nav-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .nav-btn {
      background: rgba(245, 158, 11, 0.1); border: 1px solid var(--gold); padding: 0.5rem 1rem;
      border-radius: 40px; color: var(--gold-dark); font-weight: 600; font-size: 0.75rem;
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
      text-decoration: none; transition: all 0.2s; white-space: nowrap;
    }
    .nav-btn:hover { background: var(--gold); color: white; }

    .user-badge {
      display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05);
      padding: 0.3rem 0.9rem 0.3rem 0.6rem; border-radius: 40px; font-size: 0.75rem;
      color: var(--text-muted); border: 1px solid #fde68a;
    }
    .user-avatar {
      width: 32px; height: 32px; background: linear-gradient(145deg, #f59e0b, #b45309);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem; color: white;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 3%; flex: 1; width: 100%; }

    .page-header {
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
      gap: 16px; margin-bottom: 1.5rem;
    }
    .page-header h1 { font-size: 1.8rem; font-weight: 800; color: #0f172a; display: flex; align-items: center; gap: 12px; }
    .page-header h1 i { color: var(--gold-dark); background: white; padding: 10px; border-radius: 14px; box-shadow: 0 8px 16px rgba(245, 158, 11, 0.08); }

    .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }

    .filter-btn {
      padding: 0.5rem 1.2rem; border-radius: 40px; border: 1.5px solid #e2e8f0;
      background: white; color: #64748b; font-weight: 600; font-size: 0.75rem;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .filter-btn.active { background: var(--gold-dark); color: white; border-color: var(--gold-dark); }
    .filter-btn:hover { border-color: var(--gold); color: var(--gold-dark); }
    .filter-btn.active:hover { color: white; }

    .search-box { flex: 1; min-width: 200px; max-width: 400px; position: relative; }
    .search-box input {
      width: 100%; padding: 0.5rem 1rem 0.5rem 2.5rem; border-radius: 40px;
      border: 1.5px solid #e2e8f0; background: white; font-size: 0.8rem; font-family: 'Inter', sans-serif;
    }
    .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.85rem; }

    .deliveries-table-wrap {
      background: white; border-radius: 20px; border: 1px solid #fef3c7;
      overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.02);
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    thead { background: #fffbeb; }
    th {
      padding: 0.8rem 1rem; text-align: left; font-weight: 700; color: #b45309;
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
    }
    td { padding: 0.8rem 1rem; border-bottom: 1px solid #f1f5f9; color: #1e293b; vertical-align: middle; }
    tr:hover td { background: #fffbeb; }

    .status-badge {
      display: inline-block; padding: 0.25rem 0.7rem; border-radius: 20px;
      font-size: 0.65rem; font-weight: 700; text-transform: capitalize; white-space: nowrap;
    }
    .status-pending { background: #fef3c7; color: #b45309; }
    .status-scheduled { background: #e0e7ff; color: #4338ca; }
    .status-assigned { background: #e0f2fe; color: #0369a1; }
    .status-out-for-delivery { background: #fef3cd; color: #b45309; }
    .status-in_progress { background: #fef3cd; color: #b45309; }
    .status-delivered { background: #d1fae5; color: #065f46; }
    .status-completed { background: #d1fae5; color: #065f46; }
    .status-cancelled { background: #fee2e2; color: #991b1b; }

    .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .action-btn {
      padding: 0.3rem 0.6rem; border-radius: 8px; border: none; font-size: 0.65rem;
      font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
      transition: all 0.2s; white-space: nowrap;
    }
    .btn-assign { background: #e0f2fe; color: #0369a1; }
    .btn-assign:hover { background: #0369a1; color: white; }
    .btn-start { background: #fef3cd; color: #b45309; }
    .btn-start:hover { background: #b45309; color: white; }
    .btn-complete { background: #d1fae5; color: #065f46; }
    .btn-complete:hover { background: #065f46; color: white; }
    .btn-cancel-btn { background: #fee2e2; color: #991b1b; }
    .btn-cancel-btn:hover { background: #991b1b; color: white; }
    .btn-reschedule { background: #e0e7ff; color: #4338ca; }
    .btn-reschedule:hover { background: #4338ca; color: white; }
    .btn-view { background: #f1f5f9; color: #475569; }
    .btn-view:hover { background: #475569; color: white; }

    .empty-row td { text-align: center; padding: 3rem; color: #94a3b8; }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 24px; padding: 2rem; max-width: 600px; width: 95%;
      max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 1.2rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
    .modal .form-group { margin-bottom: 1rem; }
    .modal label {
      display: block; font-weight: 600; font-size: 0.75rem; color: #475569;
      margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .modal input, .modal select, .modal textarea {
      width: 100%; padding: 0.6rem 0.8rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.85rem; font-family: 'Inter', sans-serif;
    }
    .modal textarea { resize: vertical; min-height: 80px; }
    .modal .btn-row { display: flex; gap: 10px; margin-top: 1.5rem; }
    .btn {
      padding: 0.7rem 1.5rem; border-radius: 12px; border: none; font-weight: 600;
      font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: #b45309; color: white; }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 0.8rem; }
    .detail-item { background: #f8fafc; padding: 0.8rem; border-radius: 10px; }
    .detail-item strong { display: block; font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 0.2rem; }

    .toast {
      position: fixed; bottom: 30px; right: 30px; background: #10b981; color: white;
      padding: 0.9rem 1.5rem; border-radius: 30px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      display: flex; align-items: center; gap: 8px; font-size: 0.85rem;
    }
    .toast.error { background: #ef4444; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.8); backdrop-filter: blur(4px);
      display: flex; justify-content: center; align-items: center; z-index: 999;
    }
    .loading-overlay.hide { display: none; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #fef3c7;
      border-top-color: #b45309; border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .debug-info {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 1rem; margin-bottom: 1rem; font-size: 0.75rem; display: none;
    }
    .debug-info.show { display: block; }

    @media (max-width: 768px) {
      .container { padding: 1rem; }
      .filter-bar { gap: 6px; }
      .filter-btn { padding: 0.4rem 0.8rem; font-size: 0.7rem; }
      table { font-size: 0.7rem; }
      th, td { padding: 0.5rem 0.6rem; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <nav class="navbar">
    <div class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="KazInni Logo" class="logo-img">
      <span class="logo-text">KazInni <span>PickUp</span></span>
    </div>
    <div class="nav-right">
      <a href="/workspaces/pick-up/index.html" class="nav-btn">
        <i class="fas fa-arrow-left"></i> Dashboard
      </a>
      <div class="user-badge">
        <div class="user-avatar" id="repAvatar">PU</div>
        <span id="repName">Agent</span>
      </div>
      <button class="nav-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-clipboard-list"></i> All Deliveries</h1>
      <a href="/workspaces/pick-up/schedule.html" class="nav-btn" style="text-decoration:none;">
        <i class="fas fa-plus"></i> New Delivery
      </a>
    </div>

    <!-- Debug info panel -->
    <div class="debug-info" id="debugInfo">
      <strong>🔍 Debug Info:</strong> <span id="debugText"></span>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="scheduled">Scheduled</button>
      <button class="filter-btn" data-filter="assigned">Assigned</button>
      <button class="filter-btn" data-filter="out-for-delivery">Out for Delivery</button>
      <button class="filter-btn" data-filter="delivered">Delivered</button>
      <button class="filter-btn" data-filter="cancelled">Cancelled</button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search client, address, phone...">
      </div>
    </div>

    <div class="deliveries-table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Client</th>
              <th>Pickup</th>
              <th>Delivery</th>
              <th>Fare</th>
              <th>Driver</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="deliveriesTableBody">
            <tr class="empty-row"><td colspan="8"><i class="fas fa-sync-alt fa-spin"></i> Loading deliveries...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="actionModal">
    <div class="modal" id="modalContent"></div>
  </div>

  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allDeliveries = {};
    let allAssistants = {};
    let currentFilter = 'all';
    let searchQuery = '';

    const loadingOverlay = document.getElementById('loadingOverlay');
    const tableBody = document.getElementById('deliveriesTableBody');
    const modal = document.getElementById('actionModal');
    const modalContent = document.getElementById('modalContent');
    const searchInput = document.getElementById('searchInput');
    const toastContainer = document.getElementById('toastContainer');
    const debugInfo = document.getElementById('debugInfo');
    const debugText = document.getElementById('debugText');

    function showDebug(msg) {
      debugText.textContent = msg;
      debugInfo.classList.add('show');
      console.log('🔍', msg);
    }

    function showToast(msg, isError = false) {
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    function getInitials(name) {
      if (!name) return '??';
      return String(name).split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
    }

    function getClientName(d) {
      if (!d) return 'Client';
      return d.userName || d.customer?.name || d.userEmail || d.createdBy || 'Client';
    }

    function getNormalizedStatus(delivery) {
      if (!delivery) return 'pending';
      if (delivery.status) return String(delivery.status).toLowerCase();
      if (delivery.serviceType === 'scheduled') return 'scheduled';
      if (delivery.serviceType === 'instant') return 'pending';
      return 'pending';
    }

    function getStatusClass(status) {
      const s = String(status || 'pending').toLowerCase().replace(/-/g, '_');
      const map = {
        'pending': 'status-pending',
        'scheduled': 'status-scheduled',
        'assigned': 'status-assigned',
        'out_for_delivery': 'status-out-for-delivery',
        'in_progress': 'status-in_progress',
        'delivered': 'status-delivered',
        'completed': 'status-completed',
        'cancelled': 'status-cancelled'
      };
      return map[s] || 'status-pending';
    }

    function formatFare(delivery) {
      if (!delivery) return '—';
      if (delivery.fare?.total) return `${delivery.fare.total} KES`;
      if (typeof delivery.fare === 'number') return `${delivery.fare} KES`;
      return '—';
    }

    function getShortId(id) {
      if (!id) return '—';
      return String(id).substring(Math.max(0, id.length - 6));
    }

    function getDriverName(delivery) {
      if (!delivery) return '—';
      return delivery.assignedName || delivery.assistant?.name || delivery.assignedTo || '—';
    }

    function getPickupAddress(delivery) {
      if (!delivery) return 'N/A';
      return delivery.pickup?.address || delivery.pickup?.coordinates?.displayName || 
             (delivery.pickup?.name ? delivery.pickup.name + ' (map)' : null) || 'N/A';
    }

    function getDeliveryAddress(delivery) {
      if (!delivery) return 'N/A';
      return delivery.delivery?.address || delivery.delivery?.coordinates?.displayName || 
             (delivery.delivery?.name ? delivery.delivery.name + ' (map)' : null) || 'N/A';
    }

    function renderTable() {
      // Convert all deliveries to array
      let deliveries = Object.entries(allDeliveries)
        .map(([id, data]) => ({ id, ...data }));

      // Debug: show what we have
      const statuses = deliveries.map(d => getNormalizedStatus(d));
      showDebug(`Total raw: ${deliveries.length} | Statuses: [${statuses.join(', ')}] | Filter: "${currentFilter}"`);

      // NO filtering by isValidDelivery - show ALL entries to debug
      // Apply status filter
      if (currentFilter !== 'all') {
        const filterStatus = currentFilter.toLowerCase().replace(/-/g, '_');
        deliveries = deliveries.filter(d => {
          const status = getNormalizedStatus(d);
          return status === filterStatus;
        });
      }

      // Apply search
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        deliveries = deliveries.filter(d => {
          const client = getClientName(d).toLowerCase();
          const pickup = getPickupAddress(d).toLowerCase();
          const dropoff = getDeliveryAddress(d).toLowerCase();
          const phone = (d.userPhone || d.customer?.phone || '').toLowerCase();
          const driver = getDriverName(d).toLowerCase();
          return client.includes(q) || pickup.includes(q) || dropoff.includes(q) || phone.includes(q) || driver.includes(q);
        });
      }

      // Sort by newest first
      deliveries.sort((a, b) => {
        const tA = a.createdAt || a.timestamp || a.bookingDate || 0;
        const tB = b.createdAt || b.timestamp || b.bookingDate || 0;
        return tB - tA;
      });

      showDebug(`After filter: ${deliveries.length} deliveries | Filter: "${currentFilter}" | Search: "${searchQuery || 'none'}"`);

      if (!deliveries.length) {
        tableBody.innerHTML = `<tr class="empty-row"><td colspan="8">
          <i class="fas fa-box-open" style="font-size:2rem;display:block;margin-bottom:8px;"></i>
          <p>No deliveries found</p>
          <p style="font-size:0.7rem;color:#94a3b8;">${currentFilter !== 'all' ? 'Try changing the filter or search query' : 'Create a new delivery to get started'}</p>
        </td></tr>`;
        return;
      }

      tableBody.innerHTML = deliveries.map(del => {
        const status = getNormalizedStatus(del);
        const client = getClientName(del);
        const pickup = getPickupAddress(del);
        const dropoff = getDeliveryAddress(del);
        const fare = formatFare(del);
        const driverName = getDriverName(del);
        const statusClass = getStatusClass(status);
        const phone = del.userPhone || del.customer?.phone || '';

        return `
          <tr>
            <td><code style="font-size:0.7rem;background:#f1f5f9;padding:2px 6px;border-radius:4px;">#${getShortId(del.id)}</code></td>
            <td>
              <div style="display:flex;align-items:center;gap:8px;">
                <div style="width:28px;height:28px;background:#fffbeb;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.65rem;flex-shrink:0;">${getInitials(client)}</div>
                <div>
                  <strong>${escapeHtml(client)}</strong>
                  ${phone ? `<div style="font-size:0.65rem;color:#94a3b8;">${escapeHtml(phone)}</div>` : ''}
                </div>
              </div>
            </td>
            <td><span title="${escapeHtml(pickup)}">${escapeHtml(String(pickup).substring(0, 25))}${String(pickup).length > 25 ? '...' : ''}</span></td>
            <td><span title="${escapeHtml(dropoff)}">${escapeHtml(String(dropoff).substring(0, 25))}${String(dropoff).length > 25 ? '...' : ''}</span></td>
            <td><strong>${fare}</strong></td>
            <td>${escapeHtml(driverName)}</td>
            <td><span class="status-badge ${statusClass}">${status.replace(/_/g, ' ').replace(/-/g, ' ')}</span></td>
            <td>
              <div class="action-btns">
                <button class="action-btn btn-view" onclick="viewDetails('${del.id}')" title="View Details"><i class="fas fa-eye"></i></button>
                ${['pending', 'scheduled'].includes(status) ? `
                  <button class="action-btn btn-assign" onclick="showAssignModal('${del.id}')" title="Assign Driver"><i class="fas fa-user-plus"></i></button>
                ` : ''}
                ${status === 'assigned' ? `
                  <button class="action-btn btn-start" onclick="updateStatus('${del.id}', 'out-for-delivery')" title="Start Delivery"><i class="fas fa-truck"></i></button>
                ` : ''}
                ${status === 'out-for-delivery' || status === 'in_progress' ? `
                  <button class="action-btn btn-complete" onclick="updateStatus('${del.id}', 'delivered')" title="Mark Delivered"><i class="fas fa-check"></i></button>
                ` : ''}
                ${['pending', 'scheduled', 'assigned'].includes(status) ? `
                  <button class="action-btn btn-reschedule" onclick="showRescheduleModal('${del.id}')" title="Reschedule"><i class="fas fa-calendar-alt"></i></button>
                  <button class="action-btn btn-cancel-btn" onclick="updateStatus('${del.id}', 'cancelled')" title="Cancel"><i class="fas fa-times"></i></button>
                ` : ''}
              </div>
            </td>
          </tr>`;
      }).join('');
    }

    async function updateStatus(deliveryId, newStatus) {
      const delivery = allDeliveries[deliveryId];
      if (!delivery) return;

      const statusLabels = {
        'out-for-delivery': 'Start Delivery',
        'delivered': 'Mark as Delivered',
        'cancelled': 'Cancel Delivery'
      };
      const action = statusLabels[newStatus] || newStatus;

      if (!confirm(`Are you sure you want to ${action.toLowerCase()} this delivery?`)) return;

      try {
        const updates = {
          status: newStatus,
          statusHistory: [
            ...(delivery.statusHistory || []),
            { status: newStatus, note: `${action} by ${auth.currentUser?.email || 'staff'}`, timestamp: new Date().toISOString() }
          ]
        };
        if (newStatus === 'delivered') {
          updates.deliveryDate = new Date().toISOString();
          updates.completedAt = firebase.database.ServerValue.TIMESTAMP;
        }
        if (newStatus === 'cancelled') updates.cancelledAt = firebase.database.ServerValue.TIMESTAMP;
        if (newStatus === 'out-for-delivery') {
          updates.pickupConfirmedAt = new Date().toISOString();
          updates.startedAt = firebase.database.ServerValue.TIMESTAMP;
        }
        await database.ref(`pickup_deliveries/${deliveryId}`).update(updates);
        showToast(`✅ Delivery ${newStatus.replace(/-/g, ' ')}`);
      } catch (e) {
        console.error('Update error:', e);
        showToast('Failed to update status', true);
      }
    }

    function viewDetails(deliveryId) {
      const del = allDeliveries[deliveryId];
      if (!del) return;

      const client = getClientName(del);
      const status = getNormalizedStatus(del);
      const fare = formatFare(del);
      const pickup = getPickupAddress(del);
      const dropoff = getDeliveryAddress(del);

      modalContent.innerHTML = `
        <h3><i class="fas fa-info-circle"></i> Delivery Details <code style="font-size:0.7rem;">#${getShortId(deliveryId)}</code></h3>
        <div class="detail-grid">
          <div class="detail-item"><strong>Client</strong>${escapeHtml(client)}</div>
          <div class="detail-item"><strong>Phone</strong>${escapeHtml(del.userPhone || del.customer?.phone || 'N/A')}</div>
          <div class="detail-item"><strong>Email</strong>${escapeHtml(del.userEmail || del.customer?.email || 'N/A')}</div>
          <div class="detail-item"><strong>Status</strong><span class="status-badge ${getStatusClass(status)}">${status.replace(/_/g, ' ').replace(/-/g, ' ')}</span></div>
          <div class="detail-item"><strong>Pickup</strong>${escapeHtml(pickup)}</div>
          <div class="detail-item"><strong>Delivery</strong>${escapeHtml(dropoff)}</div>
          <div class="detail-item"><strong>Package</strong>${escapeHtml(del.package?.type || 'N/A')} · ${del.package?.weight || del.passengers?.count || 0}${del.package?.weight ? 'kg' : ''}</div>
          <div class="detail-item"><strong>Fare</strong>${fare}</div>
          <div class="detail-item"><strong>Distance</strong>${del.distance ? del.distance + ' km' : (del.fare?.distance ? del.fare.distance + ' KES (charge)' : 'N/A')}</div>
          <div class="detail-item"><strong>Driver</strong>${escapeHtml(getDriverName(del))}</div>
          <div class="detail-item"><strong>Instructions</strong>${escapeHtml(del.package?.instructions || del.instructions || del.specialRequirements || 'None')}</div>
          <div class="detail-item"><strong>Service Type</strong>${escapeHtml(del.serviceType || 'N/A')}</div>
          ${del.pickup?.scheduledDateTime ? `<div class="detail-item"><strong>Scheduled</strong>${new Date(del.pickup.scheduledDateTime).toLocaleString()}</div>` : ''}
          <div class="detail-item"><strong>Created</strong>${del.createdAt ? new Date(del.createdAt).toLocaleString() : (del.bookingDate ? new Date(del.bookingDate).toLocaleString() : 'N/A')}</div>
          ${del.deliveryDate ? `<div class="detail-item"><strong>Delivered</strong>${new Date(del.deliveryDate).toLocaleString()}</div>` : ''}
        </div>
        ${del.statusHistory && del.statusHistory.length ? `
          <h4 style="margin-top:1.5rem;margin-bottom:0.5rem;">Status History</h4>
          ${del.statusHistory.map(h => `
            <div style="background:#f8fafc;padding:0.5rem 0.8rem;border-radius:8px;margin-bottom:4px;font-size:0.75rem;">
              <strong>${h.status}</strong> · ${escapeHtml(h.note || '')} · <span style="color:#94a3b8;">${h.timestamp ? new Date(h.timestamp).toLocaleString() : ''}</span>
            </div>
          `).join('')}
        ` : ''}
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="closeModal()">Close</button>
        </div>
      `;
      modal.classList.add('show');
    }

    function showAssignModal(deliveryId) {
      const assistants = Object.entries(allAssistants).filter(([_, a]) => a.verified);
      if (!assistants.length) {
        modalContent.innerHTML = `
          <h3><i class="fas fa-user-plus"></i> Assign Driver</h3>
          <p style="color:#94a3b8;text-align:center;padding:2rem;">No verified drivers available.</p>
          <div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>
        `;
        modal.classList.add('show');
        return;
      }
      modalContent.innerHTML = `
        <h3><i class="fas fa-user-plus"></i> Assign Driver</h3>
        <div class="form-group">
          <label>Select Driver</label>
          <select id="driverSelect" style="width:100%;padding:0.6rem;border-radius:10px;border:1.5px solid #e2e8f0;">
            <option value="">— Choose a driver —</option>
            ${assistants.map(([id, a]) => `
              <option value="${id}">${escapeHtml(a.name || id)} · ${escapeHtml(a.vehicle || 'N/A')} · ${escapeHtml(a.phone || '')}</option>
            `).join('')}
          </select>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="assignDriver('${deliveryId}')">Assign Driver</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      modal.classList.add('show');
    }

    async function assignDriver(deliveryId) {
      const driverId = document.getElementById('driverSelect').value;
      if (!driverId) { showToast('Please select a driver', true); return; }
      const driver = allAssistants[driverId];
      if (!driver) { showToast('Driver not found', true); return; }
      try {
        await database.ref(`pickup_deliveries/${deliveryId}`).update({
          status: 'assigned',
          assignedTo: driverId,
          assignedName: driver.name || driver.email,
          assignedAt: new Date().toISOString(),
          assistant: {
            id: driverId, name: driver.name || driver.email,
            phone: driver.phone || '', vehicle: driver.vehicle || '',
            assignedAt: new Date().toISOString()
          },
          statusHistory: [
            ...(allDeliveries[deliveryId]?.statusHistory || []),
            { status: 'assigned', note: `Assigned to ${driver.name || driver.email}`, timestamp: new Date().toISOString() }
          ]
        });
        await database.ref(`assistant_tasks/${driverId}/${deliveryId}`).set({
          assignedAt: new Date().toISOString(), bookingId: deliveryId,
          customerEmail: allDeliveries[deliveryId]?.userEmail || allDeliveries[deliveryId]?.customer?.email || '',
          customerId: allDeliveries[deliveryId]?.userId || '',
          status: 'assigned',
          zone: allDeliveries[deliveryId]?.delivery?.zone || allDeliveries[deliveryId]?.pickup?.zone || ''
        });
        closeModal();
        showToast('✅ Driver assigned successfully');
      } catch (e) {
        console.error('Assign error:', e);
        showToast('Failed to assign driver', true);
      }
    }

    function showRescheduleModal(deliveryId) {
      const del = allDeliveries[deliveryId];
      const existingDate = del?.pickup?.scheduledDateTime 
        ? new Date(del.pickup.scheduledDateTime).toISOString().split('T')[0] 
        : new Date().toISOString().split('T')[0];
      const existingTime = del?.pickup?.scheduledDateTime 
        ? new Date(del.pickup.scheduledDateTime).toTimeString().substring(0,5) 
        : '09:00';
      modalContent.innerHTML = `
        <h3><i class="fas fa-calendar-alt"></i> Reschedule Delivery</h3>
        <div class="form-group"><label>New Pickup Date</label><input type="date" id="rescheduleDate" value="${existingDate}"></div>
        <div class="form-group"><label>New Pickup Time</label><input type="time" id="rescheduleTime" value="${existingTime}"></div>
        <div class="form-group"><label>Reason for Rescheduling</label><textarea id="rescheduleReason" placeholder="e.g., Client requested..."></textarea></div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="rescheduleDelivery('${deliveryId}')">Save Changes</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      modal.classList.add('show');
    }

    async function rescheduleDelivery(deliveryId) {
      const date = document.getElementById('rescheduleDate').value;
      const time = document.getElementById('rescheduleTime').value;
      const reason = document.getElementById('rescheduleReason').value;
      if (!date || !time) { showToast('Please set date and time', true); return; }
      const scheduledDateTime = new Date(`${date}T${time}:00`).toISOString();
      try {
        await database.ref(`pickup_deliveries/${deliveryId}`).update({
          status: 'scheduled',
          'pickup/scheduledDateTime': scheduledDateTime,
          rescheduledAt: new Date().toISOString(),
          rescheduledBy: auth.currentUser?.email || 'staff',
          rescheduleReason: reason,
          statusHistory: [
            ...(allDeliveries[deliveryId]?.statusHistory || []),
            { status: 'scheduled', note: `Rescheduled to ${date} ${time}. Reason: ${reason || 'N/A'}`, timestamp: new Date().toISOString() }
          ]
        });
        closeModal();
        showToast('✅ Delivery rescheduled');
      } catch (e) {
        console.error('Reschedule error:', e);
        showToast('Failed to reschedule', true);
      }
    }

    function closeModal() { modal.classList.remove('show'); }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTable();
      });
    });

    // Search
    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value;
      renderTable();
    });

    // Close modal on overlay click and Escape key
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    function setupRealtimeListeners() {
      database.ref('pickup_deliveries').on('value', (snapshot) => {
        allDeliveries = snapshot.val() || {};
        console.log('📦 Pickup deliveries loaded:', Object.keys(allDeliveries).length);
        if (Object.keys(allDeliveries).length > 0) {
          console.log('📦 Sample entry:', Object.entries(allDeliveries)[0]);
        }
        renderTable();
        loadingOverlay.classList.add('hide');
      }, (error) => {
        console.error('❌ Error loading deliveries:', error);
        showDebug('Error loading: ' + error.message);
        loadingOverlay.classList.add('hide');
      });

      database.ref('delivery_assistants').on('value', (snapshot) => {
        allAssistants = snapshot.val() || {};
        console.log('👤 Delivery assistants loaded:', Object.keys(allAssistants).length);
      });
    }

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        let userName = 'Logistics Agent';
        try {
          const staffSnap = await database.ref(`logistics_staff/${user.uid}`).once('value');
          if (staffSnap.exists()) {
            userName = staffSnap.val().name || user.email?.split('@')[0] || 'Staff';
          } else {
            const brandSnap = await database.ref(`brandinn_users/${user.uid}`).once('value');
            if (brandSnap.exists()) {
              userName = brandSnap.val().name || brandSnap.val().businessName || user.email?.split('@')[0] || 'Agent';
            } else {
              userName = user.displayName || user.email?.split('@')[0] || 'Agent';
            }
          }
        } catch (e) {
          userName = user.email?.split('@')[0] || 'Agent';
        }
        document.getElementById('repName').textContent = userName;
        document.getElementById('repAvatar').textContent = getInitials(userName);
        setupRealtimeListeners();
      } else {
        window.location.href = 'https://kazinni.vercel.app';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if (confirm('Log out?')) await auth.signOut();
    });

    setTimeout(() => loadingOverlay.classList.add('hide'), 8000);
  </script>
</body>
</html>
