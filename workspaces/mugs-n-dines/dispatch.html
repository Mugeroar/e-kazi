<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dispatch Management | Mugs N Dines</title>
    
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #f97316;
            --orange-dark: #c2410c;
            --orange-light: #fb923c;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-muted: #64748b;
            --border-light: #fed7aa;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --emerald: #059669;
            --purple: #8b5cf6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #fff7ed 0%, #ffffff 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(249, 115, 22, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 8px;
        }

        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2); }
        .logo-text {
            font-weight: 800; font-size: 1rem;
            background: linear-gradient(145deg, #fb923c, #c2410c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .nav-btn {
            background: rgba(249, 115, 22, 0.08); border: 1px solid rgba(249, 115, 22, 0.2);
            padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--orange-dark);
            font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
            align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
        }
        .nav-btn:hover { background: var(--orange); color: white; }

        .container { padding: 1rem; max-width: 1400px; margin: 0 auto; }

        .page-header { margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.8rem; }
        .page-header h1 { font-size: 1.2rem; font-weight: 800; }
        .page-header h1 i { color: var(--orange-dark); margin-right: 6px; }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
        .stat-mini {
            background: white; border-radius: 14px; padding: 0.8rem;
            text-align: center; border: 1px solid var(--border-light);
        }
        .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--orange-dark); }
        .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }

        .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
        .filter-btn {
            padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0;
            background: white; color: #64748b; font-weight: 600; font-size: 0.65rem;
            cursor: pointer;
        }
        .filter-btn:hover { border-color: var(--orange); color: var(--orange-dark); }
        .filter-btn.active { background: var(--orange); color: white; border-color: var(--orange); }
        .search-box { flex: 1; min-width: 150px; max-width: 300px; position: relative; }
        .search-box input {
            width: 100%; padding: 0.35rem 0.8rem 0.35rem 2rem; border-radius: 20px;
            border: 1.5px solid #e2e8f0; font-size: 0.7rem;
        }
        .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.7rem; }

        .table-wrap {
            background: white; border-radius: 16px; border: 1px solid var(--border-light);
            overflow: hidden;
        }
        .table-scroll { overflow-x: auto; max-height: 60vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.72rem; min-width: 800px; }
        thead { position: sticky; top: 0; z-index: 2; background: #fff7ed; }
        th { padding: 0.6rem 0.7rem; text-align: left; font-weight: 700; color: #c2410c; font-size: 0.6rem; text-transform: uppercase; }
        td { padding: 0.5rem 0.7rem; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        tr:hover td { background: #fff7ed; }

        .status-badge {
            display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px;
            font-size: 0.6rem; font-weight: 700;
        }
        .status-ready { background: #fef3c7; color: #b45309; }
        .status-dispatched { background: #ede9fe; color: #5b21b6; }

        .action-btns { display: flex; gap: 4px; flex-wrap: wrap; }
        .action-btn {
            padding: 0.25rem 0.5rem; border-radius: 6px; border: none; font-size: 0.6rem;
            font-weight: 600; cursor: pointer;
        }
        .btn-dispatch { background: #e0f2fe; color: #0369a1; }
        .btn-dispatch:hover { background: #3b82f6; color: white; }
        .btn-view { background: #f1f5f9; color: #475569; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 20px; padding: 1.5rem;
            max-width: 500px; width: 95%; max-height: 85vh; overflow-y: auto;
        }
        .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; color: var(--orange-dark); display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 0.7rem; }
        .form-group label {
            display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; margin-bottom: 0.15rem;
        }
        .form-group select, .form-group textarea, .form-group input {
            width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
            border: 1.5px solid #e2e8f0; font-size: 0.8rem;
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
        .btn-row { display: flex; gap: 8px; margin-top: 1rem; justify-content: flex-end; }
        .btn {
            padding: 0.5rem 1rem; border-radius: 10px; border: none; font-weight: 700;
            font-size: 0.75rem; cursor: pointer;
        }
        .btn-primary { background: var(--orange); color: white; }
        .btn-secondary { background: #f1f5f9; color: #475569; }

        .toast {
            position: fixed; bottom: 25px; right: 25px; background: var(--emerald);
            color: white; padding: 0.7rem 1.2rem; border-radius: 20px;
            font-weight: 600; z-index: 4000; animation: slideIn 0.3s ease;
            display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
        }
        .toast.error { background: var(--danger); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .info-note {
            background: #fef3c7;
            padding: 0.5rem;
            border-radius: 8px;
            font-size: 0.65rem;
            color: #92400e;
            margin-bottom: 0.8rem;
        }

        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(3, 1fr); }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/workspaces/mugs-n-dines/index.html" class="logo">
            <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Mugs N Dines" class="logo-img">
            <span class="logo-text">Mugs N Dines <span>Dispatch</span></span>
        </a>
        <div class="nav-right">
            <a href="/workspaces/mugs-n-dines/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <a href="/workspaces/mugs-n-dines/orders.html" class="nav-btn"><i class="fas fa-shopping-cart"></i> Orders</a>
            <a href="/workspaces/mugs-n-dines/kitchens.html" class="nav-btn"><i class="fas fa-store-alt"></i> Kitchens</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-truck-fast"></i> Dispatch Management</h1>
            <p style="font-size:0.7rem;color:var(--text-muted);" id="orderCount">Loading...</p>
        </div>

        <div class="stats-row">
            <div class="stat-mini"><div class="stat-num" id="statReady">0</div><div class="stat-label">Ready for Dispatch</div></div>
            <div class="stat-mini"><div class="stat-num" id="statDispatched">0</div><div class="stat-label">Dispatched Today</div></div>
            <div class="stat-mini"><div class="stat-num" id="statTotalDispatched">0</div><div class="stat-label">Total Dispatched</div></div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="ready">Ready to Dispatch</button>
            <button class="filter-btn" data-filter="dispatched">Dispatched Orders</button>
            <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search customer..."></div>
        </div>

        <div class="table-wrap">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Pickup Kitchen</th>
                            <th>Delivery Location</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="8" style="text-align:center; padding:2rem;">Loading orders...</td></tr>
                    </tbody>
                20次
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
    <div id="toastContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let allOrders = {};
        let allDrivers = {};
        let allKitchens = {};
        let currentFilter = 'ready';
        let searchQuery = '';

        function showToast(msg, isError = false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

        function getStatusClass(status) {
            return status === 'ready' ? 'status-ready' : 'status-dispatched';
        }

        function getStatusLabel(status) {
            return status === 'ready' ? 'Ready' : 'Dispatched';
        }

        // Load verified delivery assistants (drivers)
        async function loadDrivers() {
            try {
                const snap = await db.ref('delivery_assistants').once('value');
                const data = snap.val() || {};
                allDrivers = Object.entries(data)
                    .filter(([_, d]) => d.verified === true && d.status !== 'inactive')
                    .reduce((obj, [id, d]) => ({ ...obj, [id]: d }), {});
                console.log('Drivers loaded:', Object.keys(allDrivers).length);
            } catch(e) { console.error('Error loading drivers:', e); }
        }

        function getDriverOptions(selectedId = '') {
            const drivers = Object.entries(allDrivers).sort((a, b) => (a[1].name || '').localeCompare(b[1].name || ''));
            if (drivers.length === 0) return '<option value="">No drivers available</option>';
            let options = '<option value="">— Select driver —</option>';
            drivers.forEach(([id, d]) => {
                const selected = id === selectedId ? 'selected' : '';
                options += `<option value="${id}" ${selected}>🚗 ${d.name || 'Driver'} · ${d.phone || ''} · ${d.vehicle || ''} · ${d.zone || ''}</option>`;
            });
            return options;
        }

        function getKitchenOptions(selectedId = '') {
            const kitchens = Object.entries(allKitchens).filter(([_, k]) => k.status !== 'inactive');
            if (kitchens.length === 0) return '<option value="">No kitchens available</option>';
            let options = '<option value="">— Select pickup kitchen —</option>';
            kitchens.forEach(([id, k]) => {
                const selected = id === selectedId ? 'selected' : '';
                options += `<option value="${id}" ${selected}>🍽️ ${k.name || 'Kitchen'} · ${k.location || ''}</option>`;
            });
            return options;
        }

        function updateStats() {
            const orders = Object.values(allOrders);
            const readyCount = orders.filter(o => o && o.status === 'ready' && o.orderType === 'delivery').length;
            const dispatchedToday = orders.filter(o => o && o.status === 'dispatched' && o.dispatchedAt && new Date(o.dispatchedAt).toDateString() === new Date().toDateString()).length;
            const totalDispatched = orders.filter(o => o && o.status === 'dispatched').length;

            document.getElementById('statReady').textContent = readyCount;
            document.getElementById('statDispatched').textContent = dispatchedToday;
            document.getElementById('statTotalDispatched').textContent = totalDispatched;
            document.getElementById('orderCount').innerHTML = `${readyCount} orders ready for dispatch`;
        }

        function renderTable() {
            // Get ONLY delivery orders
            let orders = Object.entries(allOrders)
                .map(([id, data]) => ({ id, ...data }))
                .filter(o => o && o.orderType === 'delivery');
            
            // Filter by status
            if (currentFilter === 'ready') {
                orders = orders.filter(o => o.status === 'ready');
            } else if (currentFilter === 'dispatched') {
                orders = orders.filter(o => o.status === 'dispatched');
            }
            
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                orders = orders.filter(o => 
                    (o.customerName || '').toLowerCase().includes(q)
                );
            }
            
            orders.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            
            if (!orders.length) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" style="text-align:center; padding:2rem;">No orders to display</td></tr>';
                return;
            }

            document.getElementById('tableBody').innerHTML = orders.map(order => {
                const status = order.status || 'ready';
                const itemCount = (order.items || []).reduce((sum, i) => sum + (i.quantity || 0), 0);
                const shortId = order.id.slice(-6);
                const kitchenName = allKitchens[order.kitchenId]?.name || order.kitchenName || '—';
                const deliveryLocation = order.deliveryAddress || order.pickupLocation || '—';
                const displayLocation = deliveryLocation.length > 30 ? deliveryLocation.slice(0,30) + '...' : deliveryLocation;

                let actions = `<button class="action-btn btn-view" onclick="viewOrder('${order.id}')"><i class="fas fa-eye"></i> View</button>`;
                
                if (status === 'ready') {
                    actions = `<button class="action-btn btn-dispatch" onclick="showDispatchModal('${order.id}')"><i class="fas fa-paper-plane"></i> Dispatch</button> ${actions}`;
                }

                return `<tr>
                    <td><code>#${shortId}</code></td>
                    <td><strong>${escapeHtml(order.customerName || 'Customer')}</strong><br><span style="font-size:0.6rem;">${order.customerPhone || ''}</span></td>
                    <td>${itemCount} item(s)</td>
                    <td><strong>KES ${(order.total || 0).toLocaleString()}</strong></td>
                    <td><span style="background:#fff7ed;padding:2px 6px;border-radius:8px;">${escapeHtml(kitchenName)}</span></td>
                    <td><span style="background:#e0f2fe;padding:2px 6px;border-radius:8px;">${escapeHtml(displayLocation)}</span></td>
                    <td><span class="status-badge ${getStatusClass(status)}">${getStatusLabel(status)}</span></td>
                    <td><div class="action-btns">${actions}</div></td>
                </tr>`;
            }).join('');
        }

        function viewOrder(orderId) {
            const order = allOrders[orderId];
            if (!order) return;
            const items = order.items || [];
            const kitchenName = allKitchens[order.kitchenId]?.name || order.kitchenName || '—';
            
            document.getElementById('modalContent').innerHTML = `
                <h3><i class="fas fa-info-circle"></i> Order #${orderId.slice(-6)}</h3>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.75rem;margin-bottom:1rem;">
                    <div><strong>Customer:</strong> ${escapeHtml(order.customerName)}</div>
                    <div><strong>Phone:</strong> ${order.customerPhone || '—'}</div>
                    <div><strong>Pickup Kitchen:</strong> ${escapeHtml(kitchenName)}</div>
                    <div><strong>Status:</strong> <span class="status-badge ${getStatusClass(order.status)}">${getStatusLabel(order.status)}</span></div>
                    <div><strong>Total:</strong> KES ${(order.total || 0).toLocaleString()}</div>
                    ${order.driverName ? `<div><strong>Driver:</strong> ${escapeHtml(order.driverName)}</div>` : ''}
                </div>
                ${order.deliveryAddress ? `<div style="background:#f0fdf4;padding:0.6rem;border-radius:10px;margin-bottom:0.8rem;"><strong>📍 Delivery Address:</strong><br>${escapeHtml(order.deliveryAddress)}</div>` : ''}
                ${order.dispatchedAt ? `<div style="background:#ede9fe;padding:0.6rem;border-radius:10px;margin-bottom:0.8rem;"><strong>🚚 Dispatched At:</strong><br>${new Date(order.dispatchedAt).toLocaleString()}</div>` : ''}
                ${order.driverName ? `<div style="background:#f1f5f9;padding:0.6rem;border-radius:10px;margin-bottom:0.8rem;"><strong>👤 Driver:</strong> ${escapeHtml(order.driverName)}<br>📞 ${order.driverPhone || ''}<br>🚗 ${order.driverVehicle || ''}</div>` : ''}
                <p style="font-weight:700;font-size:0.7rem;">Items:</p>
                ${items.map(item => `<div style="background:#f8fafc;padding:0.4rem;border-radius:8px;margin-bottom:4px;font-size:0.7rem;">${escapeHtml(item.name)} × ${item.quantity} = KES ${((item.price||0)*item.quantity).toLocaleString()}</div>`).join('')}
                <div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>
            `;
            document.getElementById('modal').classList.add('show');
        }

        function showDispatchModal(orderId) {
            const order = allOrders[orderId];
            if (!order) return;
            
            const kitchenName = allKitchens[order.kitchenId]?.name || order.kitchenName || '—';
            
            document.getElementById('modalContent').innerHTML = `
                <h3><i class="fas fa-paper-plane"></i> Dispatch Order</h3>
                <div class="info-note">
                    <i class="fas fa-info-circle"></i> Order #${orderId.slice(-6)} - ${escapeHtml(order.customerName)}
                </div>
                
                <div class="form-group">
                    <label>📍 Pickup Kitchen *</label>
                    <select id="pickupKitchenId" required>
                        ${getKitchenOptions(order.kitchenId || '')}
                    </select>
                </div>
                
                <div class="form-group">
                    <label>📍 Delivery Location *</label>
                    <textarea id="deliveryLocation" rows="2" required placeholder="Enter complete delivery address">${order.deliveryAddress || order.pickupLocation || ''}</textarea>
                </div>
                
                <div class="form-group">
                    <label>👤 Assign Delivery Assistant *</label>
                    <select id="driverSelect" required>
                        ${getDriverOptions(order?.driverId || '')}
                    </select>
                </div>
                
                <div class="form-group">
                    <label>📝 Dispatch Notes (Optional)</label>
                    <textarea id="dispatchNotes" rows="2" placeholder="Special instructions for driver..."></textarea>
                </div>
                
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="confirmDispatch('${orderId}')">Confirm Dispatch</button>
                    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            `;
            document.getElementById('modal').classList.add('show');
        }

        async function confirmDispatch(orderId) {
            const pickupKitchenId = document.getElementById('pickupKitchenId')?.value;
            if (!pickupKitchenId) { showToast('Please select pickup kitchen', true); return; }
            
            const deliveryLocation = document.getElementById('deliveryLocation')?.value.trim();
            if (!deliveryLocation) { showToast('Please enter delivery location', true); return; }
            
            const driverId = document.getElementById('driverSelect')?.value;
            if (!driverId) { showToast('Please select a delivery assistant', true); return; }
            
            const driver = allDrivers[driverId];
            const dispatchNotes = document.getElementById('dispatchNotes')?.value || '';
            const pickupKitchen = allKitchens[pickupKitchenId];
            
            try {
                await db.ref(`mugs_n_dines_orders/${orderId}`).update({
                    // Driver info
                    driverId: driverId,
                    driverName: driver?.name || 'Driver',
                    driverPhone: driver?.phone || '',
                    driverVehicle: driver?.vehicle || '',
                    // Pickup kitchen info
                    kitchenId: pickupKitchenId,
                    kitchenName: pickupKitchen?.name || '',
                    pickupLocation: pickupKitchen?.location || '',
                    // Delivery info
                    deliveryAddress: deliveryLocation,
                    // Status and timestamps
                    status: 'dispatched',
                    dispatchedAt: firebase.database.ServerValue.TIMESTAMP,
                    dispatchNotes: dispatchNotes,
                    updatedAt: firebase.database.ServerValue.TIMESTAMP
                });
                showToast(`✅ Order dispatched to ${driver?.name || 'driver'}!`);
                closeModal();
            } catch(e) { 
                console.error(e);
                showToast('Failed to dispatch order', true); 
            }
        }

        function closeModal() { document.getElementById('modal').classList.remove('show'); }

        // Set up filters
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTable();
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderTable();
        });

        document.getElementById('modal').addEventListener('click', (e) => { if (e.target === document.getElementById('modal')) closeModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        // Make functions global
        window.viewOrder = viewOrder;
        window.showDispatchModal = showDispatchModal;
        window.confirmDispatch = confirmDispatch;
        window.closeModal = closeModal;

        // Load all data
        async function loadData() {
            await loadDrivers();
            
            const ordersSnap = await db.ref('mugs_n_dines_orders').once('value');
            allOrders = ordersSnap.val() || {};
            
            const kitchensSnap = await db.ref('mugs_n_dines_franchises').once('value');
            allKitchens = kitchensSnap.val() || {};
            
            updateStats();
            renderTable();
        }

        // Set up real-time listeners
        db.ref('mugs_n_dines_orders').on('value', async (snapshot) => {
            allOrders = snapshot.val() || {};
            updateStats();
            renderTable();
        });

        db.ref('mugs_n_dines_franchises').on('value', async (snapshot) => {
            allKitchens = snapshot.val() || {};
            renderTable();
        });

        db.ref('delivery_assistants').on('value', async (snapshot) => {
            const data = snapshot.val() || {};
            allDrivers = Object.entries(data)
                .filter(([_, d]) => d.verified === true && d.status !== 'inactive')
                .reduce((obj, [id, d]) => ({ ...obj, [id]: d }), {});
            renderTable();
        });

        auth.onAuthStateChanged((user) => { 
            if (!user) window.location.href = '/workspaces/index.html';
            else loadData();
        });
    </script>
</body>
</html>
