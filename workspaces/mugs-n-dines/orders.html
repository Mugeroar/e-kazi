<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Orders Management | Mugs N Dines</title>
    
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #f97316; --orange-dark: #c2410c; --orange-light: #fb923c;
            --card-bg: #ffffff; --text-primary: #1e293b; --text-muted: #64748b;
            --border-light: #fed7aa; --success: #10b981; --warning: #f59e0b;
            --danger: #ef4444; --info: #3b82f6; --emerald: #059669;
            --purple: #8b5cf6;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #fff7ed 0%, #ffffff 100%);
            color: var(--text-primary); line-height: 1.4;
            min-height: 100vh; display: flex; flex-direction: column;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; } 100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 6px;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px);
            padding: 0.5rem 2%; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 2px solid rgba(249, 115, 22, 0.3);
            position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 8px;
        }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
        .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2); }
        .logo-text {
            font-weight: 800; font-size: 1.1rem;
            background: linear-gradient(145deg, #fb923c, #c2410c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo-text span { font-weight: 600; font-size: 0.7rem; background: #f97316; -webkit-text-fill-color: #f97316; margin-left: 3px; }

        .nav-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .nav-btn {
            background: rgba(249, 115, 22, 0.08); border: 1px solid rgba(249, 115, 22, 0.2);
            padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--orange-dark);
            font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
            align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
        }
        .nav-btn:hover { background: var(--orange); color: white; }
        .nav-btn.active { background: var(--orange); color: white; border-color: var(--orange-dark); }

        .nav-dropdown { position: relative; }
        .dropdown-menu {
            position: absolute; top: calc(100% + 8px); right: 0;
            background: white; border: 1px solid var(--border-light);
            border-radius: 16px; padding: 0.5rem; min-width: 180px;
            display: none; z-index: 200; box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            padding: 0.55rem 0.8rem; border-radius: 10px;
            display: flex; align-items: center; gap: 8px;
            color: var(--text-primary); text-decoration: none;
            font-size: 0.72rem; font-weight: 500; transition: all 0.15s;
        }
        .dropdown-item:hover { background: #fff7ed; color: var(--orange-dark); }
        .dropdown-item i { width: 18px; color: var(--orange); font-size: 0.75rem; }

        .container { padding: 1rem 2%; flex: 1; max-width: 1600px; margin: 0 auto; width: 100%; }

        .page-header { margin-bottom: 1.2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
        .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
        .page-header h1 i { color: var(--orange-dark); margin-right: 6px; }

        .btn {
            padding: 0.5rem 1rem; border-radius: 10px; border: none; font-weight: 700;
            font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center;
            gap: 5px; font-family: inherit; transition: all 0.15s; white-space: nowrap;
        }
        .btn-primary { background: var(--orange); color: white; }
        .btn-primary:hover { background: var(--orange-dark); }
        .btn-outline { background: transparent; border: 1.5px solid #e2e8f0; color: var(--text-muted); }
        .btn-outline:hover { border-color: var(--orange); color: var(--orange); }
        .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.65rem; border-radius: 8px; }

        .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 1.2rem; }
        .stat-mini {
            background: white; border-radius: 14px; padding: 0.7rem 1rem; text-align: center;
            border: 1px solid var(--border-light); cursor: pointer;
            transition: all 0.2s;
        }
        .stat-mini:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(249,115,22,0.1); }
        .stat-mini.active { border: 2px solid var(--orange); background: #fff7ed; }
        .stat-mini .stat-num { font-size: 1.3rem; font-weight: 800; color: var(--orange-dark); line-height: 1.2; }
        .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
        .search-box { flex: 1; min-width: 200px; max-width: 300px; position: relative; }
        .search-box input {
            width: 100%; padding: 0.4rem 0.8rem 0.4rem 2rem; border-radius: 20px;
            border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif;
        }
        .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.7rem; }
        .type-filter { display: flex; gap: 6px; }
        .type-badge {
            padding: 0.3rem 0.8rem; border-radius: 20px; background: #f1f5f9;
            font-size: 0.65rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
        }
        .type-badge:hover { background: #e2e8f0; }
        .type-badge.active { background: var(--orange); color: white; }

        .orders-table-wrapper { background: white; border-radius: 16px; border: 1px solid var(--border-light); overflow: hidden; }
        .table-scroll { overflow-x: auto; max-height: 65vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.72rem; min-width: 900px; }
        thead { position: sticky; top: 0; z-index: 2; background: #fff7ed; }
        th { padding: 0.7rem 0.8rem; text-align: left; font-weight: 700; color: #c2410c; font-size: 0.6rem; text-transform: uppercase; white-space: nowrap; }
        td { padding: 0.6rem 0.8rem; border-bottom: 1px solid #fff7ed; vertical-align: middle; }
        tr:hover td { background: #fff7ed; }

        .status-badge {
            display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px;
            font-size: 0.6rem; font-weight: 700; text-transform: capitalize;
        }
        .status-new { background: #fef3c7; color: #92400e; }
        .status-confirmed { background: #d1fae5; color: #065f46; }
        .status-preparing { background: #e0f2fe; color: #0369a1; }
        .status-ready { background: #fed7aa; color: #9a3412; }
        .status-delivered { background: #d1fae5; color: #065f46; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }

        .order-type-icon { display: inline-flex; align-items: center; gap: 4px; font-size: 0.65rem; }
        .action-buttons { display: flex; gap: 4px; flex-wrap: wrap; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
            align-items: center; backdrop-filter: blur(2px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 20px; padding: 1.5rem; max-width: 500px;
            width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; color: var(--orange-dark); }
        .modal .order-detail-row { margin-bottom: 0.5rem; font-size: 0.75rem; }
        .modal .order-detail-label { font-weight: 700; color: var(--text-muted); min-width: 100px; display: inline-block; }
        .modal .items-list { margin: 0.5rem 0; padding-left: 1rem; }
        .modal .items-list li { font-size: 0.7rem; margin-bottom: 0.2rem; }

        .toast {
            position: fixed; bottom: 25px; right: 25px; background: var(--emerald); color: white;
            padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
            animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
        }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .footer { text-align: center; padding: 1rem; color: #94a3b8; font-size: 0.7rem; border-top: 1px solid var(--border-light); margin-top: 2rem; }

        .empty-state { text-align: center; padding: 3rem; color: #94a3b8; }
        .empty-state i { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.4; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/workspaces/mugs-n-dines/index.html" class="logo">
            <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Mugs N Dines" class="logo-img">
            <span class="logo-text">Mugs N Dines <span>🍽️</span></span>
        </a>
        <div class="nav-right">
            <a href="/workspaces/mugs-n-dines/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <a href="/workspaces/mugs-n-dines/orders.html" class="nav-btn active"><i class="fas fa-shopping-cart"></i> Orders</a>

            <div class="nav-dropdown">
                <button class="nav-btn" onclick="toggleDropdown()"><i class="fas fa-ellipsis-h"></i> More</button>
                <div class="dropdown-menu" id="moreDropdown">
                    <a href="/workspaces/mugs-n-dines/recipes.html" class="dropdown-item"><i class="fas fa-book-open"></i> Recipes</a>
                    <a href="/workspaces/mugs-n-dines/catering.html" class="dropdown-item"><i class="fas fa-calendar-check"></i> Catering</a>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-shopping-cart"></i> Orders Management</h1>
            <a href="/workspaces/mugs-n-dines/new-order.html" class="btn btn-primary"><i class="fas fa-plus"></i> New Order</a>
        </div>

        <!-- Stats Row -->
        <div class="stats-row" id="statsRow">
            <div class="stat-mini"><div class="skeleton" style="height:1.2rem;width:40%;margin:0 auto;"></div><div class="skeleton" style="height:0.6rem;width:50%;margin:0.3rem auto 0;"></div></div>
            <div class="stat-mini"><div class="skeleton" style="height:1.2rem;width:40%;margin:0 auto;"></div><div class="skeleton" style="height:0.6rem;width:50%;margin:0.3rem auto 0;"></div></div>
            <div class="stat-mini"><div class="skeleton" style="height:1.2rem;width:40%;margin:0 auto;"></div><div class="skeleton" style="height:0.6rem;width:50%;margin:0.3rem auto 0;"></div></div>
            <div class="stat-mini"><div class="skeleton" style="height:1.2rem;width:40%;margin:0 auto;"></div><div class="skeleton" style="height:0.6rem;width:50%;margin:0.3rem auto 0;"></div></div>
            <div class="stat-mini"><div class="skeleton" style="height:1.2rem;width:40%;margin:0 auto;"></div><div class="skeleton" style="height:0.6rem;width:50%;margin:0.3rem auto 0;"></div></div>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by customer name or order ID...">
            </div>
            <div class="type-filter">
                <span class="type-badge active" data-type="all">All</span>
                <span class="type-badge" data-type="takeaway"><i class="fas fa-box"></i> Takeaway</span>
                <span class="type-badge" data-type="delivery"><i class="fas fa-truck"></i> Delivery</span>
            </div>
        </div>

        <!-- Orders Table -->
        <div class="orders-table-wrapper">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr><th>Order ID</th><th>Customer</th><th>Type</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th</tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <tr><td colspan="8"><div class="skeleton" style="height:2rem;margin:0.3rem;"></div><div class="skeleton" style="height:2rem;margin:0.3rem;"></div><div class="skeleton" style="height:2rem;margin:0.3rem;"></div></td></tr>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modalTitle">Order Details</h3>
            <div id="modalContent"></div>
            <div class="btn-row" style="display: flex; gap: 8px; margin-top: 1rem; justify-content: flex-end;">
                <button class="btn btn-outline" onclick="closeModal()">Close</button>
            </div>
        </div>

    <div id="toastContainer"></div>
    <div class="footer"><i class="far fa-copyright"></i> 2026 Mugs N Dines · Order Management</div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let allOrders = {};
        let currentStatusFilter = 'all';
        let currentTypeFilter = 'all';
        let searchTerm = '';

        const statuses = ['new', 'confirmed', 'preparing', 'ready', 'delivered', 'cancelled'];
        const statusLabels = { new: 'New', confirmed: 'Confirmed', preparing: 'Preparing', ready: 'Ready', delivered: 'Delivered', cancelled: 'Cancelled' };

        function showToast(msg, isError = false) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div'); t.className = `toast ${isError ? 'error' : ''}`;
            t.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
            c.appendChild(t); setTimeout(() => t.remove(), 3500);
        }

        function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m); }

        function formatDate(timestamp) {
            if (!timestamp) return 'N/A';
            const d = new Date(timestamp);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function getOrderTypeIcon(type) {
            if (type === 'takeaway') return '<i class="fas fa-box"></i> Takeaway';
            if (type === 'delivery') return '<i class="fas fa-truck"></i> Delivery';
            return type || '—';
        }

        function getStatusBadge(status) {
            return `<span class="status-badge status-${status}">${statusLabels[status] || status}</span>`;
        }

        // Update stats row
        function updateStats() {
            const orders = Object.values(allOrders);
            const stats = {
                all: orders.length,
                new: orders.filter(o => o.status === 'new').length,
                confirmed: orders.filter(o => o.status === 'confirmed').length,
                preparing: orders.filter(o => o.status === 'preparing').length,
                delivered: orders.filter(o => o.status === 'delivered').length
            };
            const statsHtml = `
                <div class="stat-mini ${currentStatusFilter === 'all' ? 'active' : ''}" data-status="all" onclick="setStatusFilter('all')">
                    <div class="stat-num">${stats.all}</div><div class="stat-label">All Orders</div>
                </div>
                <div class="stat-mini ${currentStatusFilter === 'new' ? 'active' : ''}" data-status="new" onclick="setStatusFilter('new')">
                    <div class="stat-num">${stats.new}</div><div class="stat-label">🆕 New</div>
                </div>
                <div class="stat-mini ${currentStatusFilter === 'confirmed' ? 'active' : ''}" data-status="confirmed" onclick="setStatusFilter('confirmed')">
                    <div class="stat-num">${stats.confirmed}</div><div class="stat-label">✅ Confirmed</div>
                </div>
                <div class="stat-mini ${currentStatusFilter === 'preparing' ? 'active' : ''}" data-status="preparing" onclick="setStatusFilter('preparing')">
                    <div class="stat-num">${stats.preparing}</div><div class="stat-label">🔥 Preparing</div>
                </div>
                <div class="stat-mini ${currentStatusFilter === 'delivered' ? 'active' : ''}" data-status="delivered" onclick="setStatusFilter('delivered')">
                    <div class="stat-num">${stats.delivered}</div><div class="stat-label">✅ Delivered</div>
                </div>
            `;
            document.getElementById('statsRow').innerHTML = statsHtml;
        }

        window.setStatusFilter = (status) => {
            currentStatusFilter = status;
            updateStats();
            renderOrders();
        };

        // Update order status
        window.updateOrderStatus = async (orderId, newStatus) => {
            try {
                await db.ref(`mugs_n_dines_orders/${orderId}`).update({
                    status: newStatus,
                    updatedAt: firebase.database.ServerValue.TIMESTAMP
                });
                showToast(`Order status updated to ${statusLabels[newStatus]}`);
            } catch (e) {
                showToast('Failed to update status', true);
            }
        };

        // Cancel order
        window.cancelOrder = async (orderId) => {
            if (confirm('Are you sure you want to cancel this order?')) {
                try {
                    await db.ref(`mugs_n_dines_orders/${orderId}`).update({
                        status: 'cancelled',
                        updatedAt: firebase.database.ServerValue.TIMESTAMP
                    });
                    showToast('Order cancelled');
                } catch (e) {
                    showToast('Failed to cancel order', true);
                }
            }
        };

        // View order details
        window.viewOrderDetails = (orderId, order) => {
            const itemsHtml = (order.items || []).map(item => 
                `<li>${escapeHtml(item.name)} x ${item.quantity} = KES ${(item.price * item.quantity).toLocaleString()}</li>`
            ).join('');
            const modalContent = `
                <div class="order-detail-row"><span class="order-detail-label">Order ID:</span> ${orderId.substring(0, 8)}...</div>
                <div class="order-detail-row"><span class="order-detail-label">Customer:</span> ${escapeHtml(order.customerName)}</div>
                <div class="order-detail-row"><span class="order-detail-label">Phone:</span> ${order.customerPhone || '—'}</div>
                <div class="order-detail-row"><span class="order-detail-label">Order Type:</span> ${getOrderTypeIcon(order.orderType)}</div>
                ${order.orderType === 'delivery' ? `<div class="order-detail-row"><span class="order-detail-label">Address:</span> ${escapeHtml(order.deliveryAddress || '—')}</div>` : ''}
                ${order.specialInstructions ? `<div class="order-detail-row"><span class="order-detail-label">Special Instructions:</span> ${escapeHtml(order.specialInstructions)}</div>` : ''}
                <div class="order-detail-row"><span class="order-detail-label">Items:</span></div>
                <ul class="items-list">${itemsHtml || '<li>No items</li>'}</ul>
                <div class="order-detail-row"><span class="order-detail-label">Subtotal:</span> KES ${(order.subtotal || 0).toLocaleString()}</div>
                <div class="order-detail-row"><span class="order-detail-label">Tax (8%):</span> KES ${(order.tax || 0).toLocaleString()}</div>
                <div class="order-detail-row"><span class="order-detail-label">Total:</span> <strong>KES ${(order.total || 0).toLocaleString()}</strong></div>
                <div class="order-detail-row"><span class="order-detail-label">Status:</span> ${getStatusBadge(order.status)}</div>
                <div class="order-detail-row"><span class="order-detail-label">Created:</span> ${formatDate(order.createdAt)}</div>
            `;
            document.getElementById('modalContent').innerHTML = modalContent;
            document.getElementById('modal').classList.add('show');
        };

        window.closeModal = () => document.getElementById('modal').classList.remove('show');

        // Render orders table
        function renderOrders() {
            const tbody = document.getElementById('ordersTableBody');
            let orders = Object.entries(allOrders).map(([id, data]) => ({ id, ...data }));
            
            // Filter by status
            if (currentStatusFilter !== 'all') {
                orders = orders.filter(o => o.status === currentStatusFilter);
            }
            
            // Filter by order type
            if (currentTypeFilter !== 'all') {
                orders = orders.filter(o => o.orderType === currentTypeFilter);
            }
            
            // Filter by search term
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                orders = orders.filter(o => 
                    (o.customerName || '').toLowerCase().includes(term) ||
                    o.id.toLowerCase().includes(term)
                );
            }
            
            // Sort by date (newest first)
            orders.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            
            if (!orders.length) {
                tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><i class="fas fa-shopping-cart"></i><p>No orders found</p></div></td></tr>';
                return;
            }
            
            tbody.innerHTML = orders.map(order => {
                const itemCount = (order.items || []).reduce((sum, item) => sum + (item.quantity || 0), 0);
                const statusOptions = statuses.map(s => 
                    `<option value="${s}" ${order.status === s ? 'selected' : ''}>${statusLabels[s]}</option>`
                ).join('');
                
                return `<tr>
                    <td><code>${order.id.substring(0, 8)}...</code></td>
                    <td><strong>${escapeHtml(order.customerName)}</strong><br><span style="font-size:0.6rem;color:#64748b;">${order.customerPhone || ''}</span></td>
                    <td><span class="order-type-icon">${getOrderTypeIcon(order.orderType)}</span></td>
                    <td>${itemCount} item(s)</td>
                    <td><strong>KES ${(order.total || 0).toLocaleString()}</strong></td>
                    <td>${getStatusBadge(order.status)}</td>
                    <td>${formatDate(order.createdAt)}</td>
                    <td class="action-buttons">
                        <select onchange="updateOrderStatus('${order.id}', this.value)" class="btn-sm" style="padding:0.2rem 0.4rem;font-size:0.6rem;">
                            ${statusOptions}
                        </select>
                        <button class="btn-sm" onclick="viewOrderDetails('${order.id}', ${JSON.stringify(order).replace(/</g, '\\u003c')})" style="background:#e2e8f0;"><i class="fas fa-eye"></i></button>
                        ${order.status !== 'cancelled' && order.status !== 'delivered' ? `<button class="btn-sm" onclick="cancelOrder('${order.id}')" style="background:#fee2e2;color:#ef4444;"><i class="fas fa-times"></i></button>` : ''}
                    </td>
                </tr>`;
            }).join('');
        }

        // Setup filter listeners
        function setupFilters() {
            document.getElementById('searchInput')?.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderOrders();
            });
            
            document.querySelectorAll('.type-badge').forEach(badge => {
                badge.addEventListener('click', () => {
                    document.querySelectorAll('.type-badge').forEach(b => b.classList.remove('active'));
                    badge.classList.add('active');
                    currentTypeFilter = badge.dataset.type;
                    renderOrders();
                });
            });
        }

        // Firebase listeners
        db.ref('mugs_n_dines_orders').on('value', (snapshot) => {
            allOrders = snapshot.val() || {};
            updateStats();
            renderOrders();
        }, (error) => {
            console.error(error);
            allOrders = {};
            updateStats();
            renderOrders();
        });

        // Dropdown toggle
        window.toggleDropdown = () => document.getElementById('moreDropdown').classList.toggle('show');
        document.addEventListener('click', (e) => { if (!e.target.closest('.nav-dropdown')) document.getElementById('moreDropdown').classList.remove('show'); });

        // Auth check
        auth.onAuthStateChanged((user) => { 
            if (!user) window.location.href = '/workspaces/index.html';
            else setupFilters();
        });
    </script>
</body>
</html>
