<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Recipes Management | Mugs N Dines</title>

    <meta name="apple-mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #f97316; --orange-dark: #c2410c; --orange-light: #fb923c;
            --card-bg: #ffffff; --text-primary: #1e293b; --text-muted: #64748b;
            --border-light: #fed7aa; --success: #10b981; --warning: #f59e0b;
            --danger: #ef4444; --info: #3b82f6; --emerald: #059669;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #fff7ed 0%, #ffffff 100%);
            color: var(--text-primary); line-height: 1.4;
            min-height: 100vh; display: flex; flex-direction: column;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; } 100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 6px;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px);
            padding: 0.5rem 2%; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 2px solid rgba(249, 115, 22, 0.3);
            position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 8px;
        }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
        .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2); }
        .logo-text {
            font-weight: 800; font-size: 1.1rem;
            background: linear-gradient(145deg, #fb923c, #c2410c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo-text span { font-weight: 600; font-size: 0.7rem; background: #f97316; -webkit-text-fill-color: #f97316; margin-left: 3px; }

        .nav-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .nav-btn {
            background: rgba(249, 115, 22, 0.08); border: 1px solid rgba(249, 115, 22, 0.2);
            padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--orange-dark);
            font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
            align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
        }
        .nav-btn:hover { background: var(--orange); color: white; }
        .nav-btn.active { background: var(--orange); color: white; border-color: var(--orange-dark); }

        .nav-dropdown { position: relative; }
        .dropdown-menu {
            position: absolute; top: calc(100% + 8px); right: 0;
            background: white; border: 1px solid var(--border-light);
            border-radius: 16px; padding: 0.5rem; min-width: 180px;
            display: none; z-index: 200; box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            padding: 0.55rem 0.8rem; border-radius: 10px;
            display: flex; align-items: center; gap: 8px;
            color: var(--text-primary); text-decoration: none;
            font-size: 0.72rem; font-weight: 500; transition: all 0.15s;
        }
        .dropdown-item:hover { background: #fff7ed; color: var(--orange-dark); }
        .dropdown-item i { width: 18px; color: var(--orange); font-size: 0.75rem; }

        .container { padding: 1rem 2%; flex: 1; max-width: 1600px; margin: 0 auto; width: 100%; }

        .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
        .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
        .page-header h1 i { color: var(--emerald); margin-right: 6px; }

        .btn {
            padding: 0.5rem 1rem; border-radius: 10px; border: none; font-weight: 700;
            font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center;
            gap: 5px; font-family: inherit; transition: all 0.15s; white-space: nowrap;
        }
        .btn-primary { background: var(--emerald); color: white; }
        .btn-primary:hover { background: #047857; }
        .btn-outline { background: transparent; border: 1.5px solid #e2e8f0; color: var(--text-muted); }
        .btn-outline:hover { border-color: var(--emerald); color: var(--emerald); }
        .btn-sm { padding: 0.25rem 0.6rem; border-radius: 8px; font-size: 0.65rem; background: #f1f5f9; border: none; cursor: pointer; }
        .btn-edit { color: #3b82f6; } .btn-edit:hover { background: #dbeafe; }
        .btn-delete { color: var(--danger); } .btn-delete:hover { background: #fee2e2; }
        .btn-view { color: var(--emerald); } .btn-view:hover { background: #d1fae5; }
        .btn-download { color: var(--purple); } .btn-download:hover { background: #ede9fe; }

        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
        .stat-mini {
            background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
            border: 1px solid var(--border-light); box-shadow: 0 2px 8px rgba(249,115,22,0.03);
        }
        .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--emerald); line-height: 1.1; }
        .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

        .tab-nav { display: flex; gap: 4px; margin-bottom: 1rem; background: #f8fafc; border-radius: 30px; padding: 4px; width: fit-content; }
        .tab-btn {
            padding: 0.5rem 1.2rem; border-radius: 26px; border: none; background: transparent;
            color: var(--text-muted); font-weight: 600; font-size: 0.7rem; cursor: pointer;
            white-space: nowrap; transition: all 0.2s; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; gap: 5px;
        }
        .tab-btn.active { background: var(--emerald); color: white; box-shadow: 0 4px 12px rgba(5,150,105,0.2); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
        .filter-btn {
            padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0;
            background: white; color: #64748b; font-weight: 600; font-size: 0.65rem;
            cursor: pointer; transition: all 0.15s; font-family: inherit;
        }
        .filter-btn:hover { border-color: var(--emerald); color: var(--emerald); }
        .filter-btn.active { background: var(--emerald); color: white; border-color: var(--emerald); }
        .search-box { flex: 1; min-width: 150px; max-width: 300px; position: relative; }
        .search-box input {
            width: 100%; padding: 0.35rem 0.8rem 0.35rem 2rem; border-radius: 20px;
            border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif;
        }
        .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.7rem; }

        .recipes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .recipe-card {
            background: white; border-radius: 20px; overflow: hidden;
            border: 1px solid var(--border-light); box-shadow: 0 3px 12px rgba(5,150,105,0.03);
            transition: all 0.25s; cursor: pointer;
        }
        .recipe-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(5,150,105,0.1); }
        .recipe-image {
            height: 160px; background: linear-gradient(135deg, #ecfdf5, #a7f3d0);
            display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
            overflow: hidden;
        }
        .recipe-image img { width: 100%; height: 100%; object-fit: cover; }
        .recipe-body { padding: 1rem; }
        .recipe-body h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.2rem; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: space-between; }
        .recipe-category {
            font-size: 0.55rem; padding: 0.15rem 0.5rem; border-radius: 8px;
            background: #ecfdf5; color: var(--emerald); display: inline-block;
        }
        .recipe-time { font-size: 0.6rem; color: var(--text-muted); margin-bottom: 0.4rem; display: flex; align-items: center; gap: 10px; }
        .recipe-description { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.6rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .recipe-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; }
        .recipe-badge { font-size: 0.6rem; padding: 0.2rem 0.5rem; border-radius: 12px; background: #f1f5f9; }

        .table-wrap { background: white; border-radius: 16px; border: 1px solid var(--border-light); overflow: hidden; }
        .table-scroll { overflow-x: auto; max-height: 55vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.72rem; min-width: 900px; }
        thead { position: sticky; top: 0; z-index: 2; background: #ecfdf5; }
        th { padding: 0.6rem 0.7rem; text-align: left; font-weight: 700; color: #047857; font-size: 0.6rem; text-transform: uppercase; white-space: nowrap; }
        td { padding: 0.5rem 0.7rem; border-bottom: 1px solid #ecfdf5; vertical-align: middle; }
        tr:hover td { background: #f0fdf4; }

        .empty-state { text-align: center; padding: 3rem; color: #94a3b8; grid-column: 1 / -1; }

        /* Modal Styles */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
            align-items: center; backdrop-filter: blur(2px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 20px; padding: 1.5rem; max-width: 650px;
            width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .modal h3 { font-size: 1rem; margin-bottom: 1rem; color: var(--emerald); display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #ecfdf5; padding-bottom: 0.5rem; }
        .modal h4 { font-size: 0.8rem; margin: 0.8rem 0 0.4rem; color: var(--text-primary); }
        .recipe-detail-image {
            width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-bottom: 1rem;
            background: #ecfdf5; display: flex; align-items: center; justify-content: center; font-size: 3rem;
        }
        .detail-row { margin-bottom: 0.5rem; font-size: 0.75rem; display: flex; flex-wrap: wrap; }
        .detail-label { font-weight: 700; color: var(--text-muted); min-width: 100px; }
        .ingredient-list, .step-list { background: #f8fafc; padding: 0.8rem; border-radius: 12px; margin: 0.5rem 0; }
        .ingredient-item, .step-item { font-size: 0.7rem; padding: 0.3rem 0; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 8px; }
        .ingredient-item:last-child, .step-item:last-child { border-bottom: none; }
        .step-number { background: var(--emerald); color: white; width: 20px; height: 20px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 700; }
        .form-group { margin-bottom: 0.7rem; }
        .form-group label {
            display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
            border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
        .ingredient-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
        .ingredient-row input { flex: 1; }
        .btn-row { display: flex; gap: 8px; margin-top: 1rem; justify-content: flex-end; }

        .toast {
            position: fixed; bottom: 25px; right: 25px; background: var(--emerald); color: white;
            padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
            animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
        }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .footer { text-align: center; padding: 1rem; color: #94a3b8; font-size: 0.7rem; border-top: 1px solid var(--border-light); margin-top: 2rem; }

        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .recipes-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let allRecipes = {};
        let currentViewFilter = 'all';
        let currentTab = 'view';
        let currentRecipeForDownload = null;

        function showToast(msg, isError = false) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div'); t.className = `toast ${isError ? 'error' : ''}`;
            t.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
            c.appendChild(t); setTimeout(() => t.remove(), 3500);
        }

        function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m); }

        function formatTimeAgo(ts) { if (!ts) return ''; const d = new Date(ts); const diff = Date.now() - d.getTime(); const m = Math.floor(diff / 60000); const h = Math.floor(m / 60); const days = Math.floor(h / 24); if (days > 0) return `${days}d ago`; if (h > 0) return `${h}h ago`; if (m > 0) return `${m}m ago`; return 'Just now'; }

        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
            document.getElementById('tab-view').classList.toggle('active', tab === 'view');
            document.getElementById('tab-edit').classList.toggle('active', tab === 'edit');
            if (tab === 'view') renderViewRecipes();
            if (tab === 'edit') renderEditTable();
        };

        function renderViewRecipes() {
            const grid = document.getElementById('viewRecipesGrid');
            let items = Object.entries(allRecipes).map(([id, data]) => ({ id, ...data }));
            if (currentViewFilter !== 'all') items = items.filter(i => i.category === currentViewFilter);
            const search = (document.getElementById('viewSearch')?.value || '').toLowerCase();
            if (search) items = items.filter(i => (i.name || '').toLowerCase().includes(search));
            if (!items.length) { grid.innerHTML = '<div class="empty-state"><i class="fas fa-book-open" style="font-size:2rem;display:block;margin-bottom:8px;opacity:0.4;"></i><p>No recipes found</p></div>'; return; }
            grid.innerHTML = items.map(i => {
                const img = i.imageUrl ? `<img src="${escapeHtml(i.imageUrl)}" alt="${escapeHtml(i.name)}" onerror="this.style.display='none';this.parentElement.innerHTML='📖';">` : '📖';
                const ingredientsCount = (i.ingredients || []).length;
                const stepsCount = (i.steps || []).length;
                return `
                    <div class="recipe-card" onclick="viewRecipeDetails('${i.id}')">
                        <div class="recipe-image">${img}</div>
                        <div class="recipe-body">
                            <h3>${escapeHtml(i.name)}<span class="recipe-category">${escapeHtml(i.category || 'General')}</span></h3>
                            <div class="recipe-time"><i class="fas fa-clock"></i> ${i.prepTime || 0} min prep · ${i.cookTime || 0} min cook</div>
                            <p class="recipe-description">${escapeHtml(i.description || 'No description')}</p>
                            <div class="recipe-footer">
                                <span class="recipe-badge"><i class="fas fa-list"></i> ${ingredientsCount} ingredients</span>
                                <span class="recipe-badge"><i class="fas fa-sort"></i> ${stepsCount} steps</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderEditTable() {
            const tbody = document.getElementById('editTableBody');
            let items = Object.entries(allRecipes).map(([id, data]) => ({ id, ...data }));
            const search = (document.getElementById('editSearch')?.value || '').toLowerCase();
            if (search) items = items.filter(i => (i.name || '').toLowerCase().includes(search));
            if (!items.length) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">No recipes found</div></td></tr>'; return; }
            tbody.innerHTML = items.map(i => {
                const ingredientsPreview = (i.ingredients || []).slice(0, 2).map(ing => ing.name).join(', ') + ((i.ingredients || []).length > 2 ? '...' : '');
                return `<tr>
                    <td><div style="width:36px;height:36px;background:#ecfdf5;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;">${i.imageUrl ? `<img src="${escapeHtml(i.imageUrl)}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" onerror="this.style.display='none';this.parentElement.innerHTML='📖';">` : '📖'}</div></td>
                    <td><strong>${escapeHtml(i.name)}</strong></td>
                    <td>${escapeHtml(i.category || 'General')}</td>
                    <td>${i.prepTime || 0} + ${i.cookTime || 0} min</td>
                    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(ingredientsPreview)}</td>
                    <td><div style="display:flex;gap:4px;"><button class="btn-sm btn-view" onclick="event.stopPropagation();viewRecipeDetails('${i.id}')"><i class="fas fa-eye"></i> View</button><button class="btn-sm btn-edit" onclick="event.stopPropagation();editRecipe('${i.id}')"><i class="fas fa-edit"></i> Edit</button><button class="btn-sm btn-delete" onclick="event.stopPropagation();deleteRecipe('${i.id}')"><i class="fas fa-trash"></i> Delete</button></div></td>
                </tr>`;
            }).join('');
        }

        window.viewRecipeDetails = (id) => {
            const recipe = allRecipes[id];
            if (!recipe) return;
            currentRecipeForDownload = { id, ...recipe };
            const ingredients = recipe.ingredients || [];
            const steps = recipe.steps || [];
            const modalContent = `
                <div class="recipe-detail-image">${recipe.imageUrl ? `<img src="${escapeHtml(recipe.imageUrl)}" style="width:100%;height:100%;object-fit:cover;">` : '📖'}</div>
                <h3><i class="fas fa-utensils"></i> ${escapeHtml(recipe.name)}</h3>
                <div class="detail-row"><span class="detail-label">Category:</span> ${escapeHtml(recipe.category || 'General')}</div>
                <div class="detail-row"><span class="detail-label">Preparation Time:</span> ${recipe.prepTime || 0} minutes</div>
                <div class="detail-row"><span class="detail-label">Cooking Time:</span> ${recipe.cookTime || 0} minutes</div>
                <div class="detail-row"><span class="detail-label">Total Time:</span> ${(recipe.prepTime || 0) + (recipe.cookTime || 0)} minutes</div>
                ${recipe.description ? `<div class="detail-row"><span class="detail-label">Description:</span> ${escapeHtml(recipe.description)}</div>` : ''}
                
                <h4><i class="fas fa-list"></i> Ingredients</h4>
                <div class="ingredient-list">
                    ${ingredients.length ? ingredients.map(ing => `<div class="ingredient-item"><i class="fas fa-circle" style="font-size:0.3rem;color:#059669;"></i> ${escapeHtml(ing.name)} - ${escapeHtml(ing.quantity)}</div>`).join('') : '<p>No ingredients listed</p>'}
                </div>
                
                <h4><i class="fas fa-sort"></i> Instructions</h4>
                <div class="step-list">
                    ${steps.length ? steps.map((step, idx) => `<div class="step-item"><span class="step-number">${idx + 1}</span> ${escapeHtml(step)}</div>`).join('') : '<p>No instructions provided</p>'}
                </div>
                
                <div class="detail-row" style="margin-top:0.5rem;"><span class="detail-label">Created:</span> ${formatTimeAgo(recipe.createdAt)}</div>
                <div class="detail-row"><span class="detail-label">Last Updated:</span> ${formatTimeAgo(recipe.updatedAt)}</div>
            `;
            document.getElementById('recipeModalContent').innerHTML = modalContent;
            document.getElementById('recipeModal').classList.add('show');
        };

        window.downloadCurrentRecipe = () => {
            if (!currentRecipeForDownload) return;
            const recipe = currentRecipeForDownload;
            const ingredients = recipe.ingredients || [];
            const steps = recipe.steps || [];
            const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            
            const content = `
========================================
       MUGS N DINES - RECIPE CARD
========================================

RECIPE: ${recipe.name}
Category: ${recipe.category || 'General'}
Prep Time: ${recipe.prepTime || 0} minutes
Cook Time: ${recipe.cookTime || 0} minutes
Total Time: ${(recipe.prepTime || 0) + (recipe.cookTime || 0)} minutes

${recipe.description ? `DESCRIPTION:\n${recipe.description}\n` : ''}

--- INGREDIENTS ---
${ingredients.map((ing, i) => `${i + 1}. ${ing.name} - ${ing.quantity}`).join('\n') || 'No ingredients listed'}

--- INSTRUCTIONS ---
${steps.map((step, i) => `${i + 1}. ${step}`).join('\n') || 'No instructions provided'}

---
Generated: ${date}
Mugs N Dines - Kitchen Management System
========================================
            `;
            
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${recipe.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_recipe.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('✅ Recipe downloaded!');
        };

        window.closeRecipeModal = () => {
            document.getElementById('recipeModal').classList.remove('show');
            currentRecipeForDownload = null;
        };

        function getIngredientsFromModal() {
            const rows = document.querySelectorAll('.ingredient-row');
            return Array.from(rows).map(row => ({
                name: row.querySelector('.ing-name')?.value || '',
                quantity: row.querySelector('.ing-qty')?.value || ''
            })).filter(ing => ing.name.trim());
        }

        function getStepsFromModal() {
            const stepsInput = document.getElementById('stepsInput');
            return stepsInput?.value.split('\n').filter(s => s.trim()).map(s => s.trim()) || [];
        }

        window.showAddModal = () => {
            document.getElementById('modalContent').innerHTML = `
                <h3><i class="fas fa-plus-circle"></i> Add New Recipe</h3>
                <div class="form-group"><label>Recipe Name *</label><input type="text" id="rName" placeholder="e.g., Butter Chicken"></div>
                <div class="form-row">
                    <div class="form-group"><label>Category</label><select id="rCategory"><option value="Appetizer">🍤 Appetizer</option><option value="Main Course">🥩 Main Course</option><option value="Dessert">🍰 Dessert</option><option value="Beverage">🥤 Beverage</option><option value="Other">📦 Other</option></select></div>
                    <div class="form-group"><label>Prep Time (min)</label><input type="number" id="rPrepTime" value="15"></div>
                    <div class="form-group"><label>Cook Time (min)</label><input type="number" id="rCookTime" value="30"></div>
                </div>
                <div class="form-group"><label>Description</label><textarea id="rDescription" rows="2" placeholder="Brief description..."></textarea></div>
                <div class="form-group"><label>Image URL</label><input type="text" id="rImageUrl" placeholder="https://... (optional)"></div>
                
                <div class="form-group"><label>Ingredients</label>
                    <div id="ingredientsContainer"><div class="ingredient-row"><input class="ing-name" placeholder="Ingredient name" style="width:45%;"><input class="ing-qty" placeholder="Quantity (e.g., 500g, 2 cups)" style="width:50%;"></div></div>
                    <button type="button" class="btn-sm" style="margin-top:4px;" onclick="addIngredientRow()"><i class="fas fa-plus"></i> Add Ingredient</button>
                </div>
                
                <div class="form-group"><label>Instructions (one per line)</label><textarea id="stepsInput" rows="4" placeholder="1. Heat oil in a pan...&#10;2. Add spices...&#10;3. Simmer for 20 minutes..."></textarea></div>
                
                <div class="btn-row"><button class="btn btn-primary" onclick="saveRecipe()"><i class="fas fa-save"></i> Save Recipe</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
            `;
            document.getElementById('modal').classList.add('show');
            window.addIngredientRow = () => {
                const container = document.getElementById('ingredientsContainer');
                const div = document.createElement('div'); div.className = 'ingredient-row'; div.style.marginTop = '6px';
                div.innerHTML = `<input class="ing-name" placeholder="Ingredient name" style="width:45%;"><input class="ing-qty" placeholder="Quantity" style="width:50%;"><button type="button" class="btn-sm" style="background:#fee2e2;color:#ef4444;" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>`;
                container.appendChild(div);
            };
        };

        window.editRecipe = (id) => {
            const item = allRecipes[id]; if (!item) return;
            const ingredientsHtml = (item.ingredients || []).map(ing => `<div class="ingredient-row"><input class="ing-name" value="${escapeHtml(ing.name)}" style="width:45%;"><input class="ing-qty" value="${escapeHtml(ing.quantity)}" style="width:50%;"><button type="button" class="btn-sm" style="background:#fee2e2;color:#ef4444;" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button></div>`).join('');
            document.getElementById('modalContent').innerHTML = `
                <h3><i class="fas fa-edit"></i> Edit Recipe</h3>
                <div class="form-group"><label>Recipe Name</label><input type="text" id="rName" value="${escapeHtml(item.name || '')}"></div>
                <div class="form-row">
                    <div class="form-group"><label>Category</label><select id="rCategory">${['Appetizer','Main Course','Dessert','Beverage','Other'].map(c => `<option value="${c}" ${item.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div>
                    <div class="form-group"><label>Prep Time (min)</label><input type="number" id="rPrepTime" value="${item.prepTime || 15}"></div>
                    <div class="form-group"><label>Cook Time (min)</label><input type="number" id="rCookTime" value="${item.cookTime || 30}"></div>
                </div>
                <div class="form-group"><label>Description</label><textarea id="rDescription" rows="2">${escapeHtml(item.description || '')}</textarea></div>
                <div class="form-group"><label>Image URL</label><input type="text" id="rImageUrl" value="${escapeHtml(item.imageUrl || '')}"></div>
                
                <div class="form-group"><label>Ingredients</label><div id="ingredientsContainer">${ingredientsHtml || '<div class="ingredient-row"><input class="ing-name" placeholder="Ingredient name" style="width:45%;"><input class="ing-qty" placeholder="Quantity" style="width:50%;"></div>'}</div>
                    <button type="button" class="btn-sm" style="margin-top:4px;" onclick="addIngredientRow()"><i class="fas fa-plus"></i> Add Ingredient</button>
                </div>
                
                <div class="form-group"><label>Instructions (one per line)</label><textarea id="stepsInput" rows="4">${(item.steps || []).join('\n')}</textarea></div>
                
                <div class="btn-row"><button class="btn btn-primary" onclick="updateRecipe('${id}')"><i class="fas fa-save"></i> Update</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
            `;
            document.getElementById('modal').classList.add('show');
            window.addIngredientRow = () => {
                const container = document.getElementById('ingredientsContainer');
                const div = document.createElement('div'); div.className = 'ingredient-row'; div.style.marginTop = '6px';
                div.innerHTML = `<input class="ing-name" placeholder="Ingredient name" style="width:45%;"><input class="ing-qty" placeholder="Quantity" style="width:50%;"><button type="button" class="btn-sm" style="background:#fee2e2;color:#ef4444;" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>`;
                container.appendChild(div);
            };
        };

        window.saveRecipe = async () => {
            const name = document.getElementById('rName').value.trim();
            if (!name) { showToast('Recipe name is required', true); return; }
            try {
                await db.ref('mugs_n_dines_recipes').push().set({
                    name, category: document.getElementById('rCategory').value,
                    prepTime: parseInt(document.getElementById('rPrepTime').value) || 0,
                    cookTime: parseInt(document.getElementById('rCookTime').value) || 0,
                    description: document.getElementById('rDescription').value.trim(),
                    imageUrl: document.getElementById('rImageUrl').value.trim(),
                    ingredients: getIngredientsFromModal(),
                    steps: getStepsFromModal(),
                    createdAt: firebase.database.ServerValue.TIMESTAMP,
                    updatedAt: firebase.database.ServerValue.TIMESTAMP
                });
                showToast('✅ Recipe added!'); closeModal();
            } catch (e) { showToast('Failed to save', true); }
        };

        window.updateRecipe = async (id) => {
            try {
                await db.ref(`mugs_n_dines_recipes/${id}`).update({
                    name: document.getElementById('rName').value.trim(),
                    category: document.getElementById('rCategory').value,
                    prepTime: parseInt(document.getElementById('rPrepTime').value) || 0,
                    cookTime: parseInt(document.getElementById('rCookTime').value) || 0,
                    description: document.getElementById('rDescription').value.trim(),
                    imageUrl: document.getElementById('rImageUrl').value.trim(),
                    ingredients: getIngredientsFromModal(),
                    steps: getStepsFromModal(),
                    updatedAt: firebase.database.ServerValue.TIMESTAMP
                });
                showToast('✅ Recipe updated!'); closeModal();
            } catch (e) { showToast('Failed to update', true); }
        };

        window.deleteRecipe = async (id) => { 
            if (confirm('Delete this recipe?')) { 
                await db.ref(`mugs_n_dines_recipes/${id}`).remove(); 
                showToast('✅ Recipe deleted'); 
            } 
        };

        window.closeModal = () => document.getElementById('modal').classList.remove('show');

        document.querySelectorAll('#tab-view .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#tab-view .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); currentViewFilter = btn.dataset.filter; renderViewRecipes();
            });
        });

        document.getElementById('viewSearch')?.addEventListener('input', () => renderViewRecipes());
        document.getElementById('editSearch')?.addEventListener('input', () => renderEditTable());

        document.getElementById('recipeModal').addEventListener('click', (e) => { if (e.target === document.getElementById('recipeModal')) closeRecipeModal(); });
        document.getElementById('modal').addEventListener('click', (e) => { if (e.target === document.getElementById('modal')) closeModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModal(); closeRecipeModal(); } });

        window.toggleDropdown = () => document.getElementById('moreDropdown').classList.toggle('show');
        document.addEventListener('click', (e) => { if (!e.target.closest('.nav-dropdown')) document.getElementById('moreDropdown').classList.remove('show'); });

        function updateStats() {
            const items = Object.values(allRecipes);
            const totalIngredients = items.reduce((sum, r) => sum + (r.ingredients || []).length, 0);
            document.getElementById('statsRow').innerHTML = `
                <div class="stat-mini"><div class="stat-num">${items.length}</div><div class="stat-label">Total Recipes</div></div>
                <div class="stat-mini"><div class="stat-num">${new Set(items.map(i => i.category).filter(Boolean)).size}</div><div class="stat-label">Categories</div></div>
                <div class="stat-mini"><div class="stat-num">${totalIngredients}</div><div class="stat-label">Ingredients</div></div>
                <div class="stat-mini"><div class="stat-num">${items.reduce((sum, r) => sum + (r.steps || []).length, 0)}</div><div class="stat-label">Total Steps</div></div>
            `;
        }

        db.ref('mugs_n_dines_recipes').on('value', (snapshot) => {
            allRecipes = snapshot.val() || {};
            updateStats();
            if (currentTab === 'view') renderViewRecipes();
            if (currentTab === 'edit') renderEditTable();
        }, () => { allRecipes = {}; updateStats(); });

        auth.onAuthStateChanged((user) => { if (!user) window.location.href = '/workspaces/index.html'; });
    </script>
</body>
</html>
