<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Catering Events | Mugs N Dines</title>
    
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #f97316; --orange-dark: #c2410c; --orange-light: #fb923c;
            --card-bg: #ffffff; --text-primary: #1e293b; --text-muted: #64748b;
            --border-light: #fed7aa; --success: #10b981; --warning: #f59e0b;
            --danger: #ef4444; --info: #3b82f6; --emerald: #059669;
            --purple: #8b5cf6; --indigo: #4f46e5; --pink: #ec4899;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #fff7ed 0%, #ffffff 100%);
            color: var(--text-primary); line-height: 1.4;
            min-height: 100vh; display: flex; flex-direction: column;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; } 100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 6px;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px);
            padding: 0.5rem 2%; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 2px solid rgba(249, 115, 22, 0.3);
            position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 8px;
        }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
        .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2); }
        .logo-text {
            font-weight: 800; font-size: 1.1rem;
            background: linear-gradient(145deg, #fb923c, #c2410c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo-text span { font-weight: 600; font-size: 0.7rem; background: #f97316; -webkit-text-fill-color: #f97316; margin-left: 3px; }

        .nav-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .nav-btn {
            background: rgba(249, 115, 22, 0.08); border: 1px solid rgba(249, 115, 22, 0.2);
            padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--orange-dark);
            font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
            align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
        }
        .nav-btn:hover { background: var(--orange); color: white; }
        .nav-btn.active { background: var(--orange); color: white; border-color: var(--orange-dark); }

        .nav-dropdown { position: relative; }
        .dropdown-menu {
            position: absolute; top: calc(100% + 8px); right: 0;
            background: white; border: 1px solid var(--border-light);
            border-radius: 16px; padding: 0.5rem; min-width: 180px;
            display: none; z-index: 200; box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            padding: 0.55rem 0.8rem; border-radius: 10px;
            display: flex; align-items: center; gap: 8px;
            color: var(--text-primary); text-decoration: none;
            font-size: 0.72rem; font-weight: 500; transition: all 0.15s;
        }
        .dropdown-item:hover { background: #fff7ed; color: var(--orange-dark); }
        .dropdown-item i { width: 18px; color: var(--orange); font-size: 0.75rem; }

        .container { padding: 1rem 2%; flex: 1; max-width: 1400px; margin: 0 auto; width: 100%; }

        .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
        .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
        .page-header h1 i { color: var(--purple); margin-right: 6px; }

        .btn {
            padding: 0.5rem 1rem; border-radius: 10px; border: none; font-weight: 700;
            font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center;
            gap: 5px; font-family: inherit; transition: all 0.15s; white-space: nowrap;
        }
        .btn-primary { background: var(--purple); color: white; }
        .btn-primary:hover { background: #6d28d9; }
        .btn-outline { background: transparent; border: 1.5px solid #e2e8f0; color: var(--text-muted); }
        .btn-outline:hover { border-color: var(--purple); color: var(--purple); }
        .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.65rem; border-radius: 8px; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.2rem; }
        .stat-mini {
            background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
            border: 1px solid var(--border-light); box-shadow: 0 2px 8px rgba(249,115,22,0.03);
        }
        .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--purple); line-height: 1.1; }
        .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
        .filter-btn {
            padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0;
            background: white; color: #64748b; font-weight: 600; font-size: 0.65rem;
            cursor: pointer; transition: all 0.15s; font-family: inherit;
        }
        .filter-btn:hover { border-color: var(--purple); color: var(--purple); }
        .filter-btn.active { background: var(--purple); color: white; border-color: var(--purple); }
        .search-box { flex: 1; min-width: 200px; max-width: 300px; position: relative; }
        .search-box input {
            width: 100%; padding: 0.4rem 0.8rem 0.4rem 2rem; border-radius: 20px;
            border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif;
        }
        .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.7rem; }

        .tab-nav { display: flex; gap: 4px; margin-bottom: 1rem; background: #f8fafc; border-radius: 30px; padding: 4px; width: fit-content; }
        .tab-btn {
            padding: 0.5rem 1.2rem; border-radius: 26px; border: none; background: transparent;
            color: var(--text-muted); font-weight: 600; font-size: 0.7rem; cursor: pointer;
            white-space: nowrap; transition: all 0.2s; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; gap: 5px;
        }
        .tab-btn.active { background: var(--purple); color: white; box-shadow: 0 4px 12px rgba(139,92,246,0.2); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Events Grid */
        .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
        .event-card {
            background: white; border-radius: 20px; border: 1px solid var(--border-light);
            overflow: hidden; transition: all 0.25s; box-shadow: 0 3px 12px rgba(139,92,246,0.03);
        }
        .event-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(139,92,246,0.1); }
        .event-image {
            height: 140px; background: linear-gradient(135deg, #f5f0ff, #ddd6fe);
            display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
            overflow: hidden;
        }
        .event-image img { width: 100%; height: 100%; object-fit: cover; }
        .event-header {
            padding: 1rem 1rem 0.5rem;
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .event-header h3 { font-size: 0.9rem; font-weight: 800; }
        .event-status {
            font-size: 0.6rem; padding: 0.2rem 0.6rem; border-radius: 20px; font-weight: 700;
        }
        .status-upcoming { background: #d1fae5; color: #065f46; }
        .status-ongoing { background: #fed7aa; color: #9a3412; }
        .status-completed { background: #e2e8f0; color: #475569; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }
        .event-body { padding: 0 1rem 0.8rem; }
        .event-details { margin-bottom: 0.8rem; }
        .event-details p { font-size: 0.7rem; margin-bottom: 0.3rem; display: flex; align-items: center; gap: 6px; }
        .event-stats { display: flex; gap: 12px; margin: 0.8rem 0; padding: 0.5rem 0; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .event-stat { text-align: center; flex: 1; }
        .event-stat .number { font-size: 1rem; font-weight: 800; color: var(--purple); }
        .event-stat .label { font-size: 0.55rem; color: var(--text-muted); }
        .event-actions { display: flex; gap: 6px; margin-top: 0.8rem; }
        .event-actions .btn { flex: 1; justify-content: center; }

        /* Table styles */
        .table-wrap { background: white; border-radius: 16px; border: 1px solid var(--border-light); overflow: hidden; }
        .table-scroll { overflow-x: auto; max-height: 55vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.72rem; min-width: 800px; }
        thead { position: sticky; top: 0; z-index: 2; background: #f5f0ff; }
        th { padding: 0.6rem 0.7rem; text-align: left; font-weight: 700; color: #6d28d9; font-size: 0.6rem; text-transform: uppercase; white-space: nowrap; }
        td { padding: 0.5rem 0.7rem; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        tr:hover td { background: #faf5ff; }

        .empty-state { text-align: center; padding: 3rem; color: #94a3b8; }
        .empty-state i { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.4; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
            align-items: center; backdrop-filter: blur(2px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 20px; padding: 1.5rem; max-width: 550px;
            width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; color: var(--purple); display: flex; align-items: center; gap: 6px; }
        .form-group { margin-bottom: 0.7rem; }
        .form-group label {
            display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
            border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
        .btn-row { display: flex; gap: 8px; margin-top: 1rem; justify-content: flex-end; }

        .toast {
            position: fixed; bottom: 25px; right: 25px; background: var(--emerald); color: white;
            padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
            animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
        }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .footer { text-align: center; padding: 1rem; color: #94a3b8; font-size: 0.7rem; border-top: 1px solid var(--border-light); margin-top: 2rem; }

        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .events-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let allEvents = {};
        let allRegistrations = {};
        let currentEventFilter = 'all';
        let eventSearchTerm = '';
        let selectedEventId = 'all';
        let currentTab = 'events';

        function showToast(msg, isError = false) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div'); t.className = `toast ${isError ? 'error' : ''}`;
            t.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
            c.appendChild(t); setTimeout(() => t.remove(), 3500);
        }

        function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m); }

        function getEventStatus(eventDate, endDate) {
            const now = new Date();
            const start = new Date(eventDate);
            const end = endDate ? new Date(endDate) : start;
            if (now < start) return 'upcoming';
            if (now > end) return 'completed';
            return 'ongoing';
        }

        function updateStats() {
            const events = Object.values(allEvents);
            const registrations = Object.values(allRegistrations);
            const upcoming = events.filter(e => getEventStatus(e.eventDate, e.endDate) === 'upcoming').length;
            const totalRegistrations = registrations.length;
            const totalRevenue = registrations.reduce((sum, r) => sum + (r.amountPaid || 0), 0);
            
            document.getElementById('statsRow').innerHTML = `
                <div class="stat-mini"><div class="stat-num">${events.length}</div><div class="stat-label">Total Events</div></div>
                <div class="stat-mini"><div class="stat-num">${upcoming}</div><div class="stat-label">Upcoming</div></div>
                <div class="stat-mini"><div class="stat-num">${totalRegistrations}</div><div class="stat-label">Registrations</div></div>
                <div class="stat-mini"><div class="stat-num">KES ${totalRevenue.toLocaleString()}</div><div class="stat-label">Revenue</div></div>
            `;
        }

        function renderEvents() {
            const grid = document.getElementById('eventsGrid');
            let events = Object.entries(allEvents).map(([id, data]) => ({ id, ...data }));
            
            events = events.map(e => ({ ...e, computedStatus: getEventStatus(e.eventDate, e.endDate) }));
            
            if (currentEventFilter !== 'all') {
                events = events.filter(e => e.computedStatus === currentEventFilter);
            }
            
            if (eventSearchTerm) {
                const term = eventSearchTerm.toLowerCase();
                events = events.filter(e => 
                    (e.title || '').toLowerCase().includes(term) ||
                    (e.location || '').toLowerCase().includes(term) ||
                    (e.description || '').toLowerCase().includes(term)
                );
            }
            
            events.sort((a, b) => new Date(a.eventDate) - new Date(b.eventDate));
            
            if (!events.length) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-calendar-alt"></i><p>No events found</p><button class="btn btn-primary" style="margin-top:10px;" onclick="showAddEventModal()">Create Your First Event</button></div>';
                return;
            }
            
            grid.innerHTML = events.map(e => {
                const registrationsForEvent = Object.values(allRegistrations).filter(r => r.eventId === e.id);
                const attendees = registrationsForEvent.reduce((sum, r) => sum + (r.guests || 1), 0);
                const statusClass = {
                    upcoming: 'status-upcoming', ongoing: 'status-ongoing',
                    completed: 'status-completed', cancelled: 'status-cancelled'
                }[e.computedStatus] || 'status-upcoming';
                const statusLabel = { upcoming: 'Upcoming', ongoing: 'Ongoing', completed: 'Completed', cancelled: 'Cancelled' }[e.computedStatus] || 'Upcoming';
                
                return `
                    <div class="event-card">
                        <div class="event-image">
                            ${e.imageUrl ? `<img src="${escapeHtml(e.imageUrl)}" onerror="this.style.display='none';this.parentElement.innerHTML='🎉'">` : '🎉'}
                        </div>
                        <div class="event-header">
                            <h3>${escapeHtml(e.title)}</h3>
                            <span class="event-status ${statusClass}">${statusLabel}</span>
                        </div>
                        <div class="event-body">
                            <div class="event-details">
                                <p><i class="fas fa-calendar-day" style="color:#8b5cf6;"></i> ${new Date(e.eventDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</p>
                                <p><i class="fas fa-clock" style="color:#8b5cf6;"></i> ${e.eventTime || 'TBA'}</p>
                                <p><i class="fas fa-map-marker-alt" style="color:#8b5cf6;"></i> ${escapeHtml(e.location || 'Location TBA')}</p>
                            </div>
                            <div class="event-stats">
                                <div class="event-stat"><div class="number">${registrationsForEvent.length}</div><div class="label">Registrations</div></div>
                                <div class="event-stat"><div class="number">${attendees}</div><div class="label">Attendees</div></div>
                                <div class="event-stat"><div class="number">KES ${(e.price || 0).toLocaleString()}</div><div class="label">Price</div></div>
                            </div>
                            <div class="event-actions">
                                <button class="btn btn-outline btn-sm" onclick="editEvent('${e.id}')"><i class="fas fa-edit"></i> Edit</button>
                                <button class="btn btn-outline btn-sm" onclick="viewRegistrations('${e.id}')"><i class="fas fa-users"></i> View</button>
                                ${e.computedStatus !== 'completed' && e.computedStatus !== 'cancelled' ? `<button class="btn btn-primary btn-sm" onclick="addRegistration('${e.id}')"><i class="fas fa-user-plus"></i> Register</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderRegistrations() {
            const tbody = document.getElementById('registrationsBody');
            let registrations = Object.entries(allRegistrations).map(([id, data]) => ({ id, ...data }));
            
            if (selectedEventId !== 'all') {
                registrations = registrations.filter(r => r.eventId === selectedEventId);
            }
            
            const searchTerm = document.getElementById('registrationSearch')?.value.toLowerCase() || '';
            if (searchTerm) {
                registrations = registrations.filter(r => 
                    (r.fullName || '').toLowerCase().includes(searchTerm) ||
                    (r.email || '').toLowerCase().includes(searchTerm) ||
                    (r.phone || '').includes(searchTerm)
                );
            }
            
            registrations.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            
            if (!registrations.length) {
                tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><i class="fas fa-users"></i><p>No registrations found for this event</p></div></td></tr>`;
                return;
            }
            
            tbody.innerHTML = registrations.map(r => {
                const event = allEvents[r.eventId];
                return `<tr>
                    <td><code>#${r.id.slice(-6)}</code></td>
                    <td>${event ? escapeHtml(event.title) : 'Unknown Event'}</td>
                    <td><strong>${escapeHtml(r.fullName)}</strong></td>
                    <td>${escapeHtml(r.email || '—')}</td>
                    <td>${escapeHtml(r.phone || '—')}</td>
                    <td>${r.guests || 1} person(s)</td>
                    <td><span class="status-badge ${r.status === 'confirmed' ? 'status-active' : 'status-pending'}">${r.status || 'pending'}</span></td>
                    <td>${r.createdAt ? new Date(r.createdAt).toLocaleDateString() : 'N/A'}</td>
                    <td><div style="display:flex;gap:4px;"><button class="btn btn-outline btn-sm" onclick="viewRegistrationDetails('${r.id}')"><i class="fas fa-eye"></i></button><button class="btn btn-danger btn-sm" onclick="deleteRegistration('${r.id}')"><i class="fas fa-trash"></i></button></div></td>
                </tr>`;
            }).join('');
        }

        function updateEventSelect() {
            const select = document.getElementById('eventFilterSelect');
            const events = Object.entries(allEvents).sort((a, b) => new Date(a[1].eventDate) - new Date(b[1].eventDate));
            select.innerHTML = '<option value="all">All Events</option>' + 
                events.map(([id, e]) => `<option value="${id}">${escapeHtml(e.title)} (${new Date(e.eventDate).toLocaleDateString()})</option>`).join('');
        }

        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
            document.getElementById('tab-events').classList.toggle('active', tab === 'events');
            document.getElementById('tab-registrations').classList.toggle('active', tab === 'registrations');
            if (tab === 'registrations') {
                updateEventSelect();
                renderRegistrations();
            }
        };

        window.showAddEventModal = () => {
            document.getElementById('modalContent').innerHTML = `
                <h3><i class="fas fa-plus-circle"></i> Create New Event</h3>
                <div class="form-group"><label>Event Title *</label><input type="text" id="eTitle" placeholder="e.g., Mugs N Dines Food Festival 2026"></div>
                <div class="form-row"><div class="form-group"><label>Event Date *</label><input type="date" id="eDate"></div><div class="form-group"><label>End Date</label><input type="date" id="eEndDate"></div></div>
                <div class="form-row"><div class="form-group"><label>Event Time</label><input type="text" id="eTime" placeholder="e.g., 6:00 PM - 9:00 PM"></div><div class="form-group"><label>Ticket Price (KES)</label><input type="number" id="ePrice" value="0" min="0"></div></div>
                <div class="form-group"><label>Location / Venue</label><input type="text" id="eLocation" placeholder="Venue address"></div>
                <div class="form-group"><label>Description</label><textarea id="eDescription" rows="3" placeholder="Event details, schedule, special guests..."></textarea></div>
                <div class="form-group"><label>Image URL (optional)</label><input type="text" id="eImageUrl" placeholder="https://..."></div>
                <div class="form-group"><label>Maximum Capacity (optional)</label><input type="number" id="eCapacity" placeholder="Leave empty for unlimited"></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="saveEvent()"><i class="fas fa-save"></i> Create Event</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
            `;
            document.getElementById('modal').classList.add('show');
        };

        window.saveEvent = async () => {
            const title = document.getElementById('eTitle').value.trim();
            if (!title) { showToast('Event title is required', true); return; }
            const eventDate = document.getElementById('eDate').value;
            if (!eventDate) { showToast('Event date is required', true); return; }
            try {
                await db.ref('mugs_n_dines_catering_events').push().set({
                    title: title,
                    eventDate: eventDate,
                    endDate: document.getElementById('eEndDate').value || null,
                    eventTime: document.getElementById('eTime').value.trim(),
                    price: parseInt(document.getElementById('ePrice').value) || 0,
                    location: document.getElementById('eLocation').value.trim(),
                    description: document.getElementById('eDescription').value.trim(),
                    imageUrl: document.getElementById('eImageUrl').value.trim(),
                    capacity: document.getElementById('eCapacity').value ? parseInt(document.getElementById('eCapacity').value) : null,
                    status: 'active',
                    createdAt: firebase.database.ServerValue.TIMESTAMP,
                    updatedAt: firebase.database.ServerValue.TIMESTAMP
                });
                showToast('✅ Event created!');
                closeModal();
            } catch (e) { showToast('Failed to create event', true); }
        };

        window.editEvent = (id) => {
            const e = allEvents[id];
            if (!e) return;
            document.getElementById('modalContent').innerHTML = `
                <h3><i class="fas fa-edit"></i> Edit Event</h3>
                <div class="form-group"><label>Event Title</label><input type="text" id="eTitle" value="${escapeHtml(e.title || '')}"></div>
                <div class="form-row"><div class="form-group"><label>Event Date</label><input type="date" id="eDate" value="${e.eventDate || ''}"></div><div class="form-group"><label>End Date</label><input type="date" id="eEndDate" value="${e.endDate || ''}"></div></div>
                <div class="form-row"><div class="form-group"><label>Event Time</label><input type="text" id="eTime" value="${escapeHtml(e.eventTime || '')}"></div><div class="form-group"><label>Ticket Price (KES)</label><input type="number" id="ePrice" value="${e.price || 0}"></div></div>
                <div class="form-group"><label>Location / Venue</label><input type="text" id="eLocation" value="${escapeHtml(e.location || '')}"></div>
                <div class="form-group"><label>Description</label><textarea id="eDescription" rows="3">${escapeHtml(e.description || '')}</textarea></div>
                <div class="form-group"><label>Image URL</label><input type="text" id="eImageUrl" value="${escapeHtml(e.imageUrl || '')}"></div>
                <div class="form-group"><label>Maximum Capacity</label><input type="number" id="eCapacity" value="${e.capacity || ''}"></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="updateEvent('${id}')"><i class="fas fa-save"></i> Update</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
            `;
            document.getElementById('modal').classList.add('show');
        };

        window.updateEvent = async (id) => {
            try {
                await db.ref(`mugs_n_dines_catering_events/${id}`).update({
                    title: document.getElementById('eTitle').value.trim(),
                    eventDate: document.getElementById('eDate').value,
                    endDate: document.getElementById('eEndDate').value || null,
                    eventTime: document.getElementById('eTime').value.trim(),
                    price: parseInt(document.getElementById('ePrice').value) || 0,
                    location: document.getElementById('eLocation').value.trim(),
                    description: document.getElementById('eDescription').value.trim(),
                    imageUrl: document.getElementById('eImageUrl').value.trim(),
                    capacity: document.getElementById('eCapacity').value ? parseInt(document.getElementById('eCapacity').value) : null,
                    updatedAt: firebase.database.ServerValue.TIMESTAMP
                });
                showToast('✅ Event updated!');
                closeModal();
            } catch (e) { showToast('Failed to update', true); }
        };

        window.viewRegistrations = (eventId) => {
            selectedEventId = eventId;
            document.getElementById('eventFilterSelect').value = eventId;
            switchTab('registrations');
        };

        window.addRegistration = (eventId) => {
            const event = allEvents[eventId];
            document.getElementById('modalContent').innerHTML = `
                <h3><i class="fas fa-user-plus"></i> Register for ${escapeHtml(event?.title)}</h3>
                <div class="form-group"><label>Full Name *</label><input type="text" id="regName" placeholder="Full name"></div>
                <div class="form-row"><div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="email@example.com"></div><div class="form-group"><label>Phone</label><input type="tel" id="regPhone" placeholder="Phone number"></div></div>
                <div class="form-row"><div class="form-group"><label>Number of Guests</label><input type="number" id="regGuests" value="1" min="1"></div><div class="form-group"><label>Amount Paid (KES)</label><input type="number" id="regAmount" value="${event?.price || 0}" min="0"></div></div>
                <div class="form-group"><label>Special Requests</label><textarea id="regRequests" rows="2" placeholder="Dietary restrictions, seating preferences..."></textarea></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="saveRegistration('${eventId}')"><i class="fas fa-save"></i> Register</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
            `;
            document.getElementById('modal').classList.add('show');
        };

        window.saveRegistration = async (eventId) => {
            const fullName = document.getElementById('regName').value.trim();
            if (!fullName) { showToast('Full name is required', true); return; }
            try {
                await db.ref('mugs_n_dines_catering_registrations').push().set({
                    eventId: eventId,
                    fullName: fullName,
                    email: document.getElementById('regEmail').value.trim(),
                    phone: document.getElementById('regPhone').value.trim(),
                    guests: parseInt(document.getElementById('regGuests').value) || 1,
                    amountPaid: parseInt(document.getElementById('regAmount').value) || 0,
                    specialRequests: document.getElementById('regRequests').value.trim(),
                    status: 'confirmed',
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
                showToast('✅ Registration added!');
                closeModal();
                if (currentTab === 'registrations') renderRegistrations();
            } catch (e) { showToast('Failed to register', true); }
        };

        window.viewRegistrationDetails = (regId) => {
            const r = allRegistrations[regId];
            if (!r) return;
            const event = allEvents[r.eventId];
            modalContent.innerHTML = `
                <h3><i class="fas fa-user-circle"></i> Registration Details</h3>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.75rem;margin-bottom:1rem;">
                    <div><strong>Event:</strong> ${event ? escapeHtml(event.title) : 'Unknown'}</div><div><strong>Date:</strong> ${event ? new Date(event.eventDate).toLocaleDateString() : 'N/A'}</div>
                    <div><strong>Name:</strong> ${escapeHtml(r.fullName)}</div><div><strong>Phone:</strong> ${r.phone || 'N/A'}</div>
                    <div><strong>Email:</strong> ${r.email || 'N/A'}</div><div><strong>Guests:</strong> ${r.guests || 1}</div>
                    <div><strong>Amount Paid:</strong> KES ${(r.amountPaid || 0).toLocaleString()}</div><div><strong>Status:</strong> ${r.status || 'confirmed'}</div>
                </div>
                ${r.specialRequests ? `<div style="background:#f8fafc;padding:0.6rem;border-radius:10px;margin-bottom:0.8rem;"><strong>Special Requests:</strong><br>${escapeHtml(r.specialRequests)}</div>` : ''}
                <div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Close</button></div>
            `;
            modal.classList.add('show');
        };

        window.deleteRegistration = async (id) => {
            if (confirm('Delete this registration?')) {
                await db.ref(`mugs_n_dines_catering_registrations/${id}`).remove();
                showToast('✅ Registration deleted');
                renderRegistrations();
            }
        };

        window.closeModal = () => document.getElementById('modal').classList.remove('show');

        // Filter listeners
        document.querySelectorAll('#tab-events .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#tab-events .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentEventFilter = btn.dataset.filter;
                renderEvents();
            });
        });
        document.getElementById('eventSearch')?.addEventListener('input', (e) => {
            eventSearchTerm = e.target.value;
            renderEvents();
        });
        document.getElementById('eventFilterSelect')?.addEventListener('change', (e) => {
            selectedEventId = e.target.value;
            renderRegistrations();
        });
        document.getElementById('registrationSearch')?.addEventListener('input', () => renderRegistrations());

        document.getElementById('modal').addEventListener('click', (e) => { if (e.target === document.getElementById('modal')) closeModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        window.toggleDropdown = () => document.getElementById('moreDropdown').classList.toggle('show');
        document.addEventListener('click', (e) => { if (!e.target.closest('.nav-dropdown')) document.getElementById('moreDropdown').classList.remove('show'); });

        // Firebase listeners
        db.ref('mugs_n_dines_catering_events').on('value', (snapshot) => {
            allEvents = snapshot.val() || {};
            updateStats();
            renderEvents();
            if (currentTab === 'registrations') {
                updateEventSelect();
                renderRegistrations();
            }
        });
        db.ref('mugs_n_dines_catering_registrations').on('value', (snapshot) => {
            allRegistrations = snapshot.val() || {};
            updateStats();
            if (currentTab === 'registrations') renderRegistrations();
        });

        auth.onAuthStateChanged((user) => { if (!user) window.location.href = '/workspaces/index.html'; });
    </script>
</body>
</html>
