    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
    }

    function getInitials(name) {
      if (!name) return 'MD';
      return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
    }

    function formatTimeAgo(timestamp) {
      if (!timestamp) return '';
      const date = typeof timestamp === 'number' ? new Date(timestamp) : new Date(timestamp);
      if (isNaN(date.getTime())) return '';
      const diff = Date.now() - date.getTime();
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(mins / 60);
      const days = Math.floor(hours / 24);
      if (days > 30) return '';
      if (days > 0) return `${days}d ago`;
      if (hours > 0) return `${hours}h ago`;
      if (mins > 0) return `${mins}m ago`;
      return 'Just now';
    }

    function getStatusClass(status) {
      const s = (status || 'new').toLowerCase();
      const map = { 
        new: 'status-new', pending: 'status-new', confirmed: 'status-confirmed', 
        preparing: 'status-preparing', ready: 'status-ready', 
        delivered: 'status-delivered', cancelled: 'status-cancelled', dispatched: 'status-dispatched' 
      };
      return map[s] || 'status-new';
    }

    function getStatusLabel(status) {
      if (!status) return 'new';
      return status;
    }

    function renderRecentOrders() {
      const recentList = document.getElementById('recentList');
      const orders = Object.entries(allOrders)
        .filter(([_, o]) => o && o.customerName)
        .map(([id, data]) => ({ id, ...data }))
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))
        .slice(0, 6);

      if (!orders.length) {
        recentList.innerHTML = '<div class="empty-state"><i class="fas fa-shopping-cart"></i><p>No orders yet</p></div>';
        return;
      }

      recentList.innerHTML = orders.map(order => {
        const status = order.status || 'new';
        const timeAgo = formatTimeAgo(order.createdAt);
        const customer = order.customerName || 'Customer';
        const itemCount = (order.items || []).length;
        const total = order.total || 0;

        return `
          <div class="recent-item" onclick="window.location.href='/workspaces/mugs-n-dines/orders.html'">
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="width:32px;height:32px;background:#fff7ed;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;">🍽️</div>
              <div>
                <strong>${escapeHtml(customer)}</strong>
                <p style="font-size:0.65rem;color:#64748b;">${itemCount} item${itemCount !== 1 ? 's' : ''} · KES ${Number(total).toLocaleString()} ${timeAgo ? '· ' + timeAgo : ''}</p>
              </div>
            </div>
            <span class="status-tag ${getStatusClass(status)}">${getStatusLabel(status)}</span>
          </div>`;
      }).join('');
    }

    function renderCateringEvents() {
      // Add upcoming events section if needed
    }

    function updateStats() {
      const orders = Object.values(allOrders).filter(o => o);
      const menuItems = Object.values(allMenuItems).filter(i => i);
      const recipes = Object.values(allRecipes).filter(r => r);
      const cateringEvents = Object.values(allCateringEvents).filter(e => e);
      const kitchens = Object.values(allKitchens).filter(k => k);
      
      const newOrders = orders.filter(o => {
        const s = (o.status || 'new').toLowerCase();
        return s === 'new' || s === 'pending';
      }).length;
      
      const preparingOrders = orders.filter(o => {
        const s = (o.status || '').toLowerCase();
        return s === 'confirmed' || s === 'preparing';
      }).length;
      
      const upcomingEvents = cateringEvents.filter(e => {
        const status = (e.status || '').toLowerCase();
        return status !== 'cancelled' && status !== 'completed';
      }).length;

      // Replace skeleton stats with real content
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-left"><h4>New Orders</h4><div class="stat-number">${newOrders}</div><div class="stat-trend"><i class="fas fa-inbox"></i> Awaiting action</div></div><div class="stat-icon"><i class="fas fa-inbox"></i></div></div>
        <div class="stat-card"><div class="stat-left"><h4>Active Orders</h4><div class="stat-number">${preparingOrders}</div><div class="stat-trend"><i class="fas fa-fire"></i> Being prepared</div></div><div class="stat-icon"><i class="fas fa-fire"></i></div></div>
        <div class="stat-card"><div class="stat-left"><h4>Menu Items</h4><div class="stat-number">${menuItems.length}</div><div class="stat-trend"><i class="fas fa-utensils"></i> Available dishes</div></div><div class="stat-icon"><i class="fas fa-utensils"></i></div></div>
        <div class="stat-card"><div class="stat-left"><h4>Recipes</h4><div class="stat-number">${recipes.length}</div><div class="stat-trend"><i class="fas fa-book-open"></i> Created recipes</div></div><div class="stat-icon"><i class="fas fa-book-open"></i></div></div>
        <div class="stat-card"><div class="stat-left"><h4>Catering</h4><div class="stat-number">${upcomingEvents}</div><div class="stat-trend"><i class="fas fa-calendar"></i> Upcoming events</div></div><div class="stat-icon"><i class="fas fa-calendar"></i></div></div>
        <div class="stat-card"><div class="stat-left"><h4>Kitchens</h4><div class="stat-number">${kitchens.length}</div><div class="stat-trend"><i class="fas fa-store-alt"></i> Active outlets</div></div><div class="stat-icon"><i class="fas fa-store-alt"></i></div></div>
      `;

      // Replace skeleton action cards with real content
      document.getElementById('actionGrid').innerHTML = `
        <a href="/workspaces/mugs-n-dines/new-order.html" class="action-card">
          <div class="action-icon"><i class="fas fa-cart-plus"></i></div>
          <h2>New Order</h2>
          <p>Create a new food order for takeaway or delivery.</p>
          <span class="action-link">Place Order <i class="fas fa-arrow-right"></i></span>
        </a>
        <a href="/workspaces/mugs-n-dines/orders.html" class="action-card">
          <div class="action-icon"><i class="fas fa-inbox"></i></div>
          <h2>Orders</h2>
          <p>View, update & track all food orders.</p>
          <span class="action-link">View Orders <i class="fas fa-arrow-right"></i></span>
        </a>
        <a href="/workspaces/mugs-n-dines/menu.html" class="action-card menu-card">
          <div class="action-icon"><i class="fas fa-utensils"></i></div>
          <h2>Menu</h2>
          <p>Add, edit & manage your restaurant menu.</p>
          <span class="action-link">Manage Menu <i class="fas fa-arrow-right"></i></span>
        </a>
        <a href="/workspaces/mugs-n-dines/recipes.html" class="action-card recipes-card">
          <div class="action-icon"><i class="fas fa-book-open"></i></div>
          <h2>Recipes</h2>
          <p>Create & manage recipes, ingredients & steps.</p>
          <span class="action-link">View Recipes <i class="fas fa-arrow-right"></i></span>
        </a>
        <a href="/workspaces/mugs-n-dines/catering.html" class="action-card catering-card">
          <div class="action-icon"><i class="fas fa-calendar-check"></i></div>
          <h2>Catering</h2>
          <p>Book & manage catering events.</p>
          <span class="action-link">Manage Events <i class="fas fa-arrow-right"></i></span>
        </a>
        <a href="/workspaces/mugs-n-dines/kitchens.html" class="action-card kitchen-card">
          <div class="action-icon"><i class="fas fa-store-alt"></i></div>
          <h2>Kitchens</h2>
          <p>Manage kitchen locations & staff.</p>
          <span class="action-link">View Kitchens <i class="fas fa-arrow-right"></i></span>
        </a>
        <a href="/workspaces/mugs-n-dines/dispatch.html" class="action-card dispatch-card">
          <div class="action-icon"><i class="fas fa-truck-fast"></i></div>
          <h2>Dispatch</h2>
          <p>Assign drivers & track deliveries.</p>
          <span class="action-link">Dispatch <i class="fas fa-arrow-right"></i></span>
        </a>
      `;

      // Replace skeleton quick links with real content
      document.getElementById('quickLinks').innerHTML = `
        <a href="/workspaces/mugs-n-dines/new-order.html" class="quick-btn"><i class="fas fa-plus-circle"></i> New Order</a>
        <a href="/workspaces/mugs-n-dines/orders.html?filter=new" class="quick-btn"><i class="fas fa-clock"></i> Pending (${newOrders})</a>
        <a href="/workspaces/mugs-n-dines/menu.html" class="quick-btn"><i class="fas fa-utensils"></i> Menu</a>
        <a href="/workspaces/mugs-n-dines/recipes.html" class="quick-btn"><i class="fas fa-book-open"></i> Recipes</a>
        <a href="/workspaces/mugs-n-dines/catering.html" class="quick-btn"><i class="fas fa-calendar"></i> Catering</a>
        <a href="/workspaces/mugs-n-dines/franchises.html" class="quick-btn"><i class="fas fa-store-alt"></i> Kitchens</a>
        <a href="/workspaces/mugs-n-dines/dispatch.html" class="quick-btn"><i class="fas fa-truck"></i> Dispatch (${preparingOrders})</a>
        <a href="/workspaces/mugs-n-dines/map.html" class="quick-btn"><i class="fas fa-map-marked-alt"></i> Map</a>
      `;
      
      document.getElementById('footerStats').innerHTML = `${orders.length} orders · ${menuItems.length} menu · ${recipes.length} recipes · ${cateringEvents.length} events · ${kitchens.length} kitchens`;
      document.getElementById('lastUpdated').innerHTML = `<i class="fas fa-circle" style="color:#f97316;"></i> Live`;
      renderRecentOrders();
    }

    function setupRealtimeListeners() {
      onValue(ref(db, 'mugs_n_dines_orders'), (snapshot) => {
        allOrders = snapshot.val() || {};
        updateStats();
      });
      
      onValue(ref(db, 'mugs_n_dines_menu'), (snapshot) => {
        allMenuItems = snapshot.val() || {};
        updateStats();
      });
      
      onValue(ref(db, 'mugs_n_dines_recipes'), (snapshot) => {
        allRecipes = snapshot.val() || {};
        updateStats();
      });
      
      onValue(ref(db, 'mugs_n_dines_catering_events'), (snapshot) => {
        allCateringEvents = snapshot.val() || {};
        updateStats();
      });
      
      onValue(ref(db, 'mugs_n_dines_franchises'), (snapshot) => {
        allKitchens = snapshot.val() || {};
        updateStats();
      });
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userSnap = await get(ref(db, `brandinn_users/${user.uid}`));
        let userName = user.email?.split('@')[0] || 'Manager';
        let businessName = 'Mugs N Dines';
        if (userSnap.exists()) {
          userName = userSnap.val().name || userName;
          businessName = userSnap.val().businessName || businessName;
        }
        document.getElementById('userName').textContent = userName;
        document.getElementById('userAvatar').textContent = getInitials(userName);
        document.getElementById('businessName').innerHTML = `${escapeHtml(businessName)} <span>🍽️</span>`;
        setupRealtimeListeners();
      } else {
        window.location.href = '/workspaces/index.html';
      }
    });
  </script>
</body>
</html>
