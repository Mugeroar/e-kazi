<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kitchen Management | Mugs N Dines</title>
    
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #f97316; --orange-dark: #c2410c; --orange-light: #fb923c;
            --card-bg: #ffffff; --text-primary: #1e293b; --text-muted: #64748b;
            --border-light: #fed7aa; --success: #10b981; --warning: #f59e0b;
            --danger: #ef4444; --info: #3b82f6; --emerald: #059669;
            --purple: #8b5cf6; --indigo: #4f46e5;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #fff7ed 0%, #ffffff 100%);
            color: var(--text-primary); line-height: 1.4;
            min-height: 100vh; display: flex; flex-direction: column;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px);
            padding: 0.5rem 2%; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 2px solid rgba(249, 115, 22, 0.3);
            position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 8px;
        }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
        .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2); }
        .logo-text {
            font-weight: 800; font-size: 1.1rem;
            background: linear-gradient(145deg, #fb923c, #c2410c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo-text span { font-weight: 600; font-size: 0.7rem; background: #f97316; -webkit-text-fill-color: #f97316; margin-left: 3px; }

        .nav-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .nav-btn {
            background: rgba(249, 115, 22, 0.08); border: 1px solid rgba(249, 115, 22, 0.2);
            padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--orange-dark);
            font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
            align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
        }
        .nav-btn:hover { background: var(--orange); color: white; }
        .nav-btn.active { background: var(--orange); color: white; border-color: var(--orange-dark); }

        .nav-dropdown { position: relative; }
        .dropdown-menu {
            position: absolute; top: calc(100% + 8px); right: 0;
            background: white; border: 1px solid var(--border-light);
            border-radius: 16px; padding: 0.5rem; min-width: 180px;
            display: none; z-index: 200; box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            padding: 0.55rem 0.8rem; border-radius: 10px;
            display: flex; align-items: center; gap: 8px;
            color: var(--text-primary); text-decoration: none;
            font-size: 0.72rem; font-weight: 500; transition: all 0.15s;
        }
        .dropdown-item:hover { background: #fff7ed; color: var(--orange-dark); }
        .dropdown-item i { width: 18px; color: var(--orange); font-size: 0.75rem; }

        .container { padding: 1rem 2%; flex: 1; max-width: 1400px; margin: 0 auto; width: 100%; }

        .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
        .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
        .page-header h1 i { color: var(--orange-dark); margin-right: 6px; }

        .btn {
            padding: 0.5rem 1rem; border-radius: 10px; border: none; font-weight: 700;
            font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center;
            gap: 5px; font-family: inherit; transition: all 0.15s; white-space: nowrap;
        }
        .btn-primary { background: var(--orange); color: white; }
        .btn-primary:hover { background: var(--orange-dark); }
        .btn-outline { background: transparent; border: 1.5px solid #e2e8f0; color: var(--text-muted); }
        .btn-outline:hover { border-color: var(--orange); color: var(--orange); }
        .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.65rem; border-radius: 8px; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; }

        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.2rem; }
        .stat-mini {
            background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
            border: 1px solid var(--border-light); box-shadow: 0 2px 8px rgba(249,115,22,0.03);
        }
        .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--orange-dark); line-height: 1.1; }
        .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
        .filter-btn {
            padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0;
            background: white; color: #64748b; font-weight: 600; font-size: 0.65rem;
            cursor: pointer; transition: all 0.15s; font-family: inherit;
        }
        .filter-btn:hover { border-color: var(--orange); color: var(--orange-dark); }
        .filter-btn.active { background: var(--orange); color: white; border-color: var(--orange); }
        .search-box { flex: 1; min-width: 200px; max-width: 300px; position: relative; }
        .search-box input {
            width: 100%; padding: 0.4rem 0.8rem 0.4rem 2rem; border-radius: 20px;
            border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif;
        }
        .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.7rem; }

        .tab-nav { display: flex; gap: 4px; margin-bottom: 1rem; background: #f8fafc; border-radius: 30px; padding: 4px; width: fit-content; }
        .tab-btn {
            padding: 0.5rem 1.2rem; border-radius: 26px; border: none; background: transparent;
            color: var(--text-muted); font-weight: 600; font-size: 0.7rem; cursor: pointer;
            white-space: nowrap; transition: all 0.2s; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; gap: 5px;
        }
        .tab-btn.active { background: var(--orange); color: white; box-shadow: 0 4px 12px rgba(249,115,22,0.2); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .kitchens-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }
        .kitchen-card {
            background: white; border-radius: 20px; border: 1px solid var(--border-light);
            overflow: hidden; transition: all 0.25s; box-shadow: 0 3px 12px rgba(249,115,22,0.03);
        }
        .kitchen-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(249,115,22,0.1); }
        .kitchen-header {
            background: linear-gradient(135deg, #fff7ed, #fed7aa);
            padding: 1rem; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border-light);
        }
        .kitchen-header h3 { font-size: 0.9rem; font-weight: 800; display: flex; align-items: center; gap: 6px; }
        .kitchen-status {
            font-size: 0.6rem; padding: 0.2rem 0.6rem; border-radius: 20px; font-weight: 700;
        }
        .status-active { background: #d1fae5; color: #065f46; }
        .status-inactive { background: #fee2e2; color: #991b1b; }
        .kitchen-body { padding: 1rem; }
        .kitchen-info { margin-bottom: 0.8rem; }
        .kitchen-info p { font-size: 0.7rem; margin-bottom: 0.3rem; display: flex; align-items: center; gap: 6px; }
        .kitchen-stats { display: flex; gap: 12px; margin: 0.8rem 0; padding: 0.5rem 0; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .kitchen-stat { text-align: center; flex: 1; }
        .kitchen-stat .number { font-size: 1rem; font-weight: 800; color: var(--orange-dark); }
        .kitchen-stat .label { font-size: 0.55rem; color: var(--text-muted); }
        .staff-list { margin-top: 0.5rem; }
        .staff-item {
            background: #f8fafc; border-radius: 8px; padding: 0.4rem 0.6rem;
            margin-bottom: 0.3rem; font-size: 0.65rem; display: flex;
            justify-content: space-between; align-items: center;
        }
        .kitchen-actions { display: flex; gap: 6px; margin-top: 0.8rem; flex-wrap: wrap; }
        .kitchen-actions .btn { flex: 1; justify-content: center; }

        .table-wrap { background: white; border-radius: 16px; border: 1px solid var(--border-light); overflow: hidden; }
        .table-scroll { overflow-x: auto; max-height: 55vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.72rem; min-width: 800px; }
        thead { position: sticky; top: 0; z-index: 2; background: #fff7ed; }
        th { padding: 0.6rem 0.7rem; text-align: left; font-weight: 700; color: #c2410c; font-size: 0.6rem; text-transform: uppercase; white-space: nowrap; }
        td { padding: 0.5rem 0.7rem; border-bottom: 1px solid #fff7ed; vertical-align: middle; }
        tr:hover td { background: #fff7ed; }

        .empty-state { text-align: center; padding: 3rem; color: #94a3b8; }
        .empty-state i { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.4; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
            align-items: center; backdrop-filter: blur(2px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 20px; padding: 1.5rem; max-width: 550px;
            width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; color: var(--orange-dark); display: flex; align-items: center; gap: 6px; }
        .form-group { margin-bottom: 0.7rem; }
        .form-group label {
            display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
            border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
        .btn-row { display: flex; gap: 8px; margin-top: 1rem; justify-content: flex-end; }

        .toast {
            position: fixed; bottom: 25px; right: 25px; background: var(--emerald); color: white;
            padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
            animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
        }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .footer { text-align: center; padding: 1rem; color: #94a3b8; font-size: 0.7rem; border-top: 1px solid var(--border-light); margin-top: 2rem; }

        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .kitchens-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/workspaces/mugs-n-dines/index.html" class="logo">
            <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Mugs N Dines" class="logo-img">
            <span class="logo-text">Mugs N Dines <span>🍽️</span></span>
        </a>
        <div class="nav-right">
            <a href="/workspaces/mugs-n-dines/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <a href="/workspaces/mugs-n-dines/orders.html" class="nav-btn"><i class="fas fa-shopping-cart"></i> Orders</a>
            <a href="/workspaces/mugs-n-dines/menu.html" class="nav-btn"><i class="fas fa-utensils"></i> Menu</a>
            <div class="nav-dropdown">
                <button class="nav-btn" onclick="toggleDropdown()"><i class="fas fa-ellipsis-h"></i> More</button>
                <div class="dropdown-menu" id="moreDropdown">
                    <a href="/workspaces/mugs-n-dines/recipes.html" class="dropdown-item"><i class="fas fa-book-open"></i> Recipes</a>
                    <a href="/workspaces/mugs-n-dines/catering.html" class="dropdown-item"><i class="fas fa-calendar-check"></i> Catering</a>

                    <a href="/workspaces/mugs-n-dines/dispatch.html" class="dropdown-item"><i class="fas fa-truck-fast"></i> Dispatch</a>
                </div>
            </div>

        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-store-alt"></i> Kitchen Management</h1>
            <button class="btn btn-primary" onclick="showAddKitchenModal()"><i class="fas fa-plus"></i> Add Kitchen + Staff</button>
        </div>

        <div class="stats-row" id="statsRow">
            <div class="stat-mini"><div class="stat-num" id="totalKitchens">0</div><div class="stat-label">Total Kitchens</div></div>
            <div class="stat-mini"><div class="stat-num" id="activeKitchens">0</div><div class="stat-label">Active</div></div>
            <div class="stat-mini"><div class="stat-num" id="totalStaff">0</div><div class="stat-label">Staff Members</div></div>
            <div class="stat-mini"><div class="stat-num" id="totalOrders">0</div><div class="stat-label">Orders Today</div></div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" data-tab="view" onclick="switchTab('view')"><i class="fas fa-store"></i> All Kitchens</button>
            <button class="tab-btn" data-tab="staff" onclick="switchTab('staff')"><i class="fas fa-users"></i> Staff Management</button>
        </div>

        <div class="tab-content active" id="tab-view">
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All Kitchens</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="inactive">Inactive</button>
                <div class="search-box"><i class="fas fa-search"></i><input type="text" id="kitchenSearch" placeholder="Search by name or location..."></div>
            </div>
            <div class="kitchens-grid" id="kitchensGrid"></div>
        </div>

        <div class="tab-content" id="tab-staff">
            <div class="filter-bar">
                <select id="kitchenFilterSelect" class="filter-btn" style="padding:0.35rem 1rem;">
                    <option value="all">All Kitchens</option>
                </select>
                <div class="search-box"><i class="fas fa-search"></i><input type="text" id="staffSearch" placeholder="Search staff..."></div>
                <button class="btn btn-primary" onclick="showAddStaffModal()"><i class="fas fa-user-plus"></i> Add Staff</button>
            </div>
            <div class="table-wrap">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr><th>Staff Name</th><th>Email</th><th>Phone</th><th>Kitchen</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="staffTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
    <div id="toastContainer"></div>
    <div class="footer"><i class="far fa-copyright"></i> 2026 Mugs N Dines · Kitchen Management</div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let allKitchens = {};
        let allStaff = {};
        let allOrders = {};
        let currentKitchenFilter = 'all';
        let kitchenSearchTerm = '';
        let currentTab = 'view';

        function showToast(msg, isError = false) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div'); t.className = `toast ${isError ? 'error' : ''}`;
            t.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
            c.appendChild(t); setTimeout(() => t.remove(), 3500);
        }

        function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m); }

        function updateStats() {
            const kitchens = Object.values(allKitchens);
            const active = kitchens.filter(k => k.status !== 'inactive').length;
            const staff = Object.values(allStaff);
            const today = new Date().toISOString().slice(0,10);
            const todaysOrders = Object.values(allOrders).filter(o => o.createdAt && new Date(o.createdAt).toISOString().slice(0,10) === today).length;
            
            document.getElementById('totalKitchens').textContent = kitchens.length;
            document.getElementById('activeKitchens').textContent = active;
            document.getElementById('totalStaff').textContent = staff.length;
            document.getElementById('totalOrders').textContent = todaysOrders;
        }

        function renderKitchens() {
            const grid = document.getElementById('kitchensGrid');
            let kitchens = Object.entries(allKitchens).map(([id, data]) => ({ id, ...data }));
            
            if (currentKitchenFilter === 'active') kitchens = kitchens.filter(k => k.status !== 'inactive');
            else if (currentKitchenFilter === 'inactive') kitchens = kitchens.filter(k => k.status === 'inactive');
            
            if (kitchenSearchTerm) {
                const term = kitchenSearchTerm.toLowerCase();
                kitchens = kitchens.filter(k => 
                    (k.name || '').toLowerCase().includes(term) ||
                    (k.location || '').toLowerCase().includes(term)
                );
            }
            
            if (!kitchens.length) {
                grid.innerHTML = '<div class="empty-state"><i class="fas fa-store-alt"></i><p>No kitchens found</p><button class="btn btn-primary" style="margin-top:10px;" onclick="showAddKitchenModal()">Add Your First Kitchen</button></div>';
                return;
            }
            
            grid.innerHTML = kitchens.map(k => {
                const kitchenStaff = Object.values(allStaff).filter(s => s.kitchenId === k.id);
                const kitchenOrders = Object.values(allOrders).filter(o => o.kitchenId === k.id);
                const orderCount = kitchenOrders.length;
                const revenue = kitchenOrders.reduce((sum, o) => sum + (o.total || 0), 0);
                
                return `
                    <div class="kitchen-card">
                        <div class="kitchen-header">
                            <h3><i class="fas fa-store"></i> ${escapeHtml(k.name)}</h3>
                            <span class="kitchen-status ${k.status === 'inactive' ? 'status-inactive' : 'status-active'}">${k.status === 'inactive' ? 'Inactive' : 'Active'}</span>
                        </div>
                        <div class="kitchen-body">
                            <div class="kitchen-info">
                                <p><i class="fas fa-map-marker-alt"></i> ${escapeHtml(k.location || 'No location set')}</p>
                                <p><i class="fas fa-phone"></i> ${escapeHtml(k.phone || 'No phone')}</p>
                                <p><i class="fas fa-user"></i> Manager: ${escapeHtml(k.manager || 'Not assigned')}</p>
                            </div>
                            <div class="kitchen-stats">
                                <div class="kitchen-stat"><div class="number">${kitchenStaff.length}</div><div class="label">Staff</div></div>
                                <div class="kitchen-stat"><div class="number">${orderCount}</div><div class="label">Orders</div></div>
                                <div class="kitchen-stat"><div class="number">KES ${revenue.toLocaleString()}</div><div class="label">Revenue</div></div>
                            </div>
                            ${kitchenStaff.length > 0 ? `
                                <div class="staff-list">
                                    ${kitchenStaff.slice(0,2).map(s => `<div class="staff-item"><span><i class="fas fa-user-circle"></i> ${escapeHtml(s.name)}</span><span class="staff-role">${s.role || 'Staff'}</span></div>`).join('')}
                                    ${kitchenStaff.length > 2 ? `<div class="staff-item" style="text-align:center;color:var(--orange);">+${kitchenStaff.length - 2} more staff</div>` : ''}
                                </div>
                            ` : ''}
                            <div class="kitchen-actions">
                                <button class="btn btn-outline btn-sm" onclick="editKitchen('${k.id}')"><i class="fas fa-edit"></i> Edit</button>
                                <button class="btn btn-outline btn-sm" onclick="showAddStaffToKitchen('${k.id}')"><i class="fas fa-user-plus"></i> Add Staff</button>
                                <button class="btn ${k.status === 'inactive' ? 'btn-primary' : 'btn-danger'} btn-sm" onclick="toggleKitchenStatus('${k.id}', '${k.status === 'inactive' ? 'active' : 'inactive'}')">
                                    ${k.status === 'inactive' ? '<i class="fas fa-play"></i> Activate' : '<i class="fas fa-pause"></i> Deactivate'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderStaffTable() {
            const tbody = document.getElementById('staffTableBody');
            let staff = Object.entries(allStaff).map(([id, data]) => ({ id, ...data }));
            
            const selectedKitchen = document.getElementById('kitchenFilterSelect')?.value;
            if (selectedKitchen && selectedKitchen !== 'all') {
                staff = staff.filter(s => s.kitchenId === selectedKitchen);
            }
            
            const searchTerm = document.getElementById('staffSearch')?.value.toLowerCase() || '';
            if (searchTerm) {
                staff = staff.filter(s => 
                    (s.name || '').toLowerCase().includes(searchTerm) ||
                    (s.email || '').toLowerCase().includes(searchTerm)
                );
            }
            
            if (!staff.length) {
                tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state">No staff members found</div></td></tr>';
                return;
            }
            
            tbody.innerHTML = staff.map(s => {
                const kitchen = allKitchens[s.kitchenId];
                return `<tr>
                    <td><strong>${escapeHtml(s.name)}</strong></td>
                    <td>${escapeHtml(s.email || '—')}</td>
                    <td>${escapeHtml(s.phone || '—')}</td>
                    <td>${kitchen ? escapeHtml(kitchen.name) : 'Unknown'}</td>
                    <td><span style="background:#fff7ed;padding:2px 8px;border-radius:12px;">${s.role || 'Staff'}</span></td>
                    <td><span class="kitchen-status ${s.status === 'active' ? 'status-active' : 'status-inactive'}">${s.status || 'active'}</span></td>
                    <td>${s.createdAt ? new Date(s.createdAt).toLocaleDateString() : 'N/A'}</td>
                    <td><div style="display:flex;gap:4px;"><button class="btn btn-outline btn-sm" onclick="editStaff('${s.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-danger btn-sm" onclick="deleteStaff('${s.id}')"><i class="fas fa-trash"></i></button></div></td>
                </tr>`;
            }).join('');
        }

        function updateKitchenSelect() {
            const select = document.getElementById('kitchenFilterSelect');
            const kitchens = Object.entries(allKitchens).filter(([_, k]) => k.status !== 'inactive');
            select.innerHTML = '<option value="all">All Kitchens</option>' + 
                kitchens.map(([id, k]) => `<option value="${id}">${escapeHtml(k.name)}</option>`).join('');
        }

        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
            document.getElementById('tab-view').classList.toggle('active', tab === 'view');
            document.getElementById('tab-staff').classList.toggle('active', tab === 'staff');
            if (tab === 'staff') {
                updateKitchenSelect();
                renderStaffTable();
            }
        };

        // Add Kitchen with Staff Account Creation
        window.showAddKitchenModal = () => {
            document.getElementById('modalContent').innerHTML = `
                <h3><i class="fas fa-plus-circle"></i> Add New Kitchen & Staff Account</h3>
                <div style="background:#f0fdf4;padding:0.8rem;border-radius:10px;margin-bottom:1rem;font-size:0.7rem;">
                    <i class="fas fa-info-circle"></i> This will create both a kitchen record and a staff login account.
                </div>
                <div class="form-group"><label>Kitchen Name *</label><input type="text" id="kName" placeholder="e.g., Mugs N Dines - Westlands"></div>
                <div class="form-group"><label>Location / Address</label><input type="text" id="kLocation" placeholder="Full address"></div>
                <div class="form-row"><div class="form-group"><label>Phone Number</label><input type="tel" id="kPhone" placeholder="+254 XXX XXX"></div><div class="form-group"><label>Email</label><input type="email" id="kEmail" placeholder="kitchen@example.com"></div></div>
                <div class="form-group"><label>Manager Name</label><input type="text" id="kManager" placeholder="Manager's name"></div>
                <hr style="margin: 0.8rem 0; border-color: var(--border-light);">
                <h4 style="font-size:0.7rem;margin-bottom:0.5rem;"><i class="fas fa-user-circle"></i> Staff Account Details</h4>
                <div class="form-group"><label>Staff Full Name *</label><input type="text" id="staffName" placeholder="Staff name for login"></div>
                <div class="form-group"><label>Staff Email *</label><input type="email" id="staffEmail" placeholder="staff@example.com (used for login)"></div>
                <div class="form-group"><label>Temporary Password *</label><input type="password" id="staffPassword" placeholder="Create a password"></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="saveKitchenWithStaff()"><i class="fas fa-save"></i> Create Kitchen & Staff</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
            `;
            document.getElementById('modal').classList.add('show');
        };

        window.saveKitchenWithStaff = async () => {
            const name = document.getElementById('kName').value.trim();
            if (!name) { showToast('Kitchen name is required', true); return; }
            
            const staffName = document.getElementById('staffName').value.trim();
            const staffEmail = document.getElementById('staffEmail').value.trim();
            const staffPassword = document.getElementById('staffPassword').value.trim();
            
            if (!staffName || !staffEmail || !staffPassword) {
                showToast('Staff account details are required', true);
                return;
            }
            
            try {
                // Step 1: Create kitchen
                const kitchenRef = db.ref('mugs_n_dines_franchises').push();
                const kitchenId = kitchenRef.key;
                
                await kitchenRef.set({
                    name: name,
                    location: document.getElementById('kLocation').value.trim(),
                    phone: document.getElementById('kPhone').value.trim(),
                    email: document.getElementById('kEmail').value.trim(),
                    manager: document.getElementById('kManager').value.trim(),
                    status: 'active',
                    createdAt: firebase.database.ServerValue.TIMESTAMP,
                    updatedAt: firebase.database.ServerValue.TIMESTAMP
                });
                
                // Step 2: Create Firebase Auth user
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(staffEmail, staffPassword);
                const staffUid = userCredential.user.uid;
                
                // Step 3: Update user profile
                await userCredential.user.updateProfile({ displayName: staffName });
                
                // Step 4: Create staff record in database
                await db.ref(`mugs_n_dines_kitchen_staff/${staffUid}`).set({
                    uid: staffUid,
                    name: staffName,
                    email: staffEmail,
                    phone: document.getElementById('kPhone').value.trim(),
                    kitchenId: kitchenId,
                    kitchenName: name,
                    role: 'manager',
                    status: 'active',
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
                
                // Step 5: Add to users node
                await db.ref(`users/${staffUid}`).set({
                    uid: staffUid,
                    name: staffName,
                    email: staffEmail,
                    kitchenId: kitchenId,
                    role: 'kitchen_staff',
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
                
                showToast('✅ Kitchen and staff account created! Login credentials sent.');
                closeModal();
                loadData();
            } catch (e) { 
                console.error(e);
                showToast('Failed: ' + (e.message || 'Unknown error'), true); 
            }
        };

        window.showAddStaffToKitchen = (kitchenId) => {
            const kitchen = allKitchens[kitchenId];
            document.getElementById('modalContent').innerHTML = `
                <h3><i class="fas fa-user-plus"></i> Add Staff to ${escapeHtml(kitchen?.name)}</h3>
                <div class="form-group"><label>Full Name *</label><input type="text" id="staffName" placeholder="Staff name"></div>
                <div class="form-group"><label>Email *</label><input type="email" id="staffEmail" placeholder="staff@example.com"></div>
                <div class="form-group"><label>Password *</label><input type="password" id="staffPassword" placeholder="Create password"></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" id="staffPhone" placeholder="Optional"></div>
                <div class="form-group"><label>Role</label><select id="staffRole"><option value="staff">Staff</option><option value="manager">Manager</option><option value="chef">Chef</option></select></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="addStaffToKitchen('${kitchenId}')"><i class="fas fa-save"></i> Add Staff</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
            `;
            document.getElementById('modal').classList.add('show');
        };

        window.addStaffToKitchen = async (kitchenId) => {
            const name = document.getElementById('staffName').value.trim();
            const email = document.getElementById('staffEmail').value.trim();
            const password = document.getElementById('staffPassword').value.trim();
            const kitchen = allKitchens[kitchenId];
            
            if (!name || !email || !password) {
                showToast('Name, email, and password are required', true);
                return;
            }
            
            try {
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                const staffUid = userCredential.user.uid;
                await userCredential.user.updateProfile({ displayName: name });
                
                await db.ref(`mugs_n_dines_kitchen_staff/${staffUid}`).set({
                    uid: staffUid,
                    name: name,
                    email: email,
                    phone: document.getElementById('staffPhone').value.trim(),
                    kitchenId: kitchenId,
                    kitchenName: kitchen?.name,
                    role: document.getElementById('staffRole').value,
                    status: 'active',
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
                
                await db.ref(`users/${staffUid}`).set({
                    uid: staffUid,
                    name: name,
                    email: email,
                    kitchenId: kitchenId,
                    role: 'kitchen_staff',
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
                
                showToast('✅ Staff account created!');
                closeModal();
                loadData();
            } catch (e) {
                showToast('Failed: ' + (e.message || 'Unknown error'), true);
            }
        };

        window.showAddStaffModal = () => {
            document.getElementById('modalContent').innerHTML = `
                <h3><i class="fas fa-user-plus"></i> Add Staff Member</h3>
                <div class="form-group"><label>Select Kitchen *</label><select id="staffKitchen">${Object.entries(allKitchens).filter(([_,k]) => k.status !== 'inactive').map(([id,k]) => `<option value="${id}">${escapeHtml(k.name)}</option>`).join('')}</select></div>
                <div class="form-group"><label>Full Name *</label><input type="text" id="staffName" placeholder="Staff name"></div>
                <div class="form-group"><label>Email *</label><input type="email" id="staffEmail" placeholder="staff@example.com"></div>
                <div class="form-group"><label>Password *</label><input type="password" id="staffPassword" placeholder="Create password"></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" id="staffPhone" placeholder="Optional"></div>
                <div class="form-group"><label>Role</label><select id="staffRole"><option value="staff">Staff</option><option value="manager">Manager</option><option value="chef">Chef</option></select></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="createStaffAccount()"><i class="fas fa-save"></i> Create Staff</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
            `;
            document.getElementById('modal').classList.add('show');
        };

        window.createStaffAccount = async () => {
            const kitchenId = document.getElementById('staffKitchen').value;
            const name = document.getElementById('staffName').value.trim();
            const email = document.getElementById('staffEmail').value.trim();
            const password = document.getElementById('staffPassword').value.trim();
            const kitchen = allKitchens[kitchenId];
            
            if (!kitchenId || !name || !email || !password) {
                showToast('All fields are required', true);
                return;
            }
            
            try {
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                const staffUid = userCredential.user.uid;
                await userCredential.user.updateProfile({ displayName: name });
                
                await db.ref(`mugs_n_dines_kitchen_staff/${staffUid}`).set({
                    uid: staffUid,
                    name: name,
                    email: email,
                    phone: document.getElementById('staffPhone').value.trim(),
                    kitchenId: kitchenId,
                    kitchenName: kitchen?.name,
                    role: document.getElementById('staffRole').value,
                    status: 'active',
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
                
                await db.ref(`users/${staffUid}`).set({
                    uid: staffUid,
                    name: name,
                    email: email,
                    kitchenId: kitchenId,
                    role: 'kitchen_staff',
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
                
                showToast('✅ Staff account created! They can now log in.');
                closeModal();
                loadData();
            } catch (e) {
                showToast('Failed: ' + (e.message || 'Unknown error'), true);
            }
        };

        window.editKitchen = (id) => {
            const k = allKitchens[id];
            if (!k) return;
            document.getElementById('modalContent').innerHTML = `
                <h3><i class="fas fa-edit"></i> Edit Kitchen</h3>
                <div class="form-group"><label>Kitchen Name</label><input type="text" id="kName" value="${escapeHtml(k.name || '')}"></div>
                <div class="form-group"><label>Location</label><input type="text" id="kLocation" value="${escapeHtml(k.location || '')}"></div>
                <div class="form-row"><div class="form-group"><label>Phone</label><input type="tel" id="kPhone" value="${escapeHtml(k.phone || '')}"></div><div class="form-group"><label>Email</label><input type="email" id="kEmail" value="${escapeHtml(k.email || '')}"></div></div>
                <div class="form-group"><label>Manager</label><input type="text" id="kManager" value="${escapeHtml(k.manager || '')}"></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="updateKitchen('${id}')"><i class="fas fa-save"></i> Update</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
            `;
            document.getElementById('modal').classList.add('show');
        };

        window.updateKitchen = async (id) => {
            try {
                await db.ref(`mugs_n_dines_franchises/${id}`).update({
                    name: document.getElementById('kName').value.trim(),
                    location: document.getElementById('kLocation').value.trim(),
                    phone: document.getElementById('kPhone').value.trim(),
                    email: document.getElementById('kEmail').value.trim(),
                    manager: document.getElementById('kManager').value.trim(),
                    updatedAt: firebase.database.ServerValue.TIMESTAMP
                });
                showToast('✅ Kitchen updated!');
                closeModal();
                loadData();
            } catch (e) { showToast('Failed to update', true); }
        };

        window.editStaff = (id) => {
            const s = allStaff[id];
            if (!s) return;
            document.getElementById('modalContent').innerHTML = `
                <h3><i class="fas fa-edit"></i> Edit Staff</h3>
                <div class="form-group"><label>Name</label><input type="text" id="staffName" value="${escapeHtml(s.name || '')}"></div>
                <div class="form-group"><label>Phone</label><input type="tel" id="staffPhone" value="${escapeHtml(s.phone || '')}"></div>
                <div class="form-group"><label>Role</label><select id="staffRole"><option value="staff" ${s.role === 'staff' ? 'selected' : ''}>Staff</option><option value="manager" ${s.role === 'manager' ? 'selected' : ''}>Manager</option><option value="chef" ${s.role === 'chef' ? 'selected' : ''}>Chef</option></select></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="updateStaff('${id}')"><i class="fas fa-save"></i> Update</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
            `;
            document.getElementById('modal').classList.add('show');
        };

        window.updateStaff = async (id) => {
            try {
                await db.ref(`mugs_n_dines_kitchen_staff/${id}`).update({
                    name: document.getElementById('staffName').value.trim(),
                    phone: document.getElementById('staffPhone').value.trim(),
                    role: document.getElementById('staffRole').value,
                    updatedAt: firebase.database.ServerValue.TIMESTAMP
                });
                showToast('✅ Staff updated!');
                closeModal();
                loadData();
            } catch (e) { showToast('Failed to update', true); }
        };

        window.deleteStaff = async (id) => {
            if (confirm('Remove this staff member? They will lose access.')) {
                try {
                    await db.ref(`mugs_n_dines_kitchen_staff/${id}`).remove();
                    showToast('✅ Staff removed');
                    loadData();
                } catch (e) { showToast('Failed to delete', true); }
            }
        };

        window.toggleKitchenStatus = async (id, newStatus) => {
            try {
                await db.ref(`mugs_n_dines_franchises/${id}`).update({
                    status: newStatus,
                    updatedAt: firebase.database.ServerValue.TIMESTAMP
                });
                showToast(`Kitchen ${newStatus === 'active' ? 'activated' : 'deactivated'}`);
                loadData();
            } catch (e) { showToast('Failed to update status', true); }
        };

        window.closeModal = () => document.getElementById('modal').classList.remove('show');

        // Filter listeners
        document.querySelectorAll('#tab-view .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#tab-view .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentKitchenFilter = btn.dataset.filter;
                renderKitchens();
            });
        });
        document.getElementById('kitchenSearch')?.addEventListener('input', (e) => {
            kitchenSearchTerm = e.target.value;
            renderKitchens();
        });
        document.getElementById('kitchenFilterSelect')?.addEventListener('change', () => renderStaffTable());
        document.getElementById('staffSearch')?.addEventListener('input', () => renderStaffTable());

        document.getElementById('modal').addEventListener('click', (e) => { if (e.target === document.getElementById('modal')) closeModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        window.toggleDropdown = () => document.getElementById('moreDropdown').classList.toggle('show');
        document.addEventListener('click', (e) => { if (!e.target.closest('.nav-dropdown')) document.getElementById('moreDropdown').classList.remove('show'); });

        async function loadData() {
            const kitchensSnap = await db.ref('mugs_n_dines_franchises').once('value');
            allKitchens = kitchensSnap.val() || {};
            
            const staffSnap = await db.ref('mugs_n_dines_kitchen_staff').once('value');
            allStaff = staffSnap.val() || {};
            
            const ordersSnap = await db.ref('mugs_n_dines_orders').once('value');
            allOrders = ordersSnap.val() || {};
            
            updateStats();
            renderKitchens();
            if (currentTab === 'staff') {
                updateKitchenSelect();
                renderStaffTable();
            }
        }

        auth.onAuthStateChanged((user) => { 
            if (!user) window.location.href = '/workspaces/index.html';
            else loadData();
        });
    </script>
</body>
</html>
