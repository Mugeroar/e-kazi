<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Menu Management | Mugs N Dines</title>
    
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #f97316; --orange-dark: #c2410c; --orange-light: #fb923c;
            --card-bg: #ffffff; --text-primary: #1e293b; --text-muted: #64748b;
            --border-light: #fed7aa; --success: #10b981; --warning: #f59e0b;
            --danger: #ef4444; --info: #3b82f6; --gold: #f59e0b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #fff7ed 0%, #ffffff 100%);
            color: var(--text-primary); line-height: 1.4;
            min-height: 100vh; display: flex; flex-direction: column;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; } 100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 6px;
        }
        .skeleton-text { height: 1rem; margin-bottom: 0.5rem; }
        .skeleton-text-sm { height: 0.7rem; width: 60%; }
        .skeleton-image { height: 100px; border-radius: 12px 12px 0 0; }

        .navbar {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px);
            padding: 0.5rem 2%; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 2px solid rgba(249, 115, 22, 0.3);
            position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 8px;
        }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
        .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2); }
        .logo-text {
            font-weight: 800; font-size: 1.1rem;
            background: linear-gradient(145deg, #fb923c, #c2410c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo-text span { font-weight: 600; font-size: 0.7rem; background: #f97316; -webkit-text-fill-color: #f97316; margin-left: 3px; }

        .nav-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .nav-btn {
            background: rgba(249, 115, 22, 0.08); border: 1px solid rgba(249, 115, 22, 0.2);
            padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--orange-dark);
            font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
            align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
        }
        .nav-btn:hover { background: var(--orange); color: white; }
        .nav-btn.active { background: var(--orange); color: white; border-color: var(--orange-dark); }

        .nav-dropdown { position: relative; }
        .dropdown-menu {
            position: absolute; top: calc(100% + 8px); right: 0;
            background: white; border: 1px solid var(--border-light);
            border-radius: 16px; padding: 0.5rem; min-width: 180px;
            display: none; z-index: 200; box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            padding: 0.55rem 0.8rem; border-radius: 10px;
            display: flex; align-items: center; gap: 8px;
            color: var(--text-primary); text-decoration: none;
            font-size: 0.72rem; font-weight: 500; transition: all 0.15s;
        }
        .dropdown-item:hover { background: #fff7ed; color: var(--orange-dark); }
        .dropdown-item i { width: 18px; color: var(--orange); font-size: 0.75rem; }

        .container { padding: 1rem 2%; flex: 1; }

        .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
        .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
        .page-header h1 i { color: var(--orange-dark); margin-right: 6px; }

        .btn {
            padding: 0.5rem 1rem; border-radius: 10px; border: none; font-weight: 700;
            font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center;
            gap: 5px; font-family: inherit; transition: all 0.15s; white-space: nowrap;
        }
        .btn-primary { background: var(--orange); color: white; }
        .btn-primary:hover { background: var(--orange-dark); }
        .btn-outline { background: transparent; border: 1.5px solid #e2e8f0; color: var(--text-muted); }
        .btn-outline:hover { border-color: var(--orange); color: var(--orange); }

        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
        .stat-mini {
            background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
            border: 1px solid var(--border-light); box-shadow: 0 2px 8px rgba(249,115,22,0.03);
        }
        .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--orange-dark); line-height: 1.1; }
        .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

        .tab-nav { display: flex; gap: 4px; margin-bottom: 1rem; background: #f8fafc; border-radius: 30px; padding: 4px; }
        .tab-btn {
            padding: 0.5rem 1.2rem; border-radius: 26px; border: none; background: transparent;
            color: var(--text-muted); font-weight: 600; font-size: 0.7rem; cursor: pointer;
            white-space: nowrap; transition: all 0.2s; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; gap: 5px;
        }
        .tab-btn.active { background: var(--orange); color: white; box-shadow: 0 4px 12px rgba(249,115,22,0.2); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
        .filter-btn {
            padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0;
            background: white; color: #64748b; font-weight: 600; font-size: 0.65rem;
            cursor: pointer; transition: all 0.15s; font-family: inherit;
        }
        .filter-btn:hover { border-color: var(--orange); color: var(--orange-dark); }
        .filter-btn.active { background: var(--orange); color: white; border-color: var(--orange); }
        .search-box { flex: 1; min-width: 150px; max-width: 300px; position: relative; }
        .search-box input {
            width: 100%; padding: 0.35rem 0.8rem 0.35rem 2rem; border-radius: 20px;
            border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif;
        }
        .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.7rem; }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .menu-card {
            background: white; border-radius: 16px; overflow: hidden;
            border: 1px solid var(--border-light); box-shadow: 0 3px 12px rgba(249,115,22,0.03);
            transition: all 0.25s;
        }
        .menu-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(249,115,22,0.1); }
        .menu-image {
            height: 120px; background: linear-gradient(135deg, #fff7ed, #fed7aa);
            display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
            overflow: hidden;
        }
        .menu-image img { width: 100%; height: 100%; object-fit: cover; }
        .menu-body { padding: 1rem; }
        .menu-body h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.2rem; }
        .menu-category {
            font-size: 0.6rem; padding: 0.15rem 0.5rem; border-radius: 8px;
            background: #fff7ed; color: var(--orange-dark); display: inline-block; margin-bottom: 0.4rem;
        }
        .menu-description { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.6rem; }
        .menu-footer { display: flex; justify-content: space-between; align-items: center; }
        .menu-price { font-size: 1.1rem; font-weight: 800; color: var(--orange-dark); }

        .table-wrap { background: white; border-radius: 16px; border: 1px solid var(--border-light); overflow: hidden; }
        .table-scroll { overflow-x: auto; max-height: 55vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
        thead { position: sticky; top: 0; z-index: 2; background: #fff7ed; }
        th { padding: 0.6rem 0.7rem; text-align: left; font-weight: 700; color: #c2410c; font-size: 0.6rem; text-transform: uppercase; white-space: nowrap; }
        td { padding: 0.5rem 0.7rem; border-bottom: 1px solid #fff7ed; vertical-align: middle; }
        tr:hover td { background: #fff7ed; }

        .empty-state { text-align: center; padding: 3rem; color: #94a3b8; grid-column: 1 / -1; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
            align-items: center; backdrop-filter: blur(2px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 20px; padding: 1.5rem; max-width: 500px;
            width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; color: var(--orange-dark); }
        .form-group { margin-bottom: 0.7rem; }
        .form-group label {
            display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
            border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
        .btn-row { display: flex; gap: 8px; margin-top: 1rem; }

        .toast {
            position: fixed; bottom: 25px; right: 25px; background: var(--orange); color: white;
            padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
            animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(249,115,22,0.25);
            display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
        }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .footer { text-align: center; padding: 1rem; color: #94a3b8; font-size: 0.7rem; border-top: 1px solid var(--border-light); margin-top: 2rem; }

        @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2, 1fr); } .menu-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/workspaces/mugs-n-dines/index.html" class="logo">
            <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Mugs N Dines" class="logo-img">
            <span class="logo-text">Mugs N Dines <span>🍽️</span></span>
        </a>
        <div class="nav-right">
            <a href="/workspaces/mugs-n-dines/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <a href="/workspaces/mugs-n-dines/orders.html" class="nav-btn"><i class="fas fa-shopping-cart"></i> Orders</a>

            <div class="nav-dropdown">
                <button class="nav-btn" onclick="toggleDropdown()"><i class="fas fa-ellipsis-h"></i> More</button>
                <div class="dropdown-menu" id="moreDropdown">
                    <a href="/workspaces/mugs-n-dines/recipes.html" class="dropdown-item"><i class="fas fa-book-open"></i> Recipes</a>
                    <a href="/workspaces/mugs-n-dines/catering.html" class="dropdown-item"><i class="fas fa-calendar-check"></i> Catering</a>
                    <a href="/workspaces/mugs-n-dines/franchises.html" class="dropdown-item"><i class="fas fa-store-alt"></i> Franchises</a>
                    <a href="/workspaces/mugs-n-dines/dispatch.html" class="dropdown-item"><i class="fas fa-truck-fast"></i> Dispatch</a>
                </div>
            </div>
            <a href="/workspaces/mugs-n-dines/map.html" class="nav-btn" style="background:var(--orange);color:white;border-color:var(--orange-dark);"><i class="fas fa-map-marked-alt"></i> Map</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-utensils"></i> Menu Management</h1>
            <button class="btn btn-primary" onclick="showAddModal()"><i class="fas fa-plus"></i> Add Menu Item</button>
        </div>

        <div class="stats-row" id="statsRow">
            <div class="stat-mini"><div class="skeleton" style="height:1.4rem;width:50%;margin:0 auto 0.3rem;"></div><div class="skeleton" style="height:0.6rem;width:60%;margin:0 auto;"></div></div>
            <div class="stat-mini"><div class="skeleton" style="height:1.4rem;width:50%;margin:0 auto 0.3rem;"></div><div class="skeleton" style="height:0.6rem;width:60%;margin:0 auto;"></div></div>
            <div class="stat-mini"><div class="skeleton" style="height:1.4rem;width:50%;margin:0 auto 0.3rem;"></div><div class="skeleton" style="height:0.6rem;width:60%;margin:0 auto;"></div></div>
            <div class="stat-mini"><div class="skeleton" style="height:1.4rem;width:50%;margin:0 auto 0.3rem;"></div><div class="skeleton" style="height:0.6rem;width:60%;margin:0 auto;"></div></div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" data-tab="view" onclick="switchTab('view')"><i class="fas fa-eye"></i> View Menu</button>
            <button class="tab-btn" data-tab="edit" onclick="switchTab('edit')"><i class="fas fa-edit"></i> Edit Menu</button>
        </div>

        <div class="tab-content active" id="tab-view">
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="Appetizers">🍤 Appetizers</button>
                <button class="filter-btn" data-filter="Main Course">🥩 Main Course</button>
                <button class="filter-btn" data-filter="Desserts">🍰 Desserts</button>
                <button class="filter-btn" data-filter="Beverages">🥤 Beverages</button>
                <button class="filter-btn" data-filter="Breakfast">🥞 Breakfast</button>
                <div class="search-box"><i class="fas fa-search"></i><input type="text" id="viewSearch" placeholder="Search menu..." oninput="renderViewMenu()"></div>
            </div>
            <div class="menu-grid" id="viewMenuGrid">
                <div style="background:white;border-radius:16px;overflow:hidden;border:1px solid #f3f4f6;"><div class="skeleton skeleton-image"></div><div style="padding:1rem;"><div class="skeleton skeleton-text" style="width:60%;"></div><div class="skeleton skeleton-text-sm" style="width:40%;"></div></div></div>
                <div style="background:white;border-radius:16px;overflow:hidden;border:1px solid #f3f4f6;"><div class="skeleton skeleton-image"></div><div style="padding:1rem;"><div class="skeleton skeleton-text" style="width:55%;"></div><div class="skeleton skeleton-text-sm" style="width:35%;"></div></div></div>
                <div style="background:white;border-radius:16px;overflow:hidden;border:1px solid #f3f4f6;"><div class="skeleton skeleton-image"></div><div style="padding:1rem;"><div class="skeleton skeleton-text" style="width:65%;"></div><div class="skeleton skeleton-text-sm" style="width:45%;"></div></div></div>
            </div>
        </div>

        <div class="tab-content" id="tab-edit">
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all-edit">All</button>
                <button class="filter-btn" data-filter="active-edit">✅ Active</button>
                <button class="filter-btn" data-filter="inactive-edit">❌ Inactive</button>
                <div class="search-box"><i class="fas fa-search"></i><input type="text" id="editSearch" placeholder="Search menu..." oninput="renderEditTable()"></div>
                <button class="btn btn-primary" onclick="showAddModal()"><i class="fas fa-plus"></i> Add Item</button>
            </div>
            <div class="table-wrap"><div class="table-scroll">
                <table><thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="editTableBody"><tr><td colspan="6"><div class="skeleton" style="height:2rem;margin-bottom:0.3rem;"></div><div class="skeleton" style="height:2rem;margin-bottom:0.3rem;"></div><div class="skeleton" style="height:2rem;"></div></td></tr></tbody></table>
            </div></div>
        </div>
    </div>

    <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
    <div id="toastContainer"></div>
    <div class="footer"><i class="far fa-copyright"></i> 2026 Mugs N Dines · Menu Management</div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let allMenuItems = {};
        let currentViewFilter = 'all';
        let currentEditFilter = 'all-edit';
        let currentTab = 'view';

        function showToast(msg, isError = false) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div'); t.className = `toast ${isError ? 'error' : ''}`;
            t.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
            c.appendChild(t); setTimeout(() => t.remove(), 3500);
        }
        function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m); }

        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
            document.getElementById('tab-view').classList.toggle('active', tab === 'view');
            document.getElementById('tab-edit').classList.toggle('active', tab === 'edit');
            if (tab === 'view') renderViewMenu();
            if (tab === 'edit') renderEditTable();
        };

        function renderViewMenu() {
            const grid = document.getElementById('viewMenuGrid');
            let items = Object.entries(allMenuItems).map(([id, data]) => ({ id, ...data })).filter(i => i.isActive !== false);
            if (currentViewFilter !== 'all') items = items.filter(i => i.category === currentViewFilter);
            const search = (document.getElementById('viewSearch')?.value || '').toLowerCase();
            if (search) items = items.filter(i => (i.name || '').toLowerCase().includes(search));
            if (!items.length) { grid.innerHTML = '<div class="empty-state"><i class="fas fa-utensils" style="font-size:2rem;display:block;margin-bottom:8px;opacity:0.4;"></i><p>No menu items found</p></div>'; return; }
            grid.innerHTML = items.map(i => {
                const img = i.imageUrl ? `<img src="${escapeHtml(i.imageUrl)}" alt="${escapeHtml(i.name)}" onerror="this.style.display='none';this.parentElement.innerHTML='🍽️';">` : '🍽️';
                return `<div class="menu-card"><div class="menu-image">${img}</div><div class="menu-body"><h3>${escapeHtml(i.name)}</h3><span class="menu-category">${escapeHtml(i.category || 'General')}</span>${i.description ? `<p class="menu-description">${escapeHtml(i.description)}</p>` : ''}<div class="menu-footer"><div class="menu-price">KES ${(i.price || 0).toLocaleString()}</div></div></div></div>`;
            }).join('');
        }

        function renderEditTable() {
            const tbody = document.getElementById('editTableBody');
            let items = Object.entries(allMenuItems).map(([id, data]) => ({ id, ...data }));
            if (currentEditFilter === 'active-edit') items = items.filter(i => i.isActive !== false);
            else if (currentEditFilter === 'inactive-edit') items = items.filter(i => i.isActive === false);
            const search = (document.getElementById('editSearch')?.value || '').toLowerCase();
            if (search) items = items.filter(i => (i.name || '').toLowerCase().includes(search));
            if (!items.length) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">No items found</div></td></tr>'; return; }
            tbody.innerHTML = items.map(i => `
                <tr>
                    <td><div style="width:36px;height:36px;background:#fff7ed;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;">${i.imageUrl ? `<img src="${escapeHtml(i.imageUrl)}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" onerror="this.style.display='none';this.parentElement.innerHTML='🍽️';">` : '🍽️'}</div></td>
                    <td><strong>${escapeHtml(i.name)}</strong></td>
                    <td>${escapeHtml(i.category || 'General')}</td>
                    <td><strong>KES ${(i.price || 0).toLocaleString()}</strong></td>
                    <td><span style="color:${i.isActive !== false ? '#10b981' : '#ef4444'};font-weight:600;font-size:0.65rem;">${i.isActive !== false ? '✅ Active' : '❌ Inactive'}</span></td>
                    <td><div style="display:flex;gap:4px;"><button class="btn-sm btn-edit" onclick="editItem('${i.id}')"><i class="fas fa-edit"></i></button><button class="btn-sm btn-delete" onclick="deleteItem('${i.id}')"><i class="fas fa-trash"></i></button></div></td>
                </tr>`).join('');
        }

        window.showAddModal = () => {
            document.getElementById('modalContent').innerHTML = `
                <h3><i class="fas fa-plus-circle"></i> Add Menu Item</h3>
                <div class="form-group"><label>Name *</label><input type="text" id="mName" placeholder="e.g., Grilled Chicken"></div>
                <div class="form-row"><div class="form-group"><label>Category</label><select id="mCategory"><option value="Appetizers">🍤 Appetizers</option><option value="Main Course">🥩 Main Course</option><option value="Desserts">🍰 Desserts</option><option value="Beverages">🥤 Beverages</option><option value="Breakfast">🥞 Breakfast</option><option value="Other">📦 Other</option></select></div><div class="form-group"><label>Price (KES) *</label><input type="number" id="mPrice" value="0" min="0"></div></div>
                <div class="form-group"><label>Description</label><textarea id="mDescription" rows="2" placeholder="Dish description..."></textarea></div>
                <div class="form-group"><label>Image URL</label><input type="text" id="mImageUrl" placeholder="https://... (optional)"></div>
                <div class="form-group"><label><input type="checkbox" id="mActive" checked style="width:auto;margin-right:6px;"> Active on menu</label></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="saveItem()"><i class="fas fa-save"></i> Save</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>`;
            document.getElementById('modal').classList.add('show');
        };

        window.editItem = (id) => {
            const item = allMenuItems[id]; if (!item) return;
            document.getElementById('modalContent').innerHTML = `
                <h3><i class="fas fa-edit"></i> Edit Menu Item</h3>
                <div class="form-group"><label>Name</label><input type="text" id="mName" value="${escapeHtml(item.name || '')}"></div>
                <div class="form-row"><div class="form-group"><label>Category</label><select id="mCategory">${['Appetizers','Main Course','Desserts','Beverages','Breakfast','Other'].map(c => `<option value="${c}" ${item.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div><div class="form-group"><label>Price (KES)</label><input type="number" id="mPrice" value="${item.price || 0}"></div></div>
                <div class="form-group"><label>Description</label><textarea id="mDescription" rows="2">${escapeHtml(item.description || '')}</textarea></div>
                <div class="form-group"><label>Image URL</label><input type="text" id="mImageUrl" value="${escapeHtml(item.imageUrl || '')}"></div>
                <div class="form-group"><label><input type="checkbox" id="mActive" ${item.isActive !== false ? 'checked' : ''} style="width:auto;margin-right:6px;"> Active on menu</label></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="updateItem('${id}')"><i class="fas fa-save"></i> Update</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>`;
            document.getElementById('modal').classList.add('show');
        };

        window.saveItem = async () => {
            const name = document.getElementById('mName').value.trim();
            if (!name) { showToast('Name is required', true); return; }
            try {
                await db.ref('mugs_n_dines_menu').push().set({
                    name, category: document.getElementById('mCategory').value,
                    price: parseInt(document.getElementById('mPrice').value) || 0,
                    description: document.getElementById('mDescription').value.trim(),
                    imageUrl: document.getElementById('mImageUrl').value.trim(),
                    isActive: document.getElementById('mActive').checked,
                    createdAt: firebase.database.ServerValue.TIMESTAMP,
                    updatedAt: firebase.database.ServerValue.TIMESTAMP
                });
                showToast('✅ Item added!'); closeModal();
            } catch (e) { showToast('Failed to save', true); }
        };

        window.updateItem = async (id) => {
            try {
                await db.ref(`mugs_n_dines_menu/${id}`).update({
                    name: document.getElementById('mName').value.trim(),
                    category: document.getElementById('mCategory').value,
                    price: parseInt(document.getElementById('mPrice').value) || 0,
                    description: document.getElementById('mDescription').value.trim(),
                    imageUrl: document.getElementById('mImageUrl').value.trim(),
                    isActive: document.getElementById('mActive').checked,
                    updatedAt: firebase.database.ServerValue.TIMESTAMP
                });
                showToast('✅ Updated!'); closeModal();
            } catch (e) { showToast('Failed to update', true); }
        };

        window.deleteItem = async (id) => { if (confirm('Delete this item?')) { await db.ref(`mugs_n_dines_menu/${id}`).remove(); showToast('✅ Deleted'); } };
        window.closeModal = () => document.getElementById('modal').classList.remove('show');

        document.querySelectorAll('#tab-view .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#tab-view .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); currentViewFilter = btn.dataset.filter; renderViewMenu();
            });
        });
        document.querySelectorAll('#tab-edit .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#tab-edit .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); currentEditFilter = btn.dataset.filter; renderEditTable();
            });
        });

        document.getElementById('modal').addEventListener('click', (e) => { if (e.target === document.getElementById('modal')) closeModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        window.toggleDropdown = () => document.getElementById('moreDropdown').classList.toggle('show');
        document.addEventListener('click', (e) => { if (!e.target.closest('.nav-dropdown')) document.getElementById('moreDropdown').classList.remove('show'); });

        function updateStats() {
            const items = Object.values(allMenuItems);
            document.getElementById('statsRow').innerHTML = `
                <div class="stat-mini"><div class="stat-num">${items.length}</div><div class="stat-label">Total Items</div></div>
                <div class="stat-mini"><div class="stat-num">${items.filter(i => i.isActive !== false).length}</div><div class="stat-label">Active</div></div>
                <div class="stat-mini"><div class="stat-num">${items.filter(i => i.isActive === false).length}</div><div class="stat-label">Inactive</div></div>
                <div class="stat-mini"><div class="stat-num">${new Set(items.map(i => i.category).filter(Boolean)).size}</div><div class="stat-label">Categories</div></div>`;
        }

        db.ref('mugs_n_dines_menu').on('value', (snapshot) => {
            allMenuItems = snapshot.val() || {};
            updateStats();
            if (currentTab === 'view') renderViewMenu();
            if (currentTab === 'edit') renderEditTable();
        }, () => { allMenuItems = {}; updateStats(); });

        auth.onAuthStateChanged((user) => { if (!user) window.location.href = '/workspaces/index.html'; });
    </script>
</body>
</html>
