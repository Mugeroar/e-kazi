  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged } from "firebase/auth";
    import { getDatabase, ref, get, onValue } from "firebase/database";

    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let allCars = {};
    let allHouses = {};
    let allPartners = {};
    let allReviews = {};
    let allSales = {};
    let allTestDrives = {};
    let allHomeVisits = {};
    let allInteriors = {};
    let dataLoaded = false;

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
    }

    function getInitials(name) {
      if (!name) return 'ER';
      return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
    }

    function formatTimeAgo(timestamp) {
      if (!timestamp) return '';
      const date = typeof timestamp === 'number' ? new Date(timestamp) : new Date(timestamp);
      if (isNaN(date.getTime())) return '';
      const diff = Date.now() - date.getTime();
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(mins / 60);
      const days = Math.floor(hours / 24);
      if (days > 30) return '';
      if (days > 0) return `${days}d ago`;
      if (hours > 0) return `${hours}h ago`;
      if (mins > 0) return `${mins}m ago`;
      return 'Just now';
    }

    function formatPrice(price) {
      if (!price) return '0';
      const num = Number(price);
      if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(0) + 'K';
      return num.toLocaleString();
    }

    function getStatusClass(status) {
      const s = (status || 'available').toLowerCase();
      if (s === 'sold') return 'status-sold';
      if (s === 'pending') return 'status-pending';
      if (s === 'active') return 'status-active';
      if (s === 'new') return 'status-new';
      if (s === 'scheduled') return 'status-scheduled';
      if (s === 'completed') return 'status-completed';
      return 'status-available';
    }

    function getTypeIcon(type) {
      if (type === 'car') return '🚗';
      if (type === 'house') return '🏠';
      if (type === 'testdrive') return '🛞';
      if (type === 'homevisit') return '🏡';
      if (type === 'interior') return '🎨';
      if (type === 'partner') return '🤝';
      if (type === 'sale') return '💰';
      return '📋';
    }

    function buildRealContent() {
      // Stats Grid
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-left"><h4>Cars Listed</h4><div class="stat-number" id="totalCars">0</div><div class="stat-trend"><i class="fas fa-car"></i> Available</div></div>
          <div class="stat-icon"><i class="fas fa-car"></i></div>
        </div>
        <div class="stat-card">
          <div class="stat-left"><h4>Houses Listed</h4><div class="stat-number" id="totalHouses">0</div><div class="stat-trend"><i class="fas fa-home"></i> For sale/rent</div></div>
          <div class="stat-icon"><i class="fas fa-home"></i></div>
        </div>
        <div class="stat-card">
          <div class="stat-left"><h4>Partners</h4><div class="stat-number" id="totalPartners">0</div><div class="stat-trend"><i class="fas fa-handshake"></i> Active</div></div>
          <div class="stat-icon"><i class="fas fa-handshake"></i></div>
        </div>
        <div class="stat-card">
          <div class="stat-left"><h4>Total Sales</h4><div class="stat-number" id="totalSales">0</div><div class="stat-trend"><i class="fas fa-receipt"></i> Transactions</div></div>
          <div class="stat-icon"><i class="fas fa-file-invoice-dollar"></i></div>
        </div>
        <div class="stat-card">
          <div class="stat-left"><h4>Revenue (KES)</h4><div class="stat-number" id="totalRevenue">0</div><div class="stat-trend"><i class="fas fa-chart-line"></i> This month</div></div>
          <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
        </div>
      `;

      // Action Grid with proper links
      document.getElementById('actionGrid').innerHTML = `
        <a href="/workspaces/epitome/car-listings.html" class="action-card car-sale-card">
          <div class="action-icon"><i class="fas fa-car-side"></i></div>
          <h2>Car Sales</h2>
          <p>Manage vehicle inventory, list new cars, update pricing & details.</p>
          <span class="action-link">View Cars <i class="fas fa-arrow-right"></i></span>
        </a>
        <a href="/workspaces/epitome/house-listings.html" class="action-card house-sale-card">
          <div class="action-icon"><i class="fas fa-home-lg"></i></div>
          <h2>House Sales</h2>
          <p>Manage property listings for sale or rent, add photos & descriptions.</p>
          <span class="action-link">View Houses <i class="fas fa-arrow-right"></i></span>
        </a>
        <a href="/workspaces/epitome/custom-interior.html" class="action-card interior-card">
          <div class="action-icon"><i class="fas fa-paint-roller"></i></div>
          <h2>Custom Interior</h2>
          <p>Design & manage bespoke car interior projects and requests.</p>
          <span class="action-link">Interior Studio <i class="fas fa-arrow-right"></i></span>
        </a>
        <a href="/workspaces/epitome/test-drives.html" class="action-card testdrive-card">
          <div class="action-icon"><i class="fas fa-steering-wheel"></i></div>
          <h2>Test Drives</h2>
          <p>Schedule & manage car test drive appointments with customers.</p>
          <span class="action-link">Schedule Drive <i class="fas fa-arrow-right"></i></span>
        </a>
        <a href="/workspaces/epitome/home-visits.html" class="action-card homevisit-card">
          <div class="action-icon"><i class="fas fa-house-chimney-user"></i></div>
          <h2>Home Visits</h2>
          <p>Arrange property viewing visits & manage client schedules.</p>
          <span class="action-link">Book Visit <i class="fas fa-arrow-right"></i></span>
        </a>
        <a href="/workspaces/epitome/partners.html" class="action-card partner-card">
          <div class="action-icon"><i class="fas fa-handshake-angle"></i></div>
          <h2>Partners</h2>
          <p>Manage partner agents, dealerships & collaboration details.</p>
          <span class="action-link">Manage Partners <i class="fas fa-arrow-right"></i></span>
        </a>
        <a href="/workspaces/epitome/sales.html" class="action-card sales-card">
          <div class="action-icon"><i class="fas fa-file-invoice-dollar"></i></div>
          <h2>Sales</h2>
          <p>Record transactions, track commissions & manage revenue.</p>
          <span class="action-link">View Sales <i class="fas fa-arrow-right"></i></span>
        </a>
        <a href="/workspaces/epitome/reviews.html" class="action-card review-card">
          <div class="action-icon"><i class="fas fa-star-half-stroke"></i></div>
          <h2>Reviews</h2>
          <p>Moderate & publish car and house reviews from customers.</p>
          <span class="action-link">Manage Reviews <i class="fas fa-arrow-right"></i></span>
        </a>
      `;

      // Quick Links
      document.getElementById('quickLinks').innerHTML = `
        <a href="/workspaces/epitome/car-listings.html" class="quick-btn"><i class="fas fa-plus-circle"></i> Add Car</a>
        <a href="/workspaces/epitome/house-listings.html" class="quick-btn"><i class="fas fa-plus-circle"></i> Add House</a>
        <a href="/workspaces/epitome/sales.html" class="quick-btn highlight"><i class="fas fa-plus-circle"></i> Record Sale</a>
        <a href="/workspaces/epitome/test-drives.html" class="quick-btn"><i class="fas fa-calendar-check"></i> Test Drive</a>
        <a href="/workspaces/epitome/home-visits.html" class="quick-btn"><i class="fas fa-calendar-plus"></i> Home Visit</a>
        <a href="/workspaces/epitome/partners.html" class="quick-btn"><i class="fas fa-user-plus"></i> Add Partner</a>
        <a href="/workspaces/epitome/custom-interior.html" class="quick-btn"><i class="fas fa-palette"></i> Interior</a>
      `;

      // Sales header link
      document.querySelector('#salesSection .recent-header').innerHTML = `
        <h3><i class="fas fa-file-invoice-dollar" style="color:#d4af37;"></i> Recent Sales</h3>
        <a href="/workspaces/epitome/sales.html" style="color:#d4af37;font-weight:600;font-size:0.75rem;">View all</a>
      `;

      // Listings header link
      document.querySelector('#listingsSection .recent-header').innerHTML = `
        <h3><i class="fas fa-list-check" style="color:#d4af37;"></i> Recent Listings</h3>
        <a href="/workspaces/epitome/car-listings.html" style="color:#d4af37;font-weight:600;font-size:0.75rem;">View all</a>
      `;
    }

    function renderRecentSales() {
      const list = document.getElementById('recentSales');
      const sales = Object.entries(allSales)
        .map(([id, data]) => ({ id, type: 'sale', ...data }))
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))
        .slice(0, 4);

      if (!sales.length) {
        list.innerHTML = '<div class="empty-state">No sales recorded yet</div>';
        return;
      }

      list.innerHTML = sales.map(sale => {
        const status = sale.status || 'completed';
        const buyer = sale.buyer || 'Customer';
        const amount = sale.amount || 0;
        const saleType = sale.type || 'car';
        return `
          <div class="recent-item">
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="width:32px;height:32px;background:rgba(212,175,55,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;">${getTypeIcon(saleType)}</div>
              <div>
                <strong>${escapeHtml(buyer)}</strong>
                <p style="font-size:0.65rem;color:#a8a090;">
                  <span class="type-badge ${saleType}">${saleType === 'car' ? 'CAR' : 'HOUSE'}</span>
                  KES ${formatPrice(amount)} ${formatTimeAgo(sale.createdAt) ? '· ' + formatTimeAgo(sale.createdAt) : ''}
                </p>
              </div>
            </div>
            <span class="status-tag ${getStatusClass(status)}">${status}</span>
          </div>`;
      }).join('');
    }

    function renderRecentListings() {
      const list = document.getElementById('recentListings');
      const cars = Object.entries(allCars).map(([id, d]) => ({ id, type: 'car', ...d }));
      const houses = Object.entries(allHouses).map(([id, d]) => ({ id, type: 'house', ...d }));
      const interiors = Object.entries(allInteriors).map(([id, d]) => ({ id, type: 'interior', ...d }));
      const combined = [...cars, ...houses, ...interiors]
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))
        .slice(0, 5);

      if (!combined.length) {
        list.innerHTML = '<div class="empty-state">No listings yet</div>';
        return;
      }

      list.innerHTML = combined.map(item => {
        const status = item.status || 'available';
        const title = item.make || item.model || item.title || item.propertyType || item.projectName || 'Listing';
        const price = item.price || item.budget || 0;
        return `
          <div class="recent-item">
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="width:32px;height:32px;background:rgba(212,175,55,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;">${getTypeIcon(item.type)}</div>
              <div>
                <strong>${escapeHtml(title)}</strong>
                <p style="font-size:0.65rem;color:#a8a090;">
                  <span class="type-badge ${item.type}">${item.type.toUpperCase()}</span>
                  KES ${formatPrice(price)} ${formatTimeAgo(item.createdAt) ? '· ' + formatTimeAgo(item.createdAt) : ''}
                </p>
              </div>
            </div>
            <span class="status-tag ${getStatusClass(status)}">${status}</span>
          </div>`;
      }).join('');
    }

    function updateStats() {
      if (!dataLoaded) return;
      
      const cars = Object.values(allCars).filter(c => c);
      const houses = Object.values(allHouses).filter(h => h);
      const partners = Object.values(allPartners).filter(p => p);
      const sales = Object.values(allSales).filter(s => s);
      
      const now = new Date();
      const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
      const monthlyRevenue = sales
        .filter(s => (s.createdAt || 0) >= startOfMonth)
        .reduce((sum, s) => sum + (s.amount || 0), 0);

      const totalCarsEl = document.getElementById('totalCars');
      const totalHousesEl = document.getElementById('totalHouses');
      const totalPartnersEl = document.getElementById('totalPartners');
      const totalSalesEl = document.getElementById('totalSales');
      const totalRevenueEl = document.getElementById('totalRevenue');
      
      if (totalCarsEl) totalCarsEl.textContent = cars.length;
      if (totalHousesEl) totalHousesEl.textContent = houses.length;
      if (totalPartnersEl) totalPartnersEl.textContent = partners.length;
      if (totalSalesEl) totalSalesEl.textContent = sales.length;
      if (totalRevenueEl) totalRevenueEl.textContent = formatPrice(monthlyRevenue);
      
      document.getElementById('footerStats').textContent = `${cars.length} cars · ${houses.length} houses · ${partners.length} partners · ${sales.length} sales`;
      document.getElementById('lastUpdated').innerHTML = `<i class="fas fa-circle" style="color:#d4af37;"></i> Live`;

      renderRecentSales();
      renderRecentListings();
    }

    function setupRealtimeListeners() {
      onValue(ref(db, 'epitome_cars'), (snapshot) => {
        allCars = snapshot.val() || {};
        checkAllDataLoaded();
      });

      onValue(ref(db, 'epitome_houses'), (snapshot) => {
        allHouses = snapshot.val() || {};
        checkAllDataLoaded();
      });

      onValue(ref(db, 'epitome_partners'), (snapshot) => {
        allPartners = snapshot.val() || {};
        checkAllDataLoaded();
      });

      onValue(ref(db, 'epitome_sales'), (snapshot) => {
        allSales = snapshot.val() || {};
        checkAllDataLoaded();
      });

      onValue(ref(db, 'epitome_reviews'), (snapshot) => {
        allReviews = snapshot.val() || {};
        checkAllDataLoaded();
      });

      onValue(ref(db, 'epitome_testdrives'), (snapshot) => {
        allTestDrives = snapshot.val() || {};
        checkAllDataLoaded();
      });

      onValue(ref(db, 'epitome_homevisits'), (snapshot) => {
        allHomeVisits = snapshot.val() || {};
        checkAllDataLoaded();
      });

      onValue(ref(db, 'epitome_interiors'), (snapshot) => {
        allInteriors = snapshot.val() || {};
        checkAllDataLoaded();
      });
    }

    function checkAllDataLoaded() {
      if (!dataLoaded) {
        dataLoaded = true;
        buildRealContent();
        updateStats();
      } else {
        updateStats();
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userSnap = await get(ref(db, `brandinn_users/${user.uid}`));
        let userName = user.email?.split('@')[0] || 'Manager';
        let businessName = 'Epitome Reviews';
        if (userSnap.exists()) {
          userName = userSnap.val().name || userName;
          businessName = userSnap.val().businessName || businessName;
        }
        document.getElementById('userName').textContent = userName;
        document.getElementById('userAvatar').textContent = getInitials(userName);
        document.getElementById('businessName').innerHTML = `${escapeHtml(businessName)} <span>Reviews</span>`;
        setupRealtimeListeners();
      } else {
        window.location.href = '/';
      }
    });

    setTimeout(() => {
      if (!dataLoaded) {
        dataLoaded = true;
        buildRealContent();
        updateStats();
      }
    }, 8000);
  </script>
</body>
