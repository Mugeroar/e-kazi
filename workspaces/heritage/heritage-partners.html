<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Partners Manager | The Heritage</title>
  
  <meta name="theme-color" content="#d946ef">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --heritage: #d946ef;
      --heritage-dark: #a21caf;
      --heritage-light: #f0abfc;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #f0abfc;
      --red: #ef4444;
      --green: #10b981;
      --orange: #f59e0b;
      --blue: #3b82f6;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #fdf4ff 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(217, 70, 239, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(217, 70, 239, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #f0abfc, #a21caf);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #d946ef; -webkit-text-fill-color: #d946ef; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(217, 70, 239, 0.08); border: 1px solid rgba(217, 70, 239, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--heritage-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--heritage); color: white; }

    .container { padding: 1rem 2%; flex: 1; }

    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--heritage-dark); margin-right: 6px; }
    .page-header p { color: var(--text-muted); font-size: 0.75rem; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-mini {
      background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
      border: 1px solid #f0abfc; box-shadow: 0 2px 8px rgba(162,28,175,0.03);
    }
    .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--heritage-dark); line-height: 1.1; }
    .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

    .search-box { flex: 1; min-width: 200px; max-width: 350px; position: relative; margin-bottom: 1rem; }
    .search-box input {
      width: 100%; padding: 0.45rem 0.8rem 0.45rem 2.2rem; border-radius: 20px;
      border: 1.5px solid #e2e8f0; font-size: 0.75rem; font-family: 'Inter', sans-serif;
    }
    .search-box i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.8rem; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }

    .partner-card {
      background: white; border-radius: 16px; padding: 1.2rem;
      border: 1px solid #f0abfc; box-shadow: 0 3px 12px rgba(162,28,175,0.03);
      transition: all 0.2s;
    }
    .partner-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(162,28,175,0.08); }
    .partner-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
    .partner-card-header h3 { font-size: 0.95rem; font-weight: 700; }
    .partner-badge {
      padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.6rem; font-weight: 700;
    }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }
    .badge-vip { background: #fef3c7; color: #92400e; }
    .badge-new { background: #dbeafe; color: #1e40af; }

    .partner-info { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.7rem; margin-bottom: 0.8rem; }
    .partner-info div { color: var(--text-muted); }
    .partner-info strong { color: var(--text-primary); display: block; font-size: 0.6rem; text-transform: uppercase; }

    .partner-stats { display: flex; gap: 10px; margin-bottom: 0.8rem; }
    .partner-stat {
      flex: 1; text-align: center; background: #fdf4ff; padding: 0.5rem; border-radius: 10px;
    }
    .partner-stat .val { font-size: 1rem; font-weight: 800; color: var(--heritage-dark); }
    .partner-stat .lbl { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; }

    .partner-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-sm {
      padding: 0.3rem 0.7rem; border-radius: 8px; border: none; font-weight: 600;
      font-size: 0.65rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 4px; transition: all 0.15s; font-family: inherit;
    }
    .btn-view { background: #f1f5f9; color: #475569; }
    .btn-view:hover { background: #475569; color: white; }
    .btn-edit { background: #fdf4ff; color: #a21caf; }
    .btn-edit:hover { background: #d946ef; color: white; }
    .btn-campaigns { background: #dbeafe; color: #1e40af; }
    .btn-campaigns:hover { background: #3b82f6; color: white; }
    .btn-toggle { background: #d1fae5; color: #065f46; }
    .btn-toggle:hover { background: #10b981; color: white; }
    .btn-toggle.inactive { background: #fee2e2; color: #991b1b; }
    .btn-toggle.inactive:hover { background: #ef4444; color: white; }

    .empty-state { text-align: center; padding: 3rem; color: #94a3b8; grid-column: 1 / -1; }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
      align-items: center; backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 20px; padding: 1.5rem; max-width: 550px;
      width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; color: var(--heritage-dark); }
    .form-group { margin-bottom: 0.7rem; }
    .form-group label {
      display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
      background: #f8fafc;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; font-family: inherit; transition: all 0.15s;
    }
    .btn-primary { background: var(--heritage); color: white; }
    .btn-primary:hover { background: var(--heritage-dark); }
    .btn-secondary { background: #f1f5f9; color: #475569; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.75rem; margin-bottom: 1rem; }
    .detail-item { background: #fdf4ff; padding: 0.6rem; border-radius: 10px; }
    .detail-item strong { display: block; font-size: 0.6rem; color: var(--heritage-dark); text-transform: uppercase; margin-bottom: 0.1rem; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--green); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(16,185,129,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="The Heritage" class="logo-img">
      <span class="logo-text">The Heritage <span>Ads</span></span>
    </a>
    <div class="nav-right">
      <a href="index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="heritage-listings.html" class="nav-btn"><i class="fas fa-th-large"></i> Listings</a>
      <a href="heritage-campaigns.html" class="nav-btn"><i class="fas fa-bullhorn"></i> Campaigns</a>
      <a href="heritage-monitoring.html" class="nav-btn"><i class="fas fa-chart-line"></i> Monitoring</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-handshake"></i> Partners Manager</h1>
      <button class="btn btn-primary" onclick="showAddModal()" style="padding:0.5rem 1rem;font-size:0.7rem;">
        <i class="fas fa-plus"></i> Add Partner
      </button>
    </div>

    <div class="stats-row">
      <div class="stat-mini"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Partners</div></div>
      <div class="stat-mini"><div class="stat-num" id="statActive">0</div><div class="stat-label">Active</div></div>
      <div class="stat-mini"><div class="stat-num" id="statCampaigns">0</div><div class="stat-label">Total Campaigns</div></div>
      <div class="stat-mini"><div class="stat-num" id="statRevenue">0</div><div class="stat-label">Revenue (KES)</div></div>
    </div>

    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search by business name, phone, email...">
    </div>

    <div class="cards-grid" id="partnersGrid">
      <div class="empty-state">Loading partners...</div>
    </div>
  </div>

  <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allPartners = {};
    let allCampaigns = {};
    let searchQuery = '';

    function showToast(msg, isError) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.innerHTML = '<i class="fas fa-' + (isError ? 'exclamation-circle' : 'check-circle') + '"></i> ' + msg;
      container.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 3500);
    }

    function getInitials(name) {
      if (!name) return 'TH';
      return name.split(' ').map(function(n) { return n[0]; }).join('').toUpperCase().substring(0, 2);
    }

    function getPartnerCampaigns(partnerName) {
      return Object.values(allCampaigns).filter(function(c) { return c && c.clientName === partnerName; });
    }

    function getBadgeClass(status) {
      const map = { active:'badge-active', inactive:'badge-inactive', vip:'badge-vip', new:'badge-new' };
      return map[status] || 'badge-active';
    }

    function renderPartners() {
      const grid = document.getElementById('partnersGrid');
      let partners = Object.entries(allPartners).map(function(entry) { return Object.assign({ id: entry[0] }, entry[1]); });

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        partners = partners.filter(function(p) {
          return (p.businessName || p.name || '').toLowerCase().indexOf(q) !== -1 ||
                 (p.phone || '').toLowerCase().indexOf(q) !== -1 ||
                 (p.email || '').toLowerCase().indexOf(q) !== -1;
        });
      }

      partners.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });

      if (!partners.length) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-handshake" style="font-size:2rem;display:block;margin-bottom:8px;"></i>No partners found</div>';
        return;
      }

      grid.innerHTML = partners.map(function(p) {
        const name = p.businessName || p.name || 'Partner';
        const status = p.status || 'active';
        const campaigns = getPartnerCampaigns(name);
        const campaignCount = campaigns.length;
        const revenue = campaigns.reduce(function(s, c) { return s + (c.totalBudget || 0); }, 0);
        const activeCampaigns = campaigns.filter(function(c) { return c.status === 'active'; }).length;

        return '<div class="partner-card">' +
          '<div class="partner-card-header">' +
            '<h3>' + name + '</h3>' +
            '<span class="partner-badge ' + getBadgeClass(status) + '">' + status.toUpperCase() + '</span>' +
          '</div>' +
          '<div class="partner-info">' +
            '<div><strong>Contact</strong>' + (p.contactPerson || 'N/A') + '</div>' +
            '<div><strong>Phone</strong>' + (p.phone || 'N/A') + '</div>' +
            '<div><strong>Email</strong>' + (p.email || 'N/A') + '</div>' +
            '<div><strong>Industry</strong>' + (p.industry || 'N/A') + '</div>' +
            '<div><strong>Tier</strong>' + (p.tier || 'Standard') + '</div>' +
            '<div><strong>Joined</strong>' + (p.createdAt ? new Date(p.createdAt).toLocaleDateString() : 'N/A') + '</div>' +
          '</div>' +
          '<div class="partner-stats">' +
            '<div class="partner-stat"><div class="val">' + campaignCount + '</div><div class="lbl">Campaigns</div></div>' +
            '<div class="partner-stat"><div class="val">' + activeCampaigns + '</div><div class="lbl">Active</div></div>' +
            '<div class="partner-stat"><div class="val">KES ' + revenue.toLocaleString() + '</div><div class="lbl">Value</div></div>' +
          '</div>' +
          '<div class="partner-actions">' +
            '<button class="btn-sm btn-view" onclick="viewPartner(\'' + p.id + '\')"><i class="fas fa-eye"></i> View</button>' +
            '<button class="btn-sm btn-edit" onclick="editPartner(\'' + p.id + '\')"><i class="fas fa-edit"></i> Edit</button>' +
            '<button class="btn-sm btn-campaigns" onclick="viewPartnerCampaigns(\'' + p.id + '\')"><i class="fas fa-bullhorn"></i> Campaigns</button>' +
            '<button class="btn-sm btn-toggle ' + (status === 'active' ? '' : 'inactive') + '" onclick="toggleStatus(\'' + p.id + '\',\'' + status + '\')"><i class="fas fa-power-off"></i> ' + (status === 'active' ? 'Deactivate' : 'Activate') + '</button>' +
          '</div>' +
        '</div>';
      }).join('');

      updateStats();
    }

    function updateStats() {
      const partners = Object.values(allPartners);
      const active = partners.filter(function(p) { return p.status === 'active' || !p.status; }).length;
      const campaigns = Object.values(allCampaigns);
      const revenue = campaigns.reduce(function(s, c) { return s + (c.totalBudget || 0); }, 0);

      document.getElementById('statTotal').textContent = partners.length;
      document.getElementById('statActive').textContent = active;
      document.getElementById('statCampaigns').textContent = campaigns.length;
      document.getElementById('statRevenue').textContent = revenue.toLocaleString();
    }

    function showAddModal() {
      document.getElementById('modalContent').innerHTML = 
        '<h3><i class="fas fa-plus-circle"></i> Add Partner</h3>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Business Name *</label><input type="text" id="pName" placeholder="e.g., Sunrise Cafe"></div>' +
          '<div class="form-group"><label>Industry</label><select id="pIndustry">' +
            '<option value="Retail">Retail</option><option value="Food & Beverage">Food & Beverage</option>' +
            '<option value="Fashion">Fashion</option><option value="Real Estate">Real Estate</option>' +
            '<option value="Technology">Technology</option><option value="Healthcare">Healthcare</option>' +
            '<option value="Education">Education</option><option value="Entertainment">Entertainment</option>' +
            '<option value="Other">Other</option>' +
          '</select></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Contact Person *</label><input type="text" id="pContact" placeholder="Full name"></div>' +
          '<div class="form-group"><label>Phone *</label><input type="tel" id="pPhone" placeholder="+254..."></div>' +
        '</div>' +
        '<div class="form-group"><label>Email</label><input type="email" id="pEmail" placeholder="partner@email.com"></div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Tier</label><select id="pTier">' +
            '<option value="Standard">Standard</option><option value="VIP">VIP</option><option value="Premium">Premium</option>' +
          '</select></div>' +
          '<div class="form-group"><label>Status</label><select id="pStatus">' +
            '<option value="new">New</option><option value="active">Active</option><option value="inactive">Inactive</option>' +
          '</select></div>' +
        '</div>' +
        '<div class="form-group"><label>Notes</label><textarea id="pNotes" rows="2" placeholder="Any additional info..."></textarea></div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-primary" onclick="savePartner()"><i class="fas fa-save"></i> Save Partner</button>' +
          '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
        '</div>';
      document.getElementById('modal').classList.add('show');
    }

    async function savePartner() {
      const name = document.getElementById('pName').value.trim();
      const contact = document.getElementById('pContact').value.trim();
      const phone = document.getElementById('pPhone').value.trim();
      if (!name || !contact || !phone) { showToast('Fill required fields', true); return; }

      try {
        await database.ref('heritage_partners').push().set({
          businessName: name,
          contactPerson: contact,
          phone: phone,
          email: document.getElementById('pEmail').value.trim(),
          industry: document.getElementById('pIndustry').value,
          tier: document.getElementById('pTier').value,
          status: document.getElementById('pStatus').value,
          notes: document.getElementById('pNotes').value.trim(),
          createdAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('Partner added!');
        closeModal();
      } catch (e) { showToast('Failed to save', true); }
    }

    function editPartner(partnerId) {
      const p = allPartners[partnerId];
      if (!p) return;
      document.getElementById('modalContent').innerHTML = 
        '<h3><i class="fas fa-edit"></i> Edit Partner</h3>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Business Name</label><input type="text" id="epName" value="' + (p.businessName || p.name || '') + '"></div>' +
          '<div class="form-group"><label>Industry</label><select id="epIndustry">' +
            ['Retail','Food & Beverage','Fashion','Real Estate','Technology','Healthcare','Education','Entertainment','Other'].map(function(i) { return '<option value="' + i + '" ' + (p.industry === i ? 'selected' : '') + '>' + i + '</option>'; }).join('') +
          '</select></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Contact Person</label><input type="text" id="epContact" value="' + (p.contactPerson || '') + '"></div>' +
          '<div class="form-group"><label>Phone</label><input type="tel" id="epPhone" value="' + (p.phone || '') + '"></div>' +
        '</div>' +
        '<div class="form-group"><label>Email</label><input type="email" id="epEmail" value="' + (p.email || '') + '"></div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Tier</label><select id="epTier">' +
            ['Standard','VIP','Premium'].map(function(t) { return '<option value="' + t + '" ' + (p.tier === t ? 'selected' : '') + '>' + t + '</option>'; }).join('') +
          '</select></div>' +
          '<div class="form-group"><label>Status</label><select id="epStatus">' +
            ['new','active','inactive'].map(function(s) { return '<option value="' + s + '" ' + (p.status === s ? 'selected' : '') + '>' + s + '</option>'; }).join('') +
          '</select></div>' +
        '</div>' +
        '<div class="form-group"><label>Notes</label><textarea id="epNotes" rows="2">' + (p.notes || '') + '</textarea></div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-primary" onclick="updatePartner(\'' + partnerId + '\')"><i class="fas fa-save"></i> Update</button>' +
          '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
        '</div>';
      document.getElementById('modal').classList.add('show');
    }

    async function updatePartner(partnerId) {
      try {
        await database.ref('heritage_partners/' + partnerId).update({
          businessName: document.getElementById('epName').value.trim(),
          contactPerson: document.getElementById('epContact').value.trim(),
          phone: document.getElementById('epPhone').value.trim(),
          email: document.getElementById('epEmail').value.trim(),
          industry: document.getElementById('epIndustry').value,
          tier: document.getElementById('epTier').value,
          status: document.getElementById('epStatus').value,
          notes: document.getElementById('epNotes').value.trim(),
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('Updated!');
        closeModal();
      } catch (e) { showToast('Failed to update', true); }
    }

    async function toggleStatus(partnerId, currentStatus) {
      const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
      if (!confirm(newStatus === 'active' ? 'Activate this partner?' : 'Deactivate this partner?')) return;
      try {
        await database.ref('heritage_partners/' + partnerId).update({ status: newStatus });
        showToast('Partner ' + newStatus + '!');
      } catch (e) { showToast('Failed to update', true); }
    }

    function viewPartner(partnerId) {
      const p = allPartners[partnerId];
      if (!p) return;
      const name = p.businessName || p.name || 'Partner';
      const campaigns = getPartnerCampaigns(name);
      
      document.getElementById('modalContent').innerHTML = 
        '<h3><i class="fas fa-handshake"></i> ' + name + '</h3>' +
        '<div class="detail-grid">' +
          '<div class="detail-item"><strong>Contact</strong>' + (p.contactPerson || 'N/A') + '</div>' +
          '<div class="detail-item"><strong>Phone</strong>' + (p.phone || 'N/A') + '</div>' +
          '<div class="detail-item"><strong>Email</strong>' + (p.email || 'N/A') + '</div>' +
          '<div class="detail-item"><strong>Industry</strong>' + (p.industry || 'N/A') + '</div>' +
          '<div class="detail-item"><strong>Tier</strong>' + (p.tier || 'Standard') + '</div>' +
          '<div class="detail-item"><strong>Status</strong>' + (p.status || 'active') + '</div>' +
          '<div class="detail-item"><strong>Campaigns</strong>' + campaigns.length + '</div>' +
          '<div class="detail-item"><strong>Value</strong>KES ' + campaigns.reduce(function(s, c) { return s + (c.totalBudget || 0); }, 0).toLocaleString() + '</div>' +
          '<div class="detail-item"><strong>Joined</strong>' + (p.createdAt ? new Date(p.createdAt).toLocaleDateString() : 'N/A') + '</div>' +
          '<div class="detail-item"><strong>Notes</strong>' + (p.notes || 'None') + '</div>' +
        '</div>' +
        (campaigns.length ? '<p style="font-weight:700;font-size:0.7rem;margin:0.8rem 0 0.5rem;">Campaigns:</p>' + 
          campaigns.slice(0, 5).map(function(c) {
            return '<div style="background:#fdf4ff;padding:0.5rem;border-radius:8px;margin-bottom:4px;font-size:0.7rem;display:flex;justify-content:space-between;"><span>' + (c.name || 'Campaign') + '</span><span>KES ' + (c.totalBudget || 0).toLocaleString() + '</span></div>';
          }).join('') : '') +
        '<div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>';
      document.getElementById('modal').classList.add('show');
    }

    function viewPartnerCampaigns(partnerId) {
      const p = allPartners[partnerId];
      if (!p) return;
      window.location.href = 'heritage-campaigns.html?search=' + encodeURIComponent(p.businessName || p.name || '');
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    document.getElementById('searchInput').addEventListener('input', function(e) {
      searchQuery = e.target.value;
      renderPartners();
    });

    document.getElementById('modal').addEventListener('click', function(e) { if (e.target === document.getElementById('modal')) closeModal(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    database.ref('heritage_partners').on('value', function(snapshot) {
      allPartners = snapshot.val() || {};
      renderPartners();
    });

    database.ref('heritage_campaigns').on('value', function(snapshot) {
      allCampaigns = snapshot.val() || {};
      renderPartners();
    });

    auth.onAuthStateChanged(function(user) { if (!user) window.location.href = '/'; });

    window.showAddModal = showAddModal;
    window.editPartner = editPartner;
    window.viewPartner = viewPartner;
    window.viewPartnerCampaigns = viewPartnerCampaigns;
    window.toggleStatus = toggleStatus;
    window.savePartner = savePartner;
    window.updatePartner = updatePartner;
    window.closeModal = closeModal;
  </script>
</body>
</html>
