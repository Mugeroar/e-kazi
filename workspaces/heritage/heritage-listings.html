<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Advert Listings | The Heritage</title>
  
  <meta name="theme-color" content="#d946ef">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --heritage: #d946ef;
      --heritage-dark: #a21caf;
      --heritage-light: #f0abfc;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #f0abfc;
      --red: #ef4444;
      --green: #10b981;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #fdf4ff 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(217, 70, 239, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(217, 70, 239, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #f0abfc, #a21caf);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #d946ef; -webkit-text-fill-color: #d946ef; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(217, 70, 239, 0.08); border: 1px solid rgba(217, 70, 239, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--heritage-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--heritage); color: white; }

    .container { padding: 1rem 2%; flex: 1; }

    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--heritage-dark); margin-right: 6px; }
    .page-header p { color: var(--text-muted); font-size: 0.75rem; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-mini {
      background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
      border: 1px solid #f0abfc; box-shadow: 0 2px 8px rgba(162,28,175,0.03);
    }
    .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--heritage-dark); line-height: 1.1; }
    .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

    .table-wrap {
      background: white; border-radius: 16px; border: 1px solid #f0abfc;
      overflow: hidden; box-shadow: 0 4px 16px rgba(162,28,175,0.03);
    }
    .table-scroll { overflow-x: auto; max-height: 60vh; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    thead { position: sticky; top: 0; z-index: 2; background: #fdf4ff; }
    th {
      padding: 0.6rem 0.7rem; text-align: left; font-weight: 700; color: #a21caf;
      font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;
    }
    td { padding: 0.5rem 0.7rem; border-bottom: 1px solid #fdf4ff; vertical-align: middle; }
    tr:hover td { background: #fdf4ff; }

    .status-badge {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px;
      font-size: 0.6rem; font-weight: 700; white-space: nowrap;
    }
    .status-active { background: #d1fae5; color: #065f46; }
    .status-expired { background: #fee2e2; color: #991b1b; }
    .status-pending { background: #fef3c7; color: #92400e; }

    .action-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .action-btn {
      padding: 0.25rem 0.5rem; border-radius: 6px; border: none; font-size: 0.6rem;
      font-weight: 600; cursor: pointer; display: inline-flex; align-items: center;
      gap: 3px; transition: all 0.15s; font-family: inherit;
    }
    .btn-edit { background: #fdf4ff; color: #a21caf; }
    .btn-edit:hover { background: #d946ef; color: white; }
    .btn-expire { background: #fee2e2; color: #991b1b; }
    .btn-expire:hover { background: #ef4444; color: white; }
    .btn-renew { background: #d1fae5; color: #065f46; }
    .btn-renew:hover { background: #10b981; color: white; }

    .empty-row td { text-align: center; padding: 2rem; color: #94a3b8; }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
      align-items: center; backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 20px; padding: 1.5rem; max-width: 500px;
      width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; color: var(--heritage-dark); }
    .form-group { margin-bottom: 0.7rem; }
    .form-group label {
      display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
      background: #f8fafc;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; font-family: inherit; transition: all 0.15s;
    }
    .btn-primary { background: var(--heritage); color: white; }
    .btn-primary:hover { background: var(--heritage-dark); }
    .btn-secondary { background: #f1f5f9; color: #475569; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--green); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(16,185,129,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="The Heritage" class="logo-img">
      <span class="logo-text">The Heritage <span>Ads</span></span>
    </a>
    <div class="nav-right">
      <a href="index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="heritage-campaigns.html" class="nav-btn"><i class="fas fa-bullhorn"></i> Campaigns</a>
      <a href="heritage-partners.html" class="nav-btn"><i class="fas fa-handshake"></i> Partners</a>
      <a href="heritage-monitoring.html" class="nav-btn"><i class="fas fa-chart-line"></i> Monitoring</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-th-large"></i> Advert Listings</h1>
      <button class="btn btn-primary" onclick="showAddModal()" style="padding:0.5rem 1rem;font-size:0.7rem;">
        <i class="fas fa-plus"></i> New Listing
      </button>
    </div>

    <div class="stats-row">
      <div class="stat-mini"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Listings</div></div>
      <div class="stat-mini"><div class="stat-num" id="statActive">0</div><div class="stat-label">Active</div></div>
      <div class="stat-mini"><div class="stat-num" id="statExpiring">0</div><div class="stat-label">Expiring Soon</div></div>
      <div class="stat-mini"><div class="stat-num" id="statRevenue">0</div><div class="stat-label">Monthly Revenue</div></div>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Partner</th>
              <th>Ad Type</th>
              <th>Location/Platform</th>
              <th>Start Date</th>
              <th>End Date</th>
              <th>Price/Mo</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr class="empty-row"><td colspan="8">Loading listings...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allListings = {};
    let allPartners = {};

    function showToast(msg, isError) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.innerHTML = '<i class="fas fa-' + (isError ? 'exclamation-circle' : 'check-circle') + '"></i> ' + msg;
      container.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 3500);
    }

    function getStatusClass(status) {
      const map = { active:'status-active', expired:'status-expired', pending:'status-pending' };
      return map[status] || 'status-active';
    }

    function isExpiringSoon(endDate) {
      if (!endDate) return false;
      const end = new Date(endDate);
      const now = new Date();
      const daysLeft = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
      return daysLeft <= 7 && daysLeft > 0;
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      let listings = Object.entries(allListings).map(function(entry) { return Object.assign({ id: entry[0] }, entry[1]); });
      
      listings.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });

      if (!listings.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="8"><i class="fas fa-th-large" style="font-size:2rem;display:block;margin-bottom:8px;"></i>No listings yet</td></tr>';
        return;
      }

      tbody.innerHTML = listings.map(function(l) {
        const status = l.status || 'active';
        if (isExpiringSoon(l.endDate) && status === 'active') l._expiring = true;
        const displayStatus = l._expiring ? 'Expiring Soon' : status;
        const statusClass = l._expiring ? 'status-pending' : getStatusClass(status);

        return '<tr>' +
          '<td><strong>' + (l.partnerName || 'N/A') + '</strong></td>' +
          '<td>' + (l.adType || 'N/A') + '</td>' +
          '<td>' + (l.location || l.platform || 'N/A') + '</td>' +
          '<td>' + (l.startDate || '—') + '</td>' +
          '<td>' + (l.endDate || '—') + '</td>' +
          '<td><strong>KES ' + (l.price || 0).toLocaleString() + '</strong></td>' +
          '<td><span class="status-badge ' + statusClass + '">' + displayStatus + '</span></td>' +
          '<td><div class="action-btns">' +
            '<button class="action-btn btn-edit" onclick="editListing(\'' + l.id + '\')"><i class="fas fa-edit"></i> Edit</button>' +
            (status === 'active' ? '<button class="action-btn btn-expire" onclick="updateStatus(\'' + l.id + '\',\'expired\')"><i class="fas fa-times"></i> End</button>' : '') +
            (status === 'expired' ? '<button class="action-btn btn-renew" onclick="updateStatus(\'' + l.id + '\',\'active\')"><i class="fas fa-redo"></i> Renew</button>' : '') +
          '</div></td>' +
        '</tr>';
      }).join('');

      updateStats();
    }

    function updateStats() {
      const listings = Object.values(allListings);
      const active = listings.filter(function(l) { return l.status === 'active' || !l.status; }).length;
      const expiring = listings.filter(function(l) { return isExpiringSoon(l.endDate) && (l.status === 'active' || !l.status); }).length;
      const revenue = listings.filter(function(l) { return l.status === 'active' || !l.status; }).reduce(function(s, l) { return s + (l.price || 0); }, 0);

      document.getElementById('statTotal').textContent = listings.length;
      document.getElementById('statActive').textContent = active;
      document.getElementById('statExpiring').textContent = expiring;
      document.getElementById('statRevenue').textContent = revenue.toLocaleString();
    }

    function showAddModal() {
      const partners = Object.values(allPartners).filter(function(p) { return p && p.status === 'active'; });
      const partnerOptions = partners.map(function(p) {
        return '<option value="' + (p.businessName || p.name || '') + '">' + (p.businessName || p.name || 'Partner') + '</option>';
      }).join('');

      document.getElementById('modalContent').innerHTML = 
        '<h3><i class="fas fa-plus-circle"></i> New Advert Listing</h3>' +
        '<div class="form-group"><label>Select Partner *</label><select id="lPartner"><option value="">— Choose partner —</option>' + partnerOptions + '</select></div>' +
        '<div class="form-group"><label>Advert Type *</label><select id="lType">' +
          '<option value="Billboard">🪧 Billboard</option>' +
          '<option value="Digital Screen">📺 Digital Screen</option>' +
          '<option value="Banner">🏴 Banner</option>' +
          '<option value="Instagram Ads">📱 Instagram Ads</option>' +
          '<option value="Facebook Ads">👍 Facebook Ads</option>' +
          '<option value="TikTok Ads">🎵 TikTok Ads</option>' +
          '<option value="Google Ads">🔍 Google Ads</option>' +
          '<option value="WhatsApp Ads">💬 WhatsApp Ads</option>' +
          '<option value="Other">📢 Other</option>' +
        '</select></div>' +
        '<div class="form-group"><label>Location / Platform</label><input type="text" id="lLocation" placeholder="e.g., Moi Avenue or @handle"></div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Start Date *</label><input type="date" id="lStartDate"></div>' +
          '<div class="form-group"><label>End Date *</label><input type="date" id="lEndDate"></div>' +
        '</div>' +
        '<div class="form-group"><label>Price per Month (KES) *</label><input type="number" id="lPrice" value="0" min="0"></div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-primary" onclick="saveListing()"><i class="fas fa-save"></i> Save Listing</button>' +
          '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
        '</div>';
      document.getElementById('modal').classList.add('show');
    }

    async function saveListing() {
      const partner = document.getElementById('lPartner').value;
      const startDate = document.getElementById('lStartDate').value;
      const endDate = document.getElementById('lEndDate').value;
      const price = parseInt(document.getElementById('lPrice').value) || 0;
      if (!partner) { showToast('Select a partner', true); return; }
      if (!startDate || !endDate) { showToast('Select dates', true); return; }

      try {
        await database.ref('heritage_listings').push().set({
          partnerName: partner,
          adType: document.getElementById('lType').value,
          location: document.getElementById('lLocation').value.trim(),
          startDate: startDate,
          endDate: endDate,
          price: price,
          status: 'active',
          createdAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('Listing added!');
        closeModal();
      } catch (e) { showToast('Failed to save', true); }
    }

    function editListing(listingId) {
      const l = allListings[listingId];
      if (!l) return;
      const partners = Object.values(allPartners).filter(function(p) { return p && p.status === 'active'; });
      const partnerOptions = partners.map(function(p) {
        const name = p.businessName || p.name || '';
        return '<option value="' + name + '" ' + (l.partnerName === name ? 'selected' : '') + '>' + name + '</option>';
      }).join('');

      document.getElementById('modalContent').innerHTML = 
        '<h3><i class="fas fa-edit"></i> Edit Listing</h3>' +
        '<div class="form-group"><label>Partner</label><select id="elPartner"><option value="">— Choose —</option>' + partnerOptions + '</select></div>' +
        '<div class="form-group"><label>Advert Type</label><select id="elType">' +
          ['Billboard','Digital Screen','Banner','Instagram Ads','Facebook Ads','TikTok Ads','Google Ads','WhatsApp Ads','Other'].map(function(t) { return '<option value="' + t + '" ' + (l.adType === t ? 'selected' : '') + '>' + t + '</option>'; }).join('') +
        '</select></div>' +
        '<div class="form-group"><label>Location / Platform</label><input type="text" id="elLocation" value="' + (l.location || l.platform || '') + '"></div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Start Date</label><input type="date" id="elStartDate" value="' + (l.startDate || '') + '"></div>' +
          '<div class="form-group"><label>End Date</label><input type="date" id="elEndDate" value="' + (l.endDate || '') + '"></div>' +
        '</div>' +
        '<div class="form-group"><label>Price/Month (KES)</label><input type="number" id="elPrice" value="' + (l.price || 0) + '"></div>' +
        '<div class="form-group"><label>Status</label><select id="elStatus">' +
          '<option value="active" ' + (l.status === 'active' ? 'selected' : '') + '>Active</option>' +
          '<option value="expired" ' + (l.status === 'expired' ? 'selected' : '') + '>Expired</option>' +
        '</select></div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-primary" onclick="updateListing(\'' + listingId + '\')"><i class="fas fa-save"></i> Update</button>' +
          '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
        '</div>';
      document.getElementById('modal').classList.add('show');
    }

    async function updateListing(listingId) {
      try {
        await database.ref('heritage_listings/' + listingId).update({
          partnerName: document.getElementById('elPartner').value,
          adType: document.getElementById('elType').value,
          location: document.getElementById('elLocation').value.trim(),
          startDate: document.getElementById('elStartDate').value,
          endDate: document.getElementById('elEndDate').value,
          price: parseInt(document.getElementById('elPrice').value) || 0,
          status: document.getElementById('elStatus').value,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('Updated!');
        closeModal();
      } catch (e) { showToast('Failed to update', true); }
    }

    async function updateStatus(listingId, newStatus) {
      if (!confirm(newStatus === 'expired' ? 'End this listing?' : 'Renew this listing?')) return;
      try {
        await database.ref('heritage_listings/' + listingId).update({ status: newStatus, updatedAt: firebase.database.ServerValue.TIMESTAMP });
        showToast('Listing ' + newStatus + '!');
      } catch (e) { showToast('Failed to update', true); }
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    document.getElementById('modal').addEventListener('click', function(e) { if (e.target === document.getElementById('modal')) closeModal(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    database.ref('heritage_listings').on('value', function(snapshot) {
      allListings = snapshot.val() || {};
      renderTable();
    });

    database.ref('heritage_partners').on('value', function(snapshot) {
      allPartners = snapshot.val() || {};
    });

    auth.onAuthStateChanged(function(user) { if (!user) window.location.href = '/'; });

    window.showAddModal = showAddModal;
    window.editListing = editListing;
    window.saveListing = saveListing;
    window.updateListing = updateListing;
    window.updateStatus = updateStatus;
    window.closeModal = closeModal;
  </script>
</body>
</html>
