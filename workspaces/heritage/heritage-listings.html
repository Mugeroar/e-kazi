<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Advert Listings | The Heritage</title>
  
  <meta name="theme-color" content="#d946ef">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --heritage: #d946ef;
      --heritage-dark: #a21caf;
      --heritage-light: #f0abfc;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #f0abfc;
      --red: #ef4444;
      --green: #10b981;
      --orange: #f59e0b;
      --blue: #3b82f6;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #fdf4ff 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(217, 70, 239, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(217, 70, 239, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #f0abfc, #a21caf);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #d946ef; -webkit-text-fill-color: #d946ef; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(217, 70, 239, 0.08); border: 1px solid rgba(217, 70, 239, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--heritage-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--heritage); color: white; }
    .nav-btn.map-btn { background: var(--heritage); color: white; border-color: var(--heritage-dark); }

    .container { padding: 1rem 2%; flex: 1; }

    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--heritage-dark); margin-right: 6px; }
    .page-header p { color: var(--text-muted); font-size: 0.75rem; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-mini {
      background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
      border: 1px solid #f0abfc; box-shadow: 0 2px 8px rgba(162,28,175,0.03);
    }
    .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--heritage-dark); line-height: 1.1; }
    .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    .filter-btn {
      padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0;
      background: white; color: #64748b; font-weight: 600; font-size: 0.65rem;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--heritage); color: var(--heritage-dark); }
    .filter-btn.active { background: var(--heritage); color: white; border-color: var(--heritage); }
    .search-box { flex: 1; min-width: 150px; max-width: 300px; position: relative; }
    .search-box input {
      width: 100%; padding: 0.35rem 0.8rem 0.35rem 2rem; border-radius: 20px;
      border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif;
    }
    .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.7rem; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }

    .listing-card {
      background: white; border-radius: 16px; padding: 1.2rem;
      border: 1px solid #f0abfc; box-shadow: 0 3px 12px rgba(162,28,175,0.03);
      transition: all 0.2s;
    }
    .listing-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(162,28,175,0.08); }
    .listing-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
    .listing-card-header h3 { font-size: 0.95rem; font-weight: 700; }
    .listing-badge {
      padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.6rem; font-weight: 700;
    }
    .badge-available { background: #d1fae5; color: #065f46; }
    .badge-occupied { background: #fce7f3; color: #9d174d; }
    .badge-maintenance { background: #fee2e2; color: #991b1b; }
    .badge-reserved { background: #fef3c7; color: #92400e; }

    .listing-info { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.7rem; margin-bottom: 0.8rem; }
    .listing-info div { color: var(--text-muted); }
    .listing-info strong { color: var(--text-primary); display: block; font-size: 0.6rem; text-transform: uppercase; }

    .listing-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-sm {
      padding: 0.3rem 0.7rem; border-radius: 8px; border: none; font-weight: 600;
      font-size: 0.65rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 4px; transition: all 0.15s; font-family: inherit;
    }
    .btn-edit { background: #fdf4ff; color: #a21caf; }
    .btn-edit:hover { background: #d946ef; color: white; }
    .btn-book { background: #dbeafe; color: #1e40af; }
    .btn-book:hover { background: #3b82f6; color: white; }
    .btn-delete { background: #fee2e2; color: #991b1b; }
    .btn-delete:hover { background: #ef4444; color: white; }

    .empty-state { text-align: center; padding: 3rem; color: #94a3b8; grid-column: 1 / -1; }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
      align-items: center; backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 20px; padding: 1.5rem; max-width: 550px;
      width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; color: var(--heritage-dark); }
    .form-group { margin-bottom: 0.7rem; }
    .form-group label {
      display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
      background: #f8fafc;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; font-family: inherit; transition: all 0.15s;
    }
    .btn-primary { background: var(--heritage); color: white; }
    .btn-primary:hover { background: var(--heritage-dark); }
    .btn-secondary { background: #f1f5f9; color: #475569; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--green); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(16,185,129,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="heritage-dashboard.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="The Heritage" class="logo-img">
      <span class="logo-text">The Heritage <span>Ads</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/brandinn/map.html" class="nav-btn map-btn"><i class="fas fa-map-marked-alt"></i> Operations Map</a>
      <a href="heritage-dashboard.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="heritage-campaigns.html" class="nav-btn"><i class="fas fa-bullhorn"></i> Campaigns</a>
      <a href="heritage-partners.html" class="nav-btn"><i class="fas fa-handshake"></i> Partners</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-th-large"></i> Advert Listings</h1>
      <button class="btn btn-primary" onclick="showAddModal()" style="padding:0.5rem 1rem;font-size:0.7rem;">
        <i class="fas fa-plus"></i> Add Listing
      </button>
    </div>

    <div class="stats-row">
      <div class="stat-mini"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Spaces</div></div>
      <div class="stat-mini"><div class="stat-num" id="statAvailable">0</div><div class="stat-label">Available</div></div>
      <div class="stat-mini"><div class="stat-num" id="statOccupied">0</div><div class="stat-label">Occupied</div></div>
      <div class="stat-mini"><div class="stat-num" id="statRevenue">0</div><div class="stat-label">Potential Revenue/mo</div></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="available">Available</button>
      <button class="filter-btn" data-filter="occupied">Occupied</button>
      <button class="filter-btn" data-filter="reserved">Reserved</button>
      <button class="filter-btn" data-filter="maintenance">Maintenance</button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search by name, location, type...">
      </div>
    </div>

    <div class="cards-grid" id="listingsGrid">
      <div class="empty-state">Loading listings...</div>
    </div>
  </div>

  <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allListings = {};
    let currentFilter = 'all';
    let searchQuery = '';

    function showToast(msg, isError) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.innerHTML = '<i class="fas fa-' + (isError ? 'exclamation-circle' : 'check-circle') + '"></i> ' + msg;
      container.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 3500);
    }

    function getListingIcon(type) {
      const t = (type || '').toLowerCase();
      if (t.includes('billboard')) return '🪧';
      if (t.includes('screen') || t.includes('digital')) return '📺';
      if (t.includes('banner')) return '🏴';
      if (t.includes('social') || t.includes('instagram') || t.includes('facebook')) return '📱';
      if (t.includes('google')) return '🔍';
      return '📢';
    }

    function getBadgeClass(status) {
      const map = { available:'badge-available', occupied:'badge-occupied', maintenance:'badge-maintenance', reserved:'badge-reserved' };
      return map[status] || 'badge-available';
    }

    function renderListings() {
      const grid = document.getElementById('listingsGrid');
      let listings = Object.entries(allListings).map(function(entry) { return Object.assign({ id: entry[0] }, entry[1]); });

      if (currentFilter !== 'all') {
        listings = listings.filter(function(l) { return (l.status || 'available') === currentFilter; });
      }
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        listings = listings.filter(function(l) {
          return (l.name || '').toLowerCase().indexOf(q) !== -1 ||
                 (l.location || '').toLowerCase().indexOf(q) !== -1 ||
                 (l.type || '').toLowerCase().indexOf(q) !== -1;
        });
      }

      if (!listings.length) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-th-large" style="font-size:2rem;display:block;margin-bottom:8px;"></i>No listings found</div>';
        return;
      }

      grid.innerHTML = listings.map(function(l) {
        const status = l.status || 'available';
        const icon = getListingIcon(l.type);
        const occupiedBy = l.occupiedBy || l.clientName || '';
        
        return '<div class="listing-card">' +
          '<div class="listing-card-header">' +
            '<h3>' + icon + ' ' + (l.name || 'Ad Space') + '</h3>' +
            '<span class="listing-badge ' + getBadgeClass(status) + '">' + status.toUpperCase() + '</span>' +
          '</div>' +
          '<div class="listing-info">' +
            '<div><strong>Type</strong>' + (l.type || 'N/A') + '</div>' +
            '<div><strong>Location</strong>' + (l.location || 'N/A') + '</div>' +
            '<div><strong>Size</strong>' + (l.size || l.dimensions || 'N/A') + '</div>' +
            '<div><strong>Price/Month</strong>KES ' + (l.price || 0).toLocaleString() + '</div>' +
            '<div><strong>Status</strong>' + status + '</div>' +
            '<div><strong>Occupied By</strong>' + (occupiedBy || '—') + '</div>' +
            (l.startDate ? '<div><strong>From</strong>' + l.startDate + '</div>' : '') +
            (l.endDate ? '<div><strong>Until</strong>' + l.endDate + '</div>' : '') +
            (l.notes ? '<div style="grid-column:1/-1;"><strong>Notes</strong>' + l.notes + '</div>' : '') +
          '</div>' +
          '<div class="listing-actions">' +
            '<button class="btn-sm btn-edit" onclick="editListing(\'' + l.id + '\')"><i class="fas fa-edit"></i> Edit</button>' +
            (status === 'available' ? '<button class="btn-sm btn-book" onclick="bookListing(\'' + l.id + '\')"><i class="fas fa-calendar-check"></i> Book</button>' : '') +
            '<button class="btn-sm btn-delete" onclick="deleteListing(\'' + l.id + '\')"><i class="fas fa-trash"></i> Delete</button>' +
          '</div>' +
        '</div>';
      }).join('');

      updateStats();
    }

    function updateStats() {
      const listings = Object.values(allListings);
      const available = listings.filter(function(l) { return l.status === 'available' || !l.status; }).length;
      const occupied = listings.filter(function(l) { return l.status === 'occupied'; }).length;
      const revenue = listings.reduce(function(s, l) { return s + (l.price || 0); }, 0);

      document.getElementById('statTotal').textContent = listings.length;
      document.getElementById('statAvailable').textContent = available;
      document.getElementById('statOccupied').textContent = occupied;
      document.getElementById('statRevenue').textContent = revenue.toLocaleString();
    }

    function showAddModal() {
      document.getElementById('modalContent').innerHTML = 
        '<h3><i class="fas fa-plus-circle"></i> Add Ad Space</h3>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Listing Name *</label><input type="text" id="lName" placeholder="e.g., Moi Ave Billboard"></div>' +
          '<div class="form-group"><label>Type *</label><select id="lType">' +
            '<option value="Billboard">🪧 Billboard</option>' +
            '<option value="Digital Screen">📺 Digital Screen</option>' +
            '<option value="Banner">🏴 Banner</option>' +
            '<option value="Social Media Slot">📱 Social Media Slot</option>' +
            '<option value="Google Ad Slot">🔍 Google Ad Slot</option>' +
            '<option value="WhatsApp Ad">💬 WhatsApp Ad</option>' +
            '<option value="Other">📢 Other</option>' +
          '</select></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Location *</label><input type="text" id="lLocation" placeholder="e.g., Moi Avenue, Nairobi"></div>' +
          '<div class="form-group"><label>Size/Dimensions</label><input type="text" id="lSize" placeholder="e.g., 12ft × 6ft"></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Price per Month (KES) *</label><input type="number" id="lPrice" value="0" min="0"></div>' +
          '<div class="form-group"><label>Status</label><select id="lStatus">' +
            '<option value="available">Available</option>' +
            '<option value="occupied">Occupied</option>' +
            '<option value="reserved">Reserved</option>' +
            '<option value="maintenance">Maintenance</option>' +
          '</select></div>' +
        '</div>' +
        '<div class="form-group"><label>Notes</label><textarea id="lNotes" rows="2" placeholder="Any additional info..."></textarea></div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-primary" onclick="saveListing()"><i class="fas fa-save"></i> Save Listing</button>' +
          '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
        '</div>';
      document.getElementById('modal').classList.add('show');
    }

    async function saveListing() {
      const name = document.getElementById('lName').value.trim();
      const location = document.getElementById('lLocation').value.trim();
      const price = parseInt(document.getElementById('lPrice').value) || 0;
      if (!name || !location) { showToast('Fill required fields', true); return; }

      try {
        await database.ref('heritage_listings').push().set({
          name: name,
          type: document.getElementById('lType').value,
          location: location,
          size: document.getElementById('lSize').value.trim(),
          price: price,
          status: document.getElementById('lStatus').value,
          notes: document.getElementById('lNotes').value.trim(),
          createdAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('Listing added!');
        closeModal();
      } catch (e) { showToast('Failed to save', true); }
    }

    function editListing(listingId) {
      const l = allListings[listingId];
      if (!l) return;
      document.getElementById('modalContent').innerHTML = 
        '<h3><i class="fas fa-edit"></i> Edit Listing</h3>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Name</label><input type="text" id="elName" value="' + (l.name || '') + '"></div>' +
          '<div class="form-group"><label>Type</label><select id="elType">' +
            ['Billboard','Digital Screen','Banner','Social Media Slot','Google Ad Slot','WhatsApp Ad','Other'].map(function(t) { return '<option value="' + t + '" ' + (l.type === t ? 'selected' : '') + '>' + t + '</option>'; }).join('') +
          '</select></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Location</label><input type="text" id="elLocation" value="' + (l.location || '') + '"></div>' +
          '<div class="form-group"><label>Size</label><input type="text" id="elSize" value="' + (l.size || l.dimensions || '') + '"></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Price/Month (KES)</label><input type="number" id="elPrice" value="' + (l.price || 0) + '"></div>' +
          '<div class="form-group"><label>Status</label><select id="elStatus">' +
            ['available','occupied','reserved','maintenance'].map(function(s) { return '<option value="' + s + '" ' + (l.status === s ? 'selected' : '') + '>' + s + '</option>'; }).join('') +
          '</select></div>' +
        '</div>' +
        '<div class="form-group"><label>Occupied By (Client)</label><input type="text" id="elOccupiedBy" value="' + (l.occupiedBy || l.clientName || '') + '"></div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Start Date</label><input type="date" id="elStartDate" value="' + (l.startDate || '') + '"></div>' +
          '<div class="form-group"><label>End Date</label><input type="date" id="elEndDate" value="' + (l.endDate || '') + '"></div>' +
        '</div>' +
        '<div class="form-group"><label>Notes</label><textarea id="elNotes" rows="2">' + (l.notes || '') + '</textarea></div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-primary" onclick="updateListing(\'' + listingId + '\')"><i class="fas fa-save"></i> Update</button>' +
          '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
        '</div>';
      document.getElementById('modal').classList.add('show');
    }

    async function updateListing(listingId) {
      try {
        await database.ref('heritage_listings/' + listingId).update({
          name: document.getElementById('elName').value.trim(),
          type: document.getElementById('elType').value,
          location: document.getElementById('elLocation').value.trim(),
          size: document.getElementById('elSize').value.trim(),
          price: parseInt(document.getElementById('elPrice').value) || 0,
          status: document.getElementById('elStatus').value,
          occupiedBy: document.getElementById('elOccupiedBy').value.trim(),
          startDate: document.getElementById('elStartDate').value,
          endDate: document.getElementById('elEndDate').value,
          notes: document.getElementById('elNotes').value.trim(),
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('Updated!');
        closeModal();
      } catch (e) { showToast('Failed to update', true); }
    }

    function bookListing(listingId) {
      const l = allListings[listingId];
      if (!l) return;
      document.getElementById('modalContent').innerHTML = 
        '<h3><i class="fas fa-calendar-check"></i> Book: ' + (l.name || 'Ad Space') + '</h3>' +
        '<div class="form-group"><label>Client Name *</label><input type="text" id="bClient" placeholder="Business name"></div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Start Date *</label><input type="date" id="bStartDate"></div>' +
          '<div class="form-group"><label>End Date *</label><input type="date" id="bEndDate"></div>' +
        '</div>' +
        '<div class="form-group"><label>Agreed Price (KES)</label><input type="number" id="bPrice" value="' + (l.price || 0) + '"></div>' +
        '<div class="form-group"><label>Notes</label><textarea id="bNotes" rows="2"></textarea></div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-primary" onclick="confirmBooking(\'' + listingId + '\')"><i class="fas fa-check"></i> Confirm Booking</button>' +
          '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
        '</div>';
      document.getElementById('modal').classList.add('show');
    }

    async function confirmBooking(listingId) {
      const client = document.getElementById('bClient').value.trim();
      const startDate = document.getElementById('bStartDate').value;
      const endDate = document.getElementById('bEndDate').value;
      if (!client || !startDate || !endDate) { showToast('Fill required fields', true); return; }

      try {
        await database.ref('heritage_listings/' + listingId).update({
          status: 'occupied',
          occupiedBy: client,
          startDate: startDate,
          endDate: endDate,
          price: parseInt(document.getElementById('bPrice').value) || 0,
          notes: document.getElementById('bNotes').value.trim(),
          bookedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('Booking confirmed!');
        closeModal();
      } catch (e) { showToast('Failed to book', true); }
    }

    async function deleteListing(listingId) {
      if (!confirm('Delete this listing?')) return;
      try {
        await database.ref('heritage_listings/' + listingId).remove();
        showToast('Deleted');
      } catch (e) { showToast('Failed to delete', true); }
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    // Filters
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderListings();
      });
    });

    document.getElementById('searchInput').addEventListener('input', function(e) {
      searchQuery = e.target.value;
      renderListings();
    });

    document.getElementById('modal').addEventListener('click', function(e) { if (e.target === document.getElementById('modal')) closeModal(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    // Firebase listener
    database.ref('heritage_listings').on('value', function(snapshot) {
      allListings = snapshot.val() || {};
      renderListings();
    });

    auth.onAuthStateChanged(function(user) { if (!user) window.location.href = '/'; });

    window.showAddModal = showAddModal;
    window.editListing = editListing;
    window.bookListing = bookListing;
    window.deleteListing = deleteListing;
    window.saveListing = saveListing;
    window.updateListing = updateListing;
    window.confirmBooking = confirmBooking;
    window.closeModal = closeModal;
  </script>
</body>
</html>
