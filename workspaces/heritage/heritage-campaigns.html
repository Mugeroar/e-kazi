<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Campaigns | The Heritage</title>
  
  <meta name="theme-color" content="#d946ef">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --heritage: #d946ef; --heritage-dark: #a21caf; --text-primary: #1e293b; --text-muted: #64748b; --border-light: #f0abfc; --red: #ef4444; --green: #10b981; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #fdf4ff 0%, #ffffff 100%); color: var(--text-primary); line-height: 1.4; min-height: 100vh; display: flex; flex-direction: column; }
    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(16px); padding: 0.5rem 2%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(217,70,239,0.2); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 8px; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(217,70,239,0.2); }
    .logo-text { font-weight: 800; font-size: 1.1rem; background: linear-gradient(145deg, #f0abfc, #a21caf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #d946ef; -webkit-text-fill-color: #d946ef; margin-left: 3px; }
    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn { background: rgba(217,70,239,0.08); border: 1px solid rgba(217,70,239,0.2); padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--heritage-dark); font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s; }
    .nav-btn:hover { background: var(--heritage); color: white; }
    .nav-btn.active { background: var(--heritage); color: white; }
    .container { padding: 1rem 2%; flex: 1; }
    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--heritage-dark); margin-right: 6px; }
    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-mini { background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center; border: 1px solid #f0abfc; }
    .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--heritage-dark); }
    .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    .filter-btn { padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0; background: white; color: #64748b; font-weight: 600; font-size: 0.65rem; cursor: pointer; font-family: inherit; }
    .filter-btn:hover { border-color: var(--heritage); color: var(--heritage-dark); }
    .filter-btn.active { background: var(--heritage); color: white; border-color: var(--heritage); }
    .search-box { flex: 1; min-width: 150px; max-width: 300px; position: relative; }
    .search-box input { width: 100%; padding: 0.35rem 0.8rem 0.35rem 2rem; border-radius: 20px; border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif; }
    .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
    .table-wrap { background: white; border-radius: 16px; border: 1px solid #f0abfc; overflow: hidden; }
    .table-scroll { overflow-x: auto; max-height: 60vh; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    thead { position: sticky; top: 0; z-index: 2; background: #fdf4ff; }
    th { padding: 0.6rem 0.7rem; text-align: left; font-weight: 700; color: #a21caf; font-size: 0.6rem; text-transform: uppercase; white-space: nowrap; }
    td { padding: 0.5rem 0.7rem; border-bottom: 1px solid #fdf4ff; vertical-align: middle; }
    tr:hover td { background: #fdf4ff; }
    .status-badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.6rem; font-weight: 700; white-space: nowrap; }
    .status-active { background: #d1fae5; color: #065f46; }
    .status-draft { background: #fdf4ff; color: #a21caf; }
    .status-completed { background: #f1f5f9; color: #475569; }
    .status-paused { background: #fee2e2; color: #991b1b; }
    .action-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .action-btn { padding: 0.25rem 0.5rem; border-radius: 6px; border: none; font-size: 0.6rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 3px; font-family: inherit; }
    .btn-edit { background: #fdf4ff; color: #a21caf; }
    .btn-edit:hover { background: #d946ef; color: white; }
    .btn-activate { background: #d1fae5; color: #065f46; }
    .btn-activate:hover { background: #10b981; color: white; }
    .btn-pause { background: #fef3c7; color: #92400e; }
    .btn-pause:hover { background: #f59e0b; color: white; }
    .btn-complete { background: #dbeafe; color: #1e40af; }
    .btn-complete:hover { background: #3b82f6; color: white; }
    .empty-row td { text-align: center; padding: 2rem; color: #94a3b8; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: white; border-radius: 20px; padding: 1.5rem; max-width: 500px; width: 95%; max-height: 85vh; overflow-y: auto; }
    .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; color: var(--heritage-dark); }
    .form-group { margin-bottom: 0.7rem; }
    .form-group label { display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.15rem; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px; border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif; background: #f8fafc; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 10px; border: none; font-weight: 700; font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; font-family: inherit; }
    .btn-primary { background: var(--heritage); color: white; }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .toast { position: fixed; bottom: 25px; right: 25px; background: var(--green); color: white; padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000; animation: slideIn 0.3s ease; font-size: 0.75rem; }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/workspaces/heritage/index.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="The Heritage" class="logo-img">
      <span class="logo-text">The Heritage <span>Ads</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/heritage/index.html" class="nav-btn"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a href="/workspaces/heritage/heritage-listings.html" class="nav-btn"><i class="fas fa-th-large"></i> Listings</a>
      <a href="/workspaces/heritage/heritage-campaigns.html" class="nav-btn active"><i class="fas fa-bullhorn"></i> Campaigns</a>
      <a href="/workspaces/heritage/heritage-monitoring.html" class="nav-btn"><i class="fas fa-chart-line"></i> Monitoring</a>
      <a href="/workspaces/heritage/heritage-partners.html" class="nav-btn"><i class="fas fa-handshake"></i> Partners</a>
      <a href="/workspaces/brandinn/map.html" class="nav-btn"><i class="fas fa-map-marked-alt"></i> Map</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-bullhorn"></i> Ad Campaigns</h1>
      <button class="btn btn-primary" onclick="showAddModal()" style="padding:0.5rem 1rem;font-size:0.7rem;">
        <i class="fas fa-plus"></i> New Campaign
      </button>
    </div>

    <div class="stats-row">
      <div class="stat-mini"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Campaigns</div></div>
      <div class="stat-mini"><div class="stat-num" id="statActive">0</div><div class="stat-label">Active</div></div>
      <div class="stat-mini"><div class="stat-num" id="statDraft">0</div><div class="stat-label">Draft</div></div>
      <div class="stat-mini"><div class="stat-num" id="statBudget">0</div><div class="stat-label">Total Budget (KES)</div></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="draft">Draft</button>
      <button class="filter-btn" data-filter="paused">Paused</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search campaigns...">
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Campaign Name</th>
              <th>Partner</th>
              <th>Type</th>
              <th>Budget</th>
              <th>Start</th>
              <th>End</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr class="empty-row"><td colspan="8">Loading campaigns...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allCampaigns = {}, allPartners = {};
    let currentFilter = 'all', searchQuery = '';

    // URL params
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('action') === 'new') { setTimeout(showAddModal, 500); }
    if (urlParams.get('search')) { searchQuery = urlParams.get('search'); document.getElementById('searchInput').value = searchQuery; }

    function showToast(msg, isError) {
      const c = document.getElementById('toastContainer');
      const existing = c.querySelector('.toast');
      if (existing) existing.remove();
      const t = document.createElement('div');
      t.className = 'toast' + (isError ? ' error' : '');
      t.innerHTML = '<i class="fas fa-' + (isError ? 'exclamation-circle' : 'check-circle') + '"></i> ' + msg;
      c.appendChild(t); setTimeout(function() { t.remove(); }, 3500);
    }

    function getStatusClass(status) {
      const map = { active:'status-active', draft:'status-draft', completed:'status-completed', paused:'status-paused' };
      return map[status] || 'status-draft';
    }

    function getPartnerOptions(selected) {
      return Object.values(allPartners).filter(p => p && p.status === 'active').map(p => {
        const name = p.businessName || p.name || '';
        return '<option value="' + name + '" ' + (selected === name ? 'selected' : '') + '>' + name + '</option>';
      }).join('');
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      let campaigns = Object.entries(allCampaigns).map(e => Object.assign({ id: e[0] }, e[1]));

      if (currentFilter !== 'all') {
        campaigns = campaigns.filter(c => (c.status || 'draft') === currentFilter);
      }
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        campaigns = campaigns.filter(c => (c.name || '').toLowerCase().indexOf(q) !== -1 || (c.clientName || '').toLowerCase().indexOf(q) !== -1);
      }

      campaigns.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active');
        if (b.dataset.filter === currentFilter) b.classList.add('active');
      });

      if (!campaigns.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="8"><i class="fas fa-bullhorn" style="font-size:2rem;display:block;margin-bottom:8px;"></i>No campaigns found</td></tr>';
        return;
      }

      tbody.innerHTML = campaigns.map(c => {
        const status = c.status || 'draft';
        return '<tr>' +
          '<td><strong>' + (c.name || 'Campaign') + '</strong></td>' +
          '<td>' + (c.clientName || 'N/A') + '</td>' +
          '<td>' + (c.campaignType || 'N/A') + '</td>' +
          '<td><strong>KES ' + (c.totalBudget || 0).toLocaleString() + '</strong></td>' +
          '<td>' + (c.startDate || '—') + '</td>' +
          '<td>' + (c.endDate || '—') + '</td>' +
          '<td><span class="status-badge ' + getStatusClass(status) + '">' + status + '</span></td>' +
          '<td><div class="action-btns">' +
            '<button class="action-btn btn-edit" onclick="editCampaign(\'' + c.id + '\')"><i class="fas fa-edit"></i></button>' +
            (status === 'draft' ? '<button class="action-btn btn-activate" onclick="updateStatus(\'' + c.id + '\',\'active\')"><i class="fas fa-play"></i> Activate</button>' : '') +
            (status === 'active' ? '<button class="action-btn btn-pause" onclick="updateStatus(\'' + c.id + '\',\'paused\')"><i class="fas fa-pause"></i> Pause</button>' : '') +
            (status === 'paused' ? '<button class="action-btn btn-activate" onclick="updateStatus(\'' + c.id + '\',\'active\')"><i class="fas fa-play"></i> Resume</button>' : '') +
            (status === 'active' || status === 'paused' ? '<button class="action-btn btn-complete" onclick="updateStatus(\'' + c.id + '\',\'completed\')"><i class="fas fa-check"></i> Complete</button>' : '') +
          '</div></td>' +
        '</tr>';
      }).join('');

      updateStats();
    }

    function updateStats() {
      const campaigns = Object.values(allCampaigns);
      document.getElementById('statTotal').textContent = campaigns.length;
      document.getElementById('statActive').textContent = campaigns.filter(c => c.status === 'active').length;
      document.getElementById('statDraft').textContent = campaigns.filter(c => c.status === 'draft').length;
      document.getElementById('statBudget').textContent = campaigns.reduce((s, c) => s + (c.totalBudget || 0), 0).toLocaleString();
    }

    function showAddModal() {
      document.getElementById('modalContent').innerHTML = 
        '<h3><i class="fas fa-plus-circle"></i> New Campaign</h3>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Campaign Name *</label><input type="text" id="cName" placeholder="e.g., Holiday Sale"></div>' +
          '<div class="form-group"><label>Partner *</label><select id="cPartner"><option value="">— Select partner —</option>' + getPartnerOptions('') + '</select></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Campaign Type</label><select id="cType">' +
            '<option value="Brand Awareness">Brand Awareness</option><option value="Product Launch">Product Launch</option>' +
            '<option value="Sales Promotion">Sales Promotion</option><option value="Event">Event Promotion</option>' +
            '<option value="Seasonal">Seasonal</option></select></div>' +
          '<div class="form-group"><label>Total Budget (KES)</label><input type="number" id="cBudget" value="0" min="0"></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Start Date</label><input type="date" id="cStartDate"></div>' +
          '<div class="form-group"><label>End Date</label><input type="date" id="cEndDate"></div>' +
        '</div>' +
        '<div class="form-group"><label>Notes</label><textarea id="cNotes" rows="2"></textarea></div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-primary" onclick="saveCampaign()"><i class="fas fa-save"></i> Save Campaign</button>' +
          '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
        '</div>';
      document.getElementById('modal').classList.add('show');
    }

    async function saveCampaign() {
      const name = document.getElementById('cName').value.trim();
      const partner = document.getElementById('cPartner').value;
      if (!name) { showToast('Enter campaign name', true); return; }
      if (!partner) { showToast('Select a partner', true); return; }

      try {
        await database.ref('heritage_campaigns').push().set({
          name: name, clientName: partner,
          campaignType: document.getElementById('cType').value,
          totalBudget: parseInt(document.getElementById('cBudget').value) || 0,
          startDate: document.getElementById('cStartDate').value,
          endDate: document.getElementById('cEndDate').value,
          notes: document.getElementById('cNotes').value.trim(),
          status: 'draft', createdAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('Campaign created!'); closeModal();
      } catch (e) { showToast('Failed to save', true); }
    }

    function editCampaign(campaignId) {
      const c = allCampaigns[campaignId];
      if (!c) return;
      document.getElementById('modalContent').innerHTML = 
        '<h3><i class="fas fa-edit"></i> Edit Campaign</h3>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Campaign Name</label><input type="text" id="ecName" value="' + (c.name || '') + '"></div>' +
          '<div class="form-group"><label>Partner</label><select id="ecPartner">' + getPartnerOptions(c.clientName || '') + '</select></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Campaign Type</label><select id="ecType">' +
            ['Brand Awareness','Product Launch','Sales Promotion','Event','Seasonal'].map(t => '<option value="' + t + '" ' + (c.campaignType === t ? 'selected' : '') + '>' + t + '</option>').join('') +
          '</select></div>' +
          '<div class="form-group"><label>Total Budget (KES)</label><input type="number" id="ecBudget" value="' + (c.totalBudget || 0) + '"></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Start Date</label><input type="date" id="ecStartDate" value="' + (c.startDate || '') + '"></div>' +
          '<div class="form-group"><label>End Date</label><input type="date" id="ecEndDate" value="' + (c.endDate || '') + '"></div>' +
        '</div>' +
        '<div class="form-group"><label>Status</label><select id="ecStatus">' +
          ['draft','active','paused','completed'].map(s => '<option value="' + s + '" ' + (c.status === s ? 'selected' : '') + '>' + s + '</option>').join('') +
        '</select></div>' +
        '<div class="form-group"><label>Notes</label><textarea id="ecNotes" rows="2">' + (c.notes || '') + '</textarea></div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-primary" onclick="updateCampaign(\'' + campaignId + '\')"><i class="fas fa-save"></i> Update</button>' +
          '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
        '</div>';
      document.getElementById('modal').classList.add('show');
    }

    async function updateCampaign(campaignId) {
      try {
        await database.ref('heritage_campaigns/' + campaignId).update({
          name: document.getElementById('ecName').value.trim(),
          clientName: document.getElementById('ecPartner').value,
          campaignType: document.getElementById('ecType').value,
          totalBudget: parseInt(document.getElementById('ecBudget').value) || 0,
          startDate: document.getElementById('ecStartDate').value,
          endDate: document.getElementById('ecEndDate').value,
          status: document.getElementById('ecStatus').value,
          notes: document.getElementById('ecNotes').value.trim(),
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('Updated!'); closeModal();
      } catch (e) { showToast('Failed to update', true); }
    }

    async function updateStatus(campaignId, newStatus) {
      if (!confirm('Update campaign to "' + newStatus + '"?')) return;
      try {
        await database.ref('heritage_campaigns/' + campaignId).update({ status: newStatus, updatedAt: firebase.database.ServerValue.TIMESTAMP });
        showToast('Campaign ' + newStatus + '!');
      } catch (e) { showToast('Failed to update', true); }
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        currentFilter = this.dataset.filter;
        renderTable();
      });
    });

    document.getElementById('searchInput').addEventListener('input', function(e) { searchQuery = e.target.value; renderTable(); });
    document.getElementById('modal').addEventListener('click', function(e) { if (e.target === document.getElementById('modal')) closeModal(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    database.ref('heritage_campaigns').on('value', s => { allCampaigns = s.val() || {}; renderTable(); });
    database.ref('heritage_partners').on('value', s => { allPartners = s.val() || {}; });

    auth.onAuthStateChanged(user => { if (!user) window.location.href = 'https://kazinni-staff.vercel.app'; });

    window.showAddModal = showAddModal;
    window.editCampaign = editCampaign;
    window.saveCampaign = saveCampaign;
    window.updateCampaign = updateCampaign;
    window.updateStatus = updateStatus;
    window.closeModal = closeModal;
