<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Campaigns | The Heritage</title>
  
  <meta name="theme-color" content="#d946ef">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --heritage: #d946ef;
      --heritage-dark: #a21caf;
      --heritage-light: #f0abfc;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #f0abfc;
      --red: #ef4444;
      --green: #10b981;
      --orange: #f59e0b;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #fdf4ff 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(217, 70, 239, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(217, 70, 239, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #f0abfc, #a21caf);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #d946ef; -webkit-text-fill-color: #d946ef; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(217, 70, 239, 0.08); border: 1px solid rgba(217, 70, 239, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--heritage-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--heritage); color: white; }

    .container { padding: 1rem 2%; flex: 1; }

    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--heritage-dark); margin-right: 6px; }
    .page-header p { color: var(--text-muted); font-size: 0.75rem; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-mini {
      background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
      border: 1px solid #f0abfc; box-shadow: 0 2px 8px rgba(162,28,175,0.03);
    }
    .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--heritage-dark); line-height: 1.1; }
    .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    .filter-btn {
      padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0;
      background: white; color: #64748b; font-weight: 600; font-size: 0.65rem;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--heritage); color: var(--heritage-dark); }
    .filter-btn.active { background: var(--heritage); color: white; border-color: var(--heritage); }
    .search-box { flex: 1; min-width: 150px; max-width: 300px; position: relative; }
    .search-box input {
      width: 100%; padding: 0.35rem 0.8rem 0.35rem 2rem; border-radius: 20px;
      border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif;
    }
    .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.7rem; }

    .table-wrap {
      background: white; border-radius: 16px; border: 1px solid #f0abfc;
      overflow: hidden; box-shadow: 0 4px 16px rgba(162,28,175,0.03);
    }
    .table-scroll { overflow-x: auto; max-height: 60vh; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    thead { position: sticky; top: 0; z-index: 2; background: #fdf4ff; }
    th {
      padding: 0.6rem 0.7rem; text-align: left; font-weight: 700; color: #a21caf;
      font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;
    }
    td { padding: 0.5rem 0.7rem; border-bottom: 1px solid #fdf4ff; vertical-align: middle; }
    tr:hover td { background: #fdf4ff; }

    .status-badge {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px;
      font-size: 0.6rem; font-weight: 700; white-space: nowrap;
    }
    .status-active { background: #d1fae5; color: #065f46; }
    .status-draft { background: #fdf4ff; color: #a21caf; }
    .status-completed { background: #f1f5f9; color: #475569; }
    .status-paused { background: #fee2e2; color: #991b1b; }

    .action-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .action-btn {
      padding: 0.25rem 0.5rem; border-radius: 6px; border: none; font-size: 0.6rem;
      font-weight: 600; cursor: pointer; display: inline-flex; align-items: center;
      gap: 3px; transition: all 0.15s; font-family: inherit;
    }
    .btn-edit { background: #fdf4ff; color: #a21caf; }
    .btn-edit:hover { background: #d946ef; color: white; }
    .btn-activate { background: #d1fae5; color: #065f46; }
    .btn-activate:hover { background: #10b981; color: white; }
    .btn-pause { background: #fef3c7; color: #92400e; }
    .btn-pause:hover { background: #f59e0b; color: white; }
    .btn-complete { background: #dbeafe; color: #1e40af; }
    .btn-complete:hover { background: #3b82f6; color: white; }

    .empty-row td { text-align: center; padding: 2rem; color: #94a3b8; }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
      align-items: center; backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 20px; padding: 1.5rem; max-width: 500px;
      width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; color: var(--heritage-dark); }
    .form-group { margin-bottom: 0.7rem; }
    .form-group label {
      display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
      background: #f8fafc;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; font-family: inherit; transition: all 0.15s;
    }
    .btn-primary { background: var(--heritage); color: white; }
    .btn-primary:hover { background: var(--heritage-dark); }
    .btn-secondary { background: #f1f5f9; color: #475569; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--green); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(16,185,129,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="The Heritage" class="logo-img">
      <span class="logo-text">The Heritage <span>Ads</span></span>
    </a>
    <div class="nav-right">
      <a href="index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="heritage-listings.html" class="nav-btn"><i class="fas fa-th-large"></i> Listings</a>
      <a href="heritage-partners.html" class="nav-btn"><i class="fas fa-handshake"></i> Partners</a>
      <a href="heritage-monitoring.html" class="nav-btn"><i class="fas fa-chart-line"></i> Monitoring</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-bullhorn"></i> Ad Campaigns</h1>
      <button class="btn btn-primary" onclick="showAddModal()" style="padding:0.5rem 1rem;font-size:0.7rem;">
        <i class="fas fa-plus"></i> New Campaign
      </button>
    </div>

    <div class="stats-row">
      <div class="stat-mini"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Campaigns</div></div>
      <div class="stat-mini"><div class="stat-num" id="statActive">0</div><div class="stat-label">Active</div></div>
      <div class="stat-mini"><div class="stat-num" id="statDraft">0</div><div class="stat-label">Draft</div></div>
      <div class="stat-mini"><div class="stat-num" id="statBudget">0</div><div class="stat-label">Total Budget (KES)</div></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="draft">Draft</button>
      <button class="filter-btn" data-filter="paused">Paused</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search campaigns...">
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Campaign Name</th>
              <th>Partner</th>
              <th>Type</th>
              <th>Budget</th>
              <th>Start</th>
              <th>End</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr class="empty-row"><td colspan="8">Loading campaigns...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allCampaigns = {};
    let allPartners = {};
    let currentFilter = 'all';
    let searchQuery = '';

    function showToast(msg, isError) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.innerHTML = '<i class="fas fa-' + (isError ? 'exclamation-circle' : 'check-circle') + '"></i> ' + msg;
      container.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 3500);
    }

    function getStatusClass(status) {
      const map = { active:'status-active', draft:'status-draft', completed:'status-completed', paused:'status-paused' };
      return map[status] || 'status-draft';
    }

    function getPartnerOptions(selected) {
      const partners = Object.values(allPartners).filter(function(p) { return p && p.status === 'active'; });
      return partners.map(function(p) {
        const name = p.businessName || p.name || '';
        return '<option value="' + name + '" ' + (selected === name ? 'selected' : '') + '>' + name + '</option>';
      }).join('');
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      let campaigns = Object.entries(allCampaigns).map(function(entry) { return Object.assign({ id: entry[0] }, entry[1]); });

      if (currentFilter !== 'all') {
        campaigns = campaigns.filter(function(c) { return (c.status || 'draft') === currentFilter; });
      }
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        campaigns = campaigns.filter(function(c) {
          return (c.name || '').toLowerCase().indexOf(q) !== -1 ||
                 (c.clientName || '').toLowerCase().indexOf(q) !== -1;
        });
      }

      campaigns.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });

      if (!campaigns.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="8"><i class="fas fa-bullhorn" style="font-size:2rem;display:block;margin-bottom:8px;"></i>No campaigns found</td></tr>';
        return;
      }

      tbody.innerHTML = campaigns.map(function(c) {
        const status = c.status || 'draft';
        return '<tr>' +
          '<td><strong>' + (c.name || 'Campaign') + '</strong></td>' +
          '<td>' + (c.clientName || 'N/A') + '</td>' +
          '<td>' + (c.campaignType || 'N/A') + '</td>' +
          '<td><strong>KES ' + (c.totalBudget || 0).toLocaleString() + '</strong></td>' +
          '<td>' + (c.startDate || '—') + '</td>' +
          '<td>' + (c.endDate || '—') + '</td>' +
          '<td><span class="status-badge ' + getStatusClass(status) + '">' + status + '</span></td>' +
          '<td><div class="action-btns">' +
            '<button class="action-btn btn-edit" onclick="editCampaign(\'' + c.id + '\')"><i class="fas fa-edit"></i></button>' +
            (status === 'draft' ? '<button class="action-btn btn-activate" onclick="updateStatus(\'' + c.id + '\',\'active\')"><i class="fas fa-play"></i> Activate</button>' : '') +
            (status === 'active' ? '<button class="action-btn btn-pause" onclick="updateStatus(\'' + c.id + '\',\'paused\')"><i class="fas fa-pause"></i> Pause</button>' : '') +
            (status === 'paused' ? '<button class="action-btn btn-activate" onclick="updateStatus(\'' + c.id + '\',\'active\')"><i class="fas fa-play"></i> Resume</button>' : '') +
            (status === 'active' || status === 'paused' ? '<button class="action-btn btn-complete" onclick="updateStatus(\'' + c.id + '\',\'completed\')"><i class="fas fa-check"></i> Complete</button>' : '') +
          '</div></td>' +
        '</tr>';
      }).join('');

      updateStats();
    }

    function updateStats() {
      const campaigns = Object.values(allCampaigns);
      const active = campaigns.filter(function(c) { return c.status === 'active'; }).length;
      const draft = campaigns.filter(function(c) { return c.status === 'draft'; }).length;
      const budget = campaigns.reduce(function(s, c) { return s + (c.totalBudget || 0); }, 0);

      document.getElementById('statTotal').textContent = campaigns.length;
      document.getElementById('statActive').textContent = active;
      document.getElementById('statDraft').textContent = draft;
      document.getElementById('statBudget').textContent = budget.toLocaleString();
    }

    function showAddModal() {
      document.getElementById('modalContent').innerHTML = 
        '<h3><i class="fas fa-plus-circle"></i> New Campaign</h3>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Campaign Name *</label><input type="text" id="cName" placeholder="e.g., Holiday Sale"></div>' +
          '<div class="form-group"><label>Partner *</label><select id="cPartner"><option value="">— Select partner —</option>' + getPartnerOptions('') + '</select></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Campaign Type</label><select id="cType">' +
            '<option value="Brand Awareness">Brand Awareness</option>' +
            '<option value="Product Launch">Product Launch</option>' +
            '<option value="Sales Promotion">Sales Promotion</option>' +
            '<option value="Event">Event Promotion</option>' +
            '<option value="Seasonal">Seasonal</option>' +
          '</select></div>' +
          '<div class="form-group"><label>Total Budget (KES)</label><input type="number" id="cBudget" value="0" min="0"></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Start Date</label><input type="date" id="cStartDate"></div>' +
          '<div class="form-group"><label>End Date</label><input type="date" id="cEndDate"></div>' +
        '</div>' +
        '<div class="form-group"><label>Notes</label><textarea id="cNotes" rows="2"></textarea></div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-primary" onclick="saveCampaign()"><i class="fas fa-save"></i> Save Campaign</button>' +
          '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
        '</div>';
      document.getElementById('modal').classList.add('show');
    }

    async function saveCampaign() {
      const name = document.getElementById('cName').value.trim();
      const partner = document.getElementById('cPartner').value;
      if (!name) { showToast('Enter campaign name', true); return; }
      if (!partner) { showToast('Select a partner', true); return; }

      try {
        await database.ref('heritage_campaigns').push().set({
          name: name,
          clientName: partner,
          campaignType: document.getElementById('cType').value,
          totalBudget: parseInt(document.getElementById('cBudget').value) || 0,
          startDate: document.getElementById('cStartDate').value,
          endDate: document.getElementById('cEndDate').value,
          notes: document.getElementById('cNotes').value.trim(),
          status: 'draft',
          createdAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('Campaign created!');
        closeModal();
      } catch (e) { showToast('Failed to save', true); }
    }

    function editCampaign(campaignId) {
      const c = allCampaigns[campaignId];
      if (!c) return;

      document.getElementById('modalContent').innerHTML = 
        '<h3><i class="fas fa-edit"></i> Edit Campaign</h3>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Campaign Name</label><input type="text" id="ecName" value="' + (c.name || '') + '"></div>' +
          '<div class="form-group"><label>Partner</label><select id="ecPartner">' + getPartnerOptions(c.clientName || '') + '</select></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Campaign Type</label><select id="ecType">' +
            ['Brand Awareness','Product Launch','Sales Promotion','Event','Seasonal'].map(function(t) { return '<option value="' + t + '" ' + (c.campaignType === t ? 'selected' : '') + '>' + t + '</option>'; }).join('') +
          '</select></div>' +
          '<div class="form-group"><label>Total Budget (KES)</label><input type="number" id="ecBudget" value="' + (c.totalBudget || 0) + '"></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Start Date</label><input type="date" id="ecStartDate" value="' + (c.startDate || '') + '"></div>' +
          '<div class="form-group"><label>End Date</label><input type="date" id="ecEndDate" value="' + (c.endDate || '') + '"></div>' +
        '</div>' +
        '<div class="form-group"><label>Status</label><select id="ecStatus">' +
          ['draft','active','paused','completed'].map(function(s) { return '<option value="' + s + '" ' + (c.status === s ? 'selected' : '') + '>' + s + '</option>'; }).join('') +
        '</select></div>' +
        '<div class="form-group"><label>Notes</label><textarea id="ecNotes" rows="2">' + (c.notes || '') + '</textarea></div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-primary" onclick="updateCampaign(\'' + campaignId + '\')"><i class="fas fa-save"></i> Update</button>' +
          '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
        '</div>';
      document.getElementById('modal').classList.add('show');
    }

    async function updateCampaign(campaignId) {
      try {
        await database.ref('heritage_campaigns/' + campaignId).update({
          name: document.getElementById('ecName').value.trim(),
          clientName: document.getElementById('ecPartner').value,
          campaignType: document.getElementById('ecType').value,
          totalBudget: parseInt(document.getElementById('ecBudget').value) || 0,
          startDate: document.getElementById('ecStartDate').value,
          endDate: document.getElementById('ecEndDate').value,
          status: document.getElementById('ecStatus').value,
          notes: document.getElementById('ecNotes').value.trim(),
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('Updated!');
        closeModal();
      } catch (e) { showToast('Failed to update', true); }
    }

    async function updateStatus(campaignId, newStatus) {
      if (!confirm('Update campaign to "' + newStatus + '"?')) return;
      try {
        await database.ref('heritage_campaigns/' + campaignId).update({ status: newStatus, updatedAt: firebase.database.ServerValue.TIMESTAMP });
        showToast('Campaign ' + newStatus + '!');
      } catch (e) { showToast('Failed to update', true); }
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTable();
      });
    });

    document.getElementById('searchInput').addEventListener('input', function(e) { searchQuery = e.target.value; renderTable(); });
    document.getElementById('modal').addEventListener('click', function(e) { if (e.target === document.getElementById('modal')) closeModal(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    database.ref('heritage_campaigns').on('value', function(snapshot) {
      allCampaigns = snapshot.val() || {};
      renderTable();
    });

    database.ref('heritage_partners').on('value', function(snapshot) {
      allPartners = snapshot.val() || {};
    });

    auth.onAuthStateChanged(function(user) { if (!user) window.location.href = '/'; });

    window.showAddModal = showAddModal;
    window.editCampaign = editCampaign;
    window.saveCampaign = saveCampaign;
    window.updateCampaign = updateCampaign;
    window.updateStatus = updateStatus;
    window.closeModal = closeModal;
  </script>
</body>
</html>
