<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BrandInn Agency | Service Quotes & Requests</title>
  
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <!-- html2pdf library for PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #7c3aed;
      --primary-dark: #5b21b6;
      --primary-light: #a78bfa;
      --primary-bg: #f5f0ff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8fafc;
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: white;
      padding: 0.8rem 4%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-img { height: 38px; width: 38px; border-radius: 12px; object-fit: contain; }
    .logo-text { font-weight: 800; font-size: 1.2rem; color: var(--gray-800); }
    .logo-text span { font-weight: 600; font-size: 0.75rem; color: var(--primary); margin-left: 5px; }

    .nav-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .nav-btn {
      background: transparent; border: none; padding: 0.45rem 1rem; border-radius: 30px;
      color: var(--gray-600); font-weight: 600; font-size: 0.8rem; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--gray-100); color: var(--primary); }
    .nav-btn.active { background: var(--primary); color: white; }

    .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 4%; flex: 1; width: 100%; }

    .page-header { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 800; color: var(--gray-800); display: flex; align-items: center; gap: 10px; }
    .page-header h1 i { color: var(--primary); }
    .page-header p { color: var(--gray-500); font-size: 0.85rem; margin-top: 0.3rem; }

    .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

    .form-card {
      background: white; border-radius: 20px; border: 1px solid var(--gray-200);
      padding: 1.5rem; transition: box-shadow 0.2s;
    }
    .form-card h2 {
      font-size: 1rem; font-weight: 700; margin-bottom: 1rem; display: flex;
      align-items: center; gap: 8px; color: var(--gray-800);
      padding-bottom: 0.5rem; border-bottom: 2px solid var(--primary-bg);
    }
    .form-card h2 i { color: var(--primary); }

    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: 0.7rem; font-weight: 700; color: var(--gray-600);
      margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.7rem 1rem; border-radius: 12px;
      border: 1px solid var(--gray-200); font-size: 0.85rem;
      font-family: 'Inter', sans-serif; background: var(--gray-50);
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--primary); outline: none; background: white;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .services-section {
      margin: 1rem 0; padding: 0.8rem; background: var(--gray-50);
      border-radius: 12px;
    }
    .service-checkboxes {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem;
      max-height: 280px; overflow-y: auto;
    }
    .service-checkbox {
      display: flex; align-items: center; gap: 10px; padding: 0.7rem 0.8rem;
      background: white; border-radius: 10px; border: 1px solid var(--gray-200);
      cursor: pointer; transition: all 0.2s;
    }
    .service-checkbox:hover { border-color: var(--primary); background: var(--primary-bg); }
    .service-checkbox.selected { background: var(--primary-bg); border-color: var(--primary); }
    .service-checkbox input { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
    .service-info { flex: 1; display: flex; flex-direction: column; }
    .service-name { font-weight: 600; font-size: 0.8rem; color: var(--gray-800); }
    .service-price { font-size: 0.65rem; color: var(--primary); font-weight: 600; margin-top: 2px; }
    .qty-control { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .qty-control button {
      width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--gray-300);
      background: white; cursor: pointer; font-size: 0.8rem; font-weight: 600;
    }
    .qty-control button:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .qty-control input {
      width: 45px; text-align: center; padding: 0.3rem; font-size: 0.75rem;
      border-radius: 8px; border: 1px solid var(--gray-300);
    }

    .selected-services-list { margin-top: 0.8rem; max-height: 150px; overflow-y: auto; }
    .selected-service-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.5rem 0.7rem; background: var(--gray-50); border-radius: 8px;
      margin-bottom: 0.4rem; font-size: 0.75rem;
    }
    .selected-service-item .remove { color: var(--danger); cursor: pointer; font-size: 0.8rem; padding: 0 4px; }

    .price-display {
      background: linear-gradient(135deg, var(--primary-bg), #f3e8ff);
      border-radius: 12px; padding: 1rem; text-align: center; margin-top: 1rem;
    }
    .price-display .total-amount { font-size: 1.6rem; font-weight: 800; color: var(--primary-dark); }
    .price-display .breakdown { font-size: 0.7rem; color: var(--gray-500); margin-top: 0.2rem; }

    .btn-submit, .btn-pdf {
      background: var(--primary); color: white; border: none; padding: 0.8rem;
      border-radius: 40px; font-weight: 700; font-size: 0.85rem; cursor: pointer;
      width: 100%; margin-top: 1rem; transition: all 0.2s;
    }
    .btn-pdf { background: var(--gray-700); margin-top: 0.75rem; }
    .btn-pdf:hover { background: var(--gray-800); transform: translateY(-1px); }
    .btn-submit:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-submit:disabled { background: var(--gray-400); cursor: not-allowed; }

    .recent-section {
      background: white; border-radius: 20px; border: 1px solid var(--gray-200);
      overflow: hidden; margin-top: 1.5rem;
    }
    .requests-table { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    th { text-align: left; padding: 0.8rem 1rem; background: var(--gray-50); font-weight: 600; color: var(--gray-600); font-size: 0.7rem; text-transform: uppercase; }
    td { padding: 0.7rem 1rem; border-bottom: 1px solid var(--gray-100); }
    tr:hover td { background: var(--gray-50); cursor: pointer; }
    .status-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.65rem; font-weight: 600; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .empty-state { text-align: center; padding: 2rem; color: var(--gray-400); }

    /* PDF QUOTE STYLES — purple theme, professional */
    .pdf-quote-wrapper {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: white;
      padding: 2rem;
      max-width: 100%;
      color: #1e293b;
    }
    .pdf-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #7c3aed;
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
    }
    .pdf-logo-area { display: flex; align-items: center; gap: 12px; }
    .pdf-logo-img { height: 50px; width: 50px; object-fit: contain; }
    .pdf-brand h2 { color: #5b21b6; font-weight: 800; font-size: 1.6rem; margin: 0; }
    .pdf-brand p { color: #64748b; font-size: 0.7rem; margin: 0; }
    .pdf-quote-title { text-align: right; }
    .pdf-quote-title h3 { color: #7c3aed; font-weight: 700; font-size: 1.3rem; margin: 0; }
    .pdf-quote-title p { font-size: 0.7rem; color: #475569; }
    .pdf-client-section {
      background: #f8fafc;
      padding: 1rem;
      border-radius: 16px;
      margin: 1.2rem 0;
      border-left: 5px solid #7c3aed;
    }
    .pdf-client-section h4 { margin: 0 0 0.5rem 0; color: #334155; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
    .pdf-client-details { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; font-size: 0.8rem; }
    .pdf-items-table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    .pdf-items-table th { background: #f1f5f9; color: #334155; padding: 0.7rem; text-align: left; font-size: 0.7rem; font-weight: 700; }
    .pdf-items-table td { padding: 0.7rem; border-bottom: 1px solid #e2e8f0; font-size: 0.75rem; }
    .pdf-total-box {
      text-align: right;
      margin-top: 1rem;
      padding: 1rem;
      background: #f5f0ff;
      border-radius: 12px;
    }
    .pdf-footer { margin-top: 2rem; text-align: center; font-size: 0.65rem; color: #94a3b8; border-top: 1px solid #e2e8f0; padding-top: 1rem; }
    .terms-note { font-size: 0.65rem; color: #64748b; margin-top: 1rem; padding-top: 0.5rem; }
    .badge-pdf { background: #7c3aed10; color: #7c3aed; font-weight: 600; }

    @media (max-width: 1000px) { .two-columns { grid-template-columns: 1fr; } .service-checkboxes { grid-template-columns: 1fr; } }
    @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--success); color: white; padding: 0.6rem 1.2rem; border-radius: 30px; font-weight: 600; z-index: 2000; font-size: 0.75rem; }
    .toast.error { background: var(--danger); }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="#" class="logo">
    <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="BrandInn" class="logo-img">
    <span class="logo-text">BrandInn <span>Agency</span></span>
  </a>
  <div class="nav-right">
    <a href="#" class="nav-btn"><i class="fas fa-file-invoice-dollar"></i> Quote Manager</a>
    <a href="#" class="nav-btn"><i class="fas fa-project-diagram"></i> Projects</a>
    <a href="#" class="nav-btn"><i class="fas fa-calendar-check"></i> Bookings</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <div>
      <h1><i class="fas fa-file-pdf"></i> Quote & Request Manager</h1>
      <p>Create service requests — then generate a professional PDF quote (purple themed)</p>
    </div>
  </div>

  <div class="two-columns">
    <!-- LEFT: Quote/Request Form -->
    <div class="form-card">
      <h2><i class="fas fa-plus-circle"></i> New Quote / Request</h2>
      <div class="form-row">
        <div class="form-group"><label>Client Name *</label><input type="text" id="clientName" placeholder="Full name"></div>
        <div class="form-group"><label>Phone *</label><input type="tel" id="phone" placeholder="+254 700 000000"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="client@email.com"></div>
        <div class="form-group"><label>Business Name</label><input type="text" id="businessName" placeholder="Company name"></div>
      </div>

      <div class="services-section">
        <label><i class="fas fa-cogs"></i> Select Services *</label>
        <div class="service-checkboxes" id="servicesCheckboxes"></div>
      </div>
      <div class="selected-services-list" id="selectedServicesList"></div>

      <div class="form-row">
        <div class="form-group"><label>Urgency</label>
          <select id="urgency">
            <option value="normal">Normal (7-14 days)</option>
            <option value="urgent">Urgent (3-5 days) +15%</option>
            <option value="express">Express (1-2 days) +30%</option>
          </select>
        </div>
        <div class="form-group"><label>Additional Fee (KES)</label><input type="number" id="serviceFee" value="0" min="0"></div>
      </div>

      <div class="form-group"><label>Special Instructions / Notes</label><textarea id="instructions" rows="2" placeholder="Additional requirements, deadlines, etc..."></textarea></div>

      <div class="price-display">
        <div class="total-amount" id="displayTotal">KES 0</div>
        <div class="breakdown" id="breakdown">Select services to calculate</div>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="createServiceRequest()">💾 Save Service Request</button>
      <button class="btn-pdf" id="generatePdfBtn" onclick="generatePDFQuote()"><i class="fas fa-file-pdf"></i> Generate PDF Quote</button>
    </div>

    <!-- RIGHT: Recent Requests + PDF Preview Trigger hint -->
    <div>
      <div class="form-card" style="padding:0; overflow:hidden;">
        <div style="padding:1rem 1.2rem; border-bottom:1px solid var(--gray-200); background:white;">
          <h2 style="margin:0; border:none; padding:0;"><i class="fas fa-history"></i> Recent Requests</h2>
          <p style="font-size:0.7rem; margin-top:4px;">Click any row to load & generate quote PDF</p>
        </div>
        <div style="max-height: 500px; overflow-y: auto;">
          <div class="requests-table" id="recentRequestsTable"><div class="empty-state">Loading requests...</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
    authDomain: "mugera-e51cc.firebaseapp.com",
    databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "mugera-e51cc",
    storageBucket: "mugera-e51cc.firebasestorage.app",
    messagingSenderId: "1024868637509",
    appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const auth = firebase.auth();

  const servicesCatalog = [
    { id: 'web_basic', name: 'Basic Website', price: 8000, category: 'Web' },
    { id: 'web_ecommerce', name: 'E-Commerce Store', price: 17000, category: 'Web' },
    { id: 'landing_page', name: 'Landing Page', price: 5000, category: 'Web' },
    { id: 'logo_design', name: 'Logo Design', price: 2500, category: 'Design' },
    { id: 'brand_identity', name: 'Brand Identity', price: 5000, category: 'Design' },
    { id: 'social_media', name: 'Social Media Management', price: 5000, category: 'Marketing' },
    { id: 'seo', name: 'SEO Package', price: 3500, category: 'Marketing' },
    { id: 'meta_ads', name: 'Meta Ads Management', price: 2500, category: 'Ads' },
    { id: 'print_banner', name: 'Banner Printing', price: 600, category: 'Print' },
    { id: 'print_cards', name: 'Business Cards', price: 450, category: 'Print' },
  ];

  let selectedServices = {};
  let allRequests = {};

  function showToast(msg, isError = false) {
    const c = document.getElementById('toastContainer');
    const existing = c.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = `toast ${isError ? 'error' : ''}`;
    t.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }
  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m); }
  function formatDate(timestamp) { if (!timestamp) return ''; const d = new Date(timestamp); return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }); }

  function renderServicesCheckboxes() {
    const container = document.getElementById('servicesCheckboxes');
    container.innerHTML = servicesCatalog.map(svc => `
      <div class="service-checkbox ${selectedServices[svc.id] ? 'selected' : ''}" data-id="${svc.id}" onclick="toggleService('${svc.id}')">
        <input type="checkbox" ${selectedServices[svc.id] ? 'checked' : ''} onclick="event.stopPropagation(); toggleService('${svc.id}')">
        <div class="service-info"><span class="service-name">${escapeHtml(svc.name)}</span><span class="service-price">KES ${svc.price.toLocaleString()}</span></div>
        <div class="qty-control" onclick="event.stopPropagation()">
          <button onclick="changeQty('${svc.id}', -1)">−</button>
          <input type="number" value="${selectedServices[svc.id]?.quantity || 1}" min="1" max="99" onchange="updateQty('${svc.id}', this.value)">
          <button onclick="changeQty('${svc.id}', 1)">+</button>
        </div>
      </div>
    `).join('');
  }

  window.toggleService = function(serviceId) {
    const svc = servicesCatalog.find(s => s.id === serviceId);
    if (!svc) return;
    if (selectedServices[serviceId]) { delete selectedServices[serviceId]; }
    else { selectedServices[serviceId] = { ...svc, quantity: 1 }; }
    renderServicesCheckboxes();
    renderSelectedServices();
    calculateTotal();
  };
  window.changeQty = function(serviceId, delta) {
    if (!selectedServices[serviceId]) return;
    let newQty = selectedServices[serviceId].quantity + delta;
    if (newQty < 1) newQty = 1;
    if (newQty > 99) newQty = 99;
    selectedServices[serviceId].quantity = newQty;
    renderServicesCheckboxes();
    renderSelectedServices();
    calculateTotal();
  };
  window.updateQty = function(serviceId, value) {
    if (!selectedServices[serviceId]) return;
    let newQty = parseInt(value) || 1;
    if (newQty < 1) newQty = 1;
    if (newQty > 99) newQty = 99;
    selectedServices[serviceId].quantity = newQty;
    renderServicesCheckboxes();
    renderSelectedServices();
    calculateTotal();
  };

  function renderSelectedServices() {
    const container = document.getElementById('selectedServicesList');
    const items = Object.values(selectedServices);
    if (items.length === 0) { container.innerHTML = '<div style="font-size:0.75rem; color:var(--gray-400); padding:0.5rem; text-align:center;">No services selected</div>'; return; }
    container.innerHTML = items.map(s => `<div class="selected-service-item"><span><strong>${escapeHtml(s.name)}</strong> x${s.quantity}</span><span>KES ${(s.price * s.quantity).toLocaleString()} <span class="remove" onclick="toggleService('${s.id}')">✕</span></span></div>`).join('');
  }

  function calculateTotal() {
    let subtotal = 0;
    Object.values(selectedServices).forEach(s => { subtotal += s.price * s.quantity; });
    const urgency = document.getElementById('urgency').value;
    let multiplier = 1, urgencyText = '';
    if (urgency === 'urgent') { multiplier = 1.15; urgencyText = '+15% Urgent'; }
    else if (urgency === 'express') { multiplier = 1.30; urgencyText = '+30% Express'; }
    const serviceFee = parseInt(document.getElementById('serviceFee').value) || 0;
    const urgencyFee = subtotal * (multiplier - 1);
    const total = (subtotal * multiplier) + serviceFee;
    document.getElementById('displayTotal').textContent = `KES ${Math.round(total).toLocaleString()}`;
    let breakdown = `Subtotal: KES ${subtotal.toLocaleString()}`;
    if (urgencyFee > 0) breakdown += ` + ${urgencyText} (KES ${Math.round(urgencyFee).toLocaleString()})`;
    if (serviceFee > 0) breakdown += ` + fee (KES ${serviceFee.toLocaleString()})`;
    document.getElementById('breakdown').textContent = breakdown;
    return { subtotal, urgencyFee, total: Math.round(total), multiplier, serviceFee };
  }

  async function createServiceRequest() {
    const clientName = document.getElementById('clientName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    if (!clientName || !phone) { showToast('Client name & phone required', true); return; }
    if (Object.keys(selectedServices).length === 0) { showToast('Select at least one service', true); return; }
    const { subtotal, urgencyFee, total, serviceFee } = calculateTotal();
    const servicesList = Object.values(selectedServices).map(s => ({ name: s.name, price: s.price, quantity: s.quantity }));
    const urgency = document.getElementById('urgency').value;
    const requestData = {
      clientName, phone, email: document.getElementById('email').value.trim(),
      businessName: document.getElementById('businessName').value.trim(),
      services: servicesList, urgency, serviceFee, subtotal, urgencyFee, total,
      instructions: document.getElementById('instructions').value.trim(),
      status: 'pending', createdAt: firebase.database.ServerValue.TIMESTAMP,
      createdBy: 'brandinn-staff'
    };
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
    try { await database.ref('brandinn_service_requests').push().set(requestData); showToast('Service request saved!'); resetForm(); } 
    catch (e) { showToast('Save failed', true); } finally { btn.disabled = false; btn.innerHTML = '💾 Save Service Request'; }
  }

  function resetForm() {
    document.getElementById('clientName').value = ''; document.getElementById('phone').value = '';
    document.getElementById('email').value = ''; document.getElementById('businessName').value = '';
    document.getElementById('instructions').value = ''; document.getElementById('urgency').value = 'normal';
    document.getElementById('serviceFee').value = '0'; selectedServices = {};
    renderServicesCheckboxes(); renderSelectedServices(); calculateTotal();
  }

  function renderRecentRequests() {
    const container = document.getElementById('recentRequestsTable');
    const requests = Object.entries(allRequests).map(([id, r]) => ({ id, ...r })).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).slice(0,10);
    if (!requests.length) { container.innerHTML = '<div class="empty-state">No service requests yet</div>'; return; }
    container.innerHTML = `<table style="width:100%;"><thead><tr><th>Client</th><th>Services</th><th>Total</th><th>Date</th><th></th></tr></thead><tbody>
      ${requests.map(r => `<tr onclick="loadRequestForQuote('${r.id}')" style="cursor:pointer;">
        <td><strong>${escapeHtml(r.clientName || '—')}</strong><br><span style="font-size:0.65rem;">${escapeHtml(r.businessName || '')}</span></td>
        <td>${r.services?.length || 0} item(s)</td><td>KES ${(r.total || 0).toLocaleString()}</td>
        <td>${formatDate(r.createdAt)}</td><td><i class="fas fa-chevron-right" style="color:var(--primary);"></i></td>
      </tr>`).join('')}
    </tbody></table>`;
  }

  // Load request into form for editing & PDF generation
  window.loadRequestForQuote = function(requestId) {
    const req = allRequests[requestId];
    if (!req) return;
    document.getElementById('clientName').value = req.clientName || '';
    document.getElementById('phone').value = req.phone || '';
    document.getElementById('email').value = req.email || '';
    document.getElementById('businessName').value = req.businessName || '';
    document.getElementById('instructions').value = req.instructions || '';
    document.getElementById('urgency').value = req.urgency || 'normal';
    document.getElementById('serviceFee').value = req.serviceFee || 0;
    const newSelected = {};
    if (req.services && req.services.length) {
      req.services.forEach(svc => {
        const catalogItem = servicesCatalog.find(c => c.name === svc.name);
        if (catalogItem) newSelected[catalogItem.id] = { ...catalogItem, quantity: svc.quantity || 1 };
        else {
          const fallback = { id: svc.name, name: svc.name, price: svc.price, quantity: svc.quantity };
          newSelected[svc.name] = fallback;
        }
      });
    }
    selectedServices = newSelected;
    renderServicesCheckboxes();
    renderSelectedServices();
    calculateTotal();
    showToast(`Loaded: ${req.clientName} — ready to generate PDF`);
  };

  // PDF GENERATION with purple professional theme
  window.generatePDFQuote = function() {
    const clientName = document.getElementById('clientName').value.trim();
    if (!clientName) { showToast('Please enter client name before generating PDF', true); return; }
    if (Object.keys(selectedServices).length === 0) { showToast('Add at least one service to quote', true); return; }
    const { total, subtotal, urgencyFee, multiplier, serviceFee } = calculateTotal();
    const urgencyVal = document.getElementById('urgency').value;
    let urgencyLabel = 'Standard (7-14 days)';
    if (urgencyVal === 'urgent') urgencyLabel = 'Urgent (3-5 days) +15%';
    if (urgencyVal === 'express') urgencyLabel = 'Express (1-2 days) +30%';
    const servicesArray = Object.values(selectedServices);
    const quoteNumber = `BINN-${Math.floor(Math.random()*10000)}-${new Date().getFullYear()}`;
    const issueDate = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' });
    
    const pdfContent = `
      <div class="pdf-quote-wrapper">
        <div class="pdf-header">
          <div class="pdf-logo-area">
            <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" class="pdf-logo-img" alt="BrandInn">
            <div class="pdf-brand"><h2>BRANDINN BUSINESS</h2><p>Creative Digital Solutions</p></div>
          </div>
          <div class="pdf-quote-title">
            <h3>PROFESSIONAL QUOTE</h3>
            <p>#${quoteNumber}</p>
            <p>Issued: ${issueDate}</p>
          </div>
        </div>
        
        <div class="pdf-client-section">
          <h4><i class="fas fa-user-circle"></i> Prepared for</h4>
          <div class="pdf-client-details">
            <div><strong>${escapeHtml(clientName)}</strong><br>${escapeHtml(document.getElementById('businessName').value || '—')}<br>📞 ${escapeHtml(document.getElementById('phone').value)}<br>✉️ ${escapeHtml(document.getElementById('email').value || '—')}</div>
            <div><strong>Project Details</strong><br>Urgency: ${urgencyLabel}<br>Special Notes: ${escapeHtml(document.getElementById('instructions').value || 'None')}</div>
          </div>
        </div>
        
        <table class="pdf-items-table">
          <thead><tr><th>Service Description</th><th>Qty</th><th>Unit Price (KES)</th><th>Total (KES)</th></tr></thead>
          <tbody>
            ${servicesArray.map(s => `<tr><td><strong>${escapeHtml(s.name)}</strong></td><td>${s.quantity}</td><td>${s.price.toLocaleString()}</td><td>${(s.price * s.quantity).toLocaleString()}</td></tr>`).join('')}
            ${serviceFee > 0 ? `<tr><td colspan="3" style="text-align:right;">Additional Service Fee</td><td>${serviceFee.toLocaleString()}</td></tr>` : ''}
            ${multiplier > 1 ? `<tr><td colspan="3" style="text-align:right;">Urgency Surcharge (${urgencyVal === 'urgent' ? '15%' : '30%'})</td><td>${Math.round(urgencyFee).toLocaleString()}</td></tr>` : ''}
          </tbody>
        </table>
        
        <div class="pdf-total-box">
          <div style="font-size:1rem; font-weight:600;">TOTAL AMOUNT (KES)</div>
          <div style="font-size:2rem; font-weight:800; color:#5b21b6;">KES ${total.toLocaleString()}</div>
          <div style="font-size:0.7rem;">Subtotal: KES ${subtotal.toLocaleString()} ${multiplier>1 ? '+ urgency' : ''} ${serviceFee>0 ? '+ fees' : ''}</div>
        </div>
        <div class="terms-note">
          <strong>Terms & Conditions:</strong> This quote is valid for 30 days. 50% deposit required to commence work. All pricing includes applicable taxes. Delivery timeline based on urgency selected.
        </div>
        <div class="pdf-footer">
          <i class="fas fa-crown"></i> BrandInn Agency | 254 141 796 779 | business.brandinn@gmail.com | brandinn-business.vercel.app
          <br>Powered by professional excellence — purple standard.
        </div>
      </div>
    `;
    const element = document.createElement('div');
    element.innerHTML = pdfContent;
    const opt = { margin: [0.5, 0.5, 0.5, 0.5], filename: `BrandInn_Quote_${clientName.replace(/\s/g,'_')}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, letterRendering: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
    html2pdf().set(opt).from(element).save().then(() => showToast(`PDF Quote generated for ${clientName}`)).catch(e => showToast('PDF error', true));
  };

  database.ref('brandinn_service_requests').on('value', (snap) => { allRequests = snap.val() || {}; renderRecentRequests(); });
  document.getElementById('urgency').addEventListener('change', calculateTotal);
  document.getElementById('serviceFee').addEventListener('input', calculateTotal);
  auth.onAuthStateChanged(u => { if (!u) window.location.href = 'https://kazinni.vercel.app'; });
  renderServicesCheckboxes(); calculateTotal();
</script>
</body>
</html>
