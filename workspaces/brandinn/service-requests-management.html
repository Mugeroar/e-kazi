<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BrandInn Agency | Professional Quotes & Service Requests</title>
  
  <meta name="theme-color" content="#7c3aed">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #7c3aed;
      --primary-dark: #5b21b6;
      --primary-bg: #f5f0ff;
      --success: #10b981;
      --danger: #ef4444;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      color: var(--gray-800);
      line-height: 1.5;
      min-height: 100vh;
    }

    .navbar {
      background: white;
      padding: 0.8rem 4%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--gray-200);
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-img { height: 38px; width: 38px; border-radius: 12px; object-fit: contain; }
    .logo-text { font-weight: 800; font-size: 1.2rem; color: var(--gray-800); }
    .logo-text span { font-weight: 600; font-size: 0.75rem; color: var(--primary); margin-left: 5px; }

    .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 4%; }

    .page-header { margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    .page-header h1 i { color: var(--primary); }

    .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 1.8rem; align-items: start; }

    .form-card {
      background: white;
      border-radius: 24px;
      border: 1px solid var(--gray-200);
      padding: 1.6rem;
    }
    .form-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 0.65rem;
      border-bottom: 2px solid var(--primary-bg);
    }
    .form-card h2 i { color: var(--primary); }

    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: 0.7rem; font-weight: 700; color: var(--gray-600);
      margin-bottom: 0.3rem; text-transform: uppercase;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.75rem 1rem; border-radius: 14px;
      border: 1px solid var(--gray-200); font-size: 0.85rem;
      font-family: 'Inter', sans-serif; background: var(--gray-50);
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--primary); outline: none; background: white;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .service-checkboxes {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      max-height: 300px;
      overflow-y: auto;
      margin: 0.5rem 0;
    }
    .service-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.7rem 0.8rem;
      background: white;
      border-radius: 14px;
      border: 1px solid var(--gray-200);
      cursor: pointer;
    }
    .service-checkbox:hover { border-color: var(--primary); background: var(--primary-bg); }
    .service-checkbox.selected { background: var(--primary-bg); border-color: var(--primary); }
    .service-info { flex: 1; }
    .service-name { font-weight: 600; font-size: 0.8rem; }
    .service-price { font-size: 0.65rem; color: var(--primary); font-weight: 600; }
    .qty-control { display: flex; align-items: center; gap: 6px; }
    .qty-control button {
      width: 28px; height: 28px; border-radius: 10px; border: 1px solid var(--gray-300);
      background: white; cursor: pointer;
    }
    .qty-control button:hover { background: var(--primary); color: white; }
    .qty-control input { width: 46px; text-align: center; padding: 0.3rem; border-radius: 10px; border: 1px solid var(--gray-300); }

    .selected-services-list { margin: 0.8rem 0; max-height: 140px; overflow-y: auto; }
    .selected-service-item {
      display: flex; justify-content: space-between;
      padding: 0.5rem 0.7rem; background: var(--gray-50); border-radius: 12px;
      margin-bottom: 0.4rem; font-size: 0.75rem;
    }
    .selected-service-item .remove { color: var(--danger); cursor: pointer; }

    .price-display {
      background: linear-gradient(135deg, var(--primary-bg), #ede7ff);
      border-radius: 18px; padding: 1rem; text-align: center; margin: 1rem 0;
    }
    .price-display .total-amount { font-size: 1.8rem; font-weight: 800; color: var(--primary-dark); }

    .btn-submit, .btn-pdf {
      background: var(--primary); color: white; border: none; padding: 0.85rem;
      border-radius: 50px; font-weight: 700; cursor: pointer;
      width: 100%; margin-top: 0.8rem; transition: all 0.2s;
    }
    .btn-pdf { background: #1e293b; margin-top: 0.6rem; }
    .btn-pdf:hover { background: #0f172a; }
    .btn-submit:hover { background: var(--primary-dark); }

    .recent-panel {
      background: white;
      border-radius: 24px;
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .recent-header { padding: 1.2rem 1.2rem 0.8rem; border-bottom: 1px solid var(--gray-200); }
    .requests-table-container { max-height: 520px; overflow-y: auto; }
    .requests-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    .requests-table th { text-align: left; padding: 0.9rem 1rem; background: var(--gray-50); }
    .requests-table td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--gray-100); }
    .clickable-row:hover { background: var(--primary-bg); cursor: pointer; }
    .empty-state { text-align: center; padding: 3rem; color: var(--gray-500); }

    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--success); color: white; padding: 0.75rem 1.3rem; border-radius: 50px; z-index: 2000; }
    .toast.error { background: var(--danger); }

    @media (max-width: 1000px) { .two-columns { grid-template-columns: 1fr; } .service-checkboxes { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="#" class="logo">
    <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="BrandInn" class="logo-img">
    <span class="logo-text">BrandInn <span>Agency</span></span>
  </a>
</nav>

<div class="container">
  <div class="page-header">
    <h1><i class="fas fa-file-pdf"></i> Quote & Request Manager</h1>
  </div>

  <div class="two-columns">
    <div class="form-card">
      <h2><i class="fas fa-plus-circle"></i> New Quote</h2>
      <div class="form-row">
        <div class="form-group"><label>Client Name *</label><input type="text" id="clientName" placeholder="Full name"></div>
        <div class="form-group"><label>Phone *</label><input type="tel" id="phone" placeholder="+254 700 000000"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="client@email.com"></div>
        <div class="form-group"><label>Business Name</label><input type="text" id="businessName" placeholder="Company name"></div>
      </div>

      <div class="service-checkboxes" id="servicesCheckboxes"></div>
      <div class="selected-services-list" id="selectedServicesList"></div>

      <div class="form-row">
        <div class="form-group"><label>Urgency</label>
          <select id="urgency">
            <option value="normal">Normal (7-14 days)</option>
            <option value="urgent">Urgent (3-5 days) +15%</option>
            <option value="express">Express (1-2 days) +30%</option>
          </select>
        </div>
        <div class="form-group"><label>Extra Fee (KES)</label><input type="number" id="serviceFee" value="0" min="0"></div>
      </div>

      <div class="form-group"><label>Notes</label><textarea id="instructions" rows="2" placeholder="Additional requirements..."></textarea></div>

      <div class="price-display">
        <div class="total-amount" id="displayTotal">KES 0</div>
      </div>

      <button class="btn-submit" id="submitBtn"><i class="fas fa-save"></i> Save Request</button>
      <button class="btn-pdf" id="generatePdfBtn"><i class="fas fa-file-pdf"></i> Generate PDF Quote</button>
    </div>

    <div class="recent-panel">
      <div class="recent-header">
        <h2><i class="fas fa-history"></i> Recent Requests</h2>
      </div>
      <div class="requests-table-container">
        <div id="recentRequestsTable" class="requests-table"><div class="empty-state">Loading...</div></div>
      </div>
    </div>
  </div>
</div>
<div id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
    authDomain: "mugera-e51cc.firebaseapp.com",
    databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "mugera-e51cc",
    storageBucket: "mugera-e51cc.firebasestorage.app",
    messagingSenderId: "1024868637509",
    appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  const servicesCatalog = [
    { id: 'web_basic', name: 'Basic Website', price: 8000 },
    { id: 'web_ecommerce', name: 'E-Commerce Store', price: 17000 },
    { id: 'landing_page', name: 'Landing Page', price: 5000 },
    { id: 'logo_design', name: 'Logo Design', price: 2500 },
    { id: 'brand_identity', name: 'Brand Identity', price: 5000 },
    { id: 'social_media', name: 'Social Media Management', price: 5000 },
    { id: 'seo', name: 'SEO Package', price: 3500 },
    { id: 'meta_ads', name: 'Meta Ads Management', price: 2500 },
    { id: 'print_banner', name: 'Banner Printing', price: 600 },
    { id: 'print_cards', name: 'Business Cards', price: 450 }
  ];

  let selectedServices = {};
  let allRequests = {};
  let logoBase64 = ''; // Will hold the converted logo

  // Convert logo to Base64 on page load - THIS SOLVES THE PDF IMAGE ISSUE
  function convertLogoToBase64() {
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = 'Anonymous';
      img.src = 'https://i.postimg.cc/W4LbBJ32/Brand-Inn-Business.webp';
      img.onload = function() {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        logoBase64 = canvas.toDataURL('image/webp');
        resolve(logoBase64);
      };
      img.onerror = function() {
        // Fallback to original logo if conversion fails
        logoBase64 = 'https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png';
        resolve(logoBase64);
      };
    });
  }

  function showToast(msg, isError = false) {
    const container = document.getElementById('toastContainer');
    const existing = container.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `toast ${isError ? 'error' : ''}`;
    toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

  function renderServices() {
    const container = document.getElementById('servicesCheckboxes');
    container.innerHTML = servicesCatalog.map(svc => `
      <div class="service-checkbox ${selectedServices[svc.id] ? 'selected' : ''}" onclick="toggleService('${svc.id}')">
        <input type="checkbox" ${selectedServices[svc.id] ? 'checked' : ''} onclick="event.stopPropagation(); toggleService('${svc.id}')">
        <div class="service-info"><div class="service-name">${escapeHtml(svc.name)}</div><div class="service-price">KES ${svc.price.toLocaleString()}</div></div>
        <div class="qty-control" onclick="event.stopPropagation()">
          <button onclick="changeQty('${svc.id}', -1)">−</button>
          <input type="number" value="${selectedServices[svc.id]?.quantity || 1}" min="1" max="99" onchange="updateQty('${svc.id}', this.value)">
          <button onclick="changeQty('${svc.id}', 1)">+</button>
        </div>
      </div>
    `).join('');
  }

  window.toggleService = function(id) {
    const svc = servicesCatalog.find(s => s.id === id);
    if (!svc) return;
    if (selectedServices[id]) delete selectedServices[id];
    else selectedServices[id] = { ...svc, quantity: 1 };
    renderServices();
    renderSelected();
    calcTotal();
  };

  window.changeQty = function(id, delta) {
    if (!selectedServices[id]) return;
    let q = selectedServices[id].quantity + delta;
    q = Math.min(99, Math.max(1, q));
    selectedServices[id].quantity = q;
    renderServices();
    renderSelected();
    calcTotal();
  };

  window.updateQty = function(id, val) {
    if (!selectedServices[id]) return;
    let q = parseInt(val) || 1;
    q = Math.min(99, Math.max(1, q));
    selectedServices[id].quantity = q;
    renderServices();
    renderSelected();
    calcTotal();
  };

  function renderSelected() {
    const container = document.getElementById('selectedServicesList');
    const items = Object.values(selectedServices);
    if (!items.length) { container.innerHTML = '<div style="text-align:center; color:var(--gray-500);">No services selected</div>'; return; }
    container.innerHTML = items.map(s => `<div class="selected-service-item"><span><strong>${escapeHtml(s.name)}</strong> x${s.quantity}</span><span>KES ${(s.price * s.quantity).toLocaleString()} <span class="remove" onclick="toggleService('${s.id}')">✕</span></span></div>`).join('');
  }

  function calcTotal() {
    let subtotal = 0;
    Object.values(selectedServices).forEach(s => { subtotal += s.price * s.quantity; });
    const urgency = document.getElementById('urgency').value;
    let mult = urgency === 'urgent' ? 1.15 : urgency === 'express' ? 1.30 : 1;
    const fee = parseInt(document.getElementById('serviceFee').value) || 0;
    const total = (subtotal * mult) + fee;
    document.getElementById('displayTotal').textContent = `KES ${Math.round(total).toLocaleString()}`;
    return { subtotal, total: Math.round(total), mult, fee };
  }

  async function saveRequest() {
    const name = document.getElementById('clientName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    if (!name || !phone) { showToast('Name and phone required', true); return; }
    if (!Object.keys(selectedServices).length) { showToast('Select a service', true); return; }
    const { subtotal, total, mult, fee } = calcTotal();
    const data = {
      clientName: name, phone, email: document.getElementById('email').value.trim(),
      businessName: document.getElementById('businessName').value.trim(),
      services: Object.values(selectedServices).map(s => ({ name: s.name, price: s.price, quantity: s.quantity })),
      urgency: document.getElementById('urgency').value, serviceFee: fee, subtotal, total,
      instructions: document.getElementById('instructions').value.trim(),
      createdAt: firebase.database.ServerValue.TIMESTAMP
    };
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
    try {
      await database.ref('brandinn_service_requests').push().set(data);
      showToast('Saved!');
      document.getElementById('clientName').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('email').value = '';
      document.getElementById('businessName').value = '';
      document.getElementById('instructions').value = '';
      document.getElementById('urgency').value = 'normal';
      document.getElementById('serviceFee').value = '0';
      selectedServices = {};
      renderServices(); renderSelected(); calcTotal();
    } catch(e) { showToast('Error saving', true); }
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Save Request';
  }

  function renderRecent() {
    const container = document.getElementById('recentRequestsTable');
    const requests = Object.entries(allRequests).map(([id, r]) => ({ id, ...r })).sort((a,b)=> (b.createdAt||0)-(a.createdAt||0)).slice(0,10);
    if (!requests.length) { container.innerHTML = '<div class="empty-state">No requests yet</div>'; return; }
    container.innerHTML = `<table><thead><tr><th>Client</th><th>Items</th><th>Total</th><th></th></tr></thead><tbody>
      ${requests.map(r => `<tr class="clickable-row" onclick="loadRequest('${r.id}')">
        <td><strong>${escapeHtml(r.clientName)}</strong><br><span style="font-size:0.65rem;">${escapeHtml(r.businessName || '')}</span></td>
        <td>${r.services?.length || 0} service(s)</td>
        <td>KES ${(r.total || 0).toLocaleString()}</td>
        <td><i class="fas fa-arrow-right"></i></td>
      </tr>`).join('')}
    </tbody></table>`;
  }

  window.loadRequest = function(id) {
    const req = allRequests[id];
    if (!req) return;
    document.getElementById('clientName').value = req.clientName || '';
    document.getElementById('phone').value = req.phone || '';
    document.getElementById('email').value = req.email || '';
    document.getElementById('businessName').value = req.businessName || '';
    document.getElementById('instructions').value = req.instructions || '';
    document.getElementById('urgency').value = req.urgency || 'normal';
    document.getElementById('serviceFee').value = req.serviceFee || 0;
    const newSel = {};
    if (req.services) {
      req.services.forEach(svc => {
        const cat = servicesCatalog.find(c => c.name === svc.name);
        if (cat) newSel[cat.id] = { ...cat, quantity: svc.quantity || 1 };
      });
    }
    selectedServices = newSel;
    renderServices(); renderSelected(); calcTotal();
    showToast(`Loaded: ${req.clientName}`);
  };

  // PDF GENERATION - USING BASE64 LOGO (NO CORS ISSUES)
  window.generatePDF = async function() {
    const name = document.getElementById('clientName').value.trim();
    if (!name) { showToast('Enter client name first', true); return; }
    if (!Object.keys(selectedServices).length) { showToast('Add services first', true); return; }
    const { total, subtotal, mult, fee } = calcTotal();
    const urgency = document.getElementById('urgency').value;
    const urgencyLabel = urgency === 'normal' ? 'Standard (7-14 days)' : urgency === 'urgent' ? 'Urgent (3-5 days) +15%' : 'Express (1-2 days) +30%';
    const urgencyFee = subtotal * (mult - 1);
    const quoteNum = `BINN-${Math.floor(Math.random()*10000)}`;
    const date = new Date().toLocaleDateString();
    
    // Use the Base64 logo (converted at page load)
    const logoImg = logoBase64 || 'https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png';
    
    const pdfHtml = `
      <div style="font-family: 'Inter', sans-serif; background: white; padding: 2rem; max-width: 100%;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #7c3aed; padding-bottom: 1rem; margin-bottom: 1.5rem;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <img src="${logoImg}" style="height: 50px; width: 50px; object-fit: contain;" alt="BrandInn">
            <div><h2 style="color: #5b21b6; font-size: 1.5rem;">BRANDINN AGENCY</h2><p style="color: #64748b;">Creative Digital Solutions</p></div>
          </div>
          <div><h3 style="color: #7c3aed;">PROFESSIONAL QUOTE</h3><p>#${quoteNum}</p><p>${date}</p></div>
        </div>
        <div style="background: #f8fafc; padding: 1rem; border-radius: 12px; margin: 1rem 0; border-left: 4px solid #7c3aed;">
          <h4>PREPARED FOR</h4>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
            <div><strong>${escapeHtml(name)}</strong><br>${escapeHtml(document.getElementById('businessName').value || '—')}<br>${escapeHtml(document.getElementById('phone').value)}</div>
            <div><strong>Urgency:</strong> ${urgencyLabel}<br><strong>Notes:</strong> ${escapeHtml(document.getElementById('instructions').value || 'None')}</div>
          </div>
        </div>
        <table style="width: 100%; border-collapse: collapse; margin: 1rem 0;">
          <thead><tr style="background: #f1f5f9;"><th style="padding: 0.7rem; text-align: left;">Service</th><th>Qty</th><th>Unit (KES)</th><th>Total (KES)</th></tr></thead>
          <tbody>
            ${Object.values(selectedServices).map(s => `<tr><td style="padding: 0.5rem;"><strong>${escapeHtml(s.name)}</strong></td><td>${s.quantity}</td><td>${s.price.toLocaleString()}</td><td>${(s.price * s.quantity).toLocaleString()}</td></tr>`).join('')}
            ${urgencyFee > 0 ? `<tr><td colspan="3" style="text-align:right;">Urgency surcharge (${urgency === 'urgent' ? '15%' : '30%'})</td><td>${Math.round(urgencyFee).toLocaleString()}</td></tr>` : ''}
            ${fee > 0 ? `<tr><td colspan="3" style="text-align:right;">Additional fee</td><td>${fee.toLocaleString()}</td></tr>` : ''}
          </tbody>
        </table>
        <div style="text-align: right; padding: 1rem; background: #f5f0ff; border-radius: 12px;">
          <div style="font-size: 1.8rem; font-weight: 800; color: #5b21b6;">KES ${total.toLocaleString()}</div>
          <div style="font-size: 0.7rem;">Subtotal: KES ${subtotal.toLocaleString()}</div>
        </div>
        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.65rem; color: #94a3b8; border-top: 1px solid #e2e8f0; padding-top: 1rem;">
          BrandInn Agency | Valid for 30 days | 50% deposit required
        </div>
      </div>
    `;
    const el = document.createElement('div');
    el.innerHTML = pdfHtml;
    const btn = document.getElementById('generatePdfBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
    html2pdf().set({ margin: 0.5, filename: `Quote_${name.replace(/\s/g,'_')}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(el).save().then(() => { showToast(`PDF ready for ${name}`); btn.disabled = false; btn.innerHTML = '<i class="fas fa-file-pdf"></i> Generate PDF Quote'; }).catch(() => { showToast('PDF error', true); btn.disabled = false; btn.innerHTML = '<i class="fas fa-file-pdf"></i> Generate PDF Quote'; });
  };

  database.ref('brandinn_service_requests').on('value', snap => { allRequests = snap.val() || {}; renderRecent(); });
  document.getElementById('submitBtn').onclick = saveRequest;
  document.getElementById('generatePdfBtn').onclick = generatePDF;
  document.getElementById('urgency').onchange = calcTotal;
  document.getElementById('serviceFee').oninput = calcTotal;

  // Initialize: convert logo to Base64 first, then render UI
  convertLogoToBase64().then(() => {
    renderServices();
    renderSelected();
    calcTotal();
  });
</script>
</body>
</html>
