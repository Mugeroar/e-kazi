<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>List Business | BrandInn</title>
  
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #7c3aed;
      --primary-dark: #5b21b6;
      --primary-light: #a78bfa;
      --primary-bg: #f5f0ff;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #e9d5ff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gray-100: #f8fafc;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #faf9fe 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #a78bfa, #5b21b6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #7c3aed; -webkit-text-fill-color: #7c3aed; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(124, 58, 237, 0.08); border: 1px solid rgba(124, 58, 237, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--primary-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--primary); color: white; }

    .container { padding: 1rem 2%; flex: 1; max-width: 1400px; margin: 0 auto; width: 100%; }

    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--primary-dark); margin-right: 6px; }
    .page-header p { color: var(--text-muted); font-size: 0.75rem; }

    .form-layout { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; }

    .form-card {
      background: white; border-radius: 16px; padding: 1rem;
      border: 1px solid var(--border-light); box-shadow: 0 3px 12px rgba(91,33,182,0.03);
      display: flex; flex-direction: column;
    }
    .form-card h3 { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.7rem; display: flex; align-items: center; gap: 6px; color: var(--primary-dark); flex-shrink: 0; }
    .form-card h3 i { color: var(--primary); font-size: 0.7rem; }

    .form-card-scroll { flex: 1; overflow-y: auto; padding-right: 4px; max-height: 420px; }
    .form-card-scroll::-webkit-scrollbar { width: 3px; }
    .form-card-scroll::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

    .form-group { margin-bottom: 0.5rem; }
    .form-group label {
      display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
      border: 1.5px solid var(--gray-200); font-size: 0.8rem; font-family: 'Inter', sans-serif;
      background: var(--gray-100); transition: all 0.15s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--primary); outline: none; background: white;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.06);
    }
    .form-group textarea { resize: none; height: 55px; }

    .inline-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }

    /* Service Tags */
    .service-tag {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--primary-bg); padding: 0.25rem 0.6rem;
      border-radius: 20px; font-size: 0.65rem; font-weight: 600;
      color: var(--primary-dark); margin: 0.2rem; cursor: pointer;
      transition: all 0.2s; border: 1px solid transparent;
    }
    .service-tag:hover { background: var(--primary-light); color: white; }
    .service-tag.selected { background: var(--primary); color: white; border-color: var(--primary-dark); }
    .service-tag i { font-size: 0.55rem; }

    .services-grid {
      display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.3rem;
      max-height: 180px; overflow-y: auto; padding: 0.3rem;
      border: 1px solid var(--gray-200); border-radius: 12px;
      background: var(--gray-100);
    }
    .services-grid::-webkit-scrollbar { width: 3px; }

    /* Plan Cards */
    .plan-options { display: flex; gap: 0.6rem; margin-top: 0.3rem; }
    .plan-card {
      flex: 1; background: var(--gray-100); border-radius: 12px; padding: 0.6rem;
      border: 2px solid transparent; cursor: pointer; text-align: center;
      transition: all 0.2s;
    }
    .plan-card:hover { border-color: var(--primary-light); }
    .plan-card.selected { border-color: var(--primary); background: var(--primary-bg); }
    .plan-card .plan-name { font-weight: 800; font-size: 0.8rem; }
    .plan-card .plan-price { font-size: 0.65rem; color: var(--primary); font-weight: 700; }
    .plan-card .plan-features { font-size: 0.55rem; color: var(--text-muted); margin-top: 0.2rem; }

    .status-toggle {
      display: flex; gap: 0.5rem; align-items: center; margin-top: 0.3rem;
    }
    .status-option {
      flex: 1; text-align: center; padding: 0.4rem; border-radius: 10px;
      cursor: pointer; background: var(--gray-100); font-size: 0.7rem;
      font-weight: 600; transition: all 0.2s;
    }
    .status-option.active { background: var(--success); color: white; }
    .status-option.inactive { background: var(--gray-200); color: var(--text-muted); }
    .status-option.pending { background: var(--warning); color: white; }

    .btn-row { display: flex; gap: 6px; flex-shrink: 0; margin-top: 0.5rem; }
    .btn {
      padding: 0.6rem 1rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; transition: all 0.15s; font-family: inherit; justify-content: center;
    }
    .btn-primary { background: var(--primary); color: white; flex: 2; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
    .btn-secondary { background: #f1f5f9; color: #475569; flex: 1; }
    .btn-secondary:hover { background: #e2e8f0; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--success); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(16,185,129,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--danger); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 900px) { .form-layout { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .form-layout { grid-template-columns: 1fr; } .container { padding: 0.8rem; } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/workspaces/brandinn/index.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="BrandInn" class="logo-img">
      <span class="logo-text">BrandInn <span>Agency</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/brandinn/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="/workspaces/brandinn/business-listings.html" class="nav-btn"><i class="fas fa-store"></i> Business Listings</a>
      <a href="/workspaces/brandinn/service-requests.html" class="nav-btn"><i class="fas fa-headset"></i> Service Requests</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-plus-circle"></i> List New Business</h1>
      <p>Add a business to the BrandInn ecosystem — assign services, plan, and status</p>
    </div>

    <div class="form-layout">
      
      <!-- COLUMN 1: Business Details -->
      <div class="form-card">
        <h3><i class="fas fa-building"></i> Business Details</h3>
        <div class="form-card-scroll">
          <div class="form-group"><label>Business Name *</label><input type="text" id="businessName" placeholder="Official business name"></div>
          <div class="inline-row">
            <div class="form-group"><label>Owner Name</label><input type="text" id="ownerName" placeholder="Full name"></div>
            <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" placeholder="+254 700 000000"></div>
          </div>
          <div class="inline-row">
            <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="business@email.com"></div>
            <div class="form-group"><label>Alternative Phone</label><input type="tel" id="altPhone" placeholder="Optional"></div>
          </div>
          <div class="form-group"><label>Location / Address</label><input type="text" id="location" placeholder="e.g., Westlands, Nairobi"></div>
          <div class="form-group"><label>Business Type / Industry</label>
            <select id="industry">
              <option value="">Select industry</option>
              <option value="retail">Retail</option>
              <option value="restaurant">Restaurant / Café</option>
              <option value="fashion">Fashion / Apparel</option>
              <option value="tech">Technology / IT</option>
              <option value="healthcare">Healthcare</option>
              <option value="education">Education</option>
              <option value="realestate">Real Estate</option>
              <option value="manufacturing">Manufacturing</option>
              <option value="logistics">Logistics</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group"><label>Business Description</label><textarea id="description" placeholder="Brief description of what they do..."></textarea></div>
        </div>
      </div>

      <!-- COLUMN 2: Services & Plan -->
      <div class="form-card">
        <h3><i class="fas fa-cogs"></i> Services & Subscription</h3>
        <div class="form-card-scroll">
          <div class="form-group"><label>Select Services (from our ecosystem)</label>
            <div class="services-grid" id="servicesGrid"></div>
          </div>
          
          <div class="form-group" style="margin-top:0.5rem;"><label>Subscription Plan</label>
            <div class="plan-options" id="planOptions"></div>
          </div>
          
          <div class="form-group"><label>Custom Monthly Fee (KES)</label>
            <input type="number" id="customFee" value="0" min="0" placeholder="Override plan price">
          </div>
          
          <div class="form-group"><label>Start Date</label>
            <input type="date" id="startDate">
          </div>
          
          <div class="form-group"><label>Special Notes / Requirements</label>
            <textarea id="notes" placeholder="Any additional information about this business..."></textarea>
          </div>
        </div>
      </div>

      <!-- COLUMN 3: Status & Submit -->
      <div class="form-card">
        <h3><i class="fas fa-flag-checkered"></i> Status & Submit</h3>
        <div class="form-card-scroll">
          <div class="form-group"><label>Business Status</label>
            <div class="status-toggle">
              <div class="status-option active" data-status="active" onclick="setStatus('active')">✅ Active</div>
              <div class="status-option pending" data-status="pending" onclick="setStatus('pending')">⏳ Pending</div>
              <div class="status-option inactive" data-status="inactive" onclick="setStatus('inactive')">❌ Inactive</div>
            </div>
          </div>
          
          <div class="form-group"><label>Tier / Priority</label>
            <select id="tier">
              <option value="basic">Basic</option>
              <option value="standard">Standard</option>
              <option value="premium">Premium</option>
            </select>
          </div>
          
          <div class="form-group"><label>Assigned Staff</label>
            <input type="text" id="assignedStaff" placeholder="Account manager name">
          </div>
          
          <div class="form-group"><label>Business Domain (if any)</label>
            <input type="text" id="domain" placeholder="e.g., businessname.com">
          </div>
          
          <div class="price-display" style="background: linear-gradient(135deg, var(--primary-bg), #f3e8ff); border-radius: 12px; padding: 0.7rem; text-align: center; margin-top: 0.5rem;">
            <div style="font-size: 0.65rem; color: var(--text-muted);">Monthly Subscription</div>
            <div class="total-amount" id="displayTotal" style="font-size: 1.6rem; font-weight: 900; color: var(--primary-dark);">KES 0</div>
            <div class="breakdown" id="breakdown" style="font-size: 0.65rem; color: var(--text-muted);">Select plan & services</div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="submitBtn" onclick="submitBusiness()"><i class="fas fa-save"></i> Register Business</button>
          <button class="btn btn-secondary" onclick="resetForm()"><i class="fas fa-undo"></i> Reset</button>
        </div>
      </div>

    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // ========== AVAILABLE SERVICES IN ECOSYSTEM ==========
    const ecosystemServices = [
      { id: 'web_landing', name: 'Landing Page', basePrice: 800, category: 'Web' },
      { id: 'web_business', name: 'Business Website', basePrice: 8000, category: 'Web' },
      { id: 'web_ecommerce', name: 'E-Commerce Store', basePrice: 17000, category: 'Web' },
      { id: 'ads_meta', name: 'Meta Ads Management', basePrice: 2500, category: 'Ads' },
      { id: 'marketing_social', name: 'Social Media Management', basePrice: 5000, category: 'Marketing' },
      { id: 'marketing_seo', name: 'SEO & Google Business', basePrice: 3500, category: 'Marketing' },
      { id: 'branding_logo', name: 'Logo Design', basePrice: 2500, category: 'Branding' },
      { id: 'branding_identity', name: 'Brand Identity Package', basePrice: 5000, category: 'Branding' },
      { id: 'print_banner', name: 'Banner Printing', basePrice: 600, category: 'Print' },
      { id: 'print_cards', name: 'Business Cards', basePrice: 450, category: 'Print' },
      { id: 'print_tshirt', name: 'T-Shirt Printing', basePrice: 1300, category: 'Print' },
    ];

    // Plan pricing base
    const plans = {
      basic: { name: 'Basic', price: 800, features: '1 service, basic support' },
      standard: { name: 'Standard', price: 2500, features: '3 services, priority support' },
      premium: { name: 'Premium', price: 5000, features: 'Unlimited services, dedicated manager' }
    };

    let selectedServices = [];
    let currentPlan = 'basic';
    let currentStatus = 'active';

    function showToast(msg, isError = false) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function renderServicesGrid() {
      const container = document.getElementById('servicesGrid');
      container.innerHTML = ecosystemServices.map(svc => `
        <div class="service-tag ${selectedServices.includes(svc.id) ? 'selected' : ''}" 
             data-id="${svc.id}" onclick="toggleService('${svc.id}')">
          <i class="fas ${svc.id.includes('web') ? 'fa-globe' : svc.id.includes('ads') ? 'fa-rectangle-ad' : svc.id.includes('marketing') ? 'fa-chart-line' : svc.id.includes('branding') ? 'fa-paintbrush' : 'fa-print'}"></i>
          ${svc.name}
        </div>
      `).join('');
    }

    function renderPlanOptions() {
      const container = document.getElementById('planOptions');
      container.innerHTML = Object.entries(plans).map(([key, plan]) => `
        <div class="plan-card ${currentPlan === key ? 'selected' : ''}" data-plan="${key}" onclick="selectPlan('${key}')">
          <div class="plan-name">${plan.name}</div>
          <div class="plan-price">KES ${plan.price.toLocaleString()}/mo</div>
          <div class="plan-features">${plan.features}</div>
        </div>
      `).join('');
    }

    function toggleService(serviceId) {
      if (selectedServices.includes(serviceId)) {
        selectedServices = selectedServices.filter(id => id !== serviceId);
      } else {
        selectedServices.push(serviceId);
      }
      renderServicesGrid();
      calculateTotal();
    }

    function selectPlan(planKey) {
      currentPlan = planKey;
      renderPlanOptions();
      calculateTotal();
    }

    function setStatus(status) {
      currentStatus = status;
      document.querySelectorAll('.status-option').forEach(opt => {
        opt.classList.remove('active');
        if (opt.dataset.status === status) opt.classList.add('active');
      });
    }

    function calculateTotal() {
      const selectedServiceObjects = ecosystemServices.filter(s => selectedServices.includes(s.id));
      const planPrice = plans[currentPlan]?.price || 800;
      const servicesTotal = selectedServiceObjects.reduce((sum, s) => sum + s.basePrice, 0);
      let total = planPrice + servicesTotal;
      
      const customFee = parseInt(document.getElementById('customFee').value) || 0;
      total += customFee;
      
      document.getElementById('displayTotal').textContent = `KES ${total.toLocaleString()}`;
      
      let breakdownText = `${plans[currentPlan].name} plan: KES ${planPrice.toLocaleString()}`;
      if (selectedServiceObjects.length > 0) {
        breakdownText += ` + ${selectedServiceObjects.length} service${selectedServiceObjects.length > 1 ? 's' : ''} (KES ${servicesTotal.toLocaleString()})`;
      }
      if (customFee > 0) breakdownText += ` + custom fee (KES ${customFee.toLocaleString()})`;
      document.getElementById('breakdown').textContent = breakdownText;
    }

    async function submitBusiness() {
      const businessName = document.getElementById('businessName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      
      if (!businessName) { showToast('Enter business name', true); return; }
      if (!phone) { showToast('Enter phone number', true); return; }
      
      const selectedServiceObjects = ecosystemServices.filter(s => selectedServices.includes(s.id));
      
      const businessData = {
        businessName,
        ownerName: document.getElementById('ownerName').value.trim(),
        phone,
        altPhone: document.getElementById('altPhone').value.trim(),
        email: document.getElementById('email').value.trim(),
        location: document.getElementById('location').value.trim(),
        industry: document.getElementById('industry').value,
        description: document.getElementById('description').value.trim(),
        selectedServices: selectedServiceObjects,
        selectedServiceIds: selectedServices,
        plan: currentPlan,
        planPrice: plans[currentPlan].price,
        customFee: parseInt(document.getElementById('customFee').value) || 0,
        totalMonthly: parseInt(document.getElementById('displayTotal').textContent.replace('KES ', '').replace(',', '')) || 0,
        status: currentStatus,
        tier: document.getElementById('tier').value,
        assignedStaff: document.getElementById('assignedStaff').value.trim(),
        domain: document.getElementById('domain').value.trim(),
        startDate: document.getElementById('startDate').value,
        notes: document.getElementById('notes').value.trim(),
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        createdBy: auth.currentUser?.email || 'brandinn-staff',
        slug: businessName.toLowerCase().replace(/[^a-z0-9]+/g, '-')
      };
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
      
      try {
        // Save to brandinn_subdomains (existing node)
        const newRef = database.ref('brandinn_subdomains').push();
        await newRef.set({
          ...businessData,
          subdomainId: newRef.key
        });
        
        showToast(`✅ "${businessName}" added successfully!`);
        resetForm();
      } catch (e) {
        console.error(e);
        showToast('Failed to register business', true);
      }
      
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-save"></i> Register Business';
    }

    function resetForm() {
      document.getElementById('businessName').value = '';
      document.getElementById('ownerName').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('altPhone').value = '';
      document.getElementById('email').value = '';
      document.getElementById('location').value = '';
      document.getElementById('industry').value = '';
      document.getElementById('description').value = '';
      document.getElementById('customFee').value = '0';
      document.getElementById('startDate').value = '';
      document.getElementById('notes').value = '';
      document.getElementById('assignedStaff').value = '';
      document.getElementById('domain').value = '';
      document.getElementById('tier').value = 'basic';
      
      selectedServices = [];
      currentPlan = 'basic';
      currentStatus = 'active';
      
      renderServicesGrid();
      renderPlanOptions();
      setStatus('active');
      calculateTotal();
    }

    // Event listeners for price recalculation
    document.getElementById('customFee').addEventListener('input', calculateTotal);
    
    // Auth check - redirect if not logged in
    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'https://kazinni.vercel.app';
      }
    });

    // Initialize
    renderServicesGrid();
    renderPlanOptions();
    calculateTotal();
    
    // Expose global functions
    window.toggleService = toggleService;
    window.selectPlan = selectPlan;
    window.setStatus = setStatus;
    window.submitBusiness = submitBusiness;
    window.resetForm = resetForm;
  </script>
</body>
</html>
