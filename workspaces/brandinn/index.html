<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>KazInni Workspaces | BrandInn Dashboard</title>
  
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #7c3aed;
      --primary-dark: #6d28d9;
      --primary-light: #a78bfa;
      --primary-bg: #f5f0ff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #e2e8f0;
      --card-shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
      --card-shadow-hover: 0 20px 25px -12px rgba(124,58,237,0.15), 0 8px 10px -6px rgba(0,0,0,0.02);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #faf9fe 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Skeleton Loading - NO SPINNER */
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
    }
    
    .skeleton-stat-card {
      background: white; border-radius: 24px; padding: 1.5rem;
      border: 1px solid #f1eaff; display: flex; align-items: center; justify-content: space-between;
    }
    .skeleton-icon { width: 58px; height: 58px; border-radius: 18px; }
    .skeleton-text { height: 1rem; margin-bottom: 0.5rem; }
    .skeleton-text-sm { height: 0.7rem; width: 60%; }
    .skeleton-number { height: 2.5rem; width: 40%; }
    .skeleton-action-card {
      background: white; border-radius: 20px; padding: 1.2rem;
      border: 1px solid #f1eaff;
    }
    .skeleton-badge { width: 80px; height: 28px; border-radius: 30px; }

    /* Navbar */
    .navbar {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(16px);
      padding: 0.7rem 4%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--primary-bg);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .logo-img { height: 42px; width: 42px; border-radius: 14px; object-fit: contain; background: white; box-shadow: 0 8px 18px rgba(124,58,237,0.12); }
    .logo-text {
      font-weight: 800; font-size: 1.4rem;
      background: linear-gradient(145deg, #7c3aed, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.8rem; background: #64748b; -webkit-text-fill-color: #64748b; margin-left: 4px; }

    .nav-right { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }

    .rep-profile {
      display: flex; align-items: center; gap: 12px;
      background: var(--primary-bg); padding: 0.3rem 1rem 0.3rem 0.8rem;
      border-radius: 60px;
    }
    .rep-avatar {
      width: 44px; height: 44px; background: linear-gradient(145deg, #7c3aed, #a78bfa);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 1rem;
    }
    .rep-name { font-weight: 700; color: #0f172a; }
    .rep-role { font-size: 0.7rem; color: #7c3aed; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

    .logout-btn {
      background: white; border: 1.5px solid #e2e8f0; padding: 0.5rem 1.3rem;
      border-radius: 40px; color: #475569; font-weight: 600; font-size: 0.85rem;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: #fee2e2; border-color: #ef4444; color: #ef4444; }

    .last-updated { font-size: 0.7rem; color: #94a3b8; display: flex; align-items: center; gap: 5px; }
    .last-updated i { color: #10b981; font-size: 0.5rem; }

    /* Container */
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem 4%; flex: 1; width: 100%; }

    .page-header { margin-bottom: 2rem; }
    .page-header h1 {
      font-size: 2rem; font-weight: 800; letter-spacing: -0.02em;
      color: #0f172a; display: flex; align-items: center; gap: 15px; flex-wrap: wrap;
    }
    .page-header h1 i { color: #7c3aed; background: white; padding: 12px; border-radius: 18px; box-shadow: 0 10px 20px rgba(124,58,237,0.08); }
    .page-header p { color: #475569; margin-top: 0.5rem; margin-left: 70px; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card {
      background: white; border-radius: 24px; padding: 1.2rem 1.5rem;
      border: 1px solid var(--primary-bg); box-shadow: var(--card-shadow);
      display: flex; align-items: center; justify-content: space-between;
      transition: all 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--card-shadow-hover); border-color: var(--primary-light); }
    .stat-left h4 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin-bottom: 0.3rem; }
    .stat-number { font-size: 2rem; font-weight: 800; color: #0f172a; line-height: 1.2; }
    .stat-trend { font-size: 0.7rem; margin-top: 4px; display: flex; align-items: center; gap: 4px; color: #64748b; }
    .stat-icon { width: 52px; height: 52px; background: var(--primary-bg); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: #7c3aed; font-size: 1.5rem; }

    /* Action Grid - 7 cards */
    .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
    @media (min-width: 1400px) { .action-grid { grid-template-columns: repeat(7, 1fr); } }
    @media (max-width: 1200px) { .action-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) { .action-grid { grid-template-columns: 1fr; } }

    .action-card {
      background: white; border-radius: 20px; padding: 1.2rem;
      border: 1px solid var(--primary-bg); box-shadow: var(--card-shadow);
      transition: all 0.25s; text-decoration: none; color: inherit; display: block; cursor: pointer;
    }
    .action-card:hover { transform: translateY(-4px); box-shadow: var(--card-shadow-hover); border-color: var(--primary-light); }
    .action-icon {
      width: 48px; height: 48px; background: var(--primary-bg);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 1rem; color: #7c3aed; font-size: 1.3rem;
    }
    .action-card h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.3rem; }
    .action-card p { color: #64748b; font-size: 0.7rem; margin-bottom: 0.8rem; line-height: 1.4; }
    .action-link { display: inline-flex; align-items: center; gap: 4px; font-weight: 600; color: #7c3aed; font-size: 0.7rem; }

    /* Card variations */
    .map-card .action-icon { color: #10b981; background: #ecfdf5; }
    .map-card .action-link { color: #10b981; }
    .asset-card .action-icon { color: #d97706; background: #fffbeb; }
    .asset-card .action-link { color: #d97706; }
    .project-card .action-icon { color: #3b82f6; background: #eff6ff; }
    .project-card .action-link { color: #3b82f6; }
    .booking-card .action-icon { color: #8b5cf6; background: #f5f0ff; }
    .booking-card .action-link { color: #8b5cf6; }
    .service-card .action-icon { color: #ec4899; background: #fdf2f8; }
    .service-card .action-link { color: #ec4899; }
    .list-card .action-icon { color: #059669; background: #ecfdf5; }
    .list-card .action-link { color: #059669; }

    .quick-section {
      background: white; border-radius: 24px; padding: 1.2rem 1.5rem;
      border: 1px solid var(--primary-bg); margin-bottom: 2rem;
    }
    .quick-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; font-weight: 700; }
    .quick-header i { color: #7c3aed; background: var(--primary-bg); padding: 8px; border-radius: 12px; }
    .quick-links { display: flex; flex-wrap: wrap; gap: 10px; }
    .quick-btn {
      background: #f8fafc; border: 1px solid #e2e8f0; padding: 0.5rem 1rem;
      border-radius: 40px; color: #1e293b; font-weight: 500; font-size: 0.75rem;
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s;
    }
    .quick-btn i { color: #7c3aed; }
    .quick-btn:hover { background: #7c3aed; color: white; border-color: #7c3aed; }
    .quick-btn:hover i { color: white; }

    .recent-section { margin-top: 1.5rem; }
    .recent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .recent-header h3 { font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .recent-list { background: white; border-radius: 20px; border: 1px solid var(--primary-bg); overflow: hidden; }
    .recent-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 1.2rem; border-bottom: 1px solid #f1f5f9; cursor: pointer;
      transition: background 0.2s;
    }
    .recent-item:hover { background: var(--primary-bg); }
    .status-tag {
      padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.65rem; font-weight: 600;
    }
    .status-active { background: #d1fae5; color: #065f46; }
    .status-pending { background: #fed7aa; color: #9a3412; }

    .empty-state { text-align: center; padding: 2rem; color: #94a3b8; font-size: 0.8rem; }
    .footer { text-align: center; padding: 1.2rem; color: #94a3b8; font-size: 0.75rem; border-top: 1px solid var(--primary-bg); margin-top: 1rem; }

    /* NO SPINNER - removed loading-overlay completely */
    
    @media (max-width: 1100px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: 1fr; }
      .page-header p { margin-left: 0; }
      .container { padding: 1rem 1.2rem; }
    }
  </style>
</head>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, onValue, get } from "firebase/database";
    import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";

    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let allBusinesses = {};

    function getInitials(name) {
      if (!name) return 'KA';
      return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0,2);
    }

    function formatRelativeTime(timestamp) {
      if (!timestamp) return '';
      const date = new Date(timestamp);
      if (isNaN(date.getTime())) return '';
      const diff = Date.now() - date.getTime();
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(mins / 60);
      const days = Math.floor(hours / 24);
      if (days > 30) return '';
      if (days > 0) return `${days}d ago`;
      if (hours > 0) return `${hours}h ago`;
      if (mins > 0) return `${mins}m ago`;
      return 'Just now';
    }

    function renderStatsAndContent() {
      const businesses = Object.values(allBusinesses).filter(b => b && b.businessName);
      const total = businesses.length;
      const active = businesses.filter(b => b.status === 'active' || !b.status).length;
      const basic = businesses.filter(b => (b.plan || 'basic') === 'basic').length;
      const pro = businesses.filter(b => (b.plan || '') === 'professional').length;

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-left"><h4>Total Businesses</h4><div class="stat-number">${total}</div><div class="stat-trend"><i class="fas fa-building"></i> Registered</div></div><div class="stat-icon"><i class="fas fa-building"></i></div></div>
        <div class="stat-card"><div class="stat-left"><h4>Active Listings</h4><div class="stat-number">${active}</div><div class="stat-trend"><i class="fas fa-check-circle"></i> Live</div></div><div class="stat-icon"><i class="fas fa-check-circle"></i></div></div>
        <div class="stat-card"><div class="stat-left"><h4>Basic Plan</h4><div class="stat-number">${basic}</div><div class="stat-trend"><i class="fas fa-tag"></i> KSh 800/mo</div></div><div class="stat-icon"><i class="fas fa-tag"></i></div></div>
        <div class="stat-card"><div class="stat-left"><h4>Service Requests</h4><div class="stat-number">0</div><div class="stat-trend"><i class="fas fa-clock"></i> Pending</div></div><div class="stat-icon"><i class="fas fa-headset"></i></div></div>
      `;

      // ACTION CARDS:
      // "Create Landing Page" -> leads to listing page (original functionality)
      // "List Business" -> new card for actual business registration (different redirect)
      document.getElementById('actionGrid').innerHTML = `
        <a href="/workspaces/brandinn/list-business.html" class="action-card"><div class="action-icon"><i class="fas fa-plus-circle"></i></div><h3>List Business</h3><p>Register a new business on BrandInn</p><span class="action-link">Register →</span></a>
        <a href="/workspaces/brandinn/business-listings.html" class="action-card list-card"><div class="action-icon"><i class="fas fa-store"></i></div><h3>Business Listings</h3><p>View and manage all registered businesses</p><span class="action-link">Manage →</span></a>
        <a href="/workspaces/brandinn/create-landing-page.html" class="action-card"><div class="action-icon"><i class="fas fa-file-alt"></i></div><h3>Create Landing Page</h3><p>Build custom landing pages for client businesses</p><span class="action-link">Create →</span></a>
        <a href="/workspaces/brandinn/service-requests.html" class="action-card service-card"><div class="action-icon"><i class="fas fa-headset"></i></div><h3>Service Requests</h3><p>Customer support tickets & client inquiries</p><span class="action-link">View →</span></a>
        <a href="/workspaces/brandinn/projects.html" class="action-card project-card"><div class="action-icon"><i class="fas fa-project-diagram"></i></div><h3>Project Management</h3><p>Track branding, website & design projects</p><span class="action-link">Projects →</span></a>
        <a href="/workspaces/brandinn/bookings.html" class="action-card booking-card"><div class="action-icon"><i class="fas fa-calendar-check"></i></div><h3>Bookings</h3><p>Client appointments & consultation scheduling</p><span class="action-link">Bookings →</span></a>
        <a href="/workspaces/brandinn/map.html" class="action-card map-card"><div class="action-icon"><i class="fas fa-map-location-dot"></i></div><h3>Business Map</h3><p>Pin business locations for discovery</p><span class="action-link">Open Map →</span></a>
      `;

      document.getElementById('quickLinks').innerHTML = `
        <a href="/workspaces/brandinn/list-business.html" class="quick-btn"><i class="fas fa-plus-circle"></i> List Business</a>
        <a href="/workspaces/brandinn/business-listings.html" class="quick-btn"><i class="fas fa-store"></i> Listings</a>
        <a href="/workspaces/brandinn/create-landing-page.html" class="quick-btn"><i class="fas fa-file-alt"></i> Landing Page</a>
        <a href="/workspaces/brandinn/service-requests.html" class="quick-btn"><i class="fas fa-headset"></i> Service Requests</a>
        <a href="/workspaces/brandinn/projects.html" class="quick-btn"><i class="fas fa-project-diagram"></i> Projects</a>
        <a href="/workspaces/brandinn/bookings.html" class="quick-btn"><i class="fas fa-calendar-check"></i> Bookings</a>
        <a href="/workspaces/brandinn/asset-handover.html" class="quick-btn"><i class="fas fa-envelope-open-text"></i> Asset Handover</a>
      `;

      const recentList = Object.entries(allBusinesses)
        .filter(([_, d]) => d && d.businessName)
        .map(([slug, data]) => ({ slug, ...data }))
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))
        .slice(0, 5);

      if (recentList.length === 0) {
        document.getElementById('recentList').innerHTML = '<div class="empty-state">No businesses listed yet</div>';
      } else {
        document.getElementById('recentList').innerHTML = recentList.map(biz => {
          const plan = biz.plan || 'basic';
          const timeAgo = formatRelativeTime(biz.createdAt);
          return `
            <div class="recent-item">
              <div style="display:flex; align-items:center; gap:12px;">
                <div style="width:40px;height:40px;background:#f5f0ff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;">${getInitials(biz.businessName)}</div>
                <div><strong>${biz.businessName}</strong><p style="font-size:0.7rem;color:#64748b;">${biz.email || '—'} · ${plan.toUpperCase()} ${timeAgo ? '· ' + timeAgo : ''}</p></div>
              </div>
              <span class="status-tag ${biz.status === 'active' ? 'status-active' : 'status-pending'}">${biz.status || 'active'}</span>
            </div>`;
        }).join('');
      }

      document.getElementById('footerStats').textContent = `${total} businesses · ${active} active · ${basic} basic · ${pro} pro`;
      document.getElementById('lastUpdated').innerHTML = `<i class="fas fa-circle" style="color:#10b981;"></i> Live · ${new Date().toLocaleTimeString()}`;
    }

    function setupFirebaseListeners() {
      onValue(ref(db, 'brandinn_subdomains'), (snapshot) => {
        allBusinesses = snapshot.val() || {};
        renderStatsAndContent();
      });
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userSnap = await get(ref(db, `brandinn_users/${user.uid}`));
        let userName = 'Field Rep';
        if (userSnap.exists()) userName = userSnap.val().name || user.email?.split('@')[0] || 'Field Rep';
        else userName = user.displayName || user.email?.split('@')[0] || 'Field Rep';
        document.getElementById('repName').textContent = userName;
        document.getElementById('repAvatar').textContent = getInitials(userName);
        setupFirebaseListeners();
      } else {
        window.location.href = 'https://kazinni.vercel.app';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if (confirm('Log out of KazInni Workspaces?')) await signOut(auth);
    });
  </script>
</body>
</html>
