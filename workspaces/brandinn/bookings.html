<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bookings | BrandInn Agency</title>
  
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #7c3aed;
      --primary-dark: #5b21b6;
      --primary-light: #a78bfa;
      --primary-bg: #f5f0ff;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #e9d5ff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
      --gray-900: #0f172a;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #faf9fe 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(16px);
      padding: 0.75rem 4%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(124, 58, 237, 0.15);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-img { height: 38px; width: 38px; border-radius: 12px; object-fit: contain; background: white; box-shadow: 0 6px 16px rgba(124, 58, 237, 0.15); }
    .logo-text {
      font-weight: 800; font-size: 1.2rem;
      background: linear-gradient(135deg, #8b5cf6, #5b21b6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.75rem; background: #7c3aed; -webkit-text-fill-color: #7c3aed; margin-left: 5px; }

    .nav-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(124, 58, 237, 0.08); border: 1px solid rgba(124, 58, 237, 0.2);
      padding: 0.45rem 1rem; border-radius: 30px; color: var(--primary-dark);
      font-weight: 600; font-size: 0.75rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 6px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--primary); color: white; }

    .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 4%; flex: 1; width: 100%; }

    .page-header { margin-bottom: 1.8rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .page-header h1 {
      font-size: 1.6rem; font-weight: 800; color: #0f172a;
      display: flex; align-items: center; gap: 12px;
    }
    .page-header h1 i { color: var(--primary-dark); background: white; padding: 10px; border-radius: 16px; box-shadow: 0 6px 14px rgba(124,58,237,0.08); }
    .page-header p { color: var(--gray-500); font-size: 0.85rem; margin-top: 0.3rem; }

    .btn-create {
      background: var(--primary); color: white; border: none;
      padding: 0.7rem 1.5rem; border-radius: 40px; font-weight: 700;
      font-size: 0.85rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 8px; transition: all 0.2s;
    }
    .btn-create:hover { background: var(--primary-dark); transform: translateY(-1px); }

    /* Stats Bar */
    .stats-bar {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: white; border-radius: 20px; padding: 1rem;
      border: 1px solid var(--border-light); text-align: center;
    }
    .stat-card .stat-number { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
    .stat-card .stat-label { font-size: 0.7rem; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Calendar & Bookings Layout */
    .bookings-layout {
      display: grid; grid-template-columns: 320px 1fr; gap: 1.5rem;
    }
    
    /* Mini Calendar */
    .calendar-panel {
      background: white; border-radius: 24px; border: 1px solid var(--border-light);
      padding: 1rem; height: fit-content;
    }
    .calendar-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--gray-200);
    }
    .calendar-header button {
      background: none; border: none; font-size: 1rem; cursor: pointer;
      color: var(--gray-600); padding: 0.3rem 0.6rem; border-radius: 8px;
    }
    .calendar-header button:hover { background: var(--gray-100); }
    .calendar-month { font-weight: 700; font-size: 0.9rem; }
    .calendar-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
      font-size: 0.65rem; font-weight: 600; color: var(--gray-500); margin-bottom: 0.5rem;
    }
    .calendar-days {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
    }
    .calendar-day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 500; border-radius: 30px; cursor: pointer;
      transition: all 0.2s; color: var(--gray-700);
    }
    .calendar-day:hover { background: var(--primary-bg); }
    .calendar-day.selected { background: var(--primary); color: white; }
    .calendar-day.other-month { color: var(--gray-300); }
    .calendar-day.has-bookings { position: relative; }
    .calendar-day.has-bookings::after {
      content: ''; position: absolute; bottom: 2px; width: 4px; height: 4px;
      background: var(--primary); border-radius: 50%;
    }
    .calendar-day.selected.has-bookings::after { background: white; }

    /* Filter Bar */
    .filter-bar {
      display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.2rem;
      align-items: center; justify-content: space-between;
    }
    .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-chip {
      padding: 0.4rem 1rem; border-radius: 30px; font-size: 0.75rem;
      font-weight: 600; background: var(--gray-100); color: var(--gray-600);
      cursor: pointer; border: 1px solid transparent; transition: all 0.2s;
    }
    .filter-chip:hover { background: var(--primary-bg); color: var(--primary); }
    .filter-chip.active { background: var(--primary); color: white; }
    
    .search-box {
      display: flex; align-items: center; background: var(--gray-100);
      border-radius: 40px; padding: 0.3rem 1rem; gap: 8px;
    }
    .search-box i { color: var(--gray-400); }
    .search-box input {
      border: none; background: transparent; padding: 0.4rem;
      font-size: 0.8rem; width: 200px; outline: none;
    }

    /* Bookings List */
    .bookings-list {
      display: flex; flex-direction: column; gap: 0.8rem;
      max-height: 550px; overflow-y: auto; padding-right: 0.3rem;
    }
    .booking-card {
      background: white; border-radius: 16px; border: 1px solid var(--border-light);
      padding: 1rem; transition: all 0.2s; cursor: pointer;
    }
    .booking-card:hover { transform: translateX(2px); border-color: var(--primary-light); box-shadow: 0 4px 12px rgba(124,58,237,0.08); }
    .booking-time {
      display: inline-block; background: var(--primary-bg); padding: 0.2rem 0.6rem;
      border-radius: 20px; font-size: 0.7rem; font-weight: 600; color: var(--primary-dark);
      margin-bottom: 0.5rem;
    }
    .booking-title { font-size: 0.9rem; font-weight: 800; margin-bottom: 0.2rem; }
    .booking-client { font-size: 0.7rem; color: var(--gray-500); margin-bottom: 0.5rem; }
    .booking-details { display: flex; gap: 1rem; font-size: 0.65rem; color: var(--gray-500); flex-wrap: wrap; }
    .booking-status {
      padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.6rem; font-weight: 700;
    }
    .status-confirmed { background: #d1fae5; color: #065f46; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-completed { background: #dbeafe; color: #1e40af; }
    .status-cancelled { background: #fee2e2; color: #991b1b; }
    .status-rescheduled { background: #f3e8ff; color: #6b21a5; }

    .empty-state { text-align: center; padding: 2rem; color: var(--gray-400); }

    /* Modal Styles */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      z-index: 1000; justify-content: center; align-items: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 28px; width: 90%; max-width: 550px;
      max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    .modal-header {
      padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--gray-200);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; background: white; z-index: 10;
    }
    .modal-header h3 { font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--gray-400); }
    .modal-body { padding: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: 0.7rem; font-weight: 700; color: var(--gray-600);
      margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.7rem 1rem; border-radius: 12px;
      border: 1.5px solid var(--gray-200); font-size: 0.85rem;
      font-family: 'Inter', sans-serif; background: var(--gray-50);
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--primary); outline: none; background: white;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .btn-save { background: var(--primary); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 40px; font-weight: 700; cursor: pointer; width: 100%; }
    .btn-save:hover { background: var(--primary-dark); }
    .btn-danger { background: var(--danger); color: white; border: none; padding: 0.6rem 1rem; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .btn-danger:hover { background: #dc2626; }

    .toast {
      position: fixed; bottom: 30px; right: 30px; background: var(--success); color: white;
      padding: 0.8rem 1.5rem; border-radius: 50px; font-weight: 600; z-index: 2000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .toast.error { background: var(--danger); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 900px) {
      .bookings-layout { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <nav class="navbar">
    <a href="/workspaces/brandinn/index.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="BrandInn" class="logo-img">
      <span class="logo-text">BrandInn <span>Agency</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/brandinn/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="/workspaces/brandinn/business-listings.html" class="nav-btn"><i class="fas fa-store"></i> Businesses</a>
      <a href="/workspaces/brandinn/service-requests.html" class="nav-btn"><i class="fas fa-headset"></i> Service Requests</a>

  <div class="container">
    <div class="page-header">
      <div>
        <h1><i class="fas fa-calendar-check"></i> Bookings & Appointments</h1>
        <p>Manage client consultations, calls, site visits and meetings</p>
      </div>
      <button class="btn-create" id="createBookingBtn"><i class="fas fa-plus"></i> New Booking</button>
    </div>

    <!-- Stats Overview -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div class="stat-label">Total Bookings</div></div>
      <div class="stat-card"><div class="stat-number" id="statConfirmed">0</div><div class="stat-label">Confirmed</div></div>
      <div class="stat-card"><div class="stat-number" id="statPending">0</div><div class="stat-label">Pending</div></div>
      <div class="stat-card"><div class="stat-number" id="statCompleted">0</div><div class="stat-label">Completed</div></div>
      <div class="stat-card"><div class="stat-number" id="statToday">0</div><div class="stat-label">Today</div></div>
    </div>

    <!-- Bookings Layout -->
    <div class="bookings-layout">
      <!-- Left: Calendar -->
      <div class="calendar-panel">
        <div class="calendar-header">
          <button onclick="prevMonth()"><i class="fas fa-chevron-left"></i></button>
          <span class="calendar-month" id="calendarMonth">March 2026</span>
          <button onclick="nextMonth()"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="calendar-weekdays">
          <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
        </div>
        <div class="calendar-days" id="calendarDays"></div>
      </div>

      <!-- Right: Bookings List -->
      <div>
        <div class="filter-bar">
          <div class="filter-group">
            <button class="filter-chip active" data-status="all">All</button>
            <button class="filter-chip" data-status="confirmed">Confirmed</button>
            <button class="filter-chip" data-status="pending">Pending</button>
            <button class="filter-chip" data-status="completed">Completed</button>
            <button class="filter-chip" data-status="cancelled">Cancelled</button>
          </div>
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search client or service...">
          </div>
        </div>
        <div class="bookings-list" id="bookingsList">
          <div class="empty-state"><i class="fas fa-calendar-day"></i><br>Select a date or create a new booking</div>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <!-- Booking Modal -->
  <div class="modal-overlay" id="bookingModal">
    <div class="modal">
      <div class="modal-header">
        <h3><i class="fas fa-calendar-plus"></i> <span id="modalTitle">New Booking</span></h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="bookingForm">
          <div class="form-row">
            <div class="form-group"><label>Client/Business Name *</label><input type="text" id="clientName" required placeholder="Full name or business name"></div>
            <div class="form-group"><label>Phone Number</label><input type="tel" id="phone" placeholder="+254 700 000000"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="client@email.com"></div>
            <div class="form-group"><label>Booking Type *</label>
              <select id="bookingType">
                <option value="Consultation">Consultation Meeting</option>
                <option value="Site Visit">Site Visit</option>
                <option value="Phone Call">Phone Call</option>
                <option value="Video Call">Video Call (Zoom/Google Meet)</option>
                <option value="Project Review">Project Review</option>
                <option value="Delivery">Delivery / Handover</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Date *</label><input type="date" id="bookingDate" required></div>
            <div class="form-group"><label>Time *</label><input type="time" id="bookingTime" required></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Duration (minutes)</label>
              <select id="duration">
                <option value="30">30 minutes</option>
                <option value="60" selected>1 hour</option>
                <option value="90">1.5 hours</option>
                <option value="120">2 hours</option>
              </select>
            </div>
            <div class="form-group"><label>Status</label>
              <select id="bookingStatus">
                <option value="pending">Pending</option>
                <option value="confirmed">Confirmed</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
                <option value="rescheduled">Rescheduled</option>
              </select>
            </div>
          </div>
          <div class="form-group"><label>Assigned Staff</label>
            <input type="text" id="assignedTo" placeholder="e.g., Jane, Mike">
          </div>
          <div class="form-group"><label>Location / Meeting Link</label>
            <input type="text" id="location" placeholder="Office address, Zoom link, or phone number">
          </div>
          <div class="form-group"><label>Notes / Agenda</label>
            <textarea id="notes" rows="2" placeholder="What will be discussed? Any preparation needed?"></textarea>
          </div>
          <div class="form-group"><label>Related Project (Optional)</label>
            <select id="relatedProject"><option value="">— None —</option></select>
          </div>
          <input type="hidden" id="editBookingId" value="">
          <div style="display: flex; gap: 0.8rem; margin-top: 0.5rem;">
            <button type="button" class="btn-save" onclick="saveBooking()"><i class="fas fa-save"></i> Save Booking</button>
            <button type="button" class="btn-danger" id="deleteBtn" style="display:none;" onclick="deleteBooking()"><i class="fas fa-trash"></i> Delete</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allBookings = {};
    let allProjects = {};
    let currentFilter = 'all';
    let searchQuery = '';
    let selectedDate = new Date();
    let selectedDateStr = new Date().toISOString().split('T')[0];

    function showToast(msg, isError = false) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
    }

    function formatTime(timeStr) {
      if (!timeStr) return '';
      const [h, m] = timeStr.split(':');
      const hour = parseInt(h);
      const ampm = hour >= 12 ? 'PM' : 'AM';
      const hour12 = hour % 12 || 12;
      return `${hour12}:${m} ${ampm}`;
    }

    function getStatusClass(status) {
      const map = {
        'confirmed': 'status-confirmed', 'pending': 'status-pending',
        'completed': 'status-completed', 'cancelled': 'status-cancelled',
        'rescheduled': 'status-rescheduled'
      };
      return map[status] || 'status-pending';
    }

    // Calendar Functions
    function renderCalendar() {
      const year = selectedDate.getFullYear();
      const month = selectedDate.getMonth();
      const firstDay = new Date(year, month, 1);
      const startDay = firstDay.getDay() || 7;
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const prevMonthDays = new Date(year, month, 0).getDate();
      
      const bookingsByDate = {};
      Object.values(allBookings).forEach(booking => {
        if (booking.date) bookingsByDate[booking.date] = (bookingsByDate[booking.date] || 0) + 1;
      });
      
      let calendarHTML = '';
      for (let i = startDay - 1; i > 0; i--) {
        const day = prevMonthDays - i + 1;
        calendarHTML += `<div class="calendar-day other-month" data-date="${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}">${day}</div>`;
      }
      
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const hasBookings = bookingsByDate[dateStr] > 0;
        const isSelected = dateStr === selectedDateStr;
        calendarHTML += `<div class="calendar-day ${isSelected ? 'selected' : ''} ${hasBookings ? 'has-bookings' : ''}" data-date="${dateStr}" onclick="selectDate('${dateStr}')">${d}</div>`;
      }
      
      const remaining = 42 - (startDay - 1 + daysInMonth);
      for (let i = 1; i <= remaining; i++) {
        calendarHTML += `<div class="calendar-day other-month" data-date="${year+1}-${String(month+2).padStart(2,'0')}-${String(i).padStart(2,'0')}">${i}</div>`;
      }
      
      document.getElementById('calendarDays').innerHTML = calendarHTML;
      document.getElementById('calendarMonth').textContent = firstDay.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    function selectDate(dateStr) {
      selectedDateStr = dateStr;
      document.getElementById('bookingDate').value = dateStr;
      renderCalendar();
      renderBookingsList();
    }

    function prevMonth() {
      selectedDate = new Date(selectedDate.getFullYear(), selectedDate.getMonth() - 1, 1);
      renderCalendar();
    }
    
    function nextMonth() {
      selectedDate = new Date(selectedDate.getFullYear(), selectedDate.getMonth() + 1, 1);
      renderCalendar();
    }

    function renderBookingsList() {
      const container = document.getElementById('bookingsList');
      let bookings = Object.entries(allBookings).map(([id, b]) => ({ id, ...b }));
      
      if (selectedDateStr) {
        bookings = bookings.filter(b => b.date === selectedDateStr);
      }
      
      if (currentFilter !== 'all') {
        bookings = bookings.filter(b => b.status === currentFilter);
      }
      
      if (searchQuery.trim()) {
        const q = searchQuery.toLowerCase();
        bookings = bookings.filter(b => 
          (b.clientName || '').toLowerCase().includes(q) ||
          (b.bookingType || '').toLowerCase().includes(q) ||
          (b.assignedTo || '').toLowerCase().includes(q)
        );
      }
      
      bookings.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
      
      if (bookings.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-day"></i><br>No bookings for this date</div>';
        return;
      }
      
      container.innerHTML = bookings.map(booking => {
        const statusClass = getStatusClass(booking.status);
        return `
          <div class="booking-card" onclick="openBookingDetails('${booking.id}')">
            <div class="booking-time"><i class="fas fa-clock"></i> ${formatTime(booking.time)} (${booking.duration || 60} min)</div>
            <div class="booking-title">${escapeHtml(booking.bookingType || 'Meeting')}</div>
            <div class="booking-client"><i class="fas fa-user"></i> ${escapeHtml(booking.clientName || 'Unknown')}</div>
            <div class="booking-details">
              <span><i class="fas fa-phone"></i> ${escapeHtml(booking.phone || '—')}</span>
              <span><i class="fas fa-user-tie"></i> ${escapeHtml(booking.assignedTo || 'Unassigned')}</span>
              <span class="booking-status ${statusClass}">${booking.status || 'pending'}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderProjectDropdown() {
      const select = document.getElementById('relatedProject');
      const projects = Object.values(allProjects);
      select.innerHTML = '<option value="">— None —</option>';
      projects.forEach(project => {
        select.innerHTML += `<option value="${escapeHtml(project.id)}">${escapeHtml(project.projectName)} (${escapeHtml(project.businessName)})</option>`;
      });
    }

    function updateStats() {
      const bookings = Object.values(allBookings);
      const total = bookings.length;
      const confirmed = bookings.filter(b => b.status === 'confirmed').length;
      const pending = bookings.filter(b => b.status === 'pending').length;
      const completed = bookings.filter(b => b.status === 'completed').length;
      const today = new Date().toISOString().split('T')[0];
      const todayCount = bookings.filter(b => b.date === today).length;
      
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statConfirmed').textContent = confirmed;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statCompleted').textContent = completed;
      document.getElementById('statToday').textContent = todayCount;
    }

    function openBookingDetails(bookingId) {
      const booking = allBookings[bookingId];
      if (!booking) return;
      
      document.getElementById('modalTitle').textContent = 'Edit Booking';
      document.getElementById('clientName').value = booking.clientName || '';
      document.getElementById('phone').value = booking.phone || '';
      document.getElementById('email').value = booking.email || '';
      document.getElementById('bookingType').value = booking.bookingType || 'Consultation';
      document.getElementById('bookingDate').value = booking.date || '';
      document.getElementById('bookingTime').value = booking.time || '';
      document.getElementById('duration').value = booking.duration || '60';
      document.getElementById('bookingStatus').value = booking.status || 'pending';
      document.getElementById('assignedTo').value = booking.assignedTo || '';
      document.getElementById('location').value = booking.location || '';
      document.getElementById('notes').value = booking.notes || '';
      document.getElementById('relatedProject').value = booking.relatedProjectId || '';
      document.getElementById('editBookingId').value = bookingId;
      document.getElementById('deleteBtn').style.display = 'block';
      document.getElementById('bookingModal').classList.add('show');
    }

    async function saveBooking() {
      const clientName = document.getElementById('clientName').value.trim();
      const bookingDate = document.getElementById('bookingDate').value;
      const bookingTime = document.getElementById('bookingTime').value;
      
      if (!clientName) { showToast('Enter client name', true); return; }
      if (!bookingDate) { showToast('Select date', true); return; }
      if (!bookingTime) { showToast('Select time', true); return; }
      
      const bookingData = {
        clientName,
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        bookingType: document.getElementById('bookingType').value,
        date: bookingDate,
        time: bookingTime,
        duration: document.getElementById('duration').value,
        status: document.getElementById('bookingStatus').value,
        assignedTo: document.getElementById('assignedTo').value.trim(),
        location: document.getElementById('location').value.trim(),
        notes: document.getElementById('notes').value.trim(),
        relatedProjectId: document.getElementById('relatedProject').value,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      };
      
      const editId = document.getElementById('editBookingId').value;
      
      try {
        if (editId) {
          await database.ref(`brandinn_bookings/${editId}`).update(bookingData);
          showToast('Booking updated successfully!');
        } else {
          bookingData.createdAt = firebase.database.ServerValue.TIMESTAMP;
          bookingData.createdBy = auth.currentUser?.email || 'brandinn-staff';
          await database.ref('brandinn_bookings').push().set(bookingData);
          showToast('Booking created successfully!');
        }
        closeModal();
      } catch (e) {
        console.error(e);
        showToast('Failed to save booking', true);
      }
    }

    async function deleteBooking() {
      const editId = document.getElementById('editBookingId').value;
      if (!editId) return;
      if (!confirm('Are you sure you want to delete this booking?')) return;
      
      try {
        await database.ref(`brandinn_bookings/${editId}`).remove();
        showToast('Booking deleted');
        closeModal();
      } catch (e) {
        showToast('Failed to delete', true);
      }
    }

    function closeModal() {
      document.getElementById('bookingModal').classList.remove('show');
      document.getElementById('bookingForm').reset();
      document.getElementById('editBookingId').value = '';
      document.getElementById('modalTitle').textContent = 'New Booking';
      document.getElementById('deleteBtn').style.display = 'none';
      document.getElementById('bookingDate').value = selectedDateStr;
    }

    function resetModal() {
      document.getElementById('bookingForm').reset();
      document.getElementById('editBookingId').value = '';
      document.getElementById('modalTitle').textContent = 'New Booking';
      document.getElementById('deleteBtn').style.display = 'none';
      document.getElementById('bookingDate').value = selectedDateStr;
    }

    // Firebase listeners
    database.ref('brandinn_bookings').on('value', (snapshot) => {
      allBookings = snapshot.val() || {};
      renderCalendar();
      renderBookingsList();
      updateStats();
    });
    
    database.ref('brandinn_projects').on('value', (snapshot) => {
      allProjects = snapshot.val() || {};
      renderProjectDropdown();
    });

    // Filter event listeners
    document.querySelectorAll('.filter-chip').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.status;
        renderBookingsList();
      });
    });
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderBookingsList();
    });
    
    document.getElementById('createBookingBtn').addEventListener('click', () => {
      resetModal();
      document.getElementById('bookingModal').classList.add('show');
    });
    
    // Auth check
    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'https://kazinni.vercel.app';
      }
    });
    
    // Initialize
    renderCalendar();
    renderProjectDropdown();
    
    // Set default date in form
    document.getElementById('bookingDate').value = selectedDateStr;
    
    // Expose global functions
    window.prevMonth = prevMonth;
    window.nextMonth = nextMonth;
    window.selectDate = selectDate;
    window.openBookingDetails = openBookingDetails;
    window.saveBooking = saveBooking;
    window.deleteBooking = deleteBooking;
    window.closeModal = closeModal;
  </script>
</body>
</html>
