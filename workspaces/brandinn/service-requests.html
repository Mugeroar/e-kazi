<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Service Requests | BrandInn</title>
  
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #7c3aed;
      --primary-dark: #5b21b6;
      --primary-light: #a78bfa;
      --primary-bg: #f5f0ff;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #e9d5ff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gray-100: #f8fafc;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #faf9fe 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #a78bfa, #5b21b6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #7c3aed; -webkit-text-fill-color: #7c3aed; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(124, 58, 237, 0.08); border: 1px solid rgba(124, 58, 237, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--primary-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--primary); color: white; }

    .container { padding: 1rem 2%; flex: 1; }

    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--primary-dark); margin-right: 6px; }
    .page-header p { color: var(--text-muted); font-size: 0.75rem; }

    .form-layout { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; }

    .form-card {
      background: white; border-radius: 16px; padding: 1rem;
      border: 1px solid var(--border-light); box-shadow: 0 3px 12px rgba(91,33,182,0.03);
      display: flex; flex-direction: column;
    }
    .form-card h3 { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.7rem; display: flex; align-items: center; gap: 6px; color: var(--primary-dark); flex-shrink: 0; }
    .form-card h3 i { color: var(--primary); font-size: 0.7rem; }

    .form-card-scroll { flex: 1; overflow-y: auto; padding-right: 4px; max-height: 380px; }
    .form-card-scroll::-webkit-scrollbar { width: 3px; }
    .form-card-scroll::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

    .form-group { margin-bottom: 0.5rem; }
    .form-group label {
      display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
      border: 1.5px solid var(--gray-200); font-size: 0.8rem; font-family: 'Inter', sans-serif;
      background: var(--gray-100); transition: all 0.15s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--primary); outline: none; background: white;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.06);
    }
    .form-group textarea { resize: none; height: 55px; }

    .inline-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }

    /* Service Category Tabs */
    .category-tabs {
      display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.8rem;
    }
    .cat-tab {
      padding: 0.25rem 0.7rem; border-radius: 20px; font-size: 0.65rem; font-weight: 600;
      border: 1.5px solid var(--gray-200); cursor: pointer; transition: all 0.2s;
      background: white; color: var(--text-muted); font-family: inherit;
    }
    .cat-tab:hover { border-color: var(--primary); color: var(--primary); }
    .cat-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* Service Items */
    .service-item {
      background: var(--gray-100); border-radius: 10px; padding: 0.6rem; margin-bottom: 0.5rem;
      cursor: pointer; transition: all 0.2s; border: 1.5px solid transparent;
      display: flex; justify-content: space-between; align-items: center;
    }
    .service-item:hover { background: var(--primary-bg); }
    .service-item.selected { border-color: var(--primary); background: rgba(124,58,237,0.05); }
    .service-info { flex: 1; }
    .service-name { font-size: 0.75rem; font-weight: 700; margin-bottom: 0.1rem; }
    .service-price { font-size: 0.65rem; color: var(--primary); font-weight: 600; }
    .service-unit { font-size: 0.6rem; color: var(--text-muted); }
    .monthly-badge { background: #ecfdf5; color: #065f46; padding: 0.1rem 0.3rem; border-radius: 8px; font-size: 0.55rem; font-weight: 700; margin-left: 4px; }
    .service-qty { display: flex; align-items: center; gap: 0.3rem; }
    .service-qty button {
      width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--gray-300);
      background: white; cursor: pointer; font-size: 0.7rem; font-weight: 700;
    }
    .service-qty button:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .service-qty input {
      width: 40px; text-align: center; padding: 0.2rem; border-radius: 6px;
      border: 1px solid var(--gray-300); font-size: 0.7rem; background: white;
    }
    .service-qty input:focus { border-color: var(--primary); outline: none; }

    /* Price Display */
    .price-display {
      background: linear-gradient(135deg, var(--primary-bg), #f3e8ff);
      border-radius: 12px; padding: 0.7rem; text-align: center;
      flex-shrink: 0; margin-top: 0.5rem;
    }
    .price-display .total-amount { font-size: 1.6rem; font-weight: 900; color: var(--primary-dark); line-height: 1.2; }
    .price-display .breakdown { font-size: 0.65rem; color: var(--text-muted); margin-top: 0.1rem; }

    .btn-row { display: flex; gap: 6px; flex-shrink: 0; margin-top: 0.5rem; }
    .btn {
      padding: 0.6rem 1rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; transition: all 0.15s; font-family: inherit; justify-content: center;
    }
    .btn-primary { background: var(--primary); color: white; flex: 2; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
    .btn-secondary { background: #f1f5f9; color: #475569; flex: 1; }
    .btn-secondary:hover { background: #e2e8f0; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--success); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(16,185,129,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--danger); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 900px) { .form-layout { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .form-layout { grid-template-columns: 1fr; } .container { padding: 0.8rem; } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/workspaces/brandinn/index.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="BrandInn" class="logo-img">
      <span class="logo-text">BrandInn <span>Agency</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/brandinn/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="/workspaces/brandinn/service-requests.html" class="nav-btn"><i class="fas fa-headset"></i> Service Requests</a>
      <a href="/workspaces/brandinn/projects.html" class="nav-btn"><i class="fas fa-project-diagram"></i> Projects</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-headset"></i> Service Request</h1>
      <p>Select services, calculate totals, and submit client requests</p>
    </div>

    <div class="form-layout">
      
      <!-- COLUMN 1: Client Details -->
      <div class="form-card">
        <h3><i class="fas fa-user"></i> Client Details</h3>
        <div class="form-card-scroll">
          <div class="form-group"><label>Client Name *</label><input type="text" id="clientName" placeholder="Full name"></div>
          <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" placeholder="+254 700 000000"></div>
          <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="client@email.com"></div>
          <div class="form-group"><label>Business Name</label><input type="text" id="businessName" placeholder="Business/Company name"></div>
          <div class="form-group"><label>Location</label><input type="text" id="location" placeholder="e.g., Westlands, Nairobi"></div>
        </div>
      </div>

      <!-- COLUMN 2: Services Selection -->
      <div class="form-card">
        <h3><i class="fas fa-briefcase"></i> Select Services</h3>
        <div class="form-card-scroll">
          <div class="category-tabs" id="categoryTabs"></div>
          <div id="servicesList"></div>
          <div class="form-group" style="margin-top:0.5rem;">
            <label>Special Instructions</label>
            <textarea id="instructions" placeholder="Additional requirements, deadlines, etc..."></textarea>
          </div>
        </div>
      </div>

      <!-- COLUMN 3: Pricing & Submit -->
      <div class="form-card">
        <h3><i class="fas fa-calculator"></i> Quote Summary</h3>
        <div class="form-card-scroll">
          <div class="form-group"><label>Urgency</label>
            <select id="urgency">
              <option value="normal">Normal (7-14 days)</option>
              <option value="urgent">Urgent (3-5 days) +15%</option>
              <option value="express">Express (1-2 days) +30%</option>
            </select>
          </div>
          <div class="form-group"><label>Service Fee (KES)</label><input type="number" id="serviceFee" value="0" min="0" oninput="updateTotals()"></div>
        </div>
        <div class="price-display">
          <div class="total-amount" id="displayTotal">KES 0</div>
          <div class="breakdown" id="breakdown">Select services to calculate</div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="submitBtn" onclick="submitRequest()"><i class="fas fa-paper-plane"></i> Submit Request</button>
          <button class="btn btn-secondary" onclick="resetForm()"><i class="fas fa-undo"></i> Reset</button>
        </div>
      </div>

    </div>
  </div>

  <div id="toastContainer"></div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // ========== SERVICES DATABASE (from your calculator) ==========
    const servicesDB = [
      { id: 'landing-sub', name: 'Ready-Made Landing Page', price: 800, unit: 'month', icon: 'fa-globe', category: 'web', monthly: true },
      { id: 'landing-custom', name: 'Custom Landing Page', price: 5000, unit: 'project', icon: 'fa-file-alt', category: 'web' },
      { id: 'biz-website', name: 'Business Website', price: 8000, unit: 'project', icon: 'fa-store', category: 'web' },
      { id: 'ecommerce', name: 'E-Commerce Store', price: 17000, unit: 'project', icon: 'fa-shopping-cart', category: 'web' },
      { id: 'meta-ads', name: 'Meta Ads Package (FB & IG)', price: 2500, unit: 'advert', icon: 'fa-rectangle-ad', category: 'ads' },
      { id: 'social-mgmt', name: 'Social Media Management', price: 5000, unit: 'month', icon: 'fa-hashtag', category: 'marketing', monthly: true },
      { id: 'seo', name: 'SEO & Google Business', price: 3500, unit: 'month', icon: 'fa-magnifying-glass', category: 'marketing', monthly: true },
      { id: 'email-marketing', name: 'Email Marketing Setup', price: 3000, unit: 'project', icon: 'fa-envelope-open-text', category: 'marketing' },
      { id: 'banner-design', name: 'Banner Design', price: 1000, unit: 'project', icon: 'fa-paint-brush', category: 'branding' },
      { id: 'bizcard-design', name: 'Business Card Design', price: 1000, unit: 'project', icon: 'fa-id-card', category: 'branding' },
      { id: 'bizcard-print', name: 'Laminated Business Card Printing', price: 450, unit: '50pcs', icon: 'fa-print', category: 'branding' },
      { id: 'payment-stickers', name: 'Custom Payment Stickers', price: 800, unit: 'set', icon: 'fa-credit-card', category: 'branding' },
      { id: 'shipping-labels', name: 'Shipping Labels Design', price: 1500, unit: 'project', icon: 'fa-truck', category: 'branding' },
      { id: 'logo-design', name: 'Professional Logo Design', price: 2500, unit: 'project', icon: 'fa-pencil-ruler', category: 'logo' },
      { id: 'brand-identity', name: 'Brand Identity Package', price: 5000, unit: 'project', icon: 'fa-palette', category: 'logo' },
      { id: 'social-graphics', name: 'Social Media Graphics', price: 2000, unit: 'project', icon: 'fa-file-image', category: 'logo' },
      { id: 'print-design', name: 'Print Design (Flyers/Menus)', price: 1500, unit: 'project', icon: 'fa-print', category: 'logo' },
      { id: 'social-setup', name: 'Social Media Setup + Branding', price: 1250, unit: 'package', icon: 'fa-hashtag', category: 'logo' },
      { id: 'banner-print', name: 'Banner Printing (Vinyl)', price: 600, unit: 'metre', icon: 'fa-flag-checkered', category: 'print' },
      { id: 'sticker-print', name: 'Sticker Printing (Vinyl)', price: 650, unit: 'metre', icon: 'fa-sticky-note', category: 'print' },
      { id: 'tshirt-print', name: 'Custom T-Shirt Printing', price: 1300, unit: 'piece', icon: 'fa-tshirt', category: 'print' },
    ];

    const categories = [
      { id: 'all', name: 'All', icon: 'fa-grid-2' },
      { id: 'web', name: 'Web Dev', icon: 'fa-globe' },
      { id: 'ads', name: 'Paid Ads', icon: 'fa-rectangle-ad' },
      { id: 'marketing', name: 'Marketing', icon: 'fa-chart-line' },
      { id: 'branding', name: 'Branding', icon: 'fa-paintbrush' },
      { id: 'logo', name: 'Logo & Design', icon: 'fa-pen-fancy' },
      { id: 'print', name: 'Print Shop', icon: 'fa-print' },
    ];

    let selectedServices = {};
    let currentCategory = 'all';

    function showToast(msg, isError = false) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function renderCategoryTabs() {
      const container = document.getElementById('categoryTabs');
      container.innerHTML = categories.map(cat => `
        <button class="cat-tab ${cat.id === currentCategory ? 'active' : ''}" data-cat="${cat.id}">
          <i class="fas ${cat.icon}"></i> ${cat.name}
        </button>
      `).join('');
      
      document.querySelectorAll('.cat-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentCategory = btn.dataset.cat;
          renderServicesList();
        });
      });
    }

    function renderServicesList() {
      const container = document.getElementById('servicesList');
      const filtered = currentCategory === 'all' ? servicesDB : servicesDB.filter(s => s.category === currentCategory);
      
      if (filtered.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--text-muted);">No services in this category</div>';
        return;
      }

      container.innerHTML = filtered.map(svc => {
        const isSelected = selectedServices[svc.id];
        const qty = isSelected ? selectedServices[svc.id].quantity : 1;
        return `
          <div class="service-item ${isSelected ? 'selected' : ''}" data-id="${svc.id}" onclick="toggleService('${svc.id}')">
            <div class="service-info">
              <div class="service-name">
                ${svc.name}
                ${svc.monthly ? '<span class="monthly-badge">/month</span>' : ''}
              </div>
              <div><span class="service-price">KES ${svc.price.toLocaleString()}</span> <span class="service-unit">/ ${svc.unit}</span></div>
            </div>
            <div class="service-qty" onclick="event.stopPropagation()">
              <button onclick="changeQty('${svc.id}', -1)">−</button>
              <input type="number" id="qty_${svc.id}" value="${qty}" min="1" max="100" onchange="updateQty('${svc.id}', this.value)">
              <button onclick="changeQty('${svc.id}', 1)">+</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleService(serviceId) {
      const svc = servicesDB.find(s => s.id === serviceId);
      if (!svc) return;
      
      if (selectedServices[serviceId]) {
        delete selectedServices[serviceId];
      } else {
        const qtyInput = document.getElementById(`qty_${serviceId}`);
        const quantity = qtyInput ? parseInt(qtyInput.value) || 1 : 1;
        selectedServices[serviceId] = { ...svc, quantity };
      }
      renderServicesList();
      updateTotals();
    }

    function changeQty(serviceId, delta) {
      const input = document.getElementById(`qty_${serviceId}`);
      if (!input) return;
      let val = parseInt(input.value) || 1;
      val = Math.max(1, Math.min(100, val + delta));
      input.value = val;
      if (selectedServices[serviceId]) {
        selectedServices[serviceId].quantity = val;
        updateTotals();
      }
    }

    function updateQty(serviceId, val) {
      const qty = parseInt(val) || 1;
      if (selectedServices[serviceId]) {
        selectedServices[serviceId].quantity = Math.max(1, qty);
        updateTotals();
      }
    }

    function updateTotals() {
      let subtotal = 0;
      let itemCount = 0;
      
      Object.values(selectedServices).forEach(svc => {
        subtotal += svc.price * svc.quantity;
        itemCount++;
      });
      
      const urgency = document.getElementById('urgency').value;
      let urgencyMultiplier = 1;
      let urgencyText = '';
      if (urgency === 'urgent') { urgencyMultiplier = 1.15; urgencyText = '+15% Urgent'; }
      else if (urgency === 'express') { urgencyMultiplier = 1.30; urgencyText = '+30% Express'; }
      
      const serviceFee = parseInt(document.getElementById('serviceFee').value) || 0;
      const urgencyFee = subtotal * (urgencyMultiplier - 1);
      const total = (subtotal * urgencyMultiplier) + serviceFee;
      
      document.getElementById('displayTotal').textContent = `KES ${Math.round(total).toLocaleString()}`;
      
      let breakdownText = `${itemCount} service${itemCount !== 1 ? 's' : ''}: KES ${subtotal.toLocaleString()}`;
      if (urgencyFee > 0) breakdownText += ` + ${urgencyText} (KES ${Math.round(urgencyFee).toLocaleString()})`;
      if (serviceFee > 0) breakdownText += ` + fee (KES ${serviceFee.toLocaleString()})`;
      document.getElementById('breakdown').textContent = breakdownText;
    }

    async function submitRequest() {
      const clientName = document.getElementById('clientName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      
      if (!clientName) { showToast('Enter client name', true); return; }
      if (!phone) { showToast('Enter phone number', true); return; }
      if (Object.keys(selectedServices).length === 0) { showToast('Select at least one service', true); return; }
      
      let subtotal = 0;
      const servicesList = Object.values(selectedServices).map(svc => {
        subtotal += svc.price * svc.quantity;
        return { name: svc.name, price: svc.price, quantity: svc.quantity, unit: svc.unit, monthly: svc.monthly || false };
      });
      
      const urgency = document.getElementById('urgency').value;
      let urgencyMultiplier = 1;
      if (urgency === 'urgent') urgencyMultiplier = 1.15;
      else if (urgency === 'express') urgencyMultiplier = 1.30;
      
      const serviceFee = parseInt(document.getElementById('serviceFee').value) || 0;
      const total = (subtotal * urgencyMultiplier) + serviceFee;
      
      const requestData = {
        clientName,
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        businessName: document.getElementById('businessName').value.trim(),
        location: document.getElementById('location').value.trim(),
        services: servicesList,
        urgency,
        serviceFee,
        subtotal,
        urgencyFee: subtotal * (urgencyMultiplier - 1),
        total: Math.round(total),
        instructions: document.getElementById('instructions').value.trim(),
        status: 'pending',
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        createdBy: auth.currentUser?.email || 'brandinn-staff'
      };
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
      
      try {
        await database.ref('brandinn_service_requests').push().set(requestData);
        showToast('Service request submitted successfully!');
        resetForm();
      } catch (e) {
        console.error(e);
        showToast('Failed to submit request', true);
      }
      
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Request';
    }

    function resetForm() {
      document.getElementById('clientName').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('email').value = '';
      document.getElementById('businessName').value = '';
      document.getElementById('location').value = '';
      document.getElementById('instructions').value = '';
      document.getElementById('urgency').value = 'normal';
      document.getElementById('serviceFee').value = '0';
      selectedServices = {};
      renderServicesList();
      updateTotals();
    }

    // Auth check - redirect if not logged in
    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'https://kazinni.vercel.app';
      }
    });

    // Initialize
    renderCategoryTabs();
    renderServicesList();
    updateTotals();
    
    // Event listeners for totals
    document.getElementById('urgency').addEventListener('change', updateTotals);
    document.getElementById('serviceFee').addEventListener('input', updateTotals);
    
    // Expose functions globally
    window.toggleService = toggleService;
    window.changeQty = changeQty;
    window.updateQty = updateQty;
    window.submitRequest = submitRequest;
    window.resetForm = resetForm;
  </script>
</body>
</html>
