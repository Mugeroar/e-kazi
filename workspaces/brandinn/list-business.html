<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>List Business | BrandInn</title>
  
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #7c3aed;
      --primary-dark: #5b21b6;
      --primary-light: #a78bfa;
      --primary-bg: #f5f0ff;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #e9d5ff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
      --gray-900: #0f172a;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #faf9fe 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(16px);
      padding: 0.75rem 4%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(124, 58, 237, 0.15);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-img { height: 38px; width: 38px; border-radius: 12px; object-fit: contain; background: white; box-shadow: 0 6px 16px rgba(124, 58, 237, 0.15); }
    .logo-text {
      font-weight: 800; font-size: 1.2rem;
      background: linear-gradient(135deg, #8b5cf6, #5b21b6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.75rem; background: #7c3aed; -webkit-text-fill-color: #7c3aed; margin-left: 5px; }

    .nav-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(124, 58, 237, 0.08); border: 1px solid rgba(124, 58, 237, 0.2);
      padding: 0.45rem 1rem; border-radius: 30px; color: var(--primary-dark);
      font-weight: 600; font-size: 0.75rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 6px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--primary); color: white; }

    .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 4%; flex: 1; width: 100%; }

    .page-header { margin-bottom: 1.8rem; }
    .page-header h1 {
      font-size: 1.6rem; font-weight: 800; color: #0f172a;
      display: flex; align-items: center; gap: 12px;
    }
    .page-header h1 i { color: var(--primary-dark); background: white; padding: 10px; border-radius: 16px; box-shadow: 0 6px 14px rgba(124,58,237,0.08); font-size: 1.2rem; }
    .page-header p { color: var(--gray-500); font-size: 0.85rem; margin-top: 0.3rem; margin-left: 52px; }

    /* Form Layout - Two Columns for better spacing */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    
    .form-section {
      background: white; border-radius: 24px; padding: 1.5rem;
      border: 1px solid var(--border-light); box-shadow: 0 4px 16px rgba(0,0,0,0.02);
    }
    .form-section h3 {
      font-size: 1rem; font-weight: 700; margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: 10px; color: var(--gray-800);
      padding-bottom: 0.6rem; border-bottom: 2px solid var(--primary-bg);
    }
    .form-section h3 i { color: var(--primary); font-size: 1rem; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: 0.7rem; font-weight: 700; color: var(--gray-600);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.4rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.7rem 1rem; border-radius: 12px;
      border: 1.5px solid var(--gray-200); font-size: 0.85rem;
      font-family: 'Inter', sans-serif; background: var(--gray-50);
      transition: all 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--primary); outline: none; background: white;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.06);
    }
    .form-group textarea { resize: vertical; min-height: 70px; }

    /* Zone & Road Section */
    .zone-card {
      background: var(--primary-bg); border-radius: 16px; padding: 1rem;
      margin-bottom: 1rem;
    }
    .zone-card .form-group { margin-bottom: 0.8rem; }
    .zone-card label { color: var(--primary-dark); }

    .road-buttons {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
    }
    .road-btn {
      padding: 0.4rem 1rem; border-radius: 30px; font-size: 0.75rem;
      font-weight: 500; border: 1.5px solid var(--gray-300); background: white;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .road-btn:hover { border-color: var(--primary); background: var(--primary-bg); }
    .road-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

    /* Services Grid */
    .services-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.6rem;
      max-height: 280px; overflow-y: auto; padding: 0.3rem;
    }
    .service-tag {
      display: flex; align-items: center; gap: 8px;
      background: var(--gray-50); padding: 0.6rem 0.8rem;
      border-radius: 12px; font-size: 0.75rem; font-weight: 500;
      color: var(--gray-700); cursor: pointer; transition: all 0.2s;
      border: 1.5px solid transparent;
    }
    .service-tag:hover { background: var(--primary-bg); border-color: var(--primary-light); }
    .service-tag.selected { background: var(--primary); color: white; border-color: var(--primary-dark); }
    .service-tag i { width: 20px; font-size: 0.8rem; }
    .service-tag .price { margin-left: auto; font-size: 0.65rem; font-weight: 600; opacity: 0.8; }

    /* Summary Card */
    .summary-card {
      background: linear-gradient(135deg, var(--gray-900), var(--gray-800));
      border-radius: 20px; padding: 1.2rem; color: white; margin-top: 1rem;
    }
    .summary-card .total-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
    .summary-card .total-amount { font-size: 2rem; font-weight: 800; margin: 0.2rem 0; }
    .summary-card .breakdown { font-size: 0.7rem; opacity: 0.7; margin-top: 0.5rem; }

    .btn-row { display: flex; gap: 1rem; margin-top: 1.5rem; }
    .btn {
      padding: 0.8rem 1.5rem; border-radius: 14px; border: none; font-weight: 700;
      font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 8px; transition: all 0.2s; font-family: inherit; justify-content: center;
    }
    .btn-primary { background: var(--primary); color: white; flex: 1; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-secondary { background: var(--gray-100); color: var(--gray-600); flex: 0 0 auto; }
    .btn-secondary:hover { background: var(--gray-200); }

    .toast {
      position: fixed; bottom: 30px; right: 30px; background: var(--success); color: white;
      padding: 0.8rem 1.5rem; border-radius: 50px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      display: flex; align-items: center; gap: 8px; font-size: 0.8rem;
    }
    .toast.error { background: var(--danger); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 1000px) { .form-grid { grid-template-columns: 1fr; } }
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; gap: 0.5rem; }
      .services-grid { grid-template-columns: 1fr; }
      .container { padding: 1rem 1.2rem; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/workspaces/brandinn/index.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="BrandInn" class="logo-img">
      <span class="logo-text">BrandInn <span>Agency</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/brandinn/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="/workspaces/brandinn/business-listings.html" class="nav-btn"><i class="fas fa-store"></i> Business Listings</a>
      <a href="/workspaces/brandinn/service-requests.html" class="nav-btn"><i class="fas fa-headset"></i> Service Requests</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-plus-circle"></i> Register New Business</h1>
      <p>Add a business to the BrandInn ecosystem — select zone, road, and services</p>
    </div>

    <div class="form-grid">
      
      <!-- LEFT COLUMN: Business Info + Location -->
      <div class="form-section">
        <h3><i class="fas fa-building"></i> Business Information</h3>
        
        <div class="form-row">
          <div class="form-group"><label>Business Name *</label><input type="text" id="businessName" placeholder="Official business name"></div>
          <div class="form-group"><label>Owner Name</label><input type="text" id="ownerName" placeholder="Full name"></div>
        </div>
        
        <div class="form-row">
          <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" placeholder="+254 700 000000"></div>
          <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="business@email.com"></div>
        </div>
        
        <div class="form-row">
          <div class="form-group"><label>Alternative Phone</label><input type="tel" id="altPhone" placeholder="Optional"></div>
          <div class="form-group"><label>Business Type / Industry</label>
            <select id="industry">
              <option value="">Select industry</option>
              <option value="retail">Retail / Shop</option>
              <option value="restaurant">Restaurant / Café</option>
              <option value="fashion">Fashion / Apparel</option>
              <option value="tech">Technology / IT</option>
              <option value="healthcare">Healthcare</option>
              <option value="education">Education</option>
              <option value="realestate">Real Estate</option>
              <option value="salon">Salon / Beauty</option>
              <option value="gym">Gym / Fitness</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>
        
        <div class="form-group"><label>Business Description</label><textarea id="description" placeholder="Brief description of what they do..."></textarea></div>
      </div>

      <!-- RIGHT COLUMN: Zone, Road & Location -->
      <div class="form-section">
        <h3><i class="fas fa-map-marker-alt"></i> Location & Zone</h3>
        
        <div class="zone-card">
          <div class="form-group"><label>Select Zone *</label>
            <select id="zone">
              <option value="">-- Select Zone --</option>
              <option value="Zone A">Zone A (Ngong Road Corridor)</option>
            </select>
          </div>
          
          <div class="form-group" id="roadGroup" style="display: none;">
            <label>Select Road *</label>
            <div class="road-buttons" id="roadButtons">
              <button type="button" class="road-btn" data-road="Ngong Road">Ngong Road</button>
              <button type="button" class="road-btn" data-road="Naivasha Road">Naivasha Road</button>
              <button type="button" class="road-btn" data-road="Gitanga Road">Gitanga Road</button>
              <button type="button" class="road-btn" data-road="James Gichuru Road">James Gichuru Road</button>
              <button type="button" class="road-btn" data-road="Kikuyu Road">Kikuyu Road</button>
            </div>
            <input type="hidden" id="selectedRoad" value="">
          </div>
          
          <div class="form-group"><label>Specific Area / Landmark *</label>
            <input type="text" id="area" placeholder="e.g., Opposite Quickmart, Next to Shell Petrol Station">
          </div>
          
          <div class="form-group"><label>Full Address (Optional)</label>
            <textarea id="fullAddress" rows="2" placeholder="Building name, floor, suite number..."></textarea>
          </div>
        </div>
        
        <div class="form-group"><label>Assigned Staff / Account Manager</label>
          <input type="text" id="assignedStaff" placeholder="Staff name">
        </div>
        
        <div class="form-group"><label>Notes / Special Instructions</label>
          <textarea id="notes" rows="2" placeholder="Any additional information..."></textarea>
        </div>
      </div>

      <!-- FULL WIDTH: Services Selection -->
      <div class="form-section" style="grid-column: 1 / -1;">
        <h3><i class="fas fa-cogs"></i> Services & Subscription</h3>
        
        <div class="services-grid" id="servicesGrid"></div>
        
        <div class="summary-card">
          <div class="total-label">MONTHLY SUBSCRIPTION TOTAL</div>
          <div class="total-amount" id="displayTotal">KES 0</div>
          <div class="breakdown" id="breakdown">Select services to calculate</div>
        </div>
        
        <div class="btn-row">
          <button class="btn btn-primary" id="submitBtn" onclick="submitBusiness()"><i class="fas fa-save"></i> Register Business</button>
          <button class="btn btn-secondary" onclick="resetForm()"><i class="fas fa-undo"></i> Reset Form</button>
        </div>
      </div>

    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // ========== SERVICES (Subscription is optional, included as a service) ==========
    const ecosystemServices = [
      { id: 'subscription_basic', name: 'Basic Subscription (Business Listing)', price: 800, category: 'Subscription', icon: 'fa-tag', monthly: true },
      { id: 'subscription_standard', name: 'Standard Subscription (Featured)', price: 2500, category: 'Subscription', icon: 'fa-crown', monthly: true },
      { id: 'subscription_premium', name: 'Premium Subscription (Priority)', price: 5000, category: 'Subscription', icon: 'fa-gem', monthly: true },
      { id: 'web_landing', name: 'Landing Page', price: 800, category: 'Web', icon: 'fa-globe', oneTime: true },
      { id: 'web_business', name: 'Business Website', price: 8000, category: 'Web', icon: 'fa-store', oneTime: true },
      { id: 'web_ecommerce', name: 'E-Commerce Store', price: 17000, category: 'Web', icon: 'fa-shopping-cart', oneTime: true },
      { id: 'ads_meta', name: 'Meta Ads Management (Monthly)', price: 2500, category: 'Ads', icon: 'fa-rectangle-ad', monthly: true },
      { id: 'marketing_social', name: 'Social Media Management', price: 5000, category: 'Marketing', icon: 'fa-hashtag', monthly: true },
      { id: 'marketing_seo', name: 'SEO & Google Business', price: 3500, category: 'Marketing', icon: 'fa-magnifying-glass', monthly: true },
      { id: 'branding_logo', name: 'Logo Design', price: 2500, category: 'Branding', icon: 'fa-pencil-ruler', oneTime: true },
      { id: 'branding_identity', name: 'Brand Identity Package', price: 5000, category: 'Branding', icon: 'fa-palette', oneTime: true },
      { id: 'print_banner', name: 'Banner Printing (per metre)', price: 600, category: 'Print', icon: 'fa-flag-checkered', oneTime: true },
      { id: 'print_cards', name: 'Business Cards (50pcs)', price: 450, category: 'Print', icon: 'fa-id-card', oneTime: true },
      { id: 'print_tshirt', name: 'T-Shirt Printing', price: 1300, category: 'Print', icon: 'fa-tshirt', oneTime: true },
    ];

    let selectedServices = [];
    let currentZone = '';
    let currentRoad = '';

    function showToast(msg, isError = false) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function renderServicesGrid() {
      const container = document.getElementById('servicesGrid');
      container.innerHTML = ecosystemServices.map(svc => `
        <div class="service-tag ${selectedServices.includes(svc.id) ? 'selected' : ''}" 
             data-id="${svc.id}" onclick="toggleService('${svc.id}')">
          <i class="fas ${svc.icon}"></i>
          <span>${svc.name}</span>
          <span class="price">KES ${svc.price.toLocaleString()}${svc.monthly ? '/mo' : svc.oneTime ? ' one-time' : ''}</span>
        </div>
      `).join('');
    }

    function toggleService(serviceId) {
      if (selectedServices.includes(serviceId)) {
        selectedServices = selectedServices.filter(id => id !== serviceId);
      } else {
        selectedServices.push(serviceId);
      }
      renderServicesGrid();
      calculateTotal();
    }

    function calculateTotal() {
      const selectedServiceObjects = ecosystemServices.filter(s => selectedServices.includes(s.id));
      let monthlyTotal = 0;
      let oneTimeTotal = 0;
      
      selectedServiceObjects.forEach(svc => {
        if (svc.monthly) monthlyTotal += svc.price;
        else oneTimeTotal += svc.price;
      });
      
      document.getElementById('displayTotal').textContent = `KES ${monthlyTotal.toLocaleString()}/mo`;
      
      let breakdownText = '';
      if (monthlyTotal > 0) breakdownText += `Monthly: KES ${monthlyTotal.toLocaleString()}`;
      if (oneTimeTotal > 0) breakdownText += `${monthlyTotal > 0 ? ' + ' : ''}One-time: KES ${oneTimeTotal.toLocaleString()}`;
      if (monthlyTotal === 0 && oneTimeTotal === 0) breakdownText = 'No services selected';
      
      document.getElementById('breakdown').textContent = breakdownText;
    }

    // Zone selector logic
    document.getElementById('zone').addEventListener('change', function() {
      currentZone = this.value;
      const roadGroup = document.getElementById('roadGroup');
      if (currentZone === 'Zone A') {
        roadGroup.style.display = 'block';
      } else {
        roadGroup.style.display = 'none';
        currentRoad = '';
        document.getElementById('selectedRoad').value = '';
        document.querySelectorAll('.road-btn').forEach(btn => btn.classList.remove('selected'));
      }
    });

    function initRoadButtons() {
      document.querySelectorAll('.road-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.road-btn').forEach(b => b.classList.remove('selected'));
          this.classList.add('selected');
          currentRoad = this.dataset.road;
          document.getElementById('selectedRoad').value = currentRoad;
        });
      });
    }

    async function submitBusiness() {
      const businessName = document.getElementById('businessName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const zone = document.getElementById('zone').value;
      const area = document.getElementById('area').value.trim();
      
      if (!businessName) { showToast('Enter business name', true); return; }
      if (!phone) { showToast('Enter phone number', true); return; }
      if (!zone) { showToast('Select a zone', true); return; }
      if (zone === 'Zone A' && !currentRoad) { showToast('Select a road for Zone A', true); return; }
      if (!area) { showToast('Enter specific area/landmark', true); return; }
      
      const selectedServiceObjects = ecosystemServices.filter(s => selectedServices.includes(s.id));
      
      const businessData = {
        businessName,
        ownerName: document.getElementById('ownerName').value.trim(),
        phone,
        altPhone: document.getElementById('altPhone').value.trim(),
        email: document.getElementById('email').value.trim(),
        industry: document.getElementById('industry').value,
        description: document.getElementById('description').value.trim(),
        zone: zone,
        road: currentRoad || null,
        area: area,
        fullAddress: document.getElementById('fullAddress').value.trim(),
        assignedStaff: document.getElementById('assignedStaff').value.trim(),
        notes: document.getElementById('notes').value.trim(),
        selectedServices: selectedServiceObjects,
        selectedServiceIds: selectedServices,
        monthlyTotal: ecosystemServices.filter(s => selectedServices.includes(s.id) && s.monthly).reduce((sum, s) => sum + s.price, 0),
        oneTimeTotal: ecosystemServices.filter(s => selectedServices.includes(s.id) && s.oneTime).reduce((sum, s) => sum + s.price, 0),
        status: 'active',
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        createdBy: auth.currentUser?.email || 'brandinn-staff',
        slug: businessName.toLowerCase().replace(/[^a-z0-9]+/g, '-')
      };
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
      
      try {
        const newRef = database.ref('brandinn_subdomains').push();
        await newRef.set({
          ...businessData,
          subdomainId: newRef.key
        });
        
        showToast(`✅ "${businessName}" added successfully to ${zone}!`);
        resetForm();
      } catch (e) {
        console.error(e);
        showToast('Failed to register business', true);
      }
      
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-save"></i> Register Business';
    }

    function resetForm() {
      document.getElementById('businessName').value = '';
      document.getElementById('ownerName').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('altPhone').value = '';
      document.getElementById('email').value = '';
      document.getElementById('industry').value = '';
      document.getElementById('description').value = '';
      document.getElementById('zone').value = '';
      document.getElementById('area').value = '';
      document.getElementById('fullAddress').value = '';
      document.getElementById('assignedStaff').value = '';
      document.getElementById('notes').value = '';
      
      document.getElementById('roadGroup').style.display = 'none';
      document.querySelectorAll('.road-btn').forEach(btn => btn.classList.remove('selected'));
      currentRoad = '';
      currentZone = '';
      
      selectedServices = [];
      renderServicesGrid();
      calculateTotal();
    }

    // Event listeners
    document.getElementById('zone').addEventListener('change', function() {});
    
    // Auth check
    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'https://kazinni.vercel.app';
      }
    });

    // Initialize
    renderServicesGrid();
    calculateTotal();
    initRoadButtons();
    
    // Expose global functions
    window.toggleService = toggleService;
    window.submitBusiness = submitBusiness;
    window.resetForm = resetForm;
  </script>
</body>
</html>
