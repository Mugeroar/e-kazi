<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#7c3aed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>KazInni Workspaces | Add to Map</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Font Awesome & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #7c3aed;
            --primary-dark: #5b21b6;
            --primary-light: #a78bfa;
            --bg-deep: #0f0f1a;
            --card-bg: rgba(20, 18, 30, 0.96);
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #06b6d4;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Operations Colors */
        .op-brandinn { color: #7c3aed; border-color: #7c3aed; }
        .op-deliveries { color: #f59e0b; border-color: #f59e0b; }
        .op-rides { color: #22c55e; border-color: #22c55e; }
        .op-ekazi { color: #06b6d4; border-color: #06b6d4; }
        .op-heritage { color: #d946ef; border-color: #d946ef; }
        .op-workfit { color: #f97316; border-color: #f97316; }
        .op-hekima { color: #10b981; border-color: #10b981; }

        /* Header */
        .navbar {
            background: rgba(15, 15, 26, 0.97);
            backdrop-filter: blur(16px);
            padding: 0.7rem 3%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(124, 58, 237, 0.5);
            z-index: 2000;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            height: 40px;
            width: 40px;
            border-radius: 12px;
            object-fit: contain;
            background: white;
            box-shadow: 0 6px 16px rgba(124, 58, 237, 0.3);
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.3rem;
            background: linear-gradient(145deg, #c084fc, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
        }

        .logo-text span {
            font-weight: 600;
            font-size: 0.8rem;
            background: #64748b;
            -webkit-text-fill-color: #64748b;
            margin-left: 4px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(124, 58, 237, 0.15);
            border: 1px solid var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            color: var(--primary-light);
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: var(--primary);
            color: white;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 0.3rem 0.9rem 0.3rem 0.6rem;
            border-radius: 40px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(145deg, #7c3aed, #c084fc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
        }

        /* Layout */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .map-container {
            flex: 1;
            position: relative;
            min-width: 0;
        }

        #coverageMap {
            width: 100%;
            height: 100%;
        }

        /* Side Panel */
        .side-panel {
            width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-left: 1px solid rgba(124, 58, 237, 0.3);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 150;
        }

        .panel-section {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 16px;
            margin: 10px 12px;
            border: 1px solid rgba(124, 58, 237, 0.2);
        }

        .panel-section h4 {
            font-size: 0.85rem;
            margin-bottom: 12px;
            color: var(--primary-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-section label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .panel-section select,
        .panel-section input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid #334155;
            padding: 10px 14px;
            border-radius: 12px;
            color: white;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .panel-section select:focus,
        .panel-section input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
        }

        .panel-section select option {
            background: #1a1a2e;
            color: white;
        }

        .search-row {
            display: flex;
            gap: 8px;
        }

        .search-row input {
            flex: 1;
        }

        .search-row button {
            background: var(--primary);
            border: none;
            padding: 10px 16px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .search-row button:hover {
            background: var(--primary-dark);
        }

        .selected-location {
            background: rgba(124, 58, 237, 0.12);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 12px;
            font-size: 0.7rem;
            color: var(--text-muted);
            border: 1px dashed rgba(124, 58, 237, 0.3);
            min-height: 40px;
        }

        .selected-location strong {
            color: var(--primary-light);
        }

        .coords-row {
            display: flex;
            gap: 8px;
        }

        .coords-row input {
            flex: 1;
        }

        .btn {
            width: 100%;
            padding: 11px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            border: none;
            color: white;
        }

        .btn-primary {
            background: var(--primary);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: #334155;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Stats */
        .stat-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .stat-mini {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border-left: 3px solid var(--primary);
        }

        .stat-mini .number {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-light);
        }

        .stat-mini .label {
            font-size: 0.55rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Operation Badges */
        .operation-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 0.6rem;
            font-weight: 700;
        }

        .badge-brandinn { background: rgba(124,58,237,0.3); color: #c084fc; }
        .badge-deliveries { background: rgba(245,158,11,0.3); color: #fbbf24; }
        .badge-rides { background: rgba(34,197,94,0.3); color: #4ade80; }
        .badge-ekazi { background: rgba(6,182,212,0.3); color: #22d3ee; }
        .badge-heritage { background: rgba(217,70,239,0.3); color: #e879f9; }
        .badge-workfit { background: rgba(249,115,22,0.3); color: #fb923c; }
        .badge-hekima { background: rgba(16,185,129,0.3); color: #34d399; }

        .recent-list {
            max-height: 250px;
            overflow-y: auto;
            font-size: 0.7rem;
        }

        .recent-item {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
        }

        .recent-item:hover {
            background: rgba(124, 58, 237, 0.1);
        }

        .recent-item strong {
            color: var(--text-light);
            display: block;
            margin-bottom: 3px;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: #1e1b2e;
            border-left: 4px solid var(--primary);
            padding: 12px 18px;
            border-radius: 12px;
            color: white;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            animation: slideIn 0.25s ease;
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(60px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .spinner-small {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0.6rem 1rem;
            }
            .logo-text {
                font-size: 1rem;
            }
            .side-panel {
                width: 100%;
                position: fixed;
                right: 0;
                top: 60px;
                height: calc(100vh - 60px);
                transform: translateX(100%);
                transition: transform 0.3s ease;
                z-index: 1000;
            }
            .side-panel.open {
                transform: translateX(0);
                box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            }
            .menu-toggle-mobile {
                display: flex !important;
                background: var(--primary);
                border: none;
                color: white;
                padding: 8px 14px;
                border-radius: 20px;
                font-size: 0.75rem;
                cursor: pointer;
                align-items: center;
                gap: 6px;
                font-weight: 600;
            }
        }

        @media (min-width: 769px) {
            .side-panel {
                display: flex !important;
                transform: translateX(0) !important;
            }
            .menu-toggle-mobile {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">
            <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="KazInni Logo" class="logo-img">
            <span class="logo-text">KazInni <span>Workspaces</span></span>
        </div>
        <div class="nav-right">
            <a href="/workspaces/brandinn/index.html" class="nav-btn">
                <i class="fas fa-arrow-left"></i> Dashboard
            </a>
            <div class="user-badge">
                <div class="user-avatar" id="userAvatar">KA</div>
                <span id="userName">Field Agent</span>
            </div>
            <button class="nav-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Map Section -->
        <div class="map-container">
            <div id="coverageMap"></div>
        </div>

        <!-- Side Panel -->
        <div class="side-panel" id="sidePanel">
            <!-- Location Search -->
            <div class="panel-section">
                <h4><i class="fas fa-search-location"></i> Search Location</h4>
                <div class="search-row">
                    <input type="text" id="placeSearchInput" placeholder="Search place or address...">
                    <button id="searchPlaceBtn"><i class="fas fa-search"></i> Find</button>
                </div>
                <div class="coords-row" style="margin-top:8px;">
                    <input type="text" id="latInput" placeholder="Latitude">
                    <input type="text" id="lngInput" placeholder="Longitude">
                </div>
                <button class="btn btn-secondary" id="searchCoordsBtn" style="margin-top:8px;">
                    <i class="fas fa-crosshairs"></i> Go to Coordinates
                </button>
                <button class="btn btn-secondary" id="useGpsBtn" style="margin-top:6px;">
                    <i class="fas fa-location-dot"></i> Use My GPS Location
                </button>
                <div class="selected-location" id="selectedLocationDisplay">
                    <i class="fas fa-info-circle"></i> Search for a location or click on map

            <!-- Registration Form -->
            <div class="panel-section">
                <h4><i class="fas fa-plus-circle"></i> Add Business to Map</h4>
                
                <label><i class="fas fa-building"></i> Select Operation</label>
                <select id="operationSelect">
                    <option value="">-- Choose Operation --</option>
                    <option value="brandinn">🏪 BrandInn Business</option>
                    <option value="deliveries">📦 Pick Up Deliveries</option>
                    <option value="rides">🚗 Pick Me Rides</option>
                    <option value="ekazi">💻 E-Kazi</option>
                    <option value="heritage">🏛️ Heritage Marketplace</option>
                    <option value="workfit">💪 WorkFit Club</option>
                    <option value="hekima">📚 Hekima Hub</option>
                </select>

                <label><i class="fas fa-store"></i> Select Business</label>

                    <option value="">-- Select operation first --</option>
                </select>

                    Or register a new business below
                </small>

                <div id="newBusinessForm" style="margin-top:10px;">
                    <label style="margin-top:8px;"><i class="fas fa-store-alt"></i> Business Name *</label>

                    <label><i class="fas fa-envelope"></i> Email *</label>

                    <label><i class="fas fa-phone"></i> Phone Number *</label>
                    <input type="tel" id="phoneInput" placeholder="07XX XXX XXX">

                    <label><i class="fas fa-user"></i> Contact Person</label>
                    <input type="text" id="contactPersonInput" placeholder="Full name">

                    <label><i class="fas fa-phone-alt"></i> Alternative Phone</label>
                    <input type="tel" id="altPhoneInput" placeholder="Alternative number">

                    <label><i class="fas fa-map-marker-alt"></i> Physical Address</label>
                    <input type="text" id="addressInput" placeholder="Street, building, landmark">
                </div>

                <button class="btn btn-primary" id="addBusinessBtn" disabled>
                    <i class="fas fa-map-pin"></i> Add Business to Map

            </div>

            <!-- Stats -->
            <div class="stat-row" style="margin: 0 12px;">
                <div class="stat-mini">
                    <div class="number" id="totalOnMap">0</div>
                    <div class="label">Total on Map</div>
                </div>
                <div class="stat-mini" style="border-left-color: var(--success);">
                    <div class="number" id="sessionAdded">0</div>
                    <div class="label">Added Now</div>
                </div>
            </div>

            <!-- Recent List -->
            <div style="padding: 0 12px; margin-top: 4px;">
                <h4 style="font-size:0.8rem; color:var(--text-muted); margin-bottom:8px;">
                    <i class="fas fa-history"></i> Recently Added
                </h4>
            </div>
            <div class="recent-list" id="recentList" style="margin: 0 12px 12px;">
                <p style="color:var(--text-muted); text-align:center; padding:20px;">No businesses added yet</p>
            </div>

    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc",
            storageBucket: "mugera-e51cc.firebasestorage.app",
            messagingSenderId: "1024868637509",
            appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        // Operation definitions
        const OPERATIONS = {
            brandinn: { name: 'BrandInn Business', icon: 'fa-store', color: '#7c3aed', badgeClass: 'badge-brandinn' },
            deliveries: { name: 'Pick Up Deliveries', icon: 'fa-box', color: '#f59e0b', badgeClass: 'badge-deliveries' },
            rides: { name: 'Pick Me Rides', icon: 'fa-car', color: '#22c55e', badgeClass: 'badge-rides' },
            ekazi: { name: 'E-Kazi', icon: 'fa-laptop-code', color: '#06b6d4', badgeClass: 'badge-ekazi' },
            heritage: { name: 'Heritage Marketplace', icon: 'fa-landmark', color: '#d946ef', badgeClass: 'badge-heritage' },
            workfit: { name: 'WorkFit Club', icon: 'fa-dumbbell', color: '#f97316', badgeClass: 'badge-workfit' },
            hekima: { name: 'Hekima Hub', icon: 'fa-book-open', color: '#10b981', badgeClass: 'badge-hekima' }
        };

        let map, streetLayer, satelliteLayer;
        let businessMarkers = {};
        let searchMarker = null;
        let selectedLocation = null;
        let currentUser = null;
        let allMapEntries = [];
        let sessionAddedCount = 0;
        let registeredBusinesses = {};

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i> <span>${message}</span>`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
        }

        function getInitials(name) {
            return name ? name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2) : 'KA';
        }

        function getMarkerIcon(operation) {
            const op = OPERATIONS[operation] || { color: '#7c3aed', icon: 'fa-map-pin' };
            return L.divIcon({
                html: `<div style="background:${op.color}; width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:3px solid white; box-shadow:0 0 15px ${op.color};"><i class="fas ${op.icon}" style="color:white; font-size:14px;"></i></div>`,
                iconSize: [34, 34],
                popupAnchor: [0, -15]
            });
        }

        function updateSelectedLocation(lat, lng, displayName) {
            selectedLocation = { lat, lng, displayName };
            if (searchMarker) map.removeLayer(searchMarker);
            searchMarker = L.marker([lat, lng], {
                icon: L.divIcon({
                    html: `<div style="background:#7c3aed; width:20px; height:20px; border-radius:50%; border:3px solid white; box-shadow:0 0 12px rgba(124,58,237,0.6);"></div>`,
                    iconSize: [20, 20],
                    className: ''
                })
            }).addTo(map);
            searchMarker.bindPopup(`<strong>📍 Selected Location</strong><br>${escapeHtml(displayName)}<br>${lat.toFixed(6)}, ${lng.toFixed(6)}`).openPopup();
            document.getElementById('selectedLocationDisplay').innerHTML = `
                <strong><i class="fas fa-map-pin"></i> Selected:</strong><br>
                📍 ${escapeHtml(displayName.substring(0, 40))}<br>
                🎯 ${lat.toFixed(6)}, ${lng.toFixed(6)}
            `;
            document.getElementById('addBusinessBtn').disabled = false;
        }

        async function searchByPlaceName(query) {
            if (!query || query.trim().length < 2) { showToast('Enter a place name', 'error'); return; }
            document.getElementById('searchPlaceBtn').disabled = true;
            try {
                const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await resp.json();
                if (data && data.length > 0) {
                    const r = data[0];
                    updateSelectedLocation(parseFloat(r.lat), parseFloat(r.lon), r.display_name || query);
                    map.setView([parseFloat(r.lat), parseFloat(r.lon)], 17);
                    showToast(`📍 Found: ${r.display_name.split(',')[0]}`, 'success');
                } else {
                    showToast('Location not found. Try coordinates.', 'error');
                }
            } catch (e) { showToast('Search failed', 'error'); }
            document.getElementById('searchPlaceBtn').disabled = false;
        }

        function searchByCoordinates(lat, lng) {
            const la = parseFloat(lat), lo = parseFloat(lng);
            if (isNaN(la) || isNaN(lo) || la < -90 || la > 90 || lo < -180 || lo > 180) {
                showToast('Invalid coordinates', 'error'); return;
            }
            updateSelectedLocation(la, lo, `${la.toFixed(6)}, ${lo.toFixed(6)}`);
            map.setView([la, lo], 17);
            showToast('📍 Coordinates set', 'success');
        }

        function getUserLocation() {
            if (!navigator.geolocation) { showToast('Geolocation not supported', 'error'); return; }
            navigator.geolocation.getCurrentPosition(
                pos => {
                    updateSelectedLocation(pos.coords.latitude, pos.coords.longitude, `GPS (${Math.round(pos.coords.accuracy)}m)`);
                    map.setView([pos.coords.latitude, pos.coords.longitude], 18);
                    showToast('📍 GPS acquired', 'success');
                },
                err => { showToast('GPS unavailable. Search manually.', 'error'); },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        async function loadRegisteredBusinesses() {
            try {
                const snap = await database.ref('kazinni_registered_businesses').once('value');
                registeredBusinesses = snap.val() || {};
                updateBusinessDropdown();
            } catch (e) { console.error('Load businesses error:', e); }
        }

        function updateBusinessDropdown() {
            const operation = document.getElementById('operationSelect').value;
            const dropdown = document.getElementById('businessSelect');
            dropdown.innerHTML = '<option value="">-- Select business or type new below --</option>';
            
            if (!operation) {
                dropdown.disabled = true;
                return;
            }
            dropdown.disabled = false;
            
            const businessesForOp = Object.entries(registeredBusinesses)
                .filter(([_, b]) => b.operation === operation);
            
            if (businessesForOp.length === 0) {
                dropdown.innerHTML += '<option value="" disabled>No businesses registered yet</option>';
            } else {
                businessesForOp.forEach(([id, b]) => {
                    dropdown.innerHTML += `<option value="${id}">${escapeHtml(b.businessName)} - ${escapeHtml(b.email || '')}</option>`;
                });
            }
        }

        function populateFormFromBusiness(businessId) {
            if (!businessId || !registeredBusinesses[businessId]) return;
            const biz = registeredBusinesses[businessId];
            document.getElementById('businessNameInput').value = biz.businessName || '';
            document.getElementById('emailInput').value = biz.email || '';
            document.getElementById('phoneInput').value = biz.phone || '';
            document.getElementById('contactPersonInput').value = biz.contactPerson || '';
            document.getElementById('altPhoneInput').value = biz.altPhone || '';
            document.getElementById('addressInput').value = biz.address || '';
        }

        async function addBusinessToMap() {
            if (!selectedLocation) { showToast('Select a location first', 'error'); return; }
            if (!currentUser) { showToast('You must be logged in', 'error'); window.location.href = 'https://kazinni.vercel.app'; return; }

            const operation = document.getElementById('operationSelect').value;
            if (!operation) { showToast('Select an operation', 'error'); return; }

            const businessName = document.getElementById('businessNameInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();
            const contactPerson = document.getElementById('contactPersonInput').value.trim();
            const altPhone = document.getElementById('altPhoneInput').value.trim();
            const address = document.getElementById('addressInput').value.trim();

            if (!businessName) { showToast('Business name is required', 'error'); return; }
            if (!email) { showToast('Email is required', 'error'); return; }
            if (!phone) { showToast('Phone number is required', 'error'); return; }

            const businessData = {
                businessName,
                email,
                phone,
                contactPerson: contactPerson || 'Not provided',
                altPhone: altPhone || '',
                address: address || '',
                operation,
                operationName: OPERATIONS[operation]?.name || operation,
                lat: selectedLocation.lat,
                lng: selectedLocation.lng,
                displayName: selectedLocation.displayName,
                addedBy: currentUser.email,
                addedById: currentUser.uid,
                timestamp: new Date().toISOString(),
                status: 'active'
            };

            try {
                const mapId = Date.now().toString() + '_' + Math.random().toString(36).substr(2, 6);
                await database.ref(`kazinni_map_locations/${mapId}`).set(businessData);
                
                const businessRegId = `${operation}_${businessName.toLowerCase().replace(/[^a-z0-9]/g, '_')}`;
                const existingBiz = Object.entries(registeredBusinesses).find(([_, b]) => 
                    b.operation === operation && b.businessName.toLowerCase() === businessName.toLowerCase()
                );
                
                if (!existingBiz) {
                    const regData = { ...businessData, registeredAt: new Date().toISOString() };
                    await database.ref(`kazinni_registered_businesses/${businessRegId}`).set(regData);
                    registeredBusinesses[businessRegId] = regData;
                }

                allMapEntries.unshift({ id: mapId, ...businessData });
                addBusinessMarker(mapId, businessData);
                sessionAddedCount++;
                updateStats();
                showToast(`✅ "${businessName}" added to map!`, 'success');
                
                document.getElementById('businessNameInput').value = '';
                document.getElementById('emailInput').value = '';
                document.getElementById('phoneInput').value = '';
                document.getElementById('contactPersonInput').value = '';
                document.getElementById('altPhoneInput').value = '';
                document.getElementById('addressInput').value = '';
                updateBusinessDropdown();
            } catch (e) {
                console.error('Error:', e);
                showToast('Failed to add business', 'error');
            }
        }

        function addBusinessMarker(id, data) {
            if (businessMarkers[id] && map) map.removeLayer(businessMarkers[id]);
            const marker = L.marker([data.lat, data.lng], { icon: getMarkerIcon(data.operation) }).addTo(map);
            const opName = OPERATIONS[data.operation]?.name || data.operation;
            marker.bindPopup(`
                <div style="font-family:'Inter',sans-serif; min-width:200px;">
                    <strong>${escapeHtml(data.businessName)}</strong><br>
                    <span style="font-size:11px; color:#64748b;">🏷️ ${opName}</span><br>
                    <span style="font-size:10px;">📧 ${escapeHtml(data.email)}</span><br>
                    <span style="font-size:10px;">📞 ${escapeHtml(data.phone)}</span><br>
                    <span style="font-size:10px;">📍 ${data.lat.toFixed(5)}, ${data.lng.toFixed(5)}</span>
                </div>
            `);
            businessMarkers[id] = marker;
        }

        async function loadMapEntries() {
            for (let id in businessMarkers) { if (businessMarkers[id] && map) map.removeLayer(businessMarkers[id]); }
            businessMarkers = {};
            allMapEntries = [];
            try {
                const snap = await database.ref('kazinni_map_locations').once('value');
                const data = snap.val();
                if (data) {
                    Object.keys(data).forEach(key => {
                        const entry = data[key];
                        if (entry.lat && entry.lng) {
                            allMapEntries.push({ id: key, ...entry });
                            addBusinessMarker(key, entry);
                        }
                    });
                }
                allMapEntries.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                updateStats();
            } catch (e) { console.error('Load map entries error:', e); }
        }

        function updateStats() {
            document.getElementById('totalOnMap').textContent = allMapEntries.length;
            document.getElementById('sessionAdded').textContent = sessionAddedCount;
            const list = document.getElementById('recentList');
            if (allMapEntries.length === 0) {
                list.innerHTML = '<p style="color:var(--text-muted); text-align:center; padding:20px;">No businesses added yet</p>';
            } else {
                list.innerHTML = allMapEntries.slice(0, 15).map(b => {
                    const op = OPERATIONS[b.operation] || { badgeClass: '', name: b.operation };
                    return `
                        <div class="recent-item" onclick="if(map) map.setView([${b.lat}, ${b.lng}], 17)">
                            <strong>${escapeHtml(b.businessName)}</strong>
                            <span class="operation-badge ${op.badgeClass}">${op.name}</span><br>
                            📍 ${b.lat.toFixed(5)}, ${b.lng.toFixed(5)} · ${new Date(b.timestamp).toLocaleDateString()}
                        </div>
                    `;
                }).join('');
            }
        }

        function initMap() {
            streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM', maxZoom: 19 });
            satelliteLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { subdomains: ['mt0','mt1','mt2','mt3'], maxZoom: 19 });
            map = L.map('coverageMap', { center: [-1.2864, 36.8172], zoom: 13 });
            streetLayer.addTo(map);
            L.control.scale({ metric: true, position: 'bottomleft' }).addTo(map);
            
            map.on('click', e => {
                updateSelectedLocation(e.latlng.lat, e.latlng.lng, `Map click (${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)})`);
            });

            loadMapEntries();
            loadRegisteredBusinesses();
            getUserLocation();

            database.ref('kazinni_map_locations').on('child_added', snap => {
                const entry = snap.val();
                if (entry.lat && entry.lng && !businessMarkers[snap.key]) {
                    allMapEntries.unshift({ id: snap.key, ...entry });
                    addBusinessMarker(snap.key, entry);
                    updateStats();
                }
            });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('userName').textContent = user.email?.split('@')[0] || 'Agent';
                document.getElementById('userAvatar').textContent = getInitials(user.email?.split('@')[0] || 'KA');
                if (!map) initMap();
                else { loadMapEntries(); loadRegisteredBusinesses(); }
            } else {
                window.location.href = 'https://kazinni.vercel.app';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await auth.signOut();
                window.location.href = 'https://kazinni.vercel.app';
            });

            document.getElementById('operationSelect').addEventListener('change', updateBusinessDropdown);
            
            document.getElementById('businessSelect').addEventListener('change', function() {
                if (this.value) populateFormFromBusiness(this.value);
            });

            document.getElementById('searchPlaceBtn').addEventListener('click', () => {
                searchByPlaceName(document.getElementById('placeSearchInput').value.trim());
            });
            
            document.getElementById('placeSearchInput').addEventListener('keypress', e => {
                if (e.key === 'Enter') searchByPlaceName(e.target.value.trim());
            });

            document.getElementById('searchCoordsBtn').addEventListener('click', () => {
                searchByCoordinates(document.getElementById('latInput').value, document.getElementById('lngInput').value);
            });

            document.getElementById('useGpsBtn').addEventListener('click', getUserLocation);
            document.getElementById('addBusinessBtn').addEventListener('click', addBusinessToMap);

            const menuToggle = document.getElementById('menuToggleMobile');
            if (menuToggle) {
                menuToggle.addEventListener('click', () => {
                    document.getElementById('sidePanel').classList.toggle('open');
                });
            }

            function checkScreen() {
                const toggle = document.getElementById('menuToggleMobile');
                if (window.innerWidth <= 768) {
                    if (toggle) toggle.style.display = 'flex';
                } else {
                    if (toggle) toggle.style.display = 'none';
                    document.getElementById('sidePanel').classList.remove('open');
                }
            }
            checkScreen();
            window.addEventListener('resize', checkScreen);
        });
    </script>
</body>
</html>
