<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BrandInn | Quote Manager</title>
  
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #7c3aed;
      --primary-dark: #5b21b6;
      --primary-light: #a78bfa;
      --primary-bg: #f5f0ff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
    }

    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #f8fafc;
      color: var(--gray-700);
      line-height: 1.45;
      font-size: 14px;
      font-weight: 400;
      min-height: 100vh;
    }

    /* Typography - Professional & Refined */
    h1, h2, h3, h4, .heading {
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--gray-800);
    }
    h1 { font-size: 1.5rem; }
    h2 { font-size: 1.2rem; }
    h3 { font-size: 1rem; }
    .small-text { font-size: 0.7rem; color: var(--gray-500); }
    .caption { font-size: 0.65rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; color: var(--gray-500); }

    /* Header */
    .navbar {
      background: white;
      padding: 0.6rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; cursor: pointer; }
    .logo-img { height: 36px; width: 36px; border-radius: 10px; object-fit: contain; }
    .logo-text { font-weight: 700; font-size: 1.2rem; background: linear-gradient(145deg, #7c3aed, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-text span { font-weight: 500; font-size: 0.7rem; background: #64748b; -webkit-text-fill-color: #64748b; margin-left: 4px; }

    .nav-links { display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
    .nav-btn {
      background: transparent; border: none; padding: 0.4rem 1rem; border-radius: 40px;
      color: var(--gray-600); font-weight: 500; font-size: 0.8rem; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
      transition: all 0.2s ease;
    }
    .nav-btn:hover { background: var(--gray-100); color: var(--primary); }
    .nav-btn.active { background: var(--primary); color: white; }

    .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 5%; width: 100%; }

    .page-header {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .page-header h1 {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.4rem;
      font-weight: 600;
    }
    .page-header h1 i { color: var(--primary); font-size: 1.3rem; }

    .btn-new-quote {
      background: var(--primary); color: white; border: none; padding: 0.6rem 1.4rem;
      border-radius: 40px; font-weight: 500; font-size: 0.8rem; cursor: pointer;
      display: flex; align-items: center; gap: 8px; transition: all 0.2s;
    }
    .btn-new-quote:hover { background: var(--primary-dark); transform: translateY(-1px); }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: white;
      border-radius: 20px;
      padding: 1rem 1.2rem;
      border: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      transition: all 0.2s;
    }
    .stat-icon {
      width: 42px;
      height: 42px;
      background: var(--primary-bg);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--primary);
    }
    .stat-info h3 { font-size: 1.4rem; font-weight: 700; color: var(--gray-800); line-height: 1.2; }
    .stat-info p { font-size: 0.65rem; color: var(--gray-500); font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }

    /* Quotes Table */
    .quotes-container {
      background: white;
      border-radius: 24px;
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .table-header {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--gray-50);
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      border: 1px solid var(--gray-200);
    }
    .search-box input {
      border: none;
      background: transparent;
      padding: 0.3rem;
      width: 180px;
      outline: none;
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
    }
    .filter-select {
      padding: 0.4rem 1rem;
      border-radius: 40px;
      border: 1px solid var(--gray-200);
      background: white;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .quotes-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }
    .quotes-table th {
      text-align: left;
      padding: 0.8rem 1rem;
      background: var(--gray-50);
      font-weight: 600;
      color: var(--gray-600);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .quotes-table td {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--gray-100);
      vertical-align: middle;
    }
    .quotes-table tr:hover td { background: var(--primary-bg); cursor: pointer; }
    
    .status-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 30px;
      font-size: 0.65rem;
      font-weight: 600;
    }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-approved { background: #d1fae5; color: #065f46; }
    .status-sent { background: #dbeafe; color: #1e40af; }
    .status-completed { background: #e0e7ff; color: #3730a3; }
    
    .action-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .action-btn {
      padding: 4px 8px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 0.65rem;
      font-weight: 500;
      transition: all 0.2s;
      background: var(--gray-100);
      color: var(--gray-700);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .action-btn.view { background: var(--primary-bg); color: var(--primary); }
    .action-btn.edit { background: #e0e7ff; color: #3730a3; }
    .action-btn.delete { background: #fee2e2; color: var(--danger); }
    .action-btn.pdf { background: #1e293b; color: white; }
    .action-btn:hover { transform: translateY(-1px); filter: brightness(0.95); }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(3px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      border-radius: 28px;
      max-width: 650px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 1.5rem;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--gray-200);
    }
    .modal-header h2 { font-size: 1.2rem; font-weight: 600; }
    .close-modal {
      background: transparent;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--gray-400);
    }
    .detail-row {
      margin-bottom: 0.8rem;
      display: flex;
      flex-wrap: wrap;
      font-size: 0.8rem;
    }
    .detail-label {
      width: 120px;
      font-weight: 500;
      color: var(--gray-500);
    }
    .detail-value { flex: 1; color: var(--gray-800); }
    .detail-services {
      background: var(--gray-50);
      border-radius: 14px;
      padding: 0.8rem;
      margin: 0.8rem 0;
      font-size: 0.75rem;
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 1.2rem; justify-content: flex-end; }
    
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--success);
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      z-index: 2000;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .toast.error { background: var(--danger); }
    .empty-state { text-align: center; padding: 2.5rem; color: var(--gray-400); font-size: 0.8rem; }

    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .quotes-table th, .quotes-table td { padding: 0.6rem; }
    }
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: 1fr; }
      .table-header { flex-direction: column; align-items: stretch; }
      .detail-label { width: 100%; margin-bottom: 0.2rem; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo" onclick="window.location.href='index.html'">
    <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="BrandInn" class="logo-img">
    <span class="logo-text">BrandInn <span>Business</span></span>
  </div>
  <div class="nav-links">
    <a href="quote-manager.html" class="nav-btn active"><i class="fas fa-file-invoice-dollar"></i> Quotes</a>
    <a href="service-requests.html" class="nav-btn"><i class="fas fa-ticket-alt"></i> Requests</a>
    <a href="projects.html" class="nav-btn"><i class="fas fa-project-diagram"></i> Projects</a>
    <a href="bookings.html" class="nav-btn"><i class="fas fa-calendar-check"></i> Bookings</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1><i class="fas fa-file-invoice-dollar"></i> Quote Manager</h1>
    <button class="btn-new-quote" id="newQuoteBtn"><i class="fas fa-plus"></i> New Quote</button>
  </div>

  <div class="stats-grid" id="statsContainer">
    <div class="stat-card"><div class="stat-icon"><i class="fas fa-file-alt"></i></div><div class="stat-info"><h3 id="totalQuotes">0</h3><p>Total Quotes</p></div></div>
    <div class="stat-card"><div class="stat-icon"><i class="fas fa-hourglass-half"></i></div><div class="stat-info"><h3 id="pendingQuotes">0</h3><p>Pending</p></div></div>
    <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-info"><h3 id="approvedQuotes">0</h3><p>Approved</p></div></div>
    <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-info"><h3 id="totalValue">KES 0</h3><p>Total Value</p></div></div>
  </div>

  <div class="quotes-container">
    <div class="table-header">
      <div class="search-box">
        <i class="fas fa-search" style="color: var(--gray-400); font-size: 0.75rem;"></i>
        <input type="text" id="searchInput" placeholder="Search client or business...">
      </div>
      <select id="statusFilter" class="filter-select">
        <option value="all">All Status</option>
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="sent">Sent</option>
        <option value="completed">Completed</option>
      </select>
    </div>
    <div style="overflow-x: auto;">
      <table class="quotes-table">
        <thead>
          <tr><th>Quote #</th><th>Client / Business</th><th>Services</th><th>Total (KES)</th><th>Status</th><th>Date</th><th>Actions</th></tr>
        </thead>
        <tbody id="quotesTableBody">
          <tr><td colspan="7"><div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Loading quotes...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="quoteModal" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h2 id="modalTitle">Quote Details</h2><button class="close-modal" onclick="closeModal()">&times;</button></div>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="action-btn pdf" id="modalPdfBtn"><i class="fas fa-file-pdf"></i> PDF</button>
      <button class="action-btn edit" id="modalEditBtn"><i class="fas fa-edit"></i> Edit</button>
      <button class="action-btn delete" id="modalDeleteBtn"><i class="fas fa-trash"></i> Delete</button>
    </div>
  </div>
</div>
<div id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
    authDomain: "mugera-e51cc.firebaseapp.com",
    databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "mugera-e51cc",
    storageBucket: "mugera-e51cc.firebasestorage.app",
    messagingSenderId: "1024868637509",
    appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const auth = firebase.auth();

  let allQuotes = {};
  let currentQuoteId = null;

  function showToast(msg, isError = false) {
    const container = document.getElementById('toastContainer');
    const existing = container.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `toast ${isError ? 'error' : ''}`;
    toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
  function formatDate(timestamp) { if (!timestamp) return ''; const d = new Date(timestamp); return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }); }
  function formatDateFull(timestamp) { if (!timestamp) return ''; const d = new Date(timestamp); return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }

  function updateStats() {
    const quotes = Object.values(allQuotes);
    const total = quotes.length;
    const pending = quotes.filter(q => q.status === 'pending').length;
    const approved = quotes.filter(q => q.status === 'approved').length;
    const totalValue = quotes.reduce((sum, q) => sum + (q.total || 0), 0);
    document.getElementById('totalQuotes').textContent = total;
    document.getElementById('pendingQuotes').textContent = pending;
    document.getElementById('approvedQuotes').textContent = approved;
    document.getElementById('totalValue').textContent = `KES ${totalValue.toLocaleString()}`;
  }

  function renderQuotes() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const statusFilter = document.getElementById('statusFilter').value;
    const tbody = document.getElementById('quotesTableBody');
    let quotes = Object.entries(allQuotes).map(([id, q]) => ({ id, ...q }));
    quotes.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    
    if (searchTerm) {
      quotes = quotes.filter(q => (q.clientName || '').toLowerCase().includes(searchTerm) || (q.businessName || '').toLowerCase().includes(searchTerm));
    }
    if (statusFilter !== 'all') quotes = quotes.filter(q => q.status === statusFilter);
    
    if (quotes.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><i class="fas fa-inbox"></i> No quotes found</div></td></tr>';
      return;
    }
    
    tbody.innerHTML = quotes.map(q => `
      <tr onclick="viewQuote('${q.id}')">
        <td><span class="caption">#${(q.quoteNumber || q.id.slice(-6)).toUpperCase()}</span></td>
        <td><strong>${escapeHtml(q.clientName || '—')}</strong><br><span class="small-text">${escapeHtml(q.businessName || '')}</span></td>
        <td>${q.services?.length || 0} item(s)</td>
        <td><strong>KES ${(q.total || 0).toLocaleString()}</strong></td>
        <td><span class="status-badge status-${q.status || 'pending'}">${(q.status || 'pending').toUpperCase()}</span></td>
        <td class="small-text">${formatDate(q.createdAt)}</td>
        <td><div class="action-btns" onclick="event.stopPropagation()">
          <button class="action-btn view" onclick="viewQuote('${q.id}')"><i class="fas fa-eye"></i></button>
          <button class="action-btn edit" onclick="editQuote('${q.id}')"><i class="fas fa-edit"></i></button>
          <button class="action-btn pdf" onclick="generateQuotePDF('${q.id}')"><i class="fas fa-file-pdf"></i></button>
          <button class="action-btn delete" onclick="deleteQuote('${q.id}')"><i class="fas fa-trash"></i></button>
        </div></td>
      </tr>
    `).join('');
    updateStats();
  }

  window.viewQuote = function(id) {
    currentQuoteId = id;
    const q = allQuotes[id];
    if (!q) return;
    
    const servicesHtml = (q.services || []).map(s => `
      <div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--gray-200);">
        <span><strong>${escapeHtml(s.name)}</strong> x${s.quantity}</span>
        <span>KES ${(s.price * s.quantity).toLocaleString()}</span>
      </div>
    `).join('');
    
    document.getElementById('modalTitle').textContent = `Quote #${(q.quoteNumber || id.slice(-6)).toUpperCase()}`;
    document.getElementById('modalBody').innerHTML = `
      <div class="detail-row"><div class="detail-label">Client:</div><div class="detail-value"><strong>${escapeHtml(q.clientName)}</strong></div></div>
      <div class="detail-row"><div class="detail-label">Business:</div><div class="detail-value">${escapeHtml(q.businessName || '—')}</div></div>
      <div class="detail-row"><div class="detail-label">Contact:</div><div class="detail-value">${escapeHtml(q.phone || '—')} ${q.email ? '| ' + escapeHtml(q.email) : ''}</div></div>
      <div class="detail-row"><div class="detail-label">Status:</div><div class="detail-value">
        <select id="statusUpdate" class="filter-select" style="padding:0.2rem 0.6rem; font-size:0.7rem;">
          <option value="pending" ${q.status === 'pending' ? 'selected' : ''}>Pending</option>
          <option value="approved" ${q.status === 'approved' ? 'selected' : ''}>Approved</option>
          <option value="sent" ${q.status === 'sent' ? 'selected' : ''}>Sent</option>
          <option value="completed" ${q.status === 'completed' ? 'selected' : ''}>Completed</option>
        </select>
      </div></div>
      <div class="detail-row"><div class="detail-label">Urgency:</div><div class="detail-value">${q.urgency || 'normal'}</div></div>
      <div class="detail-services"><span class="caption">Services</span>${servicesHtml}</div>
      <div class="detail-row"><div class="detail-label">Subtotal:</div><div class="detail-value">KES ${(q.subtotal || 0).toLocaleString()}</div></div>
      ${q.urgencyFee ? `<div class="detail-row"><div class="detail-label">Urgency fee:</div><div class="detail-value">KES ${Math.round(q.urgencyFee).toLocaleString()}</div></div>` : ''}
      ${q.serviceFee ? `<div class="detail-row"><div class="detail-label">Extra fee:</div><div class="detail-value">KES ${q.serviceFee.toLocaleString()}</div></div>` : ''}
      <div class="detail-row"><div class="detail-label"><strong>Total:</strong></div><div class="detail-value"><strong style="color:var(--primary);">KES ${(q.total || 0).toLocaleString()}</strong></div></div>
      ${q.instructions ? `<div class="detail-row"><div class="detail-label">Notes:</div><div class="detail-value" style="white-space:pre-wrap;">${escapeHtml(q.instructions)}</div></div>` : ''}
      <div class="detail-row"><div class="detail-label">Created:</div><div class="detail-value small-text">${formatDateFull(q.createdAt)}</div></div>
    `;
    document.getElementById('quoteModal').style.display = 'flex';
    
    const statusSelect = document.getElementById('statusUpdate');
    if (statusSelect) {
      statusSelect.onchange = async () => {
        await database.ref(`brandinn_service_requests/${currentQuoteId}/status`).set(statusSelect.value);
        showToast(`Status updated to ${statusSelect.value}`);
        renderQuotes();
      };
    }
  };

  window.closeModal = function() { document.getElementById('quoteModal').style.display = 'none'; currentQuoteId = null; };
  window.editQuote = (id) => { window.location.href = `service-requests.html?edit=${id}`; };
  
  window.deleteQuote = async (id) => {
    if (confirm('Delete this quote permanently?')) {
      try {
        await database.ref(`brandinn_service_requests/${id}`).remove();
        showToast('Quote deleted');
        renderQuotes();
        if (currentQuoteId === id) closeModal();
      } catch(e) { showToast('Error deleting', true); }
    }
  };

  window.generateQuotePDF = function(id) {
    const q = allQuotes[id];
    if (!q) return;
    const name = q.clientName || 'Client';
    const quoteNum = q.quoteNumber || id.slice(-6).toUpperCase();
    const date = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' });
    const servicesArray = q.services || [];
    const urgencyLabel = q.urgency === 'urgent' ? 'Urgent (+15%)' : q.urgency === 'express' ? 'Express (+30%)' : 'Standard';
    const logoUrl = 'https://i.postimg.cc/W4LbBJ32/Brand-Inn-Business.webp';
    
    const printWindow = window.open('', '_blank');
    printWindow.document.write(`
      <!DOCTYPE html>
      <html>
      <head><meta charset="UTF-8"><title>BrandInn_Quote_${name.replace(/\s/g, '_')}</title>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
      <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;padding:1.5rem;max-width:1000px;margin:0 auto;background:white;color:#1e293b;font-size:13px;}
        .print-btn{background:#7c3aed;color:white;border:none;padding:8px 20px;border-radius:40px;cursor:pointer;font-weight:500;margin-bottom:20px;display:inline-flex;align-items:center;gap:6px;font-size:12px;}
        .header{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #7c3aed;padding-bottom:0.8rem;margin-bottom:1.2rem;flex-wrap:wrap;gap:1rem;}
        .logo-area{display:flex;align-items:center;gap:10px;}
        .logo-img{height:45px;width:45px;object-fit:contain;}
        .brand h2{color:#5b21b6;font-size:1.3rem;font-weight:700;}
        .quote-title{text-align:right;}
        .quote-title h3{color:#7c3aed;font-size:1rem;font-weight:700;}
        .client-section{background:#f8fafc;padding:0.8rem;border-radius:14px;margin:1rem 0;border-left:3px solid #7c3aed;}
        .client-details{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;font-size:0.75rem;margin-top:6px;}
        .items-table{width:100%;border-collapse:collapse;margin:1rem 0;}
        .items-table th{background:#f1f5f9;padding:8px;text-align:left;font-size:0.7rem;font-weight:600;}
        .items-table td{padding:8px;border-bottom:1px solid #e2e8f0;font-size:0.7rem;}
        .total-box{text-align:right;padding:0.8rem;background:#f5f0ff;border-radius:12px;margin:0.8rem 0;}
        .total-amount{font-size:1.5rem;font-weight:800;color:#5b21b6;}
        .footer{text-align:center;font-size:0.6rem;color:#94a3b8;margin-top:1.2rem;padding-top:0.8rem;border-top:1px solid #e2e8f0;}
        @media print{.no-print{display:none;}body{padding:0;}}
      </style>
      </head>
      <body>
        <div class="no-print" style="text-align:center;margin-bottom:15px;"><button class="print-btn" onclick="window.print();"><i class="fas fa-print"></i> Save as PDF</button></div>
        <div class="header">
          <div class="logo-area"><img src="${logoUrl}" class="logo-img" onerror="this.style.display='none'"><div class="brand"><h2>BRANDINN</h2></div></div>
          <div class="quote-title"><h3>QUOTE</h3><p>#${quoteNum}</p><p>${date}</p></div>
        </div>
        <div class="client-section">
          <div class="client-details">
            <div><strong>${escapeHtml(q.clientName)}</strong><br>${escapeHtml(q.businessName || '—')}<br>📞 ${escapeHtml(q.phone || '—')}</div>
            <div><strong>Details</strong><br>Urgency: ${urgencyLabel}<br>Notes: ${escapeHtml(q.instructions || 'None')}</div>
          </div>
        </div>
        <table class="items-table">
          <thead><tr><th>Service</th><th>Qty</th><th>Unit (KES)</th><th>Total</th></tr></thead>
          <tbody>
            ${servicesArray.map(s => `<tr><td><strong>${escapeHtml(s.name)}</strong></td><td>${s.quantity}</td><td>${s.price.toLocaleString()}</td><td>${(s.price * s.quantity).toLocaleString()}</td></tr>`).join('')}
            ${q.urgencyFee > 0 ? `<tr><td colspan="3" style="text-align:right;">Urgency surcharge</td><td>${Math.round(q.urgencyFee).toLocaleString()}</td></tr>` : ''}
            ${q.serviceFee > 0 ? `<tr><td colspan="3" style="text-align:right;">Additional fee</td><td>${q.serviceFee.toLocaleString()}</td></tr>` : ''}
          </tbody>
        </table>
        <div class="total-box"><div class="total-amount">KES ${(q.total || 0).toLocaleString()}</div></div>
        <div class="footer">BrandInn Business · business.brandinn@gmail.com · Valid 30 days</div>
      </body>
      </html>
    `);
    printWindow.document.close();
    showToast(`Quote opened - click Save as PDF`);
  };

  function loadQuotes() {
    database.ref('brandinn_service_requests').on('value', (snap) => {
      allQuotes = snap.val() || {};
      renderQuotes();
    });
  }

  document.getElementById('searchInput').addEventListener('input', renderQuotes);
  document.getElementById('statusFilter').addEventListener('change', renderQuotes);
  document.getElementById('newQuoteBtn').onclick = () => window.location.href = 'service-requests.html';
  document.getElementById('modalPdfBtn').onclick = () => { if (currentQuoteId) generateQuotePDF(currentQuoteId); };
  document.getElementById('modalEditBtn').onclick = () => { if (currentQuoteId) editQuote(currentQuoteId); };
  document.getElementById('modalDeleteBtn').onclick = () => { if (currentQuoteId) deleteQuote(currentQuoteId); };
  window.onclick = (e) => { if (e.target === document.getElementById('quoteModal')) closeModal(); };

  auth.onAuthStateChanged(u => { if (!u) window.location.href = 'https://kazinni.vercel.app'; else loadQuotes(); });
</script>
</body>
</html>
