<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dispatch | DSOG Fashion</title>
  <meta name="theme-color" content="#ec4899">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --pink: #ec4899; --pink-dark: #be185d; --text-primary: #1e293b; --text-muted: #64748b; --border-light: #fbcfe8; --red: #ef4444; --green: #10b981; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #fdf2f8 0%, #ffffff 100%); color: var(--text-primary); line-height: 1.4; min-height: 100vh; }
    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(16px); padding: 0.5rem 2%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(236,72,153,0.2); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 8px; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(236,72,153,0.2); }
    .logo-text { font-weight: 800; font-size: 1.1rem; background: linear-gradient(145deg, #f472b6, #be185d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #ec4899; -webkit-text-fill-color: #ec4899; margin-left: 3px; }
    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn { background: rgba(236,72,153,0.08); border: 1px solid rgba(236,72,153,0.2); padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--pink-dark); font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; text-decoration: none; }
    .nav-btn:hover { background: var(--pink); color: white; }
    .container { padding: 1rem 2%; flex: 1; }
    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-mini { background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center; border: 1px solid #fbcfe8; }
    .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--pink-dark); }
    .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
    .filter-btn { padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0; background: white; color: #64748b; font-weight: 600; font-size: 0.65rem; cursor: pointer; font-family: inherit; }
    .filter-btn.active { background: var(--pink); color: white; border-color: var(--pink); }
    .search-box { flex: 1; min-width: 150px; max-width: 300px; position: relative; }
    .search-box input { width: 100%; padding: 0.35rem 0.8rem 0.35rem 2rem; border-radius: 20px; border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif; }
    .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
    .table-wrap { background: white; border-radius: 16px; border: 1px solid #fbcfe8; overflow: hidden; }
    .table-scroll { overflow-x: auto; max-height: 60vh; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    thead { position: sticky; top: 0; z-index: 2; background: #fdf2f8; }
    th { padding: 0.6rem 0.7rem; text-align: left; font-weight: 700; color: #be185d; font-size: 0.6rem; text-transform: uppercase; white-space: nowrap; }
    td { padding: 0.5rem 0.7rem; border-bottom: 1px solid #fdf2f8; vertical-align: middle; }
    tr:hover td { background: #fdf2f8; }
    .status-badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.6rem; font-weight: 700; }
    .status-ready { background: #fef3c7; color: #b45309; }
    .status-shipped { background: #ede9fe; color: #5b21b6; }
    .status-delivered { background: #d1fae5; color: #065f46; }
    .action-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .action-btn { padding: 0.25rem 0.5rem; border-radius: 6px; border: none; font-size: 0.6rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 3px; font-family: inherit; }
    .btn-assign { background: #e0f2fe; color: #0369a1; }
    .btn-assigned { background: #d1fae5; color: #065f46; }
    .btn-ship { background: #ede9fe; color: #5b21b6; }
    .btn-deliver { background: #d1fae5; color: #065f46; }
    .btn-view { background: #fdf2f8; color: #be185d; }
    .empty-row td { text-align: center; padding: 2rem; color: #94a3b8; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: white; border-radius: 20px; padding: 1.5rem; max-width: 500px; width: 95%; max-height: 85vh; overflow-y: auto; }
    .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; color: var(--pink-dark); }
    .form-group { margin-bottom: 0.7rem; }
    .form-group label { display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.15rem; }
    .form-group select { width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px; border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif; background: #f8fafc; }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 10px; border: none; font-weight: 700; font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; font-family: inherit; }
    .btn-primary { background: var(--pink); color: white; }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .toast { position: fixed; bottom: 25px; right: 25px; background: var(--green); color: white; padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000; animation: slideIn 0.3s ease; font-size: 0.75rem; }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/workspaces/dsog-fashion/dsog-fashion-dashboard.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="DSOG Fashion" class="logo-img">
      <span class="logo-text">DSOG <span>Fashion</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/dsog-fashion/dsog-fashion-dashboard.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="/workspaces/dsog-fashion/dsog-fashion-orders.html" class="nav-btn"><i class="fas fa-shopping-bag"></i> Orders</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-truck-fast"></i> Dispatch Orders</h1>
      <p style="font-size:0.75rem;color:var(--text-muted);" id="orderCount">Loading...</p>
    </div>

    <div class="stats-row">
      <div class="stat-mini"><div class="stat-num" id="statReady">0</div><div class="stat-label">Ready to Ship</div></div>
      <div class="stat-mini"><div class="stat-num" id="statTransit">0</div><div class="stat-label">In Transit</div></div>
      <div class="stat-mini"><div class="stat-num" id="statDelivered">0</div><div class="stat-label">Delivered Today</div></div>
      <div class="stat-mini"><div class="stat-num" id="statDrivers">0</div><div class="stat-label">Active Drivers</div></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="ready">Ready <span id="countReady">0</span></button>
      <button class="filter-btn" data-filter="shipped">Shipped <span id="countShipped">0</span></button>
      <button class="filter-btn" data-filter="delivered">Delivered <span id="countDelivered">0</span></button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search...">
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead><tr><th>ID</th><th>Customer</th><th>Phone</th><th>Items</th><th>Total</th><th>Location</th><th>Driver</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="tableBody"><tr class="empty-row"><td colspan="9">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    // Firebase init
    firebase.initializeApp({
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    });
    
    var db = firebase.database();
    var auth = firebase.auth();
    var allOrders = {};
    var allDrivers = {};
    var currentFilter = 'all';
    var searchQuery = '';

    // Toast
    function toast(msg, err) {
      var c = document.getElementById('toastContainer');
      var t = document.createElement('div');
      t.className = 'toast' + (err ? ' error' : '');
      t.innerHTML = '<i class="fas fa-' + (err ? 'exclamation-circle' : 'check-circle') + '"></i> ' + msg;
      c.appendChild(t);
      setTimeout(function(){ t.remove(); }, 3000);
    }

    // Render
    function render() {
      var orders = [];
      for (var k in allOrders) {
        if (allOrders[k] && (allOrders[k].status === 'ready' || allOrders[k].status === 'shipped' || allOrders[k].status === 'delivered')) {
          orders.push(Object.assign({ id: k }, allOrders[k]));
        }
      }
      
      if (currentFilter !== 'all') orders = orders.filter(function(o){ return o.status === currentFilter; });
      if (searchQuery) {
        var q = searchQuery.toLowerCase();
        orders = orders.filter(function(o){ return (o.customerName||'').toLowerCase().indexOf(q) !== -1 || (o.customerPhone||'').indexOf(q) !== -1 || (o.driverName||'').indexOf(q) !== -1; });
      }
      
      orders.sort(function(a,b){ return (b.createdAt||0) - (a.createdAt||0); });
      
      var tbody = document.getElementById('tableBody');
      if (!orders.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="9">No orders to dispatch</td></tr>';
        return;
      }
      
      var html = '';
      orders.forEach(function(o){
        var s = o.status || 'ready';
        var d = o.driverName || '';
        var id = String(o.id).slice(-6);
        var items = (o.products||[]).length;
        var init = (o.customerName||'??').split(' ').map(function(n){return n[0];}).join('').toUpperCase().substring(0,2);
        
        html += '<tr>';
        html += '<td><code style="font-size:0.65rem;background:#fdf2f8;padding:2px 6px;border-radius:4px;">#'+id+'</code></td>';
        html += '<td><div style="display:flex;align-items:center;gap:8px;"><div style="width:28px;height:28px;background:#fdf2f8;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.65rem;color:#be185d;">'+init+'</div><strong>'+(o.customerName||'Customer')+'</strong></div></td>';
        html += '<td><span style="font-size:0.7rem;">'+(o.customerPhone||o.phone||'—')+'</span></td>';
        html += '<td>'+items+' item'+(items!==1?'s':'')+'</td>';
        html += '<td><strong>KES '+(o.total||0).toLocaleString()+'</strong></td>';
        html += '<td>'+(o.location||'—')+'</td>';
        html += '<td>'+(d||'<span style="color:#94a3b8;">Unassigned</span>')+'</td>';
        html += '<td><span class="status-badge status-'+s+'">'+s+'</span></td>';
        html += '<td><div class="action-btns">';
        html += '<button class="action-btn btn-view" onclick="viewOrd(\''+k+'\')"><i class="fas fa-eye"></i></button>';
        if (s === 'ready' && d) {
          html += '<button class="action-btn btn-assigned" disabled><i class="fas fa-check"></i> '+d.split(' ')[0]+'</button>';
          html += '<button class="action-btn btn-ship" onclick="updateOrd(\''+k+'\',\'shipped\')"><i class="fas fa-truck"></i> Ship</button>';
        } else if (s === 'ready' && !d) {
          html += '<button class="action-btn btn-assign" onclick="assignModal(\''+k+'\')"><i class="fas fa-user-plus"></i> Assign</button>';
        } else if (s === 'shipped') {
          html += '<button class="action-btn btn-deliver" onclick="updateOrd(\''+k+'\',\'delivered\')"><i class="fas fa-check-double"></i> Deliver</button>';
        }
        html += '</div></td></tr>';
      });
      tbody.innerHTML = html;
      
      // Stats
      var all = Object.values(allOrders).filter(function(o){return o;});
      document.getElementById('statReady').textContent = all.filter(function(o){return o.status==='ready';}).length;
      document.getElementById('statTransit').textContent = all.filter(function(o){return o.status==='shipped';}).length;
      document.getElementById('statDelivered').textContent = all.filter(function(o){return o.status==='delivered';}).length;
      document.getElementById('statDrivers').textContent = Object.values(allDrivers).filter(function(d){return d&&d.verified;}).length;
      document.getElementById('countReady').textContent = all.filter(function(o){return o.status==='ready';}).length;
      document.getElementById('countShipped').textContent = all.filter(function(o){return o.status==='shipped';}).length;
      document.getElementById('countDelivered').textContent = all.filter(function(o){return o.status==='delivered';}).length;
      document.getElementById('orderCount').textContent = all.length+' total';
    }

    // Update status
    window.updateOrd = function(orderId, newStatus) {
      if (!confirm('Update to '+newStatus+'?')) return;
      var u = { status: newStatus, updatedAt: firebase.database.ServerValue.TIMESTAMP };
      if (newStatus === 'delivered') u.deliveredAt = firebase.database.ServerValue.TIMESTAMP;
      if (newStatus === 'shipped') u.shippedAt = firebase.database.ServerValue.TIMESTAMP;
      db.ref('dsog_fashion_orders/'+orderId).update(u).then(function(){ toast('Order '+newStatus+'!'); }).catch(function(e){ toast('Failed: '+e.message, true); });
    };

    // View order
    window.viewOrd = function(orderId) {
      var o = allOrders[orderId];
      if (!o) return;
      var h = '<h3>Order #'+String(orderId).slice(-6)+'</h3>';
      h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.75rem;margin-bottom:1rem;">';
      h += '<div><strong>Customer:</strong> '+(o.customerName||'N/A')+'</div>';
      h += '<div><strong>Phone:</strong> '+(o.customerPhone||o.phone||'N/A')+'</div>';
      h += '<div><strong>Location:</strong> '+(o.location||'N/A')+'</div>';
      h += '<div><strong>Total:</strong> KES '+(o.total||0).toLocaleString()+'</div>';
      h += '<div><strong>Driver:</strong> '+(o.driverName||'Unassigned')+'</div>';
      h += '<div><strong>Vehicle:</strong> '+(o.driverVehicle||'N/A')+'</div>';
      h += '</div>';
      var products = o.products || [];
      if (products.length) {
        h += '<p style="font-weight:700;font-size:0.7rem;">Products:</p>';
        products.forEach(function(p){
          h += '<div style="background:#fdf2f8;padding:0.5rem;border-radius:8px;margin-bottom:4px;font-size:0.7rem;display:flex;justify-content:space-between;"><span>'+p.name+' × '+p.quantity+'</span><span>KES '+((p.price||0)*(p.quantity||1)).toLocaleString()+'</span></div>';
        });
      }
      h += '<div class="btn-row"><button class="btn btn-secondary" onclick="closeMod()">Close</button></div>';
      document.getElementById('modalContent').innerHTML = h;
      document.getElementById('modal').classList.add('show');
    };

    // Assign modal
    window.assignModal = function(orderId) {
      var drivers = [];
      for (var k in allDrivers) { if (allDrivers[k] && allDrivers[k].verified) drivers.push({id:k, data:allDrivers[k]}); }
      var h = '<h3>Assign Driver</h3>';
      h += '<div class="form-group"><label>Select Driver</label><select id="driverSelect"><option value="">— Choose —</option>';
      drivers.forEach(function(d){ h += '<option value="'+d.id+'">'+(d.data.name||d.id)+' · '+(d.data.vehicle||'N/A')+'</option>'; });
      h += '</select></div>';
      h += '<div class="btn-row"><button class="btn btn-primary" onclick="assignDrv(\''+orderId+'\')">Confirm</button><button class="btn btn-secondary" onclick="closeMod()">Cancel</button></div>';
      document.getElementById('modalContent').innerHTML = h;
      document.getElementById('modal').classList.add('show');
    };

    // Assign driver
    window.assignDrv = function(orderId) {
      var driverId = document.getElementById('driverSelect').value;
      if (!driverId) { toast('Select a driver', true); return; }
      var driver = allDrivers[driverId];
      db.ref('dsog_fashion_orders/'+orderId).update({
        driverId: driverId, driverName: driver.name||'Driver', driverPhone: driver.phone||'', driverVehicle: driver.vehicle||'',
        assignedAt: firebase.database.ServerValue.TIMESTAMP
      }).then(function(){ toast('Driver assigned!'); closeMod(); }).catch(function(e){ toast('Failed', true); });
    };

    window.closeMod = function() { document.getElementById('modal').classList.remove('show'); };

    // Filters
    document.querySelectorAll('.filter-btn').forEach(function(b){
      b.onclick = function(){
        document.querySelectorAll('.filter-btn').forEach(function(x){ x.classList.remove('active'); });
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        render();
      };
    });

    document.getElementById('searchInput').oninput = function(){ searchQuery = this.value; render(); };
    document.getElementById('modal').onclick = function(e){ if(e.target===this) closeMod(); };
    document.onkeydown = function(e){ if(e.key==='Escape') closeMod(); };

    // Firebase
    db.ref('dsog_fashion_orders').on('value', function(s){ allOrders = s.val()||{}; render(); });
    db.ref('delivery_assistants').on('value', function(s){ allDrivers = s.val()||{}; render(); });
    
    auth.onAuthStateChanged(function(u){ if(!u) location.href='https://kazinni.vercel.app'; });
  </script>
</body>
</html>
