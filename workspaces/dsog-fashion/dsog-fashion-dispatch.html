<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dispatch | DSOG Fashion</title>
  <meta name="theme-color" content="#ec4899">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --pink: #ec4899; --pink-dark: #be185d; --text-primary: #1e293b; --text-muted: #64748b; --border-light: #fbcfe8; --red: #ef4444; --green: #10b981; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #fdf2f8 0%, #ffffff 100%); color: var(--text-primary); line-height: 1.4; min-height: 100vh; }
    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(16px); padding: 0.5rem 2%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(236,72,153,0.2); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 8px; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(236,72,153,0.2); }
    .logo-text { font-weight: 800; font-size: 1.1rem; background: linear-gradient(145deg, #f472b6, #be185d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #ec4899; -webkit-text-fill-color: #ec4899; margin-left: 3px; }
    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn { background: rgba(236,72,153,0.08); border: 1px solid rgba(236,72,153,0.2); padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--pink-dark); font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; text-decoration: none; }
    .nav-btn:hover { background: var(--pink); color: white; }
    .container { padding: 1rem 2%; flex: 1; }
    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-mini { background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center; border: 1px solid #fbcfe8; }
    .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--pink-dark); }
    .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
    .filter-btn { padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0; background: white; color: #64748b; font-weight: 600; font-size: 0.65rem; cursor: pointer; font-family: inherit; }
    .filter-btn.active { background: var(--pink); color: white; border-color: var(--pink); }
    .search-box { flex: 1; min-width: 150px; max-width: 300px; position: relative; }
    .search-box input { width: 100%; padding: 0.35rem 0.8rem 0.35rem 2rem; border-radius: 20px; border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif; }
    .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
    .table-wrap { background: white; border-radius: 16px; border: 1px solid #fbcfe8; overflow: hidden; }
    .table-scroll { overflow-x: auto; max-height: 60vh; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    thead { position: sticky; top: 0; z-index: 2; background: #fdf2f8; }
    th { padding: 0.6rem 0.7rem; text-align: left; font-weight: 700; color: #be185d; font-size: 0.6rem; text-transform: uppercase; white-space: nowrap; }
    td { padding: 0.5rem 0.7rem; border-bottom: 1px solid #fdf2f8; vertical-align: middle; }
    tr:hover td { background: #fdf2f8; }
    .status-badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.6rem; font-weight: 700; }
    .status-ready { background: #fef3c7; color: #b45309; }
    .status-shipped { background: #ede9fe; color: #5b21b6; }
    .status-delivered { background: #d1fae5; color: #065f46; }
    .action-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .action-btn { padding: 0.25rem 0.5rem; border-radius: 6px; border: none; font-size: 0.6rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 3px; font-family: inherit; }
    .btn-assign { background: #e0f2fe; color: #0369a1; }
    .btn-assigned { background: #d1fae5; color: #065f46; }
    .btn-ship { background: #ede9fe; color: #5b21b6; }
    .btn-deliver { background: #d1fae5; color: #065f46; }
    .btn-view { background: #fdf2f8; color: #be185d; }
    .empty-row td { text-align: center; padding: 2rem; color: #94a3b8; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: white; border-radius: 20px; padding: 1.5rem; max-width: 500px; width: 95%; max-height: 85vh; overflow-y: auto; }
    .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; color: var(--pink-dark); }
    .form-group { margin-bottom: 0.7rem; }
    .form-group label { display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.15rem; }
    .form-group select { width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px; border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif; background: #f8fafc; }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 10px; border: none; font-weight: 700; font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; font-family: inherit; }
    .btn-primary { background: var(--pink); color: white; }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .toast { position: fixed; bottom: 25px; right: 25px; background: var(--green); color: white; padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000; animation: slideIn 0.3s ease; font-size: 0.75rem; }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/workspaces/dsog-fashion/dsog-fashion-dashboard.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="DSOG Fashion" class="logo-img">
      <span class="logo-text">DSOG <span>Fashion</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/dsog-fashion/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="/workspaces/dsog-fashion/dsog-fashion-orders.html" class="nav-btn"><i class="fas fa-shopping-bag"></i> Orders</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-truck-fast"></i> Dispatch Orders</h1>
      <p style="font-size:0.75rem;color:var(--text-muted);" id="orderCount">Loading...</p>
    </div>

    <div class="stats-row">
      <div class="stat-mini"><div class="stat-num" id="statReady">0</div><div class="stat-label">Ready to Ship</div></div>
      <div class="stat-mini"><div class="stat-num" id="statTransit">0</div><div class="stat-label">In Transit</div></div>
      <div class="stat-mini"><div class="stat-num" id="statDelivered">0</div><div class="stat-label">Delivered Today</div></div>
      <div class="stat-mini"><div class="stat-num" id="statDrivers">0</div><div class="stat-label">Active Drivers</div></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="ready">Ready <span id="countReady">0</span></button>
      <button class="filter-btn" data-filter="shipped">Shipped <span id="countShipped">0</span></button>
      <button class="filter-btn" data-filter="delivered">Delivered <span id="countDelivered">0</span></button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search...">
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead><tr><th>ID</th><th>Customer</th><th>Phone</th><th>Items</th><th>Total</th><th>Location</th><th>Driver</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="tableBody"><tr class="empty-row"><td colspan="9">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
  <div id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
    authDomain: "mugera-e51cc.firebaseapp.com",
    databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "mugera-e51cc",
    storageBucket: "mugera-e51cc.firebasestorage.app",
    messagingSenderId: "1024868637509",
    appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
  };

  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const auth = firebase.auth();

  let allOrders = {};
  let allDrivers = {};
  let currentFilter = 'all';
  let searchQuery = '';

  const tableBody = document.getElementById('tableBody');
  const modal = document.getElementById('modal');
  const modalContent = document.getElementById('modalContent');

  function showToast(msg, isError) {
    const container = document.getElementById('toastContainer');
    const existing = container.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast' + (isError ? ' error' : '');
    toast.innerHTML = '<i class="fas fa-' + (isError ? 'exclamation-circle' : 'check-circle') + '"></i> ' + msg;
    container.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 3500);
  }

  function getInitials(name) {
    if (!name) return '??';
    return String(name).split(' ').map(function(n) { return n[0]; }).join('').toUpperCase().substring(0, 2);
  }

  function getStatusClass(status) {
    var map = { ready:'status-ready', shipped:'status-shipped', delivered:'status-delivered' };
    return map[status] || 'status-ready';
  }

  function updateStats() {
    var orders = Object.values(allOrders).filter(function(o) { return o; });
    var ready = orders.filter(function(o) { return o.status === 'ready'; }).length;
    var transit = orders.filter(function(o) { return o.status === 'shipped'; }).length;
    var delivered = orders.filter(function(o) { return o.status === 'delivered' && o.deliveredAt && new Date(o.deliveredAt).toDateString() === new Date().toDateString(); }).length;
    var drivers = Object.values(allDrivers).filter(function(d) { return d && d.verified; }).length;

    document.getElementById('statReady').textContent = ready;
    document.getElementById('statTransit').textContent = transit;
    document.getElementById('statDelivered').textContent = delivered;
    document.getElementById('statDrivers').textContent = drivers;
    document.getElementById('countReady').textContent = ready;
    document.getElementById('countShipped').textContent = transit;
    document.getElementById('countDelivered').textContent = orders.filter(function(o) { return o.status === 'delivered'; }).length;
    document.getElementById('orderCount').textContent = orders.length + ' total · ' + ready + ' ready · ' + transit + ' in transit';
  }

  function renderTable() {
    var orders = Object.entries(allOrders).map(function(entry) { return Object.assign({ id: entry[0] }, entry[1]); }).filter(function(o) { return o && (o.status === 'ready' || o.status === 'shipped' || o.status === 'delivered'); });
    
    if (currentFilter !== 'all') {
      orders = orders.filter(function(o) { return (o.status || 'ready') === currentFilter; });
    }
    
    if (searchQuery) {
      var q = searchQuery.toLowerCase();
      orders = orders.filter(function(o) {
        return (o.customerName || '').toLowerCase().indexOf(q) !== -1 ||
               (o.customerPhone || '').toLowerCase().indexOf(q) !== -1 ||
               (o.driverName || '').toLowerCase().indexOf(q) !== -1 ||
               (o.location || '').toLowerCase().indexOf(q) !== -1;
      });
    }
    
    orders.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
    
    if (!orders.length) {
      tableBody.innerHTML = '<tr class="empty-row"><td colspan="9"><i class="fas fa-box-open" style="font-size:2rem;display:block;margin-bottom:8px;"></i>No orders to dispatch</td></tr>';
      return;
    }

    tableBody.innerHTML = orders.map(function(order) {
      var status = order.status || 'ready';
      var products = order.products || [];
      var itemCount = products.length;
      var driver = order.driverName || '';
      var hasDriver = driver !== '';
      var shortId = String(order.id).slice(-6);

      var actions = '<button class="action-btn btn-view" data-action="view" data-id="' + order.id + '"><i class="fas fa-eye"></i></button>';
      
      if (status === 'ready') {
        if (hasDriver) {
          actions += '<button class="action-btn btn-assigned" disabled><i class="fas fa-check"></i> ' + driver.split(' ')[0] + '</button>';
          actions += '<button class="action-btn btn-ship" data-action="ship" data-id="' + order.id + '"><i class="fas fa-truck"></i> Ship Now</button>';
        } else {
          actions += '<button class="action-btn btn-assign" data-action="assign" data-id="' + order.id + '"><i class="fas fa-user-plus"></i> Assign Driver</button>';
        }
      }
      if (status === 'shipped') {
        actions += '<button class="action-btn btn-deliver" data-action="deliver" data-id="' + order.id + '"><i class="fas fa-check-double"></i> Mark Delivered</button>';
      }

      return '<tr>' +
        '<td><code style="font-size:0.65rem;background:#fdf2f8;padding:2px 6px;border-radius:4px;">#' + shortId + '</code></td>' +
        '<td><div style="display:flex;align-items:center;gap:8px;"><div style="width:28px;height:28px;background:#fdf2f8;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.65rem;color:#be185d;">' + getInitials(order.customerName) + '</div><strong>' + (order.customerName || 'Customer') + '</strong></div></td>' +
        '<td><span style="font-size:0.7rem;">' + (order.customerPhone || order.phone || '—') + '</span></td>' +
        '<td>' + itemCount + ' item' + (itemCount !== 1 ? 's' : '') + '</td>' +
        '<td><strong>KES ' + (order.total || 0).toLocaleString() + '</strong></td>' +
        '<td>' + (order.location || '—') + '</td>' +
        '<td>' + (driver || '<span style="color:#94a3b8;">Unassigned</span>') + '</td>' +
        '<td><span class="status-badge ' + getStatusClass(status) + '">' + status + '</span></td>' +
        '<td><div class="action-btns">' + actions + '</div></td>' +
      '</tr>';
    }).join('');
  }

  // EVENT DELEGATION - this is the key fix
  tableBody.addEventListener('click', function(e) {
    var btn = e.target.closest('.action-btn');
    if (!btn || btn.disabled) return;
    
    var action = btn.getAttribute('data-action');
    var orderId = btn.getAttribute('data-id');
    
    if (!orderId) return;
    
    if (action === 'view') {
      viewOrder(orderId);
    } else if (action === 'ship') {
      updateStatus(orderId, 'shipped');
    } else if (action === 'deliver') {
      updateStatus(orderId, 'delivered');
    } else if (action === 'assign') {
      showAssignModal(orderId);
    }
  });

  function updateStatus(orderId, newStatus) {
    var order = allOrders[orderId];
    var driverName = order ? (order.driverName || 'Unassigned') : 'Unassigned';
    var confirmMsg = newStatus === 'shipped' ? 'Ship this order with ' + driverName + '?' : 'Mark order as ' + newStatus + '?';
    
    if (!confirm(confirmMsg)) return;
    
    var updates = { status: newStatus, updatedAt: firebase.database.ServerValue.TIMESTAMP };
    if (newStatus === 'delivered') updates.deliveredAt = firebase.database.ServerValue.TIMESTAMP;
    if (newStatus === 'shipped') updates.shippedAt = firebase.database.ServerValue.TIMESTAMP;
    
    database.ref('dsog_fashion_orders/' + orderId).update(updates).then(function() {
      showToast('Order ' + newStatus + '!');
    }).catch(function(e) {
      console.error('Update error:', e);
      showToast('Failed: ' + e.message, true);
    });
  }

  function viewOrder(orderId) {
    var order = allOrders[orderId];
    if (!order) { showToast('Order not found', true); return; }
    var products = order.products || [];
    var driver = order.driverName || 'Unassigned';
    
    var html = '<h3><i class="fas fa-info-circle"></i> Order #' + String(orderId).slice(-6) + '</h3>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.75rem;margin-bottom:1rem;">';
    html += '<div><strong>Customer:</strong> ' + (order.customerName || 'N/A') + '</div>';
    html += '<div><strong>Phone:</strong> ' + (order.customerPhone || order.phone || 'N/A') + '</div>';
    html += '<div><strong>Email:</strong> ' + (order.customerEmail || order.email || 'N/A') + '</div>';
    html += '<div><strong>Location:</strong> ' + (order.location || 'N/A') + '</div>';
    html += '<div><strong>Status:</strong> <span class="status-badge ' + getStatusClass(order.status) + '">' + (order.status || 'ready') + '</span></div>';
    html += '<div><strong>Total:</strong> KES ' + (order.total || 0).toLocaleString() + '</div>';
    html += '<div><strong>Driver:</strong> ' + driver + '</div>';
    html += '<div><strong>Vehicle:</strong> ' + (order.driverVehicle || 'N/A') + '</div>';
    html += '<div><strong>Driver Phone:</strong> ' + (order.driverPhone || 'N/A') + '</div>';
    html += '<div><strong>Package:</strong> ' + (order.packageType || 'N/A') + '</div>';
    html += '<div><strong>Order Type:</strong> ' + (order.orderType || 'N/A') + '</div>';
    html += '<div><strong>Notes:</strong> ' + (order.notes || 'None') + '</div>';
    html += '</div>';
    
    if (products.length) {
      html += '<p style="font-weight:700;font-size:0.7rem;margin-bottom:0.5rem;">Products:</p>';
      products.forEach(function(p) {
        html += '<div style="background:#fdf2f8;padding:0.5rem;border-radius:8px;margin-bottom:4px;font-size:0.7rem;display:flex;justify-content:space-between;">';
        html += '<span>' + p.name + ' × ' + p.quantity + ' ' + (p.size || '') + '</span>';
        html += '<span>KES ' + ((p.price||0)*(p.quantity||1)).toLocaleString() + '</span>';
        html += '</div>';
      });
    }
    
    html += '<div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>';
    
    modalContent.innerHTML = html;
    modal.classList.add('show');
  }

  function showAssignModal(orderId) {
    var drivers = Object.entries(allDrivers).filter(function(entry) { return entry[1] && entry[1].verified; });
    var order = allOrders[orderId];
    var currentDriver = order ? (order.driverName || '') : '';
    
    var driverOptions = drivers.map(function(entry) {
      var d = entry[1];
      return '<option value="' + entry[0] + '">' + (d.name || entry[0]) + ' · ' + (d.vehicle || 'N/A') + ' · ' + (d.phone || '') + '</option>';
    }).join('');
    
    var html = '<h3><i class="fas fa-user-plus"></i> Assign Driver</h3>';
    html += currentDriver ? '<p style="font-size:0.75rem;color:var(--text-muted);margin-bottom:1rem;">Current driver: <strong>' + currentDriver + '</strong> — you can reassign</p>' : '<p style="font-size:0.75rem;color:var(--text-muted);margin-bottom:1rem;">No driver assigned yet</p>';
    html += '<div class="form-group"><label>Select Driver</label><select id="driverSelect"><option value="">— Choose driver —</option>' + driverOptions + '</select></div>';
    html += !drivers.length ? '<p style="color:#94a3b8;text-align:center;padding:1rem;">No verified drivers available</p>' : '';
    html += '<div class="btn-row"><button class="btn btn-primary" id="confirmAssignBtn" ' + (!drivers.length ? 'disabled' : '') + '>Confirm Assignment</button><button class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>';
    
    modalContent.innerHTML = html;
    modal.classList.add('show');
    
    // Attach listener to confirm button
    setTimeout(function() {
      var confirmBtn = document.getElementById('confirmAssignBtn');
      if (confirmBtn) {
        confirmBtn.addEventListener('click', function() {
          var driverId = document.getElementById('driverSelect').value;
          if (!driverId) { showToast('Select a driver', true); return; }
          var driver = allDrivers[driverId];
          if (!driver) { showToast('Driver not found', true); return; }
          
          database.ref('dsog_fashion_orders/' + orderId).update({
            driverId: driverId,
            driverName: driver.name || driver.email || 'Driver',
            driverPhone: driver.phone || '',
            driverVehicle: driver.vehicle || '',
            assignedAt: firebase.database.ServerValue.TIMESTAMP
          }).then(function() {
            showToast('Driver assigned! You can now ship the order.');
            closeModal();
          }).catch(function(e) {
            showToast('Failed to assign driver', true);
          });
        });
      }
    }, 100);
  }

  function closeModal() { modal.classList.remove('show'); }

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderTable();
    });
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', function(e) {
    searchQuery = e.target.value;
    renderTable();
  });

  // Modal close
  modal.addEventListener('click', function(e) { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

  // Firebase listeners
  database.ref('dsog_fashion_orders').on('value', function(snapshot) {
    allOrders = snapshot.val() || {};
    updateStats();
    renderTable();
  });

  database.ref('delivery_assistants').on('value', function(snapshot) {
    allDrivers = snapshot.val() || {};
    updateStats();
  });

  // Auth
  auth.onAuthStateChanged(function(user) {
    if (!user) window.location.href = 'https://kazinni.vercel.app';
  });

  // Expose closeModal for the close button in the modal
  window.closeModal = closeModal;
</script>
</body>
</html>
