<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Orders | DSOG Fashion</title>
  
  <meta name="theme-color" content="#ec4899">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink: #ec4899;
      --pink-dark: #be185d;
      --pink-light: #f472b6;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #fbcfe8;
      --red: #ef4444;
      --orange: #f59e0b;
      --blue: #3b82f6;
      --green: #10b981;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #fdf2f8 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(236, 72, 153, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(236, 72, 153, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #f472b6, #be185d);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #ec4899; -webkit-text-fill-color: #ec4899; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(236, 72, 153, 0.08); border: 1px solid rgba(236, 72, 153, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--pink-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--pink); color: white; }

    .container { padding: 1rem 2%; flex: 1; }

    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--pink-dark); margin-right: 6px; }
    .page-header p { color: var(--text-muted); font-size: 0.75rem; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-mini {
      background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
      border: 1px solid #fbcfe8; box-shadow: 0 2px 8px rgba(190,24,93,0.03);
    }
    .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--pink-dark); line-height: 1.1; }
    .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    .filter-btn {
      padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0;
      background: white; color: #64748b; font-weight: 600; font-size: 0.65rem;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--pink); color: var(--pink-dark); }
    .filter-btn.active { background: var(--pink); color: white; border-color: var(--pink); }
    .filter-btn .count { background: rgba(255,255,255,0.25); padding: 0.1rem 0.4rem; border-radius: 10px; font-size: 0.55rem; margin-left: 4px; }

    .search-box { flex: 1; min-width: 150px; max-width: 300px; position: relative; }
    .search-box input {
      width: 100%; padding: 0.35rem 0.8rem 0.35rem 2rem; border-radius: 20px;
      border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif;
    }
    .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.7rem; }

    .table-wrap {
      background: white; border-radius: 16px; border: 1px solid #fbcfe8;
      overflow: hidden; box-shadow: 0 4px 16px rgba(190,24,93,0.03);
    }
    .table-scroll { overflow-x: auto; max-height: 60vh; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    thead { position: sticky; top: 0; z-index: 2; background: #fdf2f8; }
    th {
      padding: 0.6rem 0.7rem; text-align: left; font-weight: 700; color: #be185d;
      font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;
    }
    td { padding: 0.5rem 0.7rem; border-bottom: 1px solid #fdf2f8; vertical-align: middle; }
    tr:hover td { background: #fdf2f8; }

    .status-badge {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px;
      font-size: 0.6rem; font-weight: 700; white-space: nowrap;
    }
    .status-new { background: #fce7f3; color: #9d174d; }
    .status-confirmed { background: #d1fae5; color: #065f46; }
    .status-processing { background: #e0f2fe; color: #0369a1; }
    .status-ready { background: #fef3c7; color: #b45309; }
    .status-shipped { background: #ede9fe; color: #5b21b6; }
    .status-delivered { background: #d1fae5; color: #065f46; }
    .status-cancelled { background: #fee2e2; color: #991b1b; }

    .action-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .action-btn {
      padding: 0.25rem 0.5rem; border-radius: 6px; border: none; font-size: 0.6rem;
      font-weight: 600; cursor: pointer; display: inline-flex; align-items: center;
      gap: 3px; transition: all 0.15s; font-family: inherit;
    }
    .btn-confirm { background: #d1fae5; color: #065f46; }
    .btn-confirm:hover { background: #10b981; color: white; }
    .btn-process { background: #e0f2fe; color: #0369a1; }
    .btn-process:hover { background: #3b82f6; color: white; }
    .btn-ready { background: #fef3cd; color: #b45309; }
    .btn-ready:hover { background: #f59e0b; color: white; }
    .btn-cancel { background: #fee2e2; color: #991b1b; }
    .btn-cancel:hover { background: #ef4444; color: white; }
    .btn-view { background: #fdf2f8; color: #be185d; }
    .btn-view:hover { background: #ec4899; color: white; }

    .empty-row td { text-align: center; padding: 2rem; color: #94a3b8; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
      align-items: center; backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 20px; padding: 1.5rem; max-width: 550px;
      width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; color: var(--pink-dark); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.75rem; margin-bottom: 1rem; }
    .detail-item { background: #fdf2f8; padding: 0.6rem; border-radius: 10px; }
    .detail-item strong { display: block; font-size: 0.6rem; color: var(--pink-dark); text-transform: uppercase; margin-bottom: 0.1rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; font-family: inherit; transition: all 0.15s;
    }
    .btn-primary { background: var(--pink); color: white; }
    .btn-primary:hover { background: var(--pink-dark); }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--green); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(16,185,129,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="dsog-fashion-dashboard.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="DSOG Fashion" class="logo-img">
      <span class="logo-text">DSOG <span>Fashion</span></span>
    </a>
    <div class="nav-right">
      <a href="dsog-fashion-dashboard.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="dsog-fashion-inventory.html" class="nav-btn"><i class="fas fa-boxes"></i> Inventory</a>
      <a href="dsog-fashion-franchisees.html" class="nav-btn"><i class="fas fa-users"></i> Franchisees</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-clipboard-list"></i> Orders</h1>
      <p style="font-size:0.75rem;color:var(--text-muted);" id="orderCount">Loading...</p>
    </div>

    <div class="stats-row">
      <div class="stat-mini"><div class="stat-num" id="statNew">0</div><div class="stat-label">New Orders</div></div>
      <div class="stat-mini"><div class="stat-num" id="statConfirmed">0</div><div class="stat-label">Confirmed</div></div>
      <div class="stat-mini"><div class="stat-num" id="statProcessing">0</div><div class="stat-label">Processing</div></div>
      <div class="stat-mini"><div class="stat-num" id="statReady">0</div><div class="stat-label">Ready for Dispatch</div></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All<span class="count" id="countAll">0</span></button>
      <button class="filter-btn" data-filter="new">New<span class="count" id="countNew">0</span></button>
      <button class="filter-btn" data-filter="confirmed">Confirmed<span class="count" id="countConfirmed">0</span></button>
      <button class="filter-btn" data-filter="processing">Processing<span class="count" id="countProcessing">0</span></button>
      <button class="filter-btn" data-filter="ready">Ready<span class="count" id="countReady">0</span></button>
      <button class="filter-btn" data-filter="delivered">Delivered<span class="count" id="countDelivered">0</span></button>
      <button class="filter-btn" data-filter="cancelled">Cancelled<span class="count" id="countCancelled">0</span></button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search customer, product...">
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Products</th>
              <th>Qty</th>
              <th>Total</th>
              <th>Franchise</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr class="empty-row"><td colspan="8">Loading orders...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allOrders = {};
    let currentFilter = 'all';
    let searchQuery = '';

    const tableBody = document.getElementById('tableBody');
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modalContent');

    function showToast(msg, isError = false) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function getInitials(name) {
      if (!name) return '??';
      return String(name).split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
    }

    function getStatusClass(status) {
      const map = { new:'status-new', confirmed:'status-confirmed', processing:'status-processing', ready:'status-ready', shipped:'status-shipped', delivered:'status-delivered', cancelled:'status-cancelled' };
      return map[status] || 'status-new';
    }

    function getOrderIcon(category) {
      const cat = (category || '').toLowerCase();
      if (cat.includes('dress') || cat.includes('gown')) return '👗';
      if (cat.includes('shirt') || cat.includes('top')) return '👚';
      if (cat.includes('pant') || cat.includes('jean')) return '👖';
      if (cat.includes('shoe')) return '👟';
      if (cat.includes('bag')) return '👜';
      if (cat.includes('jacket') || cat.includes('coat')) return '🧥';
      return '👗';
    }

    function updateStats() {
      const orders = Object.values(allOrders).filter(o => o);
      const counts = { all: orders.length, new: 0, confirmed: 0, processing: 0, ready: 0, delivered: 0, cancelled: 0 };
      orders.forEach(o => { const s = o.status || 'new'; if (counts[s] !== undefined) counts[s]++; });

      document.getElementById('statNew').textContent = counts.new;
      document.getElementById('statConfirmed').textContent = counts.confirmed;
      document.getElementById('statProcessing').textContent = counts.processing;
      document.getElementById('statReady').textContent = counts.ready;

      document.getElementById('countAll').textContent = counts.all;
      document.getElementById('countNew').textContent = counts.new;
      document.getElementById('countConfirmed').textContent = counts.confirmed;
      document.getElementById('countProcessing').textContent = counts.processing;
      document.getElementById('countReady').textContent = counts.ready;
      document.getElementById('countDelivered').textContent = counts.delivered;
      document.getElementById('countCancelled').textContent = counts.cancelled;

      document.getElementById('orderCount').textContent = `${counts.all} total · ${counts.new} new · ${counts.processing} processing`;
    }

    function renderTable() {
      let orders = Object.entries(allOrders).map(([id, data]) => ({ id, ...data })).filter(o => o);
      
      if (currentFilter !== 'all') {
        orders = orders.filter(o => (o.status || 'new') === currentFilter);
      }
      
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        orders = orders.filter(o => 
          (o.customerName || '').toLowerCase().includes(q) ||
          (o.franchiseName || '').toLowerCase().includes(q) ||
          (o.products || []).some(p => (p.name || '').toLowerCase().includes(q))
        );
      }
      
      orders.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      
      if (!orders.length) {
        tableBody.innerHTML = '<tr class="empty-row"><td colspan="8"><i class="fas fa-shopping-bag" style="font-size:2rem;display:block;margin-bottom:8px;"></i>No orders found</td></tr>';
        return;
      }

      tableBody.innerHTML = orders.map(order => {
        const status = order.status || 'new';
        const products = order.products || [];
        const productNames = products.map(p => p.name).join(', ');
        const totalQty = products.reduce((s, p) => s + (p.quantity || 0), 0);
        const shortId = String(order.id).slice(-6);
        const franchise = order.franchiseName || 'Direct Customer';

        let actions = `<button class="action-btn btn-view" onclick="viewOrder('${order.id}')"><i class="fas fa-eye"></i></button>`;
        
        if (status === 'new') {
          actions += `<button class="action-btn btn-confirm" onclick="updateStatus('${order.id}','confirmed')"><i class="fas fa-check"></i> Confirm</button>`;
          actions += `<button class="action-btn btn-cancel" onclick="updateStatus('${order.id}','cancelled')"><i class="fas fa-times"></i></button>`;
        }
        if (status === 'confirmed') {
          actions += `<button class="action-btn btn-process" onclick="updateStatus('${order.id}','processing')"><i class="fas fa-spinner"></i> Process</button>`;
        }
        if (status === 'processing') {
          actions += `<button class="action-btn btn-ready" onclick="updateStatus('${order.id}','ready')"><i class="fas fa-box"></i> Ready</button>`;
        }

        return `
          <tr>
            <td><code style="font-size:0.65rem;background:#fdf2f8;padding:2px 6px;border-radius:4px;">#${shortId}</code></td>
            <td>
              <div style="display:flex;align-items:center;gap:8px;">
                <div style="width:28px;height:28px;background:#fdf2f8;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.65rem;color:#be185d;">${getInitials(order.customerName)}</div>
                <div>
                  <strong>${order.customerName || 'Customer'}</strong>
                  <div style="font-size:0.6rem;color:#94a3b8;">${order.customerPhone || ''}</div>
                </div>
              </div>
            </td>
            <td><span style="font-size:0.7rem;" title="${productNames}">${productNames.substring(0, 25)}${productNames.length > 25 ? '...' : ''}</span></td>
            <td>${totalQty}</td>
            <td><strong>KES ${(order.total || 0).toLocaleString()}</strong></td>
            <td>${franchise}</td>
            <td><span class="status-badge ${getStatusClass(status)}">${status}</span></td>
            <td><div class="action-btns">${actions}</div></td>
          </tr>`;
      }).join('');
    }

    async function updateStatus(orderId, newStatus) {
      if (!confirm(`Update order to "${newStatus}"?`)) return;
      try {
        await database.ref(`dsog_fashion_orders/${orderId}`).update({
          status: newStatus,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast(`✅ Order ${newStatus}`);
      } catch (e) { console.error(e); showToast('Failed to update', true); }
    }

    function viewOrder(orderId) {
      const order = allOrders[orderId];
      if (!order) return;
      const products = order.products || [];
      const status = order.status || 'new';

      modalContent.innerHTML = `
        <h3><i class="fas fa-info-circle"></i> Order #${String(orderId).slice(-6)}</h3>
        <div class="detail-grid">
          <div class="detail-item"><strong>Customer</strong>${order.customerName || 'N/A'}</div>
          <div class="detail-item"><strong>Phone</strong>${order.customerPhone || 'N/A'}</div>
          <div class="detail-item"><strong>Email</strong>${order.customerEmail || 'N/A'}</div>
          <div class="detail-item"><strong>Status</strong><span class="status-badge ${getStatusClass(status)}">${status}</span></div>
          <div class="detail-item"><strong>Franchise</strong>${order.franchiseName || 'Direct'}</div>
          <div class="detail-item"><strong>Location</strong>${order.location || 'N/A'}</div>
          <div class="detail-item"><strong>Subtotal</strong>KES ${(order.subtotal || 0).toLocaleString()}</div>
          <div class="detail-item"><strong>Delivery Fee</strong>KES ${(order.deliveryFee || 0).toLocaleString()}</div>
          <div class="detail-item"><strong>Total</strong>KES ${(order.total || 0).toLocaleString()}</div>
          <div class="detail-item"><strong>Created</strong>${order.createdAt ? new Date(order.createdAt).toLocaleString() : 'N/A'}</div>
        </div>
        ${products.length ? `
          <p style="font-weight:700;font-size:0.75rem;margin:0.8rem 0 0.5rem;">Products:</p>
          ${products.map(p => `
            <div style="background:#fdf2f8;padding:0.5rem;border-radius:8px;margin-bottom:4px;font-size:0.7rem;display:flex;justify-content:space-between;">
              <span>${getOrderIcon(p.category)} ${p.name} × ${p.quantity} ${p.size ? '('+p.size+')' : ''}</span>
              <span>KES ${((p.price || 0) * (p.quantity || 1)).toLocaleString()}</span>
            </div>
          `).join('')}
        ` : ''}
        ${order.notes ? `<div class="detail-item" style="margin-top:0.5rem;"><strong>Notes</strong>${order.notes}</div>` : ''}
        <div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>
      `;
      modal.classList.add('show');
    }

    function closeModal() { modal.classList.remove('show'); }

    // Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTable();
      });
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderTable();
    });

    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    // Firebase listener
    database.ref('dsog_fashion_orders').on('value', (snapshot) => {
      allOrders = snapshot.val() || {};
      updateStats();
      renderTable();
    });

    auth.onAuthStateChanged((user) => { if (!user) window.location.href = '/'; });
    window.viewOrder = viewOrder;
    window.updateStatus = updateStatus;
    window.closeModal = closeModal;
  </script>
</body>
</html>
