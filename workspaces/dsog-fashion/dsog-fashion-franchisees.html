<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Franchisees | DSOG Fashion</title>
  
  <meta name="theme-color" content="#ec4899">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink: #ec4899;
      --pink-dark: #be185d;
      --pink-light: #f472b6;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #fbcfe8;
      --red: #ef4444;
      --orange: #f59e0b;
      --blue: #3b82f6;
      --green: #10b981;
      --purple: #7c3aed;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #fdf2f8 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(236, 72, 153, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(236, 72, 153, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #f472b6, #be185d);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #ec4899; -webkit-text-fill-color: #ec4899; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(236, 72, 153, 0.08); border: 1px solid rgba(236, 72, 153, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--pink-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--pink); color: white; }
    .nav-btn.map-btn { background: var(--pink); color: white; border-color: var(--pink-dark); }
    .nav-btn.map-btn:hover { background: var(--pink-dark); }

    .container { padding: 1rem 2%; flex: 1; }

    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--pink-dark); margin-right: 6px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-mini {
      background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
      border: 1px solid #fbcfe8; box-shadow: 0 2px 8px rgba(190,24,93,0.03);
    }
    .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--pink-dark); line-height: 1.1; }
    .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

    .search-box { flex: 1; min-width: 200px; max-width: 350px; position: relative; margin-bottom: 1rem; }
    .search-box input {
      width: 100%; padding: 0.45rem 0.8rem 0.45rem 2.2rem; border-radius: 20px;
      border: 1.5px solid #e2e8f0; font-size: 0.75rem; font-family: 'Inter', sans-serif;
    }
    .search-box i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.8rem; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }

    .franchise-card {
      background: white; border-radius: 16px; padding: 1.2rem;
      border: 1px solid #fbcfe8; box-shadow: 0 3px 12px rgba(190,24,93,0.03);
      transition: all 0.2s;
    }
    .franchise-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(190,24,93,0.08); }
    .franchise-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
    .franchise-card-header h3 { font-size: 0.95rem; font-weight: 700; }
    .franchise-badge {
      padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.6rem; font-weight: 700;
    }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-premium { background: #fef3c7; color: #92400e; }
    .badge-pending { background: #fce7f3; color: #9d174d; }
    .badge-inactive { background: #f1f5f9; color: #64748b; }
    .badge-standard { background: #e0f2fe; color: #0369a1; }

    .franchise-info { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.7rem; margin-bottom: 0.8rem; }
    .franchise-info div { color: var(--text-muted); }
    .franchise-info strong { color: var(--text-primary); display: block; font-size: 0.6rem; text-transform: uppercase; }

    .franchise-stats { display: flex; gap: 10px; margin-bottom: 0.8rem; }
    .franchise-stat {
      flex: 1; text-align: center; background: #fdf2f8; padding: 0.5rem; border-radius: 10px;
    }
    .franchise-stat .val { font-size: 1rem; font-weight: 800; color: var(--pink-dark); }
    .franchise-stat .lbl { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; }

    .franchise-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-sm {
      padding: 0.3rem 0.7rem; border-radius: 8px; border: none; font-weight: 600;
      font-size: 0.65rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 4px; transition: all 0.15s; font-family: inherit;
    }
    .btn-view { background: #fdf2f8; color: #be185d; }
    .btn-view:hover { background: #ec4899; color: white; }
    .btn-edit { background: #fdf2f8; color: #be185d; }
    .btn-edit:hover { background: #ec4899; color: white; }
    .btn-orders { background: #e0f2fe; color: #0369a1; }
    .btn-orders:hover { background: #3b82f6; color: white; }
    .btn-map { background: #fdf2f8; color: #be185d; }
    .btn-map:hover { background: #ec4899; color: white; }
    .btn-toggle { background: #d1fae5; color: #065f46; }
    .btn-toggle:hover { background: #10b981; color: white; }
    .btn-toggle.inactive { background: #fee2e2; color: #991b1b; }
    .btn-toggle.inactive:hover { background: #ef4444; color: white; }

    .empty-state { text-align: center; padding: 3rem; color: #94a3b8; grid-column: 1 / -1; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
      align-items: center; backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 20px; padding: 1.5rem; max-width: 550px;
      width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; color: var(--pink-dark); }
    .form-group { margin-bottom: 0.7rem; }
    .form-group label {
      display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
      background: #f8fafc;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; font-family: inherit; transition: all 0.15s;
    }
    .btn-primary { background: var(--pink); color: white; }
    .btn-primary:hover { background: var(--pink-dark); }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.75rem; margin-bottom: 1rem; }
    .detail-item { background: #fdf2f8; padding: 0.6rem; border-radius: 10px; }
    .detail-item strong { display: block; font-size: 0.6rem; color: var(--pink-dark); text-transform: uppercase; margin-bottom: 0.1rem; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--green); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(16,185,129,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="DSOG Fashion" class="logo-img">
      <span class="logo-text">DSOG <span>Fashion</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/dsog-fashion/map.html" class="nav-btn map-btn"><i class="fas fa-map-marked-alt"></i> Operations Map</a>
      <a href="index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="dsog-fashion-orders.html" class="nav-btn"><i class="fas fa-shopping-bag"></i> Orders</a>
      <a href="dsog-fashion-inventory.html" class="nav-btn"><i class="fas fa-boxes"></i> Inventory</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-users-gear"></i> Franchisees</h1>
      <button class="btn btn-primary" onclick="showAddModal()" style="padding:0.5rem 1rem;font-size:0.7rem;">
        <i class="fas fa-plus"></i> Add Franchisee
      </button>
    </div>

    <div class="stats-row">
      <div class="stat-mini"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Franchisees</div></div>
      <div class="stat-mini"><div class="stat-num" id="statActive">0</div><div class="stat-label">Active</div></div>
      <div class="stat-mini"><div class="stat-num" id="statPremium">0</div><div class="stat-label">Premium</div></div>
      <div class="stat-mini"><div class="stat-num" id="statRevenue">0</div><div class="stat-label">Total Revenue (KES)</div></div>
    </div>

    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search by name, location, phone...">
    </div>

    <div class="cards-grid" id="franchiseesGrid">
      <div class="empty-state">Loading franchisees...</div>
    </div>
  </div>

  <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allFranchisees = {};
    let allOrders = {};
    let searchQuery = '';

    function showToast(msg, isError = false) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function getInitials(name) {
      if (!name) return 'DS';
      return String(name).split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
    }

    function getFranchiseOrders(franchiseName) {
      return Object.values(allOrders).filter(o => o && o.franchiseName === franchiseName);
    }

    function getStatusBadge(status) {
      const map = { active:'badge-active', premium:'badge-premium', pending:'badge-pending', inactive:'badge-inactive', standard:'badge-standard' };
      return map[status] || 'badge-standard';
    }

    function getTierBadge(tier) {
      const map = { premium:'badge-premium', standard:'badge-standard', basic:'badge-inactive' };
      return map[tier] || 'badge-standard';
    }

    function renderFranchisees() {
      const grid = document.getElementById('franchiseesGrid');
      let franchisees = Object.entries(allFranchisees).map(([id, data]) => ({ id, ...data }));

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        franchisees = franchisees.filter(f => 
          (f.businessName || f.name || '').toLowerCase().includes(q) ||
          (f.location || f.city || '').toLowerCase().includes(q) ||
          (f.phone || '').toLowerCase().includes(q)
        );
      }

      franchisees.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      if (!franchisees.length) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-store-slash" style="font-size:2rem;display:block;margin-bottom:8px;"></i>No franchisees found</div>';
        return;
      }

      grid.innerHTML = franchisees.map(f => {
        const name = f.businessName || f.name || 'Unnamed';
        const status = f.status || 'active';
        const tier = f.tier || 'standard';
        const orders = getFranchiseOrders(name);
        const orderCount = orders.length;
        const revenue = orders.reduce((s, o) => s + (o.total || 0), 0);
        const lastOrder = orders.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))[0];

        return `
          <div class="franchise-card">
            <div class="franchise-card-header">
              <h3>${name}</h3>
              <span class="franchise-badge ${getStatusBadge(status)}">${status.toUpperCase()}</span>
            </div>
            <div class="franchise-info">
              <div><strong>Contact</strong>${f.contactPerson || f.manager || 'N/A'}</div>
              <div><strong>Phone</strong>${f.phone || 'N/A'}</div>
              <div><strong>Location</strong>${f.location || f.city || 'N/A'}</div>
              <div><strong>Email</strong>${f.email || 'N/A'}</div>
              <div><strong>Tier</strong><span class="franchise-badge ${getTierBadge(tier)}">${tier.toUpperCase()}</span></div>
              <div><strong>Joined</strong>${f.createdAt ? new Date(f.createdAt).toLocaleDateString() : 'N/A'}</div>
            </div>
            <div class="franchise-stats">
              <div class="franchise-stat"><div class="val">${orderCount}</div><div class="lbl">Orders</div></div>
              <div class="franchise-stat"><div class="val">KES ${revenue.toLocaleString()}</div><div class="lbl">Revenue</div></div>
              <div class="franchise-stat"><div class="val">${lastOrder ? new Date(lastOrder.createdAt).toLocaleDateString() : '—'}</div><div class="lbl">Last Order</div></div>
            </div>
            <div class="franchise-actions">
              <button class="btn-sm btn-view" onclick="viewFranchisee('${f.id}')"><i class="fas fa-eye"></i> View</button>
              <button class="btn-sm btn-edit" onclick="editFranchisee('${f.id}')"><i class="fas fa-edit"></i> Edit</button>
              <button class="btn-sm btn-orders" onclick="viewFranchiseOrders('${f.id}')"><i class="fas fa-shopping-bag"></i> Orders</button>
              <button class="btn-sm btn-map" onclick="window.open('/workspaces/brandinn/map.html','_blank')"><i class="fas fa-map-pin"></i> Map</button>
              <button class="btn-sm btn-toggle ${status === 'active' ? '' : 'inactive'}" onclick="toggleStatus('${f.id}', '${status}')">
                <i class="fas fa-power-off"></i> ${status === 'active' ? 'Deactivate' : 'Activate'}
              </button>
            </div>
          </div>`;
      }).join('');

      updateStats();
    }

    function updateStats() {
      const franchisees = Object.values(allFranchisees);
      const active = franchisees.filter(f => f.status === 'active' || !f.status).length;
      const premium = franchisees.filter(f => f.tier === 'premium').length;
      const revenue = Object.values(allOrders).reduce((s, o) => s + (o.total || 0), 0);

      document.getElementById('statTotal').textContent = franchisees.length;
      document.getElementById('statActive').textContent = active;
      document.getElementById('statPremium').textContent = premium;
      document.getElementById('statRevenue').textContent = revenue.toLocaleString();
    }

    function showAddModal() {
      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-plus-circle"></i> Add Franchisee</h3>
        <div class="form-row">
          <div class="form-group"><label>Business Name *</label><input type="text" id="fName" placeholder="e.g., DSOG Fashion - Westlands"></div>
          <div class="form-group"><label>Tier</label><select id="fTier">
            <option value="standard">Standard</option><option value="premium">Premium</option><option value="basic">Basic</option>
          </select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Contact Person *</label><input type="text" id="fContact" placeholder="Full name"></div>
          <div class="form-group"><label>Phone *</label><input type="tel" id="fPhone" placeholder="+254..."></div>
        </div>
        <div class="form-group"><label>Email</label><input type="email" id="fEmail" placeholder="franchise@email.com"></div>
        <div class="form-row">
          <div class="form-group"><label>Location *</label><input type="text" id="fLocation" placeholder="e.g., Westlands, Nairobi"></div>
          <div class="form-group"><label>Status</label><select id="fStatus">
            <option value="active">Active</option><option value="pending">Pending</option><option value="inactive">Inactive</option>
          </select></div>
        </div>
        <div class="form-group"><label>Notes</label><textarea id="fNotes" rows="2" placeholder="Territory, commission rate..."></textarea></div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveFranchisee()"><i class="fas fa-save"></i> Save</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    async function saveFranchisee() {
      const name = document.getElementById('fName').value.trim();
      const contact = document.getElementById('fContact').value.trim();
      const phone = document.getElementById('fPhone').value.trim();
      const location = document.getElementById('fLocation').value.trim();
      if (!name || !contact || !phone || !location) { showToast('Fill required fields', true); return; }

      try {
        await database.ref('dsog_fashion_franchisees').push().set({
          businessName: name, contactPerson: contact, phone,
          email: document.getElementById('fEmail').value.trim(),
          location,
          tier: document.getElementById('fTier').value,
          status: document.getElementById('fStatus').value,
          notes: document.getElementById('fNotes').value.trim(),
          createdAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('✅ Franchisee added!');
        closeModal();
      } catch (e) { showToast('Failed to save', true); }
    }

    function editFranchisee(franchiseId) {
      const f = allFranchisees[franchiseId];
      if (!f) return;
      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-edit"></i> Edit Franchisee</h3>
        <div class="form-row">
          <div class="form-group"><label>Business Name</label><input type="text" id="efName" value="${f.businessName || f.name || ''}"></div>
          <div class="form-group"><label>Tier</label><select id="efTier">
            ${['standard','premium','basic'].map(t => `<option value="${t}" ${(f.tier || 'standard') === t ? 'selected' : ''}>${t}</option>`).join('')}
          </select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Contact Person</label><input type="text" id="efContact" value="${f.contactPerson || f.manager || ''}"></div>
          <div class="form-group"><label>Phone</label><input type="tel" id="efPhone" value="${f.phone || ''}"></div>
        </div>
        <div class="form-group"><label>Email</label><input type="email" id="efEmail" value="${f.email || ''}"></div>
        <div class="form-row">
          <div class="form-group"><label>Location</label><input type="text" id="efLocation" value="${f.location || f.city || ''}"></div>
          <div class="form-group"><label>Status</label><select id="efStatus">
            ${['active','pending','inactive'].map(s => `<option value="${s}" ${(f.status || 'active') === s ? 'selected' : ''}>${s}</option>`).join('')}
          </select></div>
        </div>
        <div class="form-group"><label>Notes</label><textarea id="efNotes" rows="2">${f.notes || ''}</textarea></div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="updateFranchisee('${franchiseId}')"><i class="fas fa-save"></i> Update</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    async function updateFranchisee(franchiseId) {
      try {
        await database.ref(`dsog_fashion_franchisees/${franchiseId}`).update({
          businessName: document.getElementById('efName').value.trim(),
          contactPerson: document.getElementById('efContact').value.trim(),
          phone: document.getElementById('efPhone').value.trim(),
          email: document.getElementById('efEmail').value.trim(),
          location: document.getElementById('efLocation').value.trim(),
          tier: document.getElementById('efTier').value,
          status: document.getElementById('efStatus').value,
          notes: document.getElementById('efNotes').value.trim(),
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('✅ Updated!');
        closeModal();
      } catch (e) { showToast('Failed to update', true); }
    }

    async function toggleStatus(franchiseId, currentStatus) {
      const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
      if (!confirm(`${newStatus === 'active' ? 'Activate' : 'Deactivate'} this franchisee?`)) return;
      try {
        await database.ref(`dsog_fashion_franchisees/${franchiseId}`).update({ status: newStatus });
        showToast(`✅ Franchisee ${newStatus}`);
      } catch (e) { showToast('Failed to update', true); }
    }

    function viewFranchisee(franchiseId) {
      const f = allFranchisees[franchiseId];
      if (!f) return;
      const name = f.businessName || f.name || 'Franchisee';
      const orders = getFranchiseOrders(name);
      
      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-store"></i> ${name}</h3>
        <div class="detail-grid">
          <div class="detail-item"><strong>Contact</strong>${f.contactPerson || f.manager || 'N/A'}</div>
          <div class="detail-item"><strong>Phone</strong>${f.phone || 'N/A'}</div>
          <div class="detail-item"><strong>Email</strong>${f.email || 'N/A'}</div>
          <div class="detail-item"><strong>Location</strong>${f.location || f.city || 'N/A'}</div>
          <div class="detail-item"><strong>Tier</strong>${f.tier || 'standard'}</div>
          <div class="detail-item"><strong>Status</strong>${f.status || 'active'}</div>
          <div class="detail-item"><strong>Orders</strong>${orders.length}</div>
          <div class="detail-item"><strong>Revenue</strong>KES ${orders.reduce((s,o) => s+(o.total||0), 0).toLocaleString()}</div>
        </div>
        ${orders.length ? `
          <p style="font-weight:700;font-size:0.75rem;margin:0.8rem 0 0.5rem;">Recent Orders:</p>
          ${orders.slice(0,5).map(o => `
            <div style="background:#fdf2f8;padding:0.5rem;border-radius:8px;margin-bottom:4px;font-size:0.7rem;display:flex;justify-content:space-between;">
              <span>${(o.products||[]).length} items</span>
              <span>KES ${(o.total||0).toLocaleString()}</span>
              <span style="color:#94a3b8;">${o.createdAt ? new Date(o.createdAt).toLocaleDateString() : ''}</span>
            </div>
          `).join('')}
        ` : ''}
        <div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    function viewFranchiseOrders(franchiseId) {
      const f = allFranchisees[franchiseId];
      if (!f) return;
      const name = f.businessName || f.name || 'Franchisee';
      window.location.href = `dsog-fashion-orders.html?search=${encodeURIComponent(name)}`;
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderFranchisees();
    });

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal')) closeModal();
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    // Firebase listeners
    database.ref('dsog_fashion_franchisees').on('value', (snapshot) => {
      allFranchisees = snapshot.val() || {};
      renderFranchisees();
    });

    database.ref('dsog_fashion_orders').on('value', (snapshot) => {
      allOrders = snapshot.val() || {};
      renderFranchisees();
    });

    auth.onAuthStateChanged((user) => { if (!user) window.location.href = '/'; });
    window.showAddModal = showAddModal;
    window.editFranchisee = editFranchisee;
    window.viewFranchisee = viewFranchisee;
    window.viewFranchiseOrders = viewFranchiseOrders;
    window.toggleStatus = toggleStatus;
    window.saveFranchisee = saveFranchisee;
    window.updateFranchisee = updateFranchisee;
    window.closeModal = closeModal;
  </script>
</body>
</html>
