<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>KazInni WorkFit · Trainers</title>
  <meta name="theme-color" content="#f97316">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --orange: #f97316; --orange-dark: #c2410c; --orange-light: #fb923c;
      --card-bg: #ffffff; --text-primary: #1e293b; --text-muted: #64748b;
      --border-light: #fed7aa; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 12px rgba(0,0,0,0.08); --shadow-lg: 0 12px 28px rgba(0,0,0,0.12);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #fafbfc; color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column;
    }
    
    /* Navbar */
    .navbar {
      background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 0.6rem 2rem; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; z-index: 100; gap: 1rem;
    }
    .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
    .logo-img { height: 36px; width: 36px; border-radius: 10px; object-fit: contain; background: white; box-shadow: var(--shadow-sm); }
    .logo-text { font-weight: 800; font-size: 1.1rem; background: linear-gradient(135deg, #f97316, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-btn {
      padding: 0.45rem 1rem; border-radius: 10px; font-weight: 600; font-size: 0.78rem;
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
      transition: all 0.2s; white-space: nowrap; border: 1px solid #e2e8f0; background: white; color: #475569;
    }
    .nav-btn:hover { background: #f8fafc; border-color: #cbd5e1; }
    .nav-btn.primary { background: var(--orange); color: white; border-color: var(--orange); }
    .nav-btn.primary:hover { background: var(--orange-dark); }

    .container { max-width: 1280px; margin: 0 auto; padding: 2rem; flex: 1; width: 100%; }
    
    /* Page Header */
    .page-header { margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.6rem; font-weight: 800; color: #0f172a; display: flex; align-items: center; gap: 10px; }
    .page-header p { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem; }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .stat-card {
      background: white; border-radius: 16px; padding: 1rem 1.2rem; border: 1px solid #f1f5f9;
      box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: space-between;
    }
    .stat-info h4 { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; margin-bottom: 0.2rem; }
    .stat-info .num { font-size: 1.8rem; font-weight: 800; color: #0f172a; }
    .stat-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .stat-icon.orange { background: #fff7ed; color: #f97316; }
    .stat-icon.green { background: #ecfdf5; color: #10b981; }
    .stat-icon.blue { background: #eff6ff; color: #3b82f6; }
    .stat-icon.purple { background: #faf5ff; color: #8b5cf6; }

    /* Filter Bar */
    .filter-bar {
      display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
      background: white; padding: 0.6rem 1rem; border-radius: 14px; border: 1px solid #f1f5f9; box-shadow: var(--shadow-sm);
    }
    .filter-bar input, .filter-bar select {
      padding: 0.5rem 0.8rem; border: 1px solid #e2e8f0; border-radius: 10px;
      font-family: 'Inter', sans-serif; font-size: 0.78rem; background: #f8fafc; outline: none; color: #334155;
    }
    .filter-bar input:focus, .filter-bar select:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(249,115,22,0.08); }
    .filter-bar input { flex: 1; min-width: 180px; }

    /* Trainers Grid */
    .trainers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
    .trainer-card {
      background: white; border-radius: 18px; padding: 1.3rem; border: 1px solid #f1f5f9;
      box-shadow: var(--shadow-sm); transition: all 0.25s; display: flex; flex-direction: column; gap: 12px; cursor: pointer;
    }
    .trainer-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: #fed7aa; }
    .trainer-card-top { display: flex; gap: 12px; align-items: center; }
    .trainer-avatar {
      width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }
    .trainer-avatar.cardio { background: #fef2f2; }
    .trainer-avatar.strength { background: #fffbeb; }
    .trainer-avatar.yoga { background: #f5f3ff; }
    .trainer-avatar.hiit { background: #eff6ff; }
    .trainer-avatar.default { background: #fff7ed; }
    .trainer-info { flex: 1; min-width: 0; }
    .trainer-name { font-weight: 700; font-size: 0.95rem; color: #0f172a; }
    .trainer-role { font-size: 0.7rem; color: #64748b; margin-top: 2px; display: flex; align-items: center; gap: 6px; }
    .trainer-details { display: flex; flex-wrap: wrap; gap: 6px; font-size: 0.68rem; color: #64748b; }
    .trainer-details span {
      background: #f8fafc; padding: 0.25rem 0.6rem; border-radius: 8px; display: flex; align-items: center; gap: 4px;
      border: 1px solid #f1f5f9;
    }
    .trainer-stats { display: flex; gap: 8px; }
    .trainer-stat {
      flex: 1; text-align: center; background: #f8fafc; border-radius: 10px; padding: 0.6rem 0.4rem; border: 1px solid #f1f5f9;
    }
    .trainer-stat strong { display: block; font-size: 1rem; color: #0f172a; }
    .trainer-stat small { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.3px; }
    .trainer-actions { display: flex; gap: 6px; }
    .trainer-actions button {
      flex: 1; padding: 0.5rem; border-radius: 10px; font-weight: 600; font-size: 0.68rem; border: 1px solid #e2e8f0;
      background: white; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .trainer-actions button:hover { background: #f8fafc; border-color: #cbd5e1; }
    .trainer-actions button.danger:hover { background: #fef2f2; border-color: #fecaca; color: #ef4444; }

    /* Badges */
    .badge {
      padding: 0.2rem 0.55rem; border-radius: 8px; font-size: 0.62rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .badge.available { background: #ecfdf5; color: #065f46; }
    .badge.busy { background: #fffbeb; color: #92400e; }
    .badge.on_leave { background: #fef2f2; color: #991b1b; }
    .badge.yoga { background: #f5f3ff; color: #5b21b6; }
    .badge.cardio { background: #fef2f2; color: #b91c1c; }
    .badge.strength { background: #fffbeb; color: #92400e; }
    .badge.hiit { background: #eff6ff; color: #1e40af; }
    .badge.zumba { background: #fdf2f8; color: #9d174d; }
    .badge.pilates { background: #ecfeff; color: #155e75; }
    .badge.crossfit { background: #f1f5f9; color: #334155; }
    .badge.spin { background: #faf5ff; color: #7e22ce; }

    .empty-state { text-align: center; padding: 3rem; color: #94a3b8; background: white; border-radius: 18px; border: 1px solid #f1f5f9; }
    .empty-state i { font-size: 3rem; display: block; margin-bottom: 1rem; color: #cbd5e1; }
    .footer { text-align: center; padding: 1rem; color: #94a3b8; font-size: 0.7rem; border-top: 1px solid #f1f5f9; margin-top: 2rem; }

    /* Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15,23,42,0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      display: flex; justify-content: center; align-items: center; z-index: 3000;
      opacity: 0; visibility: hidden; transition: all 0.25s;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal {
      background: white; border-radius: 20px; padding: 1.8rem; width: 90%; max-width: 560px;
      max-height: 88vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .modal-close {
      width: 34px; height: 34px; border-radius: 10px; border: 1px solid #e2e8f0;
      background: white; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .modal-close:hover { background: #fef2f2; border-color: #fecaca; color: #ef4444; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.8rem; }
    .form-group.full { grid-column: span 2; }
    .form-group label { font-weight: 600; font-size: 0.72rem; color: #475569; }
    .form-group input, .form-group select, .form-group textarea {
      padding: 0.55rem 0.8rem; border: 1px solid #e2e8f0; border-radius: 10px;
      font-family: 'Inter', sans-serif; font-size: 0.82rem; background: #f8fafc; outline: none; transition: all 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--orange); box-shadow: 0 0 0 3px rgba(249,115,22,0.08); background: white;
    }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 10px; font-weight: 600; font-size: 0.78rem; cursor: pointer;
      border: none; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--orange); color: white; flex: 1; justify-content: center; }
    .btn-primary:hover { background: var(--orange-dark); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-danger { background: #fef2f2; color: #ef4444; }
    .btn-danger:hover { background: #fee2e2; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 4000;
      padding: 0.7rem 1.4rem; border-radius: 12px; font-size: 0.78rem; font-weight: 600;
      box-shadow: var(--shadow-lg); animation: slideUp 0.3s ease; white-space: nowrap;
    }
    .toast.success { background: #065f46; color: white; }
    .toast.error { background: #991b1b; color: white; }
    @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    @media (max-width: 768px) {
      .container { padding: 1rem; }
      .trainers-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .form-group.full { grid-column: span 1; }
      .navbar { padding: 0.5rem 1rem; }
    }
  </style>
</head>
<body>
  <!-- Add/Edit Trainer Modal -->
  <div class="modal-overlay" id="trainerModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle"><i class="fas fa-user-plus" style="color:#f97316;"></i> Add Trainer</h2>
        <button class="modal-close" onclick="closeTrainerModal()"><i class="fas fa-times"></i></button>
      </div>
      <form id="trainerForm">
        <input type="hidden" id="editTrainerId">
        <div class="form-row">
          <div class="form-group full"><label>Full Name *</label><input type="text" id="trainerName" placeholder="e.g. James Ochieng" required></div>
          <div class="form-group"><label>Phone</label><input type="tel" id="trainerPhone" placeholder="+254 7XX XXX XXX"></div>
          <div class="form-group"><label>Email *</label><input type="email" id="trainerEmail" placeholder="trainer@email.com" required></div>
          <div class="form-group"><label>Specialty *</label>
            <select id="trainerSpecialty" required>
              <option value="">Select</option>
              <option value="Yoga">Yoga</option><option value="Cardio">Cardio</option><option value="Strength Training">Strength</option>
              <option value="HIIT">HIIT</option><option value="Zumba">Zumba</option><option value="Pilates">Pilates</option>
              <option value="CrossFit">CrossFit</option><option value="Spin">Spin</option><option value="Aerobics">Aerobics</option>
            </select>
          </div>
          <div class="form-group"><label>Certification</label><input type="text" id="trainerCert" placeholder="e.g. ACE, NASM"></div>
          <div class="form-group"><label>Status</label>
            <select id="trainerStatus"><option value="available">Available</option><option value="busy">Busy</option><option value="on_leave">On Leave</option></select>
          </div>
          <div class="form-group"><label>Assigned Club</label><select id="trainerClub"><option value="">Not assigned</option></select></div>
          <div class="form-group"><label>Experience (years)</label><input type="number" id="trainerExperience" placeholder="e.g. 3" min="0"></div>
          <div class="form-group"><label>Hourly Rate (KES)</label><input type="number" id="trainerRate" placeholder="e.g. 1500" min="0"></div>
          <div class="form-group full"><label>Bio / Notes</label><textarea id="trainerBio" rows="2" placeholder="Brief background..."></textarea></div>
        </div>
        <div class="btn-row">
          <button type="button" class="btn btn-secondary" onclick="closeTrainerModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitBtn"><i class="fas fa-save"></i> Save Trainer</button>
        </div>
      </form>
    </div>
  </div>

  <nav class="navbar">
    <a class="logo" href="/workspaces/workfit/index.html">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Logo" class="logo-img">
      <span class="logo-text">WorkFit Club</span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/workfit/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <button class="nav-btn primary" onclick="openAddTrainerModal()"><i class="fas fa-plus"></i> Add Trainer</button>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-users-gear" style="color:#f97316;"></i> Trainers</h1>
      <p>Manage all trainers across your WorkFit clubs</p>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-info"><h4>Total</h4><div class="num" id="statTotal">0</div></div><div class="stat-icon orange"><i class="fas fa-users"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h4>Available</h4><div class="num" id="statAvailable">0</div></div><div class="stat-icon green"><i class="fas fa-check-circle"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h4>Busy</h4><div class="num" id="statBusy">0</div></div><div class="stat-icon blue"><i class="fas fa-spinner"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h4>On Leave</h4><div class="num" id="statLeave">0</div></div><div class="stat-icon purple"><i class="fas fa-clock"></i></div></div>
    </div>

    <div class="filter-bar">
      <i class="fas fa-search" style="color:#94a3b8;"></i>
      <input type="text" id="searchInput" placeholder="Search by name, specialty or club...">
      <select id="statusFilter"><option value="all">All Status</option><option value="available">Available</option><option value="busy">Busy</option><option value="on_leave">On Leave</option></select>
      <select id="specialtyFilter"><option value="all">All Specialties</option><option value="yoga">Yoga</option><option value="cardio">Cardio</option><option value="strength">Strength</option><option value="hiit">HIIT</option><option value="zumba">Zumba</option><option value="pilates">Pilates</option><option value="crossfit">CrossFit</option><option value="spin">Spin</option></select>
    </div>

    <div id="trainersContainer" class="trainers-grid"></div>
  </div>
  <div class="footer"><i class="far fa-copyright"></i> 2026 WorkFit Club · Trainer Management</div>
  <div id="toast" class="toast" style="display:none;"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc"
    });
    const auth = firebase.auth();
    const db = firebase.database();

    let allTrainers = {};
    let allClubs = {};
    let isEditing = false;

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    
    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast ' + (isError ? 'error' : 'success');
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    function getAvatarClass(s) {
      const sp = (s||'').toLowerCase();
      if (sp.includes('cardio')) return 'cardio';
      if (sp.includes('strength')) return 'strength';
      if (sp.includes('yoga')) return 'yoga';
      if (sp.includes('hiit')) return 'hiit';
      return 'default';
    }
    
    function getTrainerIcon(s) {
      const sp = (s||'').toLowerCase();
      if (sp.includes('yoga')) return '🧘'; if (sp.includes('cardio')) return '🏃';
      if (sp.includes('strength')) return '💪'; if (sp.includes('hiit')) return '⚡';
      if (sp.includes('zumba')) return '💃'; if (sp.includes('pilates')) return '🤸';
      if (sp.includes('crossfit')) return '🏋️'; if (sp.includes('spin')) return '🚴';
      return '💪';
    }

    function getBadgeClass(s) {
      const sp = (s||'').toLowerCase();
      if (sp.includes('yoga')) return 'yoga'; if (sp.includes('cardio')) return 'cardio';
      if (sp.includes('strength')) return 'strength'; if (sp.includes('hiit')) return 'hiit';
      if (sp.includes('zumba')) return 'zumba'; if (sp.includes('pilates')) return 'pilates';
      if (sp.includes('crossfit')) return 'crossfit'; if (sp.includes('spin')) return 'spin';
      return 'strength';
    }

    function populateClubDropdown() {
      const sel = document.getElementById('trainerClub');
      sel.innerHTML = '<option value="">Not assigned</option>';
      Object.entries(allClubs).forEach(([id, club]) => {
        if (club && (club.businessName || club.name)) {
          sel.innerHTML += `<option value="${id}">${esc(club.businessName || club.name)}</option>`;
        }
      });
    }

    function renderTrainers() {
      const searchTerm = (document.getElementById('searchInput').value || '').toLowerCase();
      const statusVal = document.getElementById('statusFilter').value;
      const specialtyVal = document.getElementById('specialtyFilter').value;

      let trainers = Object.entries(allTrainers).map(([id, data]) => ({ id, ...data })).filter(t => t && t.name);
      
      if (statusVal !== 'all') trainers = trainers.filter(t => (t.status || 'available').toLowerCase() === statusVal);
      if (specialtyVal !== 'all') trainers = trainers.filter(t => (t.specialty || '').toLowerCase().includes(specialtyVal));
      if (searchTerm) {
        trainers = trainers.filter(t =>
          (t.name || '').toLowerCase().includes(searchTerm) ||
          (t.specialty || '').toLowerCase().includes(searchTerm) ||
          (t.clubName || '').toLowerCase().includes(searchTerm)
        );
      }

      // Update stats
      const all = Object.values(allTrainers).filter(t => t && t.name);
      document.getElementById('statTotal').textContent = all.length;
      document.getElementById('statAvailable').textContent = all.filter(t => t.status === 'available').length;
      document.getElementById('statBusy').textContent = all.filter(t => t.status === 'busy').length;
      document.getElementById('statLeave').textContent = all.filter(t => t.status === 'on_leave').length;

      const container = document.getElementById('trainersContainer');
      
      if (!trainers.length) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-user-slash"></i><p>No trainers found</p><button class="btn btn-primary" style="margin-top:1rem;" onclick="openAddTrainerModal()"><i class="fas fa-plus"></i> Add First Trainer</button></div>`;
        return;
      }

      container.innerHTML = trainers.map(t => {
        const name = esc(t.name || 'Trainer');
        const specialty = esc(t.specialty || 'General');
        const status = (t.status || 'available').toLowerCase();
        const clubName = esc(t.clubName || 'Unassigned');
        const cert = t.certification || '';
        const exp = t.experience || 0;
        const rate = t.hourlyRate || 0;
        const phone = t.phone || '';
        const email = t.email || '';

        return `
          <div class="trainer-card">
            <div class="trainer-card-top">
              <div class="trainer-avatar ${getAvatarClass(specialty)}">${getTrainerIcon(specialty)}</div>
              <div class="trainer-info">
                <div class="trainer-name">${name}</div>
                <div class="trainer-role">
                  <span class="badge ${getBadgeClass(specialty)}">${specialty}</span>
                  <span class="badge ${status}">${status.replace(/_/g,' ')}</span>
                </div>
              </div>
            </div>
            <div class="trainer-details">
              ${cert ? `<span><i class="fas fa-certificate"></i> ${esc(cert)}</span>` : ''}
              ${phone ? `<span><i class="fas fa-phone"></i> ${esc(phone)}</span>` : ''}
              ${email ? `<span><i class="fas fa-envelope"></i> ${esc(email)}</span>` : ''}
              <span><i class="fas fa-building"></i> ${clubName}</span>
            </div>
            <div class="trainer-stats">
              <div class="trainer-stat"><strong>${exp}</strong><small>Years</small></div>
              <div class="trainer-stat"><strong>KES ${Number(rate).toLocaleString()}</strong><small>Rate/hr</small></div>
              <div class="trainer-stat"><strong>${t.sessions || 0}</strong><small>Sessions</small></div>
            </div>
            <div class="trainer-actions">
              <button onclick="openEditTrainerModal('${t.id}')"><i class="fas fa-pen"></i> Edit</button>
              <button onclick="if(confirm('Delete ${name}?')) deleteTrainer('${t.id}')"><i class="fas fa-trash"></i> Delete</button>
            </div>
          </div>`;
      }).join('');
    }

    // Modal functions
    window.openAddTrainerModal = function() {
      isEditing = false;
      document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus" style="color:#f97316;"></i> Add Trainer';
      document.getElementById('editTrainerId').value = '';
      document.getElementById('trainerForm').reset();
      document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> Save Trainer';
      populateClubDropdown();
      document.getElementById('trainerModal').classList.add('active');
    };

    window.openEditTrainerModal = function(trainerId) {
      const t = allTrainers[trainerId];
      if (!t) return;
      isEditing = true;
      document.getElementById('modalTitle').innerHTML = '<i class="fas fa-pen" style="color:#f97316;"></i> Edit Trainer';
      document.getElementById('editTrainerId').value = trainerId;
      document.getElementById('trainerName').value = t.name || '';
      document.getElementById('trainerPhone').value = t.phone || '';
      document.getElementById('trainerEmail').value = t.email || '';
      document.getElementById('trainerSpecialty').value = t.specialty || '';
      document.getElementById('trainerCert').value = t.certification || '';
      document.getElementById('trainerStatus').value = t.status || 'available';
      document.getElementById('trainerExperience').value = t.experience || '';
      document.getElementById('trainerRate').value = t.hourlyRate || '';
      document.getElementById('trainerBio').value = t.bio || '';
      document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> Update Trainer';
      populateClubDropdown();
      setTimeout(() => { document.getElementById('trainerClub').value = t.clubId || ''; }, 200);
      document.getElementById('trainerModal').classList.add('active');
    };

    window.closeTrainerModal = function() {
      document.getElementById('trainerModal').classList.remove('active');
    };

    document.getElementById('trainerModal').addEventListener('click', function(e) {
      if (e.target === this) window.closeTrainerModal();
    });

    // Form submit
    document.getElementById('trainerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = document.getElementById('trainerName').value.trim();
      const email = document.getElementById('trainerEmail').value.trim();
      if (!name) { showToast('Name is required', true); return; }
      if (!email) { showToast('Email is required', true); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

      const selectedClubId = document.getElementById('trainerClub').value;
      let clubName = '';
      if (selectedClubId && allClubs[selectedClubId]) {
        clubName = allClubs[selectedClubId].businessName || allClubs[selectedClubId].name || '';
      }

      const trainerData = {
        name, trainerName: name,
        email,
        phone: document.getElementById('trainerPhone').value.trim(),
        specialty: document.getElementById('trainerSpecialty').value,
        specialization: document.getElementById('trainerSpecialty').value,
        certification: document.getElementById('trainerCert').value.trim(),
        status: document.getElementById('trainerStatus').value,
        clubId: selectedClubId, assignedClubId: selectedClubId,
        clubName, assignedClub: clubName,
        experience: Number(document.getElementById('trainerExperience').value) || 0,
        yearsOfExperience: Number(document.getElementById('trainerExperience').value) || 0,
        hourlyRate: Number(document.getElementById('trainerRate').value) || 0,
        rate: Number(document.getElementById('trainerRate').value) || 0,
        bio: document.getElementById('trainerBio').value.trim(),
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      };

      try {
        const editId = document.getElementById('editTrainerId').value;
        if (editId) {
          await db.ref('workfit_trainers/' + editId).update(trainerData);
          showToast('Trainer updated!');
        } else {
          trainerData.createdAt = firebase.database.ServerValue.TIMESTAMP;
          trainerData.sessions = 0;
          await db.ref('workfit_trainers').push(trainerData);
          showToast('Trainer added!');
        }
        window.closeTrainerModal();
      } catch (err) {
        console.error(err);
        showToast('Error saving trainer', true);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> ' + (isEditing ? 'Update' : 'Save') + ' Trainer';
      }
    });

    window.deleteTrainer = async function(id) {
      try {
        await db.ref('workfit_trainers/' + id).remove();
        showToast('Trainer deleted');
      } catch(e) { showToast('Error deleting', true); }
    };

    // Filters
    document.getElementById('searchInput').addEventListener('input', renderTrainers);
    document.getElementById('statusFilter').addEventListener('change', renderTrainers);
    document.getElementById('specialtyFilter').addEventListener('change', renderTrainers);

    // Auth + Data
    auth.onAuthStateChanged(user => {
      if (!user) { window.location.href = '/'; return; }

      db.ref('workfit_trainers').on('value', snap => {
        allTrainers = snap.val() || {};
        renderTrainers();
      });

      db.ref('workfit_clubs').on('value', snap => {
        allClubs = snap.val() || {};
        renderTrainers();
      });
    });
  </script>
</body>
</html>
