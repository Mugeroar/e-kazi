<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>KazInni WorkFit · Register Club</title>
  <meta name="theme-color" content="#f97316">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --orange: #f97316; --orange-dark: #c2410c; --orange-light: #fb923c;
      --card-bg: #ffffff; --text-primary: #1e293b; --text-muted: #64748b;
      --border-light: #fed7aa; --success: #10b981; --danger: #ef4444;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #fff7ed 0%, #ffffff 100%);
      color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column;
    }
    .navbar {
      background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
      padding: 0.7rem 3%; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2px solid rgba(249,115,22,0.3); position: sticky; top: 0; z-index: 2000;
      flex-wrap: wrap; gap: 10px;
    }
    .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .logo-img { height: 40px; width: 40px; border-radius: 12px; object-fit: contain; background: white; box-shadow: 0 6px 16px rgba(249,115,22,0.3); }
    .logo-text { font-weight: 800; font-size: 1.3rem; background: linear-gradient(145deg, #fb923c, #c2410c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-text span { font-weight: 600; font-size: 0.8rem; background: #f97316; -webkit-text-fill-color: #f97316; margin-left: 4px; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-btn {
      background: rgba(249,115,22,0.1); border: 1px solid var(--orange); padding: 0.5rem 1rem;
      border-radius: 40px; color: var(--orange-dark); font-weight: 600; font-size: 0.75rem;
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; transition: 0.2s; white-space: nowrap;
    }
    .nav-btn:hover { background: var(--orange); color: white; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem 3%; flex: 1; width: 100%; }
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.8rem; font-weight: 800; display: flex; align-items: center; gap: 12px; }
    .page-header h1 i { color: var(--orange-dark); background: white; padding: 10px; border-radius: 14px; box-shadow: 0 8px 16px rgba(249,115,22,0.08); }
    .form-card {
      background: white; border-radius: 24px; padding: 2rem; border: 1px solid #fed7aa;
      box-shadow: 0 12px 28px rgba(0,0,0,0.04);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-group.full { grid-column: span 2; }
    .form-group label { font-weight: 600; font-size: 0.8rem; color: #334155; display: flex; align-items: center; gap: 4px; }
    .form-group label i { color: #c2410c; font-size: 0.7rem; }
    .form-group input, .form-group select, .form-group textarea {
      padding: 0.7rem 1rem; border: 1px solid #e2e8f0; border-radius: 14px;
      font-family: 'Inter', sans-serif; font-size: 0.9rem; background: #f8fafc;
      transition: all 0.2s; outline: none; width: 100%;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,0.1); background: white;
    }
    .form-group textarea { resize: vertical; min-height: 90px; }
    .tier-options { display: flex; gap: 10px; flex-wrap: wrap; }
    .tier-option {
      flex: 1; min-width: 80px; padding: 0.7rem; border: 2px solid #e2e8f0; border-radius: 16px;
      text-align: center; cursor: pointer; transition: 0.2s; background: white;
    }
    .tier-option.selected { border-color: #f97316; background: #fff7ed; }
    .tier-option i { font-size: 1.5rem; display: block; margin-bottom: 0.3rem; color: #c2410c; }
    .tier-option strong { display: block; font-size: 0.8rem; }
    .tier-option small { font-size: 0.6rem; color: #64748b; }
    .submit-btn {
      background: var(--orange); color: white; border: none; padding: 0.9rem 2rem; border-radius: 40px;
      font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
      gap: 8px; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 1.5rem;
      box-shadow: 0 8px 18px rgba(249,115,22,0.3);
    }
    .submit-btn:hover { background: var(--orange-dark); transform: translateY(-2px); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .message { padding: 0.8rem; border-radius: 12px; margin-bottom: 1.2rem; font-size: 0.8rem; font-weight: 500; display: none; }
    .message.success { background: #d1fae5; color: #065f46; display: block; }
    .message.error { background: #fee2e2; color: #991b1b; display: block; }
    .footer { text-align: center; padding: 1.2rem; color: #94a3b8; font-size: 0.75rem; border-top: 1px solid #fed7aa; }
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo" onclick="window.location.href='workfit-club-dashboard.html'">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Logo" class="logo-img">
      <span class="logo-text">WorkFit<span>Club</span></span>
    </div>
    <div class="nav-right">
      <a href="workfit-clubs.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Clubs</a>
      <a href="workfit-club-dashboard.html" class="nav-btn"><i class="fas fa-th-large"></i> Dashboard</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-plus-circle"></i> Register New Club</h1>
    </div>

    <div id="messageBox" class="message"></div>

    <div class="form-card">
      <form id="clubForm">
        <div class="form-grid">
          <div class="form-group full">
            <label><i class="fas fa-building"></i> Club / Business Name *</label>
            <input type="text" id="businessName" placeholder="e.g. WorkFit Westlands" required>
          </div>

          <div class="form-group">
            <label><i class="fas fa-map-pin"></i> City / Town *</label>
            <input type="text" id="city" placeholder="e.g. Nairobi" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-location-dot"></i> County / Region</label>
            <input type="text" id="county" placeholder="e.g. Nairobi County">
          </div>

          <div class="form-group full">
            <label><i class="fas fa-map-marked-alt"></i> Full Address</label>
            <input type="text" id="address" placeholder="Street, building name, floor">
          </div>

          <div class="form-group">
            <label><i class="fas fa-phone"></i> Contact Phone</label>
            <input type="tel" id="phone" placeholder="+254 7XX XXX XXX">
          </div>
          <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="email" placeholder="club@workfit.co.ke">
          </div>

          <div class="form-group">
            <label><i class="fas fa-calendar"></i> Established Year</label>
            <input type="number" id="established" placeholder="2025" min="2000" max="2030">
          </div>
          <div class="form-group">
            <label><i class="fas fa-users"></i> Capacity</label>
            <input type="number" id="capacity" placeholder="e.g. 200" min="1">
          </div>

          <div class="form-group full">
            <label><i class="fas fa-crown"></i> Club Tier *</label>
            <div class="tier-options" id="tierOptions">
              <div class="tier-option selected" data-tier="basic">
                <i class="fas fa-dumbbell"></i>
                <strong>Basic</strong>
                <small>Essential gym</small>
              </div>
              <div class="tier-option" data-tier="standard">
                <i class="fas fa-star"></i>
                <strong>Standard</strong>
                <small>Full services</small>
              </div>
              <div class="tier-option" data-tier="premium">
                <i class="fas fa-gem"></i>
                <strong>Premium</strong>
                <small>Luxury fitness</small>
              </div>
            </div>
          </div>

          <div class="form-group full">
            <label><i class="fas fa-align-left"></i> Description / Notes</label>
            <textarea id="description" placeholder="Brief description of the club, facilities, unique features..."></textarea>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <i class="fas fa-save"></i> Register Club
        </button>
      </form>
    </div>
  </div>
  <div class="footer"><i class="far fa-copyright"></i> 2026 WorkFit Club · Franchise Registration</div>

  <script type="importmap">
    { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js", "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js", "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js" } }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged } from "firebase/auth";
    import { getDatabase, ref, push, serverTimestamp } from "firebase/database";

    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let selectedTier = 'basic';
    const messageBox = document.getElementById('messageBox');
    const submitBtn = document.getElementById('submitBtn');
    const form = document.getElementById('clubForm');

    // Tier selection
    document.querySelectorAll('.tier-option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.tier-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        selectedTier = opt.dataset.tier;
      });
    });

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = `message ${type}`;
      setTimeout(() => { messageBox.className = 'message'; }, 5000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const businessName = document.getElementById('businessName').value.trim();
      const city = document.getElementById('city').value.trim();
      if (!businessName || !city) {
        showMessage('Please fill in Club Name and City at minimum.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';

      const clubData = {
        businessName: businessName,
        name: businessName,
        city: city,
        county: document.getElementById('county').value.trim(),
        address: document.getElementById('address').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        established: document.getElementById('established').value || null,
        capacity: Number(document.getElementById('capacity').value) || 0,
        tier: selectedTier,
        description: document.getElementById('description').value.trim(),
        status: 'active',
        members: 0,
        totalMembers: 0,
        trainers: 0,
        totalTrainers: 0,
        revenue: 0,
        monthlyRevenue: 0,
        location: city,
        createdAt: serverTimestamp(),
        registeredAt: Date.now(),
        timestamp: Date.now()
      };

      try {
        const clubsRef = ref(db, 'workfit_clubs');
        await push(clubsRef, clubData);
        showMessage('✅ Club registered successfully! Redirecting...', 'success');
        form.reset();
        document.querySelectorAll('.tier-option').forEach(o => o.classList.remove('selected'));
        document.querySelector('[data-tier="basic"]').classList.add('selected');
        selectedTier = 'basic';
        setTimeout(() => { window.location.href = 'workfit-clubs.html'; }, 1500);
      } catch (error) {
        console.error('Registration error:', error);
        showMessage('❌ Failed to register club. Please try again.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-save"></i> Register Club';
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = '/';
    });
  </script>
</body>
</html>
