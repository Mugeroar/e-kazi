<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>KazInni WorkFit · Club Manager</title>
  <meta name="theme-color" content="#f97316">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --orange: #f97316; --orange-dark: #c2410c; --orange-light: #fb923c;
      --card-bg: #ffffff; --text-primary: #1e293b; --text-muted: #64748b;
      --border-light: #fed7aa; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 12px rgba(0,0,0,0.08); --shadow-lg: 0 12px 28px rgba(0,0,0,0.12);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #fafbfc; color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column;
    }
    
    .navbar {
      background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 0.6rem 2rem; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; z-index: 100; gap: 1rem;
    }
    .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
    .logo-img { height: 36px; width: 36px; border-radius: 10px; object-fit: contain; background: white; box-shadow: var(--shadow-sm); }
    .logo-text { font-weight: 800; font-size: 1.1rem; background: linear-gradient(135deg, #f97316, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-btn {
      padding: 0.45rem 1rem; border-radius: 10px; font-weight: 600; font-size: 0.78rem;
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
      transition: all 0.2s; white-space: nowrap; border: 1px solid #e2e8f0; background: white; color: #475569;
    }
    .nav-btn:hover { background: #f8fafc; border-color: #cbd5e1; }
    .nav-btn.primary { background: var(--orange); color: white; border-color: var(--orange); }
    .nav-btn.primary:hover { background: var(--orange-dark); }

    .container { max-width: 1280px; margin: 0 auto; padding: 2rem; flex: 1; width: 100%; }
    
    .page-header { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .page-header h1 { font-size: 1.6rem; font-weight: 800; color: #0f172a; display: flex; align-items: center; gap: 10px; }
    .page-header p { font-size: 0.8rem; color: var(--text-muted); }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .stat-card {
      background: white; border-radius: 16px; padding: 1rem 1.2rem; border: 1px solid #f1f5f9;
      box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: space-between;
    }
    .stat-info h4 { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; margin-bottom: 0.2rem; }
    .stat-info .num { font-size: 1.8rem; font-weight: 800; color: #0f172a; }
    .stat-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .stat-icon.orange { background: #fff7ed; color: #f97316; }
    .stat-icon.green { background: #ecfdf5; color: #10b981; }
    .stat-icon.blue { background: #eff6ff; color: #3b82f6; }
    .stat-icon.purple { background: #faf5ff; color: #8b5cf6; }

    .filter-bar {
      display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
      background: white; padding: 0.6rem 1rem; border-radius: 14px; border: 1px solid #f1f5f9; box-shadow: var(--shadow-sm);
    }
    .filter-bar input, .filter-bar select {
      padding: 0.5rem 0.8rem; border: 1px solid #e2e8f0; border-radius: 10px;
      font-family: 'Inter', sans-serif; font-size: 0.78rem; background: #f8fafc; outline: none; color: #334155;
    }
    .filter-bar input:focus, .filter-bar select:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(249,115,22,0.08); }
    .filter-bar input { flex: 1; min-width: 180px; }

    .clubs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
    .club-card {
      background: white; border-radius: 18px; padding: 1.3rem; border: 1px solid #f1f5f9;
      box-shadow: var(--shadow-sm); transition: all 0.25s; display: flex; flex-direction: column; gap: 12px;
    }
    .club-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: #fed7aa; }
    .club-card-top { display: flex; gap: 12px; align-items: flex-start; }
    .club-icon {
      width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }
    .club-icon.premium { background: #fffbeb; }
    .club-icon.standard { background: #eff6ff; }
    .club-icon.basic { background: #f8fafc; }
    .club-info { flex: 1; min-width: 0; }
    .club-name { font-weight: 700; font-size: 0.95rem; color: #0f172a; }
    .club-location { font-size: 0.7rem; color: #64748b; margin-top: 2px; display: flex; align-items: center; gap: 4px; }
    .club-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      padding: 0.2rem 0.55rem; border-radius: 8px; font-size: 0.62rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .badge.active { background: #ecfdf5; color: #065f46; }
    .badge.inactive { background: #fef2f2; color: #991b1b; }
    .badge.pending { background: #fffbeb; color: #92400e; }
    .badge.premium { background: #fffbeb; color: #92400e; }
    .badge.standard { background: #eff6ff; color: #1e40af; }
    .badge.basic { background: #f1f5f9; color: #475569; }
    .club-details { display: flex; flex-wrap: wrap; gap: 6px; font-size: 0.68rem; color: #64748b; }
    .club-details span {
      background: #f8fafc; padding: 0.25rem 0.6rem; border-radius: 8px; display: flex; align-items: center; gap: 4px;
      border: 1px solid #f1f5f9;
    }
    .club-stats { display: flex; gap: 8px; }
    .club-stat {
      flex: 1; text-align: center; background: #f8fafc; border-radius: 10px; padding: 0.6rem 0.4rem; border: 1px solid #f1f5f9;
    }
    .club-stat strong { display: block; font-size: 1rem; color: #0f172a; }
    .club-stat small { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.3px; }
    .club-actions { display: flex; gap: 6px; }
    .club-actions button {
      flex: 1; padding: 0.5rem; border-radius: 10px; font-weight: 600; font-size: 0.68rem; border: 1px solid #e2e8f0;
      background: white; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .club-actions button:hover { background: #f8fafc; border-color: #cbd5e1; }
    .club-actions button.primary-action { background: #fff7ed; border-color: #fed7aa; color: #c2410c; }
    .club-actions button.primary-action:hover { background: var(--orange); color: white; border-color: var(--orange); }

    .empty-state { text-align: center; padding: 3rem; color: #94a3b8; background: white; border-radius: 18px; border: 1px solid #f1f5f9; }
    .empty-state i { font-size: 3rem; display: block; margin-bottom: 1rem; color: #cbd5e1; }
    .footer { text-align: center; padding: 1rem; color: #94a3b8; font-size: 0.7rem; border-top: 1px solid #f1f5f9; margin-top: 2rem; }

    /* Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15,23,42,0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      display: flex; justify-content: center; align-items: center; z-index: 3000;
      opacity: 0; visibility: hidden; transition: all 0.25s;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal {
      background: white; border-radius: 20px; padding: 1.8rem; width: 90%; max-width: 600px;
      max-height: 88vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal.wide { max-width: 700px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .modal-close {
      width: 34px; height: 34px; border-radius: 10px; border: 1px solid #e2e8f0;
      background: white; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .modal-close:hover { background: #fef2f2; border-color: #fecaca; color: #ef4444; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.8rem; }
    .form-group.full { grid-column: span 2; }
    .form-group label { font-weight: 600; font-size: 0.72rem; color: #475569; }
    .form-group input, .form-group select, .form-group textarea {
      padding: 0.55rem 0.8rem; border: 1px solid #e2e8f0; border-radius: 10px;
      font-family: 'Inter', sans-serif; font-size: 0.82rem; background: #f8fafc; outline: none; transition: all 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--orange); box-shadow: 0 0 0 3px rgba(249,115,22,0.08); background: white;
    }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 10px; font-weight: 600; font-size: 0.78rem; cursor: pointer;
      border: none; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--orange); color: white; flex: 1; justify-content: center; }
    .btn-primary:hover { background: var(--orange-dark); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }

    /* Detail modal */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .detail-item {
      background: #f8fafc; border-radius: 10px; padding: 0.8rem; border: 1px solid #f1f5f9;
    }
    .detail-item.full { grid-column: span 2; }
    .detail-item strong { display: block; font-size: 0.62rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.3rem; }
    .detail-item span { font-size: 0.85rem; font-weight: 600; color: #0f172a; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 4000;
      padding: 0.7rem 1.4rem; border-radius: 12px; font-size: 0.78rem; font-weight: 600;
      box-shadow: var(--shadow-lg); animation: slideUp 0.3s ease; white-space: nowrap;
    }
    .toast.success { background: #065f46; color: white; }
    .toast.error { background: #991b1b; color: white; }
    @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    @media (max-width: 768px) {
      .container { padding: 1rem; }
      .clubs-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .form-row, .detail-grid { grid-template-columns: 1fr; }
      .form-group.full, .detail-item.full { grid-column: span 1; }
      .navbar { padding: 0.5rem 1rem; }
    }
  </style>
</head>
<body>
  <!-- Add/Edit Club Modal -->
  <div class="modal-overlay" id="clubModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle"><i class="fas fa-plus-circle" style="color:#f97316;"></i> Add Club</h2>
        <button class="modal-close" onclick="closeClubModal()"><i class="fas fa-times"></i></button>
      </div>
      <form id="clubForm">
        <input type="hidden" id="editClubId">
        <div class="form-row">
          <div class="form-group full"><label>Club Name *</label><input type="text" id="clubName" placeholder="e.g. WorkFit Westlands" required></div>
          <div class="form-group"><label>City/Town *</label><input type="text" id="clubCity" placeholder="e.g. Nairobi" required></div>
          <div class="form-group"><label>County/Region</label><input type="text" id="clubCounty" placeholder="e.g. Nairobi County"></div>
          <div class="form-group full"><label>Full Address</label><input type="text" id="clubAddress" placeholder="Street, building, floor"></div>
          <div class="form-group"><label>Phone</label><input type="tel" id="clubPhone" placeholder="+254 7XX XXX XXX"></div>
          <div class="form-group"><label>Email</label><input type="email" id="clubEmail" placeholder="club@workfit.co.ke"></div>
          <div class="form-group"><label>Established Year</label><input type="text" id="clubEstablished" placeholder="e.g. 2024"></div>
          <div class="form-group"><label>Capacity</label><input type="number" id="clubCapacity" placeholder="e.g. 200" min="1"></div>
          <div class="form-group"><label>Tier *</label>
            <select id="clubTier" required><option value="basic">Basic</option><option value="standard">Standard</option><option value="premium">Premium</option></select>
          </div>
          <div class="form-group"><label>Status</label>
            <select id="clubStatus"><option value="active">Active</option><option value="inactive">Inactive</option><option value="pending">Pending</option></select>
          </div>
          <div class="form-group full"><label>Description</label><textarea id="clubDescription" rows="2" placeholder="Brief description of the club..."></textarea></div>
        </div>
        <div class="btn-row">
          <button type="button" class="btn btn-secondary" onclick="closeClubModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitBtn"><i class="fas fa-save"></i> Save Club</button>
        </div>
      </form>
    </div>
  </div>

  <!-- View Club Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal wide">
      <div class="modal-header">
        <h2 id="detailTitle"><i class="fas fa-building" style="color:#f97316;"></i> Club Details</h2>
        <button class="modal-close" onclick="closeDetailModal()"><i class="fas fa-times"></i></button>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <nav class="navbar">
    <a class="logo" href="/workspaces/workfit/dashboard.html">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Logo" class="logo-img">
      <span class="logo-text">WorkFit Club</span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/workfit/dashboard.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <button class="nav-btn primary" onclick="openAddClubModal()"><i class="fas fa-plus"></i> Add Club</button>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <div>
        <h1><i class="fas fa-building" style="color:#f97316;"></i> Club Manager</h1>
        <p>Manage all WorkFit gym franchises</p>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-info"><h4>Total Clubs</h4><div class="num" id="statTotal">0</div></div><div class="stat-icon orange"><i class="fas fa-building"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h4>Active</h4><div class="num" id="statActive">0</div></div><div class="stat-icon green"><i class="fas fa-check-circle"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h4>Premium</h4><div class="num" id="statPremium">0</div></div><div class="stat-icon purple"><i class="fas fa-gem"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h4>Total Capacity</h4><div class="num" id="statCapacity">0</div></div><div class="stat-icon blue"><i class="fas fa-users"></i></div></div>
    </div>

    <div class="filter-bar">
      <i class="fas fa-search" style="color:#94a3b8;"></i>
      <input type="text" id="searchInput" placeholder="Search by name, location or tier...">
      <select id="statusFilter"><option value="all">All Status</option><option value="active">Active</option><option value="inactive">Inactive</option><option value="pending">Pending</option></select>
      <select id="tierFilter"><option value="all">All Tiers</option><option value="basic">Basic</option><option value="standard">Standard</option><option value="premium">Premium</option></select>
    </div>

    <div id="clubsContainer" class="clubs-grid"></div>
  </div>
  <div class="footer"><i class="far fa-copyright"></i> 2026 WorkFit Club · Franchise Management</div>
  <div id="toast" class="toast" style="display:none;"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc"
    });
    const auth = firebase.auth();
    const db = firebase.database();

    let allClubs = {};
    let allTrainers = {};
    let allMembers = {};
    let isEditing = false;

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    
    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast ' + (isError ? 'error' : 'success');
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    function getClubIcon(tier) {
      const t = (tier || 'standard').toLowerCase();
      if (t === 'premium') return '💎';
      if (t === 'basic') return '🏋️';
      return '⭐';
    }

    function getClubIconClass(tier) {
      const t = (tier || 'standard').toLowerCase();
      return t === 'premium' ? 'premium' : t === 'standard' ? 'standard' : 'basic';
    }

    function renderClubs() {
      const searchTerm = (document.getElementById('searchInput').value || '').toLowerCase();
      const statusVal = document.getElementById('statusFilter').value;
      const tierVal = document.getElementById('tierFilter').value;

      let clubs = Object.entries(allClubs).map(([id, data]) => ({ id, ...data })).filter(c => c && (c.businessName || c.name));
      
      if (statusVal !== 'all') clubs = clubs.filter(c => (c.status || 'active').toLowerCase() === statusVal);
      if (tierVal !== 'all') clubs = clubs.filter(c => (c.tier || 'standard').toLowerCase() === tierVal);
      if (searchTerm) {
        clubs = clubs.filter(c =>
          (c.businessName || c.name || '').toLowerCase().includes(searchTerm) ||
          (c.city || c.location || c.county || '').toLowerCase().includes(searchTerm) ||
          (c.tier || '').toLowerCase().includes(searchTerm)
        );
      }

      // Stats
      const all = Object.values(allClubs).filter(c => c && (c.businessName || c.name));
      document.getElementById('statTotal').textContent = all.length;
      document.getElementById('statActive').textContent = all.filter(c => c.status === 'active').length;
      document.getElementById('statPremium').textContent = all.filter(c => c.tier === 'premium').length;
      document.getElementById('statCapacity').textContent = all.reduce((sum, c) => sum + (Number(c.capacity) || 0), 0).toLocaleString();

      const container = document.getElementById('clubsContainer');
      
      if (!clubs.length) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-building"></i><p>No clubs found</p><button class="btn btn-primary" style="margin-top:1rem;" onclick="openAddClubModal()"><i class="fas fa-plus"></i> Add First Club</button></div>`;
        return;
      }

      container.innerHTML = clubs.map(c => {
        const name = esc(c.businessName || c.name || 'Unnamed Club');
        const location = esc(c.city || c.location || c.county || 'Location N/A');
        const tier = (c.tier || 'standard').toLowerCase();
        const status = (c.status || 'active').toLowerCase();
        const address = esc(c.address || '');
        const phone = esc(c.phone || '');
        const email = esc(c.email || '');
        const established = c.established || '';
        const capacity = c.capacity || 0;
        const members = c.members || c.totalMembers || 0;
        const trainers = c.trainers || c.totalTrainers || 0;
        const revenue = c.revenue || c.monthlyRevenue || 0;

        return `
          <div class="club-card">
            <div class="club-card-top">
              <div class="club-icon ${getClubIconClass(tier)}">${getClubIcon(tier)}</div>
              <div class="club-info">
                <div class="club-name">${name}</div>
                <div class="club-location"><i class="fas fa-map-pin"></i> ${location}</div>
              </div>
            </div>
            <div class="club-badges">
              <span class="badge ${tier}">${tier}</span>
              <span class="badge ${status}">${status}</span>
              ${established ? `<span class="badge" style="background:#f1f5f9;color:#475569;">Est. ${established}</span>` : ''}
            </div>
            <div class="club-details">
              ${address ? `<span><i class="fas fa-location-dot"></i> ${address}</span>` : ''}
              ${phone ? `<span><i class="fas fa-phone"></i> ${phone}</span>` : ''}
              ${email ? `<span><i class="fas fa-envelope"></i> ${email}</span>` : ''}
            </div>
            <div class="club-stats">
              <div class="club-stat"><strong>${members}</strong><small>Members</small></div>
              <div class="club-stat"><strong>${trainers}</strong><small>Trainers</small></div>
              <div class="club-stat"><strong>${capacity}</strong><small>Capacity</small></div>
              <div class="club-stat"><strong>${Number(revenue).toLocaleString()}</strong><small>Revenue</small></div>
            </div>
            <div class="club-actions">
              <button class="primary-action" onclick="viewClubDetail('${c.id}')"><i class="fas fa-eye"></i> View</button>
              <button onclick="openEditClubModal('${c.id}')"><i class="fas fa-pen"></i> Edit</button>
              <button onclick="if(confirm('Delete ${name}?')) deleteClub('${c.id}')"><i class="fas fa-trash"></i> Delete</button>
            </div>
          </div>`;
      }).join('');
    }

    // View Club Detail
    window.viewClubDetail = function(clubId) {
      const c = allClubs[clubId];
      if (!c) return;
      
      const name = esc(c.businessName || c.name || 'Unnamed Club');
      document.getElementById('detailTitle').innerHTML = `<i class="fas fa-building" style="color:#f97316;"></i> ${name}`;
      
      document.getElementById('detailContent').innerHTML = `
        <div class="detail-grid">
          <div class="detail-item"><strong>Location</strong><span>${esc(c.city || c.location || '—')}, ${esc(c.county || '—')}</span></div>
          <div class="detail-item"><strong>Address</strong><span>${esc(c.address || '—')}</span></div>
          <div class="detail-item"><strong>Tier</strong><span class="badge ${(c.tier||'standard').toLowerCase()}">${(c.tier||'standard').toUpperCase()}</span></div>
          <div class="detail-item"><strong>Status</strong><span class="badge ${(c.status||'active').toLowerCase()}">${c.status||'active'}</span></div>
          <div class="detail-item"><strong>Phone</strong><span>${esc(c.phone || '—')}</span></div>
          <div class="detail-item"><strong>Email</strong><span>${esc(c.email || '—')}</span></div>
          <div class="detail-item"><strong>Established</strong><span>${c.established || '—'}</span></div>
          <div class="detail-item"><strong>Capacity</strong><span>${c.capacity || '—'}</span></div>
          <div class="detail-item"><strong>Members</strong><span>${c.members || c.totalMembers || 0}</span></div>
          <div class="detail-item"><strong>Trainers</strong><span>${c.trainers || c.totalTrainers || 0}</span></div>
          <div class="detail-item"><strong>Revenue (KES)</strong><span>${Number(c.revenue || c.monthlyRevenue || 0).toLocaleString()}</span></div>
          <div class="detail-item"><strong>Created</strong><span>${c.createdAt ? new Date(c.createdAt).toLocaleDateString() : '—'}</span></div>
          <div class="detail-item full"><strong>Description</strong><span>${esc(c.description || 'No description')}</span></div>
        </div>
        <div class="btn-row" style="margin-top:1rem;">
          <button class="btn btn-primary" onclick="closeDetailModal(); openEditClubModal('${clubId}')"><i class="fas fa-pen"></i> Edit Club</button>
          <button class="btn btn-secondary" onclick="closeDetailModal()">Close</button>
        </div>
      `;
      document.getElementById('detailModal').classList.add('active');
    };

    window.closeDetailModal = function() {
      document.getElementById('detailModal').classList.remove('active');
    };

    document.getElementById('detailModal').addEventListener('click', function(e) {
      if (e.target === this) window.closeDetailModal();
    });

    // Add Club Modal
    window.openAddClubModal = function() {
      isEditing = false;
      document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus-circle" style="color:#f97316;"></i> Add Club';
      document.getElementById('editClubId').value = '';
      document.getElementById('clubForm').reset();
      document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> Save Club';
      document.getElementById('clubModal').classList.add('active');
    };

    window.openEditClubModal = function(clubId) {
      const c = allClubs[clubId];
      if (!c) return;
      isEditing = true;
      document.getElementById('modalTitle').innerHTML = '<i class="fas fa-pen" style="color:#f97316;"></i> Edit Club';
      document.getElementById('editClubId').value = clubId;
      document.getElementById('clubName').value = c.businessName || c.name || '';
      document.getElementById('clubCity').value = c.city || c.location || '';
      document.getElementById('clubCounty').value = c.county || '';
      document.getElementById('clubAddress').value = c.address || '';
      document.getElementById('clubPhone').value = c.phone || '';
      document.getElementById('clubEmail').value = c.email || '';
      document.getElementById('clubEstablished').value = c.established || '';
      document.getElementById('clubCapacity').value = c.capacity || '';
      document.getElementById('clubTier').value = c.tier || 'standard';
      document.getElementById('clubStatus').value = c.status || 'active';
      document.getElementById('clubDescription').value = c.description || '';
      document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> Update Club';
      document.getElementById('clubModal').classList.add('active');
    };

    window.closeClubModal = function() {
      document.getElementById('clubModal').classList.remove('active');
    };

    document.getElementById('clubModal').addEventListener('click', function(e) {
      if (e.target === this) window.closeClubModal();
    });

    // Form submit
    document.getElementById('clubForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = document.getElementById('clubName').value.trim();
      const city = document.getElementById('clubCity').value.trim();
      if (!name || !city) { showToast('Club name and city are required', true); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

      const clubData = {
        businessName: name, name,
        city, location: city,
        county: document.getElementById('clubCounty').value.trim(),
        address: document.getElementById('clubAddress').value.trim(),
        phone: document.getElementById('clubPhone').value.trim(),
        email: document.getElementById('clubEmail').value.trim(),
        established: document.getElementById('clubEstablished').value.trim(),
        capacity: Number(document.getElementById('clubCapacity').value) || 0,
        tier: document.getElementById('clubTier').value,
        status: document.getElementById('clubStatus').value,
        description: document.getElementById('clubDescription').value.trim(),
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      };

      try {
        const editId = document.getElementById('editClubId').value;
        if (editId) {
          await db.ref('workfit_clubs/' + editId).update(clubData);
          showToast('Club updated!');
        } else {
          clubData.members = 0;
          clubData.totalMembers = 0;
          clubData.trainers = 0;
          clubData.totalTrainers = 0;
          clubData.revenue = 0;
          clubData.monthlyRevenue = 0;
          clubData.createdAt = firebase.database.ServerValue.TIMESTAMP;
          clubData.registeredAt = Date.now();
          await db.ref('workfit_clubs').push(clubData);
          showToast('Club added!');
        }
        window.closeClubModal();
      } catch (err) {
        console.error(err);
        showToast('Error saving club', true);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> ' + (isEditing ? 'Update' : 'Save') + ' Club';
      }
    });

    window.deleteClub = async function(id) {
      try {
        await db.ref('workfit_clubs/' + id).remove();
        showToast('Club deleted');
      } catch(e) { showToast('Error deleting', true); }
    };

    // Filters
    document.getElementById('searchInput').addEventListener('input', renderClubs);
    document.getElementById('statusFilter').addEventListener('change', renderClubs);
    document.getElementById('tierFilter').addEventListener('change', renderClubs);

    // Auth + Data
    auth.onAuthStateChanged(user => {
      if (!user) { window.location.href = '/'; return; }

      db.ref('workfit_clubs').on('value', snap => {
        allClubs = snap.val() || {};
        renderClubs();
      });

      db.ref('workfit_trainers').on('value', snap => {
        allTrainers = snap.val() || {};
      });

      db.ref('workfit_members').on('value', snap => {
        allMembers = snap.val() || {};
      });
    });
  </script>
</body>
</html>
