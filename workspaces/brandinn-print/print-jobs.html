<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Print Orders | KazInni Workspaces</title>
  
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #7c3aed;
      --primary-dark: #5b21b6;
      --primary-light: #a78bfa;
      --gold: #f59e0b;
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #ede9fe;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #f8f6fc 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.7rem 3%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(124, 58, 237, 0.15);
      position: sticky;
      top: 0;
      z-index: 2000;
      flex-wrap: wrap;
      gap: 10px;
    }

    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-img { 
      height: 40px; width: 40px; border-radius: 12px; object-fit: contain; 
      background: white; box-shadow: 0 6px 16px rgba(124, 58, 237, 0.2); 
    }

    .logo-text {
      font-weight: 800; font-size: 1.3rem;
      background: linear-gradient(145deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.3px;
    }
    .logo-text span { 
      font-weight: 600; font-size: 0.8rem; 
      background: linear-gradient(145deg, #f59e0b, #d97706);
      -webkit-text-fill-color: transparent;
      margin-left: 4px; 
    }

    .nav-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .nav-btn {
      background: rgba(124, 58, 237, 0.08); 
      border: 1px solid rgba(124, 58, 237, 0.2); 
      padding: 0.5rem 1rem;
      border-radius: 40px; color: var(--primary-dark); font-weight: 600; font-size: 0.75rem;
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
      text-decoration: none; transition: all 0.2s; white-space: nowrap;
    }
    .nav-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

    .user-badge {
      display: flex; align-items: center; gap: 8px; 
      padding: 0.3rem 0.9rem 0.3rem 0.6rem; border-radius: 40px; font-size: 0.75rem;
      color: var(--text-muted); border: 1px solid #ede9fe; background: #f8f6fc;
    }
    .user-avatar {
      width: 32px; height: 32px; background: linear-gradient(145deg, #7c3aed, #a78bfa);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem; color: white;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 3%; flex: 1; width: 100%; }

    .page-header {
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
      gap: 16px; margin-bottom: 1.5rem;
    }
    .page-header h1 { font-size: 1.8rem; font-weight: 800; color: #0f172a; display: flex; align-items: center; gap: 12px; }
    .page-header h1 i { 
      color: var(--primary); background: white; padding: 10px; border-radius: 14px; 
      box-shadow: 0 8px 16px rgba(124, 58, 237, 0.08); 
    }

    .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }

    .filter-btn {
      padding: 0.5rem 1.2rem; border-radius: 40px; border: 1.5px solid #e2e8f0;
      background: white; color: #64748b; font-weight: 600; font-size: 0.75rem;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .filter-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

    .search-box { flex: 1; min-width: 200px; max-width: 400px; position: relative; }
    .search-box input {
      width: 100%; padding: 0.5rem 1rem 0.5rem 2.5rem; border-radius: 40px;
      border: 1.5px solid #e2e8f0; background: white; font-size: 0.8rem; font-family: 'Inter', sans-serif;
    }
    .search-box input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(124,58,237,0.06); }
    .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.85rem; }

    .orders-table-wrap {
      background: white; border-radius: 20px; border: 1px solid #ede9fe;
      overflow: hidden; box-shadow: 0 4px 16px rgba(124, 58, 237, 0.04);
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    thead { background: #f8f6fc; }
    th {
      padding: 0.8rem 1rem; text-align: left; font-weight: 700; color: var(--primary-dark);
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
    }
    td { padding: 0.8rem 1rem; border-bottom: 1px solid #f1f5f9; color: #1e293b; vertical-align: middle; }
    tr:hover td { background: #f8f6fc; }

    .status-badge {
      display: inline-block; padding: 0.25rem 0.7rem; border-radius: 20px;
      font-size: 0.65rem; font-weight: 700; text-transform: capitalize; white-space: nowrap;
    }
    .status-new { background: #dbeafe; color: #1e40af; }
    .status-pending { background: #fef3c7; color: #b45309; }
    .status-printing { background: #ede9fe; color: #5b21b6; }
    .status-completed { background: #d1fae5; color: #065f46; }
    .status-delivered { background: #d1fae5; color: #065f46; }
    .status-cancelled { background: #fee2e2; color: #991b1b; }

    .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .action-btn {
      padding: 0.3rem 0.6rem; border-radius: 8px; border: none; font-size: 0.65rem;
      font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
      transition: all 0.2s; white-space: nowrap;
    }
    .btn-accept { background: #ede9fe; color: #5b21b6; }
    .btn-accept:hover { background: #7c3aed; color: white; }
    .btn-print { background: #fef3cd; color: #b45309; }
    .btn-print:hover { background: #f59e0b; color: white; }
    .btn-complete { background: #d1fae5; color: #065f46; }
    .btn-complete:hover { background: #10b981; color: white; }
    .btn-cancel-btn { background: #fee2e2; color: #991b1b; }
    .btn-cancel-btn:hover { background: #ef4444; color: white; }
    .btn-view { background: #f1f5f9; color: #475569; }
    .btn-view:hover { background: #475569; color: white; }

    .empty-row td { text-align: center; padding: 3rem; color: #94a3b8; }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; 
      align-items: center; backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 24px; padding: 2rem; max-width: 600px; width: 95%;
      max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 1.2rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; color: #1e293b; }
    .modal h3 i { color: var(--primary); }
    .modal .form-group { margin-bottom: 1rem; }
    .modal label {
      display: block; font-weight: 600; font-size: 0.75rem; color: #475569;
      margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .modal input, .modal select, .modal textarea {
      width: 100%; padding: 0.6rem 0.8rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.85rem; font-family: 'Inter', sans-serif;
    }
    .modal input:focus, .modal select:focus, .modal textarea:focus {
      border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(124,58,237,0.06);
    }
    .modal textarea { resize: vertical; min-height: 80px; }
    .modal .btn-row { display: flex; gap: 10px; margin-top: 1.5rem; }
    .btn {
      padding: 0.7rem 1.5rem; border-radius: 12px; border: none; font-weight: 600;
      font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 0.8rem; }
    .detail-item { background: #f8fafc; padding: 0.8rem; border-radius: 10px; }
    .detail-item strong { display: block; font-size: 0.65rem; color: var(--primary); text-transform: uppercase; margin-bottom: 0.2rem; }

    .toast {
      position: fixed; bottom: 30px; right: 30px; background: #10b981; color: white;
      padding: 0.9rem 1.5rem; border-radius: 30px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      display: flex; align-items: center; gap: 8px; font-size: 0.85rem;
    }
    .toast.error { background: #ef4444; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.8); backdrop-filter: blur(4px);
      display: flex; justify-content: center; align-items: center; z-index: 999;
    }
    .loading-overlay.hide { display: none; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #ede9fe;
      border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .debug-info {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 1rem; margin-bottom: 1rem; font-size: 0.75rem; display: none;
    }
    .debug-info.show { display: block; }

    @media (max-width: 768px) {
      .container { padding: 1rem; }
      .filter-bar { gap: 6px; }
      .filter-btn { padding: 0.4rem 0.8rem; font-size: 0.7rem; }
      table { font-size: 0.7rem; }
      th, td { padding: 0.5rem 0.6rem; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <nav class="navbar">
    <div class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="KazInni Logo" class="logo-img">
      <span class="logo-text">KazInni <span>Print Shop</span></span>
    </div>
    <div class="nav-right">
      <a href="/workspaces/brandinn-print/index.html" class="nav-btn">
        <i class="fas fa-arrow-left"></i> Dashboard
      </a>
      <div class="user-badge">
        <div class="user-avatar" id="repAvatar">BP</div>
        <span id="repName">Shop Manager</span>
      </div>
      <button class="nav-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-clipboard-list"></i> Print Orders</h1>
      <a href="/workspaces/brandinn-print/new-order.html" class="nav-btn" style="text-decoration:none;">
        <i class="fas fa-plus"></i> New Order
      </a>
    </div>

    <div class="debug-info" id="debugInfo">
      <strong>🔍 Debug:</strong> <span id="debugText"></span>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All Orders</button>
      <button class="filter-btn" data-filter="new">New</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="printing">Printing</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn" data-filter="delivered">Delivered</button>
      <button class="filter-btn" data-filter="cancelled">Cancelled</button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search customer, product, phone...">
      </div>
    </div>

    <div class="orders-table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Product</th>
              <th>Details</th>
              <th>Qty</th>
              <th>Total</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="ordersTableBody">
            <tr class="empty-row"><td colspan="8"><i class="fas fa-sync-alt fa-spin"></i> Loading orders...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="actionModal">
    <div class="modal" id="modalContent"></div>
  </div>

  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allOrders = {};
    let currentFilter = 'all';
    let searchQuery = '';

    const loadingOverlay = document.getElementById('loadingOverlay');
    const tableBody = document.getElementById('ordersTableBody');
    const modal = document.getElementById('actionModal');
    const modalContent = document.getElementById('modalContent');
    const searchInput = document.getElementById('searchInput');
    const toastContainer = document.getElementById('toastContainer');
    const debugInfo = document.getElementById('debugInfo');
    const debugText = document.getElementById('debugText');

    function showDebug(msg) {
      debugText.textContent = msg;
      debugInfo.classList.add('show');
      console.log('🔍', msg);
    }

    function showToast(msg, isError = false) {
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    function getInitials(name) {
      if (!name) return '??';
      return String(name).split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
    }

    function getStatusClass(status) {
      const map = {
        'new': 'status-new', 'pending': 'status-pending', 'printing': 'status-printing',
        'completed': 'status-completed', 'delivered': 'status-delivered', 'cancelled': 'status-cancelled'
      };
      return map[status] || 'status-new';
    }

    function getProductIcon(type) {
      const icons = { tshirt: '👕', banner: '🪧', sticker: '🏷️', apron: '🧥', dustcoat: '🥼' };
      return icons[type] || '📦';
    }

    function getOrderDetails(order) {
      const parts = [];
      if (order.fabricColor) parts.push(order.fabricColor);
      if (order.position) parts.push(order.position === 'breast' ? 'Left Breast' : 'Center');
      if (order.size) parts.push('Size: ' + order.size);
      if (order.font) parts.push(order.font);
      if (order.textColor) parts.push(order.textColor);
      return parts.join(' · ') || '—';
    }

    function renderTable() {
      let orders = Object.entries(allOrders)
        .map(([id, data]) => ({ id, ...data }));

      showDebug(`Total raw: ${orders.length} | Filter: "${currentFilter}"`);

      if (currentFilter !== 'all') {
        orders = orders.filter(o => (o.status || 'new') === currentFilter);
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        orders = orders.filter(o => {
          const customer = (o.customerName || o.customer?.name || '').toLowerCase();
          const product = (o.product || o.type || '').toLowerCase();
          const phone = (o.customerPhone || o.customer?.phone || '').toLowerCase();
          return customer.includes(q) || product.includes(q) || phone.includes(q);
        });
      }

      orders.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      showDebug(`After filter: ${orders.length} orders`);

      if (!orders.length) {
        tableBody.innerHTML = `<tr class="empty-row"><td colspan="8">
          <i class="fas fa-box-open" style="font-size:2rem;display:block;margin-bottom:8px;"></i>
          <p>No orders found</p>
          <p style="font-size:0.7rem;color:#94a3b8;">${currentFilter !== 'all' ? 'Try changing the filter' : 'Create a new order to get started'}</p>
        </td></tr>`;
        return;
      }

      tableBody.innerHTML = orders.map(order => {
        const status = order.status || 'new';
        const customer = order.customerName || 'Walk-in Customer';
        const product = order.product || order.type || 'Print Order';
        const productIcon = getProductIcon(order.type);
        const details = getOrderDetails(order);
        const qty = order.quantity || 1;
        const total = order.total || 0;
        const phone = order.customerPhone || order.customer?.phone || '';
        const shortId = String(order.id).substring(Math.max(0, order.id.length - 6));

        return `
          <tr>
            <td><code style="font-size:0.7rem;background:#f8f6fc;padding:2px 6px;border-radius:4px;">#${shortId}</code></td>
            <td>
              <div style="display:flex;align-items:center;gap:8px;">
                <div style="width:28px;height:28px;background:#ede9fe;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.65rem;color:#5b21b6;">${getInitials(customer)}</div>
                <div>
                  <strong>${escapeHtml(customer)}</strong>
                  ${phone ? `<div style="font-size:0.65rem;color:#94a3b8;">${escapeHtml(phone)}</div>` : ''}
                </div>
              </div>
            </td>
            <td>${productIcon} ${escapeHtml(product)}</td>
            <td><span style="font-size:0.7rem;">${escapeHtml(details)}</span></td>
            <td><strong>${qty}</strong></td>
            <td><strong>KES ${total.toLocaleString()}</strong></td>
            <td><span class="status-badge ${getStatusClass(status)}">${status}</span></td>
            <td>
              <div class="action-btns">
                <button class="action-btn btn-view" onclick="viewDetails('${order.id}')" title="View"><i class="fas fa-eye"></i></button>
                ${status === 'new' ? `<button class="action-btn btn-accept" onclick="updateStatus('${order.id}', 'pending')" title="Accept"><i class="fas fa-check"></i></button>` : ''}
                ${status === 'pending' ? `<button class="action-btn btn-print" onclick="updateStatus('${order.id}', 'printing')" title="Start Print"><i class="fas fa-print"></i></button>` : ''}
                ${status === 'printing' ? `<button class="action-btn btn-complete" onclick="updateStatus('${order.id}', 'completed')" title="Complete"><i class="fas fa-check-double"></i></button>` : ''}
                ${status === 'completed' ? `<button class="action-btn btn-complete" onclick="updateStatus('${order.id}', 'delivered')" title="Deliver"><i class="fas fa-truck"></i></button>` : ''}
                ${['new', 'pending'].includes(status) ? `<button class="action-btn btn-cancel-btn" onclick="updateStatus('${order.id}', 'cancelled')" title="Cancel"><i class="fas fa-times"></i></button>` : ''}
              </div>
            </td>
          </tr>`;
      }).join('');
    }

    async function updateStatus(orderId, newStatus) {
      if (!confirm(`Update order #${String(orderId).substring(Math.max(0, orderId.length - 6))} to "${newStatus}"?`)) return;
      try {
        const updates = { status: newStatus, updatedAt: firebase.database.ServerValue.TIMESTAMP };
        if (newStatus === 'completed') updates.completedAt = firebase.database.ServerValue.TIMESTAMP;
        if (newStatus === 'delivered') updates.deliveredAt = firebase.database.ServerValue.TIMESTAMP;
        if (newStatus === 'cancelled') updates.cancelledAt = firebase.database.ServerValue.TIMESTAMP;
        if (newStatus === 'printing') updates.startedAt = firebase.database.ServerValue.TIMESTAMP;
        await database.ref(`brandinn_print_orders/${orderId}`).update(updates);
        showToast(`✅ Order marked as ${newStatus}`);
      } catch (e) {
        console.error('Update error:', e);
        showToast('Failed to update order', true);
      }
    }

    function viewDetails(orderId) {
      const order = allOrders[orderId];
      if (!order) return;

      const status = order.status || 'new';
      const customer = order.customerName || 'Walk-in Customer';
      const product = order.product || order.type || 'Print Order';
      const total = order.total || 0;
      const qty = order.quantity || 1;

      modalContent.innerHTML = `
        <h3><i class="fas fa-info-circle"></i> Order Details <code style="font-size:0.7rem;background:#ede9fe;padding:2px 8px;border-radius:4px;">#${String(orderId).substring(Math.max(0, orderId.length - 6))}</code></h3>
        <div class="detail-grid">
          <div class="detail-item"><strong>Customer</strong>${escapeHtml(customer)}</div>
          <div class="detail-item"><strong>Phone</strong>${escapeHtml(order.customerPhone || order.customer?.phone || 'N/A')}</div>
          <div class="detail-item"><strong>Email</strong>${escapeHtml(order.customerEmail || order.customer?.email || 'N/A')}</div>
          <div class="detail-item"><strong>Status</strong><span class="status-badge ${getStatusClass(status)}">${status}</span></div>
          <div class="detail-item"><strong>Product</strong>${getProductIcon(order.type)} ${escapeHtml(product)}</div>
          <div class="detail-item"><strong>Quantity</strong>${qty}</div>
          <div class="detail-item"><strong>Unit Price</strong>KES ${((total/qty) || 0).toLocaleString()}</div>
          <div class="detail-item"><strong>Total</strong>KES ${total.toLocaleString()}</div>
          ${order.fabricColor ? `<div class="detail-item"><strong>Fabric Color</strong>${escapeHtml(order.fabricColor)}</div>` : ''}
          ${order.position ? `<div class="detail-item"><strong>Position</strong>${order.position === 'breast' ? 'Left Breast' : 'Center Chest'}</div>` : ''}
          ${order.size ? `<div class="detail-item"><strong>Size</strong>${escapeHtml(order.size)}</div>` : ''}
          ${order.font ? `<div class="detail-item"><strong>Font</strong>${escapeHtml(order.font)}</div>` : ''}
          ${order.textColor ? `<div class="detail-item"><strong>Text Color</strong>${escapeHtml(order.textColor)}</div>` : ''}
          ${order.designText ? `<div class="detail-item"><strong>Design Text</strong>${escapeHtml(order.designText)}</div>` : ''}
          ${order.notes ? `<div class="detail-item" style="grid-column:1/-1;"><strong>Notes</strong>${escapeHtml(order.notes)}</div>` : ''}
          <div class="detail-item"><strong>Created</strong>${order.createdAt ? new Date(order.createdAt).toLocaleString() : 'N/A'}</div>
          ${order.completedAt ? `<div class="detail-item"><strong>Completed</strong>${new Date(order.completedAt).toLocaleString()}</div>` : ''}
          ${order.deliveredAt ? `<div class="detail-item"><strong>Delivered</strong>${new Date(order.deliveredAt).toLocaleString()}</div>` : ''}
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="closeModal()">Close</button>
        </div>
      `;
      modal.classList.add('show');
    }

    function closeModal() { modal.classList.remove('show'); }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTable();
      });
    });

    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value;
      renderTable();
    });

    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    function setupRealtimeListener() {
      database.ref('brandinn_print_orders').on('value', (snapshot) => {
        allOrders = snapshot.val() || {};
        console.log('📦 Print orders loaded:', Object.keys(allOrders).length);
        if (Object.keys(allOrders).length > 0) {
          console.log('📦 Sample:', Object.entries(allOrders)[0]);
        }
        renderTable();
        loadingOverlay.classList.add('hide');
      }, (error) => {
        console.error('❌ Error:', error);
        showDebug('Error: ' + error.message);
        loadingOverlay.classList.add('hide');
      });
    }

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        let userName = 'Shop Manager';
        try {
          const snap = await database.ref(`brandinn_users/${user.uid}`).once('value');
          if (snap.exists()) {
            userName = snap.val().name || user.email?.split('@')[0] || 'Shop Manager';
          } else {
            userName = user.displayName || user.email?.split('@')[0] || 'Shop Manager';
          }
        } catch (e) {
          userName = user.email?.split('@')[0] || 'Shop Manager';
        }
        document.getElementById('repName').textContent = userName;
        document.getElementById('repAvatar').textContent = getInitials(userName);
        setupRealtimeListener();
      } else {
        window.location.href = 'https://kazinni.vercel.app';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if (confirm('Log out of KazInni Workspaces?')) await auth.signOut();
    });

    setTimeout(() => loadingOverlay.classList.add('hide'), 8000);
  </script>
</body>
</html>
