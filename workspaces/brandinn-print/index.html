<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Print Shop Manager | KazInni Workspaces</title>
  
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #fffbeb 0%, #fefce8 50%, #ffffff 100%);
      color: #1a1a2e;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .loading-skeleton {
      background: linear-gradient(90deg, #fef3c7 25%, #fde68a 50%, #fef3c7 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Navigation */
    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      padding: 0.8rem 4%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid rgba(245, 158, 11, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-img {
      height: 40px;
      width: 40px;
      border-radius: 12px;
      object-fit: contain;
      background: white;
      box-shadow: 0 6px 15px rgba(124, 58, 237, 0.15);
    }

    .logo-text {
      font-weight: 800;
      font-size: 1.3rem;
      background: linear-gradient(145deg, #7c3aed, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      font-weight: 600;
      font-size: 0.8rem;
      background: #f59e0b;
      -webkit-text-fill-color: #f59e0b;
      margin-left: 4px;
      letter-spacing: 0;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .shop-selector {
      background: #fef3c7;
      border: 1.5px solid #fcd34d;
      padding: 0.4rem 1rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.8rem;
      color: #92400e;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-family: inherit;
    }

    .shop-selector select {
      border: none;
      background: transparent;
      font-weight: 700;
      color: #92400e;
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .rep-profile {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f1f5f9;
      padding: 0.25rem 0.8rem 0.25rem 0.6rem;
      border-radius: 50px;
    }

    .rep-avatar {
      width: 38px;
      height: 38px;
      background: linear-gradient(145deg, #7c3aed, #c084fc);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .rep-info { line-height: 1.2; }
    .rep-name { font-weight: 700; color: #0f172a; font-size: 0.85rem; }
    .rep-role { font-size: 0.65rem; color: #7c3aed; font-weight: 700; text-transform: uppercase; }

    .logout-btn {
      background: white;
      border: 1.5px solid #e2e8f0;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      color: #475569;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: inherit;
    }
    .logout-btn:hover { background: #fee2e2; border-color: #ef4444; color: #ef4444; }

    /* Navigation tabs */
    .nav-tabs {
      display: flex;
      gap: 0.3rem;
      background: #f1f5f9;
      padding: 0.3rem;
      border-radius: 40px;
    }
    .nav-tab {
      padding: 0.4rem 1rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.75rem;
      border: none;
      cursor: pointer;
      background: transparent;
      color: #64748b;
      font-family: inherit;
      transition: all 0.2s;
      white-space: nowrap;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .nav-tab.active {
      background: white;
      color: #7c3aed;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .nav-tab:hover:not(.active) { color: #7c3aed; }

    /* Container */
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem 4%;
      flex: 1;
      width: 100%;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .page-header h1 i {
      color: #7c3aed;
      background: white;
      padding: 10px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.08);
    }

    .page-header p {
      color: #475569;
      font-size: 0.9rem;
      margin-top: 0.3rem;
      margin-left: 58px;
    }

    .live-badge {
      font-size: 0.65rem;
      color: #10b981;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: 8px;
    }
    .live-badge i { font-size: 0.45rem; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      border-radius: 20px;
      padding: 1.2rem 1.4rem;
      border: 1px solid #f1eaff;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.03);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stat-left h4 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
      margin-bottom: 0.3rem;
    }

    .stat-number {
      font-size: 2.2rem;
      font-weight: 800;
      color: #0f172a;
      line-height: 1.1;
    }

    .stat-trend {
      font-size: 0.7rem;
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .trend-up { color: #10b981; }
    .trend-warn { color: #f59e0b; }
    .trend-neutral { color: #7c3aed; }

    .stat-icon {
      width: 50px;
      height: 50px;
      background: #f5f0ff;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7c3aed;
      font-size: 1.4rem;
    }

    .stat-icon.orders { background: #e6f7e6; color: #10b981; }
    .stat-icon.pending { background: #fef3c7; color: #f59e0b; }
    .stat-icon.prints { background: #ede9fe; color: #7c3aed; }
    .stat-icon.revenue { background: #fce7f3; color: #ec4899; }

    /* Action Grid */
    .action-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 2rem;
    }

    .action-card {
      background: white;
      border-radius: 24px;
      padding: 1.5rem 1.4rem;
      border: 1px solid #f1eaff;
      box-shadow: 0 10px 25px -8px rgba(124, 58, 237, 0.06);
      transition: all 0.3s;
      text-decoration: none;
      color: inherit;
      display: block;
      cursor: pointer;
    }

    .action-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 40px -12px rgba(124, 58, 237, 0.15);
      border-color: #c9b3ff;
    }

    .action-icon {
      width: 55px;
      height: 55px;
      background: linear-gradient(145deg, #f5f0ff, #ffffff);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      color: #7c3aed;
      font-size: 1.6rem;
      border: 1px solid rgba(124, 58, 237, 0.2);
    }

    .action-card h3 {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 0.3rem;
    }

    .action-card p {
      color: #64748b;
      font-size: 0.78rem;
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    .action-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      color: #7c3aed;
      font-size: 0.8rem;
    }

    .action-card:hover .action-link i {
      transform: translateX(4px);
    }

    .map-card .action-icon { color: #10b981; border-color: rgba(16, 185, 129, 0.2); background: linear-gradient(145deg, #ecfdf5, #ffffff); }
    .map-card .action-link { color: #10b981; }
    .print-card .action-icon { color: #f59e0b; border-color: rgba(245, 158, 11, 0.2); background: linear-gradient(145deg, #fffbeb, #ffffff); }
    .print-card .action-link { color: #d97706; }
    .shop-card .action-icon { color: #7c3aed; border-color: rgba(124, 58, 237, 0.2); background: linear-gradient(145deg, #f5f0ff, #ffffff); }
    .shop-card .action-link { color: #7c3aed; }

    /* Quick Actions */
    .quick-section {
      background: white;
      border-radius: 22px;
      padding: 1.5rem 1.8rem;
      border: 1px solid #f1eaff;
      margin-bottom: 1.5rem;
    }

    .quick-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .quick-header i { color: #7c3aed; background: #f5f0ff; padding: 8px; border-radius: 12px; font-size: 0.9rem; }
    .quick-header h3 { font-size: 1rem; }

    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .quick-btn {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      color: #1e293b;
      font-weight: 500;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .quick-btn i { color: #7c3aed; }
    .quick-btn:hover { background: #7c3aed; color: white; border-color: #7c3aed; }
    .quick-btn:hover i { color: white; }
    .quick-btn.print-quick i { color: #f59e0b; }
    .quick-btn.print-quick:hover { background: #f59e0b; border-color: #f59e0b; }
    .map-quick i { color: #10b981; }
    .map-quick:hover { background: #10b981; border-color: #10b981; }

    /* Orders Table */
    .orders-section {
      background: white;
      border-radius: 22px;
      border: 1px solid #f1eaff;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .orders-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid #f1eaff;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .orders-header h3 { font-size: 1rem; display: flex; align-items: center; gap: 8px; }
    .orders-header h3 i { color: #7c3aed; }

    .order-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .order-tab {
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      background: white;
      font-family: inherit;
      transition: all 0.2s;
    }

    .order-tab.active {
      background: #7c3aed;
      color: white;
      border-color: #7c3aed;
    }

    .order-tab .count {
      background: rgba(255,255,255,0.3);
      padding: 0.1rem 0.4rem;
      border-radius: 10px;
      font-size: 0.65rem;
    }

    .orders-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .order-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid #f8fafc;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .order-item:hover { background: #f8f6fc; }

    .order-info { flex: 1; min-width: 150px; }
    .order-info strong { font-size: 0.85rem; }
    .order-info p { font-size: 0.7rem; color: #64748b; }

    .order-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .order-status {
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-new { background: #dbeafe; color: #1e40af; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-printing { background: #ede9fe; color: #5b21b6; }
    .status-completed { background: #e6f7e6; color: #0d7c3f; }
    .status-delivered { background: #e6f7e6; color: #065f46; }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #94a3b8;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 1.2rem;
      color: #94a3b8;
      border-top: 1px solid #f1eaff;
      font-size: 0.75rem;
    }

    /* Loading */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .loading-overlay.hide { display: none; }
    .spinner {
      width: 45px; height: 45px;
      border: 3px solid #f1eaff;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Auth required message */
    .auth-required {
      text-align: center;
      padding: 4rem 2rem;
      background: white;
      border-radius: 24px;
      max-width: 500px;
      margin: 4rem auto;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    .auth-required i { font-size: 3rem; color: #7c3aed; margin-bottom: 1rem; }
    .auth-required h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .auth-required p { color: #64748b; margin-bottom: 1.5rem; }
    .auth-btn {
      padding: 0.8rem 2rem;
      background: linear-gradient(145deg, #7c3aed, #8b5cf6);
      color: white;
      border: none;
      border-radius: 40px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      font-size: 0.9rem;
    }

    @media (max-width: 1100px) {
      .action-grid { grid-template-columns: repeat(2, 1fr); }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 700px) {
      .action-grid, .stats-grid { grid-template-columns: 1fr; }
      .container { padding: 1.2rem 0.8rem; }
      .page-header p { margin-left: 0; }
      .navbar { padding: 0.5rem 2%; }
      .nav-tabs { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <nav class="navbar">
    <div class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="KazInni Logo" class="logo-img">
      <span class="logo-text">KazInni <span>Print Shop</span></span>
    </div>
    <div class="nav-right">
      <!-- Navigation Tabs -->
      <div class="nav-tabs">
        <a href="/workspaces/brandinn/dashboard.html" class="nav-tab"><i class="fas fa-chart-pie"></i> BrandInn</a>
        <a href="/workspaces/brandinn-prints/dashboard.html" class="nav-tab active"><i class="fas fa-print"></i> Print Shop</a>
        <a href="/workspaces/brandinn/map.html" class="nav-tab"><i class="fas fa-map-location-dot"></i> Map</a>
      </div>
      
      <div class="shop-selector">
        <i class="fas fa-store"></i>
        <select id="shopSelect" onchange="switchShop(this.value)">
          <option value="main">🏠 Main Shop — Nairobi</option>
          <option value="kiambu">📍 Kiambu Branch</option>
          <option value="mombasa">📍 Mombasa Branch</option>
          <option value="nakuru">📍 Nakuru Branch</option>
        </select>
      </div>
      <div class="rep-profile">
        <div class="rep-avatar" id="repAvatar">KA</div>
        <div class="rep-info">
          <div class="rep-name" id="repName">Loading...</div>
          <div class="rep-role"><i class="fas fa-badge-check"></i> Print Shop Admin</div>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
        <span>Logout</span>
      </button>
    </div>
  </nav>

  <div class="container" id="mainContent">
    <!-- Content will be shown after auth check -->
  </div>

  <div class="footer">
    <i class="far fa-copyright"></i> 2026 KazInni Workspaces • BrandInn Print Shop • <span id="footerStats">--</span>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let allOrders = {};
    let currentShop = 'main';
    let currentFilter = 'all';

    const loadingOverlay = document.getElementById('loadingOverlay');
    const mainContent = document.getElementById('mainContent');
    const repNameEl = document.getElementById('repName');
    const repAvatarEl = document.getElementById('repAvatar');
    const footerStatsEl = document.getElementById('footerStats');

    const shopNames = { main: 'Main Shop — Nairobi', kiambu: 'Kiambu Branch', mombasa: 'Mombasa Branch', nakuru: 'Nakuru Branch' };

    function getInitials(name) {
      return name ? name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0,2) : 'KA';
    }

    function getStatusClass(status) {
      const map = { new: 'status-new', pending: 'status-pending', printing: 'status-printing', completed: 'status-completed', delivered: 'status-delivered' };
      return map[status] || 'status-new';
    }

    function renderDashboard() {
      mainContent.innerHTML = `
        <div class="page-header">
          <h1>
            <i class="fas fa-print"></i>
            Print Shop Dashboard
            <span class="live-badge"><i class="fas fa-circle"></i> Live</span>
          </h1>
          <p id="shopLocation">${shopNames[currentShop]} • Manage orders, print jobs, and franchise operations.</p>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-left"><h4>New Orders</h4><div class="stat-number" id="newOrders">--</div><div class="stat-trend trend-up"><i class="fas fa-sync-alt fa-spin"></i> Loading</div></div>
            <div class="stat-icon orders"><i class="fas fa-shopping-cart"></i></div>
          </div>
          <div class="stat-card">
            <div class="stat-left"><h4>Pending</h4><div class="stat-number" id="pendingOrders">--</div><div class="stat-trend trend-warn"><i class="fas fa-sync-alt fa-spin"></i> Loading</div></div>
            <div class="stat-icon pending"><i class="fas fa-clock"></i></div>
          </div>
          <div class="stat-card">
            <div class="stat-left"><h4>Print Jobs</h4><div class="stat-number" id="printJobs">--</div><div class="stat-trend trend-neutral"><i class="fas fa-sync-alt fa-spin"></i> Loading</div></div>
            <div class="stat-icon prints"><i class="fas fa-print"></i></div>
          </div>
          <div class="stat-card">
            <div class="stat-left"><h4>Today's Revenue</h4><div class="stat-number" id="todayRevenue">--</div><div class="stat-trend trend-up"><i class="fas fa-sync-alt fa-spin"></i> Loading</div></div>
            <div class="stat-icon revenue"><i class="fas fa-money-bill"></i></div>
          </div>
        </div>

        <div class="action-grid">
          <a href="/workspaces/brandinn-prints/new-order.html" class="action-card">
            <div class="action-icon"><i class="fas fa-plus-circle"></i></div>
            <h3>New Order</h3>
            <p>Create a new print order — T-shirts, banners, stickers, and more.</p>
            <span class="action-link">Create Order <i class="fas fa-arrow-right"></i></span>
          </a>
          <a href="/workspaces/brandinn-prints/orders.html" class="action-card">
            <div class="action-icon"><i class="fas fa-clipboard-list"></i></div>
            <h3>Manage Orders</h3>
            <p>View, update status, and track all incoming print orders.</p>
            <span class="action-link">Order Panel <i class="fas fa-arrow-right"></i></span>
          </a>
          <a href="/workspaces/brandinn-prints/print-jobs.html" class="action-card shop-card">
            <div class="action-icon"><i class="fas fa-print"></i></div>
            <h3>Print Jobs</h3>
            <p>Queue print jobs, assign to machines, and track completion.</p>
            <span class="action-link">Job Queue <i class="fas fa-arrow-right"></i></span>
          </a>
          <a href="/workspaces/brandinn-prints/shop-manager.html" class="action-card shop-card">
            <div class="action-icon"><i class="fas fa-store-alt"></i></div>
            <h3>Shop Manager</h3>
            <p>Manage franchise branches, inventory, and staff assignments.</p>
            <span class="action-link">Franchise Panel <i class="fas fa-arrow-right"></i></span>
          </a>
          <a href="/workspaces/brandinn/map.html" class="action-card map-card">
            <div class="action-icon"><i class="fas fa-map-location-dot"></i></div>
            <h3>Business Map</h3>
            <p>Pin business locations on the interactive map for customer discovery.</p>
            <span class="action-link">Open Map <i class="fas fa-arrow-right"></i></span>
          </a>
          <a href="/workspaces/brandinn/dashboard.html" class="action-card" style="border:2px dashed #c9b3ff;">
            <div class="action-icon"><i class="fas fa-chart-pie"></i></div>
            <h3>BrandInn Dashboard</h3>
            <p>Switch to the main BrandInn business management dashboard.</p>
            <span class="action-link">Go to BrandInn <i class="fas fa-arrow-right"></i></span>
          </a>
        </div>

        <div class="quick-section">
          <div class="quick-header"><i class="fas fa-bolt"></i><h3>Quick Actions</h3></div>
          <div class="quick-links">
            <a href="/workspaces/brandinn-prints/new-order.html" class="quick-btn print-quick"><i class="fas fa-tshirt"></i> T-Shirt Order</a>
            <a href="/workspaces/brandinn-prints/new-order.html?type=banner" class="quick-btn print-quick"><i class="fas fa-flag"></i> Banner Order</a>
            <a href="/workspaces/brandinn-prints/new-order.html?type=sticker" class="quick-btn print-quick"><i class="fas fa-sticky-note"></i> Sticker Order</a>
            <a href="/workspaces/brandinn-prints/print-jobs.html" class="quick-btn"><i class="fas fa-play"></i> Start Print Job</a>
            <a href="/workspaces/brandinn-prints/shop-manager.html" class="quick-btn"><i class="fas fa-boxes"></i> Inventory</a>
            <a href="/workspaces/brandinn/map.html" class="quick-btn map-quick"><i class="fas fa-map-pin"></i> Map</a>
            <a href="/workspaces/brandinn/dashboard.html" class="quick-btn"><i class="fas fa-chart-pie"></i> BrandInn</a>
          </div>
        </div>

        <div class="orders-section">
          <div class="orders-header">
            <h3><i class="fas fa-receipt"></i> Recent Orders — <span id="currentShop">${shopNames[currentShop]}</span></h3>
            <div class="order-tabs">
              <button class="order-tab active" onclick="window.filterOrders('all', this)">All <span class="count" id="allCount">0</span></button>
              <button class="order-tab" onclick="window.filterOrders('new', this)">New <span class="count" id="newCount">0</span></button>
              <button class="order-tab" onclick="window.filterOrders('pending', this)">Pending <span class="count" id="pendingCount">0</span></button>
              <button class="order-tab" onclick="window.filterOrders('printing', this)">Printing <span class="count" id="printingCount">0</span></button>
              <button class="order-tab" onclick="window.filterOrders('completed', this)">Done <span class="count" id="doneCount">0</span></button>
            </div>
          </div>
          <div class="orders-list" id="ordersList">
            <div class="empty-state"><i class="fas fa-sync-alt fa-spin"></i><p>Loading orders...</p></div>
          </div>
        </div>
      `;
    }

    function renderOrders() {
      const ordersList = document.getElementById('ordersList');
      if (!ordersList) return;
      
      const orders = Object.entries(allOrders)
        .filter(([_, o]) => o && o.shop === currentShop)
        .filter(([_, o]) => currentFilter === 'all' || o.status === currentFilter)
        .map(([id, data]) => ({ id, ...data }))
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))
        .slice(0, 20);

      if (!orders.length) {
        ordersList.innerHTML = `<div class="empty-state"><i class="fas fa-receipt"></i><p>No ${currentFilter === 'all' ? '' : currentFilter} orders for ${shopNames[currentShop]}</p></div>`;
        return;
      }

      ordersList.innerHTML = orders.map(order => {
        const status = order.status || 'new';
        const typeIcon = order.type === 'tshirt' ? '👕' : order.type === 'banner' ? '🪧' : order.type === 'sticker' ? '🏷️' : '📦';
        return `
          <div class="order-item">
            <div class="order-info">
              <strong>${typeIcon} ${order.customerName || 'Walk-in Customer'}</strong>
              <p>${order.product || 'Print Order'} • Qty: ${order.quantity || 1} • KES ${(order.total || 0).toLocaleString()}</p>
            </div>
            <div class="order-meta">
              <span class="order-status ${getStatusClass(status)}">${status.toUpperCase()}</span>
              <span style="font-size:0.65rem;color:#94a3b8;">#${(order.id || '').substring(0, 6)}</span>
            </div>
          </div>`;
      }).join('');
    }

    function updateStats() {
      const shopOrders = Object.values(allOrders).filter(o => o && o.shop === currentShop);
      const newOrders = shopOrders.filter(o => o.status === 'new').length;
      const pending = shopOrders.filter(o => o.status === 'pending').length;
      const printing = shopOrders.filter(o => o.status === 'printing').length;
      const completed = shopOrders.filter(o => o.status === 'completed' || o.status === 'delivered').length;
      const todayTotal = shopOrders
        .filter(o => o.createdAt && new Date(o.createdAt).toDateString() === new Date().toDateString())
        .reduce((sum, o) => sum + (o.total || 0), 0);

      const newOrdersEl = document.getElementById('newOrders');
      const pendingOrdersEl = document.getElementById('pendingOrders');
      const printJobsEl = document.getElementById('printJobs');
      const todayRevenueEl = document.getElementById('todayRevenue');
      const allCountEl = document.getElementById('allCount');
      const newCountEl = document.getElementById('newCount');
      const pendingCountEl = document.getElementById('pendingCount');
      const printingCountEl = document.getElementById('printingCount');
      const doneCountEl = document.getElementById('doneCount');

      if (newOrdersEl) newOrdersEl.textContent = newOrders;
      if (pendingOrdersEl) pendingOrdersEl.textContent = pending;
      if (printJobsEl) printJobsEl.textContent = printing;
      if (todayRevenueEl) todayRevenueEl.textContent = `KES ${todayTotal.toLocaleString()}`;
      if (allCountEl) allCountEl.textContent = shopOrders.length;
      if (newCountEl) newCountEl.textContent = newOrders;
      if (pendingCountEl) pendingCountEl.textContent = pending;
      if (printingCountEl) printingCountEl.textContent = printing;
      if (doneCountEl) doneCountEl.textContent = completed;
      
      footerStatsEl.textContent = `${shopOrders.length} orders • ${printing} printing • KES ${todayTotal.toLocaleString()} today`;
      
      document.querySelectorAll('.stat-trend').forEach(el => {
        el.innerHTML = '<i class="fas fa-check-circle"></i> Updated';
      });
    }

    function switchShop(shop) {
      currentShop = shop;
      const shopLocation = document.getElementById('shopLocation');
      const currentShopEl = document.getElementById('currentShop');
      if (shopLocation) shopLocation.textContent = `${shopNames[shop]} • Manage orders, print jobs, and franchise operations.`;
      if (currentShopEl) currentShopEl.textContent = shopNames[shop];
      renderOrders();
      updateStats();
    }

    function filterOrders(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.order-tab').forEach(t => t.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderOrders();
    }

    function setupRealtimeListener() {
      onValue(ref(db, 'brandinn_print_orders'), (snapshot) => {
        allOrders = snapshot.val() || {};
        renderOrders();
        updateStats();
        loadingOverlay.classList.add('hide');
      }, (error) => {
        console.error('Database error:', error);
        loadingOverlay.classList.add('hide');
        const ordersList = document.getElementById('ordersList');
        if (ordersList) ordersList.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading orders. Check database connection.</p></div>`;
      });
    }

    function showAuthRequired() {
      mainContent.innerHTML = `
        <div class="auth-required">
          <i class="fas fa-lock"></i>
          <h2>Authentication Required</h2>
          <p>Please log in to access the Print Shop Dashboard.</p>
          <button class="auth-btn" onclick="window.location.href='https://kazinni.vercel.app'">
            <i class="fas fa-sign-in-alt"></i> Go to Login
          </button>
          <p style="margin-top:1rem;font-size:0.8rem;color:#94a3b8;">
            You'll be redirected to KazInni Workspaces login.
          </p>
        </div>
      `;
    }

    // ========== AUTHENTICATION ==========
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // User is authenticated
        const userSnap = await get(ref(db, `brandinn_users/${user.uid}`));
        let userName = 'Shop Manager';
        let userRole = 'Print Shop Admin';
        
        if (userSnap.exists()) {
          const userData = userSnap.val();
          userName = userData.name || userData.displayName || user.email?.split('@')[0] || 'Shop Manager';
          userRole = userData.role || 'Print Shop Admin';
        } else {
          userName = user.displayName || user.email?.split('@')[0] || 'Shop Manager';
        }
        
        repNameEl.textContent = userName;
        repAvatarEl.textContent = getInitials(userName);
        
        renderDashboard();
        setupRealtimeListener();
      } else {
        // User is NOT authenticated
        showAuthRequired();
        loadingOverlay.classList.add('hide');
        repNameEl.textContent = 'Not logged in';
        repAvatarEl.textContent = '?';
      }
    });

    // ========== LOGOUT ==========
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if (confirm('Log out of KazInni Workspaces?')) {
        try {
          await signOut(auth);
          // onAuthStateChanged will handle the redirect
        } catch (e) {
          alert('Logout failed. Please try again.');
        }
      }
    });

    // Expose functions to window for onclick handlers
    window.switchShop = switchShop;
    window.filterOrders = filterOrders;

    // Fallback timeout
    setTimeout(() => {
      loadingOverlay.classList.add('hide');
      if (!mainContent.innerHTML) {
        showAuthRequired();
      }
    }, 8000);
  </script>
</body>
</html>
