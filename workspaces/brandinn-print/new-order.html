<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>New Order | KazInni Workspaces</title>
  
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #7c3aed;
      --primary-dark: #5b21b6;
      --primary-light: #a78bfa;
      --gold: #f59e0b;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #ede9fe;
      --green: #10b981;
      --red: #ef4444;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #f8f6fc 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.45rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(124, 58, 237, 0.12);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 6px;
    }

    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-img { height: 30px; width: 30px; border-radius: 8px; object-fit: contain; background: white; box-shadow: 0 3px 10px rgba(124, 58, 237, 0.15); }
    .logo-text {
      font-weight: 800; font-size: 1rem;
      background: linear-gradient(145deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.65rem; background: linear-gradient(145deg, #f59e0b, #d97706); -webkit-text-fill-color: transparent; margin-left: 2px; }

    .nav-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(124, 58, 237, 0.06); border: 1px solid rgba(124, 58, 237, 0.15);
      padding: 0.35rem 0.7rem; border-radius: 25px; color: var(--primary-dark);
      font-weight: 600; font-size: 0.65rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 4px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--primary); color: white; }

    .container { max-width: 100%; margin: 0 auto; padding: 0.8rem 2%; }

    .page-header { margin-bottom: 0.6rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.3rem; }
    .page-header h1 { font-size: 1.1rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--primary); margin-right: 5px; }

    /* Product Type Selector */
    .product-type-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 0.6rem;
    }
    .product-type-card {
      background: white; border: 2px solid #e2e8f0; border-radius: 10px;
      padding: 0.5rem 0.4rem; text-align: center; cursor: pointer; transition: all 0.15s;
    }
    .product-type-card:hover { border-color: var(--primary-light); background: #f8f6fc; }
    .product-type-card.active { border-color: var(--primary); background: #ede9fe; }
    .product-type-card i { font-size: 1.3rem; display: block; margin-bottom: 0.15rem; }
    .product-type-card .icon-tshirt { color: #7c3aed; }
    .product-type-card .icon-banner { color: #f59e0b; }
    .product-type-card .icon-sticker { color: #10b981; }
    .product-type-card .icon-other { color: #64748b; }
    .product-type-card span { font-size: 0.6rem; font-weight: 700; }
    .product-type-card small { display: block; font-size: 0.5rem; color: var(--text-muted); }

    /* Three Column Layout */
    .form-layout {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.7rem;
      height: calc(100vh - 180px);
      min-height: 400px;
    }

    .form-card {
      background: white;
      border-radius: 14px;
      padding: 0.9rem;
      border: 1px solid #ede9fe;
      box-shadow: 0 3px 10px rgba(124, 58, 237, 0.03);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .form-card h3 {
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--primary-dark);
      flex-shrink: 0;
    }
    .form-card h3 i { color: var(--primary); font-size: 0.65rem; }

    .form-card-scroll {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
    }
    .form-card-scroll::-webkit-scrollbar { width: 3px; }
    .form-card-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 3px; }

    .form-group { margin-bottom: 0.4rem; }
    .form-group label {
      display: block; font-size: 0.55rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.1rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.4rem 0.5rem; border-radius: 7px;
      border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif;
      background: #f8fafc; transition: all 0.15s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--primary); outline: none; background: white;
      box-shadow: 0 0 0 2px rgba(124,58,237,0.04);
    }
    .form-group textarea { resize: none; height: 55px; }

    .color-pills { display: flex; gap: 3px; flex-wrap: wrap; }
    .color-pill {
      padding: 0.2rem 0.5rem; border-radius: 12px; border: 2px solid #e2e8f0;
      cursor: pointer; font-size: 0.6rem; font-weight: 600; transition: all 0.15s;
      background: white; -webkit-tap-highlight-color: transparent;
    }
    .color-pill:hover { border-color: var(--primary); }
    .color-pill.active { background: var(--primary); color: white; border-color: var(--primary); }

    .size-pills { display: flex; gap: 3px; flex-wrap: wrap; }
    .size-pill {
      padding: 0.2rem 0.5rem; border-radius: 12px; border: 2px solid #e2e8f0;
      cursor: pointer; font-size: 0.6rem; font-weight: 600; transition: all 0.15s;
      background: white; -webkit-tap-highlight-color: transparent;
    }
    .size-pill:hover { border-color: var(--primary); }
    .size-pill.active { background: var(--primary); color: white; border-color: var(--primary); }

    .tshirt-fields { display: none; }
    .tshirt-fields.show { display: block; }

    .inline-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }

    .price-display {
      background: linear-gradient(135deg, #f8f6fc, #ede9fe);
      border-radius: 10px; padding: 0.6rem; text-align: center;
      flex-shrink: 0; margin-top: 0.4rem;
    }
    .price-display .total-amount { font-size: 1.5rem; font-weight: 900; color: var(--primary); line-height: 1.1; }
    .price-display .breakdown { font-size: 0.6rem; color: var(--text-muted); margin-top: 0.05rem; }

    .btn-row { display: flex; gap: 4px; flex-shrink: 0; margin-top: 0.4rem; }
    .btn {
      padding: 0.5rem 0.8rem; border-radius: 8px; border: none; font-weight: 700;
      font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 4px; transition: all 0.15s; font-family: inherit; justify-content: center;
    }
    .btn-primary { background: var(--primary); color: white; flex: 2; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #f1f5f9; color: #475569; flex: 1; }
    .btn-secondary:hover { background: #e2e8f0; }

    .toast {
      position: fixed; bottom: 20px; right: 20px; background: var(--green); color: white;
      padding: 0.6rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.7rem;
    }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 900px) {
      .form-layout { grid-template-columns: 1fr 1fr; height: auto; min-height: auto; }
      .form-card { overflow: visible; }
      .form-card-scroll { overflow: visible; }
    }
    @media (max-width: 600px) {
      .form-layout { grid-template-columns: 1fr; height: auto; min-height: auto; }
      .product-type-grid { grid-template-columns: repeat(2, 1fr); }
      .form-card { overflow: visible; }
      .form-card-scroll { overflow: visible; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/workspaces/brandinn-prints/dashboard.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="KazInni Logo" class="logo-img">
      <span class="logo-text">KazInni <span>Print Shop</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/brandinn-prints/orders.html" class="nav-btn">
        <i class="fas fa-arrow-left"></i> All Orders
      </a>
      <button class="nav-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-plus-circle"></i> New Print Order</h1>
      <p style="font-size:0.65rem;color:var(--text-muted);">Fill in all details below</p>
    </div>

    <!-- Product Type Selector -->
    <div class="product-type-grid" id="productTypeGrid">
      <div class="product-type-card active" data-type="tshirt" onclick="selectProductType('tshirt', this)">
        <i class="fas fa-tshirt icon-tshirt"></i>
        <span>T-Shirt</span>
        <small>KES 1,300</small>
      </div>
      <div class="product-type-card" data-type="banner" onclick="selectProductType('banner', this)">
        <i class="fas fa-flag-checkered icon-banner"></i>
        <span>Banner</span>
        <small>KES 600/m</small>
      </div>
      <div class="product-type-card" data-type="sticker" onclick="selectProductType('sticker', this)">
        <i class="fas fa-sticky-note icon-sticker"></i>
        <span>Sticker</span>
        <small>KES 650/m</small>
      </div>
      <div class="product-type-card" data-type="other" onclick="selectProductType('other', this)">
        <i class="fas fa-box icon-other"></i>
        <span>Other</span>
        <small>Custom</small>
      </div>
    </div>

    <!-- Three Column Form -->
    <div class="form-layout">
      
      <!-- COLUMN 1: Customer + Pricing -->
      <div class="form-card">
        <h3><i class="fas fa-user"></i> Customer & Pricing</h3>
        <div class="form-card-scroll">
          <div class="form-group">
            <label>Customer Name *</label>
            <input type="text" id="customerName" placeholder="Full name">
          </div>
          <div class="form-group">
            <label>Phone Number *</label>
            <input type="tel" id="customerPhone" placeholder="+254 700 000000">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="customerEmail" placeholder="client@email.com">
          </div>
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="productName" placeholder="e.g., Custom T-Shirt">
          </div>
          <div class="form-group">
            <label>Size</label>
            <div class="size-pills" id="sizePills">
              <span class="size-pill" data-size="S" onclick="selectSize(this)">S</span>
              <span class="size-pill active" data-size="M" onclick="selectSize(this)">M</span>
              <span class="size-pill" data-size="L" onclick="selectSize(this)">L</span>
              <span class="size-pill" data-size="XL" onclick="selectSize(this)">XL</span>
              <span class="size-pill" data-size="2XL" onclick="selectSize(this)">2XL</span>
            </div>
          </div>
          <div class="inline-row">
            <div class="form-group">
              <label>Quantity *</label>
              <input type="number" id="quantity" value="1" min="1" max="500" onchange="updatePrice()" oninput="updatePrice()">
            </div>
            <div class="form-group">
              <label>Unit Price (KES)</label>
              <input type="number" id="unitPrice" value="1300" min="0" onchange="updatePrice()" oninput="updatePrice()">
            </div>
          </div>
        </div>
        <div class="price-display">
          <div class="total-amount" id="displayTotal">KES 1,300</div>
          <div class="breakdown" id="breakdown">1 × KES 1,300</div>
        </div>
      </div>

      <!-- COLUMN 2: Product Details -->
      <div class="form-card">
        <h3><i class="fas fa-cog"></i> Product Details</h3>
        <div class="form-card-scroll">
          <!-- T-Shirt Fields -->
          <div class="tshirt-fields show" id="tshirtFields">
            <div class="form-group">
              <label>Design Text</label>
              <input type="text" id="designText" placeholder="Text on shirt">
            </div>
            <div class="form-group">
              <label>Second Line</label>
              <input type="text" id="designText2" placeholder="Slogan">
            </div>
            <div class="inline-row">
              <div class="form-group">
                <label>Position</label>
                <select id="position">
                  <option value="center">Center Chest</option>
                  <option value="breast">Left Breast</option>
                </select>
              </div>
              <div class="form-group">
                <label>Font</label>
                <select id="font">
                  <option value="Inter">Inter Bold</option>
                  <option value="Playfair Display">Playfair</option>
                  <option value="Bebas Neue">Bebas Neue</option>
                  <option value="Dancing Script">Dancing</option>
                  <option value="Oswald">Oswald</option>
                  <option value="Poppins">Poppins</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Fabric Color</label>
              <div class="color-pills" id="colorPills">
                <span class="color-pill active" data-color="White" onclick="selectPill(this, 'colorPills')">White</span>
                <span class="color-pill" data-color="Black" onclick="selectPill(this, 'colorPills')">Black</span>
                <span class="color-pill" data-color="Green" onclick="selectPill(this, 'colorPills')">Green</span>
                <span class="color-pill" data-color="Navy Blue" onclick="selectPill(this, 'colorPills')">Navy</span>
              </div>
            </div>
            <div class="form-group">
              <label>Text Color</label>
              <div class="color-pills" id="textColorPills">
                <span class="color-pill active" data-color="White" onclick="selectPill(this, 'textColorPills')">White</span>
                <span class="color-pill" data-color="Black" onclick="selectPill(this, 'textColorPills')">Black</span>
                <span class="color-pill" data-color="Gold" onclick="selectPill(this, 'textColorPills')">Gold</span>
                <span class="color-pill" data-color="Red" onclick="selectPill(this, 'textColorPills')">Red</span>
              </div>
            </div>
          </div>

          <!-- Banner/Sticker Fields -->
          <div class="tshirt-fields" id="bannerFields">
            <div class="form-group">
              <label>Size (metres)</label>
              <input type="number" id="bannerMetres" value="1" min="0.5" max="50" step="0.5" onchange="updateBannerPrice()" oninput="updateBannerPrice()">
            </div>
            <div class="form-group">
              <label>Design Option</label>
              <select id="bannerDesign" onchange="updateBannerPrice()">
                <option value="print-only">Print Only</option>
                <option value="design-included">Design + Print (+KES 1,000)</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- COLUMN 3: Notes & Actions -->
      <div class="form-card">
        <h3><i class="fas fa-sticky-note"></i> Notes & Confirm</h3>
        <div class="form-card-scroll">
          <div class="form-group">
            <label>Special Instructions</label>
            <textarea id="notes" placeholder="Artwork notes, delivery instructions..."></textarea>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveOrder()">
            <i class="fas fa-check-circle"></i> Confirm & Save Order
          </button>
          <button class="btn btn-secondary" onclick="resetForm()">
            <i class="fas fa-undo"></i> Reset
          </button>
        </div>
      </div>

    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let selectedProduct = 'tshirt';
    const productPrices = { tshirt: 1300, banner: 600, sticker: 650, other: 0 };

    function showToast(msg, isError = false) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function selectProductType(type, el) {
      selectedProduct = type;
      document.querySelectorAll('.product-type-card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('tshirtFields').classList.toggle('show', type === 'tshirt');
      document.getElementById('bannerFields').classList.toggle('show', type === 'banner' || type === 'sticker');
      
      if (type === 'banner' || type === 'sticker') {
        updateBannerPrice();
      } else {
        document.getElementById('unitPrice').value = productPrices[type] || 0;
        updatePrice();
      }
      
      const names = { tshirt: 'Custom T-Shirt Printing', banner: 'Banner Printing', sticker: 'Sticker Printing', other: '' };
      document.getElementById('productName').value = names[type] || '';
    }

    function selectPill(el, groupId) {
      document.querySelectorAll(`#${groupId} .color-pill`).forEach(c => c.classList.remove('active'));
      el.classList.add('active');
    }

    function selectSize(el) {
      document.querySelectorAll('#sizePills .size-pill').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
    }

    function updatePrice() {
      const qty = parseInt(document.getElementById('quantity').value) || 0;
      const unit = parseInt(document.getElementById('unitPrice').value) || 0;
      const total = qty * unit;
      document.getElementById('displayTotal').textContent = `KES ${total.toLocaleString()}`;
      document.getElementById('breakdown').textContent = `${qty} × KES ${unit.toLocaleString()} = KES ${total.toLocaleString()}`;
    }

    function updateBannerPrice() {
      const metres = parseFloat(document.getElementById('bannerMetres').value) || 0;
      const pricePerMetre = selectedProduct === 'sticker' ? 650 : 600;
      const designOption = document.getElementById('bannerDesign').value;
      let unitPrice = metres * pricePerMetre;
      if (designOption === 'design-included') unitPrice += 1000;
      
      document.getElementById('unitPrice').value = Math.round(unitPrice);
      document.getElementById('quantity').value = 1;
      updatePrice();
    }

    function getSelectedPill(groupId) {
      const active = document.querySelector(`#${groupId} .color-pill.active`);
      return active ? active.dataset.color : '';
    }

    function getOrderData() {
      const customerName = document.getElementById('customerName').value.trim();
      const customerPhone = document.getElementById('customerPhone').value.trim();
      if (!customerName) { showToast('Please enter customer name', true); return null; }
      if (!customerPhone) { showToast('Please enter phone number', true); return null; }

      const qty = parseInt(document.getElementById('quantity').value) || 0;
      const unitPrice = parseInt(document.getElementById('unitPrice').value) || 0;
      const total = qty * unitPrice;

      return {
        customerName, customerPhone,
        customerEmail: document.getElementById('customerEmail').value.trim(),
        type: selectedProduct,
        product: document.getElementById('productName').value.trim() || 'Print Order',
        quantity: qty, unitPrice, total,
        size: document.querySelector('#sizePills .size-pill.active')?.dataset?.size || 'M',
        notes: document.getElementById('notes').value.trim(),
        status: 'new',
        createdBy: auth.currentUser?.email || 'staff',
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        ...(selectedProduct === 'tshirt' ? {
          designText: document.getElementById('designText').value.trim(),
          designText2: document.getElementById('designText2').value.trim(),
          position: document.getElementById('position').value,
          font: document.getElementById('font').value,
          fabricColor: getSelectedPill('colorPills'),
          textColor: getSelectedPill('textColorPills')
        } : {}),
        ...(selectedProduct === 'banner' || selectedProduct === 'sticker' ? {
          metres: parseFloat(document.getElementById('bannerMetres').value) || 1,
          designOption: document.getElementById('bannerDesign').value
        } : {})
      };
    }

    async function saveOrder() {
      const orderData = getOrderData();
      if (!orderData) return;
      try {
        await database.ref('brandinn_print_orders').push().set(orderData);
        showToast('✅ Order saved!');
        resetForm();
      } catch (e) {
        console.error('Save error:', e);
        showToast('Failed to save', true);
      }
    }

    function resetForm() {
      document.getElementById('customerName').value = '';
      document.getElementById('customerPhone').value = '';
      document.getElementById('customerEmail').value = '';
      document.getElementById('quantity').value = '1';
      document.getElementById('notes').value = '';
      document.getElementById('designText').value = '';
      document.getElementById('designText2').value = '';
      document.getElementById('bannerMetres').value = '1';
      document.querySelectorAll('.color-pill').forEach((c, i) => { if (i === 0) c.classList.add('active'); else c.classList.remove('active'); });
      document.querySelectorAll('#sizePills .size-pill').forEach(s => { if (s.dataset.size === 'M') s.classList.add('active'); else s.classList.remove('active'); });
      selectProductType('tshirt', document.querySelector('[data-type="tshirt"]'));
      updatePrice();
    }

    auth.onAuthStateChanged((user) => { if (!user) window.location.href = 'https://kazinni.vercel.app'; });
    document.getElementById('logoutBtn').addEventListener('click', async () => { if (confirm('Log out?')) await auth.signOut(); });
    updatePrice();
  </script>
</body>
</html>
