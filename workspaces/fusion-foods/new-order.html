<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Place Order | Fusion Foods</title>
  
  <meta name="theme-color" content="#10b981">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #10b981;
      --green-dark: #059669;
      --green-light: #34d399;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #a7f3d0;
      --red: #ef4444;
      --orange: #f59e0b;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #ecfdf5 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(16, 185, 129, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #34d399, #059669);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #10b981; -webkit-text-fill-color: #10b981; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--green-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--green); color: white; }

    .container { max-width: 1100px; margin: 0 auto; padding: 1.2rem 2%; flex: 1; width: 100%; }

    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--green-dark); margin-right: 6px; }
    .page-header p { color: var(--text-muted); font-size: 0.75rem; }

    .form-layout { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; }

    .form-card {
      background: white; border-radius: 16px; padding: 1rem;
      border: 1px solid #a7f3d0; box-shadow: 0 3px 12px rgba(5,150,105,0.03);
      display: flex; flex-direction: column;
    }
    .form-card h3 { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.7rem; display: flex; align-items: center; gap: 6px; color: var(--green-dark); flex-shrink: 0; }
    .form-card h3 i { color: var(--green); font-size: 0.7rem; }

    .form-card-scroll { flex: 1; overflow-y: auto; padding-right: 4px; }
    .form-card-scroll::-webkit-scrollbar { width: 3px; }
    .form-card-scroll::-webkit-scrollbar-thumb { background: #a7f3d0; border-radius: 3px; }

    .form-group { margin-bottom: 0.5rem; }
    .form-group label {
      display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
      background: #f8fafc; transition: all 0.15s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--green); outline: none; background: white;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.06);
    }
    .form-group textarea { resize: none; height: 55px; }

    .inline-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }

    .product-row {
      display: flex; gap: 6px; align-items: flex-end; margin-bottom: 0.4rem;
      background: #f8fafc; padding: 0.5rem; border-radius: 10px; position: relative;
    }
    .product-row.out-of-stock { background: #fef2f2; border: 1px solid #fecaca; }
    .product-row .stock-warning {
      position: absolute; top: -8px; right: 8px; background: #ef4444; color: white;
      padding: 0.1rem 0.4rem; border-radius: 8px; font-size: 0.55rem; font-weight: 700;
    }
    .product-row .form-group { margin-bottom: 0; flex: 1; }
    .product-row .btn-remove {
      background: #fee2e2; color: #991b1b; border: none; padding: 0.4rem 0.6rem;
      border-radius: 8px; cursor: pointer; font-size: 0.7rem; flex-shrink: 0;
    }
    .btn-add-item {
      background: #ecfdf5; color: #059669; border: 2px dashed #a7f3d0;
      padding: 0.4rem; border-radius: 10px; cursor: pointer; font-size: 0.7rem;
      font-weight: 600; width: 100%; font-family: inherit; transition: all 0.15s;
    }
    .btn-add-item:hover { background: #d1fae5; }

    .stock-info {
      font-size: 0.6rem; color: var(--text-muted); margin-top: 0.15rem;
      display: flex; align-items: center; gap: 4px;
    }
    .stock-info.low { color: #ef4444; }
    .stock-info.good { color: #10b981; }

    .price-display {
      background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      border-radius: 12px; padding: 0.7rem; text-align: center;
      flex-shrink: 0; margin-top: 0.5rem;
    }
    .price-display .total-amount { font-size: 1.6rem; font-weight: 900; color: var(--green-dark); line-height: 1.2; }
    .price-display .breakdown { font-size: 0.65rem; color: var(--text-muted); margin-top: 0.1rem; }

    .btn-row { display: flex; gap: 6px; flex-shrink: 0; margin-top: 0.5rem; }
    .btn {
      padding: 0.6rem 1rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; transition: all 0.15s; font-family: inherit; justify-content: center;
    }
    .btn-primary { background: var(--green); color: white; flex: 2; }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
    .btn-secondary { background: #f1f5f9; color: #475569; flex: 1; }
    .btn-secondary:hover { background: #e2e8f0; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--green); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(16,185,129,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 900px) { .form-layout { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .form-layout { grid-template-columns: 1fr; } .container { padding: 0.8rem; } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="fusion-foods-dashboard.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Fusion Foods" class="logo-img">
      <span class="logo-text">Fusion <span>Foods</span></span>
    </a>
    <div class="nav-right">
      <a href="fusion-foods-dashboard.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="inventory.html" class="nav-btn"><i class="fas fa-boxes"></i> Inventory</a>
      <a href="orders.html" class="nav-btn"><i class="fas fa-inbox"></i> Orders</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-cart-plus"></i> Place New Order</h1>
      <p>Select products from inventory — stock will update automatically</p>
    </div>

    <div class="form-layout">
      
      <!-- COLUMN 1: Customer & Store -->
      <div class="form-card">
        <h3><i class="fas fa-store"></i> Restaurant Details</h3>
        <div class="form-card-scroll">
          <div class="form-group">
            <label>Restaurant Name *</label>
            <input type="text" id="restaurantName" placeholder="e.g., Sunrise Cafe">
          </div>
          <div class="form-group">
            <label>Contact Person *</label>
            <input type="text" id="contactPerson" placeholder="Full name">
          </div>
          <div class="form-group">
            <label>Phone Number *</label>
            <input type="tel" id="phone" placeholder="+254 700 000000">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="restaurant@email.com">
          </div>
          <div class="form-group">
            <label>Delivery Location *</label>
            <input type="text" id="location" placeholder="e.g., Westlands, Nairobi">
          </div>
        </div>
      </div>

      <!-- COLUMN 2: Order Items from Inventory -->
      <div class="form-card">
        <h3><i class="fas fa-shopping-basket"></i> Order Items (Inventory Only)</h3>
        <div class="form-card-scroll">
          <div id="productRows">
            <div class="product-row" data-index="0">
              <div class="form-group" style="flex:2;">
                <label>Product</label>
                <select class="product-select" onchange="onProductChange(this)" style="width:100%;">
                  <option value="">— Select from inventory —</option>
                </select>
                <div class="stock-info" id="stockInfo0"></div>
              </div>
              <div class="form-group" style="flex:1;">
                <label>Qty</label>
                <input type="number" class="product-qty" value="1" min="1" onchange="validateQty(this)" oninput="validateQty(this)">
              </div>
              <button class="btn-remove" onclick="removeProductRow(this)" title="Remove">✕</button>
            </div>
          </div>
          <button class="btn-add-item" onclick="addProductRow()">
            <i class="fas fa-plus"></i> Add Another Product
          </button>
          <div class="form-group" style="margin-top:0.5rem;">
            <label>Package Type</label>
            <select id="packageType">
              <option value="bulk">Bulk Supply</option>
              <option value="crated">Crated</option>
              <option value="boxed">Boxed</option>
              <option value="bagged">Bagged</option>
              <option value="fresh">Fresh Produce</option>
            </select>
          </div>
        </div>
      </div>

      <!-- COLUMN 3: Pricing & Confirm -->
      <div class="form-card">
        <h3><i class="fas fa-money-bill"></i> Pricing & Confirm</h3>
        <div class="form-card-scroll">
          <div class="form-group">
            <label>Delivery Fee (KES)</label>
            <input type="number" id="deliveryFee" value="0" min="0" onchange="updatePrice()" oninput="updatePrice()">
          </div>
          <div class="form-group">
            <label>Special Instructions</label>
            <textarea id="notes" placeholder="Delivery time, handling..."></textarea>
          </div>
          <div class="form-group">
            <label>Order Type</label>
            <select id="orderType">
              <option value="instant">Instant Delivery</option>
              <option value="scheduled">Scheduled</option>
              <option value="recurring">Recurring/Standing Order</option>
            </select>
          </div>
        </div>
        <div class="price-display">
          <div class="total-amount" id="displayTotal">KES 0</div>
          <div class="breakdown" id="breakdown">Select products from inventory</div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="saveBtn" onclick="saveOrder()">
            <i class="fas fa-check-circle"></i> Confirm & Save Order
          </button>
          <button class="btn btn-secondary" onclick="resetForm()">
            <i class="fas fa-undo"></i> Reset
          </button>
        </div>
      </div>

    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allInventory = {};
    let rowCount = 1;

    function showToast(msg, isError = false) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function getInventoryProduct(name) {
      return Object.values(allInventory).find(p => p && p.name === name);
    }

    function populateInventoryDropdowns() {
      const products = Object.values(allInventory).filter(p => p && p.name && (p.quantity || 0) > 0);
      const options = products.map(p => 
        `<option value="${p.name}" data-price="${p.unitPrice || 0}" data-unit="${p.unit || ''}" data-stock="${p.quantity || 0}" data-id="${p.id || ''}">${p.name} — KES ${(p.unitPrice || 0).toLocaleString()}/${p.unit || 'unit'} (${p.quantity || 0} in stock)</option>`
      ).join('');
      
      document.querySelectorAll('.product-select').forEach(select => {
        const currentVal = select.value;
        select.innerHTML = '<option value="">— Select from inventory —</option>' + options;
        if (currentVal) select.value = currentVal;
      });
    }

    function addProductRow() {
      rowCount++;
      const row = document.createElement('div');
      row.className = 'product-row';
      row.dataset.index = rowCount;
      row.innerHTML = `
        <div class="form-group" style="flex:2;">
          <label>Product</label>
          <select class="product-select" onchange="onProductChange(this)" style="width:100%;">
            <option value="">— Select from inventory —</option>
          </select>
          <div class="stock-info" id="stockInfo${rowCount}"></div>
        </div>
        <div class="form-group" style="flex:1;">
          <label>Qty</label>
          <input type="number" class="product-qty" value="1" min="1" onchange="validateQty(this)" oninput="validateQty(this)">
        </div>
        <button class="btn-remove" onclick="removeProductRow(this)" title="Remove">✕</button>
      `;
      document.getElementById('productRows').appendChild(row);
      populateInventoryDropdowns();
    }

    function removeProductRow(btn) {
      const rows = document.querySelectorAll('.product-row');
      if (rows.length <= 1) {
        showToast('Need at least one product row', true);
        return;
      }
      btn.closest('.product-row').remove();
      updatePrice();
    }

    function onProductChange(select) {
      const row = select.closest('.product-row');
      const index = row.dataset.index;
      const stockInfo = document.getElementById('stockInfo' + index);
      const qtyInput = row.querySelector('.product-qty');
      
      if (select.value) {
        const stock = parseInt(select.selectedOptions[0]?.dataset?.stock) || 0;
        if (stockInfo) {
          stockInfo.textContent = `${stock} in stock`;
          stockInfo.className = stock <= 10 ? 'stock-info low' : 'stock-info good';
        }
        if (qtyInput) qtyInput.max = stock;
      } else {
        if (stockInfo) { stockInfo.textContent = ''; stockInfo.className = 'stock-info'; }
        if (qtyInput) qtyInput.max = 999;
      }
      validateQty(qtyInput);
      updatePrice();
    }

    function validateQty(input) {
      const row = input.closest('.product-row');
      const select = row.querySelector('.product-select');
      const stock = parseInt(select?.selectedOptions[0]?.dataset?.stock) || 0;
      const qty = parseInt(input.value) || 1;
      
      row.classList.remove('out-of-stock');
      const warning = row.querySelector('.stock-warning');
      if (warning) warning.remove();
      
      if (select.value && qty > stock) {
        row.classList.add('out-of-stock');
        if (!row.querySelector('.stock-warning')) {
          const warn = document.createElement('span');
          warn.className = 'stock-warning';
          warn.textContent = 'Exceeds stock!';
          row.appendChild(warn);
        }
        showToast(`Only ${stock} available for ${select.value}`, true);
      }
      
      updatePrice();
    }

    function updatePrice() {
      let total = 0;
      let itemCount = 0;
      
      document.querySelectorAll('.product-row').forEach(row => {
        const select = row.querySelector('.product-select');
        const qtyInput = row.querySelector('.product-qty');
        if (select && select.value && qtyInput) {
          const price = parseInt(select.selectedOptions[0]?.dataset?.price) || 0;
          const qty = parseInt(qtyInput.value) || 0;
          total += price * qty;
          itemCount++;
        }
      });

      const delivery = parseInt(document.getElementById('deliveryFee').value) || 0;
      total += delivery;
      
      document.getElementById('displayTotal').textContent = `KES ${total.toLocaleString()}`;
      document.getElementById('breakdown').textContent = `${itemCount} item${itemCount !== 1 ? 's' : ''} + KES ${delivery.toLocaleString()} delivery`;
    }

    function validateOrder() {
      let hasError = false;
      
      document.querySelectorAll('.product-row').forEach(row => {
        const select = row.querySelector('.product-select');
        const qtyInput = row.querySelector('.product-qty');
        
        if (select && select.value && qtyInput) {
          const stock = parseInt(select.selectedOptions[0]?.dataset?.stock) || 0;
          const qty = parseInt(qtyInput.value) || 0;
          
          if (qty > stock) {
            row.classList.add('out-of-stock');
            hasError = true;
          }
          
          if (!select.value) {
            hasError = true;
          }
        }
      });
      
      // Check at least one product selected
      const hasProduct = Array.from(document.querySelectorAll('.product-select')).some(s => s.value);
      if (!hasProduct) {
        showToast('Select at least one product from inventory', true);
        return false;
      }
      
      if (hasError) {
        showToast('Fix quantity errors before saving', true);
        return false;
      }
      
      return true;
    }

    function getOrderData() {
      const restaurantName = document.getElementById('restaurantName').value.trim();
      const contactPerson = document.getElementById('contactPerson').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const location = document.getElementById('location').value.trim();

      if (!restaurantName) { showToast('Enter restaurant name', true); return null; }
      if (!contactPerson) { showToast('Enter contact person', true); return null; }
      if (!phone) { showToast('Enter phone number', true); return null; }
      if (!location) { showToast('Enter delivery location', true); return null; }

      if (!validateOrder()) return null;

      // Collect products
      const products = [];
      document.querySelectorAll('.product-row').forEach(row => {
        const select = row.querySelector('.product-select');
        const qtyInput = row.querySelector('.product-qty');
        if (select && select.value && qtyInput) {
          const stock = parseInt(select.selectedOptions[0]?.dataset?.stock) || 0;
          const qty = parseInt(qtyInput.value) || 1;
          products.push({
            name: select.value,
            price: parseInt(select.selectedOptions[0]?.dataset?.price) || 0,
            unit: select.selectedOptions[0]?.dataset?.unit || '',
            productId: select.selectedOptions[0]?.dataset?.id || '',
            quantity: Math.min(qty, stock),
            stockBefore: stock
          });
        }
      });

      const deliveryFee = parseInt(document.getElementById('deliveryFee').value) || 0;
      const subtotal = products.reduce((s, p) => s + (p.price * p.quantity), 0);
      const total = subtotal + deliveryFee;

      return {
        restaurantName, contactPerson, phone,
        email: document.getElementById('email').value.trim(),
        location,
        products,
        packageType: document.getElementById('packageType').value,
        deliveryFee, subtotal, total,
        orderType: document.getElementById('orderType').value,
        notes: document.getElementById('notes').value.trim(),
        status: 'new',
        source: 'fusion_foods',
        createdBy: auth.currentUser?.email || 'staff',
        createdAt: firebase.database.ServerValue.TIMESTAMP
      };
    }

    async function saveOrder() {
      const orderData = getOrderData();
      if (!orderData) return;

      document.getElementById('saveBtn').disabled = true;
      document.getElementById('saveBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

      try {
        // Save order
        await database.ref('fusion_foods_orders').push().set(orderData);

        // Reduce stock for each product
        const updates = {};
        for (const product of orderData.products) {
          if (product.productId) {
            const newQty = product.stockBefore - product.quantity;
            updates[`fusion_foods_inventory/${product.productId}/quantity`] = Math.max(0, newQty);
          } else {
            // Find by name
            const invProduct = getInventoryProduct(product.name);
            if (invProduct) {
              const invId = Object.keys(allInventory).find(k => allInventory[k] === invProduct);
              if (invId) {
                const newQty = (invProduct.quantity || 0) - product.quantity;
                updates[`fusion_foods_inventory/${invId}/quantity`] = Math.max(0, newQty);
              }
            }
          }
        }

        if (Object.keys(updates).length > 0) {
          await database.ref().update(updates);
        }

        showToast('✅ Order saved & stock updated!');
        resetForm();
      } catch (e) {
        console.error('Save error:', e);
        showToast('Failed to save order', true);
      }

      document.getElementById('saveBtn').disabled = false;
      document.getElementById('saveBtn').innerHTML = '<i class="fas fa-check-circle"></i> Confirm & Save Order';
    }

    function resetForm() {
      document.getElementById('restaurantName').value = '';
      document.getElementById('contactPerson').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('email').value = '';
      document.getElementById('location').value = '';
      document.getElementById('deliveryFee').value = '0';
      document.getElementById('notes').value = '';
      
      document.getElementById('productRows').innerHTML = `
        <div class="product-row" data-index="0">
          <div class="form-group" style="flex:2;">
            <label>Product</label>
            <select class="product-select" onchange="onProductChange(this)" style="width:100%;">
              <option value="">— Select from inventory —</option>
            </select>
            <div class="stock-info" id="stockInfo0"></div>
          </div>
          <div class="form-group" style="flex:1;">
            <label>Qty</label>
            <input type="number" class="product-qty" value="1" min="1" onchange="validateQty(this)" oninput="validateQty(this)">
          </div>
          <button class="btn-remove" onclick="removeProductRow(this)" title="Remove">✕</button>
        </div>
      `;
      rowCount = 1;
      populateInventoryDropdowns();
      updatePrice();
    }

    // Firebase: Load inventory
    database.ref('fusion_foods_inventory').on('value', (snapshot) => {
      allInventory = snapshot.val() || {};
      // Add id to each product for reference
      Object.entries(allInventory).forEach(([id, product]) => {
        if (product) product.id = id;
      });
      populateInventoryDropdowns();
    });

    auth.onAuthStateChanged((user) => { if (!user) window.location.href = '/'; });
    updatePrice();
    window.addProductRow = addProductRow;
    window.removeProductRow = removeProductRow;
    window.onProductChange = onProductChange;
    window.validateQty = validateQty;
  </script>
</body>
</html>
