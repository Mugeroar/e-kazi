<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Inventory | Fusion Foods</title>
  
  <meta name="theme-color" content="#10b981">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #10b981;
      --green-dark: #059669;
      --green-light: #34d399;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #a7f3d0;
      --red: #ef4444;
      --orange: #f59e0b;
      --amber: #d97706;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #ecfdf5 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(16, 185, 129, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #34d399, #059669);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #10b981; -webkit-text-fill-color: #10b981; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--green-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--green); color: white; }

    .container { padding: 1rem 2%; flex: 1; }

    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--green-dark); margin-right: 6px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-mini {
      background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
      border: 1px solid #a7f3d0; box-shadow: 0 2px 8px rgba(5,150,105,0.03);
    }
    .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--green-dark); line-height: 1.1; }
    .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

    .action-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    .filter-btn {
      padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0;
      background: white; color: #64748b; font-weight: 600; font-size: 0.65rem;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--green); color: var(--green-dark); }
    .filter-btn.active { background: var(--green); color: white; border-color: var(--green); }
    .search-box { flex: 1; min-width: 150px; max-width: 300px; position: relative; }
    .search-box input {
      width: 100%; padding: 0.35rem 0.8rem 0.35rem 2rem; border-radius: 20px;
      border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif;
    }
    .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.7rem; }
    .btn {
      padding: 0.5rem 1rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; font-family: inherit; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--green); color: white; }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }

    .product-card {
      background: white; border-radius: 16px; padding: 1rem;
      border: 1px solid #a7f3d0; box-shadow: 0 3px 12px rgba(5,150,105,0.03);
      transition: all 0.2s; position: relative;
    }
    .product-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(5,150,105,0.08); }
    .product-card.linked { border-left: 3px solid #10b981; }
    .product-card.unlinked { border-left: 3px solid #f59e0b; opacity: 0.9; }
    
    .product-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.6rem; }
    .product-card-header h3 { font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .link-badge {
      padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.55rem; font-weight: 700;
    }
    .badge-linked { background: #d1fae5; color: #065f46; }
    .badge-unlinked { background: #fef3c7; color: #92400e; }
    
    .stock-badge {
      padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.6rem; font-weight: 700;
    }
    .stock-high { background: #d1fae5; color: #065f46; }
    .stock-medium { background: #fef3c7; color: #92400e; }
    .stock-low { background: #fee2e2; color: #991b1b; }
    .stock-out { background: #f1f5f9; color: #64748b; }

    .product-info { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 0.7rem; margin-bottom: 0.6rem; }
    .product-info div { color: var(--text-muted); }
    .product-info strong { color: var(--text-primary); display: block; font-size: 0.6rem; text-transform: uppercase; }

    .product-actions { display: flex; gap: 4px; flex-wrap: wrap; }
    .btn-sm {
      padding: 0.25rem 0.6rem; border-radius: 8px; border: none; font-weight: 600;
      font-size: 0.6rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 3px; transition: all 0.15s; font-family: inherit;
    }
    .btn-edit { background: #ecfdf5; color: #059669; }
    .btn-edit:hover { background: #10b981; color: white; }
    .btn-delete { background: #fee2e2; color: #991b1b; }
    .btn-delete:hover { background: #ef4444; color: white; }
    .btn-link { background: #eff6ff; color: #2563eb; }
    .btn-link:hover { background: #3b82f6; color: white; }

    .empty-state { text-align: center; padding: 3rem; color: #94a3b8; grid-column: 1 / -1; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
      align-items: center; backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 20px; padding: 1.5rem; max-width: 550px;
      width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; color: var(--green-dark); }
    .form-group { margin-bottom: 0.7rem; }
    .form-group label {
      display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
      background: #f8fafc;
    }
    .form-group select { cursor: pointer; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--green); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(16,185,129,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="fusion-foods-dashboard.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Fusion Foods" class="logo-img">
      <span class="logo-text">Fusion <span>Foods</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/fusion-foods/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="/workspaces/fusion-foods/products.html" class="nav-btn"><i class="fas fa-tags"></i> Products</a>
      <a href="/workspaces/fusion-foods/new-order.html" class="nav-btn"><i class="fas fa-plus"></i> New Order</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-boxes-stacked"></i> Inventory Management</h1>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-secondary" onclick="syncMissingProducts()"><i class="fas fa-sync-alt"></i> Sync Products</button>
        <button class="btn btn-primary" onclick="showAddModal()"><i class="fas fa-plus"></i> Add Stock</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-mini"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Items</div></div>
      <div class="stat-mini"><div class="stat-num" id="statInStock">0</div><div class="stat-label">In Stock</div></div>
      <div class="stat-mini"><div class="stat-num" id="statLow">0</div><div class="stat-label">Low Stock</div></div>
      <div class="stat-mini"><div class="stat-num" id="statValue">0</div><div class="stat-label">Total Value (KES)</div></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="vegetables">🥬 Vegetables</button>
      <button class="filter-btn" data-filter="meat">🥩 Meat</button>
      <button class="filter-btn" data-filter="dairy">🥛 Dairy</button>
      <button class="filter-btn" data-filter="grains">🌾 Grains</button>
      <button class="filter-btn" data-filter="spices">🌶️ Spices</button>
      <button class="filter-btn" data-filter="beverages">🥤 Beverages</button>
      <button class="filter-btn" data-filter="oils">🫒 Oils</button>
      <button class="filter-btn" data-filter="unlinked">⚠️ Unlinked</button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search inventory...">
      </div>
    </div>

    <div class="cards-grid" id="inventoryGrid">
      <div class="empty-state">Loading inventory...</div>
    </div>
  </div>

  <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let inventoryData = {};
    let productsCatalog = {};
    let currentFilter = 'all';
    let searchQuery = '';

    function showToast(msg, isError = false) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function getStockClass(qty) {
      if (qty <= 0) return 'stock-out';
      if (qty <= 10) return 'stock-low';
      if (qty <= 50) return 'stock-medium';
      return 'stock-high';
    }

    function getStockLabel(qty) {
      if (qty <= 0) return 'Out of Stock';
      if (qty <= 10) return 'Low Stock';
      if (qty <= 50) return 'In Stock';
      return 'Well Stocked';
    }

    function getCategoryIcon(category) {
      const icons = {
        vegetables: '🥬', meat: '🥩', dairy: '🥛', grains: '🌾',
        spices: '🌶️', beverages: '🥤', oils: '🫒', bakery: '🍞', other: '📦'
      };
      return icons[category?.toLowerCase()] || '📦';
    }

    // Merge inventory with product catalog
    function getMergedInventory() {
      const merged = [];
      
      // Add all inventory items
      Object.entries(inventoryData).forEach(([id, inv]) => {
        if (!inv) return;
        const linkedProduct = Object.entries(productsCatalog).find(([pid, prod]) => 
          prod && (prod.name?.toLowerCase() === inv.name?.toLowerCase() || pid === inv.productId)
        );
        
        merged.push({
          id,
          name: inv.name || 'Unnamed',
          category: inv.category || linkedProduct?.[1]?.category || 'other',
          unit: inv.unit || linkedProduct?.[1]?.unit || 'units',
          quantity: inv.quantity || 0,
          unitPrice: inv.unitPrice || linkedProduct?.[1]?.unitPrice || 0,
          supplier: inv.supplier || '',
          productId: inv.productId || linkedProduct?.[0] || null,
          linkedProduct: linkedProduct?.[1] || null,
          isLinked: !!linkedProduct,
          updatedAt: inv.updatedAt
        });
      });

      // Add products that exist in catalog but not in inventory
      Object.entries(productsCatalog).forEach(([pid, prod]) => {
        if (!prod || !prod.isActive) return;
        const existsInInventory = merged.some(item => 
          item.productId === pid || item.name?.toLowerCase() === prod.name?.toLowerCase()
        );
        
        if (!existsInInventory) {
          merged.push({
            id: `new_${pid}`,
            name: prod.name,
            category: prod.category || 'other',
            unit: prod.unit || 'units',
            quantity: 0,
            unitPrice: prod.unitPrice || 0,
            supplier: prod.supplier || '',
            productId: pid,
            linkedProduct: prod,
            isLinked: true,
            isMissing: true,
            updatedAt: null
          });
        }
      });

      return merged;
    }

    function renderInventory() {
      const grid = document.getElementById('inventoryGrid');
      let items = getMergedInventory();

      // Apply category filter
      if (currentFilter === 'unlinked') {
        items = items.filter(item => !item.isLinked && !item.isMissing);
      } else if (currentFilter !== 'all') {
        items = items.filter(item => item.category === currentFilter);
      }

      // Apply search
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        items = items.filter(item => item.name.toLowerCase().includes(q));
      }

      if (!items.length) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-box-open" style="font-size:2rem;display:block;margin-bottom:8px;"></i>No inventory items found</div>';
        return;
      }

      grid.innerHTML = items.map(item => {
        const qty = item.quantity || 0;
        const value = qty * (item.unitPrice || 0);
        const icon = getCategoryIcon(item.category);
        
        return `
          <div class="product-card ${item.isLinked ? 'linked' : 'unlinked'}">
            <div class="product-card-header">
              <h3>${icon} ${item.name}</h3>
              <div style="display:flex;gap:4px;align-items:center;">
                ${item.isMissing ? '<span class="link-badge badge-unlinked">New</span>' : ''}
                ${!item.isLinked && !item.isMissing ? '<span class="link-badge badge-unlinked">Unlinked</span>' : ''}
                ${item.isLinked && !item.isMissing ? '<span class="link-badge badge-linked">Linked</span>' : ''}
                <span class="stock-badge ${getStockClass(qty)}">${getStockLabel(qty)}</span>
              </div>
            </div>
            <div class="product-info">
              <div><strong>Category</strong>${item.category}</div>
              <div><strong>Quantity</strong>${qty} ${item.unit}</div>
              <div><strong>Unit Price</strong>KES ${(item.unitPrice || 0).toLocaleString()}</div>
              <div><strong>Value</strong>KES ${value.toLocaleString()}</div>
            </div>
            ${item.linkedProduct ? `
              <div style="font-size:0.6rem;color:#64748b;margin-bottom:0.6rem;">
                <i class="fas fa-link" style="color:#10b981;"></i> 
                Catalog: ${item.linkedProduct.sku || item.linkedProduct.name}
                ${item.linkedProduct.description ? ` - ${item.linkedProduct.description.substring(0, 40)}...` : ''}
              </div>
            ` : ''}
            <div class="product-actions">
              ${item.isMissing ? `
                <button class="btn-sm btn-link" onclick="addToInventory('${item.productId}')"><i class="fas fa-plus"></i> Add to Inventory</button>
              ` : `
                <button class="btn-sm btn-edit" onclick="editInventoryItem('${item.id}')"><i class="fas fa-edit"></i> Edit</button>
                ${!item.isLinked ? `<button class="btn-sm btn-link" onclick="linkToProduct('${item.id}')"><i class="fas fa-link"></i> Link</button>` : ''}
                <button class="btn-sm btn-delete" onclick="deleteInventoryItem('${item.id}')"><i class="fas fa-trash"></i> Delete</button>
              `}
            </div>
          </div>`;
      }).join('');

      updateStats();
    }

    function updateStats() {
      const items = getMergedInventory().filter(item => !item.isMissing);
      const total = items.length;
      const inStock = items.filter(item => (item.quantity || 0) > 10).length;
      const low = items.filter(item => (item.quantity || 0) > 0 && (item.quantity || 0) <= 10).length;
      const value = items.reduce((s, item) => s + ((item.quantity || 0) * (item.unitPrice || 0)), 0);

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statInStock').textContent = inStock;
      document.getElementById('statLow').textContent = low;
      document.getElementById('statValue').textContent = value.toLocaleString();
    }

    function showAddModal() {
      const products = Object.entries(productsCatalog)
        .filter(([_, p]) => p && p.isActive !== false)
        .map(([id, p]) => ({ id, ...p }));

      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-plus-circle"></i> Add Stock</h3>
        <div class="form-group">
          <label>Select Product from Catalog *</label>
          <select id="pProductId" onchange="autoFillFromCatalog()">
            <option value="">-- Choose a product --</option>
            ${products.map(p => `<option value="${p.id}" data-name="${p.name}" data-category="${p.category}" data-unit="${p.unit}" data-price="${p.unitPrice}" data-supplier="${p.supplier || ''}">${getCategoryIcon(p.category)} ${p.name} - KES ${p.unitPrice}/${p.unit}</option>`).join('')}
          </select>
        </div>
        <div style="background:#f0fdf4;padding:0.8rem;border-radius:10px;margin-bottom:0.7rem;font-size:0.65rem;color:#065f46;">
          <i class="fas fa-info-circle"></i> Select a product from the catalog to auto-fill details. You can also add a custom product below.
        </div>
        <div class="form-row">
          <div class="form-group"><label>Product Name *</label><input type="text" id="pName" placeholder="Auto-filled from catalog"></div>
          <div class="form-group"><label>Category</label><select id="pCategory">
            <option value="vegetables">🥬 Vegetables</option><option value="meat">🥩 Meat</option>
            <option value="dairy">🥛 Dairy</option><option value="grains">🌾 Grains</option>
            <option value="spices">🌶️ Spices</option><option value="beverages">🥤 Beverages</option>
            <option value="oils">🫒 Oils</option><option value="other">📦 Other</option>
          </select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Unit</label><select id="pUnit">
            <option value="kg">Kilogram (kg)</option><option value="g">Gram (g)</option>
            <option value="L">Litre (L)</option><option value="ml">Millilitre (ml)</option>
            <option value="piece">Piece</option><option value="crate">Crate</option><option value="sack">Sack</option><option value="bunch">Bunch</option>
          </select></div>
          <div class="form-group"><label>Quantity *</label><input type="number" id="pQty" value="1" min="0"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Unit Price (KES)</label><input type="number" id="pPrice" value="0" min="0"></div>
          <div class="form-group"><label>Supplier</label><input type="text" id="pSupplier" placeholder="Supplier name"></div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveInventoryItem()"><i class="fas fa-save"></i> Save</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    function autoFillFromCatalog() {
      const select = document.getElementById('pProductId');
      const selectedOption = select.options[select.selectedIndex];
      
      if (selectedOption && selectedOption.dataset.name) {
        document.getElementById('pName').value = selectedOption.dataset.name;
        document.getElementById('pCategory').value = selectedOption.dataset.category;
        document.getElementById('pUnit').value = selectedOption.dataset.unit;
        document.getElementById('pPrice').value = selectedOption.dataset.price;
        document.getElementById('pSupplier').value = selectedOption.dataset.supplier || '';
      }
    }

    async function saveInventoryItem() {
      const name = document.getElementById('pName').value.trim();
      const qty = parseInt(document.getElementById('pQty').value) || 0;
      const price = parseInt(document.getElementById('pPrice').value) || 0;
      const productId = document.getElementById('pProductId').value;
      
      if (!name) { showToast('Enter product name', true); return; }

      try {
        const inventoryRef = database.ref('fusion_foods_inventory').push();
        await inventoryRef.set({
          name,
          category: document.getElementById('pCategory').value,
          unit: document.getElementById('pUnit').value,
          quantity: qty,
          unitPrice: price,
          supplier: document.getElementById('pSupplier').value.trim(),
          productId: productId || null,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('✅ Stock added!');
        closeModal();
      } catch (e) { 
        console.error(e);
        showToast('Failed to save', true); 
      }
    }

    function addToInventory(productId) {
      const product = productsCatalog[productId];
      if (!product) return;

      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-plus-circle"></i> Add "${product.name}" to Inventory</h3>
        <div style="background:#f0fdf4;padding:0.8rem;border-radius:10px;margin-bottom:0.7rem;font-size:0.65rem;color:#065f46;">
          <i class="fas fa-info-circle"></i> Adding product from catalog: <strong>${product.sku || product.name}</strong>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Product Name</label><input type="text" id="pName" value="${product.name}" readonly></div>
          <div class="form-group"><label>Category</label><input type="text" value="${product.category}" readonly></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Unit</label><input type="text" value="${product.unit}" readonly></div>
          <div class="form-group"><label>Quantity *</label><input type="number" id="pQty" value="0" min="0"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Unit Price (KES)</label><input type="number" id="pPrice" value="${product.unitPrice || 0}" min="0"></div>
          <div class="form-group"><label>Supplier</label><input type="text" id="pSupplier" value="${product.supplier || ''}"></div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveFromCatalog('${productId}')"><i class="fas fa-save"></i> Add to Inventory</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    async function saveFromCatalog(productId) {
      const product = productsCatalog[productId];
      if (!product) return;

      const qty = parseInt(document.getElementById('pQty').value) || 0;
      const price = parseInt(document.getElementById('pPrice').value) || 0;

      try {
        await database.ref('fusion_foods_inventory').push().set({
          name: product.name,
          category: product.category,
          unit: product.unit,
          quantity: qty,
          unitPrice: price || product.unitPrice || 0,
          supplier: document.getElementById('pSupplier').value.trim(),
          productId: productId,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('✅ Added to inventory!');
        closeModal();
      } catch (e) {
        showToast('Failed to add', true);
      }
    }

    function editInventoryItem(itemId) {
      const items = getMergedInventory();
      const item = items.find(i => i.id === itemId);
      if (!item) return;

      const products = Object.entries(productsCatalog)
        .filter(([_, p]) => p && p.isActive !== false)
        .map(([id, p]) => ({ id, ...p }));

      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-edit"></i> Edit Stock - ${item.name}</h3>
        <div class="form-group">
          <label>Link to Product Catalog</label>
          <select id="epProductId">
            <option value="">-- Not linked --</option>
            ${products.map(p => `<option value="${p.id}" ${item.productId === p.id ? 'selected' : ''}>${getCategoryIcon(p.category)} ${p.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Product Name</label><input type="text" id="epName" value="${item.name}"></div>
          <div class="form-group"><label>Category</label><select id="epCategory">
            ${['vegetables','meat','dairy','grains','spices','beverages','oils','other'].map(c => `<option value="${c}" ${item.category === c ? 'selected' : ''}>${getCategoryIcon(c)} ${c}</option>`).join('')}
          </select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Unit</label><select id="epUnit">
            ${['kg','g','L','ml','piece','crate','sack','bunch'].map(u => `<option value="${u}" ${item.unit === u ? 'selected' : ''}>${u}</option>`).join('')}
          </select></div>
          <div class="form-group"><label>Quantity</label><input type="number" id="epQty" value="${item.quantity || 0}"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Unit Price (KES)</label><input type="number" id="epPrice" value="${item.unitPrice || 0}"></div>
          <div class="form-group"><label>Supplier</label><input type="text" id="epSupplier" value="${item.supplier || ''}"></div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="updateInventoryItem('${itemId}')"><i class="fas fa-save"></i> Update</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    async function updateInventoryItem(itemId) {
      try {
        const productId = document.getElementById('epProductId').value;
        await database.ref(`fusion_foods_inventory/${itemId}`).update({
          name: document.getElementById('epName').value.trim(),
          category: document.getElementById('epCategory').value,
          unit: document.getElementById('epUnit').value,
          quantity: parseInt(document.getElementById('epQty').value) || 0,
          unitPrice: parseInt(document.getElementById('epPrice').value) || 0,
          supplier: document.getElementById('epSupplier').value.trim(),
          productId: productId || null,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('✅ Updated!');
        closeModal();
      } catch (e) { 
        console.error(e);
        showToast('Failed to update', true); 
      }
    }

    function linkToProduct(itemId) {
      const items = getMergedInventory();
      const item = items.find(i => i.id === itemId);
      if (!item) return;

      const products = Object.entries(productsCatalog)
        .filter(([_, p]) => p && p.isActive !== false)
        .map(([id, p]) => ({ id, ...p }));

      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-link"></i> Link "${item.name}" to Product</h3>
        <div class="form-group">
          <label>Select Product from Catalog</label>
          <select id="linkProductId">
            <option value="">-- Choose a product --</option>
            ${products.map(p => `<option value="${p.id}">${getCategoryIcon(p.category)} ${p.name} - ${p.sku || ''}</option>`).join('')}
          </select>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveLink('${itemId}')"><i class="fas fa-link"></i> Link Product</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    async function saveLink(itemId) {
      const productId = document.getElementById('linkProductId').value;
      if (!productId) { showToast('Select a product', true); return; }

      try {
        await database.ref(`fusion_foods_inventory/${itemId}`).update({
          productId: productId,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('✅ Linked successfully!');
        closeModal();
      } catch (e) {
        showToast('Failed to link', true);
      }
    }

    async function deleteInventoryItem(itemId) {
      if (!confirm('Delete this inventory item?')) return;
      try {
        await database.ref(`fusion_foods_inventory/${itemId}`).remove();
        showToast('✅ Deleted');
      } catch (e) { showToast('Failed to delete', true); }
    }

    async function syncMissingProducts() {
      const merged = getMergedInventory();
      const missingProducts = merged.filter(item => item.isMissing && item.productId);
      
      if (missingProducts.length === 0) {
        showToast('All products are already in inventory!');
        return;
      }

      if (!confirm(`Add ${missingProducts.length} missing products to inventory with zero quantity?`)) return;

      const updates = {};
      let successCount = 0;

      for (const item of missingProducts) {
        try {
          await database.ref('fusion_foods_inventory').push().set({
            name: item.name,
            category: item.category,
            unit: item.unit,
            quantity: 0,
            unitPrice: item.unitPrice || 0,
            supplier: item.supplier || '',
            productId: item.productId,
            updatedAt: firebase.database.ServerValue.TIMESTAMP
          });
          successCount++;
        } catch (e) {
          console.error('Failed to sync:', item.name);
        }
      }

      showToast(`✅ Synced ${successCount} products!`);
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    // Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderInventory();
      });
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderInventory();
    });

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal')) closeModal();
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    // Firebase listeners
    database.ref('fusion_foods_inventory').on('value', (snapshot) => {
      inventoryData = snapshot.val() || {};
      renderInventory();
    });

    database.ref('fusion_foods_products').on('value', (snapshot) => {
      productsCatalog = snapshot.val() || {};
      renderInventory();
    });

    auth.onAuthStateChanged((user) => { if (!user) window.location.href = '/'; });
    
    // Expose functions globally
    window.showAddModal = showAddModal;
    window.editInventoryItem = editInventoryItem;
    window.deleteInventoryItem = deleteInventoryItem;
    window.saveInventoryItem = saveInventoryItem;
    window.updateInventoryItem = updateInventoryItem;
    window.addToInventory = addToInventory;
    window.saveFromCatalog = saveFromCatalog;
    window.linkToProduct = linkToProduct;
    window.saveLink = saveLink;
    window.syncMissingProducts = syncMissingProducts;
    window.autoFillFromCatalog = autoFillFromCatalog;
    window.closeModal = closeModal;
  </script>
</body>
</html>
