<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Manage Stores | Fusion Foods</title>
  
  <meta name="theme-color" content="#10b981">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #10b981;
      --green-dark: #059669;
      --green-light: #34d399;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #a7f3d0;
      --red: #ef4444;
      --orange: #f59e0b;
      --blue: #3b82f6;
      --purple: #7c3aed;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #ecfdf5 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(16, 185, 129, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #34d399, #059669);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #10b981; -webkit-text-fill-color: #10b981; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--green-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--green); color: white; }
    .nav-btn.map-btn { background: rgba(59, 130, 246, 0.08); border-color: rgba(59, 130, 246, 0.2); color: #2563eb; }
    .nav-btn.map-btn:hover { background: #3b82f6; color: white; }

    .container { padding: 1rem 2%; flex: 1; }

    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--green-dark); margin-right: 6px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-mini {
      background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
      border: 1px solid #a7f3d0; box-shadow: 0 2px 8px rgba(5,150,105,0.03);
    }
    .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--green-dark); line-height: 1.1; }
    .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

    .search-box { flex: 1; min-width: 200px; max-width: 350px; position: relative; margin-bottom: 1rem; }
    .search-box input {
      width: 100%; padding: 0.45rem 0.8rem 0.45rem 2.2rem; border-radius: 20px;
      border: 1.5px solid #e2e8f0; font-size: 0.75rem; font-family: 'Inter', sans-serif;
    }
    .search-box i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.8rem; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }

    .store-card {
      background: white; border-radius: 16px; padding: 1.2rem;
      border: 1px solid #a7f3d0; box-shadow: 0 3px 12px rgba(5,150,105,0.03);
      transition: all 0.2s;
    }
    .store-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(5,150,105,0.08); }
    .store-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
    .store-card-header h3 { font-size: 0.95rem; font-weight: 700; }
    .store-badge {
      padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.6rem; font-weight: 700;
    }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-vip { background: #fef3c7; color: #92400e; }
    .badge-new { background: #e0f2fe; color: #0369a1; }
    .badge-inactive { background: #f1f5f9; color: #64748b; }

    .store-info { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.7rem; margin-bottom: 0.8rem; }
    .store-info div { color: var(--text-muted); }
    .store-info strong { color: var(--text-primary); display: block; font-size: 0.6rem; text-transform: uppercase; }

    .store-stats { display: flex; gap: 10px; margin-bottom: 0.8rem; }
    .store-stat {
      flex: 1; text-align: center; background: #f8fafc; padding: 0.5rem; border-radius: 10px;
    }
    .store-stat .val { font-size: 1rem; font-weight: 800; color: var(--green-dark); }
    .store-stat .lbl { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; }

    .store-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-sm {
      padding: 0.3rem 0.7rem; border-radius: 8px; border: none; font-weight: 600;
      font-size: 0.65rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 4px; transition: all 0.15s; font-family: inherit;
    }
    .btn-view { background: #f1f5f9; color: #475569; }
    .btn-view:hover { background: #475569; color: white; }
    .btn-edit { background: #ecfdf5; color: #059669; }
    .btn-edit:hover { background: #10b981; color: white; }
    .btn-orders { background: #e0f2fe; color: #0369a1; }
    .btn-orders:hover { background: #3b82f6; color: white; }
    .btn-map { background: #ede9fe; color: #5b21b6; }
    .btn-map:hover { background: #7c3aed; color: white; }

    .empty-state { text-align: center; padding: 3rem; color: #94a3b8; grid-column: 1 / -1; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
      align-items: center; backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 20px; padding: 1.5rem; max-width: 500px;
      width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; color: var(--green-dark); }
    .form-group { margin-bottom: 0.7rem; }
    .form-group label {
      display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
      background: #f8fafc;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; font-family: inherit; transition: all 0.15s;
    }
    .btn-primary { background: var(--green); color: white; }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--green); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(16,185,129,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="fusion-foods-dashboard.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Fusion Foods" class="logo-img">
      <span class="logo-text">Fusion <span>Foods</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/fusion-foods/map.html" class="nav-btn map-btn"><i class="fas fa-map-location-dot"></i> Add to Map</a>
      <a href="/workspaces/fusion-foods/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="/workspaces/fusion-foods/new-order.html" class="nav-btn"><i class="fas fa-plus"></i> New Order</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-store-alt"></i> Manage Stores</h1>
      <button class="btn btn-primary" onclick="showAddModal()" style="padding:0.5rem 1rem;font-size:0.7rem;">
        <i class="fas fa-plus"></i> Add Store
      </button>
    </div>

    <div class="stats-row">
      <div class="stat-mini"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Stores</div></div>
      <div class="stat-mini"><div class="stat-num" id="statActive">0</div><div class="stat-label">Active</div></div>
      <div class="stat-mini"><div class="stat-num" id="statOrders">0</div><div class="stat-label">Total Orders</div></div>
      <div class="stat-mini"><div class="stat-num" id="statRevenue">0</div><div class="stat-label">Revenue (KES)</div></div>
    </div>

    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search stores by name, location, phone...">
    </div>

    <div class="cards-grid" id="storesGrid">
      <div class="empty-state">Loading stores...</div>
    </div>
  </div>

  <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allStores = {};
    let allOrders = {};
    let searchQuery = '';

    function showToast(msg, isError = false) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function getInitials(name) {
      if (!name) return 'ST';
      return String(name).split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
    }

    function getStoreOrders(storeName) {
      return Object.values(allOrders).filter(o => o && o.restaurantName === storeName);
    }

    function renderStores() {
      const grid = document.getElementById('storesGrid');
      let stores = Object.entries(allStores).map(([id, data]) => ({ id, ...data }));

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        stores = stores.filter(s => 
          (s.name || s.businessName || '').toLowerCase().includes(q) ||
          (s.location || '').toLowerCase().includes(q) ||
          (s.phone || '').toLowerCase().includes(q)
        );
      }

      stores.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      if (!stores.length) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-store-slash" style="font-size:2rem;display:block;margin-bottom:8px;"></i>No stores found</div>';
        return;
      }

      grid.innerHTML = stores.map(store => {
        const name = store.name || store.businessName || 'Unnamed Store';
        const orders = getStoreOrders(name);
        const orderCount = orders.length;
        const revenue = orders.reduce((s, o) => s + (o.total || 0), 0);
        const status = store.status || 'active';
        const badgeClass = status === 'active' ? 'badge-active' : status === 'vip' ? 'badge-vip' : status === 'new' ? 'badge-new' : 'badge-inactive';
        const lastOrder = orders.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))[0];

        return `
          <div class="store-card">
            <div class="store-card-header">
              <h3>${name}</h3>
              <span class="store-badge ${badgeClass}">${status.toUpperCase()}</span>
            </div>
            <div class="store-info">
              <div><strong>Contact</strong>${store.contactPerson || store.manager || 'N/A'}</div>
              <div><strong>Phone</strong>${store.phone || 'N/A'}</div>
              <div><strong>Location</strong>${store.location || 'N/A'}</div>
              <div><strong>Email</strong>${store.email || 'N/A'}</div>
              <div><strong>Type</strong>${store.storeType || store.category || 'Restaurant'}</div>
              <div><strong>Joined</strong>${store.createdAt ? new Date(store.createdAt).toLocaleDateString() : 'N/A'}</div>
            </div>
            <div class="store-stats">
              <div class="store-stat"><div class="val">${orderCount}</div><div class="lbl">Orders</div></div>
              <div class="store-stat"><div class="val">KES ${revenue.toLocaleString()}</div><div class="lbl">Revenue</div></div>
              <div class="store-stat"><div class="val">${lastOrder ? new Date(lastOrder.createdAt).toLocaleDateString() : '—'}</div><div class="lbl">Last Order</div></div>
            </div>
            <div class="store-actions">
              <button class="btn-sm btn-view" onclick="viewStore('${store.id}')"><i class="fas fa-eye"></i> View</button>
              <button class="btn-sm btn-edit" onclick="editStore('${store.id}')"><i class="fas fa-edit"></i> Edit</button>
              <button class="btn-sm btn-orders" onclick="viewStoreOrders('${store.id}')"><i class="fas fa-shopping-cart"></i> Orders</button>
              <button class="btn-sm btn-map" onclick="window.open('/workspaces/brandinn/map.html','_blank')"><i class="fas fa-map-pin"></i> Map</button>
            </div>
          </div>`;
      }).join('');

      updateStats();
    }

    function updateStats() {
      const stores = Object.values(allStores);
      const active = stores.filter(s => s.status === 'active' || !s.status).length;
      const orders = Object.values(allOrders).filter(o => o);
      const revenue = orders.reduce((s, o) => s + (o.total || 0), 0);

      document.getElementById('statTotal').textContent = stores.length;
      document.getElementById('statActive').textContent = active;
      document.getElementById('statOrders').textContent = orders.length;
      document.getElementById('statRevenue').textContent = revenue.toLocaleString();
    }

    function showAddModal() {
      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-plus-circle"></i> Add New Store</h3>
        <div class="form-row">
          <div class="form-group"><label>Store Name *</label><input type="text" id="sName" placeholder="e.g., Sunrise Cafe"></div>
          <div class="form-group"><label>Store Type</label><select id="sType">
            <option value="restaurant">Restaurant</option><option value="cafe">Cafe</option>
            <option value="hotel">Hotel</option><option value="catering">Catering</option>
            <option value="grocery">Grocery Store</option><option value="bakery">Bakery</option>
            <option value="other">Other</option>
          </select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Contact Person *</label><input type="text" id="sContact" placeholder="Full name"></div>
          <div class="form-group"><label>Phone *</label><input type="tel" id="sPhone" placeholder="+254..."></div>
        </div>
        <div class="form-group"><label>Email</label><input type="email" id="sEmail" placeholder="store@email.com"></div>
        <div class="form-row">
          <div class="form-group"><label>Location *</label><input type="text" id="sLocation" placeholder="e.g., Westlands, Nairobi"></div>
          <div class="form-group"><label>Status</label><select id="sStatus">
            <option value="new">New</option><option value="active">Active</option><option value="vip">VIP</option>
          </select></div>
        </div>
        <div class="form-group"><label>Notes</label><textarea id="sNotes" rows="2" placeholder="Preferences, delivery times..."></textarea></div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveStore()"><i class="fas fa-save"></i> Save Store</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    async function saveStore() {
      const name = document.getElementById('sName').value.trim();
      const contact = document.getElementById('sContact').value.trim();
      const phone = document.getElementById('sPhone').value.trim();
      const location = document.getElementById('sLocation').value.trim();
      if (!name || !contact || !phone || !location) { showToast('Fill required fields', true); return; }

      try {
        await database.ref('fusion_foods_stores').push().set({
          name, contactPerson: contact, phone,
          email: document.getElementById('sEmail').value.trim(),
          location,
          storeType: document.getElementById('sType').value,
          status: document.getElementById('sStatus').value,
          notes: document.getElementById('sNotes').value.trim(),
          createdAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('✅ Store added!');
        closeModal();
      } catch (e) { showToast('Failed to save', true); }
    }

    function editStore(storeId) {
      const store = allStores[storeId];
      if (!store) return;
      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-edit"></i> Edit Store</h3>
        <div class="form-row">
          <div class="form-group"><label>Store Name</label><input type="text" id="esName" value="${store.name || store.businessName || ''}"></div>
          <div class="form-group"><label>Store Type</label><select id="esType">
            ${['restaurant','cafe','hotel','catering','grocery','bakery','other'].map(t => `<option value="${t}" ${(store.storeType || store.category) === t ? 'selected' : ''}>${t}</option>`).join('')}
          </select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Contact Person</label><input type="text" id="esContact" value="${store.contactPerson || store.manager || ''}"></div>
          <div class="form-group"><label>Phone</label><input type="tel" id="esPhone" value="${store.phone || ''}"></div>
        </div>
        <div class="form-group"><label>Email</label><input type="email" id="esEmail" value="${store.email || ''}"></div>
        <div class="form-row">
          <div class="form-group"><label>Location</label><input type="text" id="esLocation" value="${store.location || ''}"></div>
          <div class="form-group"><label>Status</label><select id="esStatus">
            ${['new','active','vip','inactive'].map(s => `<option value="${s}" ${(store.status || 'active') === s ? 'selected' : ''}>${s}</option>`).join('')}
          </select></div>
        </div>
        <div class="form-group"><label>Notes</label><textarea id="esNotes" rows="2">${store.notes || ''}</textarea></div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="updateStore('${storeId}')"><i class="fas fa-save"></i> Update</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    async function updateStore(storeId) {
      try {
        await database.ref(`fusion_foods_stores/${storeId}`).update({
          name: document.getElementById('esName').value.trim(),
          contactPerson: document.getElementById('esContact').value.trim(),
          phone: document.getElementById('esPhone').value.trim(),
          email: document.getElementById('esEmail').value.trim(),
          location: document.getElementById('esLocation').value.trim(),
          storeType: document.getElementById('esType').value,
          status: document.getElementById('esStatus').value,
          notes: document.getElementById('esNotes').value.trim(),
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('✅ Updated!');
        closeModal();
      } catch (e) { showToast('Failed to update', true); }
    }

    function viewStore(storeId) {
      const store = allStores[storeId];
      if (!store) return;
      const name = store.name || store.businessName || 'Store';
      const orders = getStoreOrders(name);
      
      modalContent.innerHTML = `
        <h3><i class="fas fa-store"></i> ${name}</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.75rem;margin-bottom:1rem;">
          <div><strong>Contact:</strong> ${store.contactPerson || store.manager || 'N/A'}</div>
          <div><strong>Phone:</strong> ${store.phone || 'N/A'}</div>
          <div><strong>Email:</strong> ${store.email || 'N/A'}</div>
          <div><strong>Location:</strong> ${store.location || 'N/A'}</div>
          <div><strong>Type:</strong> ${store.storeType || store.category || 'N/A'}</div>
          <div><strong>Status:</strong> ${store.status || 'active'}</div>
          <div><strong>Orders:</strong> ${orders.length}</div>
          <div><strong>Revenue:</strong> KES ${orders.reduce((s,o) => s+(o.total||0), 0).toLocaleString()}</div>
        </div>
        ${orders.length ? `
          <p style="font-weight:700;font-size:0.7rem;margin-bottom:0.5rem;">Recent Orders:</p>
          ${orders.slice(0,5).map(o => `
            <div style="background:#f8fafc;padding:0.5rem;border-radius:8px;margin-bottom:4px;font-size:0.7rem;display:flex;justify-content:space-between;">
              <span>${o.products ? o.products.length : 0} items</span>
              <span>KES ${(o.total || 0).toLocaleString()}</span>
              <span style="color:#94a3b8;">${o.createdAt ? new Date(o.createdAt).toLocaleDateString() : ''}</span>
            </div>
          `).join('')}
        ` : ''}
        <div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    function viewStoreOrders(storeId) {
      const store = allStores[storeId];
      if (!store) return;
      const name = store.name || store.businessName || 'Store';
      window.location.href = `fusion-foods-receive.html?store=${encodeURIComponent(name)}`;
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderStores();
    });

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal')) closeModal();
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    // Firebase listeners
    database.ref('fusion_foods_stores').on('value', (snapshot) => {
      allStores = snapshot.val() || {};
      renderStores();
    });

    database.ref('fusion_foods_orders').on('value', (snapshot) => {
      allOrders = snapshot.val() || {};
      renderStores();
    });

    auth.onAuthStateChanged((user) => { if (!user) window.location.href = '/'; });
    window.showAddModal = showAddModal;
    window.editStore = editStore;
    window.viewStore = viewStore;
    window.viewStoreOrders = viewStoreOrders;
    window.saveStore = saveStore;
    window.updateStore = updateStore;
    window.closeModal = closeModal;
  </script>
</body>
</html>
