<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Products Catalog | Fusion Foods</title>
  
  <meta name="theme-color" content="#0d9488">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --teal: #0d9488;
      --teal-dark: #0f766e;
      --teal-light: #14b8a6;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --border-light: #99f6e4;
      --red: #ef4444;
      --orange: #f59e0b;
      --green: #10b981;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #f0fdfa 0%, #ffffff 100%);
      color: var(--text-primary);
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      padding: 0.5rem 2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(13, 148, 136, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 34px; width: 34px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2); }
    .logo-text {
      font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(145deg, #14b8a6, #0f766e);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text span { font-weight: 600; font-size: 0.7rem; background: #0d9488; -webkit-text-fill-color: #0d9488; margin-left: 3px; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(13, 148, 136, 0.08); border: 1px solid rgba(13, 148, 136, 0.2);
      padding: 0.4rem 0.8rem; border-radius: 25px; color: var(--teal-dark);
      font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--teal); color: white; }

    .container { padding: 1rem 2%; flex: 1; }

    .page-header { margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .page-header h1 i { color: var(--teal-dark); margin-right: 6px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-mini {
      background: white; border-radius: 14px; padding: 0.8rem 1rem; text-align: center;
      border: 1px solid var(--border-light); box-shadow: 0 2px 8px rgba(13,148,136,0.03);
    }
    .stat-mini .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--teal-dark); line-height: 1.1; }
    .stat-mini .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    .filter-btn {
      padding: 0.35rem 0.8rem; border-radius: 20px; border: 1.5px solid #e2e8f0;
      background: white; color: #64748b; font-weight: 600; font-size: 0.65rem;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--teal); color: var(--teal-dark); }
    .filter-btn.active { background: var(--teal); color: white; border-color: var(--teal); }
    .search-box { flex: 1; min-width: 150px; max-width: 300px; position: relative; }
    .search-box input {
      width: 100%; padding: 0.35rem 0.8rem 0.35rem 2rem; border-radius: 20px;
      border: 1.5px solid #e2e8f0; font-size: 0.7rem; font-family: 'Inter', sans-serif;
    }
    .search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.7rem; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

    .product-card {
      background: white; border-radius: 16px; padding: 1.2rem;
      border: 1px solid var(--border-light); box-shadow: 0 3px 12px rgba(13,148,136,0.04);
      transition: all 0.2s; display: flex; flex-direction: column; gap: 0.8rem;
    }
    .product-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(13,148,136,0.1); }
    
    .product-card-header { display: flex; gap: 12px; align-items: flex-start; }
    .product-image {
      width: 70px; height: 70px; border-radius: 12px; background: #f0fdfa;
      display: flex; align-items: center; justify-content: center; font-size: 2rem;
      border: 2px solid #ccfbf1; flex-shrink: 0; overflow: hidden;
    }
    .product-image img { width: 100%; height: 100%; object-fit: cover; }
    .product-main-info { flex: 1; }
    .product-main-info h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.2rem; color: #0f172a; }
    .product-sku { font-size: 0.6rem; color: #94a3b8; font-family: monospace; background: #f8fafc; padding: 2px 6px; border-radius: 4px; display: inline-block; }
    .product-description { font-size: 0.7rem; color: var(--text-muted); line-height: 1.5; margin-top: 0.3rem; }

    .product-meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .meta-tag {
      font-size: 0.6rem; padding: 0.15rem 0.5rem; border-radius: 10px;
      font-weight: 600; background: #f1f5f9; color: #475569;
    }
    .meta-tag.category { background: #f0fdfa; color: #0f766e; }
    .meta-tag.price { background: #fef3c7; color: #92400e; }

    .product-details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.65rem; }
    .product-details-grid div { color: var(--text-muted); }
    .product-details-grid strong { color: var(--text-primary); display: block; font-size: 0.6rem; text-transform: uppercase; margin-bottom: 1px; }

    .product-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; }
    .btn-sm {
      padding: 0.35rem 0.7rem; border-radius: 8px; border: none; font-weight: 600;
      font-size: 0.65rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 4px; transition: all 0.15s; font-family: inherit;
    }
    .btn-edit { background: #f0fdfa; color: #0f766e; }
    .btn-edit:hover { background: #0d9488; color: white; }
    .btn-delete { background: #fee2e2; color: #991b1b; }
    .btn-delete:hover { background: #ef4444; color: white; }
    .btn-preview { background: #eff6ff; color: #1d4ed8; }
    .btn-preview:hover { background: #3b82f6; color: white; }

    .empty-state { text-align: center; padding: 3rem; color: #94a3b8; grid-column: 1 / -1; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center;
      align-items: center; backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 20px; padding: 1.5rem; max-width: 550px;
      width: 95%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 0.95rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; color: var(--teal-dark); }
    .form-group { margin-bottom: 0.7rem; }
    .form-group label {
      display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.15rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.5rem 0.7rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.8rem; font-family: 'Inter', sans-serif;
      background: #f8fafc;
    }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; font-family: inherit; transition: all 0.15s;
    }
    .btn-primary { background: var(--teal); color: white; }
    .btn-primary:hover { background: var(--teal-dark); }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }

    .toast {
      position: fixed; bottom: 25px; right: 25px; background: var(--teal); color: white;
      padding: 0.7rem 1.2rem; border-radius: 20px; font-weight: 600; z-index: 4000;
      animation: slideIn 0.3s ease; box-shadow: 0 8px 20px rgba(13,148,136,0.25);
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .toast.error { background: var(--red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="fusion-foods-dashboard.html" class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Fusion Foods" class="logo-img">
      <span class="logo-text">Fusion <span>Foods</span></span>
    </a>
    <div class="nav-right">
      <a href="/workspaces/fusion-foods/index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <a href="/workspaces/fusion-foods/inventory.html" class="nav-btn"><i class="fas fa-boxes"></i> Inventory</a>
      <a href="/workspaces/fusion-foods/weekly-prices.html" class="nav-btn"><i class="fas fa-tag"></i> Weekly Prices</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-tags"></i> Product Catalog</h1>
      <button class="btn btn-primary" onclick="showAddModal()" style="padding:0.5rem 1rem;font-size:0.7rem;">
        <i class="fas fa-plus"></i> Add Product
      </button>
    </div>

    <div class="stats-row">
      <div class="stat-mini"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Products</div></div>
      <div class="stat-mini"><div class="stat-num" id="statActive">0</div><div class="stat-label">Active Products</div></div>
      <div class="stat-mini"><div class="stat-num" id="statCategories">0</div><div class="stat-label">Categories</div></div>
      <div class="stat-mini"><div class="stat-num" id="statAvgPrice">0</div><div class="stat-label">Avg Price (KES)</div></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="vegetables">🥬 Vegetables</button>
      <button class="filter-btn" data-filter="meat">🥩 Meat & Protein</button>
      <button class="filter-btn" data-filter="dairy">🥛 Dairy</button>
      <button class="filter-btn" data-filter="grains">🌾 Grains</button>
      <button class="filter-btn" data-filter="spices">🌶️ Spices</button>
      <button class="filter-btn" data-filter="beverages">🥤 Beverages</button>
      <button class="filter-btn" data-filter="oils">🫒 Oils</button>
      <button class="filter-btn" data-filter="bakery">🍞 Bakery</button>
      <button class="filter-btn" data-filter="other">📦 Other</button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search products by name or SKU...">
      </div>
    </div>

    <div class="cards-grid" id="productsGrid">
      <div class="empty-state">Loading products...</div>
    </div>
  </div>

  <div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
  <div id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app",
      messagingSenderId: "1024868637509",
      appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let allProducts = {};
    let currentFilter = 'all';
    let searchQuery = '';

    function showToast(msg, isError = false) {
      const container = document.getElementById('toastContainer');
      const existing = container.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function getCategoryIcon(category) {
      const icons = {
        vegetables: '🥬', meat: '🥩', dairy: '🥛', grains: '🌾',
        spices: '🌶️', beverages: '🥤', oils: '🫒', bakery: '🍞', other: '📦'
      };
      return icons[category?.toLowerCase()] || '📦';
    }

    function generateSKU(productName, id) {
      const prefix = (productName || 'PROD').substring(0, 3).toUpperCase();
      const shortId = (id || '0000').substring(0, 4);
      return `FF-${prefix}-${shortId}`;
    }

    function renderProducts() {
      const grid = document.getElementById('productsGrid');
      let products = Object.entries(allProducts).map(([id, data]) => ({ id, ...data }));

      if (currentFilter !== 'all') {
        products = products.filter(p => (p.category || '').toLowerCase() === currentFilter);
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        products = products.filter(p => 
          (p.name || '').toLowerCase().includes(q) ||
          (p.sku || '').toLowerCase().includes(q) ||
          (p.description || '').toLowerCase().includes(q)
        );
      }

      if (!products.length) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-box-open" style="font-size:2rem;display:block;margin-bottom:8px;"></i>No products found</div>';
        return;
      }

      grid.innerHTML = products.map(p => {
        const sku = p.sku || generateSKU(p.name, p.id);
        const icon = getCategoryIcon(p.category);
        const imageUrl = p.imageUrl || '';
        
        return `
          <div class="product-card">
            <div class="product-card-header">
              <div class="product-image">
                ${imageUrl ? `<img src="${imageUrl}" alt="${p.name}" onerror="this.style.display='none';this.parentElement.innerHTML='${icon}';">` : icon}
              </div>
              <div class="product-main-info">
                <h3>${p.name || 'Unnamed Product'}</h3>
                <span class="product-sku">${sku}</span>
                ${p.description ? `<p class="product-description">${p.description}</p>` : ''}
              </div>
            </div>
            
            <div class="product-meta">
              <span class="meta-tag category">${getCategoryIcon(p.category)} ${p.category || 'Uncategorized'}</span>
              ${p.unitPrice ? `<span class="meta-tag price">KES ${p.unitPrice.toLocaleString()}/${p.unit || 'unit'}</span>` : ''}
              ${p.isActive ? '<span class="meta-tag" style="background:#d1fae5;color:#065f46;">Active</span>' : '<span class="meta-tag" style="background:#fee2e2;color:#991b1b;">Inactive</span>'}
            </div>

            <div class="product-details-grid">
              <div><strong>Unit</strong>${p.unit || 'N/A'}</div>
              <div><strong>Min Order</strong>${p.minOrder || 1} ${p.unit || 'unit'}</div>
              <div><strong>Supplier</strong>${p.supplier || 'N/A'}</div>
              <div><strong>Updated</strong>${p.updatedAt ? new Date(p.updatedAt).toLocaleDateString() : 'N/A'}</div>
            </div>

            <div class="product-actions">
              <button class="btn-sm btn-edit" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i> Edit</button>
              <button class="btn-sm btn-preview" onclick="previewProduct('${p.id}')"><i class="fas fa-eye"></i> Preview</button>
              <button class="btn-sm btn-delete" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i> Delete</button>
            </div>
          </div>`;
      }).join('');

      updateStats();
    }

    function updateStats() {
      const products = Object.values(allProducts);
      const total = products.length;
      const active = products.filter(p => p.isActive !== false).length;
      const categories = new Set(products.map(p => p.category).filter(Boolean)).size;
      const prices = products.filter(p => p.unitPrice > 0).map(p => p.unitPrice);
      const avgPrice = prices.length ? Math.round(prices.reduce((a, b) => a + b, 0) / prices.length) : 0;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statActive').textContent = active;
      document.getElementById('statCategories').textContent = categories;
      document.getElementById('statAvgPrice').textContent = avgPrice.toLocaleString();
    }

    function showAddModal() {
      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-plus-circle"></i> Add New Product</h3>
        <div class="form-group"><label>Product Name *</label><input type="text" id="pName" placeholder="e.g., Premium Beef Fillet"></div>
        <div class="form-group"><label>Description</label><textarea id="pDescription" placeholder="Product description, quality, origin..."></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Category *</label><select id="pCategory">
            <option value="vegetables">🥬 Vegetables</option><option value="meat">🥩 Meat & Protein</option>
            <option value="dairy">🥛 Dairy</option><option value="grains">🌾 Grains</option>
            <option value="spices">🌶️ Spices</option><option value="beverages">🥤 Beverages</option>
            <option value="oils">🫒 Oils</option><option value="bakery">🍞 Bakery</option>
            <option value="other">📦 Other</option>
          </select></div>
          <div class="form-group"><label>Unit *</label><select id="pUnit">
            <option value="kg">Kilogram (kg)</option><option value="g">Gram (g)</option>
            <option value="L">Litre (L)</option><option value="ml">Millilitre (ml)</option>
            <option value="piece">Piece</option><option value="crate">Crate</option><option value="sack">Sack</option>
            <option value="bunch">Bunch</option>
            <option value="packet">Packet</option>
          </select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Unit Price (KES)</label><input type="number" id="pPrice" value="0" min="0" placeholder="0"></div>
          <div class="form-group"><label>Minimum Order</label><input type="number" id="pMinOrder" value="1" min="1"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Supplier</label><input type="text" id="pSupplier" placeholder="Supplier name"></div>
          <div class="form-group"><label>Image URL</label><input type="text" id="pImageUrl" placeholder="https://... (optional)"></div>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="pActive" checked style="width:auto;margin-right:6px;"> Active (visible to customers)</label>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveProduct()"><i class="fas fa-save"></i> Save Product</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    async function saveProduct() {
      const name = document.getElementById('pName').value.trim();
      if (!name) { showToast('Product name is required', true); return; }

      const productData = {
        name: name,
        description: document.getElementById('pDescription').value.trim(),
        category: document.getElementById('pCategory').value,
        unit: document.getElementById('pUnit').value,
        unitPrice: parseInt(document.getElementById('pPrice').value) || 0,
        minOrder: parseInt(document.getElementById('pMinOrder').value) || 1,
        supplier: document.getElementById('pSupplier').value.trim(),
        imageUrl: document.getElementById('pImageUrl').value.trim(),
        isActive: document.getElementById('pActive').checked,
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      };

      try {
        const newRef = await database.ref('fusion_foods_products').push(productData);
        // Auto-generate SKU
        await database.ref(`fusion_foods_products/${newRef.key}`).update({
          sku: generateSKU(name, newRef.key)
        });
        showToast('✅ Product added successfully!');
        closeModal();
      } catch (e) {
        console.error(e);
        showToast('Failed to save product', true);
      }
    }

    function editProduct(productId) {
      const p = allProducts[productId];
      if (!p) return;
      
      document.getElementById('modalContent').innerHTML = `
        <h3><i class="fas fa-edit"></i> Edit Product</h3>
        <div class="form-group"><label>Product Name *</label><input type="text" id="epName" value="${p.name || ''}"></div>
        <div class="form-group"><label>Description</label><textarea id="epDescription">${p.description || ''}</textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Category</label><select id="epCategory">
            ${['vegetables','meat','dairy','grains','spices','beverages','oils','bakery','other'].map(c => 
              `<option value="${c}" ${p.category === c ? 'selected' : ''}>${getCategoryIcon(c)} ${c}</option>`
            ).join('')}
          </select></div>
          <div class="form-group"><label>Unit</label><select id="epUnit">
            ${['kg','g','L','ml','piece','crate','sack','bunch','packet'].map(u => 
              `<option value="${u}" ${p.unit === u ? 'selected' : ''}>${u}</option>`
            ).join('')}
          </select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Unit Price (KES)</label><input type="number" id="epPrice" value="${p.unitPrice || 0}"></div>
          <div class="form-group"><label>Minimum Order</label><input type="number" id="epMinOrder" value="${p.minOrder || 1}"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Supplier</label><input type="text" id="epSupplier" value="${p.supplier || ''}"></div>
          <div class="form-group"><label>Image URL</label><input type="text" id="epImageUrl" value="${p.imageUrl || ''}"></div>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="epActive" ${p.isActive !== false ? 'checked' : ''} style="width:auto;margin-right:6px;"> Active (visible to customers)</label>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="updateProduct('${productId}')"><i class="fas fa-save"></i> Update Product</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    async function updateProduct(productId) {
      try {
        const name = document.getElementById('epName').value.trim();
        await database.ref(`fusion_foods_products/${productId}`).update({
          name: name,
          description: document.getElementById('epDescription').value.trim(),
          category: document.getElementById('epCategory').value,
          unit: document.getElementById('epUnit').value,
          unitPrice: parseInt(document.getElementById('epPrice').value) || 0,
          minOrder: parseInt(document.getElementById('epMinOrder').value) || 1,
          supplier: document.getElementById('epSupplier').value.trim(),
          imageUrl: document.getElementById('epImageUrl').value.trim(),
          isActive: document.getElementById('epActive').checked,
          sku: generateSKU(name, productId),
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
        showToast('✅ Product updated!');
        closeModal();
      } catch (e) {
        console.error(e);
        showToast('Failed to update product', true);
      }
    }

    function previewProduct(productId) {
      const p = allProducts[productId];
      if (!p) return;
      
      const icon = getCategoryIcon(p.category);
      alert(`
Product Preview:
───────────────
Name: ${p.name}
SKU: ${p.sku || generateSKU(p.name, productId)}
Category: ${icon} ${p.category}
Price: KES ${(p.unitPrice || 0).toLocaleString()}/${p.unit || 'unit'}
Min Order: ${p.minOrder || 1} ${p.unit || 'units'}
Status: ${p.isActive !== false ? 'Active' : 'Inactive'}
${p.description ? `\nDescription: ${p.description}` : ''}
${p.supplier ? `\nSupplier: ${p.supplier}` : ''}
      `.trim());
    }

    async function deleteProduct(productId) {
      if (!confirm('Are you sure you want to delete this product? This action cannot be undone.')) return;
      try {
        await database.ref(`fusion_foods_products/${productId}`).remove();
        showToast('✅ Product deleted');
      } catch (e) {
        showToast('Failed to delete product', true);
      }
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    // Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderProducts();
      });
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderProducts();
    });

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal')) closeModal();
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    // Firebase listener
    database.ref('fusion_foods_products').on('value', (snapshot) => {
      allProducts = snapshot.val() || {};
      renderProducts();
    });

    auth.onAuthStateChanged((user) => { if (!user) window.location.href = '/'; });
    
    // Expose functions globally
    window.showAddModal = showAddModal;
    window.editProduct = editProduct;
    window.deleteProduct = deleteProduct;
    window.previewProduct = previewProduct;
    window.saveProduct = saveProduct;
    window.updateProduct = updateProduct;
    window.closeModal = closeModal;
  </script>
</body>
</html>
