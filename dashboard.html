        // ===== LOAD WORKSPACES FROM FIREBASE =====
        async function loadWorkspacesFromResources() {
            try {
                const snap = await database.ref('resources/workspaces').once('value');
                const data = snap.val() || {};
                
                if (Object.keys(data).length === 0) {
                    workspaceConfig = { ...DEFAULT_WORKSPACES };
                    return workspaceConfig;
                }

                const config = {};
                for (const [id, workspace] of Object.entries(data)) {
                    // Use the actual ID from Firebase (could be push ID or custom)
                    const workspaceId = id;
                    const fallback = DEFAULT_WORKSPACES[workspaceId] || DEFAULT_WORKSPACES[workspace.slug] || {};
                    
                    // Try to get a clean name
                    let name = workspace.title || workspace.label || workspace.name || fallback.name || workspaceId;
                    
                    // If it's a push ID, try to use slug or title
                    if (workspaceId.startsWith('-') && workspace.slug) {
                        name = workspace.slug.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                    }
                    
                    config[workspaceId] = {
                        id: workspaceId,
                        name: name,
                        desc: workspace.description || fallback.desc || '',
                        icon: workspace.icon || fallback.icon || 'fa-building',
                        color: workspace.color || fallback.color || '#7c3aed',
                        bgColor: fallback.bgColor || `${workspace.color || '#7c3aed'}15`,
                        link: workspace.link || fallback.link || `/workspaces/${workspaceId}/index.html`,
                        paths: fallback.paths || [`${workspaceId}_data`],
                        slug: workspace.slug || workspaceId,
                        _firebase: workspace
                    };
                }

                // Add any missing defaults
                for (const [id, fallback] of Object.entries(DEFAULT_WORKSPACES)) {
                    if (!config[id]) {
                        config[id] = { ...fallback };
                    }
                }

                workspaceConfig = config;
                return workspaceConfig;
                
            } catch (e) {
                console.error('Error loading workspaces:', e);
                workspaceConfig = { ...DEFAULT_WORKSPACES };
                return workspaceConfig;
            }
        }

        // ===== AUTHENTICATION =====
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                await loadWorkspacesFromResources();
                await initializeDashboard(user);
            } else {
                window.location.href = 'index.html';
            }
        });

        // ===== DASHBOARD INITIALIZATION =====
        async function initializeDashboard(user) {
            try {
                // Check admin status
                const adminSnap = await database.ref(`admins/${user.uid}`).once('value');
                isAdmin = adminSnap.val() === true;

                // Load workspace permissions
                const permSnap = await database.ref(`workspacePermissions/${user.uid}`).once('value');
                userPermissions = permSnap.exists() ? permSnap.val() : {};

                const availableWorkspaceIds = Object.keys(workspaceConfig);

                // Auto-grant permissions if needed
                if (!isAdmin && availableWorkspaceIds.length > 0) {
                    let hasAnyPermission = false;
                    for (const wsId of availableWorkspaceIds) {
                        if (userPermissions[wsId] === true) {
                            hasAnyPermission = true;
                            break;
                        }
                    }

                    if (!hasAnyPermission) {
                        const newPermissions = {};
                        availableWorkspaceIds.forEach(wsId => {
                            newPermissions[wsId] = true;
                        });
                        userPermissions = newPermissions;
                        await database.ref(`workspacePermissions/${user.uid}`).set(newPermissions);
                    }
                }

                // Load user data
                const userSnap = await database.ref(`brandinn_users/${user.uid}`).once('value');
                const userData = userSnap.exists() ? userSnap.val() : {};
                const userName = userData.name || user.displayName || user.email?.split('@')[0] || 'User';
                const businessName = userData.businessName || '';

                updateUserInterface(userName, businessName);

                // Check access
                const hasAccess = isAdmin || Object.keys(userPermissions).some(k => userPermissions[k] === true);

                if (!hasAccess) {
                    document.getElementById('accessDenied').style.display = 'block';
                    document.getElementById('statsGrid').innerHTML = '';
                    document.getElementById('chartsGrid').style.display = 'none';
                    document.getElementById('activityCard').style.display = 'none';
                    document.getElementById('workspaceCard').style.display = 'none';
                    document.getElementById('mapCard').style.display = 'none';
                    document.getElementById('healthDots').innerHTML = '<span style="color:var(--text-muted);font-size:0.7rem;">No access</span>';
                    return;
                }

                document.getElementById('accessDenied').style.display = 'none';
                initOverviewMap();
                await loadAllData();
                await checkWorkspaceHealth();
                setupLiveListeners();
            } catch (e) {
                console.error('Dashboard error:', e);
                showToast('Error loading dashboard: ' + e.message, 'error');
            }
        }

        // ===== USER PERMISSION HELPERS =====
        function userHasWorkspaceAccess(workspaceId) {
            if (isAdmin) return true;
            return userPermissions[workspaceId] === true;
        }

        function getAccessibleWorkspaces() {
            const accessible = [];
            for (const [id, config] of Object.entries(workspaceConfig)) {
                if (userHasWorkspaceAccess(id)) {
                    accessible.push({ id, ...config });
                }
            }
            return accessible;
        }

        // ===== UI UPDATES =====
        function updateUserInterface(userName, businessName) {
            const hour = new Date().getHours();
            document.getElementById('greeting').textContent = hour < 12 ? 'Morning' : hour < 17 ? 'Afternoon' : 'Evening';
            document.getElementById('userName').textContent = userName;
            document.getElementById('userDisplayName').textContent = userName;
            document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
            document.getElementById('currentDate').innerHTML = `<i class="fas fa-calendar-alt"></i> ${new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}`;
            if (businessName) document.getElementById('roleBadge').textContent = businessName.substring(0, 15).toUpperCase();
        }

        // ===== MAP =====
        function initOverviewMap() {
            try {
                if (overviewMap) {
                    overviewMap.off();
                    overviewMap.remove();
                }
            } catch (e) {}
            mapMarkers = [];
            overviewMap = L.map('overviewMap', {
                center: [-1.2864, 36.8172],
                zoom: 12,
                zoomControl: false,
                attributionControl: false,
                dragging: false,
                scrollWheelZoom: false,
                doubleClickZoom: false,
                touchZoom: false
            });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(overviewMap);
        }

        // ===== DATA LOADING =====
        async function loadAllData() {
            const accessibleWorkspaces = getAccessibleWorkspaces();

            if (accessibleWorkspaces.length === 0) {
                document.getElementById('accessDenied').style.display = 'block';
                return;
            }

            let totalOrders = 0, totalProducts = 0, totalClients = 0;
            const activities = [];
            const workspaceStats = {};
            const businesses = [];

            const healthDots = document.getElementById('healthDots');
            healthDots.innerHTML = accessibleWorkspaces.map(w => `
                <div class="health-dot online" data-tooltip="${w.name}: Online"></div>
            `).join('');

            for (const ws of accessibleWorkspaces) {
                let orderCount = 0;
                let productCount = 0;
                let clientCount = 0;

                for (const path of ws.paths) {
                    try {
                        const snap = await database.ref(path).once('value');
                        const data = snap.val() || {};
                        const count = Object.keys(data).length;

                        if (path === 'brandinn_users') {
                            clientCount += count;
                            totalClients += count;
                            const bizData = Object.values(data).filter(b => b.lat && b.lng);
                            businesses.push(...bizData);
                        } else if (path === 'brandinn_print_orders') {
                            orderCount += count;
                            totalOrders += count;
                            const entries = Object.entries(data).sort((a, b) => (b[1].createdAt || 0) - (a[1].createdAt || 0)).slice(0, 2);
                            entries.forEach(([id, item]) => {
                                activities.push({
                                    icon: ws.icon,
                                    iconBg: ws.bgColor,
                                    iconColor: ws.color,
                                    title: `Print Order: ${item.product || 'N/A'} · ${item.customerName || 'N/A'}`,
                                    meta: `#${id.slice(-6)} · KES ${(item.total || 0).toLocaleString()}`,
                                    time: getTimeAgo(item.createdAt || item.timestamp),
                                    status: item.status || 'new'
                                });
                            });
                        } else if (path === 'brandinn_franchises' || path === 'brandinn_inquiries') {
                            // Skip these due to permission errors - just log once
                            continue;
                        } else if (path.includes('orders') || path.includes('listings') || path.includes('shipments') || path.includes('rides')) {
                            orderCount += count;
                            totalOrders += count;
                            const entries = Object.entries(data).sort((a, b) => (b[1].createdAt || 0) - (a[1].createdAt || 0)).slice(0, 2);
                            entries.forEach(([id, item]) => {
                                const name = item.restaurantName || item.customerName || item.businessName || item.passengerName || 'Customer';
                                const orderTotal = item.total || item.fare || 0;
                                activities.push({
                                    icon: ws.icon,
                                    iconBg: ws.bgColor,
                                    iconColor: ws.color,
                                    title: `${ws.name}: ${name}`,
                                    meta: `#${id.slice(-6)} · KES ${orderTotal.toLocaleString()}`,
                                    time: getTimeAgo(item.createdAt || item.requestedAt || item.bookingDate),
                                    status: item.status || 'new'
                                });
                            });
                        } else if (path.includes('products') || path.includes('inventory') || path.includes('menu')) {
                            productCount += count;
                            totalProducts += count;
                        } else if (path.includes('franchisees') || path.includes('stores') || path.includes('partners') || path.includes('members')) {
                            clientCount += count;
                            totalClients += count;
                        } else if (path === 'iam_mugera_registrations') {
                            const bizData = Object.values(data).filter(b => b.operation === 'brandinn' && b.lat && b.lng);
                            businesses.push(...bizData);
                            clientCount += bizData.length;
                            totalClients += bizData.length;
                        }
                    } catch (e) {
                        // Silently skip permission errors
                        if (!e.message.includes('permission_denied')) {
                            console.warn(`Error loading ${path}:`, e);
                        }
                    }
                }

                const total = orderCount || productCount || clientCount;
                if (total > 0) {
                    workspaceStats[ws.name] = orderCount || productCount || clientCount;
                }
            }

            activities.sort((a, b) => (b.time || 0) - (a.time || 0));
            const filteredActivities = activities.slice(0, 6);

            renderStats(totalOrders, totalProducts, totalClients, accessibleWorkspaces.length);
            renderCharts(workspaceStats);
            renderActivities(filteredActivities);
            renderWorkspaces(accessibleWorkspaces);

            // BrandInn stats - only if user has access
            if (userHasWorkspaceAccess('brandinn') || userHasWorkspaceAccess('brandinn-print')) {
                let businessesCount = 0;
                let printOrders = 0;
                let franchises = 0;

                try {
                    const bizSnap = await database.ref('brandinn_users').once('value');
                    businessesCount = Object.keys(bizSnap.val() || {}).length;
                } catch (e) { }

                try {
                    const printSnap = await database.ref('brandinn_print_orders').once('value');
                    printOrders = Object.keys(printSnap.val() || {}).length;
                } catch (e) { }

                try {
                    const franchiseSnap = await database.ref('brandinn_franchises').once('value');
                    franchises = Object.keys(franchiseSnap.val() || {}).length;
                } catch (e) { }

                renderBrandInnStats(businessesCount, printOrders, franchises);
                updateMapMarkers(businesses);
            }
        }

        function renderStats(orders, products, clients, workspacesCount) {
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-icon" style="background:#fef3c7;color:#ca8a04;"><i class="fas fa-shopping-cart"></i></div><div><div class="stat-value">${orders}</div><div class="stat-label">Total Orders</div></div></div>
                <div class="stat-card"><div class="stat-icon" style="background:#ecfdf5;color:#059669;"><i class="fas fa-boxes"></i></div><div><div class="stat-value">${products}</div><div class="stat-label">Products Listed</div></div></div>
                <div class="stat-card"><div class="stat-icon" style="background:#eff6ff;color:#2563eb;"><i class="fas fa-users"></i></div><div><div class="stat-value">${clients}</div><div class="stat-label">Total Clients</div></div></div>
                <div class="stat-card"><div class="stat-icon" style="background:#eef2ff;color:#4f46e5;"><i class="fas fa-cubes"></i></div><div><div class="stat-value">${workspacesCount}</div><div class="stat-label">Active Workspaces</div></div></div>
            `;
        }

        function renderCharts(workspaceStats) {
            try {
                if (ordersChart) { ordersChart.destroy(); ordersChart = null; }
                if (distributionChart) { distributionChart.destroy(); distributionChart = null; }

                const entries = Object.entries(workspaceStats).filter(([_, val]) => val > 0);
                const labels = entries.map(([name]) => name);
                const data = entries.map(([_, val]) => val);

                const colors = {};
                for (const [id, config] of Object.entries(workspaceConfig)) {
                    colors[config.name] = config.color || '#ca8a04';
                }

                const chartColors = labels.map(l => colors[l] || '#ca8a04');

                if (labels.length === 0) {
                    const ctx1 = document.getElementById('ordersChart').getContext('2d');
                    ctx1.clearRect(0, 0, 100, 100);
                    const ctx2 = document.getElementById('distributionChart').getContext('2d');
                    ctx2.clearRect(0, 0, 100, 100);
                    return;
                }

                const ctx1 = document.getElementById('ordersChart').getContext('2d');
                ordersChart = new Chart(ctx1, {
                    type: 'bar',
                    data: { labels, datasets: [{ data, backgroundColor: chartColors.map(c => c + '99'), borderColor: chartColors, borderWidth: 2, borderRadius: 8 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } }, grid: { color: '#f3f4f6' } }, x: { grid: { display: false }, ticks: { font: { size: 9 } } } } }
                });

                const ctx2 = document.getElementById('distributionChart').getContext('2d');
                distributionChart = new Chart(ctx2, {
                    type: 'doughnut',
                    data: { labels, datasets: [{ data, backgroundColor: chartColors, borderWidth: 2, borderColor: '#ffffff' }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { padding: 12, usePointStyle: true, font: { size: 9 } } } } }
                });
            } catch (e) { }
        }

        function renderActivities(activities) {
            const container = document.getElementById('activityList');
            if (!activities || activities.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:1.5rem;color:var(--text-muted);"><i class="fas fa-clock"></i><p>No recent activity</p></div>';
                return;
            }
            container.innerHTML = activities.map(a => {
                const sb = a.status === 'delivered' ? 'badge-success' : a.status === 'shipped' ? 'badge-purple' : a.status === 'processing' ? 'badge-info' : 'badge-warning';
                return `<div class="activity-item">
                    <div class="activity-icon" style="background:${a.iconBg};color:${a.iconColor};"><i class="fas ${a.icon}"></i></div>
                    <div class="activity-content">
                        <div class="activity-title">${escapeHtml(a.title)}</div>
                        <div class="activity-meta">${escapeHtml(a.meta)}</div>
                    </div>
                    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.2rem;">
                        <span class="badge ${sb}">${(a.status||'new').replace(/-/g,' ')}</span>
                        <span class="activity-time">${a.time}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function renderWorkspaces(workspaces) {
            const container = document.getElementById('workspaceList');
            if (!workspaces || workspaces.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:1.5rem;color:var(--text-muted);"><i class="fas fa-cubes"></i><p>No workspaces accessible</p></div>';
                return;
            }
            container.innerHTML = workspaces.map(w => `
                <a href="${w.link}" class="workspace-card">
                    <div class="workspace-icon" style="background:${w.bgColor};color:${w.color};"><i class="fas ${w.icon}"></i></div>
                    <div class="workspace-info">
                        <div class="workspace-name">${w.name}</div>
                        <div class="workspace-desc">${w.desc}</div>
                    </div>
                    <div class="workspace-stat"><span class="number">✓</span><div class="label">Access</div></div>
                </a>
            `).join('');
        }

        function renderBrandInnStats(businesses, printOrders, franchises) {
            document.getElementById('brandinnStats').innerHTML = `
                <div class="brandinn-stat-item"><div class="brandinn-stat-value" style="color:#4f46e5;">${businesses}</div><div class="brandinn-stat-label">🏢 Businesses</div></div>
                <div class="brandinn-stat-item"><div class="brandinn-stat-value" style="color:#db2777;">${printOrders}</div><div class="brandinn-stat-label">🖨️ Print Orders</div></div>
                <div class="brandinn-stat-item"><div class="brandinn-stat-value" style="color:#7c3aed;">${franchises}</div><div class="brandinn-stat-label">📋 Franchises</div></div>
            `;
        }

        function updateMapMarkers(businesses) {
            try {
                mapMarkers.forEach(m => { try { overviewMap.removeLayer(m); } catch (e) {} });
                mapMarkers = [];
                const bounds = [];

                businesses.forEach(biz => {
                    if (biz.lat && biz.lng) {
                        const color = biz.operation === 'brandinn' ? '#4f46e5' : '#ca8a04';
                        const marker = L.circleMarker([biz.lat, biz.lng], { radius: 5, fillColor: color, color: '#ffffff', weight: 1.5, fillOpacity: 0.8 }).addTo(overviewMap);
                        mapMarkers.push(marker);
                        bounds.push([biz.lat, biz.lng]);
                    }
                });

                if (bounds.length > 0) {
                    overviewMap.fitBounds(bounds, { padding: [20, 20], maxZoom: 15 });
                }
            } catch (e) { }
        }

        // ===== WORKSPACE HEALTH =====
        async function checkWorkspaceHealth() {
            const accessibleWorkspaces = getAccessibleWorkspaces();
            const dotElements = document.querySelectorAll('.health-dot');
            const workspaceNames = accessibleWorkspaces.map(w => w.name);
            let healthyCount = 0;

            for (let i = 0; i < dotElements.length; i++) {
                const dot = dotElements[i];
                const wsName = dot.getAttribute('data-tooltip')?.split(':')[0]?.trim() || '';

                if (workspaceNames.includes(wsName)) {
                    dot.style.display = 'block';
                    try {
                        const config = accessibleWorkspaces.find(w => w.name === wsName);
                        if (config && config.paths && config.paths.length > 0) {
                            const snap = await database.ref(config.paths[0]).once('value');
                            const isHealthy = snap.exists();
                            dot.className = `health-dot ${isHealthy ? 'online' : 'degraded'}`;
                            dot.style.background = isHealthy ? '#10b981' : '#f59e0b';
                            dot.setAttribute('data-tooltip', `${wsName}: ${isHealthy ? 'Online' : 'Degraded'}`);
                            if (isHealthy) healthyCount++;
                        }
                    } catch (e) {
                        dot.className = 'health-dot down';
                        dot.style.background = '#ef4444';
                        dot.setAttribute('data-tooltip', `${wsName}: Down`);
                    }
                } else {
                    dot.style.display = 'none';
                }
            }

            const statusIcon = document.getElementById('statusIndicatorIcon');
            const statusMain = document.getElementById('statusMainText');
            const statusSub = document.getElementById('statusSubText');

            const total = accessibleWorkspaces.length;
            if (total === 0) {
                statusIcon.className = 'status-indicator-icon has-issues';
                statusIcon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
                statusMain.textContent = 'No Access';
                statusMain.className = 'status-main-text has-issues';
                statusSub.textContent = 'No workspaces accessible';
            } else if (healthyCount === total) {
                statusIcon.className = 'status-indicator-icon all-systems';
                statusIcon.innerHTML = '<i class="fas fa-check"></i>';
                statusMain.textContent = 'All Systems Operational';
                statusMain.className = 'status-main-text';
                statusSub.textContent = `${healthyCount}/${total} workspaces healthy`;
            } else {
                statusIcon.className = 'status-indicator-icon has-issues';
                statusIcon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
                statusMain.textContent = healthyCount >= total - 1 ? 'Minor Degradation' : 'Service Disruption';
                statusMain.className = 'status-main-text has-issues';
                statusSub.textContent = `${healthyCount}/${total} workspaces healthy';
            }
        }

        function setupLiveListeners() {
            const accessibleWorkspaces = getAccessibleWorkspaces();
            const paths = [];
            for (const ws of accessibleWorkspaces) {
                if (ws.paths) paths.push(...ws.paths);
            }

            paths.forEach(p => {
                database.ref(p).on('child_added', () => {
                    document.querySelector('.live-dot').style.animation = 'none';
                    setTimeout(() => document.querySelector('.live-dot').style.animation = 'pulse-glow 2s infinite', 10);
                    loadAllData();
                    checkWorkspaceHealth();
                });
                database.ref(p).on('child_changed', () => loadAllData());
            });
            setInterval(checkWorkspaceHealth, 60000);
        }

        function getTimeAgo(timestamp) {
            if (!timestamp) return '';
            const diff = Date.now() - new Date(timestamp).getTime();
            const mins = Math.floor(diff / 60000), hrs = Math.floor(mins / 60), days = Math.floor(hrs / 24);
            if (days > 0) return `${days}d ago`;
            if (hrs > 0) return `${hrs}h ago`;
            if (mins > 0) return `${mins}m ago`;
            return 'Just now';
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t || '';
            return d.innerHTML;
        }

        function showToast(m, type = 'info') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i><span>${escapeHtml(m)}</span>`;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transition = '0.3s';
                setTimeout(() => t.remove(), 300);
            }, 3000);
        }

        window.refreshData = async () => {
            try {
                await loadWorkspacesFromResources();
                initOverviewMap();
                await loadAllData();
                await checkWorkspaceHealth();
                showToast('Dashboard refreshed!', 'success');
            } catch (e) {
                showToast('Error refreshing dashboard: ' + e.message, 'error');
            }
        };

        window.handleLogout = async () => {
            if (confirm('Sign out?')) {
                const accessibleWorkspaces = getAccessibleWorkspaces();
                const paths = [];
                for (const ws of accessibleWorkspaces) {
                    if (ws.paths) paths.push(...ws.paths);
                }
                paths.forEach(p => database.ref(p).off());
                await auth.signOut();
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
